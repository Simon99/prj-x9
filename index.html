| Trae Agent | 2507.23370, 2511.16005 |\n| 2 | Python Projects | 2509.14856, 2603.01596 |\n| 2 | Mohayeminul Islam | 2510.08810, 2603.01596 |\n| 2 | May Mahmoud | 2510.08810, 2603.01596 |\n| 2 | Sarah Nadi | 2510.08810, 2603.01596 |\n| 2 | Hamed Jelodar | 2510.18936, 2512.00134 |\n\n## 觀察\n\n1. **Codex (2107.03374) 是絕對 anchor**：54/207 篇引用（26%）—— 任何 LLM 程式碼研究都繞不開。\n2. **Code Llama (2308.12950) 是第二常見基線**：35 次。\n3. **SWE-bench 系列頻繁出現**：原版 SWE-bench (2310.06770) + 我們的 SWE-bench Multimodal (2407.01489) 合共 43 次引用。\n4. **DeepSeek-Coder (2401.14196) 與 Qwen2.5-Coder (2409.12186) 並列為近期主要 baseline**。\n5. **Agentless (2407.16741) 16 次**：repo-level agent 基線。\n6. **Yanlin Wang (6 篇)** 與 **Mingwei Liu (5 篇)** 為持續發表作者，多在 repo-level code intelligence 議題。"}, {"key": "methodology", "name": "方法論", "count": "bug log", "file": "research-methodology-lessons.md", "content": "# 本主題實戰記錄（2026-05-22 LLM-large-codebase-maintenance）\n\n_只記本主題的**特殊數字、bug log、本次決策**。通用方法論在 `~/.claude/CLAUDE.md`；Sapphire 跨主題 SOP 在 `/home/simon/proj_sapphire/CLAUDE.md`。_\n\n最後更新：2026-05-26\n\n---\n\n## 範圍\n\n| 集合 | 篇數 |\n|---|---:|\n| batch-1（initial） | 26 |\n| batch-2（2024-2025 search）| 181 |\n| batch-3（rescan after regex bug） | 446 |\n| **總分析** | **653 unique** |\n| 撞 G5 off-topic（≈ search noise）| 12（在 batch-2 中已 excluded）|\n| anchor refs（≥3 次互引）| 498（111 核心 ≥10 次）|\n\n## 本次撞到的 bug（依時序）\n\n### 1. arxiv API regex 跨 entry 錯位（5/25 發現）\n- 我寫的 `re.findall(r'<entry>.*?<id>...</title>...', xml, re.DOTALL)` 沒限定在單一 entry 內\n- 結果：chunks JSON 的 (id, title) pairs 大亂，**75% PDF 檔名 slug 對不上真實 title**\n- 影響：12 篇 G5 純 noise（被當 off-topic 排除）+ 漏掉 423 篇相關論文\n- 修正：entry-by-entry parse（已寫進 Sapphire CLAUDE.md）\n\n### 2. Opus subagent 30+ 並行撞 session limit（5/25 三次）\n- 11:30am / 4:40pm / 11:30am 各撞一次\n- 後續改 Sonnet + 10 並行 → 解決\n\n### 3. Sonnet 22 並行撞 server limit（5/25 一次）\n- 確認本主題 server 限流天花板 ~12-15\n- 後續用 10 個 / wave\n\n### 4. Subagent 走錯位（5/25-5/26 共 3 次）\n- chunks[17] 跑去做 chunks[7]、chunks[46] 跑去做 chunks[47]、chunks[51] 也錯\n- 根因：subagent 看到既有 fragments 後 hallucinate「那是我的份」\n- 修正：explicit ID list（不靠索引），禁止「從 ls 反推任務」\n- 走錯位率 3/65 = **4.6%**（低於 10% 容忍）\n\n### 5. Subagent silent death（5/26 一次）\n- 446 篇分類 subagent 啟動後 1.5 小時 `.output` 仍 131 bytes、mtime 不變\n- 無 heartbeat 無 progress 無 error，主控完全黑盒\n- 修正：debug 三檔機制（progress + heartbeat + error）\n\n### 6. 圖檔副檔名假性失敗（5/27 一次）\n- `/home/simon/nano-banana/generate.py` 依 API 回傳 MIME 自動決定副檔名（Gemini Pro 回 JPEG）\n- 我寫的 wrapper 用 `out_path = .png`，script 改存 `.jpg`，我檢查 `.png` exists → 全部誤判失敗\n- 實際 7 張都成功，NT$29.5 不冤\n- 修正：未來檢查存在性用 `slug.{jpg,png}` glob，或讀 script stdout 「saved: <path>」\n\n### 7. Subagent hallucinate 做不相關事（5/26 一次）\n- 446 篇分類 subagent 跑去「分析 Claude Code 權限、建議 settings.json」\n- 完全沒做指派任務\n- 修正：prompt 明文「禁止做的事」列表\n\n---\n\n## 本次成本與用量\n\n| 項目 | 數量 |\n|---|---:|\n| 全文閱讀 PDFs | 653 篇 |\n| arxiv-cache 總 PDF | 798 unique |\n| 圖片產出 | 21 張（Gemini Nano Banana Pro 2K，~NT$90）|\n| Subagent 總呼叫 | ~120+ 次 |\n| 撞 session limit | 3 次（皆 Opus 並行） |\n| 撞 server rate limit | 1 次（Sonnet 22 並行） |\n| 走錯位事件 | 3 次（4.6%） |\n| Silent death | 1 次 |\n| Hallucinate 做別的事 | 1 次 |\n\n### Sonnet 4.6 任務數字（給下次參考）\n- 任務：讀 ~20 頁 PDF 全文 + 寫 fragment + 寫 metadata\n- 每篇 ~5K input + 2.5K output tokens\n- 每 subagent 處理時間：3-5 分鐘/篇 × 7 篇 ≈ 20-30 分鐘/chunk\n- 並行天花板 ~12-15，營運上限 10\n\n---\n\n## 本次 G5 off-topic 名單（12 篇，已 excluded）\n\n全部來自 chunks JSON regex bug → arxiv ID ↔ title 對應錯造成的 false match：\n\n| arxiv ID | 想要的 slug | 實際 PDF |\n|---|---|---|\n| 2407.04180 | web2code | Slice-100K 3D Printing |\n| 2407.14565 | crab-cross-environment | Mobile App Metamorphosis |\n| 2408.12622 | diversity-empowers-intelligence | AI Risk Repository Meta-Review |\n| 2409.11667 | impact-large-language | DeclarUI UI generation |\n| 2410.07962 | transagent | Adversarial Robustness Ontology |\n| 2410.18032 | beyond-browsing | GraphTeam Graph Reasoning |\n| 2411.11916 | empirical-study-llm | Text-to-Diagram |\n| 2508.17856 | agentic-ai-software | MalLoc Android Malware |\n| 2509.25199 | crosstl | CircInspect Quantum Debugger |\n| 2512.08379 | bridging-code-graphs | DeepFeature Biosignals |\n| 2512.17838 | swe-bench-framework | ReX-MLE Medical Imaging |\n| 2512.24840 | vsa-ui-to-code | PyLASP Astrophysics |\n\n註：原本想找的「TransAgent」、「Diversity Empowers Intelligence」、「Web2Code」等其實**真實 arxiv ID 不同**，已在 batch-3 rescan 補回對應論文。\n\n---\n\n## 本次特殊決策\n\n### 分類體系 v2\n新增 sub-category：**Cx Industry case study / enterprise deployment**\n- 13 篇企業案例（Google TF→JAX、JP Morgan、IBM WCA4Z、Ericsson、Flash-X HPC、COBOL-Coder 等）\n- 後續主題若有同類論文，可沿用 Cx 標籤\n\n### arxiv-cache 拆 10 個年份 repo（5/25）\n- 從單一 `arxiv-cache` 拆成 `arxiv-cache-{2017..2026}`\n- 每年 ~5-138 篇，最大 296 MB（2024 年）\n- 私有；舊 `arxiv-cache` 已棄用待刪\n\n### 主題 repo 命名\n`Simon99/sapphire-2026-05-22-llm-codebase`（private）\n\n---\n\n## 後續可做（未動）\n\n| # | 任務 |\n|---|---|\n| 17 | #7 retro A4/B1/C1/D1 補做法/發現獨立圖 |\n| 18 | #6 forward 圖批 A5-A8 / C2-C4 / D2-D5 |\n| 19 | 更新 GitHub Pages HTML（含新分類 + 653 篇）|\n| - | 刪舊 `Simon99/arxiv-cache`（需 `delete_repo` scope）|\n| - | 解決 batch-3 6 篇 PDF 損壞無 metadata |\n"}, {"key": "A", "name": "A 業界案例", "count": "9 篇", "content": "# 總覽報告：LLM 對大型代碼庫的修改與維護 — A 類（業界／真實世界案例）\n\n- **研究主題**：運用大型語言模型（LLM）對大型代碼庫進行修改與維護的案例\n- **本報告範圍**：A 類「業界／真實世界案例」8 篇論文的總覽\n- **建立日期**：2026-05-22\n- **引用格式**：(第一作者 et al. 年份, §章節, p.頁碼)；全部論文皆為 2026 年 arXiv 預印本\n- **狀態**：總覽（preliminary overview）。逐子議題的細部核對論述待後續討論時另出。\n- **追溯精度**：8 篇均經全文逐頁重讀，逐篇摘要的每一事實與數字標註至章節（§）與頁碼（p.）。\n\n---\n\n## 一、逐篇摘要\n\n8 篇依與主題的貼近程度排序：1–5 為直接的「修改／遷移既有大型代碼庫」案例，6 為「代理式變更在真實 OSS 的接受度」實證，7–8 為間接相關（邊界基準與安全研究）。\n\n### 1. TF→JAX 多智能體遷移系統 — Google 以多智能體 LLM 系統自動化深度學習模型框架遷移的工業案例\n*Nikolov et al. 2026, arXiv:2603.27296（Google，慕尼黑與美國加州）*\n\n\n**定位**：Google 內部建有數千個機器學習模型，多數建構於 TensorFlow 之上，但公司正轉向以 JAX 作為 ML 模型開發的標準框架（JAX 更適合 TPU 推論與訓練，且支撐 Google AI 技術棧的絕大部分），長期以來模型維護與遷移工作主要靠人類專家手動完成（Abstract, p.1；§1, p.1）。若以人工將所有模型遷移，因兩個框架在架構與範式上並不對等，將耗費「數百個專家工程師年」（hundreds of expert engineering years），這些精力更應投入於實際改善模型架構（§1, p.1）。論文主張：通用型 AI 編碼工具（Gemini CLI、Codex CLI、Claude Code 等）雖已簡化軟體工程流程，但對於牽涉眾多元件、需要大量特定情境的「非常複雜的程式碼遷移」仍難以可靠產出高品質結果；因此需要一個聚焦於「某一類問題」的客製系統（bespoke system）才能顯著簡化並縮短開發時程（§1, p.1）。論文自我定位為一份「詳細的案例研究」（detailed case-study），說明所建系統、評估指標與所達成的結果，並提出三項主要貢獻：(1) 以混合靜態分析與 AI 指令的 AI planner 為非常複雜的程式碼元件產生可被 orchestrator 與 coder agents 可靠遵循的遷移步驟，並使用 AI 生成的範例式 playbook；(2) 定義品質度量與 AI 評審（AI-based judges），以在程式碼無測試、且須嚴格遵守風格與相依規範時加速開發；(3) 在商用真實案例的 hyperscaler 環境中驗證系統加速效果（§1, p.1；Abstract, p.1）。論文另強調一個「以 AI 改善 AI 開發」的良性循環觀點（virtuous cycle）（§1, p.1–2）。\n\n**背景與問題本質**：\n- TensorFlow 與 JAX 雖同為 ML 框架，但動機與年代不同：TensorFlow 誕生於前 Transformer 時代，圍繞當時主流方法（如在標準 GPU 上運作的 CNN）設計，依賴有狀態層（stateful layers）與靜態執行圖，常使用特化 custom ops 取得效能；JAX 則代表轉向動態執行，建立在函數式、無狀態的範式上，為現代 TPU 基礎設施與 XLA 編譯最佳化（§2, p.2）。\n- 架構分歧造成遷移困難：TensorFlow 物件導向、有狀態的層初始化（常透過 Keras API 抽象）與 JAX 的函數式取徑形成強烈對比；JAX 中狀態須被明確管理與分離，須從根本上重新思考層之間如何互動（§2, p.2）。\n- 生產級 TensorFlow 模型常依賴特化的「custom ops」，這些近乎硬體層級的程式碼在 JAX 中鮮有直接對應，往往須以 JAX 的可組合原語從頭重新實作（§2, p.2）。\n- 遷移範圍不止核心模型程式碼：尚須處理執行腳本、資料載入管線、訓練迴圈等與框架深度耦合的周邊生態；且須遵守嚴格的內部編碼標準並重用既有函式庫。論文指出，對通用編碼 agent 天真套用會產出不令人滿意的結果，無法捕捉複雜度量或遵守特定風格指南（§2, p.2）。\n- 論文以 Listing 1（標準 TF/Keras 實作，含 BatchNorm 經由 `training` flag 自動更新狀態、L2 正則化經由 `model.losses` 的隱式 side-channel 追蹤）與 Listing 2（遷移後的 Flax 實作，需明確處理 BatchNorm 狀態、以 `mutable=['batch_stats']` 傳遞並取回變異後狀態、手動對 `params` PyTree 做轉換以計算 L2 正則化）對照展示框架差異的具體樣貌（Listing 1, p.2；Listing 2, p.4）。\n\n\n**做法**：\n- **整體架構**：系統為多智能體架構，由 Planner、Orchestrator、與多個 Coder agents 組成，並輔以離線生成的 playbook 階層與一個基於檔案的 Memory Bank；Google 已就 AI 程式碼遷移系統投資數年（引用先前報告 Nikolov et al. 2025），本系統在其基礎上擴充以支援 TF→JAX 遷移（§3, p.3；Figure 1, p.5）。\n- **Prompt Engineering 與 Playbook 階層**：為把預期程式碼的結構與風格知識灌注給 agent，團隊建立了 markdown 格式的 playbook 階層。初期開發以開源 TF 模型測試 AI 遷移能力，揭露三大挑戰：API 幻覺（API hallucinations）、風格不一致（style inconsistency）、無法持續產出可建構的程式碼（inability to produce consistently buildable code）；為解決這些問題，團隊從基本 prompt 指令演進為 playbook 系統，提供針對性指引（§3.1, §3.1.1, p.2）。playbook 以串接方式作為 system prompt 的一部分提供給 agent（通常是 coder agent），但內部依 Table 1 的階層拆分（§3.1.1, p.2）。\n- **四類 Playbook**（Table 1, p.3）：\n  - *General Instruction Playbook*：涵蓋目錄結構、建構工具等 repository 細節，提供 agent 讀／寫／搜尋並與 Google monorepo 互動所需的基礎工具知識；幾乎每個 agent 都使用；僅在新增工具時更新。\n  - *Style Playbook*：在有多個合法選項處（如使用 `nn.compact` 而非 `setup()`、一致的 import 方式）強制一致性；專供編碼任務使用；極少且須手動更新（偵測到風格違規時）。\n  - *Task-Specific Playbook*：由 Gemini 依官方文件生成，用以凸顯 TF 與 JAX 之間細微的 API 差異（例如預設參數不同），提供一般適用的編碼指令。\n  - *Client-Specific Playbook*（如 YouTube）：包含使用案例特定的需求與偏好函式庫，是規劃與編碼任務最主要的任務相關資訊來源；每次完整執行後反覆迭代更新（如精修 import）。\n- **Client-Specific Playbook 的離線生成策略**：當已有完成的遷移案例時，將其當作「黃金範例」（golden examples）離線生成 client-specific playbook。為了可擴展並避免對少數初始遷移模型過擬合，採用：(1) 提示 AI agent 將已遷移程式碼拆解為語意單元（如 base imports、base methods、loss computation、metrics output）；(2) 由 LLM 依這些程式碼區塊摘要出一般性遷移規則。生成由 Gemini 完成但由人類工程師監督，工程師主要負責審查源自 TF/JAX 框架差異的問題；LLM 將兩套程式碼拆成語意領域（機器學習）的功能等價程式碼區塊，且拆分趨向細粒度以利提煉出兼具通用與客戶特定知識的 playbook（§3.1.2, p.3）。實驗中能僅用 2 個範例（一個中等複雜度、一個含數千行程式碼與數十層的高複雜度模型）就生成「足夠好」的 playbook（§3.1.2, p.3）。當無已遷移模型與範例時，則僅依賴通用指令，並預期人類須進一步改善遷移品質；隨著更多複雜模型被遷移，可重複此流程改善 playbook，形成良性循環（§3.1.2, p.3）。\n- **多智能體拆分動機**：單智能體在長時程任務中難以維持上下文、在複雜模型上常幻覺出「已完成」；多智能體拆分用以強制驗證、管理 context window，處理須遵守嚴格開發規則、處理深層相依、確保跨多檔案模型遷移完整的任務（§3.2.1, p.3）。\n- **Planner Agent**：為單一 TF 模型的遷移建立計畫；一個「step」定義為對 coder agent 的離散指令，coder 須產出處於有效狀態（可建構、若適用則可測試）的程式碼。Planner 建立含「不相交步驟」的端對端計畫，一個編碼任務可拆成多步，傾向細粒度步驟（每步新增不超過數百行 LOC），並為每步加上「必須滿足的驗證條件」（validation condition）（§3.2.3, §3.2, p.3–4）。拆分目的：控制每個 coder 任務範圍、引導模型跨多個相關檔案、保持 coder 任務複雜度小、提升變更可重現性、允許人工檢查以驗證涵蓋所有待遷移元素（§3.2.3, p.4）。\n- **相依探索與計畫產生（混合 static-agentic 取徑）**：Planner 不用 agent 做相依探索，而採用 Kythe（Google 開源、基於編譯器的靜態分析與交叉參照工具）做相依解析；Kythe 依 codebase 近期索引解析相依、再以 build 資訊增強，使相依探索具決定性、可驗證、快速且計算成本低（§3.2.3, p.4）。規劃以遞迴方式進行：從主模型檔案及其直接相依出發，提示 LLM 產出遷移計畫、找出計畫缺口、列出仍需相依的檔案，反覆此程序並把所有被請求相依的內容加入 prompt；已可直接使用的通用 JAX 函式庫經由 playbook 注入 planner prompt，避免為其建立遷移步驟（§3.2.3, p.4）。實際遷移須從「葉節點」（無未遷移相依的層或函式）向上進行，目標是計畫的每一步都可建構、理想上可測試（§3.2.3, p.4）。\n- **Plan Schema（計畫格式）**：每個遷移步驟含 index、原始與目標檔案路徑、指令、以及相依步驟的 index；計畫以 JSON 格式提供（Listing 3）以利 LLM 遵循同時方便人類閱讀。Planner 把完整計畫以 JSON 寫入 Memory Bank，並另產出 dot 版本計畫供視覺化與人工檢視（§3.2.3, p.4；Listing 3, p.5）。\n- **Orchestrator Agent**：作為高層計畫與 Coder 執行之間的橋樑，本身不寫程式碼，但管理遷移流程而不修改文件。其機制：*dynamic task scoping*（將計畫步驟依複雜度分組為可管理的 chunk，保持 Coder 上下文聚焦）、*dynamic knowledge injection*（每個任務只挑選相關 playbook 以減少 context pollution）、*strategic failure handling*（依 Coder 結果決定重試、跳過或中止）、*fault tolerance*（把進度持久化到 Memory Bank，使長時程遷移可在中斷後恢復）。Orchestrator 將生成計畫中一個或多個邏輯相連步驟組合成粗粒度的「sub-steps」，一次委派一個 sub-step 給 coder，並等待回覆才提供下一個（§3.2.4, §3.2, p.4）。\n- **Coder Agent**：是一個 ReAct agent，可使用基本工具：列檔、讀檔、程式碼搜尋（類似 grep、針對 Google3 repository）、寫檔、搜尋與取代、自動修復相依、執行 build、執行單元測試。其 system prompt 含在 Google repository 中工作的通用 playbook，並規定一個包含「對每次變更進行建構與測試」的工作流程，另含使用案例特定指令（如 YouTube 模型）。Coder 是遷移的「workhorse」（主力），每次被叫用時負責產出可建構並可測試的程式碼，並被指示修復 build 與測試中的失敗、持續此程序直到完成被指派的任務（一個計畫步驟）；最終產物是實作該指派的檔案變更（§3.2.5, §3.2, p.5）。\n- **Validation（自我審查）**：為防止「提前宣告完成」（多智能體系統與長上下文生成的常見失敗模式），在 coder 宣告任務完成後，人為插入一個額外 prompt，要求其對照任務需求驗證任務確已成功完成；此簡單的「self-review」有效消除遺漏步驟，且無須另設獨立 reviewer agent 的成本（§3.2.5, p.5）。\n- **Memory Bank（資訊共享）**：為在不需 agent 對 agent 直接交接的情況下達成溝通與狀態持久化，實作了基於檔案的 memory bank，作為系統的「結締組織」（connective tissue），讓 agent 各自獨立存取共享上下文，防止漂移與重複工作；儲存遷移狀態、除錯產物（debugging artifacts）、各步驟所用 playbook 的版本化快照（§3.2.2, p.3）。Coder 在每一步執行後建立並儲存變更摘要（Listing 4 的 Markdown 摘要，含「Changes Made」與「Key Fixes & Learnings」段落），作為 orchestrator 理解變更狀態的「短期記憶」；叫用 Coder 時總會把所有已建立摘要的完整歷史隨初始 prompt 傳遞，使 Coder 取得遷移的全域視角、知道新 JAX 元件位置、避免無意間撤銷先前工作或重複實作既有邏輯（§3.2.5, p.5–6；Listing 4, p.6）。\n- **評估設定（兩個評估集）**：\n  - *開源模型集*：32 個開源模型，用於精修系統並排除早期工具與模型定義問題；但隨 Gemini 3 Pro 引入，此資料集上的表現飽和，其角色轉為主要做回歸測試（§4.1, p.6）。\n  - *Google 內部 YouTube 模型*：包含 *playbook-generation set*（2 個真實 YouTube Google 模型，皆有仍在使用的 legacy TF 版本與人類遷移的 JAX 版本，用於測試系統在須嚴守內部風格指南與重用內部元件的真實模型上的表現；其中一個為中等複雜度、另一個極複雜含數千行 JAX 程式碼與數十項內部度量，後者促成詳細 planner 與半靜態計畫建構的實作）與 *test set*（6 個中至高複雜度的真實 YouTube 模型，見 Table 2，且排除前述用於 prompt engineering 的 2 個模型）（§4.2.1, §4.2.2, p.6）。\n- **品質度量：Checklist-based LLM Judge**：標準程式碼度量（edit distance、AST 比較）無法捕捉複雜 ML 邏輯（如 gradient scaling、loss masking）的功能正確性。系統主要度量為一個細粒度、框架無關（framework-agnostic）的 checklist：對評估集每個模型，人工策劃一份「Golden Checklist」，捕捉遷移後模型須具備的關鍵元素，刻意以通用層名稱或描述性需求表述（如「每個預測 head 各一個 tower」「user embeddings 須 L2 normalized」，見 Listing 5），使 checklist 對底層實作變更保持穩定，但仍為使用案例特定（framework-agnostic but not use-case-agnostic）（§4.3, §4.3.1, p.6）。評審由專屬的「Judge」LLM-based agent（同樣由 Gemini 3 Pro 驅動）執行，採盲審（blind audit）模式：(1) Input：提供 checklist 與遷移後 JAX 模型檔案位置；(2) Inspection：允許從主模型檔案向外探索程式碼庫以驗證實作；(3) Scoring：Judge 不取得原始 TF 源碼，僅依提供的 JAX 程式碼驗證 checklist 項目，避免其單純做語法比對而改為驗證 checklist 描述的功能邏輯；(4) Results：每項個別評分，最終品質分數為已滿足項目佔總項目數的百分比（§4.3.1, p.6）。此度量嚴格僅用於遷移後評分、不回饋給 agent 做自動修復，以維持評估完整性、保持其作為跨架構與模型版本比較工具的效力（§4.3.1, p.7）。\n- **被考慮但放棄的替代度量：數值等價測試（Numerical Equivalence Tests）**：對 OSS 評估集曾以相同權重在相同輸入上跑兩模型取得高保真遷移成功分數，但對真實世界模型不適合作為主要度量，原因有三：*Interface Discrepancies*（預生成測試高度依賴遷移模型的公開介面，完整指定該介面困難且耗時，OSS 模型實際上並未完成此程序）、*Engineering Complexity*（設定這些測試須在框架間管理權重轉移與複雜狀態初始化，常與遷移本身一樣困難）、*Expected Divergence*（JAX 與 TF 處理運算的細微差異，如 XLA kernel fusion 或 sigmoid 等特定 activation，會造成輕微數值偏移，未必代表遷移失敗）（§4.3.2, p.7）。因此將等價測試降為「編碼任務的一個元素」，指示 coder agents 自行生成並執行等價測試作為遷移步驟的一部分，即使因上述原因未完全通過，也常有助於修復其他問題（如型別或形狀不符）（§4.3.2, p.7）。\n- **實驗配置（消融研究，Table 3）**：比較四種配置：*single_agent_baseline*（單一自主 ReAct coding agent，無 TF→JAX 特定調整、無 planner、無 orchestrator）；*single_agent_yt_specific*（同上，但含所有 TF→JAX playbook：style、task-specific、client-specific；無 planner、無 orchestrator，是最精緻的單智能體）；*multi_agent*（具規劃與協調的多智能體系統，含 task-specific playbook 但不含 client-specific playbook）；*multi_agent_yt_specific*（同 multi_agent 但含 client-specific playbook，為功能最完整配置）。所有 agent 皆獲 General Instructions Playbook，皆使用 Gemini 3 Pro，溫度設為 0.2 以引入輕微變異（§5.1, p.7；Table 3, p.7）。每個配置在全部 6 個 YouTube 測試模型上多次執行（每個 N>10），各產出一個遷移後 JAX 模型，再以 Gemini judge 依對應 checklist 評分；每模型每配置取平均 checklist 分數，總分為六模型平均分（§5.2, p.8）。\n\n\n\n**核心發現**：\n- **整體加速（6.4–8×）**：相較人工遷移，論文估計時間節省為 6.4–8×（見 Table 5），代表規模化時的劇烈改進（§5.4, p.8）。Table 5 列出兩個內部生產模型的人在迴路（human-in-the-loop）數據：model_1（行數 0.6k/3k、15 層、50 項度量）純人工遷移約 16 小時、AI 加審查修復約 2 小時，加速 8×；model_2（行數 4k/20k、250 層、300 項度量）純人工約 32 小時、AI 加審查修復約 5 小時，加速 6.4×（Table 5, p.9）。論文特別指出：Table 5 的模型人類專家並未撰寫單元測試，而其多智能體系統有寫；此外審查與修復遷移模型所需的專業度，論文認為比從頭遷移模型所需的專業度為低（§5.4, p.8）。\n- **遷移品質（Table 4，checklist 分數，越高越好）**：六個模型在四種配置下的 checklist 完成比（粗體為各列最佳）：large_1 — multi_agent 0.31、**multi_agent_yt_specific 0.65**、single_agent_baseline 0.09、single_agent_yt_specific 0.14；large_2 — 0.42 / **0.59** / 0.22 / 0.33；medium_1 — 0.73 / **0.90** / 0.43 / 0.43；medium_2 — 0.53 / **0.75** / 0.38 / 0.44；small_1 — 0.70 / **0.95** / 0.66 / 0.48；small_2 — **0.87** / 0.82 / 0.59 / 0.36（Table 4, p.9）。可見除 small_2 外，multi_agent_yt_specific 在所有模型上均為最佳配置。\n- **配置間統計顯著性**：總分顯示 multi_agent_yt_specific 是最強配置（顯著，配對 t 檢定 p<0.02），其次為另一多智能體配置 multi_agent；再來與單智能體 single_agent_yt_specific 及 single_agent_baseline 之間存在顯著差距（p<0.02），而此二單智能體之間無統計顯著差異（p=0.62）（§5.2, p.8）。\n- **單智能體的失敗模式**：比較 single_agent_baseline 與 multi_agent_yt_specific 的 checklist 後發現，single_agent_baseline agent 通常能正確取得模型架構，但常遺漏 loss functions、評估度量、以及如 label weighting 等關鍵邏輯（§5.2, p.8）。\n- **計算成本**：多智能體配置的執行時間約為單智能體配置的 3–5 倍（§5.2, p.8）。\n- **對模型複雜度的相依性**：在兩個最簡單模型 small_1、small_2 上，single_agent_baseline 與 multi_agent_yt_specific 之間的顯著差異消失（配對 t 檢定 p=0.07）；一般而言 TF 模型越複雜，baseline 與主智能體的差距越大（§5.3, p.8）。此與較早發現一致：四種配置（皆用 Gemini 3 Pro）在主要由小型 TF 模型構成的開源評估集上表現大致相當（§5.3, p.8）。論文據此強調多智能體協調對「中到大型生產模型、規模化 TF→JAX 遷移」的價值，當總模型複雜度達到某一程度後遷移品質才會因多智能體系統而提升，且即使無法建立 client-specific playbook（因缺乏人工遷移範例）此結論仍成立（§5.3, §6, p.8）。\n- **小型開源模型的時間節省較有限（1.7×）**：對小型開源模型，人類專家估計手動與用 AI 的遷移時間後，遷移速度提升因子為 1.7×，主要受限於相對少量的人工工作與「閱讀 AI 生成程式碼」的固定成本；但隨模型複雜度與行數增長，加速顯著增加（§5.4, p.8）。\n- **Client-Specific Playbook 提供關鍵增益**：multi_agent 與 multi_agent_yt_specific 的對比顯示，client-specific playbook 即使僅從兩個人工完成的範例衍生，仍提供關鍵的提升（crucial lift），對大規模遷移有顯著實務價值——一小組「黃金範例」即可 bootstrap 品質（§6, p.8）。\n- **領域知識增益僅在多智能體下顯現**：上述領域知識增益僅在與 planner 及 orchestrator 結合時（即 multi_agent_yt_specific）才產生改善；對單智能體而言，額外的上下文（約 3k 行）反而常「壓垮」agent，導致遷移不完整——agent 雖宣告成功卻只實作了所需邏輯的骨架（§6, p.8）。\n- **中型模型加速最大**：遷移速度提升在中型模型最大，因人類專家在此複雜度下遷移困難，而 agent 輸出品質仍高；隨模型更複雜，agent 輸出仍須更多人類專家工作才能達到人類專家遷移水準（§5.4, p.8）。\n- **作者自陳的限制（Threats to Validity）**：評估雖基於一組具代表性的 YouTube 模型，但只是所有須遷移模型的一小部分；專家手動檢查過遷移後模型並認定度量是可靠的，但因多數模型尚未部署，未能涵蓋系統在遷移模型中引入的潛在細微錯誤；對影響與時間節省更精確的衡量須待大量遷移模型部署到生產後;研究只聚焦於 YouTube 模型，其結論假設可推廣到其他模型族但尚未在 Google Search 少數模型之外驗證；論文指出將把方法延伸到遷移中「僅編碼」部分以外的步驟（§7, p.8）。\n- **「debugging tax」與 infra-overfitting**：論文於結論指出遷移流程延伸超出程式碼轉換本身——轉向無狀態範式對開發者課以一種「除錯稅」（debugging tax），常源自模型依賴 legacy 框架特性的「基礎設施過擬合」（infra-overfitting）；未來工作將聚焦於「閉合迴路」，開發能自主辨識並修復訓練不穩定或推論延遲回歸的專門除錯 agent（§9, p.9–10）。\n- **與相關工作的定位差異**：論文將自身置於三種模式的交集——透過協調與專業化的任務拆解、領域知識蒸餾、以及朝向專案規模評估的轉變（§8, p.8–9）。在協調與專業化上，相較 RefAgent 等為測試與編譯設專屬 agent，本系統把建構與測試「整合進 coder 內部的 ReAct 工作流程」，利用 Gemini 的大上下文窗在 test-and-fix 迴圈中維持完整實作上下文（§8.1, p.9）。在狀態管理上，相較 ChatDev 的去幻覺技術、AgentAsk 的強化學習法、DynamicCheatSheet 在連續生成間策劃上下文，本系統令 agent 產出足夠詳細的工作摘要再以決定性方式傳遞給未來叫用，論文認為這對其使用案例是可靠取徑（§8.1, p.9）。在知識蒸餾上，其 client-specific playbook 生成策略是 ACE 的 Generator-Reflector-Curator 模式與先前 Google AI 程式碼遷移經驗報告（playbook 中手動規則）的混合，但聚焦於半自動、人類監督的「黃金範例」策劃（§8.2, p.9）。在專案規模評估上，論文認為單元測試在遷移中維持完整性時「脆弱、不足且成本過高」（fragile, insufficient, and prohibitively expensive），故改用 checklist-based LLM judge 這種啟發式取徑來捕捉標準單元測試評估無法擴展處的架構保真度與完整性（§8.3, p.9）。\n- **適用範圍與一般化主張**：論文主張其技術與取徑可一般化到其他框架遷移與一般程式碼轉換任務，並期望「AI 支援自身開發」的良性循環會在程式碼遷移領域及業界其他地方持續存在，進一步加速 AI 的進展與採用（Abstract, p.1；§1, p.1–2；§9, p.10）。\n\n---\n\n### 2. LegacyTranslate — 以多代理 LLM 框架翻譯企業遺留代碼並對齊內部 API\n\n*Moti et al. 2026, arXiv:2603.14054（Radboud University 與 ING，荷蘭）*\n\n![a2-scope](images/a2-scope.jpg)\n\n\n**定位**：本文針對企業界遺留系統現代化的真實痛點：將大型遺留代碼庫遷移到現代平台時，必須在保留領域特定業務邏輯的同時，符合企業內部的架構框架與共享 API（Abstract, p.1）。作者指出，直接套用 LLM 進行代碼翻譯雖能產生語法上有效的輸出，卻常常無法在既有生產框架中編譯或整合，限制了實務採用（Abstract, p.1）。研究脈絡是一家歐洲金融機構正在進行的現代化專案，將約 250 萬行 PL/SQL 遷移到以 Java 為基礎、依賴共享函式庫與內部 API 的新架構（§1, p.1；§3, p.2）。相對既有工作，本文自我定位為少數針對「函式級以上、需對齊內部 API 與共享函式庫的企業級框架感知翻譯」設計的多代理方法；既有評估多聚焦於 Python、C++ 等資料豐富的熱門語言對，且通常只在函式層級評估，無法涵蓋與內部函式庫互動的模組遷移（§1, p.1；§2, p.2）。本文延伸自 Solovyeva et al. 2025 的可行性研究，後者僅限 10 個代碼對、未考慮 API 與框架層級約束、且驗證用單元測試受限（§1, p.1–2；§2 末段, p.2）。\n\n\n![a2-method](images/a2-method.jpg)\n\n**做法**：\n- **整體框架**：LegacyTranslate 是一個 LLM 多代理框架，將翻譯任務拆解為三個協調的階段，每個代理處理翻譯挑戰的不同面向，並建立在前一代理的輸出與回饋之上、漸進式改善翻譯品質與合規性（Abstract, p.1；§3, p.2；Figure 1, p.1）。雖然本文聚焦 PL/SQL→Java，作者宣稱方法可推廣到其他語言遷移情境（§2 末段, p.2）。\n- **代理一：Initial Translation Agent（初始翻譯代理）**：負責從遺留語言到目標語言的第一階段翻譯，產生可能仍需精煉與 API 感知處理的草稿版本（§2 末段, p.2；§3.1, p.3）。其以「in-context examples retrieval」（檢索式增強提示）實作：利用一組對齊的 PL/SQL↔Java 配對作為範例集 D = {(sₙ, jₙ)}，給定測試 PL/SQL 查詢 sₜ，以檢索模型 R 取得 top-k 語義相似的翻譯配對 Dₖ = R(D, sₜ)，再由 LLM π_θ 依 Dₖ 與 sₜ 產生 Java 翻譯 jₜ = π_θ(Dₖ, sₜ)（§3.1, p.3）。提示包含三個關鍵元件：目標 Java 架構（含共享介面）的描述、檢索到的 PL/SQL→Java 翻譯範例配對、以及待翻譯的 PL/SQL 代碼片段；提示設計沿用 Solovyeva et al. 2025（§4 Prompts, p.4；§3 末段, p.2）。\n- **代理二：API Grounding Agent（API 接地代理）**：處理初始翻譯無法編譯的情況，藉由提供相關 API 來改善代碼（§3.2, p.3）。其建構一個「API knowledge base（API 知識庫）」：對專案的架構化 Java 函式庫——特別是定義新元件應如何在現代化框架中實作的共享 API 與介面——進行靜態分析，遍歷 Java 原始檔並抽取每個 API 的關鍵屬性（所屬類別、簽章（名稱、參數、回傳型別）、主體、檔案位置），再用 LLM 為這些條目生成簡短描述（§3.2, p.3）。給定 API 知識庫 A、Java 翻譯 jₜ 與編譯錯誤訊息 Eₜ，LLM 被提示產生相關 API 的候選清單 Aₜ ← π_θ(A, Eₜ, jₜ)，清單長度由 LLM 依 jₜ 內容自行決定（§3.2, p.3）。\n- **代理三：Refinement Agent（精煉代理）**：基於「編譯器錯誤是改善代碼翻譯的有效訊號」此一前提，執行迭代式代碼精煉（§3.3, p.3，引用 [1]）。每次迭代編譯當前生成代碼 jₜᵐ、收集錯誤訊息 Eₜᵐ，再以 jₜᵐ、候選 API Aₜ 與錯誤回饋 Eₜᵐ 提示 LLM 產生改善的翻譯 jₜᵐ⁺¹ ← π_θ(Aₜ, Eₜᵐ, jₜᵐ)，m = 0,…,Mₜ；其中 jₜ⁰ 為 Initial Translation Agent 的輸出、Eₜ⁰ 為其錯誤（§3.3, p.3）。精煉迴圈持續到代碼成功編譯、通過所有相關測試案例、或精煉一步後無新增測試通過為止；因此迭代次數 Mₜ 並非預先設定，而是隨每個測試樣本變動（§3.3, p.3）。\n- **流程控制邏輯**：依 Figure 1，初始翻譯後先以單元測試評估；若失敗才進入 API Grounding 與 Refinement（圖說明：實線=標準流程，虛線=僅在失敗時執行）（Figure 1, p.1；§3 末段, p.2–3）。\n- **受測 LLM 與檢索模型設定**：骨幹 LLM 為 Qwen2.5-Coder-14B（針對代碼任務優化的指令微調模型）；檢索使用 SFR-Mistral 稠密檢索器，嵌入向量維度 4096；檢索範例數設為 k = 3（在相關性與提示長度間取最佳折衷）；API Grounding Agent 為 API 知識庫條目生成描述時使用 Claude 3.7 Sonnet（§4 Models, p.3）。\n- **運算環境**：全部實驗在單顆 NVIDIA A100（40 GB 記憶體）上進行，總計約 5 GPU 小時（§4 Models, p.3）。\n- **資料集建構**：在一個內部策劃的資料集上評估，含 68 個對齊的 PL/SQL↔Java 配對，代表遺留代碼庫中各類模組型態；每段 PL/SQL 由工程師手動遷移、提供 ground-truth Java 參考（§4 Dataset, p.4）。PL/SQL 片段長度介於 65 至 292 行（平均 101.7 行）（§4 Dataset, p.4）。每個樣本含工程師撰寫、於實際生產框架中執行的多個單元測試，可在多層次驗證生成代碼：結構有效性、框架內成功編譯、API 合規性、功能正確性（§4 Dataset, p.4）。另維護一組獨立的 68 個對齊配對供範例檢索器使用，以及一個含 80 條目、由目標架構共享 Java 函式庫抽取而成的 API 知識庫（§4 Dataset, p.4）。作者明言目前無公開基準支援真實的 PL/SQL→Java、API 相依的遷移評估，故評估全依賴真實生產代碼（§4 Dataset, p.4）。\n- **評估指標**：以三個標準指標評估生成的 Java 代碼——Structural Validity（SV，輸出是否形成有效抽象語法樹）、Compilation Rate（CR，於單元測試環境執行時是否編譯）、Test Pass Rate（TPR，功能正確性，以每個可編譯輸出通過測試的比例衡量）（§4 Evaluation Metrics, p.4）。範例檢索品質以 NDCG@3、MRR@3、Recall@3 三項評估（分別衡量整體排序品質、第一個相關範例出現的早晚、top-3 內是否檢索到相關範例）（§4 Evaluation Metrics, p.4）。\n- **基線設定**：與兩個基線比較——LLM-only（直接翻譯測試樣本，不含範例配對或 API 資訊）；LLM+Random Examples（隨機選取三個 PL/SQL↔Java 配對加入提示，配對數與 LegacyTranslate 一致）（§4 Baselines, p.4）。作者未將 Solovyeva et al. 2025 的提示策略列為基線，因其提示未公開（§4 Baselines, p.4）。\n\n\n![a2-findings](images/a2-findings.jpg)\n\n\n**核心發現**：\n- **RQ1 整體效能（API 感知 PL/SQL→Java 翻譯）**：完整 LegacyTranslate 管線達成 52.9% 編譯率與 33.8% 測試通過率（Abstract, p.1；§5 RQ1, p.4；Table 1, p.3）。\n- **LLM-only 基線完全失敗於框架整合**：直接提示 LLM 翻譯，結構有效性僅 42.6%，編譯率與測試通過率皆為 0.0%——沒有任何樣本能編譯或通過測試（Table 1, p.3；§5 RQ1, p.4）。原因是目標框架要求代碼擴充特定基礎類別並使用內部 API；缺乏範例或架構指引，LLM 只能生成語法上有效但無法在生產框架中編譯的通用 Java（§5 RQ1, p.4）。\n- **隨機範例只改善結構、無助於編譯**：LLM+Random Examples 將 SV 由 42.6% 大幅提升到 98.5%，顯示即使是不相關的範例也能幫助 LLM 產生結構更一致的輸出；但 CR 僅微幅由 0.0% 升到 1.5%、TPR 仍為 0.0%，說明隨機範例無法讓模型學到框架模式（Table 1, p.3；§5 RQ1, p.4）。\n- **多代理框架的整體增益**：相對基線，LegacyTranslate 將 SV 推到 100%，更重要的是 CR 與 TPR 分別躍升至 52.9% 與 33.8%，顯著超越基線並印證多代理系統的有效性（Table 1, p.3；§5 RQ1, p.4）。\n- **各代理的逐項貢獻（消融）**：「w/o API & Refine」列（僅用 Initial Translation Agent）達 SV 98.5%、CR 45.6%、TPR 30.9%；加入 API Grounding Agent 與 Refinement Agent 後，CR 額外提升約 8%（45.6%→52.9%）、TPR 提升約 3%（30.9%→33.8%）（Abstract, p.1；Table 1, p.3；§5 RQ1, p.4）。作者據此論證每個代理都對翻譯品質有一致的貢獻（§1 contributions, p.2；§5 RQ1, p.4）。\n- **第二輪精煉的邊際效益**：第二輪精煉再帶來額外 3% 改善，暗示更進一步的增益可能需要更強的模型或更深的架構知識（§5 RQ1, p.4）。\n- **核心觀察——無 API 接地幾乎無法編譯**：論文的中心發現是，若無明確的 API 接地，幾乎沒有任何生成代碼能在目標框架內編譯——凸顯了語法上有效的 LLM 輸出與「可投入生產」代碼之間的落差（Abstract, p.1；§2 末段, p.2）。\n- **檢索品質直接影響功能正確性、模型容量決定框架約束處理**：作者強調檢索品質直接影響功能正確性，而模型容量在處理框架層級約束上扮演決定性角色（Abstract, p.1）。\n- **RQ2 檢索器選擇的影響**：Figure 2 比較不同檢索器的範例檢索效能（GIST-large 1024、BGE-large 1024、Codesage-small 768、SFR-Mistral 4096）；其中 SFR-Mistral 嵌入維度最大（4096），在 NDCG@3、MRR@3、Recall@3 三項皆達最高檢索效能，明顯優於其他候選（Figure 2, p.4；§5 RQ2, p.4）。此結果與既有研究一致：高維稠密檢索器能為代碼相關任務提供語義上更對齊的範例（§5 RQ2, p.4，引用 [12]）。\n- **RQ2 LLM 選擇的影響（Table 2）**：固定 SFR-Mistral 為檢索器後評估多個 LLM 於 Initial Translation Agent 的表現——Qwen2.5-14B：SV 98.6%、CR 45.58%、TPR 30.88%、生成時間 32.26 秒/樣本；CodeLlama-13B：SV 8.83%、CR/TPR 皆 0.0%、40.26 秒；Qwen2.5-7B：SV 7.36%、CR/TPR 皆 0.0%、19.27 秒；CodeGemma-7B：SV/CR/TPR 皆 0.0%、生成時間最短 6.50 秒（Table 2, p.4；§5 RQ2, p.4）。\n- **模型容量是關鍵瓶頸**：Qwen2.5-14B 提供最佳表現，能持續產生可編譯、可通過測試的代碼，延遲適中（每樣本約 32 秒）；較小模型（Qwen2.5-7B、CodeLlama-13B、CodeGemma-7B）則常無法生成有效或可編譯輸出，因其缺乏處理此任務所需的長且脈絡密集提示的能力（§5 RQ2, p.4）。\n- **品質與模型容量正相關、但有代價**：翻譯品質隨模型容量明顯提升——更大、代碼專精的 LLM 帶來更高正確性與更好的框架對齊，但代價是更長的生成時間（§5 RQ2, p.4；Table 2, p.4）。\n- **翻譯品質對 LLM 與檢索器容量皆高度敏感**：作者觀察到翻譯品質會隨 LLM 與檢索器容量大幅變動，因此模型選擇對達成高翻譯效能至關重要（§1 contributions 第 3 點, p.2；Abstract, p.1）。\n- **作者自陳的限制與未來工作**：API 感知遺留翻譯仍受限於缺乏公開資料集與微調模型，作者鼓勵未來工作處理此問題；多代理框架可擴展到其他語言並加入更多代理（§6 Conclusions, p.4；§2 末段, p.2）。\n- **效度威脅（資料規模與真實性）**：評估僅基於 68 個樣本的內部資料集、單一機構的 PL/SQL→Java 情境，且無公開基準可供比較，外部效度有限；不過資料皆來自真實現代化專案的生產代碼，提供了實務可行性的證據（§4 Dataset, p.4；§5 RQ1, p.4）。\n\n---\n\n### 3. 從翻譯到超集 — 以公開 agent 基準作為目標函數，把生產級 AI agent 從 Rust 持續翻譯演進為 Python 超集\n*Wang et al. 2026, arXiv:2604.11518（摩根大通 JP Morgan Chase「LLM Suite Team」）*\n\n![a3-scope](images/a3-scope.jpg)\n\n\n**定位**：本文針對大型軟體系統「跨語言遷移」這一長期工程難題，提出一套 **LLM 輔助持續程式碼翻譯（LLM-assisted continuous code translation）** 方法論，並以摩根大通內部生產級 AI coding agent「Codex CLI」為實證對象——將其原始的 Rust 程式庫（648K LOC、65 個 crate）翻譯成 Python（41K LOC、28 個模組）(Abstract, p.1；§I, p.1)。相對於既有「一次性遷移」與「函式層級轉譯」工作，本文兩項自我定位的新意為：(1) 主張**公開 agent 基準（Terminal-Bench、SWE-bench Verified）可作為翻譯品質的「目標函數／損失函數」**，由基準分數驅動迭代式除錯，而非只把基準當成下游驗證；(2) 提出「持續上游同步」架構，使遷移成為一座連接源碼庫與目標碼庫的「活橋（living bridge）」，能持續吸收上游 Rust 更新，而非翻譯完即兩邊永久分岔(§I, p.1–2；§VII, p.13)。論文進一步主張，遷移不必止於功能對等——Python port 已演化為原版的「能力超集（capability superset）」(§I, p.2)。\n\n\n![a3-method](images/a3-method.jpg)\n\n**做法**：\n- **研究對象與遷移情境**：受測系統 Codex CLI 是一個跑在終端機的生產級 AI coding agent，連接 OpenAI Responses API，支援多種 LLM 後端（GPT-4、o3、o4-mini、以及經 Ollama/LM Studio 的本地模型），提供互動式 chat 與非互動式 batch 兩種執行模式，並透過 MCP 強制執行可設定的安全策略(§II-A, p.2)。原始 Rust 版以 Tokio async runtime 實作、65 個 crate、約 648K LOC；遷移到 Python 的三大動機為：迭代速度（快速原型與部署 agent 能力）、生態整合（Python 在 ML/AI 生態的主導地位）、貢獻者可及性（降低外部貢獻者與外掛開發者門檻）(§II-C、§II-D, p.2)。\n- **三層架構對應關係**：論文以三欄架構圖呈現遷移成果——左為 Rust 原版 6 個 crate（core / exec / tui / cli / mcp / login）；中為 Python port（`codex.*`），採「一個 Rust crate 對應一個 Python 模組」並宣稱與 Rust 達成「1:1 wire-level parity」；右為 Python 獨有的 `codex.enhancements` 超集（35 個 flag-gated 能力，圖中標示 30 個為主要 flag）(Fig.1, p.3)。Python 系統依六大架構層組織：Agent 層、Security 層、Protocol 層、Integration 層、Presentation 層、Infrastructure 層(§II-B, p.2)。\n- **單體 runner 的模組化拆解**：原本 Rust 的單體 runner 在 Python port 中被拆解為單一職責模組——具狀態的 `QueryEngine`（持有 agent loop 生命週期）、`auth` 引擎（憑證解析與 JWT 刷新）、`config_loader`（分層 TOML 設定）、`sandbox` 模組（平台專屬命令隔離）、`permissions` 模組（統一三層審批管線）、`StreamingToolExecutor`（以 semaphore 控制併發工具派發）、`tool_result_budget`（超大輸出管理）；另有一個輕薄的 `runner.py` orchestrator 委派給這些模組並維持向後相容的 re-export(§III-A, p.3)。\n- **agent runner 核心執行迴圈**：執行迴圈為 (1) 送出當前對話上下文給 LLM API、(2) 接收可能含工具呼叫的回應、(3) 經 orchestrator 執行每個工具呼叫、(4) 把結果追加回對話、(5) 重複直到模型產出最終回應或達上限轉數（預設 50 turns）(§III-A, p.2–3)。\n- **agent runner 關鍵設計決策**：採事件驅動架構，runner 發出具型別的事件（`TurnStarted`/`ToolCall`/`ToolResult`/`TurnCompleted`）供 presentation 層消費，達成 agent 邏輯與 UI 渲染的鬆耦合；採「轉內審批快取（turn-scoped approval caching）」——使用者批准某工具呼叫後在當前轉內快取，避免同一邏輯步驟內對等價操作重複提示；多階段上下文管理分三相——microcompaction（就地剝除過時工具輸出）、snip compaction（移除低價值訊息）、full compaction（LLM 摘要並在壓縮後還原最多 5 個檔案、token 預算 50K，並保留 ghost snapshot）；工具結果預算化——超過 100K 字元的輸出存到磁碟並換成含 head/tail 預覽的指標訊息以防上下文耗盡；分層權限中介層——單一 `can_use_tool()` 進入點依序評估 config 樣式比對、guardian LLM 風險評估、互動使用者提示三層，結果按轉快取(§III-A, p.3)。\n- **工具編排（Tool Orchestration）**：orchestrator 維護一個 `ToolHandler` registry，包含 `shell`（在安全 sandbox 內執行 shell 命令）、`apply_patch`（套用 unified diff 並偵測衝突）、`list_dir`（可設深度的目錄列舉）、`mcp_handler`（委派給 MCP server 工具）、`request_permissions`（處理執行期權限提升）；每次工具呼叫都經三階段管線——policy check（執行策略引擎）、approval check（guardian 或使用者提示）、sandboxed execution（含結果擷取）(§III-B, p.3–4)。\n- **安全 sandbox 與執行策略引擎**：sandbox 對工具執行強制檔案系統與網路隔離，三套平台實作——macOS（Seatbelt 動態 profile）、Linux（Bubblewrap 掛載命名空間 + Landlock 檔案存取控制 + seccomp syscall 過濾）、Windows（受限 process token + job object）；策略以三種遞增寬鬆模式組織——`read-only`（預設）、`workspace-write`、`full-access`（需明確 opt-in）。執行策略引擎在 sandbox 強制前先以宣告式規則集（Python DSL，支援命令字串前綴比對、依 host/port 的網路存取控制、host 可執行檔白名單）評估工具呼叫；策略與機制分離使 user/org 可在執行期合併各自的策略層(§III-C、§III-D, p.4)。\n- **多 agent 編排、MCP 與狀態管理**：多 agent 子系統支援階層式任務委派——父 agent 可生成子 agent，繼承對話上下文（經 history forking）、指派子任務；安全界限為遞迴最大深度 5、每父最多 10 個子 agent、每 session 最多 100 個 agent，每個子 agent 在自己的 sandbox 範圍與審批上下文運作。MCP 整合提供雙向協定支援（作為 client 連外部 MCP server，作為 server 對外曝露自身能力），client 支援 stdio 與 Streamable HTTP（含 SSE）兩種傳輸並具 OAuth 認證與自動 token 刷新。Session 狀態持久化到 SQLite（WAL 模式），schema 版本化（state 用 v5、logs 用 v1）以支援前向相容遷移(§III-E、§III-F、§III-G, p.4)。\n- **Python 獨有超集 `codex.enhancements`**：在 wire-level parity 之上，Python port 演化出含 30 個 feature-flag 能力的擴充模組，全屬「加性（additive）」——延遲載入、絕不修改核心資料結構、排除於 parity 測試之外；採四層 flag 解析系統（build-time compiled flags → 環境變數 → runtime `--enable`/`--disable` override → defaults），讓營運者可跑「strict parity mode」（全部 enhancement flag 關閉，供蘋果對蘋果基準比較）或「extended mode」(§III-H, p.4–5)。enhancement 子套件按類別實作：`agents/`（階層多 agent）、`memory/`（型別與語意記憶提取）、`compaction/`（multi-strategy 與 forked 壓縮）、`resilience/`（source-aware retry 邏輯）、`startup/`（prefetch 最佳化）、`state/`（app 層狀態與 runner 橋接）、`tools/`（工具註冊與命令 registry 擴充），另含 intent-preservation 增強（`PERSISTENT_PLANS`/`SYSTEM_REMINDERS`/`DENIAL_REPLAY`）此一 Rust 無對應的功能類別(§III-H, p.4–5)。完整 30 個 flag 與預設值列於附錄 Table XIII，例如 `MULTI_AGENT`(預設 On)、`GUARDIAN`(On)、`SEMANTIC_MEMORY`(Off)、`IDE_BRIDGE`(Off)、`NOTEBOOK_EDIT`(Off)、`WORKTREE_TOOLS`(Off)、`COST_TRACKING`(On) 等；全部設為 off 即得到行為與 Rust 原版相同的 strict-parity build(Table XIII, p.15)。\n- **LLM 輔助翻譯流程**：不同於語法層的轉譯工具，本方法以 LLM 為翻譯引擎，在「模組層」運作——對每個 Rust crate，提供 LLM 原始碼、其測試套件、以及目標 Python 模組的既有上下文（imports、相依模組），由 LLM 產出保留行為語意、符合 Python 慣例的「慣用（idiomatic）」Python（而非機械式 transliteration）；翻譯按相依順序進行——先 foundation 模組（protocol types、config、utils），再 infrastructure（state management、authentication），再 core logic（agent runner、tool handlers），最後 presentation（CLI、TUI），確保每個被翻譯模組可 import 已翻好的相依(§IV-A, p.5)。\n- **Rust→Python idiom 映射**：論文系統性整理翻譯樣式（Table III）——`Result<T,E>`→例外（raise/try）、`Option<T>`→`Optional[T]`、algebraic enum→`@dataclass`+`Union[...]`、simple enum→`enum.Enum`、`struct`→`@dataclass(frozen=True)`、`impl Trait`→Protocol/ABC、`async/await`(Tokio)→`async/await`(asyncio)、`Arc<Mutex<T>>`→純物件（GIL）、`serde`→Pydantic `BaseModel`、`reqwest`→`httpx`、`ratatui`→Textual、`clap`→Click、`sqlx`→`sqlite3`、Cargo workspace→單一 `pyproject.toml`(Table III, p.5)。關鍵設計決策：protocol 層（4,016 LOC 型別定義、審批工作流、設定 schema）用 Pydantic `BaseModel` 以早期捕捉協定違規，內部 hot-path 型別則用 `@dataclass` 避開 Pydantic 驗證開銷；TUI 用 Textual（取代 Rust 的 ratatui 自訂事件迴圈）；併發用 asyncio + anyio 抽象層（因工作負載壓倒性是 I/O-bound——LLM API 呼叫與檔案操作——故 GIL 取捨有利）(§IV-C, p.5–6)。\n- **持續上游同步架構（四階段管線）**：因上游 Rust 每日更新，Python port 須持續吸收。管線為——Track（上游 Rust repo 以 git submodule 追蹤，定期 `git pull`）、Diff（轉換腳本 `scripts/convert-diff.py` 抽取變更的 Rust 模組並以模組對應表映射到 Python 對應，例 `codex-rs/exec`→`codex.exec`）、Translate（LLM 只翻譯 diff 而非整個 crate，以既有 Python 模組為上下文）、Validate（三層測試：unit tests、`mypy --strict` 型別檢查、`tb run` 基準回歸）。此架構把基準分數當「loss function」——當翻譯造成回歸，LLM 以失敗的測試／基準為額外上下文重新檢視翻譯，直到 parity 恢復(§IV-D, p.6；Fig.2, p.6)。\n- **四層驗證策略**：(1) Unit tests（2,621 個測試函式，鏡射 Rust 測試套件）；(2) Integration tests（端到端驗證 28 模組正確互動）；(3) Parity tests（明確驗證渲染輸出與協定序列化與 Rust 一致）；(4) Benchmark regression（head-to-head Terminal-Bench 評估，確保 Python port 任務解決準確率在 Rust 基線 5% 以內）(§IV-E, p.6)。\n- **基準作為目標函數的四種作用**：論文指出 unit tests 雖必要但不足以驗證翻譯正確性，許多細微 bug（API 協定不符、工具註冊錯誤、輸出格式差異）只在完整 agent 管線對著真實任務跑時才浮現。公開 agent 基準的四項作用為——偵測整合失敗、暴露 API 協定 bug、揭露環境假設、量化 parity（每次基準跑產出一個直接量測功能對等的純量準確率，供迭代式細化）(§IV-A, p.5)。\n- **實驗設定**：所有實驗在 MacBook Pro（Apple M4 Pro Max、128GB RAM、macOS 15.4）以 Python 3.13 進行；head-to-head agent 評估（Terminal-Bench、SWE-bench Verified）用 GPT-5.4，經 OpenAI Responses API。評估橫跨四維度——code metrics、test parity、runtime performance、real task benchmarks(§V, p.6)。Terminal-Bench head-to-head 為 80 任務、GPT-5.4；兩 agent 都原生安裝於 Terminal-Bench Docker 容器內，以相同 flag（`--sandbox danger-full-access --model gpt-5.4`）跑 exec；原始 Rust CLI（v0.117.0）經 npm 安裝，Python port 從 pre-built wheel 裝入隔離 virtualenv，兩者用相同 OpenAI API key 與 GPT-5.4 模型(§V-I, p.11)。SWE-bench Verified 為 80 任務、GPT-5.4、4 workers、每任務 1800 秒 timeout，adapter 對每任務 clone repo、checkout base commit、以 issue 描述為 prompt 執行 `cdx exec`、以 `git diff` 擷取 patch，80 任務約 2 小時跑完(§V-J, p.12)。\n\n\n![a3-findings](images/a3-findings.jpg)\n\n\n**核心發現**：\n- **基準驅動除錯逐步收斂 parity gap（Terminal-Bench 五次迭代）**：v0 baseline（原始 Rust CLI）準確率 47.5%；v1（naive tmux adapter）暴跌至 0.0%；v2（完整 agent runner 配 Chat Completions）回到 31.3%；v3（Responses API function tool 修正）35.0%；v4（對話歷史修正）35.0%；v5（venv 隔離 + ripgrep 安裝）達 45.0%(Table II, p.5)。最終經 6 次迭代達 42.5%（含 API 400 修正後完整 rerun），對比 Rust 原版 47.5%(§I, p.1；§V-I, p.11)。\n- **Terminal-Bench head-to-head 結果**：Python port（codex-python）解 34/80 任務（42.5%），Rust 原版解 38/80（47.5%）；80 任務中 25 個兩者皆解、9 個僅 Python 解、13 個僅 Rust 解；Python unique passes 9、Rust unique passes 11(Table XI, p.11)。3.8 個百分點的差距，作者歸因於 LLM 的非決定性與細微環境因素，而非任一實作的架構限制(§V-I-c, p.11–12)。\n- **Terminal-Bench unique passes 的型態分析**：僅 Python 解出的 9 個任務含 `fibonacci-server`、`jupyter-notebook-server`、`pytorch-model-cli`（2 變體）——皆涉及 Python 生態工具，Python port 對其環境的熟悉度提供優勢；僅 Rust 解出的 13 個任務含 `chess-best-move`（需延伸多轉推理）、`path-tracing`、`sqlite-db-truncate`(§V-I-c, p.11–12)。\n- **SWE-bench Verified head-to-head 結果（Python 領先）**：Python port 解 59/80 任務（73.8%），其中 astropy 子集 22 任務 patch 22 解 12（54.5%）、django 子集 58 任務 patch 58 解 47（81.0%）；原始 Rust CLI 解 56/80（70.0%）(Table XII, p.12)。Python 在 django 表現特別強（81.0%）；3.8 個百分點的領先在 LLM 非決定性的誤差範圍內(§V-J, p.12)。\n- **程式碼行數縮減（12.3× 整體，最大模組 71×）**：Python 實作 52,685 LOC（328 檔），對比 Rust 648,789 LOC（1,555 檔），整體 12.3× 縮減（摘要中另稱 15.9× code reduction，對應 41K vs 648K 的計法）(§V-A, Table IV, p.6–7；Abstract, p.1)。按模組差異甚大：`core` 模組 71.0×（Py 2,561 vs Rs 181,903，註：agent 與 core 在 Table IV 中 Rs LOC 同列 181,903）、`tui` 17.1×（Py 5,532 vs Rs 94,675，因 Textual 高階抽象 vs ratatui 低階渲染）、`agent` 14.2×、`cloud` 11.0×、`telemetry` 10.0×；縮減比最小的是 `features` 1.4×、`plugin` 1.3×、`sdk` 1.3× 等基礎建設模組(Table IV, p.7)。Python 模組平均密度 145 LOC/檔，Rust 平均 417 LOC/檔(§V-A-c, p.6)。\n- **環圈複雜度（cyclomatic complexity）**：以 radon 量測全部 4,692 個 Python 函式，平均複雜度 2.70（rank A），89% 函式達最低複雜度 rank A；僅 23 個函式（0.5%）超過 rank C，集中於 agent runner（處理複雜狀態轉換）與 sandbox manager（平台專屬分支邏輯）；runner 模組近期的拆解改善了每函式複雜度(§V-A-b, p.6；Fig.4, p.8)。\n- **測試 parity**：Python 套件 2,902 個測試函式，對比 Rust 8,490 個（約 3× 差距）；作者把差距歸因於三因素——Python 高階抽象消除整類測試（記憶體安全、ownership、lifetime edge case）、Rust co-locate unit test 的慣例膨脹 source 檔含瑣碎 accessor/trait 測試、Python 套件寫的是行為契約（「agent 是否產生正確的工具呼叫」）而非內部不變量。Python 套件 62 tests/KLOC（正規化後的厚度指標）；e2e 模組 45 個測試在 Rust 完全沒有對應(§V-B, Table V, p.7)。Table V 顯示 Python 在 unit-test 數最高的模組仍遠少於 Rust，例 `core` Py 202 vs Rs 2519、`agent` Py 661 vs Rs 2519、`tui` Py 263 vs Rs 1401。\n- **執行期效能（啟動／記憶體／import）**：Python CLI 啟動平均 53.9ms（σ=2.1ms、n=20），約比編譯後 Rust binary 慢 3–5×，但相對於數分鐘至數小時的 agent session 可忽略（佔總 session 時間 <1%）；peak resident memory 30.3MB（σ=0.1MB、n=5），高於 Rust binary 典型的 10–15MB，但對跑在 8–64GB RAM 系統的桌面應用而言不大；import time 57.0µs；可 import 模組 328 個(§V-C, Table VI, p.7–8)。\n- **本地計算開銷可忽略（相對 LLM API latency）**：工具編排開銷約 30µs；shell 執行支配本地 latency——spawn subprocess 並擷取輸出耗 3–7ms（本地計算成本主來源），但仍比典型 LLM API 呼叫快 3 個數量級；patch parsing 與 policy matching 為 sub-microsecond；完整 pipeline（orchestrator→approval→shell→result capture）3.5ms。在每次 LLM round-trip 耗 1–10 秒的典型 agent session 中，本地 Python 計算佔總 latency <0.1%(§V-C, p.8；§V-D, p.8)。\n- **真實子系統與 LLM pipeline 微基準**：Table VII 顯示 orchestrator（skip approval）0.030ms、shell handler `ls | head` 6.672ms、token estimation（2K words）<0.001ms、`should_compact` decision 0.500ms、SQLite state（session+20 msgs）0.074ms；Guardian fast-path 對 10 個安全命令比對 0.035ms、對 5 個危險命令 0.005ms，使常見操作無須 LLM 即可 sub-millisecond 審批決策；完整 guardian review（含 mock LLM）0.36ms；解析 50 個 SSE event 0.030ms；30-turn 對話含工具呼叫序列化為 JSON 0.093ms(§V-D、§V-H, Table VII, p.8、10–11)。\n- **端到端 agent 評估（8 任務 100% 成功）**：8 個代表性任務（建立 Python 檔、shell echo、多步檔案建立、目錄列舉、git status、複雜 pipeline、檔案 patch 更新、token 估算準確性）每任務跑 5 次共 40/40 全成功（100%）；任務 latency 從 0.07ms（純 patch 操作）到 24.7ms（含 patch 套用與 shell 執行的複雜多工具 pipeline），支配成本為 shell 命令的 subprocess spawn（每命令約 3–7ms），多工具任務隨 shell 呼叫數線性 scale，確認編排層無系統性開銷(§V-G, Table X, p.10)。\n- **程式碼品質分析（API surface、型別、相依）**：Python 定義 1,385 個 class、2,363 個 function/method，Rust 曝露 2,675 個 struct/enum、20,525 個 function/method（Table VIII 另列 Classes/Structs+Enums Python 1,590 vs Rust 2,675、Methods 1,828 vs 11,202、Top-level functions 781 vs 9,323），Python 達成更高 API 密度——以更少定義服務等價功能；395 個 Python method 明確為 async，直接映射 Rust 的 async trait 實作。`mypy --strict` 在 282 檔中 69 檔出現 248 個 type error，strict type-clean rate 75.5%，多數錯誤來自第三方 library type stub（Textual、httpx）而非應用邏輯；程式庫中 0 個 TODO/FIXME/HACK comment（Rust 有 126 個），顯示乾淨的生產就緒狀態。相依結構呈清楚分層：foundation 模組（core/config/utils）被廣泛依賴，peripheral 模組（cli/tui）消費多相依但不被他者 import，`agent` 模組為主要整合點、高 fan-in 與 fan-out(§V-E, Table VIII, Fig.9, p.8–9)。\n- **遷移工作量量化（git history）**：repo 共 4,947 commits（Table IX 列 4957），密集遷移期（2026 年 3 月 25–27 日）有 116 commits（Table IX 列 146）；遷移期新增 109,427 行、刪除 906,656 行，淨減 797,229 行（Table IX 淨變動列 -775,179）；測試套件漸進演化，commit message 在 1,881、2,343、最終 2,621 passing tests 標記里程碑，顯示 test-driven 的逐模組增量驗證；遷移期 45 個 test-related commit（Table IX 列 55）凸顯對正確性驗證的重視；平均 commit 大小 1,314 行(§V-F, Table IX, p.9–10)。\n- **基準揭露的四個 bug（unit tests 看不見）**：(1) **WebSocket 傳輸穩健性問題**（`ws_transport.py`）——API quota 耗盡時 WebSocket 連線靜默回傳空回應，agent 誤判為成功的 no-op 並把任務標記完成卻沒做事；修正除了補靜默失敗，HTTP SSE fallback 路徑還加上 Rust transport 沒有的穩健性改進——逐請求 429 偵測配 `Retry-After` header 解析、指數退避、quota 耗盡時自動 fallback-API-key 輪替；此結構性弱點兩實作皆有，但只有 Python run 受影響（Rust 基線用了 fresh API key）。(2) **記憶體提取 model error**（`phase1.py`）——post-rollout 記憶體提取的 model identifier 未解析到有效 endpoint，造成每次完成 rollout 後 404 Not Found；修正為把 model name 改為 `gpt-5.4-nano`。(3) **`_cost_tracker` NameError**（`runner.py`）——成本追蹤變數在 Docker-run 程式路徑被引用卻未賦值，使部分任務 crash；修正為在外層 scope 頂部初始化。(4) **全面 API 400 error recovery**（`runner.py`）——某些 prompt 下模型產生含不支援 content-item type 的回應，Responses API 回 HTTP 400（`invalid_value` on `input[N]`），agent 無 recovery 路徑而在產出任何輸出前就死掉；修正實作系統性 400 recovery 層涵蓋四種錯誤情境（不支援的 `previous_response_id`→剝除重試、特定 input item 的 `invalid_value`→依 index 移除違規項重試、endpoint 不支援 `local_shell` 工具型別→優雅降級、context-window overflow→裁剪最舊 input item 重試），此 recovery 系統為 Python 獨有，Rust 無等價層(§V-J, p.12)。\n- **作者自陳的四個關鍵結論**：(1) Rust→Python 遷移在兩基準達近 parity——SWE-bench Verified Python 領先（73.8% vs 70.0%），Terminal-Bench 略落後（42.5% vs 47.5%），且 Terminal-Bench gap 部分歸因於現已修正的 API 400 crash、LLM 非決定性、與一個 Rust 基線沒有的 safety-refusal 失敗模式；(2) 基準在偵測翻譯 bug 上比 unit tests 更有效——2,621 unit tests 全過但 Terminal-Bench 初始 0%、API 協定 bug 對 tests 不可見卻造成 100% Chat Completions fallback、pip 環境污染只透過端到端任務執行可偵測；(3) 對 LLM API latency（1–10s/round-trip）支配的 AI agent，語言選擇應跟隨瓶頸——Python sub-millisecond 本地開銷可忽略，換來 15.9× code reduction、90% rank-A 複雜度、更廣貢獻者基礎；(4) 翻譯是「分岔的起點」而非「天花板」——達成 parity 後 Python port 可獨立演化出 `codex.enhancements` 的 30 個擴充，且基準除錯期發現的 bug 修正（429 偵測、API-key 輪替、API 400 recovery 層）使 Python 在穩健性上淨優於 Rust 原版(§V-K、§VII, p.12–13)。\n- **限制與效度威脅（作者自陳）**：head-to-head 的 3.8 個百分點差距落在 LLM 非決定性的誤差範圍，意味基準比較本身受隨機性影響；Terminal-Bench gap 部分來自一個 Python 特有、Rust 沒有的 safety-refusal 失敗模式；SSE 與 LLM pipeline 微基準使用 mocked API responses（pre-recorded JSON）以隔離編排開銷，故這些數字反映本地計算而非端到端真實 latency；型別檢查的 75.5% strict-clean rate 顯示仍有 248 個 type error 未清（雖多為第三方 stub）(§V-I-c, §V-H, §V-E, §V-K, p.11–12)。\n- **作者列出的未來方向**：把 benchmark-as-objective-function 方法論套用到其他大規模翻譯（Java→Kotlin、C++→Rust）、自動化上游同步（diff-translate-test 迴圈作為無人介入的 CI pipeline）、multi-benchmark objective functions（結合 Terminal-Bench、SWE-bench 與領域專屬基準）、以及研究 benchmark-driven 方法與形式驗證在建立跨語言等價上的比較(§VII-Future Work, p.14)。\n\n---\n\n### 4. Agentic-PR 為何被合併或被拒 — 以「審查互動」而非「合併標籤」重新評估 AI 代理對開源代碼庫的貢獻\n*Peralta et al. 2026, arXiv:2605.22534（早稻田大學、大阪大學、立命館大學、九州大學、奈良先端科學技術大學院大學，日本）*\n\n![a4-scope](images/a4-scope.jpg)\n\n\n**定位**：本文針對「AI 編碼代理（coding agent）日益直接向開源倉庫提交 pull request（作者稱 Agentic-PR）」這一現象，質疑既有評估方式的可靠性——既有大型分析（如 AIDev 資料集）幾乎都僅以結果型指標（merge rate、approval rate、approval frequency）衡量代理能力，對「合併／拒絕決策如何形成」幾乎沒有洞察 (Peralta et al. 2026, §1, p.1；§2, p.2)。作者的核心假設是：合併／拒絕這兩個結果標籤「無法在不考量審查互動的前提下，可靠反映代理能力」，因為拒絕可能源於工作流程限制或未記錄的審查者決定（而非代理失敗），合併也可能依賴不同程度的人工介入（而非代理自主完成）(Abstract, p.1；§1, p.1)。論文自我定位為一項「以決策為導向（decision-oriented）」的實證研究，主張需要「以審查行為為基礎、具互動意識（interaction-aware）」的評估方式，以將代理失敗從工作流程驅動與人為中介的結果中分離出來 (Peralta et al. 2026, §1, p.1；§2, p.2)。\n\n\n![a4-method](images/a4-method.jpg)\n\n**做法**：\n- **研究問題**：設定兩個 RQ。RQ1：「是什麼驅動 Agentic-PR 被拒絕？」動機是要區分代理失敗、工作流程限制、未記錄的審查者決定三者，避免把拒絕結果單方面歸因於代理能力。RQ2：「人工介入如何形塑成功（被合併）的 Agentic-PR？」動機是檢驗被合併的 PR 究竟反映代理自主表現，還是依賴審查者回饋或直接人工修改的協作式精修 (Peralta et al. 2026, §1, p.1–2)。\n- **資料來源與初始建構（Figure 1 步驟 A）**：以既有的 AIDev 資料集為基礎（該資料集涵蓋數千個倉庫的代理作者 PR）。將範圍限制在「closed Agentic-PR」，即帶有明確 merge 或 rejection 決定的 PR；並只保留具備成熟審查實務的倉庫，套用「至少 500 顆星」的門檻 (Peralta et al. 2026, §1, p.1；§3, p.2)。\n- **初始資料池**：上述過濾後得到 11,048 個 Agentic-PR，其中 6,774 個已合併、4,274 個被拒絕 (Peralta et al. 2026, §3, p.2；Figure 1, p.3)。\n- **精煉資料集定義（Figure 1 步驟 B）**：排除「僅由機器人審查（bot-only review）」的提交，定義為「沒有任何人類評論的代理作者 PR」，以減少缺乏人類決策脈絡的案例。此步驟移除 1,249 個 PR，得到最終資料集 9,799 個「經人類審查」的 Agentic-PR (Peralta et al. 2026, §3, p.2；Figure 1, p.3)。\n- **精煉資料集的代理組成（Table 1）**：9,799 個 PR 跨五個代理分布極不均勻——OpenAI Codex 3,989（40.7%，合併 2,834／拒絕 1,155）、Devin 3,380（34.5%，合併 1,813／拒絕 1,567）、Copilot 1,429（14.6%，合併 839／拒絕 590）、Cursor 788（8.0%，合併 563／拒絕 225）、Claude Code 213（2.2%，合併 130／拒絕 83）；合計合併 6,179、拒絕 3,620。Codex 與 Devin 合占多數，Claude Code 最少 (Peralta et al. 2026, §3, Table 1, p.2)。\n- **分層抽樣策略（Figure 1 步驟 C）**：從 9,799 個精煉資料集中抽出 717 個 PR 作人工檢視樣本，其中 353 個被拒絕、364 個已合併，並在各代理與各倉庫間做平衡分層抽樣，以確保對決策結果與審查互動的代表性覆蓋，作法遵循 pull-request 層級實證研究的既有建議 (Peralta et al. 2026, §4, p.2)。\n- **人工質性編碼流程（Figure 1 步驟 D）**：採用人工質性編碼進行探索式實證分析，遵循「涉及大型語言模型的實證軟體工程研究」既有指南。編碼方案以試點檢視（pilot inspection）與校準（calibration）迭代發展而成 (Peralta et al. 2026, §4, p.2)。\n- **RQ1 的編碼類別（拒絕 PR）**：將被拒 PR 分為三類——(1) 代理失敗（Agentic Failure, AF），對應可觀察的技術失敗訊號，如檢查失敗、測試失敗、或審查者評論指出提交的變更無法運作；(2) 非代理失敗（Non-AF），對應可觀察的工作流程／流程相關原因，如重複 PR、被取代的變更、停滯、測試型 PR、或不正確的提交部位；(3) unknown，當評論中無可靠決策訊號可供分類時使用，常因「靜默的倉庫行為」（例如 PR 被無評論地關閉）所致。作者強調 unknown 不必然代表代理失敗，應另行處理或排除於精確度型評估之外以避免雜訊 (Peralta et al. 2026, §4, p.2；§5, p.3)。\n- **RQ2 的編碼類別（合併 PR）**：將互動模式分為——回饋迴圈（Feedback Loop, FL，定義為「審查者回饋之後接著由代理單獨完成修訂」）、人工介入（Human Intervention, HI，定義為「審查者直接套用 commit 後才合併」）、無回饋迴圈（No FL，無可觀察的回饋或審查者套用 commit 即合併），以及互動證據缺失或模糊時使用的 unknown 標籤 (Peralta et al. 2026, §4, p.2；§6, Table 3, p.3)。\n- **標註者與信度協定**：四名標註者參與，每個 PR 由兩名標註者獨立編碼；以 Cohen's κ 評估評分者間信度（遵循軟體工程一致性分析的最佳實務）。歧見透過討論解決，模糊案例保守地歸入 unknown 類別 (Peralta et al. 2026, §4, p.2–3)。\n- **達成的信度數值**：RQ1（拒絕原因，N=353）Cohen's κ ≈ 0.90；RQ2（合併互動模式，N=364）Cohen's κ = 1.0（完全一致）(Peralta et al. 2026, Table 2 註, p.3；Table 3 註, p.3)。\n- **可複現性**：所有抽樣腳本、編碼指南、一致性統計，以及代表性標註範例（含 PR URL 與佐證互動證據）均收錄於複現套件（GitHub: cn-eveer/Agentic-PRs-Analysis）(Peralta et al. 2026, §4, p.3；§5–6, p.3；References [1], p.5)。\n\n\n![a4-findings](images/a4-findings.jpg)\n\n\n**核心發現**：\n- **RQ1 主結論——拒絕「並非」主要由代理失敗驅動**：在 353 個經人工檢視的被拒 Agentic-PR 中，只有 126 個（35.7%）對應可觀察的明確代理失敗；其餘被拒案例分為非代理工作流程相關原因 110 個（31.2%）與無可觀察決策依據 117 個（33.1%）。亦即多數（約 64%）被拒 PR 並不能歸因於可辨識的代理失敗 (Peralta et al. 2026, §5, Table 2, p.3；RQ1 Answer 框, p.3)。\n- **RQ1 拒絕原因的跨代理差異（Table 2）**：各代理被拒樣本量與類別組成差異顯著——Devin 153 個被拒（AF 37／Non-AF 69／Unknown 47），其中 AF 僅占 24.2%、Non-AF 占 45.1%（作者明列）；OpenAI Codex 113 個被拒（AF 54／Non-AF 19／Unknown 40），AF 占 47.8%、Non-AF 占 16.8%、Unknown 占 35.4%（作者明列）；Copilot 57 個被拒（AF 19／Non-AF 17／Unknown 21），三類分布較均勻；Cursor 22 個被拒（AF 15／Non-AF 1／Unknown 6）；Claude Code 僅 8 個被拒（AF 1／Non-AF 4／Unknown 3）。Devin 的拒絕以非代理（工作流程）原因為主，Codex 的拒絕則以代理失敗為相對多數 (Peralta et al. 2026, §5, Table 2, p.3)。\n- **RQ2 主結論——多數被合併 PR 無可觀察互動，但相當比例需人工介入**：在 364 個經人工檢視的被合併 Agentic-PR 中，288 個（79.1%）為 No FL（無可觀察回饋迴圈或審查者套用 commit 即合併）；56 個（15.4%）涉及明確的審查者參與，且大致平均分為回饋迴圈 28 個（7.7%）與人工套用 commit（HI）28 個（7.7%）；其餘 20 個（5.5%）因互動證據不足或模糊而標為 unknown (Peralta et al. 2026, §6, Table 3, p.3；RQ2 Answer 框, p.3)。\n- **RQ2 人工介入高度集中於特定代理**：在 56 個被標為 FL 或 HI 的案例中，有 54 個集中於 Copilot 與 Devin 兩個代理。Copilot 在 49 個被合併樣本中有 29 個（59.2%）為 FL 或 HI（13 FL／16 HI）；Devin 在 107 個被合併樣本中有 25 個（23.4%）為 FL 或 HI（14 FL／11 HI）(Peralta et al. 2026, §6, Table 3, p.3；§6 內文, p.4)。\n- **RQ2 Codex 與 Cursor 幾乎在無互動下被合併**：OpenAI Codex 在 167 個被合併樣本中，165 個為 No FL，僅 1 個 HI、0 個 FL（HI 占 0.6%）；Cursor 在 33 個被合併樣本中，30 個為 No FL，僅 1 個 FL、0 個 HI；Claude Code 8 個被合併樣本則 0 個 FL／0 個 HI。作者因此指出 Codex 與 Cursor 的 PR 通常「以最少互動」即被合併 (Peralta et al. 2026, §6, Table 3, p.3；Abstract, p.1)。\n- **拒絕結果系統性「高估」代理錯誤**：作者明確結論「拒絕結果實質上高估了代理錯誤」——若僅憑拒絕標籤評估，會把 31.2% 的工作流程驅動拒絕與 33.1% 缺乏依據的拒絕也算作代理失敗 (Abstract, p.1；§1 Key Takeaway, p.2)。\n- **合併結果並不等於代理自主完成**：作者強調「合併 Agentic-PR 並不一致對應於代理自主完成」；15.4% 的合併涉及明確審查者參與（透過回饋後代理修訂，或審查者直接套用修正 commit），這些介入通常處理的是缺漏的測試、CI 設定問題、或倉庫特定慣例，而非核心功能 (Peralta et al. 2026, §7, p.4)。\n- **代表性案例（拒絕端）**：Copilot PR #9653（倉庫 dotnet/aspire）儘管有大量討論、多次 commit 與多輪 CI 執行，最終仍未被合併（被歸於工作流程／流程相關脈絡），說明僅看結果的分析會遺漏大量決策脈絡 (Peralta et al. 2026, §7, p.4)。\n- **代表性案例（合併端）**：Copilot PR #3512（倉庫 primer/view_components）由審查者套用修正 commit 後才合併、且未經代理進一步修訂，例示「被合併結果可能反映協作式完成而非代理單獨表現」 (Peralta et al. 2026, §7, p.4)。\n- **跨代理的部署脈絡差異**：作者觀察到 Devin 與 Copilot 占了最多「工作流程驅動的拒絕」與「涉及審查者的合併」，而 Codex 與 Cursor 較常在無互動下被合併；此差異對應倉庫實務上的差別（更嚴格的 CI gating、迭代式審查規範、貢獻準則的執行強度），意味觀察到的 Agentic-PR 結果同時反映代理行為與其被部署的審查環境，使直接的跨代理比較變得複雜 (Peralta et al. 2026, §7, p.4；§9, p.4)。\n- **論文三項貢獻**：(1) 一項以決策為導向的實證分析，把代理失敗從工作流程驅動與未記錄的拒絕中分離；(2) 對成功 Agentic-PR 中人工介入的量化刻畫（含回饋迴圈與審查者套用 commit）；(3) 提供「結果型指標系統性混淆代理能力與倉庫工作流程」的實證證據，從而推動具互動意識的 AI 編碼代理評估 (Peralta et al. 2026, §2 Contributions, p.2)。\n- **效度威脅——構念效度（Construct Validity）**：結果取決於 agentic failure、non-agentic outcome、feedback loop 的操作型定義；雖經試點編碼精煉，當審查者意圖隱含或評論稀疏時仍有模糊性，部分決策依據不可觀察（如靜默關閉）會落入可能隱藏未記錄因素的 unknown 類別；研究亦缺乏投入型指標（如審查耗時、評論數量），15.4% 涉及人工介入的合併其相關成本仍未被量化 (Peralta et al. 2026, §8, p.4)。\n- **效度威脅——內部效度（Internal Validity）**：人工編碼可能引入主觀性，作者以獨立雙重標註與高評分者間一致性（Cohen's κ）緩解，但細微或多因案例仍可能被誤分類；分層抽樣降低偏差，惟未觀察到的脈絡因素無法完全控制 (Peralta et al. 2026, §8, p.4)。\n- **效度威脅——外部效度（External Validity）**：研究聚焦於高星數開源倉庫與五個被廣泛使用的編碼代理，雖提升資料品質，但結論可能無法推廣到較小型專案、專有環境、或工作流程與審查實務不同的未來代理系統 (Peralta et al. 2026, §8, p.4)。\n- **對未來評估的呼籲**：作者主張評估方式應超越結果型指標，納入審查評論、CI 訊號、commit 歷史與作者身分等互動層級證據，並在訊號缺失時明確表示不確定性；未來工作應利用人工策展的真值（ground truth）來大規模自動偵測「工作流程驅動的關閉」、審查者介入與回饋迴圈，並開發更能反映代理在真實軟體開發中有效性的「具互動意識基準（interaction-aware benchmark）」 (Peralta et al. 2026, §8, p.4；§9, p.4)。\n\n---\n\n### 5. COBOL-Coder — 以領域適配 LLM 解決 COBOL 程式生成與雙向翻譯的工業案例\n\n*Dau et al. 2026, arXiv:2604.03986（康考迪亞大學（Concordia University，加拿大蒙特婁）與 FPT Software AI Center（越南））*\n\n![a5-scope](images/a5-scope.jpg)\n\n\n**範圍提醒**：本論文聚焦於「為遺留語言 COBOL 訓練專用 LLM」與「COBOL↔Java 雙向翻譯」，屬大型遺留系統現代化／維護的上游能力建構，而非直接針對單一大型代碼庫的端到端修改實作；其評估明確限於「檔案級（file-level）」單檔程式，作者自陳尚未涵蓋跨檔依賴、共享 copybook、跨程式控制流等真實主機系統特性（Dau et al. 2026, §6 Internal Validity, p.22）。因此其與「對大型代碼庫進行修改與維護」的關聯偏向間接：它提供現代化遷移所需的模型與基準，並以實務開發者調查論證 LLM 在遺留維護工作流中的人機協作定位。\n\n**定位**：COBOL 仍支撐銀行、保險與政府的關鍵主機系統，但現有 LLM 在 COBOL 生成與翻譯上表現極差——在 COBOLEval 基準上最佳模型僅達 10.37 Pass@1（Dau et al. 2026, §1, p.2）。論文將此歸因於三項根本限制：COBOL 屬低資源語言、production 程式碼多留存於企業內部而少公開、現有基準在任務多樣性與實務涵蓋面上狹窄、且遺留語言在程式結構與資料佈局上與現代語言差異甚大（Dau et al. 2026, §1, p.2）。論文的自我定位是「報告為 COBOL 與主機軟體工程開發、評估領域適配 LLM 的經驗」，並以四項貢獻填補空白：(1) 自動化資料增強流水線、(2) COBOL 專用模型 COBOL-Coder、(3) 首個 COBOL–Java 雙向翻譯基準 COBOL-JavaTrans、(4) 邀請資深 COBOL 開發者的問卷式評估（Dau et al. 2026, §1, p.3-4；Abstract, p.1）。論文相對既有工作（如僅做生成評估的 COBOLEval、X-COBOL、MainframeBench）的新意在於把「領域資料策展＋模型適配＋基準建構＋以實務人員為中心的評估」整合於一個遺留語言研究中（Dau et al. 2026, §8 Conclusion, p.24；§5, p.21-22）。\n\n\n![a5-method](images/a5-method.jpg)\n\n**做法**：\n\n- **三來源訓練資料策展**：訓練資料由三個互補來源構成——Source 1 為自 GitHub 蒐集的真實 COBOL 程式、Source 2 為經跨語言翻譯生成的合成 COBOL 程式、Source 3 為 COBOL 與主機知識文本來源（Dau et al. 2026, §2.1, p.4）。\n\n- **Source 1 的擷取與前處理**：以 GitHub Search API 採「檔案級擷取」策略，用 COBOL 相關關鍵字（COBOL、COBOL-85、COBOL-2002）搭配副檔名（.cbl、.cob、.cobol、.cbx）查詢，排除已封存與 fork 的倉庫；隨後過濾低品質檔案——丟棄少於 20 行的檔案（多為不完整範例、設定樁、內容稀少的 copybook）、排除超過 50,000 行的檔案（多為串接二進位或轉換產物）、移除非文字檔與非英數字元比例異常高的檔案（Dau et al. 2026, §2.1.1, p.5-6）。\n\n- **MinHash 去重**：以 MinHash 指紋結合 Locality Sensitive Hashing（LSH）辨識近重複 COBOL 檔案，高相似檔案聚為一群、每群僅保留單一代表檔，以降低跨倉庫程式碼重用造成的冗餘與訓練記憶風險，同時保留編碼模式多樣性；前處理後語料含 40,829 個唯一 COBOL 源檔（Dau et al. 2026, §2.1.1, p.6）。\n\n- **Stage 1 編譯器導向驗證與自我除錯**：因大量真實 COBOL 無法直接編譯（不完整程式、過時方言、缺漏 copybook、不一致資料定義），先以標準編譯器 GnuCOBOL 編譯每個檔案；若報錯，將原始碼與編譯日誌一併交給以 GPT-4o 實例化的 LLM（Repair），要求其扮演資深 COBOL 開發者，做到 (i) 解讀診斷訊息、(ii) 推理錯誤根因、(iii) 在保留原始程式意圖下生成修正版本；修正後重新編譯，若仍有錯則把新錯誤訊息回饋給 LLM 形成「compiler-in-the-loop」迭代，直到編譯成功或達上限 K=3（Dau et al. 2026, §2.1.1 Stage 1, p.6）。此階段後得到 31,492 個可編譯 COBOL 程式，合計約 3,840 萬（38.4M）tokens，作為核心程式語料（Dau et al. 2026, §2.1.1, p.6-7）。\n\n- **Stage 3 指令生成（對真實 COBOL）**：對 Stage 1 產出的可編譯程式直接進入指令生成。先用多個 LLM——GPT-4、GPT-4o-mini、GPT-oss-120B、CodeLlama-70B——各自獨立為每個程式生成候選問題描述（含自然語言任務規格、輸入／輸出需求、由程式行為推得的功能限制）；再以 GPT-4o 作為 judge，評估正確性、完整性與和程式邏輯的一致性，挑出最忠實且資訊量最高的描述；最終每個樣本封裝為標準指令格式，含 (i) 問題描述、(ii) 輸入／輸出描述、(iii) 以已驗證 COBOL 程式為解答、(iv) 摘述程式邏輯的自然語言說明（Dau et al. 2026, §2.1.1 Stage 3, p.7）。\n\n- **Source 2 合成 COBOL 的動機與翻譯起點**：因公開 COBOL 量級遠小於現代語言（StarCoder2 訓練於約 3.3–4.3 兆 tokens、DeepSeek-Coder 約 2 兆 tokens 涵蓋 87 種語言、Magicoder 用逾 75K 合成指令），公開 COBOL 不足以有效微調；故以跨語言翻譯生成合成 COBOL，種子語料採 The Stack v2 的過濾子集 the-stack-v2-dedup-Java（具寬鬆授權、已清理與去污染的 Java），由 GPT-4o 實例化的 LLM（Translator）將每個 Java 程式翻成初版 COBOL（Dau et al. 2026, §2.1.2, p.7-8）。\n\n- **合成 COBOL 的語法修復**：首次翻譯常含語法錯誤與語意不一致，故合成 COBOL 先經與 Source 1 相同的編譯器導向驗證流水線，編譯失敗者由 LLM（Repair）依編譯診斷迭代修復至語法有效或達迭代上限；此階段後得 279,536 個語法有效的 Java–COBOL 對（Dau et al. 2026, §2.1.2, p.8）。\n\n- **Stage 2 相似度導向驗證之一：LLM 配對評分**：語法正確不保證語意保真，故對每個 Java–COBOL 對先做 LLM 配對評分，由 LLM（Scorer）評估翻譯後 COBOL 是否正確捕捉原 Java 的功能、控制流與資料轉換，給出 [0,1] 區間相似分數與簡短說明；僅保留分數高於門檻 τ₁=0.6 的對，過濾後保留 225,987 個對；附錄 B.1 的分數分布顯示多數對集中於高分區，平均 0.68（Dau et al. 2026, §2.1.2 Stage 2, p.8-9；Fig. 3, p.31）。\n\n- **Stage 2 之二：AST 導向相似度評分（回譯）**：再做回譯——把已驗證 COBOL 由 LLM（Translator）翻回 Java，與原 Java 比較。流程含兩步：先以 Spoon framework 將兩支 Java 程式解析為抽象語法樹（AST），系統性把變數、方法參數、區域識別字重新命名為標準形式（AST 正規化），使比較聚焦結構而非命名差異；再以 CodeBERTScore（用 CodeBERT 的脈絡嵌入計算 token 級餘弦相似度）計算原始與回譯 Java 的相似度，僅保留超過門檻 τ₂=0.7 的對；附錄 B.2／Fig. 4 顯示正規化前平均 CodeBERTScore 為 0.69、正規化後升至 0.75（Dau et al. 2026, §2.1.2 Stage 2, p.9；Fig. 4, p.31）。\n\n- **Source 3 知識語料**：策展 COBOL 與主機知識的文本資源，包含授權教科書、教學與技術網站（涵蓋 COBOL 語法、資料結構、檔案系統、執行環境），刻意排除 Stack Overflow、論壇、郵件清單等社群對話來源（因偏重個案修補而非系統性知識）；教科書以 pdftotext 抽取並正規化、過濾損毀頁；網站以自訂抽取流水線修剪導覽列、廣告、側欄、頁尾與樣板文字，保留程式碼區塊、表格與結構化範例；清理後得 18,498 個高品質文本檔約 3,700 萬 tokens（Dau et al. 2026, §2.1.3, p.9-10）。\n\n- **知識語料轉指令式問答**：不直接用原始文件作訓練資料，而以 LLM（Synthesizer）將語料切段並為每段生成問答對，理由有二——衍生問答可緩解直接複製受版權／授權內容的疑慮、且先前研究顯示指令式資料訓練 LLM 更有效；最終得 153,415 個問答對（Dau et al. 2026, §2.1.3, p.10）。\n\n- **微調資料集總覽（Table 1）**：GitHub Repositories（Description–Code 格式）38.4M tokens／31,492 instances；Synthetic COBOL 拆三類——COBOL–Java 206M tokens／173,042 instances、Java–COBOL 170M tokens／173,042 instances、Description–Code 230M tokens／172,759 instances；COBOL Knowledge Sources（Question–Answer 格式）241M tokens／153,415 instances（Dau et al. 2026, Table 1, p.10）。\n\n- **基礎模型與微調設定**：COBOL-Coder 以領先的 code LLM 家族 Qwen2.5-Coder（7B 與 14B 版本）為基礎做語言特化微調，刻意不引入任務專屬架構變更，以確保訓練穩定、可重現並與既有 code LLM 公平比較、隔離資料策展之效果；訓練設定為最大序列長度 4,096 tokens、AdamW 優化器（β₁=0.9、β₂=0.95、ε=10⁻⁸、weight decay=0.1）、cosine 學習率排程含 1,000 步線性 warm-up 後平滑衰減至峰值的三十分之一、COBOL-Coder-7B 學習率 2×10⁻⁵、14B 用較低的 1×10⁻⁵ 以維持大規模訓練穩定、全域 batch size 2,048、輸入打包為固定長度、不用 dropout、訓練至收斂或依驗證表現早停（Dau et al. 2026, §2.2, p.10-11）。\n\n- **基準一：COBOLEval 與 COBOLCodeBench（程式生成）**：COBOLEval 是首個專為 COBOL 程式生成設計的基準，含 146 道由 HumanEval 人工翻譯而來的題目，每題提供 COBOL 函式簽章與自然語言規格；COBOLCodeBench 將 BigCodeBench-Hard 的 46 道題改寫為 COBOL，強調金融計算、結構化資料處理、報表生成等真實遺留場景以提高難度（Dau et al. 2026, §3.1.4, p.12；Table 2, p.13）。\n\n- **基準二：COBOL-JavaTrans（雙向翻譯，論文提出）**：因目前無專為 COBOL 翻譯策展的基準，作者用「vibe-coding 啟發」的工作流為 HumanEval 任務建構 COBOL 程式——由 LLM 生成候選 COBOL，再經反覆提示與人工修正精煉，所有程式均人工審核驗證可編譯性與功能一致；因部分 HumanEval 任務與 COBOL 結構根本不相容，最終 164 題中有 143 題可忠實實作；建構時採用 HumanEval-X 的 Java 解答並調整任務規格以相容 COBOL，最終得 143 對，支援 COBOL→Java（C2J）與 Java→COBOL（J2C）雙向評估（Dau et al. 2026, §3.1.4, p.13；Table 2, p.13）。\n\n- **評估協定與受測模型**：共評估 11 個 LLM；指標為編譯成功率 CSR（以 GnuCOBOL 2.0.0 編 COBOL、javac 17.0.18 編 Java 量測可成功編譯比例）與 Pass@1（首次生成解通過全部測試的任務比例）；所有開源模型、COBOL-Coder、GPT-oss-120B 在同一本地機器以相同運算設定執行，GPT-4／GPT-4o 經官方 API 執行；超參數 temperature=0.0、n=1（只取首候選），其餘採預設；為降低 LLM 隨機性影響，同設定重複實驗三次取平均；所有評估皆為 zero-shot（Dau et al. 2026, §3.1.2–3.1.3, p.12）。基線涵蓋 DeepSeek-Coder、CodeGemma、CodeLlama、StarCoder2、Qwen2.5-Coder、DeepSeek-R1-Distill-Qwen、專為 COBOL 設計的 SOTA 模型 Mainframer，以及 GPT-oss、GPT-4、GPT-4o（Dau et al. 2026, §3.1.1, p.11-12）。\n\n- **開發者使用者研究設計**：因 COBOL 社群萎縮，招募具產業 COBOL 經驗的三位專業人士（經驗分別為 1–3 年、5–10 年、逾 10 年）；問卷含 10 項任務（5 項生成 Gen、其餘為 C2J 與 J2C），涵蓋檔案處理、表格操作、業務規則驗證，難度由簡單到複雜（Table 5）；每項任務呈現三個匿名化的 LLM 生成解（標 Model A／B／C，分別為 COBOL-Coder-14B、GPT-4、GPT-4o），參與者依 (1) 功能正確性、(2) 程式可讀性、(3) 對慣用 COBOL 編碼實務的遵循度三項標準排序；最後請參與者就感受到的實用性、清晰度與限制提供質性回饋（Dau et al. 2026, §4.0.1, p.16；§4 開頭, p.17）。\n\n- **附錄揭露的提示工程細節**：附錄 A 完整列出五個流水線提示——Compiler-Guided Repair（要求依編譯錯誤修復並兼顧邏輯健全）、LLM-based Pair Scoring（給 1.0／0.7–0.9／0.4–0.6／0.0–0.3 的四級評分準則）、Back Translation（嚴格的「極簡化」約束，禁止加 getter/setter、bean、額外方法或註解，僅保留 COBOL 可觀察行為）、Instruction Generation（非 COBOL 則回傳 None）、Candidate Selection（從四個候選描述中選最佳）（Dau et al. 2026, Appendix A.1–A.5, p.28-30）。\n\n\n![a5-findings](images/a5-findings.jpg)\n\n\n**核心發現**：\n\n- **RQ1 — COBOL 程式生成，開源基線幾近全面失敗**：在 COBOLEval 與 COBOLCodeBench 兩基準上，多數開源基線（CodeGemma 7B、CodeLlama 7B、StarCoder2 7B、DeepSeek-R1-Distill-Qwen-7B/14B、StarCoder2 15B）在兩基準上皆為 0% CSR 與 0 Pass@1；較強的 code LLM 如 DeepSeek-Coder 6.7B 與 Qwen2.5-Coder 7B 在 COBOLEval 也僅 14.98% 與 10.27% CSR、Pass@1 低於 1.5，且在較難的 COBOLCodeBench 完全無法產出有效程式（Dau et al. 2026, §4 RQ1, p.14；Table 3, p.14）。\n\n- **RQ1 — GPT 系列雖較佳但仍偏弱**：GPT-4 在 COBOLEval 達 24.12% CSR／15.75 Pass@1，GPT-4o 提升至 41.80% CSR 但 Pass@1 僅 16.40；在 COBOLCodeBench 上 GPT-4／GPT-4o 的 Pass@1 不超過 2.17（GPT-4o 為 0、GPT-oss-120B 為 2.17）（Dau et al. 2026, §4 RQ1, p.14；Table 3, p.14）。\n\n- **RQ1 — COBOL-Coder 顯著領先且具規模效應**：COBOL-Coder-7B 在 COBOLEval 達 73.80% CSR／44.70 Pass@1，COBOL-Coder-14B 進一步達 73.95% CSR／49.33 Pass@1（後者 Pass@1 較 GPT-4o 高出近 33 個百分點）；在更具挑戰性的 COBOLCodeBench 上，COBOL-Coder-14B 是唯一取得非平凡功能正確性的模型，達 26.09% CSR／4.35 Pass@1（COBOL-Coder-7B 為 13.04% CSR／0 Pass@1）；由 7B 到 14B 一致改善，作者據此判定 COBOL 專用訓練與模型規模對 COBOL 生成皆屬關鍵（Dau et al. 2026, §4 RQ1, p.14-15；Table 3, p.14）。\n\n- **RQ1 — 對既有 COBOL 專用模型 Mainframer 的優勢**：專為主機設計的 Mainframer 7B／13B 在 COBOLEval 達 69.17%／62.24% CSR，但 Pass@1 僅 6.16／11.64，且在 COBOLCodeBench 上 CSR 與 Pass@1 皆為 0；COBOL-Coder 在功能正確性上明顯超越（Dau et al. 2026, Table 3, p.14）。\n\n- **RQ2 — COBOL→Java（C2J）翻譯，COBOL-Coder 領先所有開源模型**：在 COBOL-JavaTrans 上，COBOL-Coder-7B 與 14B 的 C2J 翻譯皆達 97.90% CSR，Pass@1 分別為 81.81 與 83.91，超越 DeepSeek-Coder 6.7B（88.11% CSR／63.64 Pass@1）、DeepSeekCoder-V2 16B（95.10% CSR／75.52 Pass@1）等開源 code LLM（Dau et al. 2026, §4 RQ2, p.15；Table 4, p.15）。\n\n- **RQ2 — C2J 上更大型通用 LLM 略勝，但凸顯規模代價**：GPT-oss-120B 在 C2J 取得略高的 98.60% CSR／89.51 Pass@1、GPT-4o 為 97.20% CSR／85.31 Pass@1、GPT-4 為 94.40% CSR／72.73 Pass@1；作者指出較小的語言特化 LLM 能以遠小的模型規模達到具競爭力的表現（Dau et al. 2026, §4 RQ2, p.15;Table 4, p.15）。\n\n- **RQ2 — Java→COBOL（J2C）翻譯難度顯著更高，幾乎所有基線完全失敗**：在 J2C 方向，所有開源基線的 CSR 與 Pass@1 皆為 0；GPT 系列僅取得有限成功——GPT-oss-120B 5.38% CSR／3.93 Pass@1、GPT-4 5.45% CSR／1.73 Pass@1、GPT-4o 4.36% CSR／2.18 Pass@1，Pass@1 均低於 4（Dau et al. 2026, §4 RQ2, p.15-16；Table 4, p.15）。\n\n- **RQ2 — J2C 上唯有 COBOL-Coder 取得非平凡結果**：COBOL-Coder-7B 在 J2C 達 63.64% CSR／27.27 Pass@1，COBOL-Coder-14B 達 72.03% CSR／34.93 Pass@1，明顯勝過通用與更大型 LLM；作者據此論證複雜的雙向翻譯需要 COBOL 專用訓練（Dau et al. 2026, §4 RQ2, p.16；Table 4, p.15）。\n\n- **核心發現 — 遺留↔現代翻譯的根本不對稱性**：論文明確指出「遺留語言轉現代語言」與「現代語言轉遺留語言」的難度有清楚差異——通用 LLM 常能由 COBOL 產出合理的 Java（C2J），但生成慣用且操作上正確的 COBOL（J2C）仍困難得多；此不對稱反映遺留與現代語言在執行模型、資料處理與控制流慣例上的深層差異，作者主張涉及遺留目標的翻譯任務需專屬基準與建模策略，而非對稱處理（Dau et al. 2026, §7 Lessons Learned, p.23）。\n\n- **RQ3 — 任務級排名：生成任務 COBOL-Coder 多居首或並列第一**：三位開發者（P1–P3）對 10 項任務排序（Model A=COBOL-Coder-14B、B=GPT-4、C=GPT-4o）。在 COBOL 生成任務（Task 1–5），COBOL-Coder（Model A）經常被排第一或並列第一；在較簡單任務參與者常認為各 LLM 解功能相近、通用 LLM 偶因解釋性註解與較詳述被排較高；在中等以上複雜任務，COBOL-Coder 因程式結構、批次導向（batch-oriented）模式與遵循慣用 COBOL 編碼實務而被偏好（Dau et al. 2026, §4.0.2, p.18；Table 6, p.18）。\n\n- **RQ3 — C2J 翻譯任務 COBOL-Coder 具競爭力但不一致主導**：在 COBOL→Java 任務上 COBOL-Coder 維持競爭力但未一致勝出，參與者評估 Java 時常偏好 GPT-4／GPT-4o（反映其在高資源現代語言的較強表現）；然 COBOL-Coder 的翻譯整體仍被評為功能正確且結構健全（Dau et al. 2026, §4.0.2, p.18）。\n\n- **RQ3 — J2C 翻譯任務 COBOL-Coder 明確且一致勝出**：在 Java→COBOL 任務（Task 7、9、10），COBOL-Coder（Model A）明顯勝過 GPT-4 與 GPT-4o，三位參與者一致將 Model A 排第一；此與 §3.1.4 的量化結果一致，顯示 COBOL-Coder 在「把現代語言翻成遺留 COBOL」特別有效（Dau et al. 2026, §4.0.2, p.18）。\n\n- **RQ3 質性回饋 — 程式意圖理解與 COBOL 語意**：參與者評估的不只正確性，還評估生成碼是否反映對程式邏輯的理解、如何被執行、在真實系統中如何演進；COBOL-Coder（Model A）被描述為更務實、更面向 production，GPT-4（Model B）「不一致且常出錯」，GPT-4o（Model C）「理解概念但傾向過度工程化（overengineer）解法」（P1 原話），P2 亦稱「有時兩模型一個結構對細節錯、另一個相反」（Dau et al. 2026, §4.0.3, p.18-19）。\n\n- **RQ3 質性回饋 — COBOL 感知與程式結構**：三位參與者一致選 Model A 為最具 COBOL 感知的模型，認為其最能理解 COBOL 特定慣例、企業程式風格與程式組織；P3 稱「Model A 更接近典型批次風格程式，尤其在檔案處理上，其他模型較一般化」；COBOL-Coder 被認為較能保留程式結構，其他 LLM「有時喪失程式結構」（P2）（Dau et al. 2026, §4.0.3, p.19）。\n\n- **RQ3 質性回饋 — 生產力與開發工作流**：COBOL-Coder 被認為能帶來生產力效益，主要藉由在開發早期降低認知負擔；P2 稱其「縮短了從初步想法到合理正確草稿的路徑」，在樣板邏輯與遺留限制常見的 COBOL 開發與遷移情境特別有價值（「Model A 降低認知負擔……正是在 COBOL、Java 遷移與遺留邏輯上提升效率的關鍵」）；但參與者把此效益框定於人在環（human-in-the-loop）工作流，視 LLM 為「加速器而非自主代理」，類比為產出初稿的初級開發者；相對地，GPT-4／GPT-4o 在需大量重構與修正時難以辨識明確生產力優勢（Dau et al. 2026, §4.0.3, p.19-20）。\n\n- **RQ3 質性回饋 — 真實採用的具體前提**：參與者就真實採用聚焦數項具體期待——(1) 消除不可編譯構造被視為先決條件；(2) 對操作邊界情況的可預測處理（如檔案狀態檢查、SQLCODE 處理、可重啟性 restartability，即由中間「checkpoint」而非從頭恢復失敗的批次作業）被視為企業部署必要；(3) 一致遵循組織 copybook、資料慣例與編碼標準被指為主要採用障礙；(4) 理解 copybook、共享資料佈局、JCL（job control language）與跨程式依賴亦屬關鍵；COBOL-Coder 被普遍視為最接近滿足這些需求（尤其作為初稿生成器），但參與者強調仍須與既有主機生態深度整合並有更強的安全與相容性保證，方能在 production 例行使用（Dau et al. 2026, §4.0.3, p.19-20）。\n\n- **效度威脅 — 建構效度**：流水線主要依賴編譯器回饋與 LLM 來評估、過濾 COBOL；編譯器驗證提供語法正確性與結構良構性的強且客觀訊號，但無法完整捕捉較深層語意；且以 LLM 選最忠實指令／描述可能引入其訓練資料與偏好造成的偏差；雖以 Pass@1 與雙向翻譯部分緩解，流水線尚未做超出這些檢查的細粒度語意驗證，作者預告未來將探索規範式測試（specification-based testing）與專家在環審查（Dau et al. 2026, §6 Construct Validity, p.22）。\n\n- **效度威脅 — 內部效度（檔案級限制）**：研究以「檔案級」為單位，把每個源檔視為生成、翻譯、評估的獨立單元；此設計簡化基準並利於受控比較，但無法捕捉真實主機系統常見的跨檔依賴、共享 copybook 或跨程式控制流；作者承認倉庫級（repository-level）推理仍是未解問題，並計畫將流水線擴展至倉庫級設定——讓 LLM 需跨多個相互關聯源檔、共享資料定義與系統範圍慣例推理，視之為大規模遺留現代化的關鍵能力（Dau et al. 2026, §6 Internal Validity, p.22）。\n\n- **效度威脅 — 外部效度**：雖涵蓋生成與雙向翻譯的多個資料集，這些基準僅代表工業主機環境多樣性的一個子集；真實系統常涉及專有函式庫、組織特定編碼標準與操作限制，未充分反映於公開資料集；作者以資深開發者的質性回饋補強，但承認參與者數量因專業門檻而必然有限，未來將擴大產業合作與評估規模（Dau et al. 2026, §6 External Validity, p.22-23）。\n\n- **作者自陳的核心教訓**：論文於 §7 歸納四點——(1) 領域特化對遺留語言不可或缺，COBOL 不僅低資源、更是由數十年操作實務塑造的高度脈絡化語言；(2) 遺留↔現代翻譯具根本不對稱性，遺留目標需專屬基準與建模；(3) LLM 最有效的定位是人在環的「初稿生成器」，效益在降低認知負擔與樣板工作時最明顯（遷移與維護情境），而非全自動流水線；(4) 倉庫級與系統級脈絡（copybook、共享資料佈局、JCL、跨程式依賴）是真實採用的關鍵下一步（Dau et al. 2026, §7, p.23-24；§8, p.24）。\n\n---\n\n### 6. Reversa — 以多代理人「逆向文件工程」把遺留系統轉成可追溯的 AI 代理人操作規格\n\n*Macedo et al. 2026, arXiv:2605.18684（巴西 Goiás 聯邦理工學院／巴西 Goiás 聯邦大學）*\n\n![a6-scope](images/a6-scope.jpg)\n\n\n**範圍提醒**：本文與「LLM 對大型代碼庫進行修改與維護」屬**間接相關**。它本身不是一個自動改碼的代理人，而是一個**框架提案＋評估協定＋單一探索性案例研究**，目的在於把遺留系統的隱性知識先轉成「操作規格」，作為下游 coding agent 進行維護／遷移／演化前的輸入層；作者明確聲明不主張對其他方法具有經驗上的優越性，案例僅為「第一個探索性證據點」（Macedo et al. 2026, §1, p.2; Abstract, p.1）。此外案例規模極小（單一教育用 ATM、簡化銀行領域、單一利害關係人、非生產使用），結論的外部效度有限（Macedo et al. 2026, §5, p.10; §7, p.13）。\n\n**定位**：遺留系統把業務規則、架構決策、操作例外與資料慣例累積在程式碼、資料、設定與維護實務中，這些知識常以隱性形式存在；而 LLM coding agent 要在低風險下修改真實系統，需要可靠的上下文、正確性準則與行為契約（Macedo et al. 2026, Abstract, p.1; §1, p.1）。作者指出文獻已分別涵蓋逆向工程、LLM 倉庫文件、規格生成與軟體代理人，但「把沒有顯式規格的遺留軟體轉成帶信賴度與缺口的可追溯操作契約」這個交集仍未被整合（Macedo et al. 2026, §2.5, p.4-5）。Reversa 自我定位為**不取代**人工驗證、靜態分析器、自動文件工具或既有 coding agent，而是以一條「逆向文件工程」管線把它們串接起來，並把遺留程式碼當成證據來源、把人工驗證當成流程的顯式環節（Macedo et al. 2026, §1, p.2; §2.5, p.5; §3, p.5）。論文以四個研究問題（RQ1 多代理人如何把遺留碼轉成代理人可消費的操作規格；RQ2 需要哪些可追溯性與信賴機制以避免規格隱藏不確定性；RQ3 角色分離如何覆蓋理解／綜合／撰寫／審查各階段；RQ4 何種評估協定能衡量規格對 AI 輔助維護的效用）組織全文（Macedo et al. 2026, §1, p.2）。\n\n\n![a6-method](images/a6-method.jpg)\n\n**做法**：\n\n- **「逆向文件工程」的定義與五項貢獻**：作者把 reverse documentation engineering 定義為「從既有系統推導出技術文件與操作規格，使行為、架構、領域規則、缺口與信賴度皆顯式化」的流程；並提出五項貢獻：操作性地定義此概念、提出 Reversa 多代理人框架、提出信賴與缺口模型、設計可跨 coding-agent 引擎移植的架構、提出評估協定並以 COBOL→Go 案例實例化（Macedo et al. 2026, §1, p.1-2）。\n\n- **概念管線（六階段閉環）**：Reversa 把流程組織為 Legacy → Discovery（專門代理人）→ Specifications（operational）→ Review（信賴與缺口）→ Migration（規劃與向前改碼）→ Maintenance（維護與演化），並以一條閉環把變更回饋成新一輪的 discovery、review 與 specification（Macedo et al. 2026, §3.2, Figure 1, p.6）。\n\n- **三層架構**：(1) **安裝與保存層**——引擎偵測、提示、檔案寫入、驗證與 manifest 處理；(2) **代理人層**——可安裝的 skills，各自帶提示、參考資料與模板；(3) **產出物層**——通常落在 `_reversa_sdd/` 目錄，寫入清單(inventories)、分析、單元級規格、可追溯性矩陣、缺口與信賴報告；產出物層刻意遵循當代架構描述實務（以結構化描述、concern、viewpoint 與互補產出物表達系統知識，而非單一圖表或散文）（Macedo et al. 2026, §3.2, p.6）。\n\n- **以 Node.js CLI 發行**：Reversa 是一個 JavaScript CLI，透過 `npx reversa` 執行；進入點 `bin/reversa.js` 分派 `install`、`update`、`status`、`uninstall`、`add-agent`、`add-engine`、`export-diagrams` 等指令。標準安裝以 `npx reversa install` 啟動，會偵測專案中可用的引擎、詢問要安裝哪些代理人團隊、收集專案 metadata，並把狀態結構寫入 `.reversa/`（Macedo et al. 2026, §3.2, p.6）。\n\n- **可移植安裝（跨引擎）**：安裝程式可偵測 Claude Code、Codex、Cursor、Gemini CLI、Windsurf、Antigravity、Kiro、Opencode、Cline、Roo Code、GitHub Copilot、Aider 與 Amazon Q Developer 等引擎；對每個選定引擎，把 skills 複製到該引擎預期的目錄，並安裝對應的進入檔（如 `AGENTS.md`、`CLAUDE.md`、`GEMINI.md` 或引擎專屬規則），使框架不綁定單一代理人介面（Macedo et al. 2026, §3.3, p.6）。\n\n- **`.reversa/` 操作狀態目錄**：集中存放操作狀態，包含 `state.json`、`config.toml`、`config.user.toml`、`plan.md`、一個版本檔、模板、腳本與安裝 metadata（Macedo et al. 2026, §3.3, p.6）。\n\n- **SHA-256 manifest 的保存機制**：Reversa 在 `.reversa/_config/files-manifest.json` 產生一份 SHA-256 manifest，記錄已安裝檔案的雜湊值，使每個檔案可被分類為 intact（完好）、modified（被使用者修改）或 missing（遺失）。`update` 時可更新 intact 或 missing 檔案，而被使用者修改的檔案會被保留；`uninstall` 時同一原則可降低誤刪不屬於 Reversa 或本地已變更內容的風險（Macedo et al. 2026, Abstract, p.1; §3.3, p.6-7）。\n\n- **代理人團隊（角色分離，對應 RQ3）**：核心抽象是一支職責分離的代理人團隊。**Discovery 團隊**涵蓋從初始映射到規格撰寫與審查；另有團隊把週期延伸到遷移、未來演化、定價與結構化輸入的翻譯（Macedo et al. 2026, §3.4, p.7）。\n\n- **各代理人角色與預期產出物**（Table 2）：\n  - `reversa`：協調執行、續跑與啟動其他代理人；產出 `.reversa/` 下的執行計畫與狀態。\n  - `reversa-scout`：映射專案表面、技術堆疊、相依與進入點；產出初始清單與帶證據的訊號(signals)。\n  - `reversa-archaeologist`：深化模組與內部結構的技術分析；產出模組化分析與分類後的技術事實。\n  - `reversa-detective`：擷取業務規則、狀態、權限與隱性例外；產出復原的規則、缺口與決策。\n  - `reversa-architect`：綜合架構、相依、資料與跨元件影響；產出架構、圖表與影響矩陣。\n  - `reversa-writer`：把擷取知識轉成單元級規格；產出 `requirements.md`、`design.md`、`tasks.md` 與可追溯性。\n  - `reversa-reviewer`：審查 claim、信賴度與待人工驗證的缺口；產出信賴報告、問題與剩餘缺口。\n  - `Migration` 團隊：從規格規劃重建或現代化；產出策略、風險、目標架構與 parity 規格。\n  - `Code Forward` 團隊：把新功能意圖轉成需求、路線圖、行動與稽核；產出可追溯回遺留系統的演化產出物（Macedo et al. 2026, §3.4, Table 2, p.7）。\n\n- **信賴／缺口／可追溯性模型（對應 RQ2）**：代理人指令區分三種狀態——**confirmed**（已確認，須在程式碼或可驗證產出物中有直接證據）、**inferred**（推論，可由重複出現的模式、命名、流程或結構支持，但不得寫成確定事實）、**gap**（缺口，無法安全判定、需人工驗證的資訊）。此模型主要體現在 Writer（須帶證據與可追溯性撰寫，證據不足時略去該行）與 Reviewer（重讀規格、回到原始碼核對脆弱 claim、必要時重新分類、把使用者問題彙整進 `questions.md`、`gaps.md`、`confidence-report.md`）（Macedo et al. 2026, §3.5, p.7）。\n\n- **可追溯性矩陣**：在較完整的文件層級，流程還會產生 `traceability/code-spec-matrix.md` 與 `traceability/spec-impact-matrix.md`；設計理由是把不確定性保存成輸出資料，而非主張代理人永不出錯（Macedo et al. 2026, §3.5, p.7-8）。\n\n- **五項設計目標**：(1) 產出可操作契約而非僅敘事說明（記錄預期行為、領域規則、相依、流程、重實作任務與足夠證據）；(2) 每個相關 claim 須可追溯回遺留證據（檔案、模組、route、schema、query 或先前擷取的產出物）；(3) 使不確定性顯式（分離 confirmed/inferred/gap）；(4) 安裝不得破壞或接管遺留專案（安裝檔須註冊、版本化並受 manifest 保護）；(5) 流程須跨 coding-agent 引擎可移植（Macedo et al. 2026, §3.1, p.5）。\n\n- **閉環（discovery–migration–evolution）**：第一週期從遺留系統擷取知識並產出操作規格；Migration 團隊消費這些產出物以規劃現代化、記錄典範決策、選定策略、映射風險、設計目標架構、建模領域與資料、產出 parity 規格；Code Forward 團隊則反向運作，從新功能意圖出發轉成需求與計畫，並稽核與既有規格的一致性。逆向文件因此成為「被維護的操作產出物」，可作為新一輪擷取、迴歸檢查與契約更新的參考（Macedo et al. 2026, §3.6, Figure 2, p.8）。\n\n- **評估協定（五階段，對應 RQ4）**：(1) 記錄專案初始狀態（語言、相依、既有文件、是否有測試、分析版本）；(2) 以 `npx reversa install` 安裝 Reversa，選定引擎、代理人團隊與輸出設定；(3) 執行 Discovery 團隊直到主要產出物生成於 `_reversa_sdd/`；(4) 審查信賴與缺口，收集 `confidence-report.md`、`questions.md`、`gaps.md` 與可追溯性矩陣；(5) 透過人工檢視（可能時也透過 coding agent 執行的下游任務）評估產出物（Macedo et al. 2026, §4, p.9）。\n\n- **評估指標（Table 3）**：協定提出七個候選指標——File coverage（與某規格關聯的相關檔案比例）、Unit coverage（有自己規格的模組／端點／畫面／實體比例）、Traceability density（每個需求／規則／任務的平均證據引用數）、Confidence distribution（confirmed/inferred/gap 的比例，作者註明「不衡量事實準確度」）、Blocking gaps（阻擋安全重實作的缺口數）、Expert precision（獨立人工審查者接受的 claim 百分比）、Agent utility（有無 Reversa 規格時代理人的效能差異）。作者明示在 ATM 案例中 Expert precision 與 Agent utility「未被衡量」（Macedo et al. 2026, §4, Table 3, p.9）。\n\n- **成本記錄與最小產出物包**：協定要求記錄操作成本（執行時間、人工互動次數、生成問題數、產出物大小、審查工作量），並指出「有用但維護太貴的規格在實務團隊中不可行」；每個案例研究應產生最小可稽核產出物包（專案識別、分析版本、Reversa 設定、使用的引擎與團隊、`_reversa_sdd/` 主要產出物、信賴與缺口報告、相關指令、parity 情境、下游任務計畫，以及人工介入時的決策、答案與移出範圍的缺口）（Macedo et al. 2026, §4, p.9-10）。\n\n- **基線設計與比較立場**：作者列出最相關的基線——(i) 單一倉庫文件提示（無角色分解）、(ii) 無先行規格的通用 coding agent、(iii) 適用時的傳統文件或靜態分析工具；並明言 Reversa「不應以文字量比較，而應以效用、可追溯性、顯式不確定性與引導後續行動的能力比較」（Macedo et al. 2026, §4, p.10）。\n\n- **ATM 案例設定**：探索性案例研究分析一個以 COBOL 撰寫、要重實作為 Go 的 ATM 系統。系統名為 `banco-atm`，以 GnuCOBOL 實作基本提款機操作；領域為單使用者、單行程的支票帳戶基本操作；語言為 COBOL，外加一個 C helper 處理無緩衝鍵盤讀取；持久化使用索引式與循序式 `.DAT` 檔；無自動化測試、無 CI/CD、無 Docker。active parity scope 包含五個模組：`MENU`、`CONTA`、`EXTRATO`、`UTIL`、`kbdread`；兩個元件被排除在 parity 之外——`ADD-CLIENTE`（屬 ATM 領域外的技術操作）與 `x25-communication`（只有規格而無對應實作）。目標系統為以 SQLite 持久化、附 Gherkin parity 測試的 Go 重實作（Macedo et al. 2026, §5, §5.1, Table 4, p.10）。\n\n- **ATM 管線執行**：Reversa 管線於 2026/5/4–5/7 執行。Discovery 階段產出清單、程式碼分析、架構、領域模型、狀態機、相依、問題、缺口與信賴報告；Migration 階段產出簡報、典範與拓樸決策、目標業務規則、遷移策略、風險登錄、cutover 計畫、目標架構、領域模型、資料模型、資料遷移計畫、parity 規格、Gherkin 測試與 coding handoff（Macedo et al. 2026, §5.2, p.10）。\n\n\n![a6-findings](images/a6-findings.jpg)\n\n\n**核心發現**：\n\n- **claim 信賴分類規模**：信賴報告對 active scope 共分類 **517 個 claim**；其中 **490 個標為 confirmed、24 個 inferred、3 個 gap**。採用研究中的操作規則（confirmed 計 1.0、inferred 計 0.5），算得**內部信賴指數 97.1%**。作者強調此指數僅代表管線自身指派的分類，**不應解讀為事實精確度**，因為沒有外部稽核（Macedo et al. 2026, Abstract, p.1; §5.3, p.11）。\n\n- **逐模組信賴分布（Table 5，active scope）**：`menu` 32 confirmed／1 inferred／0 gap，指數 98.5%；`conta` 129／6／0，指數 97.8%；`extrato` 124／9／1，指數 95.9%；`util` 115／4／2，指數 96.7%；`kbdread` 90／4／0，指數 97.9%。Active total 為 490 confirmed／24 inferred／3 gap，總指數 97.1%（Macedo et al. 2026, §5.3, Table 5, p.11）。註：Table 5 的 active total（490+24+3=517）與摘要的 517 個 claim 一致。\n\n- **專案層級缺口（Table 6）**：除 claim 級缺口外，流程登錄 **10 個專案缺口**：**3 個 critical、3 個 moderate、2 個 cosmetic、2 個 out of scope**。處置情形為——5 個 critical 或 moderate 缺口以「書面人工決策」解決（3 critical 全數解決、3 moderate 中 2 個解決），3 個維持為 residual（1 個 moderate 殘留 + 2 個 cosmetic 作為低嚴重度殘留），2 個 out-of-scope 被排除在 parity scope 外。作者用此說明 Reversa 的預期功能是「把操作不確定性轉成可見、可排序、可追溯的項目」，而非單純增加文件量（Macedo et al. 2026, §5.3, Table 6, p.11-12）。\n\n- **Gherkin parity 情境**：管線把一個原本「無測試」的系統轉成一組規格產出物與 **53 個 Gherkin parity 情境**，分布於登入、餘額、提款、存款、轉帳、對帳單、金額格式化與鍵盤遮罩等功能；這些情境作為逆向文件與可執行重建之間的橋樑（Macedo et al. 2026, Abstract, p.1; §5.2, p.10-11）。\n\n- **重建計畫進度（Table 7）**：遷移計畫被組織為 **11 個任務**。在清點時（inventory time）**9 個任務已完成**（涵蓋 bootstrap、utilities、keyboard、repository、statement、account、logger、menu 與 CLI entry，產出 Go packages、SQLite、進入點與領域模組）；**Docker parity 任務「進行中」**（產出 53 個 Gherkin 情境與 Parallel Run 策略）；**最終 cutover、最終驗證與 Go release 任務「待處理」**（僅產出 cutover 計畫與技術 handoff）。最終 parity 驗證與 cutover 在本研究中**未完成**（Macedo et al. 2026, Abstract, p.1; §5.3, Table 7, p.11-12）。\n\n- **作者明示的部分執行限制**：作者明言這次部分執行「阻止對最終遷移成功下強結論」，但顯示生成的產出物確實把 Go 實作排出了一個含 packages、SQLite 持久化、進入點、parity 測試與技術 handoff 的順序（Macedo et al. 2026, §5.3, p.11）。\n\n- **案例解讀（三項初步觀察）**：(1) Reversa 能把一個無測試的遺留系統分解成可驗證的領域、架構、缺口、信賴與 parity 產出物；(2) 信賴標記有助於把「已確認行為」與「推論」「證據缺乏」分開；(3) 遷移階段重用了逆向文件以產出計畫、架構決策與可執行情境（Macedo et al. 2026, §5.4, p.11）。\n\n- **案例的自我設限**：作者明確指出案例「只有一個系統、簡單領域、單一利害關係人、且為教育用 COBOL→Go 遷移」，沒有對單一代理人、傳統文件工具或「無規格執行」做受控比較，因此案例只增強框架的合理性並示範其指標，**不能取代 §4 提出的比較研究**（Macedo et al. 2026, §5.4, p.12）。\n\n- **效度威脅—內部效度**：ATM 研究未對單一代理人／傳統文件工具／無先行規格的執行做受控比較，因此無法分離觀察到的進度有多少來自 Reversa、來自利害關係人知識、領域簡單性或遷移中的人工決策；內部信賴指數也是由管線自身分類算出，而非獨立稽核（Macedo et al. 2026, §7, p.13）。\n\n- **效度威脅—建構效度**：信賴分布、缺口、已完成任務等指標捕捉產出物的操作屬性，但**不直接衡量事實準確度、對代理人的效用或最終遷移成功**；ATM 案例中 expert precision 與下游任務效用雖列為協定指標，但未以受控方式衡量（Macedo et al. 2026, §7, p.13）。\n\n- **效度威脅—外部效度**：分析案例是簡化銀行領域的教育用系統，單一利害關係人、無生產使用、無既有測試、COBOL 模組範圍縮減；因此結果**不應自動推廣**到工業遺留系統、受監管領域、較大團隊、含生產相依行為的代碼庫或有複雜外部整合的專案（Macedo et al. 2026, §7, p.13）。\n\n- **效度威脅—結論效度**：Go 重建在清點時為部分完成（11 任務中 9 個完成、Docker parity 進行中、cutover 待處理），因此研究僅支持「合理性與流程結構化」的探索性證據，**不構成最終 parity、成本下降、代理人效能改善或對替代方案優越性的結論性證據**（Macedo et al. 2026, §7, p.13）。\n\n- **作者對框架定位的整體限制聲明**：論文應被讀為「框架＋評估協定＋探索性案例」的呈現，而非有效性的結論性展示；產出物品質取決於代理人、提示、所選引擎、分析專案與證據可得性；對於高度動態的程式碼、規則藏在資料庫中、或行為依賴生產環境的專案，可能需要額外工具——Reversa 不消除這些困難，只是讓它們變得可見、可追溯與可處理（Macedo et al. 2026, §6, p.12-13）。\n\n- **多代理人分解的非主張**：作者明言 Reversa「不主張多代理人總是優於單一代理人」；把 Scout、Archaeologist、Detective、Architect、Writer、Reviewer 分離的理由，是在不同任務之間建立檢查點（映射表面、擷取規則、綜合架構、撰寫規格、審查信賴），使流程更可稽核——錯誤 claim 可追溯回它被引入的階段（Macedo et al. 2026, §6, p.12）。\n\n- **未來工作**：作者計畫把初始研究擴展到不同領域、語言與既有文件程度的遺留專案，納入可稽核產出物包、獨立產出物審查、與單一代理人及傳統文件基線的受控比較、由 coding agent 執行的下游任務量測，以及維護規格成本的分析，目標是把此提案轉成關於逆向文件工程在 AI 代理人輔助維護／遷移／演化中角色的系統性證據（Macedo et al. 2026, §8, p.14）。\n\n- **生成式 AI 使用聲明**：作者揭露在研究準備期間使用 Grammarly 改善文字一致性、並使用 OpenAI/Codex 協助文字結構化與英譯，使用後作者已審閱編輯並對內容負全責（Macedo et al. 2026, Generative AI Use Statement, p.14）。\n\n---\n\n### 7. SaaSBench — 評估編碼 agent 從零打造企業級 SaaS 系統的長程基準\n*Ren et al. 2026, arXiv:2605.17526（中國科學技術大學、阿里巴巴集團 AMAP）*\n\n![a7-scope](images/a7-scope.jpg)\n\n\n**範圍提醒**：SaaSBench 評估的並非「對既有大型代碼庫進行修改與維護」，而是「依自然語言需求**從零（from scratch）打造並部署**一套完整企業 SaaS 系統」——agent 在空白工作目錄中重建論文挑選的開源產品（Ren et al. 2026, §1, p.2；§3.1, p.5）。與本研究主題（LLM 對大型代碼庫的修改維護）的關聯有二：(1) SaaSBench 的受測對象與技術棧（OpenHands、Claude Code、Codex CLI 等 agent 框架，跨 8 種語言、13 種前後端框架）與代碼庫維護任務高度重疊，其能力邊界結論可直接外推；(2) 論文的核心發現——agent 的瓶頸不在生成孤立的程式邏輯，而在於跨組件的整合、環境配置與長程除錯——對「在既有大型代碼庫上做整合性修改」同樣具高度警示意義。侷限在於：SaaSBench 不含「既有代碼理解、定位、增量改動、迴歸不破壞」這類維護任務特有的考驗，論文自身在 §F 未來工作中也將「系統維護任務、迭代式需求更新、多階段產品演進」明列為尚未涵蓋的方向（Ren et al. 2026, §F, p.29）。引用本論文於代碼庫維護論述時應限定在「能力邊界 / 失敗模式」層面。\n\n**定位**：論文指出現有編碼基準雖已從局部程式編輯（HumanEval、SWE-Bench 等）演進到「從零生成專案」（NL2Repo-Bench、PRDBench、RepoGenesis、ProjDevBench 等），但仍受限於結構簡化、單一技術棧的應用，無法刻畫真實企業 SaaS 的異質環境、全棧協同與系統級複雜度（Ren et al. 2026, Abstract, p.1；§1, p.2）。作者具體歸納既有工作的三大缺口：缺乏真實市場錨定（任務先定再抽象分類，缺乏穩定產品形態與業務邊界）、系統複雜度不足（多圍繞單一語言/組件/弱耦合架構）、評估機制不足（依賴單元測試通過率等扁平訊號，無法表達前置依賴與狀態約束）（Ren et al. 2026, §1, p.2）。論文自我定位為「**第一個**系統性針對真實企業級 SaaS 開發場景設計的編碼 agent 基準」，並設計一套依賴感知的混合評估範式以填補上述缺口（Ren et al. 2026, §1, p.3，三項貢獻列表）。\n\n\n![a7-method](images/a7-method.jpg)\n\n**做法**：\n\n- **整體建構流程**：SaaSBench 由資深博士研究者與 Cursor 協作建成；單一任務需經多階段系統化流程——候選倉庫審計、PRD 撰寫、KB（知識庫）組織、標準化容器環境準備、DAG 測試套件實作、嚴格品質驗證（Ren et al. 2026, §3, p.4；Fig. 2, p.4）。\n\n- **領域定義與種子倉庫挑選（自頂向下）**：領域空間並非由倉庫自底向上拼湊，而是由商業 SaaS 市場自頂向下推導。先取廣義市場區段，再逐步細分，直到每個保留類別同時滿足三條件：(i) 對應穩定商業用例、(ii) 有可辨識的產品形態、(iii) 至少存在一個標註者能成功建置並啟動的生產級開源實作（Ren et al. 2026, §A.1, p.14）。最終 30 個細類沿兩軸（價值鏈位置：前/中/後台；服務對象：外部客戶 vs 內部使用者/系統）組織為 6 大家族：Customer & Growth（CG）、Productivity & Collaboration（PC）、Commerce & Finance（CF）、Data & Content Infrastructure（DCI）、Security, Identity & Infra（SI）、Domain & Workflow（DW）（Ren et al. 2026, §A.1, p.14；Fig. 3, p.6）。\n\n- **類別正交性審計**：對所有 C(30,2)=435 個類別對做四維度正交性審計（D1 核心業務物件、D2 核心使用者角色、D3 主導讀寫模式、D4 核心架構挑戰）；判定規則為 4/4 distinct=完全正交、3/4=仍獨立僅一維局部重疊、2/4=需額外壓力測試、0–1/4=合併或移除。結果 421 對完全正交，其餘 14 對僅在單一維度有界局部重疊，無任何一對落入 2/4 以下的風險區（Ren et al. 2026, §A.1, p.14）。6 大家族滿足 MECE（互斥且窮盡）原則（Ren et al. 2026, §A.2, p.15）。\n\n- **種子倉庫要求**：候選倉庫須有持續維護與社群活躍訊號、為完整 SaaS 系統形態、保有清楚的單一業務邊界；標註者對候選倉庫做冷啟動驗證（須能獨立建置、成功啟動並通過基本 smoke test）。每類別策展多個候選但在固定標註預算下最終僅保留 1 個種子倉庫進入後續流程（Ren et al. 2026, §3.1, p.5；§A.3, p.16）。\n\n- **PRD（產品需求文件）建構**：標註者與 agent 深入分析每個種子倉庫的程式碼結構、配置檔、資料模型、路由定義、既有業務邏輯，據此生成長上下文 PRD。與多數僅保留簡短問題描述或功能清單的基準不同，SaaSBench 的 PRD 盡量保留系統級資訊：技術需求、完整資料模型、核心業務流程、API 合約、權限政策、邊界規則、部署約束、建置步驟。**PRD 平均約 4,363 行**（Ren et al. 2026, §3.1, p.5；§3.4, p.7）。\n\n- **KB（歧義消解知識庫）建構**：真實開發中客戶常基於原型再給細部回饋，單靠 PRD 無法穩定表達所有對評估敏感的細節；故另建歧義消解 KB，每筆記錄對應一個影響正確性但難以用自然語言穩定表達的行為細節（如預設分頁規則、刪除語意、fallback 邏輯），每筆 KB 條目結構為 {id, question, answer, source_reference, confidence}（Ren et al. 2026, §3.1, p.5；§C.1, p.25）。\n\n- **標準化容器環境**：每個任務建一容器化標準執行環境，預裝所需系統套件、系統依賴、資料庫服務、port mapping 與環境變數（Ren et al. 2026, §3.1, p.5）。\n\n- **DAG 評估範式（核心方法論創新）**：將評估組織為有向無環圖 G=(V,E)，每個節點 v 為獨立計分的驗證單元，每條邊 e 顯式表示節點間的前置依賴。透過「前置依賴閘控、失敗傳播控制、三種計分機制」實現可重現的客觀評估（Ren et al. 2026, §1, p.2；§3.2, p.5）。每個節點含一條由基本驗證 primitive 依序組成的 primitive chain（Ren et al. 2026, §3.2, p.5）。\n\n- **三種節點計分機制**：(i) **binary**——用於必須完全正確的安全關鍵情境（如權限閘控、認證），只有 primitive chain 全數通過才得滿分 M_v，否則 0，且 binary chain 在首次失敗即短路；(ii) **weighted**——用於允許部分完成的多步 CRUD 工作流與覆蓋檢查，得分按通過 primitive 比例縮放並四捨五入至一位小數，weighted chain 會跑完全程；(iii) **llm-as-judge**——僅在確定性斷言無法刻畫目標時使用（如頁面版面合理性、架構組織品質），由 Claude Sonnet 4.5 在 temperature=0 下對 rubric+evidence 給分並 clip 到 [0, M_v]（Ren et al. 2026, §3.2, p.5；§B.4, p.21；§4.1, p.7）。\n\n- **狀態分類與依賴閘控**：每節點終止於六種狀態之一——PASSED、FAILED、ERROR、SKIPPED_DEPENDENCY、SKIPPED_LLM、DRY_RUN。依賴導致的 skip 其 s_v=0 但 M_v 仍留在分母（讓基礎性失敗公平累計為 0/M_v 而非被靜默丟棄，且失敗只歸因到根因前置而非每個下游節點重複懲罰）；SKIPPED_LLM 則同時從分子與分母移除，使裁判 API 暫時故障不會人為壓低分數（Ren et al. 2026, §B.4, p.21）。\n\n- **計分聚合（節點→任務→基準）**：單次 rollout 內，任務分數 S_t = 100 × (Σ s_v / Σ M_v)，對非 SKIPPED_LLM 節點集計算；基準分數為 30 個任務的非加權平均 S̄ = (1/30)ΣS_t，縮放至 [0,100]。採用平均而非 max-pooled 總和，是因各任務 total_maxScore 跨度大（174 至 1,489），避免大型 DAG 主導總分（Ren et al. 2026, §B.2, p.17；§B.4, p.21–22）。\n\n- **六大工程能力維度（評估骨幹）**：每個驗證節點映射到六個工程能力骨幹之一——Deploy（部署）、Data（資料）、API、Logic（業務邏輯）、AuthZ（存取控制）、Quality（品質）。映射並非任意，而是先由標註者為每節點標 fine-grained category（全任務共 289 個不同類別），再經一份手工策展的 exact-match 字典加四條前綴規則確定性映射到六骨幹，並驗證涵蓋全部 5,370 節點（Ren et al. 2026, §3.2, p.5；§B.6, p.22–23）。\n\n- **DAG 驗證 primitive 庫**：節點內的 primitive chain 取自固定 primitive 庫，全任務共觀察到 18,196 次 primitive 呼叫；主要 primitive 包括 P04 HTTP request（3,941 次）、P13 authenticated login（CRITICAL，3,453 次）、P15 HTTP status-code assert（3,329 次）、P07 JSON value assert（2,595 次）、P08 raw SQL/NoSQL query（1,143 次）、P02 file content match（143 次）、P17 rubric-based LLM scoring（402 次）等（Ren et al. 2026, §B.5, p.22, Table 12）。\n\n- **任務數與技術棧分佈**：30 個任務（CG 7、PC 6、CF 5、DCI 5、SI 4、DW 4 — 註：原文 §A.2 列 CG 7/PC 6/CF 4/DCI 4 等項加總應為 30，依 Table 9 任務目錄為準）；共 5,370 個可執行驗證節點、6,167 條前置依賴邊；涵蓋 8 種程式語言（TypeScript 為大宗，另有 Ruby、Go、Python、PHP、Java/JS、Elixir 等）、6 種資料庫類型（PostgreSQL 為大宗，另 MySQL/MariaDB、MongoDB、SQLite、ClickHouse 等）、5 種前端框架、8 種後端框架（Ren et al. 2026, §1, p.2；§3.4, p.7；Fig. 3, p.6；Table 9, p.19）。代表性種子倉庫如 Email & Newsletter 用 listmonk（Go，19k stars）、CRM 用 twenty（TypeScript，40k）、Help Desk 用 chatwoot（Ruby，28k）、Project Mgmt 用 plane（46k）、Workflow Automation 用 n8n（TypeScript，180k stars）（Ren et al. 2026, §A.3, p.16；Table 9, p.19）。\n\n- **品質驗證雙閘**：(1) PRD 對齊驗證——初版 PRD 完成後，另兩名標註者依結構化檢查表對照種子倉庫核對，記錄遺漏/不一致/欠規格項並退回作者修訂，反覆至收斂，以降低需求遺漏與幻覺需求；(2) 測試套件品質保證——將種子倉庫的上游原始碼部署於與評估相同的標準環境，要求參考實作通過完整測試套件（llm-as-judge 節點允許有界變異），唯有通過此驗證的任務才納入基準，未通過者修訂至收斂（Ren et al. 2026, §3.3, p.6）。\n\n- **受測 agent 與 LLM 後端**：評估三種編碼 agent 框架——OpenHands（v1.6.0，跑內建 CodeActAgent）、Claude Code（@anthropic-ai/claude-code v2.1.126，headless 模式）、Codex CLI（codex-cli 0.128.0，single-shot 模式）；八個 LLM 後端：GPT-5.4、Gemini 3.1 Pro、Claude Opus 4.7、Kimi K2.6、Qwen 3.6 Plus、DeepSeek V4 Pro、GLM 5.1、MiniMax M2.7（Ren et al. 2026, §4.1, p.7；§B.3, p.17–20；Table 11, p.20）。\n\n- **實驗設定與預算**：採 pass@1（每配置每任務單次 rollout，任務失敗後不做 oracle 重試）；互動預算為每個 rollout 上限 500 個 reasoning–action 步（OpenHands 的 max_iterations=500，Codex/Claude Code 取各自類比內部上限），wall-clock 預算 10,800 秒；單一工具呼叫（如 npm install、prisma migrate）允許各跑至多 900 秒；網路層失敗（HTTP 429/529、gateway 超載、連線重置）以 10–60 秒指數退避重試至多五次（Ren et al. 2026, §B.1, p.16–17）。temperature 在支援處設為 0；需非零取樣的 reasoning 模型（Claude/Kimi/Qwen/DeepSeek/GLM、GPT-5.4 reasoning_effort=xhigh）依各廠商建議用 temperature=1.0（Ren et al. 2026, §B.3, p.19–20）。Agent task prompt 由四個 block 串接：反作弊聲明（禁止 git clone/wget/curl 等匯入既有開源碼，違者該軌跡記 0 分）、角色與環境規格、需求文件與 KB 指標、成功條件（伺服器須在指定 port 可達）；PRD（task.md）與 KB（knowledge_base.json）以檔案形式置於工作目錄而非嵌入 prompt body，因 4,363 行 PRD 嵌入每輪會耗盡上下文預算（Ren et al. 2026, §C.1, p.25–26）。\n\n\n![a7-findings](images/a7-findings.jpg)\n\n\n**核心發現**：\n\n- **SaaSBench 是高難度基準，SOTA agent 表現極低**：最佳成績僅 **20.68%**（Pass@1），由 Claude Code 框架搭配 Claude Opus 4.7 取得；Claude Code 框架平均 11.64%，OpenHands 框架平均 9.26%。作者據此判定當前 LLM 編碼 agent 仍無法依自然語言需求可靠地從零生成完整企業級 SaaS，端到端 SaaS 構建遠未解決（Ren et al. 2026, §4.2, p.8；Abstract, p.1）。\n\n- **Table 2 主結果逐項讀數（OpenHands 框架）**：Pass@1 由低到高為 Qwen 3.6 Plus 4.09、MiniMax M2.7 6.78、GPT-5.4 7.44、Gemini 3.1 Pro 8.10、Kimi K2.6 8.36、GLM 5.1 10.23、DeepSeek V4 Pro 10.97、Claude Opus 4.7 18.12；對應 Node Coverage 分別為 5.85 / 6.43 / 8.83 / 8.91 / 8.94 / 11.21 / 10.55 / 18.24（Ren et al. 2026, §4.2, Table 2, p.7）。\n\n- **Table 2 主結果逐項讀數（Claude Code 框架）**：Pass@1 為 Qwen 3.6 Plus 5.95、MiniMax M2.7 9.26、Kimi K2.6 9.70、GPT-5.4 10.62、Gemini 3.1 Pro 10.12、DeepSeek V4 Pro 13.19、GLM 5.1 13.60、Claude Opus 4.7 20.68；對應 Node Coverage 為 6.10 / 10.62 / 9.70 / 9.81 / 10.12 / 12.13 / 15.28 / 18.50（Ren et al. 2026, §4.2, Table 2, p.7；Fig. 1, p.2）。同一模型在不同框架下成績差距明顯（如 GPT-5.4 在 OpenHands 7.44 vs Claude Code 10.62；MiniMax M2.7 6.78 vs 9.26）。\n\n- **跨 SaaS 領域表現不均**：模型在 SI（Security, Identity & Infra）與 DCI（Data & Content Infrastructure）相對較佳，在 CF（Commerce & Finance）與 PC（Productivity & Collaboration）一致較弱。作者解讀為：當前 agent 較能處理結構清楚、介面邊界明確的基礎設施導向任務，但在涉及複雜業務語意、長程狀態依賴、多使用者協作的場景仍困難重重——尤其 CF 的計費/訂單/財務狀態一致性、PC 的行事曆互動與共享狀態管理，要求 agent 維持前端、後端、資料庫、權限邏輯間的跨組件一致性（Ren et al. 2026, §4.2, p.8）。以 Claude Opus 4.7 在 Claude Code 框架下的領域分數為例：CG 21.51、PC 9.30、CF 15.65、DCI 37.14、SI 34.35、DW 7.06（Ren et al. 2026, §4.2, Table 2, p.7）。\n\n- **跨工程能力維度表現不均（Table 3）**：失敗在六維度上非均勻分佈。**Deploy 通常是得分最高的維度**，顯示 agent 已具一定的服務啟動與基本 runtime 環境配置能力；**Data 居中**；**API、Logic、AuthZ 偏低**，顯示介面合約一致性、持久狀態建模、業務狀態轉移、角色式存取控制有明顯困難；**Quality 是最突出的瓶頸**，分數遠低於其他維度——意味著即使 agent 能成功起服務並實作部分本地功能，仍欠缺足夠的程式組織、前端渲染品質、邊界情況處理與整體工程穩健性（Ren et al. 2026, §5.1, p.8）。以 Claude Opus 4.7（Claude Code）為例六維度分數：Deploy 22.76、Data 14.57、API 7.92、Logic 8.79、AuthZ 11.55、Quality 2.66（Ren et al. 2026, §5.1, Table 3, p.8）。\n\n- **5,370 節點在六骨幹的分佈與權重設計**：Deploy 289 節點（5.4% 節點數、640.8 maxScore、佔總分 3.7%）、Data 854 / 15.9% / 1901.0 / 11.0%、API 1216 / 22.6% / 3253.3 / 18.8%、Logic 1179 / 22.0% / 4698.0 / 27.2%、AuthZ 1023 / 19.1% / 3239.5 / 18.7%、Quality 809 / 15.1% / 3566.6 / 20.6%；總計 5,370 節點、17,299.1 maxScore。權重刻意非均勻：Logic 以 27.2% 最高（業務行為是區隔真實 SaaS 與一般網站的主因），Deploy 以 3.7% 最低（每任務僅需少量節點認證服務在跑）（Ren et al. 2026, §B.6, Table 13, p.23）。\n\n- **核心洞見——瓶頸不在生成孤立程式邏輯，而在配置與整合多組件系統**：論文最關鍵的發現是 **超過 95% 的任務失敗發生在 agent 觸及深層業務邏輯之前**；模型常因過度自信而在基礎環境設置階段提前停止，或陷入無效的除錯迴圈（Ren et al. 2026, Abstract, p.1；§5.4, p.9–10）。\n\n- **互動回合與表現分析（Table 4，OpenHands）**：更多步數不保證更高完成度。逐模型（Pass@1 / 步數 / token / 時間）：Qwen 3.6 Plus 4.09 / 258 步 / 12.4M / 1h 12m；Kimi K2.6 8.36 / 159 / 9.0M / 1h 24m；MiniMax M2.7 6.78 / 279 / 24.4M / 56m 12s；GPT-5.4 7.44 / 36 / 1.4M / 16m;Gemini 3.1 Pro 8.10 / 84 / 4.1M / 12m 52s；DeepSeek V4 Pro 10.97 / 223 / 9.8M / 1h 24m；GLM 5.1 10.23 / 218 / 8.2M / 1h 52m；Claude Opus 4.7 18.12 / 102 / 29.5M / 29m 55s（Ren et al. 2026, §5.3, Table 4, p.9）。\n\n- **兩種典型互動病態**：(1) **互動不足/過早收斂**——GPT-5.4 僅執行 36 步即收手卻得 7.44%，顯示單步生成品質高但長程除錯與系統驗證不足；(2) **無效的長程互動**——MiniMax M2.7 執行 279 步卻僅得 6.78%，許多嘗試淪為反覆除錯、局部修補或低效探索。結論：長程 SaaS 開發更依賴高品質的 reason-act-observe 迴圈，而非更大的互動預算（Ren et al. 2026, §5.3, p.9）。\n\n- **Agent 框架的影響（Figure 4a）**：同一底層模型在不同 agent 框架下表現差異顯著；商用 IDE 型框架通常勝過開源 agent 框架。以 GPT-5.4 為例三框架成績約 7.44（OpenHands）/ 14.57（Codex CLI）/ 10.62（Claude Code），Claude Opus 4.7 約 18.12 / 18.81 / 20.68（Ren et al. 2026, §5.2, Fig. 4a, p.9）。差距主因在於各框架管理工具呼叫、上下文、執行回饋的方式：商用 IDE 型框架與檔案編輯、終端執行、診斷資訊、中間專案狀態整合更緊密，降低模型追蹤工作區變動與從失敗指令復原的負擔；開源框架則要求模型承擔更高協調成本。作者強調 SaaSBench 評估的不是孤立 LLM，而是「模型+工具介面+執行迴圈+環境回饋+記憶機制+錯誤復原策略」耦合而成的系統（Ren et al. 2026, §5.2, p.9）。\n\n- **失敗軌跡分類 T1–T5（Figure 4b、§B.7）**：作者從兩個 agent 取 480 個能力單元，依執行軌跡分五類（由最強 T1 到最早崩潰 T5）。**T1 紀律化端到端執行**——理想軌跡，按部署→資料 schema→認證→授權→品質的紀律順序逐層驗證後再建下游；480 單元樣本中**無任何單元落入此類**。**T2 單骨幹瓶頸**——系統大致可運作、僅單一能力骨幹有局部失敗（傳統「最弱環節」解釋），僅佔 0.6%。**T3 可運作但業務邏輯淺**——基礎設施與主執行路徑可動、能起服務並滿足簡單 happy path，但未能落實邊界情況、配額、信任等級、錯誤處理、工作流約束等細節業務需求。**T4 表面可達但結構不完整**——系統從外部看似可達（HTTP 入口能回應），但 migration、schema 約束、認證 bootstrap、session 處理或 RBAC 前置仍不完整，下游 API 與業務邏輯失敗皆因建在不穩基礎上。**T5 不可運作或不穩定棧**——最早最嚴重的失敗，系統從未可靠運作或在基本探測下變得不穩，典型成因含依賴衝突、Docker/服務配置錯誤、缺健康檢查、migration 損壞、工作目錄/port/volume 錯誤、在棧真正跑起來之前就宣稱成功（Ren et al. 2026, §5.4, p.9–10；§B.7, p.24, Fig. 4b, p.9）。\n\n- **失敗軌跡量化結論**：**T5 佔全部能力單元的 63.5%**（生成的棧從未穩定運行）、**T4 佔 32.1%**（僅表面可達但結構不完整）、**T4+T5 合計 95.6%**；僅 **3.8% 進展到「不完整業務邏輯成為主要瓶頸」的階段**（即 T3 層級）。作者據此論斷：真實企業級 SaaS 開發首先考驗的是流程紀律、部署穩定性、依賴管理、schema 正確性與可重現執行，而非孤立的演算法或 API 技巧；當前 SOTA agent 的關鍵侷限不是「無法實作特定進階業務邏輯」，而是「無法穩定完成端到端的工程設置」（Ren et al. 2026, §5.4, p.9–10）。\n\n- **與既有基準的對比定位（Table 1）**：相對 snippet 級基準（HumanEval、MBPP、APPS、SWE-Bench 等多為 Python、無跨組件/工作流深度）與 repo/專案級基準（ProjectEval、NL2Repo-Bench、RepoGenesis、PRDBench、ProjDevBench），SaaSBench 在「from scratch、market-grounded、deployable runtime、multi-language、cross-component、workflow depth、semantic judge、workflow dependency」八項上幾乎全數完整支援，PRD 平均行數 4,362.7 遠高於對照組（NL2Repo-Bench 2452.64、ProjDevBench 283.85、PRDBench 105.22 等）（Ren et al. 2026, §1, Table 1, p.3）。\n\n- **作者自陳的限制與未來工作**：論文承認真實軟體開發高度多樣且持續演化，SaaSBench 無法涵蓋企業軟體構建的所有變體、也無法窮盡所有定性工程因素；未來工作有二方向——(1) 增加任務數、擴充 SaaS 類別、涵蓋更廣技術棧（候選倉庫池已於 §A.3/Table 10 釋出，預算足夠時可擴增任務）；(2) 支援更動態的開發場景，明列「**迭代式需求更新、系統維護任務、多階段產品演進**」為待補方向（Ren et al. 2026, §F, p.29；§A.3, p.16）。此外作者於 §B.6 末註明 evaluation 刻意關閉了 IDE 互動式使用中的 human-in-the-loop 引導通道，因此 SaaSBench 分數應視為「同一框架在真實互動使用下成績的嚴格下界」（Ren et al. 2026, §B.6/原文 p.20「Comparison with the Original IDE-Integrated Experience」段）。\n\n---\n\n### 8. Heimdallr — 首個針對 GitHub CI 工作流程中「LLM 引發安全風險」的系統性刻劃與偵測研究\n*Ruan et al. 2026, arXiv:2605.05969（新加坡國立大學；ByteDance）*\n\n![a8-scope](images/a8-scope.jpg)\n\n\n**範圍提醒**：Heimdallr 是一篇 LLM-in-CI 的安全研究，本身**並非「以 LLM 修改／維護大型代碼庫」的案例**，而是研究「當 LLM 被嵌入 CI 工作流程後所產生的攻擊面」。它與本研究主題的關聯在於：(1) 它提供了 LLM 已被大規模採用於軟體工程自動化的**實證證據**——從約 520 萬個 workflow 檔（約 150 萬個內容唯一規格）中篩出 50,354 個整合 LLM 的工作流程、涵蓋 29,202 個 repo（Ruan et al. 2026, §6.2, p.8）；其中許多工作流程正是用 LLM 做程式碼審查、issue triage、內容生成與「修改／提交 PR」等維護動作（Ruan et al. 2026, §1, p.1）。(2) 它揭示了「用 LLM 自動修改 repo」這條路徑本身的安全代價——例如 Gemini @mention bot 自動 commit 並 auto-merge 攻擊者操控的程式碼（§6.5.3, p.12）。**侷限**：論文不評估 LLM 修改程式碼的正確性、效率或工程效益，無法直接回答「LLM 修改大型代碼庫成效如何」；它的價值是為該主題提供「採用普及度」與「風險邊界」這兩個側面的可追溯素材。\n\n**定位**：論文主張 GitHub CI 工作流程日益整合 LLM 來自動化審查、triage、內容生成與 repo 維護，這使外部可控的工作流程輸入（issue、PR 文字、comment、程式碼 diff）能塑造 LLM 的 prompt 與輸出，進而影響安全決策、repo 狀態或特權執行，形成全新攻擊面；論文自我定位為「**首個**對 GitHub CI 中 LLM 引發安全風險的全面研究」（Ruan et al. 2026, Abstract, p.1; §1, p.1）。相對既有工作的新意有二：既有 CI 安全研究只處理傳統弱點（不安全配置、腳本注入、過度授權），既有 prompt-injection 研究只處理 LLM 框架／coding agent，兩者交集從未被探討（Ruan et al. 2026, §1, p.1; §8, p.13）。論文指出 LLM 從兩個根本面改變攻擊面：(a) LLM 在工作流程中引入一個「語意解譯器」，攻擊者可控文字不再是被動資料、可
