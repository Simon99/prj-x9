ng tools in IDEs |\n| 2503.12374 | Process-Oriented Error Analysis of Software D | 對 LLM 軟體開發 agent 所犯錯誤的過程導向實證分析 | Empirical process-oriented analysis of errors made by LLM-based software dev agents |\n| 2509.07763 | Refactoring Motivations: Empirical Study | 分析 LLM 輔助開發中重構決策動機的實證研究 | Empirical study analyzing motivations behind refactoring decisions in LLM-assisted develop |\n| 2509.14745 | Agentic Coding PRs Empirical Study (NAIST) | NAIST 針對 agentic coding pull request 特徵的實證研究 | NAIST empirical study on characteristics of agentic coding pull requests |\n| 2509.17548 | Prompts as Software Engineering Artifacts: Su | 將 prompt 視為一等軟體工程 artifact 的調查／實證研究 | Survey/empirical study treating prompts as first-class software engineering artifacts |\n| 2510.04997 | AutoEmpirical: LLM for Empirical Fault Analys | 以 LLM 自動化軟體維護中的實證故障分析 | LLM-based automation of empirical fault analysis for software maintenance |\n| 2511.20613 | Can Vibe Coding Beat Graduate CS Students? LL | LLM 生成程式碼與人類程式碼在競技程式設計上的大規模實證比較 | Empirical tournament comparing LLM-generated code vs human code for competitive programmin |\n| 2512.02393 | Process-Centric Analysis of Agentic Software  | 以流程為核心對 agentic 軟體工程系統軌跡的實證分析 | Process-centric empirical analysis of agentic software engineering system trajectories |\n| 2512.15003 | SeBERTis: Security Issue Report Classifier (o | SeBERTis 安全議題分類作為 LLM 在 SE pipeline 中的實證，不屬於 off-topic | SeBERTis security issue classification 為 LLM 在 SE 管線的實證，不算 off-topic |\n| 2512.18567 | AI Code in the Wild: Security Risks and Ecosy | AI 生成程式碼普及率與安全影響的大規模實證量測 | Large-scale empirical measurement of AI-generated code prevalence and security impact |\n| 2512.21757 | How Do Agents Perform Code Optimization? Empi | agent 撰寫與人工撰寫程式碼最佳化 PR 的實證比較 | Empirical comparison of agent-authored vs human-authored code optimization PRs |\n| 2511.02203 | LLMs as Judges: Reviewing GSN Assurance Cases | 以 LLM 擔任評審，用於安全關鍵保證案例審查；安全工程情境 | LLM-as-judge for safety-critical assurance case review; safety engineering context |\n| 2512.18456 | SoK: Security Issues Across AI4Code Use Cases | 對 149 篇 AI4Code 安全論文的系統化整理；涵蓋漏洞偵測、生成、翻譯 | Systematization of 149 papers on AI4Code security; vulnerability detection, generation, tr |\n\n## G/G7 — Security survey（1 篇）\n\n| arxiv | 標題 | 理由(中) | 理由(EN) |\n|---|---|---|---|\n| 2410.06949 | Beyond Boundaries: LLMs for Autonomous SE Res | 關於 LLM 推動自主 SE 研究的願景論文 | Vision paper on LLMs advancing autonomous SE research |"}, {"key": "anchors", "name": "Anchor refs", "count": "498", "file": "anchor-refs-v3-overview.md", "content": "# 498 Anchor refs v3（含 abstract 中譯）\n\n_483 已分類，398 有 abstract 中譯；按 cite 次數排序；2026-05-28_\n\n## 主類分布\n| 類 | 篇 |\n|:-:|---:|\n| A | 87 |\n| B | 89 |\n| C | 57 |\n| D | 53 |\n| E | 31 |\n| F | 85 |\n| G | 81 |\n\n# [C] repo-level Agent 框架 ⭐（57 篇）\n\n\n## C/C1 — Minimalist(Agentless)（1 篇）\n\n\n**[60× 本地 / 351 全球] 2407.01489 — Agentless: Demystifying LLM-based Software Engineering Agents**\n\n> 大型語言模型（LLMs）的近期進展顯著推進了軟體開發任務的自動化，包括程式碼合成、程式修復和測試生成。近來，研究人員與業界實踐者開發了各種自主 LLM agent 以執行端到端的軟體開發任務。這些 agent 具備使用工具、執行命令、觀察環境反饋和規劃未來行動的能力。然而，這些基於 agent 的方法的複雜性，加上當前 LLMs 的有限能力，引發了以下問題：我們真的必須採用複雜的自主軟體 agent 嗎？為了嘗試回答這個問題，我們構建了 Agentless——一種自動解決軟體開發問題的無 agent 方法。與 agent 方法的繁瑣複雜設置相比，Agentless 採用了定位、修復、修補驗證三個階段的簡單流程，不讓 LLM 決定未來行動或操作複雜工具。我們在 SWE-bench Lite 基準上的結果顯示，這種簡單的無 agent 方法令人驚訝地能夠實現最高效能。\n\n\n## C/C2 — Full-stack agent（16 篇）\n\n\n**[51× 本地 / 622 全球] 2407.16741 — OpenHands: An Open Platform for AI Software Developers as Generalist Agents**\n\n> 軟體是人類手中最強大的工具之一，它允許熟練的程式設計師以複雜而深刻的方式與世界互動。與此同時，隨著大型語言模型（LLMs）的改進，能夠與周圍環境互動並施加影響的 AI Agent 也得到了迅速發展。本文介紹 OpenHands（前稱 OpenDevin），一個用於開發功能強大且靈活的 AI Agent 的平台，這些 Agent 以類似人類開發者的方式與世界互動：撰寫程式碼、與命令列互動以及瀏覽網頁。我們描述了該平台如何支援新 Agent 的實現、與沙箱環境的安全互動以執行程式碼、多 Agent 協作以及評估基準的整合。基於目前整合的基準，我們在 15 個挑戰性任務上評估 Agent，包括軟體工程（如 SWE-BENCH）和網頁瀏覽（如 WEBARENA）等。OpenHands 以寬鬆的 MIT 授權發布，是一個橫跨學術界與業界的社群專案，貢獻者逾 2.1K。\n\n\n**[45× 本地 / 1,077 全球] 2405.15793 — SWE-agent: Agent-Computer Interfaces Enable Automated Software Engineering**\n\n> 語言模型（LM）agent 在數位環境中自動完成複雜任務的應用日益廣泛。正如人類受益於整合開發環境等強大軟體應用來完成軟體工程等複雜任務，我們認為 LM agent 代表了一類具有自身需求與能力的新型終端用戶，並將從專為其設計的軟體介面中受益。我們研究了介面設計對 LM agent 性能的影響，並由此推出 SWE-agent——一個支援 LM agent 自主使用電腦解決軟體工程任務的系統。SWE-agent 的客製化 agent-computer interface（ACI）顯著增強了 agent 建立與編輯程式碼檔案、瀏覽完整儲存庫及執行測試和其他程式的能力。我們在 SWE-bench 和 HumanEvalFix 上對 SWE-agent 進行評估，分別以 12.5% 和 87.7% 的 pass@1 達到最優水準，遠超先前非互動式 LM 所取得的最優結果。最後，我們深入探討了 ACI 設計如何影響 agent 的行為與性能。\n\n\n**[26× 本地 / 89 全球] 2409.00899 — MarsCode Agent: AI-native Automated Bug Fixing**\n\n> 大型語言模型（LLM）的最新進展在自動化各種軟體開發任務方面展現出巨大潛力，包括程式碼補全、測試生成和錯誤修復。然而，由於真實世界軟體系統的複雜性和多樣性，LLM 在自動化錯誤修復中的應用仍具挑戰性。本文介紹 MarsCode Agent，一個利用 LLM 自動識別和修復軟體程式碼中錯誤的新型框架。MarsCode Agent 結合 LLM 的能力與先進的程式碼分析技術，以精確定位故障並生成補丁。我們的方法遵循系統化的流程，包括規劃、錯誤重現、故障定位、候選補丁生成和驗證，以確保高品質的錯誤修復。我們在 SWE-bench（一個涵蓋真實世界軟體專案的全面基準測試）上評估了 MarsCode Agent，結果表明與大多數現有自動化方法相比，MarsCode Agent 在錯誤修復方面達到了較高的成功率。\n\n\n**[23× 本地 / 215 全球] 2404.05427 — AutoCodeRover: Autonomous Program Improvement**\n\n> 數十年來，研究人員在自動化軟體開發過程方面取得了重大進展。大型語言模型（LLMs）的最新進展顯著影響了開發過程，開發人員可以使用基於 LLM 的程式設計助手實現自動化編碼。儘管如此，軟體工程除了編碼之外還涉及程式改進過程，特別是實現軟體維護（如錯誤修復）和軟體演進（如功能新增）。在本文中，我們提出了一種通過解決 GitHub Issues 來自主實現程式改進的自動化方法。在我們稱為 AutoCodeRover 的方法中，LLMs 與複雜的程式碼搜尋能力相結合，最終生成程式修改或補丁。與 AI 研究人員和從業者的近期 LLM agent 方法相比，我們的視角更偏向軟體工程。我們在程式表示（抽象語法樹）上工作，而不是將軟體項目視為單純的文件集合。我們的程式碼搜尋利用類/方法形式的程式結構來增強 LLM 對問題根本原因的理解，並有效地重新定位修復位置。\n\n\n**[16× 本地 / 93 全球] 2406.01304 — CodeR: Issue Resolving with Multi-Agent and Task Graphs**\n\n> GitHub issue 解決近來引起了學術界和工業界的廣泛關注。SWE-bench 被提出用以衡量解決 issues 的性能。本文我們提出 CodeR，採用多 agent 框架和預定義任務圖，在程式碼儲存庫中修復並解決已報告的錯誤及新增功能。在 SWE-bench lite 上，CodeR 在每個 issue 僅提交一次的條件下能夠解決 28.33% 的 issues。我們考察了 CodeR 各設計要素對性能的影響，並提供了推進這一研究方向的見解。\n\n\n**[13× 本地 / 75 全球] 2507.23370 — Trae Agent: An LLM-based Agent for Software Engineering with Test-time Scal**\n\n> 軟體問題解決是軟體工程中的一項關鍵挑戰，近年來受到越來越多的關注。隨著大型語言模型（LLMs）的快速發展，在處理真實軟體工程任務方面已取得實質進展。近期研究引入了集成推理技術以提升基於 LLM 的問題解決效能。然而，現有的基於提示的方法在有效探索大型集成空間方面仍有侷限，且缺乏儲存庫層級理解的能力，制約了整體有效性。本文提出 Trae Agent，首個針對儲存庫層級問題解決的基於 agent 的集成推理方法。Trae Agent 將目標定義為最優解搜索問題，並透過用於生成、剪枝和選擇的模組化 agent，分別解決大型集成空間與儲存庫層級理解兩大核心挑戰。我們在廣泛採用的 SWE-bench 基準上使用三種領先 LLM 進行了廣泛實驗，將 Trae Agent 與四種最先進的集成推理技術進行比較，實驗結果表明 Trae Agent 取得了優越效能。\n\n\n**[11× 本地 / 54 全球] 2404.17153 — UniDebugger: Hierarchical Multi-Agent Framework for Unified Software Debugg**\n\n> 軟體除錯是一項耗時的工作，涉及一系列步驟，如故障定位和補丁生成，每個步驟都需要徹底分析和深入理解底層邏輯。雖然大型語言模型（LLMs）在編碼任務中展現出有前景的潛力，但其在除錯方面的性能仍然有限。目前基於 LLM 的方法通常關注孤立的步驟，難以應對複雜的錯誤。在本文中，我們提出了第一個通過多智慧體協同進行統一除錯的端到端框架 FixAgent。它模擬開發人員的整個認知過程，每個 agent 專注於這一過程的特定組成部分，而不是像以前的多智慧體系統那樣模擬獨立專家的行為。Agent 通過三層設計進行協調，遵循除錯的認知模型，允許自適應地處理不同複雜程度的錯誤。在大量基準上的實驗表明，FixAgent 顯著優於最先進的修復方法，在倉庫級別基準 Defects4J 上修復的錯誤數量是其 1.25 至 2.56 倍。這一性能的實現無需依賴 ground-truth 根本原因。\n\n\n**[7× 本地 / 56 全球] 2406.11638 — MASAI: Modular Architecture for Software-engineering AI Agents**\n\n> _(無 abstract 中譯)_\n\n\n**[7× 本地 / 488 全球] 2304.07590 — Self-Collaboration Code Generation via ChatGPT**\n\n> 儘管大型語言模型（LLMs）已展現出卓越的程式碼生成能力，仍難以應對複雜任務。在真實世界的軟體開發中，人類通常透過協作式團隊合作攻克複雜任務，這一策略能有效控制開發複雜度並提升軟體品質。受此啟發，我們提出了一個以 LLMs（以 ChatGPT 為例）為基礎的自我協作程式碼生成框架。具體而言，透過角色指令：1) 多個 LLM agent 分別扮演不同「專家」角色，各自負責複雜任務中的特定子任務；2) 規範協作與互動方式，使不同角色組成虛擬團隊相互促進，最終在無需人工干預的情況下協作完成程式碼生成任務。為有效組織並管理此虛擬團隊，我們將軟體開發方法論融入框架，組建了由分析師、程式設計師和測試員三種 LLM 角色構成的基礎團隊，分別負責軟體開發的分析、編碼與測試階段。我們在多個程式碼生成基準上進行了全面實驗。\n\n\n**[6× 本地 / 462 全球] 2506.13131 — AlphaEvolve: A coding agent for scientific and algorithmic discovery**\n\n> 本白皮書介紹 AlphaEvolve，一個演化式程式碼 Agent，能大幅提升最先進 LLMs 在高難度任務上的能力，例如應對開放性科學問題或優化關鍵計算基礎設施。AlphaEvolve 協調一條由 LLMs 組成的自主流水線，其任務是透過直接修改程式碼來改進演算法。採用演化方式，持續從一個或多個評估器接收回饋，AlphaEvolve 迭代地改進演算法，有望帶來新的科學和實際發現。我們透過將其應用於多個重要計算問題來展示此方法的廣泛適用性。當應用於優化 Google 大規模計算堆疊的關鍵元件時，AlphaEvolve 為資料中心開發了更高效的排程演算法，在硬體加速器電路設計中找到了功能等效的化簡，並加速了支撐 AlphaEvolve 自身的 LLM 訓練。此外，AlphaEvolve 在一系列……問題上發現了超越最先進解法的新穎且可證明正確的演算法。\n\n\n**[5× 本地 / 1,643 全球] 2305.16291 — Voyager: An Open-Ended Embodied Agent with Large Language Models**\n\n> 我們介紹 Voyager，首個基於 LLM 的 Minecraft 具身終身學習 Agent，能夠持續探索世界、習得多樣化技能，並在無人類介入的情況下做出全新發現。Voyager 包含三個關鍵組件：1）最大化探索的自動課程；2）用於儲存和檢索複雜行為的不斷增長的可執 對自動化編碼的期望。然而，軟體工程不僅僅是編碼，還涉及項目的維護和演進等活動。在此背景下，LLM agent 的概念獲得了廣泛關注，它利用 LLMs 作為推理引擎自主調用外部工具。但 LLM agent 等同於 AI 軟體工程師嗎？在本文中，我們通過開發一個統一軟體工程 agent（USEagent）來理解這個問題。與現有的為特定軟體任務（如測試、除錯和修復）構建專用 agent 的工作不同，我們的目標是構建一個可以協調和處理多種能力的統一 agent。這賦予了 agent 處理複雜軟體開發場景的潛力，如修復不完整的補丁、添加新功能或接管他人編寫的程式碼。我們設想 USEagent 作為未來 AI 軟體工程師的第一個草稿，它可以成為未來涉及 AI 和人類的軟體開發團隊中的一員。為評估 USEagent 的有效性，我們構建了統一軟體工程基準（USEbench）。\n\n\n**[3× 本地 / 96 全球] 2505.22954 — Darwin Godel Machine: Open-Ended Evolution of Self-Improving Agents**\n\n> 當今大多數 AI 系統受限於人類設計的固定架構，無法自主且持續地改進自身。另一方面，科學方法提供了一個累積且開放的系統，每項創新都建立在先前成果之上，從而實現未來的發現。人們越來越希望目前手動推進 AI 的過程本身能夠實現自動化。若能安全地實現，這種自動化將加速 AI 開發並使我們更早獲益。這一前景引出了一個問題：AI 系統如何在不斷改進自身的同時，在解決相關問題上變得更加出色。先前的方法（如元學習）提供了自動化發現新算法的工具集，但受限於人類設計合適搜索空間和一階改進的限制。另一方面，Godel machine 引入了一種理論上可自我改進 AI 的方法，能夠以可證明有益的方式修改自身。遺憾的是，由於無法證明大多數自我修改的影響，這一原始設計在實踐中無法實現。為解決這一限制，我們提出了 Darwin Godel Machine。\n\n\n## C/C3 — SWE issue resolution（7 篇）\n\n\n**[12× 本地 / 55 全球] 2406.01422 — Alibaba LingmaAgent: Improving Automated Issue Resolution via Comprehensive**\n\n> 本文介紹 Alibaba LingmaAgent，一種旨在全面理解並利用整個軟體儲存庫進行問題解決的全新自動化軟體工程方法。LingmaAgent 部署於阿里雲開發的 IDE 程式碼助手 TONGYI Lingma 中，解決了現有 LLM-based Agent 主要聚焦於局部程式碼資訊的局限性。我們的方法引入自上而下的方式，將關鍵儲存庫資訊濃縮為知識圖譜以降低複雜度，並採用基於蒙地卡羅樹搜尋的策略，讓 Agent 能夠探索並理解整個儲存庫。我們引導 Agent 使用儲存庫層級的知識進行摘要、分析和規劃，使其能夠動態獲取資訊並為真實世界的 GitHub 問題生成補丁。在大量實驗中，LingmaAgent 展示了顯著改進，相比 SWE-agent 在 SWE-bench Lite 基準上取得了 18.5% 的相對提升。在阿里雲的生產部署與評估中，LingmaAgent 自動解決了開發工程師面臨的 16.9% 的內部問題，人工干預後的問題解決率提升至 43.3%。\n\n\n**[11× 本地 / 204 全球] 2412.21139 — Training Software Engineering Agents and Verifiers with SWE-Gym**\n\n> _(無 abstract 中譯)_\n\n\n**[9× 本地 / 79 全球] 2501.05040 — SWE-Fixer: Training Open-Source LLMs for Effective and Efficient GitHub Iss**\n\n> _(無 abstract 中譯)_\n\n\n**[7× 本地 / 37 全球] 2507.23361 — SWE-Exp: Experience-Driven Software Issue Resolution**\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 38 全球] 2507.23348 — SWE-Debate: Competitive Multi-Agent Debate for Software Issue Resolution**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 15 全球] 2502.02747 — PatchPilot: A Cost-Efficient Software Engineering Agent with Early Attempts**\n\n> 近期研究構建了多種 patch agent，將大型語言模型（LLMs）與非 ML 工具相結合，在最優水準的軟體修補基準 SWE-bench 上取得了有前景的結果。根據確定修補工作流程的方式，現有 patch agent 可分為基於 agent 的規劃方法（依賴 LLM 進行規劃）和基於規則的規劃方法（遵循預定義工作流程）。整體而言，基於 agent 的規劃方法修補性能較高，但成本高且穩定性有限；基於規則的規劃方法則更穩定高效，但關鍵工作流程的限制損害了其修補性能。本文提出 PatchPilot，一個在修補效果、穩定性和成本效益之間取得平衡的 agentic patcher。PatchPilot 提出了一個包含五個組件的新型基於規則規劃工作流程：復現（reproduction）、定位（localization）、生成（generation）、驗證（validation）和精煉（refinement）（其中精煉為 PatchPilot 獨有）。我們針對每個組件引入了新穎的客製化設計以優化其效果與效率。通過在 SWE-bench 上的廣泛實驗，PatchPilot 展現出卓越的性能。\n\n\n**[3× 本地 / 5 全球] 2405.13057 — Can Github issues be solved with Tree Of Thoughts?**\n\n> 儘管對大型語言模型（LLM）程式碼生成的研究已相當廣泛，HumanEval 等基準已被以令人印象深刻的 96.3% 成功率超越，但這些基準主要評估模型在基本函式級程式碼生成上的性能，缺乏真實場景（如解決 GitHub issues）所需的批判性思維和範疇理解。本研究介紹了將思維樹（ToT）語言模型推理框架應用於增強 LLMs 在這一複雜任務上的決策和問題解決能力。與傳統的輸入-輸出（IO）提示和檢索增強生成（RAG）技術相比，ToT 旨在透過促進對多條推理路徑的結構化探索並啟用潛在解決方案的自我評估來改善性能。我們在 SWE-bench 的 Github issue 實例上實驗部署了 ToT。然而，我們的結果表明，僅依靠 ToT 框架不足以賦予 LLMs 超越現有方法所需的批判性推理能力。本文分析了這些不足的潛在原因並提供了改進方向。\n\n\n## C/C4 — Test-time scaling（8 篇）\n\n\n**[16× 本地 / 104 全球] 2410.20285 — SWE-Search: Enhancing Software Agents with Monte Carlo Tree Search and Iter**\n\n> 在複雜且動態環境中工作的軟體工程師必須不斷適應不斷演變的需求，從經驗中迭代學習，並根據新見解重新考慮他們的方法。然而，當前基於大型語言模型（LLM）的軟體 agent 通常遵循線性、順序的過程，阻礙了回溯和探索替代解決方案，限制了它們在初始方法無效時重新思考策略的能力。為解決這些挑戰，我們提出 SWE-Search，一個將蒙地卡羅樹搜尋（MCTS）與自我改進機制相結合的多智慧體框架，以提升軟體 agent 在倉庫級別軟體任務上的性能。SWE-Search 通過引入一個混合價值函數擴展了傳統 MCTS，該函數利用 LLMs 進行數值估值和定性評估。這使得自我反饋迴路成為可能，其中 agent 根據數值評估和對所追蹤軌跡的定性自然語言評估迭代改進其策略。該框架包括一個用於自適應探索的 SWE-Agent、一個用於迭代反饋的 Value Agent，以及一個 Discriminator Agent。\n\n\n**[6× 本地 / 20 全球] 2503.14269 — DARS: Dynamic Action Re-Sampling to Enhance Coding Agent Performance by Ada**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 42 全球] 2511.13646 — Live-SWE-agent: Can Software Engineering Agents Self-Evolve on the Fly?**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 752 全球] 2407.21787 — Large Language Monkeys: Scaling Inference Compute with Repeated Sampling**\n\n> 擴大訓練語言模型所用的計算量已大幅提升其能力。然而，在推理方面，我們通常限制模型對問題只嘗試一次。本文探索推理計算作為另一個擴展維度，使用從模型中反覆取樣候選解的簡單技術。在多個任務和模型上，我們觀察到覆蓋率——即被任何生成樣本解決的問題比例——在四個數量級範圍內隨樣本數量增加而擴展。有趣的是，覆蓋率與樣本數量之間的關係通常呈對數線性，可用指數冪律建模，表明推理時擴展律的存在。在可自動驗證答案的程式碼和形式化證明等領域，覆蓋率的提升直接轉化為效能的改善。將反覆取樣應用於 SWE-bench Lite 時，使用 1 個樣本時 DeepSeek-Coder-V2-Instruct 解決問題的比例從 15.9% 提升到使用 250 個樣本時的 56%，超越了單樣本最先進水準的 43%。在缺乏自動驗證器的領域，我們發現……\n\n\n**[4× 本地 / 1,732 全球] 2408.03314 — Scaling LLM Test-Time Compute Optimally can be More Effective than Scaling **\n\n> 讓 LLMs 能夠通過使用更多測試時計算來改進其輸出，是構建能夠在開放式自然語言上運作的通用自我改進 agent 的關鍵步驟。本文研究了 LLMs 中推理時計算的 scaling，重點回答以下問題：若允許 LLM 使用固定但非平凡量的推理時計算，它能在具有挑戰性的 prompt 上提升多少性能？這一問題不僅對 LLMs 可達到的性能有重要意義，也關係到 LLM 預訓練的未來方向以及如何在推理時計算與預訓練計算之間進行取捨。儘管如此重要，研究各種測試時推理方法 scaling 行為的工作仍然有限，且現有工作對若干策略普遍給出了負面結果。本研究分析了兩種擴展測試時計算的主要機制：(1) 針對稠密的、基於流程的驗證器獎勵模型進行搜索；以及 (2) 在測試時根據給定 prompt 自適應地更新模型在回應上的分佈。結果發現，在兩種情況下，不同方法的有效性在 scaling 上均存在差異。\n\n\n**[4× 本地 / 23 全球] 2503.23803 — Thinking Longer, Not Larger: Enhancing Software Engineering Agents via Scal**\n\n> 軟體工程智能體的最新進展在自動化程式改善方面展現出令人期待的能力。然而，它們對封閉源碼或資源密集型模型的依賴，在私有環境中引入了重大部署挑戰，從而提出了一個關鍵問題：個人可部署的開源 LLM（例如在單個 GPU 上執行的 32B 模型）如何達到可比的程式碼推理效能？為此，我們提出一個統一的測試時計算（Test-Time Compute，TTC）擴展框架，利用增加的推理時計算代替更大的模型。我們的框架整合了兩種互補策略：內部 TTC 和外部 TTC。在內部，我們引入一種開發情境化的軌跡合成方法，利用真實世界軟體儲存庫來引導多階段推理過程（如故障定位和補丁生成）。我們進一步透過拒絕採樣提升軌跡品質，嚴格根據準確性和複雜性評估軌跡。在外部，我們提出一種由獎勵模型和執行驗證指導的新型開發流程搜索策略，實現有針對性的計算。\n\n\n**[3× 本地 / 468 全球] 2310.04406 — Language Agent Tree Search Unifies Reasoning Acting and Planning in Languag**\n\n> 雖然語言模型（LMs）在一系列決策任務中展現出潛力，但其對簡單行動過程的依賴限制了作為自主 agent 的廣泛部署。本文我們介紹語言 Agent 樹搜尋（LATS）——首個綜合了 LMs 推理、行動和規劃能力的通用框架。透過利用 LMs 的上下文學習能力，我們將蒙特卡羅樹搜尋整合到 LATS 中，使 LMs 充當 agent，並結合 LM 驅動的價值函式和自我反思，以實現熟練的探索和增強的決策能力。我們方法的一個關鍵特性是引入外部環境回饋，提供了一種比現有技術更加深思熟慮和自適應的問題解決機制。我們在程式設計、互動式問答（QA）、網頁導航和數學等多樣化領域的實驗評估，驗證了 LATS 在決策中的有效性和通用性，同時保持了有競爭力或改進的推理性能。值得注意的是，LATS 使用 GPT-4 在 HumanEval 程式設計任務上達到最先進的 pass@1 準確率（92.7%）。\n\n\n**[3× 本地 / 40 全球] 2501.14723 — CodeMonkeys: Scaling Test-Time Compute for Software Engineering**\n\n> 擴展測試時計算量是提升 LLM 能力的一個有前景的方向。然而，測試時計算量可以以多種方式擴展，有效結合不同方法仍是一個活躍的研究領域。在這裡，我們在解決來自 SWE-bench 資料集的現實 GitHub Issues 的背景下探索這一問題。我們的系統 CodeMonkeys 允許模型通過聯合生成和執行測試腳本與草稿編輯來迭代編輯程式碼庫。我們為每個 Issue 採樣許多這樣的多輪軌跡，以生成一組候選編輯。這種方法讓我們可以通過增加每條軌跡的迭代次數來擴展「串行」測試時計算量，通過增加每個問題的軌跡數量來擴展「並行」測試時計算量。通過並行擴展，我們可以將前期成本分攤到多個下游樣本中，允許我們使用讓 LLM 讀取每個文件的簡單方法來識別相關程式碼庫上下文。為了在候選編輯之間進行選擇，我們將使用模型生成測試的投票與專用於選擇的最終多輪軌跡相結合。總體而言，CodeMonkeys 解決了 SWE-bench Verified 中 57.4% 的 Issues。\n\n\n## C/C5 — Multi-agent collab（11 篇）\n\n\n**[14× 本地 / 1,805 全球] 2308.00352 — MetaGPT: Meta Programming for Multi-Agent Collaborative Framework**\n\n> 基於大型語言模型（LLM）的智能體社群在自動化問題解決方面取得了顯著進展。現有的基於 LLM 的多智能體系統已能解決簡單的對話任務。然而，更複雜任務的解決方案因 LLM 的級聯幻覺導致邏輯不一致而變得複雜。本文介紹 MetaGPT，一個創新的元程式設計框架，將高效的人類工作流程融入基於 LLM 的多智能體協作中。MetaGPT 將標準作業程序（SOP）編碼為提示序列，以實現更流暢的工作流程，從而使具備人類領域專業知識的智能體能夠驗證中間結果並減少錯誤。MetaGPT 採用流水線模式為各智能體分配不同角色，有效地將複雜任務分解為涉及多個智能體協作的子任務。在協作軟體工程基準測試上，MetaGPT 比以前基於聊天的多智能體系統生成更具一致性的解決方案。我們的專案可在 https://github.com/geekan/MetaGPT 找到。\n\n\n**[12× 本地 / 788 全球] 2307.07924 — ChatDev: Communicative Agents for Software Development**\n\n> _(無 abstract 中譯)_\n\n\n**[10× 本地 / 0 全球] 2312.13010 — AgentCoder: Multi-Agent-based Code Generation with Iterative Testing and Op**\n\n> _(無 abstract 中譯)_\n\n\n**[10× 本地 / 154 全球] 2403.17927 — MAGIS: LLM-Based Multi-Agent Framework for GitHub Issue Resolution**\n\n> 在軟體開發中，解決 GitHub 儲存庫中的新興問題是一項複雜挑戰，不僅涉及新增程式碼，還需維護現有程式碼。大型語言模型（LLMs）在程式碼生成上展現了潛力，但在解決 GitHub 問題（尤其是在儲存庫層級）時仍面臨困難。為克服這一挑戰，我們實證研究了 LLMs 失敗的原因並分析了主要因素。受此發現啟發，我們提出了一個新型的基於 LLM 的多 agent 框架 MAGIS（Multi-Agent framework for GitHub Issue reSolution），由四個針對軟體演進定制的 agent 組成：Manager、Repository Custodian、Developer 和 Quality Assurance Engineer。該框架在規劃與編碼過程中利用多種 agent 的協作，充分挖掘 LLMs 解決 GitHub 問題的潛力。實驗中，我們使用 SWE-bench 基準將 MAGIS 與 GPT-3.5、GPT-4 和 Claude-2 等主流 LLMs 進行比較。MAGIS 能解決 13.94% 的 GitHub 問題，顯著優於基準線——相較直接使用 LLM 的方法，已解決比例提升約八倍。\n\n\n**[9× 本地 / 1,612 全球] 2308.08155 — AutoGen: Enabling Next-Gen LLM Applications via Multi-Agent Conversation**\n\n> AutoGen 是一個開源框架，允許開發人員通過多個可以相互對話以完成任務的 agent 構建 LLM 應用程式。AutoGen agent 可自定義、可對話，並可在採用 LLMs、人工輸入和工具組合的各種模式下運行。使用 AutoGen，開發人員還可以靈活定義 agent 互動行為。自然語言和計算機程式碼都可以用來為不同應用程式設計靈活的對話模式。AutoGen 作為構建不同複雜程度和 LLM 能力的多樣化應用程式的通用基礎設施。實證研究證明了該框架在眾多示例應用中的有效性，涵蓋數學、編碼、問答、運籌學、線上決策制定、娛樂等多個領域。\n\n\n**[8× 本地 / 43 全球] 2408.07060 — Diversity Empowers Intelligence: Integrating Expertise of Software Engineer**\n\n> _(無 abstract 中譯)_\n\n\n**[6× 本地 / 96 全球] 2404.02183 — Self-Organized Agents: A LLM Multi-Agent Framework toward Ultra Large-Scale**\n\n> 使用大型語言模型（LLM）agent 進行自動程式碼生成的近期進展，使我們離自動化軟體開發的未來更近了一步。然而，現有的單 agent 方法由於上下文長度的限制，在生成和改進大規模複雜程式碼庫方面面臨局限。為應對這一挑戰，我們提出了自組織多 agent 框架（SoA），一個能夠可擴展且高效地生成和優化大規模程式碼的新穎多 agent 框架。在 SoA 中，自組織 agent 獨立操作以生成和修改程式碼組件，同時無縫協作以構建整體程式碼庫。我們框架的一個關鍵特性是根據問題複雜度自動增殖 agent，允許動態可擴展性。這使得整體程式碼量可以根據 agent 數量無限增長，而每個 agent 管理的程式碼量保持恆定。我們在 HumanEval 基準上評估 SoA，並證明與單 agent 系統相比，SoA 中的每個 agent 處理的程式碼量顯著更少，但整體生成的程式碼量大幅更多。此外，SoA 也超越了單 agent 系統的整體性能。\n\n\n**[6× 本地 / 28 全球] 2402.01411 — CodePori: Large-Scale System for Autonomous Software Development Using Mult**\n\n> 背景：大型語言模型（LLMs）和生成式預訓練 Transformer（GPTs）已改變了軟體工程（SE）領域。現有基於 LLM 的多 agent 模型已成功解決基礎對話任務。然而，LLMs 在更具挑戰性任務（如大型複雜項目的自動化程式碼生成）上的潛力僅被少數現有研究所探索。目標：本文旨在探索基於 LLM 的 agent 在軟體業中的潛力，特別是在提升生產力和縮短複雜軟體解決方案上市時間方面。我們的首要目標是深入了解這些 agent 如何從根本上改變大規模軟體的開發。方法：我們介紹 CodePori，一個旨在根據利益相關者定義的功能性和非功能性需求，自動化大型複雜軟體項目程式碼生成的新型系統。為評估所提系統的性能，我們使用了 HumanEval 基準，並對 CodePori 模型進行手動測試，提供 20 個不同的項目描述作為輸入，再手動執行程式碼評估程式碼準確性。\n\n\n**[6× 本地 / 614 全球] 2308.10848 — AgentVerse: Facilitating Multi-Agent Collaboration and Exploring Emergent B**\n\n> 由大型語言模型（LLMs）賦能的自主 agent 已取得顯著改進，使其能夠泛化至廣泛任務。然而，在現實場景中，個體之間的協作往往是提升任務完成效率與效果的必要條件。因此，受人類群體動力學的啟發，我們提出了一種多 agent 框架，能夠以整體大於各部分之和的方式協同地動態調整其組成。我們的實驗表明，該框架能夠有效部署多 agent 群組，其效能優於單一 agent。此外，我們深入研究了群組協作完成任務過程中個體 agent 之間社會行為的湧現。鑑於這些行為，我們討論了一些可能的策略，以發揮正面行為並緩解負面行為，從而提升多 agent 群組的協作潛力。\n\n\n**[3× 本地 / 40 全球] 2402.02172 — CodeAgent: Autonomous Communicative Agents for Code Review**\n\n> 程式碼審查旨在確保軟體的整體品質和可靠性，是軟體開發的基石。然而，程式碼審查雖然至關重要，卻是一個費力的過程，研究社群正尋求將其自動化。現有的自動化方法依賴於單一輸入-輸出的生成模型，因此普遍難以模擬程式碼審查的協作特性。本研究介紹 CodeAgent，一個用於程式碼審查自動化的新型多 agent 大型語言模型（LLM）系統。CodeAgent 引入了一個監督 agent——QA-Checker，以確保所有 agent 的貢獻都針對最初的審查問題。我們在關鍵程式碼審查任務上評估了 CodeAgent：（1）檢測程式碼變更與提交訊息之間的不一致性，（2）識別漏洞引入，（3）驗證程式碼風格遵循情況，（4）建議程式碼修訂。結果表明 CodeAgent 具有有效性，為程式碼審查自動化樹立了新的最先進水準。我們的資料和程式碼已公開發布（https://github.com/Daniel4SE/codeagent）。\n\n\n**[3× 本地 / 220 全球] 2405.11403 — MapCoder: Multi-Agent Code Generation for Competitive Problem Solving**\n\n> 程式碼合成需要對複雜自然語言問題描述的深入理解、對複雜算法和資料結構的程式碼指令生成，以及全面單元測試的成功執行，是一個重大挑戰。雖然大型語言模型（LLMs）在自然語言處理方面展現出令人印象深刻的熟練度，但其在程式碼生成任務上的性能仍然有限。在本文中，我們介紹了一種新的程式碼生成方法，利用多 agent 提示，獨特地複製了在人類開發者中觀察到的完整程式合成週期。我們的框架 MapCoder 由四個 LLM agent 組成，專門設計來模擬這一週期的各個階段：回憶相關示例、規劃、程式碼生成和除錯。在對多個 LLM 消融和八個具有挑戰性的競賽問題求解和程式合成基準的分析進行徹底實驗後，MapCoder 展示了卓越的程式碼生成能力，在 HumanEval（93.9%）、MBPP（83.1%）、APPS（22.0%）、CodeContests（28.5%）和 xCodeEval（45.3%）上取得了新的最先進結果（pass@1）。\n\n\n## C/C6 — Translation agent（3 篇）\n\n\n**[18× 本地 / 12 全球] 2409.19894 — TransAgent: Enhancing LLM-Based Code Translation via Fine-Grained Execution**\n\n> 程式碼翻譯在保持功能性的同時，在程式語言之間轉換程式碼，這對軟體開發和維護至關重要。雖然傳統的基於學習的程式碼翻譯方法因平行訓練資料不足而效果有限，大型語言模型（LLMs）憑藉其強大的程式碼生成和理解能力近來推進了這一領域的發展。然而，LLMs 翻譯的程式碼仍存在多種品質問題，如語法和語義錯誤。在本研究中，我們提出 TransAGENT，一個消除 LLM 程式碼翻譯錯誤的新型多 agent 系統。TransAGENT 的核心思路是透過原始碼與目標碼之間的細粒度執行對齊，定位易出錯的程式碼塊。我們在最新程式設計任務構建的新基準上評估 TransAGENT，以緩解資料洩漏問題。TransAGENT 在翻譯準確率上較最新的 UniTrans 提升最高 33.3%，在程式修復性能上平均比 Agentless 提升 56.7%。我們還進行了消融研究並在不同 LLMs 上評估 TransAGENT，證明了其有效性。\n\n\n**[16× 本地 / 38 全球] 2407.07472 — Rectifier: Code Translation with Corrector via LLMs**\n\n> 隨著軟體與社會的演進，軟體遷移正獲得越來越多的關注。早期研究主要依賴手工製作的翻譯規則在兩種語言之間進行翻譯，翻譯過程容易出錯且耗時。近年來，研究人員開始探索在程式碼翻譯中使用預訓練大型語言模型（LLMs）。然而，程式碼翻譯是一項複雜任務，LLMs 在執行過程中會產生錯誤，包括：(1) 編譯錯誤、(2) 執行時錯誤、(3) 功能錯誤和 (4) 不終止執行。我們發現這些錯誤的根本原因非常相似（如未能匯入套件、迴圈邊界錯誤、運算子錯誤等）。本文提出一種通用修正器 Rectifier，這是一種用於修復翻譯錯誤的微型通用模型。它從現有 LLMs 生成的錯誤中學習，並可廣泛應用於修正任何 LLM 生成的錯誤。在 C++、Java 與 Python 之間翻譯任務的實驗結果顯示，我們的模型具備有效的修復能力。\n\n\n**[3× 本地 / 5 全球] 2508.17720 — RepoTransAgent: Multi-Agent LLM Framework for Repository-Aware Code Transla**\n\n> 感知儲存庫的程式碼翻譯對於現代化遺留系統、提升可維護性以及實現不同程式語言間的互操作性至關重要。雖然大型語言模型（LLMs）的近期進展改善了程式碼翻譯品質，現有方法在實際場景中仍面臨重大挑戰：上下文理解不足、提示設計缺乏靈活性以及錯誤糾正機制不充分。這些限制嚴重阻礙了對複雜真實世界程式碼儲存庫的準確和高效翻譯。為應對這些挑戰，我們提出 RepoTransAgent，一個用於感知儲存庫的程式碼翻譯的新型多 agent LLM 框架。RepoTransAgent 將翻譯過程系統地分解為專門的子任務——上下文檢索、動態提示構建和迭代程式碼精煉——每個子任務由專用 agent 處理。我們的方法利用檢索增強生成（RAG）進行上下文資訊收集，採用針對不同儲存庫場景定制的自適應提示，並引入基於反思的機制進行系統性錯誤糾正。我們在數百對 Java-C# 翻譯上評估了 RepoTransAgent。\n\n\n## C/C7 — Tool/FL/Doc（8 篇）\n\n\n**[14× 本地 / 289 全球] 2401.07339 — CodeAgent: Enhancing Code Generation with Tool-Integrated Agent Systems for**\n\n> 大型語言模型（LLMs）在自動化程式碼生成方面展現了潛力，但通常僅在較簡單的任務（如生成獨立程式碼單元）上表現出色。然而，真實世界的軟體開發往往涉及具有複雜依賴關係和大量文件的程式碼儲存庫（簡稱 repo）。為填補這一差距，我們的研究轉向在更貼近真實的環境中評估 LLMs——即真實世界的 repo 級程式碼生成。我們推出了 CodeAgentBench，一個人工整理的 repo 級程式碼生成基準，包含五個高品質 Python 項目，共計 101 個樣本。我們評估了九個主流 LLMs 的 repo 級任務表現，觀察到性能下降。為此，我們提出 CodeAgent，一個基於 LLM 的新型 agent 框架，透過外部工具實現有效的 repo 級程式碼生成。CodeAgent 整合了五種程式設計工具，支援與軟體製品的交互，包括資訊檢索、程式碼符號導航與程式碼測試。我們實現了四種 agent 策略以優化這些工具的使用。在 CodeAgentBench 上的實驗表明，CodeAgent 顯著提升了 LLM 的性能。\n\n\n**[11× 本地 / 454 全球] 2402.01030 — Executable Code Actions Elicit Better LLM Agents**\n\n> _(無 abstract 中譯)_\n\n\n**[11× 本地 / 82 全球] 2403.16362 — AgentFL: Scaling LLM-based Fault Localization to Project-Level Context**\n\n> 故障定位（FL）是除錯過程中的關鍵步驟。憑藉強大的程式碼理解能力，近期的大型語言模型（LLMs）在診斷程式碼錯誤方面展現出令人期待的效能。然而，由於 LLMs 在處理長上下文方面能力有限，現有基於 LLM 的故障定位仍局限於小範圍程式碼（即方法或類別）內的錯誤定位，難以診斷大範圍程式碼（即整個軟體系統）中的錯誤。為解決此局限，本文提出 AgentFL，一個基於 ChatGPT 的多 Agent 系統，用於自動化故障定位。AgentFL 模擬人類開發者的行為，將 FL 任務建模為三步驟流程：理解、導航與確認。在每個步驟中，AgentFL 招募具備不同專長的 Agent，各自利用不同工具處理特定任務。特別地，我們採用一系列輔助策略，如測試行為追蹤、文件引導搜尋和多輪對話，以克服各步驟中的挑戰。在廣泛使用的 Defects4J-V1.2.0 基準上的評估顯示……\n\n\n**[8× 本地 / 89 全球] 2402.16667 — RepoAgent: An LLM-Powered Open-Source Framework for Repository-level Code D**\n\n> _(無 abstract 中譯)_\n\n\n**[6× 本地 / 1,545 全球] 2307.16789 — ToolLLM: Facilitating Large Language Models to Master 16000+ Real-world API**\n\n> 儘管開源大型語言模型（LLMs）（如 LLaMA）取得了進展，但它們在工具使用能力（即使用外部工具（APIs）來完成人類指令）方面仍然受到顯著限制。原因是目前的指令微調主要關注基本語言任務，而忽略了工具使用領域。這與最先進的（SOTA）閉源 LLMs（如 ChatGPT）的卓越工具使用能力形成對比。為填補這一空白，我們介紹 ToolLLM，一個涵蓋資料構建、模型訓練和評估的通用工具使用框架。我們首先呈現 ToolBench，一個使用 ChatGPT 自動構建的工具使用指令微調資料集。具體而言，構建分為三個階段：(i) API 收集：我們從 RapidAPI Hub 收集了橫跨 49 個類別的 16,464 個現實世界 RESTful APIs；(ii) 指令生成：我們提示 ChatGPT 生成涉及這些 APIs 的多樣化指令，涵蓋單工具和多工具場景；(iii) 解決方案路徑標注：我們使用 ChatGPT 為每條指令搜尋有效的解決方案路徑（API 調用鏈）。為增強 LLMs 的推理能力。\n\n\n**[5× 本地 / 3,843 全球] 2302.04761 — Toolformer: Language Models Can Teach Themselves to Use Tools**\n\n> 語言模型（LMs）表現出卓越的能力，僅從少數示例或文字說明即可解決新任務，尤其是在大規模情況下。然而，矛盾的是，它們在算術或事實查找等基本功能方面卻表現欠佳，而更簡單、更小的模型在這些方面表現出色。在本文中，我們展示 LMs 可以通過簡單的 APIs 自學如何使用外部工具，實現兩全其美。我們介紹 Toolformer，一個被訓練來決定調用哪些 APIs、何時調用、傳遞什麼參數，以及如何最好地將結果整合到未來 token 預測中的模型。這是以自監督方式完成的，每個 API 只需要少量演示。我們整合了一系列工具，包括計算器、問答系統、兩種不同的搜尋引擎、翻譯系統和日曆。Toolformer 在各種下游任務上實現了顯著改進的零樣本性能，通常與更大的模型相當，而不犧牲其核心語言建模能力。\n\n\n**[5× 本地 / 1,198 全球] 2305.15334 — Gorilla: Large Language Model Connected with Massive APIs**\n\n> 大型語言模型（LLMs）近來經歷了令人印象深刻的進步浪潮，模型現在在數學推理和程式合成等多種任務中表現出色。然而，其透過 API 呼叫有效使用工具的潛力尚未完全實現。即使對於當今最先進的 LLMs（如 GPT-4），這也是一項具有挑戰性的任務，主要原因是它們無法生成準確的輸入參數，且容易產生關於 API 呼叫使用方式的幻覺。我們發布 Gorilla，一個基於 LLaMA 微調的模型，在編寫 API 呼叫方面超越 GPT-4 的性能。結合文件檢索器，Gorilla 展現出適應測試時文件變更的強大能力，實現靈活的用戶更新或版本變更。它也大幅緩解了直接提示 LLMs 時常遇到的幻覺問題。為評估模型能力，我們引入 APIBench，一個包含 HuggingFace、TorchHub 和 TensorHub API 的全面資料集。檢索系統與 Gorilla 的成功整合展示了 LLMs 更準確使用工具、跟上頻繁更新文件的潛力。\n\n\n**[3× 本地 / 150 全球] 2401.06201 — EASYTOOL: Enhancing LLM-based Agents with Concise Tool Instruction**\n\n> 為解決現實世界中的複雜任務，工具使用在大型語言模型（LLMs）應用中的興趣日益高漲。開發基於 LLM 的 agent 通常需要 LLMs 從不同的工具文件中理解眾多工具函數。但這些文件可能是多樣的、冗餘的或不完整的，極大地影響了 LLMs 使用工具的能力。為解決這個問題，我們引入 EASYTOOL，一個將多樣且冗長的工具文件轉換為統一簡潔工具指令以便更輕鬆使用工具的框架。EasyTool 從不同來源的大量工具文件中提取必要信息，精心設計了一個統一介面（即工具指令）為基於 LLM 的 agent 提供標準化的工具描述和功能說明。在多個不同任務上的廣泛實驗表明，EasyTool 能顯著減少 token 消耗並提升真實世界場景中工具使用的性能。程式碼將在未來發布於 https://github.com/microsoft/JARVIS/。\n\n\n## C/Cx — Industry case（3 篇）\n\n\n**[6× 本地 / 17 全球] 2502.01821 — Agentic Bug Reproduction for Effective Automated Program Repair at Google**\n\n> 錯誤報告通常缺乏足夠的細節供開發者重現和修復底層缺陷。錯誤重現測試（BRT）——在存在錯誤時失敗、修復後通過的測試——對於除錯至關重要，但在開源和工業環境中都很少包含在錯誤報告中。因此，從錯誤報告中自動生成 BRT 具有加速除錯流程和縮短修復時間的潛力。本文在工業環境（特別是 Google）中研究自動化 BRT 生成，聚焦於大型專有程式碼庫的挑戰，並考慮從 Google 內部問題追蹤器中提取的真實工業錯誤。我們對最先進的 BRT 生成技術 LIBRO 進行了適配和評估，並提出我們基於智能體的方法 BRT Agent，該方法利用微調的大型語言模型（LLM）進行程式碼編輯。在 Google 內部問題追蹤器中的 80 個人工報告錯誤上，我們的 BRT Agent 顯著優於 LIBRO，實現了 28% 的合理 BRT 生成率，而 LIBRO 僅達到 10%。我們進一步透過將生成的 BRT 與自動化程式修復整合來研究其實際價值。\n\n\n**[3× 本地 / 14 全球] 2501.06972 — How is Google Using AI for Internal Code Migrations?**\n\n> 近年來，將生成式 AI（尤其是大型語言模型 LLMs）應用於軟體工程的興趣大幅增長；如今已有若干商業工具，許多大型公司也為其軟體工程師開發了專有的基於機器學習的工具。雖然程式碼補全等常見任務的機器學習應用已在商業工具中普及，但將 LLMs 用於更定制目的的興趣也在增長，程式碼遷移就是其中之一。本文是關於在 Google 使用 LLMs 進行程式碼遷移的經驗報告，並非研究性文章（即我們不與其他方法進行比較，也不評估研究問題或假設）。相反，我們分享了在企業環境中跨多種遷移案例應用基於 LLM 的程式碼遷移的經驗，希望其他業界實踐者能從我們的見解中受益。這些經驗中許多適用於機器學習在軟體工程中的任何應用。我們有證據表明，LLMs 的使用能顯著縮短遷移所需時間，並降低啟動和完成遷移項目的門檻。\n\n\n**[3× 本地 / 35 全球] 2501.07531 — Evaluating Agent-Based Program Repair at Google**\n\n> 基於 agent 的程式修復通過結合現代 LLMs 的規劃、工具使用和程式碼生成能力，提供端到端自動解決複雜錯誤的可能性。近期研究已在熱門開源基準 SWE-Bench（一個來自 GitHub 高評價 Python 專案的錯誤集合）上探索了基於 agent 的修復方法的使用。此外，各種 agent 方法（如 SWE-Agent）也被提出以解決該基準中的錯誤。本文探討在企業環境中使用 agent 方法解決錯誤的可行性。為此，我們從 Google 問題追蹤系統中整理了一個包含 178 個錯誤的評估集，涵蓋人工報告（78 個）和機器報告的錯誤（100 個）。為在此基準上建立修復效能基準，我們實現了 Passerine，一個在精神上類似於 SWE-Agent 且可在 Google 開發環境中運作的 agent。結果顯示，在 20 次軌跡採樣和 Gemini 1.5 Pro 的條件下，Passerine 能夠為 73% 的機器報告錯誤和 25.6% 的人工報告錯誤生成通過錯誤測試（即可信）的修補方案。人工審查後發現，43% 的機器報告錯誤的修補方案被認為正確。\n\n\n# [D] retrieval/context 策略 ⭐（53 篇）\n\n\n## D/D1 — Iterative retrieval（2 篇）\n\n\n**[26× 本地 / 456 全球] 2303.12570 — RepoCoder: Repository-Level Code Completion Through Iterative Retrieval and**\n\n> 倉庫級別程式碼補全任務是根據倉庫的更廣泛上下文繼續編寫未完成的程式碼。然而，對於自動化程式碼補全工具來說，利用散落在不同文件中的有用信息是困難的。我們提出 RepoCoder，一個簡單、通用且有效的框架來解決這一挑戰。它通過在迭代式檢索-生成流水線中結合基於相似度的檢索器和預訓練程式碼語言模型，簡化了倉庫級別的程式碼補全流程。RepoCoder 有效利用倉庫級別信息進行程式碼補全，並具備在不同粒度層次生成程式碼的能力。此外，我們提出了一個新的基準 RepoEval，由最新且高品質的現實倉庫組成，涵蓋行補全、API 調用和函數體補全場景。實驗結果表明，RepoCoder 在所有設置中將檔案內補全基準提升了 10% 以上，並持續優於普通的檢索增強型程式碼補全方法。此外，我們通過全面分析驗證了 RepoCoder 的有效性。\n\n\n**[4× 本地 / 78 全球] 2403.10059 — Repoformer: Selective Retrieval for Repository-Level Code Completion**\n\n> 檢索增強生成（RAG）的最新進展開啟了儲存庫級程式碼補全的新紀元。然而，現有方法中固定使用檢索的做法暴露了效率和魯棒性方面的問題，大量檢索到的上下文對程式碼語言模型（code LM）無益甚至有害。本文提出一個選擇性 RAG 框架，以避免不必要時進行檢索。為支持此框架，我們設計了一種自監督學習方法，使 code LM 能夠準確地自我評估檢索是否能改善其輸出品質，並穩健地利用可能含有雜訊的檢索上下文。以此 LM 同時作為選擇性 RAG 策略和生成模型，我們的框架在多個基準測試（包括 RepoEval、CrossCodeEval 和新的長形式程式碼補全基準 CrossCodeLongEval）上達到了最先進的儲存庫級程式碼補全效能。同時，我們的分析表明，選擇性檢索在線上服務場景中可帶來高達 70% 的推理加速，且不損害效能。我們進一步展示我們的框架能夠適應不同的生成模型。\n\n\n## D/D10 — Repo-aware repair（3 篇）\n\n\n**[11× 本地 / 37 全球] 2503.21710 — Enhancing Repository-Level Software Repair via Repository-Aware Knowledge G**\n\n> 儲存庫層級的軟體修復面臨彌合問題描述與程式碼修補之間語義差距的挑戰。現有主要依賴大型語言模型（LLMs）的方法，受制於語義歧義、對結構性上下文理解有限以及推理能力不足。為解決這些問題，我們提出 KGCompass，具備兩項創新：(1) 一種新型儲存庫感知知識圖譜（KG），精確連結儲存庫工件（問題與 pull request）與程式碼庫實體（檔案、類別與函式），使我們能有效地將龐大的搜尋空間縮減至僅 20 個最相關的函式，並提供精確的候選錯誤位置與上下文資訊；(2) 一種路徑引導的修復機制，利用 KG 挖掘的實體路徑進行追蹤，通過這些路徑為 LLMs 擴充相關上下文資訊，以生成精確的修補方案及說明。在 SWE-bench Lite 的實驗結果顯示，KGCompass 在開源方法中以單一修復模型達到最先進的單 LLM 修復效能（58.3%）與函式層級錯誤定位精度（56.0%）。\n\n\n**[4× 本地 / 13 全球] 2505.07849 — SweRank: Software Issue Localization with Code Ranking**\n\n> 軟體問題定位——識別與自然語言問題描述（如錯誤報告、功能需求）相關的精確程式碼位置（檔案、類別或函式）的任務——是軟體開發中至關重要但耗時的方面。儘管近期基於 LLM 的 agent 方法展示了前景，但由於複雜的多步驟推理和依賴閉源 LLMs，往往導致大量延遲和成本。另一方面，傳統的程式碼排名模型通常針對查詢到程式碼或程式碼到程式碼的檢索進行最佳化，難以應對問題定位查詢的冗長且故障描述性質。為填補這一差距，我們介紹 SweRank，一個用於軟體問題定位的高效且有效的先檢索後重排框架。為促進訓練，我們從公開 GitHub 儲存庫策劃構建了大規模資料集 SweLoc，包含真實問題描述與對應程式碼修改配對。在 SWE-Bench-Lite 和 LocBench 上的實驗結果表明，SweRank 達到最先進的效能，超越了先前的排名模型和使用 Claude-3.5 等閉源 LLMs 的高成本 agent 方法。\n\n\n**[3× 本地 / 36 全球] 2502.00350 — OrcaLoca: An LLM Agent Framework for Software Issue Localization**\n\n> 大型語言模型（LLM）agent 的近期發展正在革新自主軟體工程（ASE），實現自動化程式設計、問題修復和功能改進。然而，定位——通過導航至相關程式碼部分精確識別軟體問題——仍是一項重大挑戰。現有方法因 LLM agent 與精確程式碼搜索機制之間缺乏有效整合，往往產生次優結果。本文介紹 OrcaLoca，一個通過整合基於優先級調度的 LLM 引導行動、帶相關性評分的行動分解以及距離感知的上下文剪枝，提升軟體問題定位精度的 LLM agent 框架。實驗結果表明，OrcaLoca 在 SWE-bench Lite 的函式匹配率（65.33%）上成為新的開源最先進（SOTA）水準，並通過其修補方案生成整合使一個開源框架的最終解決率提升了 6.33 個百分點。\n\n\n## D/D2 — Code graphs（6 篇）\n\n\n**[12× 本地 / 82 全球] 2410.14684 — RepoGraph: Enhancing AI Software Engineering with Repository-level Code Gra**\n\n> 大型語言模型（LLM）在程式碼生成方面表現出色，但在現代 AI 軟體工程任務上卻仍面臨挑戰。與傳統的函數級或文件級編碼任務不同，AI 軟體工程不僅需要基本的編碼能力，還需要管理和操作程式碼儲存庫的高級技能。然而，現有方法往往忽視了對儲存庫級程式碼理解的需求，而這對於準確把握更廣泛的上下文並制定有效解決方案至關重要。基於此，我們提出 RepoGraph，一個為現代 AI 軟體工程解決方案管理儲存庫級結構的插件模組。RepoGraph 提供所需的指引，並作為 AI 軟體工程師的全儲存庫導航工具。我們透過將 RepoGraph 插入四種不同的方法（屬於兩條技術路線）並在 SWE-bench 上進行評估，結果表明 RepoGraph 大幅提升了所有系統的效能，在開源框架中達到新的最先進水準。我們的分析還透過在另一個儲存庫級編碼基準 CrossCodeEval 上的測試，展示了 RepoGraph 的可擴展性和靈活性。我們的程式碼可在 https://github.com/ozyyshr/RepoGraph 取得。\n\n\n**[8× 本地 / 51 全球] 2406.07003 — GraphCoder: Enhancing Repository-Level Code Completion via Code Context Gra**\n\n> _(無 abstract 中譯)_\n\n\n**[6× 本地 / 71 全球] 2408.03910 — CodexGraph: Bridging Large Language Models and Code Repositories via Code G**\n\n> 大型語言模型（LLMs）在 HumanEval 和 MBPP 等獨立程式碼任務中表現出色，但在處理整個程式碼儲存庫時卻面臨困難。這一挑戰促使研究者在儲存庫規模上增強 LLM 與程式碼庫的互動。目前的解決方案依賴基於相似性的檢索或人工工具和 API，各有明顯缺陷。基於相似性的檢索在複雜任務中召回率往往偏低，而人工工具和 API 通常是任務特定的，需要專業知識，降低了其在各類程式碼任務和實際應用中的泛化能力。為緩解這些限制，我們介紹 CodexGraph，一個將 LLM agent 與從程式碼儲存庫中提取的圖資料庫介面整合的系統。透過利用圖資料庫的結構特性和圖查詢語言的靈活性，CodexGraph 使 LLM agent 能夠構建並執行查詢，實現精確的、感知程式碼結構的上下文檢索和程式碼導航。我們使用三個基準評估 CodexGraph：CrossCodeEval、SWE-bench 和 EvoCodeBench，並開發了五個實際程式設計應用。\n\n\n**[5× 本地 / 24 全球] 2505.16901 — Code Graph Model (CGM): A Graph-Integrated Large Language Model for Reposit**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 62 全球] 2503.09089 — LocAgent: Graph-Guided LLM Agents for Code Localization**\n\n> 程式碼定位——精確識別程式碼庫中需要進行更改的位置——是軟體維護中一項基礎但具有挑戰性的任務。現有方法在識別相關程式碼段時難以高效地導航複雜的程式碼庫。挑戰在於將自然語言問題描述與適當的程式碼元素聯繫起來，通常需要跨層次結構和多個依賴關係進行推理。我們介紹 LocAgent，一個透過基於圖的表示解決程式碼定位問題的框架。透過將程式碼庫解析為有向異構圖，LocAgent 建立了一種輕量級表示，捕捉程式碼結構（文件、類別、函數）及其依賴關係（匯入、調用、繼承），使 LLM 智能體能夠透過強大的多跳推理有效搜索和定位相關實體。在真實世界基準測試上的實驗結果表明，我們的方法顯著提升了程式碼定位的準確性。值得注意的是，使用微調的 Qwen-2.5-Coder-Instruct-32B 模型，我們的方法達到了與最先進的專有模型相當的效果，同時成本大幅降低（約 86%）。\n\n\n**[3× 本地 / 14 全球] 2403.06095 — RepoHyper: Search-Expand-Refine on Semantic Graphs for Repository-Level Cod**\n\n> _(無 abstract 中譯)_\n\n\n## D/D3 — Cross-file（2 篇）\n\n\n**[7× 本地 / 47 全球] 2402.14323 — REPOFUSE: Repository-Level Code Completion with Fused Dual Context**\n\n> 語言模型在程式碼輔助方面的成功推動了儲存庫級程式碼補全的提案，以利用整個程式碼庫的上下文來提升預測準確性。然而，這種擴大的上下文可能無意中增加推斷延遲，潛在地損害開發者體驗並阻礙工具採用——我們將此稱為上下文-延遲困境。本文介紹 REPOFUSE，一個旨在不犧牲延遲的情況下增強儲存庫級程式碼補全的開創性解決方案。REPOFUSE 獨特地融合了兩種上下文：基於程式碼類比的類比上下文，以及包含深層語義關係的理由上下文。我們提出一種新型的排名截斷生成（RTG）技術，能高效地將這些上下文壓縮為受限大小的提示。這使 REPOFUSE 在保持推斷效率的同時提供精確的程式碼補全。透過 CrossCodeEval 套件測試，REPOFUSE 展示了對現有模型的顯著飛躍，在程式碼補全的精確匹配（EM）準確率上提升 40.90% 至 59.75%，推斷速度提升 26.8%。\n\n\n**[3× 本地 / 52 全球] 2403.16792 — Iterative Refinement of Project-Level Code Context for Precise Code Generat**\n\n> 大型語言模型（LLMs）在自動化程式碼生成方面取得了顯著進展。然而，LLM 生成的程式碼可能在 API 使用、類、資料結構或缺失項目特定信息方面存在錯誤。由於大量的項目特定上下文無法放入 LLMs 的提示中，我們必須找到允許模型探索項目級程式碼上下文的方法。我們提出 CoCoGen，一種使用編譯器反饋改進 LLM 生成程式碼的新程式碼生成方法。CoCoGen 首先利用靜態分析識別生成程式碼與項目上下文之間的不匹配。然後，使用從程式碼倉庫提取的信息迭代對齊和修復識別出的錯誤。我們將 CoCoGen 與兩個代表性 LLMs（即 GPT-3.5-Turbo 和 Code Llama（13B））整合，並應用於 Python 程式碼生成。實驗結果表明，CoCoGen 在生成依賴項目上下文的程式碼方面，相比普通 LLMs 提升了 80% 以上，並持續優於現有的基於檢索的程式碼生成基準。\n\n\n## D/D4 — RAG/Doc（16 篇）\n\n\n**[7× 本地 / 209 全球] 2203.07722 — ReACC: A Retrieval-Augmented Code Completion Framework**\n\n> _(無 abstract 中譯)_\n\n\n**[7× 本地 / 3,328 全球] 2312.10997 — Retrieval-Augmented Generation for Large Language Models: A Survey**\n\n> _(無 abstract 中譯)_\n\n\n**[6× 本地 / 131 全球] 2310.19923 — Jina Embeddings 2: 8192-Token General-Purpose Text Embeddings for Long Docu**\n\n> 文本嵌入模型已成為將句子轉換為捕捉語義信息的固定大小特徵向量的強大工具。雖然這些模型對於資訊檢索、語義聚類和文本重新排序等任務至關重要，但大多數現有開源模型（尤其是基於 BERT 等架構構建的模型）難以表示較長的文件，往往需要截斷處理。一種常見的緩解方法是將文件分割成較小的段落再進行嵌入，但這會產生更大的向量集，導致記憶體消耗增加和計算密集的向量搜索延遲升高。為解決這些挑戰，我們推出 Jina Embeddings 2，一個能夠容納最多 8192 個 token 的開源文本嵌入模型，旨在突破傳統 512 token 限制並有效處理長文件。Jina Embeddings 2 不僅在 MTEB 基準中的一系列嵌入相關任務上達到最優水準，還與 OpenAI 的專有 ada-002 模型性能相當。\n\n\n**[5× 本地 / 209 全球] 2207.05987 — DocPrompting: Generating Code by Retrieving the Docs**\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 22 全球] 2307.15370 — Private-Library-Oriented Code Generation with Large Language Models**\n\n> 大型語言模型（LLMs），如 Codex 和 GPT-4，近來展示了其卓越的程式碼生成能力，大幅提升了程式設計效率。本文將深入探討如何利用 LLMs 為私有函式庫生成程式碼，因為私有函式庫在日常程式設計中被廣泛使用。儘管 LLMs 能力卓越，但生成私有 API 對 LLMs 而言是一大難題，因為它們在預訓練期間從未見過這些私有函式庫。為解決這一挑戰，我們提出了一個模擬程式設計師編寫私有程式碼過程的新型框架，包含兩個模組：APIFinder 首先從 API 文件中檢索可能有用的 API；APICoder 則利用這些檢索到的 API 生成私有程式碼。具體而言，APIFinder 採用向量檢索技術，並允許使用者參與檢索過程。APICoder 可直接使用現成的程式碼生成模型。為進一步培養從提示中調用 API 的明確能力，我們持續預訓練了一個強化版 APICoder，名為 CodeGenAPI。\n\n\n**[4× 本地 / 272 全球] 2108.11601 — Retrieval Augmented Code Generation and Summarization**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 46 全球] 2305.04032 — ToolCoder: Teach Code Generation Models to use API search tools**\n\n> 從自然語言描述自動生成原始碼近年來已成為一個不斷發展的研究領域。然而，目前的大規模程式碼生成模型在針對特定上下文選擇適當 API 時常遇到困難，可能生成不符合需求的 API 或引用第三方函式庫中不存在的 API，尤其對於知名度較低或私有函式庫而言更為突出。受人類開發者使用工具搜尋 API 過程的啟發，我們提出 ToolCoder，一種將 API 搜尋工具與現有模型整合以輔助程式碼生成和 API 選擇的新穎方法。為使模型學會使用工具，我們引入了一種自動資料標注方法，使用 ChatGPT 在原始碼資料中添加工具使用資訊，並對程式碼生成模型進行微調。在推理階段，我們將 API 搜尋工具整合進生成過程，使模型在選擇 API 時能自動使用搜尋工具獲取建議。我們的實驗結果表明，ToolCoder 在五個公開和私有函式庫程式碼生成基準上展現出卓越效能和泛化能力，至少提升 6.21%……\n\n\n**[4× 本地 / 1,436 全球] 2404.16130 — From Local to Global: A Graph RAG Approach to Query-Focused Summarization**\n\n> 使用檢索增強生成（RAG）從外部知識來源檢索相關資訊，使大型語言模型（LLMs）能夠回答關於私有或先前未見文件集合的問題。然而，RAG 在針對整個文本語料庫的全局性問題上（如「資料集中的主要主題是什麼？」）表現欠佳，因為這本質上是一個查詢聚焦摘要（QFS）任務，而非顯式的檢索任務。另一方面，先前的 QFS 方法無法擴展到典型 RAG 系統所索引的文本數量。為結合這兩種對比方法的優點，我們提出 GraphRAG，一種基於圖的方法，用於回答關於私有文本語料庫的問題，且能隨用戶問題的通用性和來源文本數量而縮放。我們的方法使用 LLM 分兩個階段構建圖索引：首先從來源文件中推導實體知識圖，然後為所有密切相關實體群組預生成社群摘要。給定一個問題，每個社群摘要用於生成部分回應，再將所有部分回應匯總為最終回應。\n\n\n**[4× 本地 / 96 全球] 2210.17236 — When Language Model Meets Private Library**\n\n> 隨著預訓練技術的快速發展，大量語言模型在大規模程式碼語料庫上完成預訓練，並在程式碼生成中表現優異。本文研究如何賦予預訓練語言模型為私有函式庫生成程式碼的能力。在實踐中，程式設計師使用私有函式庫編寫程式碼十分常見。然而，這對語言模型是一個挑戰，因為它們在訓練期間從未見過這些私有 API。受到私有函式庫通常附有詳盡 API 文件這一事實的啟發，我們提出了一個包含兩個模組的新型框架：APIRetriever 負責找到有用的 API，APICoder 則利用這些 API 生成程式碼。對於 APIRetriever，我們呈現了一個稠密檢索系統，並設計了友好的使用者互動。對於 APICoder，可直接使用現成的語言模型，或在包含 API 資訊的程式碼語料庫上持續預訓練基礎模型。兩個模組均以公開函式庫資料訓練，並可泛化至私有函式庫。此外，我們為私有函式庫構建了三個基準：TorchDataEval、MonkeyEval 和 BeatNumEval。\n\n\n**[4× 本地 / 119 全球] 2406.14497 — CodeRAG-Bench: Can Retrieval Augment Code Generation?**\n\n> 雖然語言模型（LMs）在程式碼生成方面已證明非常熟練，但許多程式對 LMs 僅憑其參數知識來生成仍具挑戰性。提供外部上下文（如函式庫文件）有助於生成準確且功能正常的程式碼。儘管檢索增強生成（RAG）在各類文本導向任務中取得了成功，其在改善程式碼生成方面的潛力仍未被充分探索。本研究中，我們透過系統性大規模分析提問：在哪些場景下檢索能使程式碼生成模型受益？還面臨哪些挑戰？我們首先整理了一個全面的評估基準 CodeRAG-Bench，涵蓋三類程式碼生成任務，包括基礎程式設計、開放域和儲存庫級問題。我們彙整了來自五個來源的文件供模型檢索上下文：競賽解答、線上教程、函式庫文件、StackOverflow 貼文和 GitHub 儲存庫。我們透過從一個或多個來源檢索上下文，考察了在 CodeRAG-Bench 上排名靠前的模型的表現。\n\n\n**[3× 本地 / 1,847 全球] 2310.11511 — Self-RAG: Learning to Retrieve, Generate, and Critique through Self-Reflect**\n\n> 儘管大型語言模型（LLMs）具備卓越的能力，但由於僅依賴其封裝的參數知識，常常產生包含事實不準確的回應。檢索增強生成（RAG）這一以相關知識增強語言模型的臨時方法降低了此類問題。然而，無論是否需要檢索或段落是否相關，無差別地檢索並納入固定數量的段落，會降低語言模型的多功能性或導致生成無益的回應。我們介紹一種名為自省式檢索增強生成（Self-RAG）的新框架，通過檢索與自我反思提升語言模型的品質和事實性。我們的框架訓練單一任意語言模型，能按需自適應地檢索段落，並使用稱為反思 token 的特殊 token 對檢索段落和自身生成進行生成與反思。生成反思 token 使語言模型在推論階段可控，能夠根據多樣化的任務需求調整其行為。實驗表明，Self-RAG（7B 和 13B 參數）顯著優於最先進的模型。\n\n\n**[3× 本地 / 203 全球] 2401.15884 — Corrective Retrieval Augmented Generation**\n\n> 大型語言模型（LLMs）不可避免地會產生幻覺，因為生成文本的準確性不能僅靠其封裝的參數知識來保障。雖然檢索增強生成（RAG）是 LLMs 的一個實用補充，但它嚴重依賴檢索文件的相關性，引發了當檢索出錯時模型如何應對的擔憂。為此，我們提出修正式檢索增強生成（CRAG）以提升生成的魯棒性。具體而言，設計了一個輕量級檢索評估器來評估查詢所檢索文件的整體品質，返回置信度分數，以此觸發不同的知識檢索動作。由於從靜態有限語料庫的檢索只能返回次優文件，大規模網頁搜索被用作擴展以增強檢索結果。此外，還設計了一種「分解後重組」演算法，使模型能夠選擇性地聚焦於檢索文件中的關鍵信息並過濾掉不相關信息。CRAG 是即插即用的，可與各種基於 RAG 的方法無縫結合。在四個資料集上的實驗涵蓋了多種任務。\n\n\n**[3× 本地 / 194 全球] 2006.05405 — Retrieval-Augmented Generation for Code Summarization via Hybrid GNN**\n\n> 原始碼摘要旨在從結構化程式碼片段生成自然語言摘要，以更好地理解程式碼功能。然而，由於原始碼的複雜性以及原始碼和自然語言摘要之間的語言差距，自動程式碼摘要具有挑戰性。大多數先前的方法要麼依賴基於檢索的方法（可以利用從檢索資料庫看到的類似示例，但泛化性能低），要麼依賴基於生成的方法（具有更好的泛化性能，但無法利用類似示例）。本文提出了一種新穎的檢索增強機制，將兩者的優點結合起來。此外，為了緩解圖神經網路（GNNs）在捕捉原始碼全局圖結構信息方面的侷限，我們提出了一種新穎的基於注意力的動態圖來補充原始碼的靜態圖表示，並設計了一個混合消息傳遞 GNN，用於捕捉局部和全局結構信息。為了評估所提出的方法，我們發布了一個新的挑戰性基準，從多樣化的大規模開源 C 語言程式庫中爬取。\n\n\n**[3× 本地 / 13,917 全球] 2005.11401 — Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks**\n\n> 大型預訓練語言模型已被證明能夠在其參數中儲存事實知識，並在對下游 NLP 任務進行微調時取得最先進的結果。然而，它們精確存取和操作知識的能力仍然有限，因此在知識密集型任務上的效能落後於任務特定架構 ingua: Compressing Prompts for Accelerated Inference of Large Language **\n\n> 大型語言模型（LLMs）因其驚人的能力而被應用於各種場景。隨著思維鏈（CoT）提示和情境學習（ICL）等技術的進步，輸入 LLMs 的提示越來越長，甚至超過數萬個 token。為加速模型推論並降低成本，本文介紹 LLMLingua，一種從粗到細的提示壓縮方法，包含一個在高壓縮比下維持語義完整性的預算控制器、一種更好地建模壓縮內容之間相互依賴性的 token 層級迭代壓縮算法，以及一種基於指令微調的語言模型分佈對齊方法。我們在四個不同場景的資料集（GSM8K、BBH、ShareGPT 和 Arxiv-March23）上進行了實驗與分析，結果顯示所提方法達到最先進的效能，允許最高 20 倍的壓縮，同時效能損失極小。\n\n\n**[3× 本地 / 60 全球] 2304.12102 — Unlocking Context Constraints of LLMs: Enhancing Context Efficiency of LLMs**\n\n> _(無 abstract 中譯)_\n\n\n**[3× 本地 / 275 全球] 2403.12968 — LLMLingua-2: Data Distillation for Efficient and Faithful Task-Agnostic Pro**\n\n> _(無 abstract 中譯)_\n\n\n**[3× 本地 / 195 全球] 2402.14848 — Same Task, More Tokens: the Impact of Input Length on the Reasoning Perform**\n\n> 本文探討擴展輸入長度對大型語言模型（LLM）能力的影響。儘管 LLM 近年來取得了進步，其在不同輸入長度下的效能一致性尚未得到充分理解。我們透過引入一個新型問答推理框架來調查這一方面，該框架專門設計用於評估輸入長度的影響。我們使用同一樣本的多個版本（每個版本以不同長度、類型和位置的填充進行擴展）來隔離輸入長度的影響。我們的研究結果表明，LLM 的推理效能在遠短於其技術最大長度的輸入長度時就出現明顯下降。我們表明，下降趨勢出現在我們資料集的每個版本中，儘管程度不同。此外，我們的研究揭示，下一詞預測的傳統指標與 LLM 在我們推理資料集上的效能負相關。我們分析了我們的結果，識別出可作為未來研究有益指引的失敗模式，可能為解決 LLM 中觀察到的限制提供策略。\n\n\n**[3× 本地 / 57 全球] 2510.11967 — Scaling Long-Horizon LLM Agent via Context-Folding**\n\n> 大型語言模型（LLM）agent 在長視野任務上從根本上受到上下文長度的限制。我們介紹 Context-Folding，一個賦予 agent 主動管理工作上下文能力的框架。agent 可以程序化地分支進入子軌跡以處理子任務，完成後將其折疊，壓縮中間步驟同時保留結果的簡潔摘要。為使此行為可學習，我們開發了端到端的強化學習框架 FoldGRPO，並附有鼓勵有效任務分解和上下文管理的特定過程獎勵。在複雜的長視野任務（Deep Research 和 SWE）上，我們的折疊 agent 在使用比 ReAct 基線小 10 倍的活躍上下文的情況下達到或超越其性能，且在基於摘要的上下文管理方法上有顯著提升。\n\n\n## D/D6 — Memory/Planning（5 篇）\n\n\n**[9× 本地 / 200 全球] 2309.12499 — CodePlan: Repository-Level Coding using LLMs and Planning**\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 650 全球] 2310.08560 — MemGPT: Towards LLMs as Operating Systems**\n\n> _(無 abstract 中譯)_\n\n\n**[3× 本地 / 236 全球] 2203.08913 — Memorizing Transformers**\n\n> 語言模型通常需要透過訓練或微調來獲取新知識，這涉及更新其權重。我們設想語言模型能夠在推理時直接讀取並記憶新資料，從而立即獲取新知識。本研究擴展語言模型，使其具備記憶過去輸入的內部表示的能力。我們展示了對近期（key, value）對的不可微非微分記憶進行近似 kNN 查找，能夠改善在各種基準和任務上的語言建模效能，包括通用網頁文本（C4）、數學論文（arXiv）、書籍（PG-19）、程式碼（Github）以及形式化定理（Isabelle）。我們表明，當記憶大小增加到 262K tokens 時，效能穩定提升。在包括程式碼和數學的基準上，我們發現模型能夠在測試時利用新定義的函式和定理。\n\n\n**[3× 本地 / 1,049 全球] 1911.00172 — Generalization through Memorization: Nearest Neighbor Language Models**\n\n> 我們引入 kNN-LMs，透過將預訓練神經語言模型（LM）與 k 近鄰（kNN）模型進行線性插值來擴展它。最近鄰根據預訓練 LM 嵌入空間中的距離計算，可從任何文本集合中提取，包括原始 LM 訓練資料。將此增強方法應用於強大的 Wikitext-103 LM（近鄰從原始訓練集中提取），我們的 kNN-LM 達到了新的最先進困惑度 15.79——在無需額外訓練的情況下改善了 2.9 個點。我們還表明，這種方法對高效擴展到更大訓練集有啟示，並允許僅透過更改最近鄰資料儲存（無需進一步訓練）實現有效的領域自適應。從品質上看，該模型在預測罕見模式（如事實知識）方面特別有幫助。綜合這些結果，強烈表明學習文本序列之間的相似性比預測下一個詞更容易，且最近鄰搜尋是長尾語言建模的有效方法。\n\n\n**[3× 本地 / 510 全球] 2404.13501 — A Survey on the Memory Mechanism of Large Language Model-based Agents**\n\n> 基於大型語言模型（LLM）的 agent 近來引發了研究和工業界的廣泛關注。與原始 LLMs 相比，基於 LLM 的 agent 以其自我演化能力為特色，這是解決需要長期且複雜的 agent-環境互動的真實世界問題的基礎。支撐 agent-環境互動的關鍵組件是 agent 的記憶。雖然以往研究提出了許多有前景的記憶機制，但它們散佈於不同的論文中，缺乏從整體視角對這些研究進行系統性回顧、總結和比較，未能抽象出啟發未來研究的通用有效設計模式。為填補這一空白，本文提出對基於 LLM 的 agent 記憶機制的全面調查。具體而言，我們首先討論「什麼是」以及「為何需要」基於 LLM 的 agent 中的記憶。然後，我們系統回顧了之前關於如何設計和評估記憶模組的研究。此外，我們還呈現了許多記憶模組發揮重要作用的 agent 應用。最後，我們分析了現有工作的局限性並指出了改進方向。\n\n\n## D/D7 — Static analysis（3 篇）\n\n\n**[7× 本地 / 68 全球] 2401.06391 — Teaching Code LLMs to Use Autocompletion Tools in Repository-Level Code Gen**\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 38 全球] 2406.10018 — STALL+: Boosting LLM-based Repository-level Code Completion with Static Ana**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 185 全球] 2405.17238 — LLM-Assisted Static Analysis for Detecting Security Vulnerabilities**\n\n> 軟體容易存在安全漏洞。偵測漏洞的程式分析工具在實踐中有效性有限，因為它們依賴人工標注的規格。大型語言模型（LLMs）展示了令人印象深刻的程式碼生成能力，但它們無法對程式碼進行複雜推理以偵測此類漏洞，尤其是該任務需要全儲存庫分析。我們提出 IRIS，一種將 LLMs 與靜態分析系統性結合以執行全儲存庫推理的神經符號方法，用於安全漏洞偵測。具體而言，IRIS 利用 LLMs 推斷污點規格並執行上下文分析，減少對人工規格與人工審查的需求。為評估，我們策劃了一個新資料集 CWE-Bench-Java，包含真實 Java 專案中 120 個人工驗證的安全漏洞。最先進的靜態分析工具 CodeQL 僅偵測其中 27 個，而使用 GPT-4 的 IRIS 偵測了 55 個（+28），並將 CodeQL 的平均誤報率提升了 5 個百分點。此外，IRIS 識別出了 4 個現有工具無法發現的未知漏洞。\n\n\n## D/D8 — RL retrieval（2 篇）\n\n\n**[11× 本地 / 51 全球] 2407.19487 — RLCoder: Reinforcement Learning for Repository-Level Code Completion**\n\n> 儲存庫層級的程式碼補全旨在結合特定儲存庫的上下文，為未完成的程式碼片段生成程式碼。現有方法由於輸入序列長度的限制，主要依賴檢索增強生成策略。然而，BM25 等傳統基於詞彙的檢索方法難以捕捉程式碼語義，而基於模型的檢索方法又因缺乏標注訓練資料而面臨挑戰。為此，我們提出 RLCoder，一個新穎的強化學習框架，能夠讓檢索器在無需標注資料的情況下學習為程式碼補全檢索有用內容。具體而言，我們根據目標程式碼在以檢索內容作為額外上下文時的困惑度，迭代評估檢索內容的有用性，並提供回饋以更新檢索器參數。這一迭代過程使檢索器能夠從成功與失敗中學習，逐步提升其檢索相關且高品質內容的能力。考慮到並非所有情況都需要程式碼檔案以外的資訊，且並非所有檢索的上下文都對生成有幫助，我們還引入了……\n\n\n**[4× 本地 / 971 全球] 2503.09516 — Search-R1: Training LLMs to Reason and Leverage Search Engines with Reinfor**\n\n> 高效獲取外部知識和最新資訊對大型語言模型（LLMs）的有效推理和文本生成至關重要。提示具有推理能力的先進 LLMs 在推理時使用搜尋引擎通常是次優的，因為 LLM 可能不完全具備如何與搜尋引擎最佳互動的能力。本文介紹 Search-R1，一種針對推理框架的強化學習（RL）擴展，讓 LLM 學習在逐步推理過程中自主生成（多個）搜尋查詢，同時進行實時檢索。Search-R1 透過多輪搜尋互動優化 LLM 推理軌跡，利用檢索 token 遮罩實現穩定的 RL 訓練，並採用簡單的基於結果的獎勵函式。在七個問答資料集上的實驗表明，Search-R1 在相同設置下相比各種 RAG 基準線提升效能 41%（Qwen2.5-7B）和 20%（Qwen2.5-3B）。本文還進一步提供了關於 RL 優化方法、LLM 選擇以及檢索增強推理中回應長度動態的實證見解。\n\n\n## D/D9 — Intent/Spec/QA（7 篇）\n\n\n**[18× 本地 / 91 全球] 2408.02232 — SpecRover: Code Intent Extraction via LLMs**\n\n> 自主程式改進通常涉及自動生成 bug 修復與功能新增。此類程式改進可透過結合大型語言模型（LLM）與程式分析能力的 LLM agent 來實現。由於程式修復或改進通常需要對預期行為進行規格說明，規格推斷有助於生成高品質的程式 patch。本研究探討了 LLM agent 中迭代規格推斷的高效低成本工作流程。給定需在軟體項目中解決的 GitHub issue，我們的目標是執行伴隨規格推斷的迭代程式碼搜尋，從而同時從項目結構和行為中推斷意圖。所推斷的意圖由審查者 agent 審核，以驗證 patch 並提供置信度評估。我們的方法 SpecRover（AutoCodeRover-v2）基於開源 LLM agent AutoCodeRover 構建，在包含 2294 個 GitHub issues 的完整 SWE-Bench 上的評估顯示，相較於 AutoCodeRover 效果提升超過 50%。\n\n\n**[3× 本地 / 16 全球] 2501.03447 — CoReQA: Uncovering Potentials of Language Models in Code Repository Questio**\n\n> _(無 abstract 中譯)_\n\n\n**[3× 本地 / 12 全球] 2407.02095 — TIGER: A Generating-Then-Ranking Framework for Practical Python Type Infere**\n\n> Python 的動態型別系統提供了靈活性和表達能力，但可能導致型別相關的錯誤，促使需要自動化型別推斷以增強型別提示。雖然現有的基於學習的方法展現出有希望的推斷準確性，但它們在全面處理各種型別方面面臨實際挑戰，包括複雜的參數化型別和（未見過的）使用者定義型別。本文介紹 TIGER，一個兩階段生成-排名（GTR）框架，旨在有效處理 Python 的多樣型別類別。TIGER 利用微調的預訓練程式碼模型，以跨度遮罩目標訓練生成模型，以對比訓練目標訓練相似性模型。這種方法使 TIGER 能夠在生成階段生成廣泛的型別候選（包括複雜的參數化型別），並在排名階段準確地對使用者定義型別進行排名。我們在 ManyTypes4Py 資料集上的評估表明，TIGER 在各種 我一致性（self-consistency），以取代思維鏈提示中使用的簡單貪婪解碼。它首先對多條不同的推理路徑進行採樣，而非僅取貪婪路徑，然後透過邊際化採樣到的推理路徑來選擇最一致的答案。自我一致性利用了這樣一個直覺：複雜的推理問題通常存在多種不同的思路，但最終都通向唯一正確的答案。我們廣泛的實證評估表明，自我一致性在多個主流算術和常識推理基準測試中大幅提升了思維鏈提示的效能，包括 GSM8K（+17.9%）、SVAMP（+11.0%）、AQuA（+12.2%）、StrategyQA（+6.4%）和 ARC-challenge（+3.9%）。\n\n\n**[7× 本地 / 18,316 全球] 2201.11903 — Chain of Thought Prompting Elicits Reasoning in Large Language Models**\n\n> 我們探索了生成思維鏈——一系列中間推理步驟——如何顯著提升大型語言模型執行複雜推理的能力。特別地，我們展示了這種推理能力如何在規模足夠大的語言模型中，通過一種稱為思維鏈提示（chain of thought prompting）的簡單方法自然湧現，即在提示中提供少量思維鏈示範作為範例。在三個大型語言模型上的實驗表明，思維鏈提示在一系列算術、常識和符號推理任務上均有效提升效能。實證提升可能相當顯著：例如，僅用八個思維鏈範例提示一個 540B 參數的語言模型，在數學文字題基準 GSM8K 上即可達到最先進的精度，甚至超越了使用驗證器微調的 GPT-3。\n\n\n**[7× 本地 / 856 全球] 2402.07927 — A Systematic Survey of Prompt Engineering in Large Language Models: Techniq**\n\n> Prompt engineering 已成為拓展大型語言模型（LLMs）和視覺語言模型（VLMs）能力不可或缺的技術。此方法利用稱為 prompt 的任務特定指令，在不修改核心模型參數的情況下提升模型效能。Prompt 可以是提供上下文的自然語言指令，也可以是激活相關知識的可學習向量表示。這一蓬勃發展的領域在問答到常識推理等各類應用中均取得了成功。然而，目前對多樣化的 prompt engineering 方法與技術仍缺乏系統性整理與理解。本綜述透過提供按應用領域分類的 prompt engineering 近期進展結構化概覽來填補這一空白，針對每種 prompting 方法提供了包括 prompting 方法論、應用、所用模型及所用資料集的摘要說明。\n\n\n**[6× 本地 / 1,033 全球] 2301.00234 — A Survey on In-context Learning**\n\n> 隨著大型語言模型（LLM）能力的不斷提升，情境學習（in-context learning，ICL）已成為自然語言處理（NLP）的一種新範式，LLM 基於以少量示例增強的上下文進行預測。探索 ICL 以評估和擴展 LLM 的能力已成為一個重要趨勢。本文旨在綜述 ICL 的進展與挑戰。我們首先給出 ICL 的正式定義，並闡明其與相關研究的關聯。然後，我們整理並討論先進技術，包括訓練策略、提示設計策略及相關分析。此外，我們探索了各種 ICL 應用場景，如資料工程和知識更新。最後，我們探討 ICL 所面臨的挑戰並提出潛在的未來研究方向。我們希望本研究能夠鼓勵更多研究揭示 ICL 的工作原理並改進 ICL。\n\n\n**[5× 本地 / 316 全球] 2305.06599 — Structured Chain-of-Thought Prompting for Code Generation**\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 1,296 全球] 2211.12588 — Program of Thoughts Prompting: Disentangling Computation from Reasoning for**\n\n> 最近，在教導語言模型進行逐步推理以解決複雜數值推理任務方面取得了重大進展。思維鏈提示（CoT）是迄今為止這類任務最先進的方法。CoT 使用語言模型在多步驟「思考」過程中同時進行推理和計算。為了將計算從推理中分離，我們提出「思維程式」（Program of Thoughts，PoT），使用語言模型（主要是 Codex）將推理過程表達為程式。計算被委託給外部電腦執行所生成的程式以得出答案。我們在五個數學文字題資料集（GSM、AQuA、SVAMP、TabMWP、MultiArith）和三個金融問答資料集（Fin g for large language models**\n\n> 本綜述探索提示工程在釋放大型語言模型（LLM）能力方面的作用。提示工程是結構化輸入的過程，已成為最大化這些模型效用和準確性的關鍵技術。本文探討了基礎和高級提示工程方法論，包括自我一致性、思維鏈和生成知識等技術，這些技術可以顯著提升模型效能。此外，本文還詳細探討了視覺語言模型（VLM）的提示方法。提示方法使用主觀和客觀指標進行評估，確保對其有效性進行嚴格分析。討論的核心是提示工程在人工智慧（AI）安全中的作用，特別是在防禦利用 LLM 漏洞的對抗性攻擊方面。本文全面審視了最大限度降低這些風險並提升模型魯棒性的策略。最後，我們對未來的研究和應用提供展望。\n\n\n**[4× 本地 / 393 全球] 2308.07702 — Better Zero-Shot Reasoning with Role-Play Prompting**\n\n> 現代大型語言模型（LLM）展現出卓越的角色扮演能力，使其不僅能夠扮演人類角色，還能扮演非人類實體。這種多功能性使它們能夠在各種情境中模擬複雜的類人互動和行為，以及模擬特定的物件或系統。雖然這些能力提升了使用者參與度並帶來了新的互動模式，但角色扮演對 LLM 推理能力的影響仍未得到充分探索。本研究引入一種有策略性設計的角色扮演提示方法，並在零樣本設定下評估其在十二個多樣化推理基準測試上的效能。我們的實證結果表明，角色扮演提示在大多數資料集上始終優於標準零樣本方法。值得注意的是，在使用 ChatGPT 進行的實驗中，AQuA 上的準確率從 53.5% 提升至 63.8%，Last Letter 任務上從 23.8% 提升至 84.2%。在進一步與提示模型「逐步思考」的 Zero-Shot-CoT 技術比較後，我們的研究表明，角色扮演提示作為 CoT 過程的觸發器更為有效，突顯了其潛力。\n\n\n**[4× 本地 / 76 全球] 2404.14662 — NExT: Teaching Large Language Models to Reason about Code Execution**\n\n> 人類開發者的一項基本能力是理解和推理程式執行過程。例如，程式設計師可以用自然語言在腦中模擬程式碼執行，以除錯和修復程式碼（即小黃鴨除錯法）。然而，程式碼大型語言模型（LLMs）通常在程式的表面文本形式上訓練，因此可能缺乏對程式在執行時如何運行的語義理解。為解決這一問題，我們提出 NExT，一種教導 LLMs 檢查程式執行追蹤（已執行行的變量狀態）並透過思維鏈（CoT）推理分析其執行時行為的方法。具體而言，NExT 使用自訓練以引導式生成感知執行的推理鏈合成訓練集，這些推理鏈引導至正確的任務解決方案（如修復的程式），無需費力的人工標注。在基於 MBPP 和 HumanEval 的程式修復任務上的實驗表明，NExT 分別將 PaLM 2 模型的修復率提升了 26.1% 和 14.3% 的絕對值，且推理品質透過自動指標和人工評估者驗證顯著提高。\n\n\n**[3× 本地 / 85 全球] 2305.08360 — Improving ChatGPT Prompt for Code Generation**\n\n> 自動化程式碼生成是軟體開發中的強大技術，能夠根據需求自動生成程式碼，顯著減少開發者的工作量和時間。近期，OpenAI 的語言模型 ChatGPT 已成為生成類人回應的強大工具，可應用於廣泛的文本輸入（即 prompt），包括與程式碼生成相關的輸入。然而，ChatGPT 在程式碼生成上的有效性尚不明確，且生成性能可能深受 prompt 選擇的影響。為回答這些問題，我們使用 CodeXGlue 資料集進行實驗，評估 ChatGPT 在兩類程式碼生成任務（文本轉程式碼和程式碼轉程式碼生成）上的能力。我們利用多步優化的思維鏈策略設計 prompt，結果顯示通過精心設計 prompt 引導 ChatGPT，生成性能可以得到顯著提升。我們還分析了影響 prompt 設計的因素，並提供了對未來研究有指導意義的洞見。\n\n\n**[3× 本地 / 83 全球] 2310.09748 — Large Language Model-Aware In-Context Learning for Code Generation**\n\n> 大型語言模型（LLMs）在程式碼生成中展現出令人印象深刻的上下文學習（ICL）能力。LLMs 將由少量示範範例和新需求組成的提示上下文作為輸入，無需任何參數更新即可輸出新程式。現有研究發現，基於 ICL 的程式碼生成性能在很大程度上依賴於示範範例的品質，因此出現了選擇示範範例的研究：給定新需求，從候選池中選取少量示範範例，期望 LLMs 從這些選定示範範例中學習隱藏的模式。現有方法大多基於啟發式或隨機選擇範例。然而，隨機選擇的範例分佈通常差異很大，使 LLMs 的性能較不健壯。啟發式方法僅考慮需求的文本相似性來檢索範例，導致性能欠佳。為填補這一空白，我們提出一種面向基於上下文學習的程式碼生成的語言模型感知選擇方法，命名為 LAIL。LAIL 使用 LLMs 本身來選擇範例，要求 LLMs 自行標注候選池。\n\n\n**[3× 本地 / 244 全球] 2303.05510 — Planning with Large Language Models for Code Generation**\n\n> 現有的基於大型語言模型的程式碼生成流程在解碼過程中通常使用 beam search 或採樣演算法。儘管生成的程式碼能達到較高的基於 token 匹配的分數，但往往無法通過編譯或生成錯誤的輸出。主要原因是傳統的 Transformer 解碼演算法可能不是程式碼生成的最佳選擇。本研究提出了一種新型的 Transformer 解碼演算法——規劃引導 Transformer 解碼（PG-TD），使用規劃演算法進行前瞻搜索以引導 Transformer 生成更好的程式碼。具體而言，Transformer 不是單純地優化生成序列的似然，而是利用規劃器生成候選程式碼並在公開測試用例上進行測試，從而做出更明智的決策，生成最終能帶來更高品質程式碼的 token。我們還設計了一種在 Transformer 和規劃器之間共享信息的機制以提高演算法的計算效率。我們以多個大型語言模型為骨幹，在公開程式設計挑戰基準上對該框架進行了實驗驗證。\n\n\n**[3× 本地 / 101 全球] 2402.00905 — Fine-tuning and prompt engineering for large language models-based code rev**\n\n> 背景：大型語言模型（LLMs）的快速演進引發了對其在自動化程式碼審查流程中應用的濃厚興趣。先前研究通常專注於開發用於程式碼審查自動化的 LLMs，但需要昂貴的資源，對預算和資源有限的組織並不可行。因此，微調和提示工程是利用 LLMs 進行程式碼審查自動化的兩種常見方法。目標：我們旨在研究基於 LLMs 的程式碼審查自動化在兩種情境下（LLMs 通過微調和提示利用時）的效能。微調涉及在特定程式碼審查資料集上訓練模型，而提示則涉及提供明確指令以引導模型的生成過程，無需特定程式碼審查資料集。方法：我們在基於 LLMs 的程式碼審查自動化上運用模型微調和推論技術（零樣本學習、少樣本學習和角色設定）。總計，我們調查了兩種基於 LLMs 的程式碼審查自動化（GPT-3.5 和 Magicoder）的 12 個變體，並與 Guo 等人的方法和三個現有程式碼審查方法進行比較。\n\n\n**[3× 本地 / 26 全球] 2310.10508 — Prompt Engineering or Fine-Tuning: An Empirical Assessment of LLMs for Code**\n\n> 大型語言模型（LLMs）的快速進步極大地擴展了自動化程式碼相關任務的潛力，該領域主要採用兩種方法：prompt engineering 和微調（fine-tuning）。Prompt engineering 涉及應用不同策略查詢 ChatGPT 等 LLMs，而微調則通過在任務特定資料上訓練進一步調整 CodeBERT 等預訓練模型。儘管該領域持續增長，兩種方法在程式碼模型上的全面比較分析仍然缺乏。本文評估了 GPT-4 在三種 prompt engineering 策略（基礎 prompting、情境學習和任務特定 prompting）下的表現，並在程式碼摘要、生成和翻譯三項程式碼相關任務上與 17 個微調模型進行比較。結果表明，使用 prompt engineering 的 GPT-4 並不能持續超越微調模型——例如在程式碼生成上，GPT-4 在 MBPP 資料集上被微調模型超越 28.3 個百分點，在程式碼翻譯任務上結果也不一。此外，我們還對 27 名研究生和 10 名業界從業者進行了用戶研究。\n\n\n**[3× 本地 / 154 全球] 2311.04205 — Rephrase and Respond: Let Large Language Models Ask Better Questions for Th**\n\n> 誤解不僅出現在人際溝通中，也存在於人類與大型語言模型（LLMs）之間。此類分歧可能使 LLMs 以意想不到的方式解讀看似明確的問題，從而產生錯誤回應。雖然提示 家人類審計師「先感知可能存在的問題，然後對程式碼進行詳細分析以識別原因」這一觀察的啟發。因此，iAudit 採用兩階段微調方法：首先微調 Detector 模型進行決策，然後微調 Reasoner 模型生成漏洞成因。然而，單純微調在準確識別漏洞最優成因方面面臨挑戰。因此，我們引入了兩個基於 LLM 的智能體 Ranker 和 Critic。\n\n\n**[3× 本地 / 159 全球] 2308.06782 — PentestGPT: An LLM-empowered Automatic Penetration Testing Tool**\n\n> 滲透測試是確保系統安全的重要工業實踐，由於需要人類專業人員的廣泛專業知識，傳統上難以自動化。大型語言模型（LLMs）在各領域展現了顯著進步，其湧現能力表明其可能改變各行各業。在本研究中，我們使用由平台測試機器創建的強健基準，評估 LLMs 在真實世界滲透測試任務上的表現。我們的研究結果表明，LLMs 在滲透測試過程中的特定子任務上表現出熟練性，如使用測試工具、解釋輸出和建議後續操作，但在維持對整體測試場景的整體理解方面也遇到困難。針對這些見解，我們介紹 PentestGPT，一個利用 LLMs 中豐富領域知識的 LLM 賦能自動化滲透測試工具。PentestGPT 精心設計了三個自互動模組，每個模組針對滲透測試的各個子任務，以緩解與上下文丟失相關的挑戰。\n\n\n**[3× 本地 / 63 全球] 2406.03718 — Generalization-Enhanced Code Vulnerability Detection via Multi-Task Instruc**\n\n> 基於程式碼預訓練模型（CodePTM）的漏洞偵測近年來取得了有希望的結果。然而，這些模型在泛化方面表現欠佳，因為它們通常學習從源程式碼到標籤的表面映射，而非理解程式碼漏洞的根本原因，導致在訓練實例之外的真實世界場景中表現不佳。為應對這一挑戰，我們引入 VulLLM，一個將多任務學習與大型語言模型（LLM）整合以有效挖掘深層漏洞特徵的新型框架。具體而言，我們在漏洞偵測任務之外構建了兩個輔助任務。首先，我們利用漏洞補丁構建漏洞定位任務。其次，基於從補丁中提取的漏洞特徵，我們利用 GPT-4 構建漏洞解釋任務。VulLLM 創新性地透過利用生成式 LLM 理解複雜漏洞模式來增強漏洞分類，從而迫使模型捕捉漏洞的根本原因，而非過擬合單一任務的虛假特徵。在六個大型資料集上進行的實驗表明了相應效果。\n\n\n**[3× 本地 / 40 全球] 2401.03374 — LLM-Powered Code Vulnerability Repair with Reinforcement Learning and Seman**\n\n> 在軟體開發中，對功能性的主要強調通常超越了安全考量，而 GitHub Copilot 等 AI 驅動的自動化工具加劇了這一趨勢。這些工具顯著提升了開發人員在功能程式碼開發方面的效率。然而，值得關注的是，這些工具也因在主要包含易受攻擊程式碼的公開倉庫上進行預訓練而導致不安全程式碼的產生。此外，開發人員被稱為「鏈條中最薄弱的環節」，因為他們對程式碼安全的了解非常有限。雖然現有解決方案為易受攻擊的程式碼提供了合理的解決方案，但它們必須充分描述並教育開發人員關於程式碼安全的知識，以確保安全問題不再重複出現。因此，我們介紹了一個多用途程式碼漏洞分析系統 SecRepair，由大型語言模型 CodeGen2 驅動，協助開發人員識別和生成修復程式碼，以及帶有程式碼注釋的漏洞完整描述。我們的創新方法使用強化學習範式生成程式碼注釋，輔以語意獎勵機制。\n\n\n## F/F1 — Repair agents（3 篇）\n\n\n**[26× 本地 / 312 全球] 2403.17134 — RepairAgent: An Autonomous, LLM-Based Agent for Program Repair**\n\n> 自動化程式修復已成為一種強大的技術，可減輕軟體錯誤對系統可靠性和使用者體驗的影響。本文介紹 RepairAgent，這是首個透過基於大型語言模型（LLM）的自主智能體來應對程式修復挑戰的研究。與現有的基於深度學習的方法不同（這些方法以固定提示或固定反饋迴圈驅動模型），本研究將 LLM 視為能夠自主規劃並執行動作的智能體，透過呼叫適當工具來修復錯誤。RepairAgent 自由交替進行有關錯誤的資訊收集、修復素材收集和修復驗證，同時根據收集到的資訊和先前修復嘗試的反饋來決定呼叫哪些工具。使 RepairAgent 得以實現的關鍵貢獻包括：一套對程式修復有用的工具、一種允許 試生成方面的效果仍不明確。在本研究中，我們進行首項實證研究，評估 ChatGPT 的單元測試生成能力。具體而言，我們進行量化分析和用戶研究，從正確性、充分性、可讀性和可用性等方面系統調查其生成測試的品質。ChatGPT 生成的測試仍存在正確性問題，包括多種編譯錯誤和執行失敗。儘管如此，ChatGPT 生成的通過測試通過達到與手動編寫測試相近的表現。\n\n\n**[6× 本地 / 31 全球] 2412.02883 — TDD-Bench Verified: Can LLMs Generate Tests for Issues Before They Get Reso**\n\n> 測試驅動開發（TDD）是先編寫測試再編寫程式碼的實踐，其倡導者闡述了 TDD 的諸多優點。例如，對於原始碼儲存庫中的一個問題，測試可以在任何人為商定的修復方案編寫程式碼之前，向利益相關者釐清所期望的行為。儘管「先寫程式碼，後測試」實踐的自動化測試生成研究已相當豐富，但 TDD 的自動化卻鮮有研究。理想情況下，TDD 的測試應是失敗後通過（即在問題解決前失敗，解決後通過），並對問題解決過程中更改的程式碼具有良好的覆蓋充分性。本文介紹 TDD-Bench Verified，一個從真實 GitHub 程式碼儲存庫挖掘的 449 個問題的高品質基準套件。基準評估框架以隔離方式僅執行相關測試，以實現簡單而準確的覆蓋率衡量，資料集同時經過人工評審與框架執行的雙重篩選。本文還介紹了 Auto-TDD，一種基於 LLM 的解決方案，以問題描述和程式碼庫（問題解決前）為輸入，輸出可用於 TDD 的測試。\n\n\n**[4× 本地 / 50 全球] 2406.04531 — TESTEVAL: Benchmarking Large Language Models for Test Case Generation**\n\n> 測試在軟體開發周期中扮演至關重要的角色，能夠偵測 bug、漏洞及其他不良行為。為進行軟體測試，測試人員需要編寫執行被測程式的程式碼片段。近期，研究者認識到了大型語言模型（LLMs）在軟體測試中的潛力。然而，不同 LLMs 在測試用例生成能力方面缺乏公平的比較。本文提出 TESTEVAL，一個面向 LLMs 測試用例生成的新基準。我們從線上程式設計平台 LeetCode 收集了 210 個 Python 程式，並設計了三種不同任務：整體覆蓋率、目標行/分支覆蓋率以及目標路徑覆蓋率。我們進一步在 TESTEVAL 上評估了 16 個流行 LLMs（包括商業和開源模型）。結果發現，生成覆蓋特定程式行/分支/路徑的測試用例對當前 LLMs 仍具挑戰性，表明其在理解程式邏輯和執行路徑方面能力有限。資料集和基準流程已開源於 https://github.com/LLM4SoftwareTesting/TestEval。\n\n\n**[4× 本地 / 17 全球] 2502.05368 — Otter: Generating Tests from Issues to Validate SWE Patches**\n\n> 雖然有大量從現有程式碼生成測試的研究，但從問題描述生成測試的研究相對有限。正確的測試必須驗證解決問題的程式碼補丁。本文聚焦於該程式碼補丁尚不存在的場景，以支持兩個主要使用案例。首先，它支持測試驅動開發（TDD）——「先測試，後編碼」的規範，這一規範對人類軟體工程師有充分記錄的益處。其次，它還可以驗證生成程式碼補丁以解決問題的軟體工程（SWE）智能體。本文介紹 TDD-Bench-Verified，一個從問題描述生成測試的基準測試，以及 Otter，一個針對此任務的基於 LLM 的解決方案。Otter 以基於規則的分析增強 LLM 以檢查和修復其輸出，並引入了一種新穎的自反思動作規劃器。實驗表明，Otter 在從問題描述生成測試方面優於現有最先進系統，並且還增強了從問題描述生成補丁的系統。我們希望 Otter 能幫助開發者更高效地解決問題，並生成更健壯、測試更完善的程式碼。\n\n\n**[4× 本地 / 14 全球] 2503.16320 — Issue2Test: Generating Reproducing Test Cases from Issue Reports**\n\n> 自動化解決 GitHub Issues 的工具正受到研究人員和從業者的廣泛關注，例如以基礎模型和帶有 Issues 提示的基於 LLM 的 agent 的形式。成功解決 Issue 的關鍵步驟是創建一個能準確重現 Issue 的測試案例。這樣的測試案例可以指導尋找適當的補丁，並幫助驗證補丁是否符合 Issue 的意圖。然而，現有的 Issue 重現技術僅表現出中等程度的成功。本文提出 Issue2Test，一種基於 LLM 的技術，用於自動為給定 Issue 報告生成可重現的測試案例。與旨在創建通過測試的自動化回歸測試生成器不同，我們的方法旨在創建一個失敗的測試，且失敗原因恰好與 Issue 中描述的原因相符。為此，Issue2Test 執行三個步驟：(1) 理解 Issue 並收集與重現 Issue 相關的上下文（如相關文件和項目特定指南）；(2) 生成候選測試案例；(3) 根據編譯和執行時反饋迭代改進測試案例，直到測試失敗且失敗原因與問題描述中的問題相符。\n\n\n**[3× 本地 / 61 全球] 2302.00288 — Learning-based Widget Matching for Migrating GUI Test Cases**\n\n> GUI 測試案例遷移是指將 GUI 測試案例從一個源應用遷移至目標應用，其關鍵在於介面元件匹配。近期研究人員提出了多種方法，將介面元件匹配構建為匹配任務。然而，由於這些匹配方法依賴靜態詞嵌入而不使用上下文資訊來表示介面元件，以及手工制定的匹配函式，在處理應用中複雜的匹配關係時存在主要侷限。為解決這些侷限，我們提出了首個基於學習的介面元件匹配方法 TEMdroid（TEst Migration），用於測試案例遷移。與現有方法不同，TEMdroid 使用 BERT 捕捉上下文資訊，並學習一個匹配模型來匹配介面元件。此外，為平衡應用中正負樣本之間的顯著不平衡，我們設計了一種兩階段訓練策略：先訓練一個難負例挖掘器，再使用正樣本和挖掘的難負例訓練匹配模型。在 34 個應用上的評估顯示 TEMdroid 在事件匹配上有效。\n\n\n**[3× 本地 / 20 全球] 2404.10304 — LLM-Powered Test Case Generation for Detecting Bugs in Plausible Programs**\n\n> 偵測可信程式中的隱蔽錯誤——即通過現有測試套件但仍含有錯誤的程式——在軟體測試中仍是一項重大挑戰。為解決這一問題，我們提出 TrickCatcher，一種基於 LLM 的方法，用於生成測試案例以揭露可信程式中的錯誤。TrickCatcher 分三個階段運作：首先，利用 LLM 根據被測程式（PUT）及其規格生成程式變體；其次，利用 LLM 從規格中構建輸入生成器以產生測試輸入；最後，在 PUT 及其程式變體上執行這些輸入，以偵測輸出不一致性。我們在 TrickyBugs 和 EvalPlus 兩個資料集上評估 TrickCatcher，包含 366 個人工撰寫和 151 個 AI 生成的含有隱蔽錯誤的可信程式。TrickCatcher 的召回率、精確率和 F1 分數分別是最先進基準的 1.80 倍、2.65 倍和 1.66 倍。\n\n\n**[3× 本地 / 21 全球] 2407.00225 — Large-scale, Independent and Comprehensive study of the power of LLMs for t**\n\n> 單元測試對軟體可靠性至關重要，但手動創建測試耗時且常被忽視。基於搜尋的軟體測試雖然提高了效率，但生成的測試可讀性和可維護性較差；LLMs 雖然展現出潛力，但缺乏跨推理型提示和現實場景的全面評估。本研究首次在完整類別級別對 LLM 生成的單元測試進行大規模實證評估，分析四個模型（GPT-3.5、GPT-4、Mistral 7B 和 Mixtral 8x7B）與 EvoSuite 在針對 Defects4J、SF110 和 CMD 的 216,300 個測試案例上的對比。我們評估了五種提示技術——ZSL、FSL、CoT、ToT 和 GToT——評估可編譯性、幻覺驅動的失敗、可讀性、覆蓋率和測試異味。基於推理的提示（尤其是 GToT）顯著提升了可靠性和可編譯性，但幻覺驅動的失敗仍然持續存在，編譯失敗率高達 86%。雖然 LLM 生成的測試通常比 SBST 輸出更具可讀性，但 Magic Number Tests 和 Assertion Roulette 等反覆出現的問題影響了可維護性。這些發現表明，結合 LLM 的混合方法值得探索。\n\n\n**[3× 本地 / 29 全球] 2409.03093 — ASTER: Natural and Multi-Language Unit Test Generation with LLMs**\n\n> 實現自動化單元測試是軟體開發中重要但耗時的活動。為協助開發者完成這一任務，許多自動化單元測試生成技術被開發出來。然而，儘管付出了大量努力，可用工具僅支援極少數程式語言。此外，研究發現自動生成的測試可讀性差，且不像開發者手寫的測試。本研究嚴格調查大型語言模型（LLMs）如何幫助彌合這一差距。我們描述了一個通用管線，結合靜態分析引導 LLMs 生成可編譯且覆蓋率高的測試案例。我們說明該管線如何應用於不同程式語言（特別是 Java 和 Python），以及需要環境模擬（mocking）的複雜軟體。我們進行了實證研究，從程式碼覆蓋率和測試自然性兩個維度評估生成測試的品質——在標準及企業 Java 應用和大型 Python 基準上進行評估。結果表明，在靜態分析引導下，基於 LLM 的測試生成具有競爭力，甚至能夠超越現有最先進方法。\n\n\n**[3× 本地 / 24 全球] 2308.08033 — Domain Adaptation for Code Model-Based Unit Test Case Generation**\n\n> 近來，基於深度學習的測試案例生成方法被提出以自動化生成單元測試案例。在本研究中，我們利用基於 Transformer 的程式碼模型，借助專案級別的領域自適應（DA）來生成單元測試。具體而言，我們使用 CodeT5——一個在原始碼資料上訓練的相對小型語言模型——並在測試生成任務上對其進行微調。然後，我們對每個目標專案資料應用領域自適應，以學習專案特定知識（專案級 DA）。我們使用 Methods2test 資料集對 CodeT5 進行測試生成任務的微調，使用 Defects4j 資料集進行專案級領域自適應和評估。我們將我們的方法與（a）未採用 DA 的 CodeT5 微調版、（b）A3Test 工具和（c）GPT-4 在 Defects4j 資料集的五個專案上進行比較。結果表明，採用 DA 生成的測試相比上述（a）、（b）、（c）基線，行覆蓋率分別提升了 18.62%、19.88% 和 18.02%，突變分數分別提升了 16.45%、16.01% 和 12.99%。\n\n\n**[3× 本地 / 55 全球] 2410.00752 — TestGenEval: A Real World Unit Test Generation and Test Completion Benchmar**\n\n> 程式碼生成模型可以幫助改善許多常見的軟體任務，從程式碼補全到缺陷預測。現有的大多數程式碼生成 LLMs 基準聚焦於程式碼創作或程式碼補全。令人驚訝的是，儘管良好測試的軟體與有效錯誤檢測之間存在強相關性，但在軟體測試基準方面的投入卻少得多。為填補這一空白，我們創建並發布了 TestGenEval，一個大規模基準，用於衡量測試生成性能。基於 SWEBench，TestGenEval 包含來自 11 個維護良好的 Python 倉庫的 1,210 個程式碼和測試文件對中的 68,647 個測試。它涵蓋了初始測試創作、測試套件補全和程式碼覆蓋率改進。測試創作模擬開發人員從頭開始編寫測試套件的過程，而測試補全則模擬開發人員旨在提高現有測試套件覆蓋率的場景。我們評估了幾個流行模型，大小從 7B 到 405B 參數不等。我們的詳細分析突出了 TestGenEval 對測試生成性能全面評估的貢獻。特別是，模型在生成高品質測試方面仍面臨挑戰。\n\n\n**[3× 本地 / 20 全球] 2409.17561 — TestBench: Evaluating Class-Level Test Case Generation Capability of Large **\n\n> 軟體測試是軟體生命週期的關鍵階段，有助於識別潛在風險並降低維護成本。隨著大型語言模型（LLMs）的發展，研究者提出了越來越多基於 LLM 的軟體測試技術，尤其在測試用例生成領域。儘管興趣日益增長，對 LLMs 在此任務上實際能力進行全面評估的工作仍然有限。本文推出 TestBench，一個面向類別級基於 LLM 測試用例生成的基準。我們從 GitHub 上 9 個真實世界大規模項目中構建了 108 個 Java 程式的資料集，每個程式代表不同的主題領域。我們設計了基於上下文描述的三種不同 prompt 類型：自包含上下文、完整上下文和簡單上下文。此外，我們提出了一個考慮五個方面的細粒度評估框架：語法正確性、編譯正確性、測試正確性、程式碼覆蓋率和缺陷偵測率。我們還提出了一種啟發式演算法來修復 LLMs 生成的錯誤測試用例，並在 TestBench 上評估了 CodeLlama-13b、GPT-3.5 和 GPT-4。\n\n\n## F/F2 — Iterative repair（7 篇）\n\n\n**[12× 本地 / 308 全球] 2304.00385 — Automated Program Repair via Conversation: Fixing 162 out of 337 Bugs for $**\n\n> 自動化程式修復（APR）旨在自動為有錯誤的程式生成修補程式。近期 APR 研究聚焦於利用現代大型語言模型（LLMs）直接生成修補程式。此類基於 LLM 的 APR 工具首先用原始有錯誤的程式碼構建輸入提示，再查詢 LLM 生成修補程式。雖然基於 LLM 的 APR 工具能達到最先進結果，但它仍沿用先生成大量修補程式再逐一驗證的經典「生成與驗證」修復範式。這不僅導致許多重複且不正確的修補程式，也錯失了測試失敗及可行修補程式中的關鍵資訊。為解決這些限制，我們提出 ChatRepair，首個完全自動化的對話驅動 APR 方法，以對話風格將修補程式生成與即時回饋交織進行。ChatRepair 首先向 LLM 提供相關測試失敗資訊作為起點，再從同一錯誤的先前修補嘗試的失敗和成功中學習，以實現更強大的 APR。對於未能通過所有測試的先前修補程式，我們的方法會學習從中改進。\n\n\n**[11× 本地 / 95 全球] 2301.13246 — Conversational Automated Program Repair**\n\n> 自動化程式修復（APR）能幫助開發者自動生成錯誤補丁。由於大型預訓練語言模型（LLMs）在許多程式碼相關任務上取得令人印象深刻的效能，研究者已開始直接將 LLMs 用於 APR。然而，先前的方法只是基於由原始錯誤程式碼構建的相同輸入/提示反覆對 LLM 進行取樣，這不僅導致反覆生成相同的錯誤補丁，還遺漏了測試案例中的關鍵資訊。為解決這些局限，我們提出對話式 APR，一種以對話方式交替進行補丁生成與驗證的新型程式修復範式。在對話式 APR 中，我們透過將先前生成的補丁與驗證回饋相結合，迭代地構建模型輸入。如此，我們利用 LLMs 的長期上下文窗口，不僅避免重複生成錯誤補丁，還整合驗證回饋以幫助模型理解被測程式的語義含義。我們評估了 10 種不同的 LLMs（包括新開發的 ChatGPT 模型），以展示對話式 APR 的改進效果。\n\n\n**[7× 本地 / 47 全球] 2403.01971 — ContrastRepair: Enhancing Conversation-Based Automated Program Repair via C**\n\n> 自動化程式修復（APR）旨在自動生成修補程式以修正軟體缺陷。大型語言模型（LLM）的近期進展（如 ChatGPT）在 APR 中，尤其是對話驅動的 APR 框架中，產生了令人鼓舞的成果。然而，對話驅動 APR 的有效性取決於回饋資訊的品質。本文提出 ContrastRepair，一種新型對話式 APR 方法，透過向 LLMs 提供對比測試對來增強對話驅動的 APR。測試對由一個失敗測試和一個通過測試組成，向 LLM 提供對比回饋。我們的核心思路是最小化生成的通過測試與給定的失敗測試之間的差異，從而更好地隔離錯誤根本原因。透過提供此類資訊豐富的回饋，ContrastRepair 使 LLM 能夠生成有效的錯誤修復方案。ContrastRepair 的實現基於最先進的 LLM ChatGPT，並與 ChatGPT 反復互動直到生成可行的修補程式。我們在多個基準資料集上評估 ContrastRepair，包括 Defects4J、QuixBugs 和 HumanEval-Java。\n\n\n**[4× 本地 / 17 全球] 2304.07840 — Enhancing Automated Program Repair through Fine-tuning and Prompt Engineeri**\n\n> 序列到序列模型在使用足夠大的資料集訓練後，已被用於將錯誤程式轉換為正確程式。一些近期研究也提供了強有力的實驗證據，表明程式碼審查可以進一步改善程式修復。在自然語言（NL）和程式語言（PL）上訓練的大型語言模型可以包含兩者的內在知識。在本研究中，我們調查這種對 PL 和 NL 的內在知識是否可以用來改善自動化程式修復。我們將 PLBART 和 CodeT5 這兩個在 PL 和 NL 上預訓練的最先進語言模型應用於兩個基於自然語言的程式修復資料集，發現在包含程式碼審查和後續程式碼修改的資料集上微調的預訓練語言模型明顯優於每個先前的模型。隨著 Codex 和 GPT-3.5-Turbo 等程式碼生成模型的興起，我們還進行了基於零樣本和少樣本學習的提示工程以評估其在這些資料集上的性能。然而，根據我們對結果的人工分析，在自動化程式修復背景下使用 LLMs 的實際應用仍有很長的路要走。\n\n\n**[4× 本地 / 26 全球] 2306.17077 — RAPGen: An Approach for Fixing Code Inefficiencies in Zero-Shot**\n\n> 性能缺陷是一種非功能性缺陷，甚至可能出現在經過良好測試的商業產品中。修復這些性能缺陷是一個重要且具有挑戰性的問題。在本研究中，我們應對這一挑戰，並提出了一種稱為檢索增強型提示生成（RAPGen）的新方法。給定一個具有性能問題的程式碼片段，RAPGen 首先從先前性能缺陷修復的預構建知識庫中檢索一個提示指令，然後使用檢索到的指令生成提示。然後在零樣本情況下使用此提示於大型語言模型上生成修復方案。我們將我們的方法與各種提示變體和最先進方法在性能缺陷修復任務上進行比較。我們的實證評估表明，RAPGen 能在約 60% 的情況下生成等同或優於開發人員的性能改進建議，在 C# 開發人員過去性能修改的專家驗證資料集中，約 42% 的建議是逐字匹配的。此外，我們進行了實地評估，通過向一家大型軟體公司的開發人員建議修復方案來驗證模型的實際有效性。\n\n\n**[3× 本地 / 179 全球] 2205.10583 — Automated Repair of Programs from Large Language Models**\n\n> 大型語言模型（如 Codex）已展示出為許多程式設計任務生成程式碼的能力。然而，現有模型的成功率較低，尤其是對於複雜的程式設計任務。原因之一是語言模型缺乏對程式語義的感知，導致生成的程式碼不正確甚至無法編譯。本文系統研究了自動化程式修復（APR）技術能否修復語言模型在 LeetCode 競賽中生成的不正確解答，目標是研究 APR 技術能否提升大型語言模型所產程式碼的可靠性。我們的研究揭示：(1) 自動生成的程式碼與人工製作的解答存在共同程式設計錯誤，表明 APR 技術有修復自動生成程式碼的潛力；(2) 在統計錯誤定位方法提供錯誤位置資訊的情況下，新發布的支援程式碼編輯的 Codex edit 模式，在修復不正確解答上與現有 Java 修復工具 TBar 和 Recoder 相當或更佳。通過分析這些工具生成的實驗結果，我們提供了若干建議。\n\n\n**[3× 本地 / 38 全球] 2402.06598 — CigaR: Cost-efficient Program Repair with LLMs**\n\n> 大型語言模型（LLM）已被證明在自動化程式修復（APR）方面非常有效。然而，使用 LLMs 可能代價高昂，公司按 token 數向用戶收費。本文我們提出 CigaR，首個專注於最小化修復成本的基於 LLM 的 APR 工具。CigaR 分兩個主要步驟工作：生成第一個可行修補程式，再繁殖更多可行修補程式。CigaR 優化提示和提示設定，以最小可能的 token 數向 LLMs 提供最大資訊量。我們在廣泛使用的 Defects4J 和 HumanEval-Java 資料集的 429 個錯誤上的實驗表明，CigaR 將 token 成本降低了 73%。平均而言，CigaR 每個錯誤花費 127k tokens，而基線使用 467k tokens。在兩者都能修復的錯誤子集上，CigaR 每個錯誤花費 20k，而基線使用 608k tokens，節省了 96% 的成本。我們廣泛的實驗表明，CigaR 是一個成本效益高的基於 LLM 的程式修復工具，使用少量 token 自動生成修補程式。\n\n\n## F/F3 — C→Rust（12 篇）\n\n\n**[10× 本地 / 42 全球] 2404.18852 — VERT: Verified Equivalent Rust Transpilation with Large Language Models as **\n\n> _(無 abstract 中譯)_\n\n\n**[9× 本地 / 38 全球] 2410.24117 — AlphaTrans: A Neuro-Symbolic Compositional Approach for Repository-Level Co**\n\n> _(無 abstract 中譯)_\n\n\n**[8× 本地 / 35 全球] 2412.14234 — Syzygy: Dual Code-Test C to (safe) Rust Translation using LLMs and Dynamic **\n\n> _(無 abstract 中譯)_\n\n\n**[7× 本地 / 36 全球] 2501.14257 — C2SaferRust: Transforming C Projects Into Safer Rust With NeuroSymbolic Tec**\n\n> _(無 abstract 中譯)_\n\n\n**[7× 本地 / 7 全球] 2409.10506 — SmartC2Rust: Iterative, Feedback-Driven C-to-Rust Translation via Large Lan**\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 7 全球] 2503.12511 — SACTOR: LLM-Driven Correct and Idiomatic C to Rust Translation with Static **\n\n> 將 C 語言編寫的軟體翻譯為 Rust 在改善記憶體安全方面具有重要意義。然而，手動翻譯繁瑣、容易出錯，且常產生不符合慣用語的程式碼。大型語言模型（LLMs）在生成慣用翻譯方面展現出潛力，但無法提供正確性保證。我們提出 SACTOR，一個 LLM 驅動的 C-to-Rust 翻譯工具，採用兩步流程：先進行「非慣用」翻譯以保留語義，再進行「慣用」精煉以符合 Rust 標準。為驗證透過外部函式介面混合 C 和 Rust 的逐函式增量翻譯的正確性，我們使用端對端測試。我們在兩個公開資料集的 200 個程式上以及另外兩個真實場景（CRust-Bench 的 50 個樣本子集和 libogg 函式庫）中評估 SACTOR，並比較多個 LLMs。跨資料集結果顯示，SACTOR 提供高端對端正確性，生成的安全慣用 Rust 程式碼的 Clippy 警告減少多達 7 倍；在 CRust-Bench 上，SACTOR 平均（跨樣本）達到 85% 非慣用和 52% 慣用成功率，在 libogg 上使用 GPT-5 達到完整非慣用覆蓋率及高達 78% 的慣用覆蓋率。\n\n\n**[3× 本地 / 30 全球] 2308.05177 — Fixing Rust Compilation Errors using LLMs**\n\n> Rust 程式語言憑藉其安全保證，已在低級系統程式設計領域確立了其作為 C/C++ 等傳統不安全替代方案的可行地位。這些保證來自強大的基於所有權的型別系統，以及閉包、模式匹配等特性的原始支援，使程式碼更簡潔且易於推理。這些獨特的 Rust 特性也給程式設計師帶來了陡峭的學習曲線。本文提出了一個名為 RustAssistant 的工具，它利用大型語言模型（LLM）的湧現能力自動建議 Rust 編譯錯誤的修復方案。RustAssistant 使用精心設計的提示技術組合以及與 LLM 的迭代互動，以提供高準確率的修復。RustAssistant 在流行開源 Rust 儲存庫中的真實世界編譯錯誤上達到了約 74% 的令人印象深刻的峰值準確率。我們計畫發布我們的 Rust 編譯錯誤資料集以支持進一步的研究。\n\n\n**[3× 本地 / 3 全球] 2503.22512 — Unlocking LLM Repair Capabilities Through Cross-Language Translation and Mu**\n\n> 利用 LLMs 進行自動程式修復（APR）的近期進展在修復軟體缺陷方面展現了令人印象深刻的能力。然而，當前基於 LLM 的方法主要聚焦於 Java 和 Python 等主流程式語言，忽視了 Rust 等較少普及但正在興起的語言——這些語言面臨訓練資源昂貴、資料集有限和社群支援不足等問題。這種狹隘的聚焦在程式語言譜系中造成了修復能力的顯著差距，LLMs 在全面多語言程式修復中的完整潛力尚未被充分探索。為解決這一限制，我們提出了一種新型跨語言程式修復方法 LANTERN，通過多 agent 迭代修復範式充分利用 LLMs 在不同語言上的差異化能力。我們的技術戰略性地將缺陷程式碼從 LLMs 修復能力較弱的語言翻譯到修復能力較強的語言，無需額外訓練。我們方法的關鍵創新是一個基於 LLM 的決策系統，能夠根據 bug 特徵動態選擇最優目標語言並持續融合反饋。\n\n\n**[3× 本地 / 18 全球] 2503.17741 — RustMap: Towards Project-Scale C-to-Rust Migration via Program Analysis and**\n\n> 將現有 C 程式遷移至 Rust 的需求日益增長，因為 Rust 在保持 C 高效能的同時提供了更優越的記憶體安全性。然而，C 與 Rust 之間截然不同的特性——如指針與引用的不同定義和使用方式——帶來了超越單純語法翻譯的重大挑戰。現有的自動翻譯工具（如 C2Rust）可能過度依賴基於語法的模板翻譯，生成的 Rust 程式碼不安全且難以由人類開發者閱讀、維護甚至編譯。更需要的是能生成更安全、慣用且可執行 Rust 程式碼的語義感知翻譯。本文介紹一種基於依賴引導和大型語言模型（LLM）的 C 到 Rust 翻譯新方法 RustMap，基於三個核心思路：(1) 利用 LLM 能力從給定的小段 C 程式碼生成慣用 Rust 程式碼；(2) 按使用依賴關係將專案規模的 C 程式分解為更小的翻譯單元，並組合為可執行的 Rust 程式，從而緩解 LLMs 處理大型程式碼庫的侷限；(3) 使用測試案例驗證翻譯後 Rust 程式的正確性，增強其可靠性。\n\n\n**[3× 本地 / 11 全球] 2508.06926 — Integrating Rules and Semantics for LLM-Based C-to-Rust Translation**\n\n> 將舊有 C 程式碼自動翻譯為 Rust，旨在確保記憶體安全同時減輕人工遷移的負擔。早期的 C 到 Rust 翻譯方法依賴靜態規則方法，但由於依賴預定義規則模式，覆蓋率有限。近期研究將此任務視為序列到序列問題，利用大型語言模型（LLMs）處理。儘管這些基於 LLM 的方法能夠減少不安全程式碼區塊，翻譯後的程式碼往往在遵循 Rust 規則和維持語義一致性方面存在問題。一方面，現有方法採用直接提示策略翻譯 C 程式碼，難以適應 C 與 Rust 之間的語法規則差異。另一方面，這種策略使 LLMs 難以準確捕捉複雜程式碼的語義。為解決這些挑戰，我們提出 IRENE，一個整合規則與語義（Integrates RulEs aNd sEmantics）以增強翻譯的基於 LLM 的框架。IRENE 包含三個模組：(1) 一個規則增強的檢索模組，根據我們開發的靜態分析器生成的規則選擇相關翻譯範例，從而改進對語法規則的處理。\n\n\n**[3× 本地 / 24 全球] 2508.04295 — EVOC2RUST: A Skeleton-guided Framework for Project-Level C-to-Rust Translat**\n\n> 將遺留 C 程式碼庫翻譯為 Rust 對構建安全關鍵系統的需求日益增長。雖然已有多種方法用於此任務，但它們面臨固有的取捨：基於規則的方法往往難以滿足程式碼安全性和慣用語要求，而基於 LLM 的方法由於整個程式碼庫中模組間的重度依賴，常常無法生成語義等效的 Rust 程式碼。近期研究揭示，兩種解決方案都局限於小規模程式。本文提出 EvoC2Rust，一個用於將完整 C 項目轉換為等效 Rust 項目的自動化框架。EvoC2Rust 採用骨架引導的翻譯策略進行項目層級翻譯。流水線包含三個階段：1）首先將 C 項目分解為功能模組，採用特徵映射增強的 LLM 轉換定義和宏，並生成通過類型檢查的函式存根，形成可編譯的 Rust 骨架；2）然後增量翻譯函式，替換相應的存根佔位符；3）最後，整合 LLM 和靜態分析來修復編譯錯誤。透過演化增強，EvoC2R……\n\n\n**[3× 本地 / 9 全球] 2511.20617 — Translating Large-Scale C Repositories to Idiomatic Rust**\n\n> 現有的 C 到 Rust 翻譯技術在品質和可擴展性之間難以取得平衡：基於轉譯的方法可擴展到大型專案，但生成的程式碼在安全性、慣用性和可讀性方面較差。相比之下，基於 LLM 的技術由於依賴前沿模型（若無這些模型則無法可靠地生成可編譯的翻譯）而成本過高，從而限制了可擴展性。本文提出 Rustine，一個用於有效且高效地進行儲存庫級 C 到慣用安全 Rust 翻譯的全自動管線。在 23 個涵蓋 27 到 13,200 行程式碼的 C 程式上進行評估，Rustine 能夠為所有程式生成可完全編譯的 Rust 程式碼，並達到 87% 的功能等價性（在測試套件中通過 1,221,192 個斷言中的 1,063,099 個，函數和行覆蓋率平均分別為 74.7% 和 72.2%）。與六種先前的儲存庫級 C 到 Rust 翻譯技術相比，Rustine 的翻譯整體上更安全（原始指針、指針算術和不安全構造更少）、更具慣用性（Rust 靜態分析工具警告更少）且更易讀。當翻譯無法通過所有測試以實現功能等價性時，人類開發者可以進行介入。\n\n\n## F/F4 — General translation（15 篇）\n\n\n**[15× 本地 / 165 全球] 2110.06773 — Leveraging Automated Unit Tests for Unsupervised Code Translation**\n\n> 由於程式語言幾乎沒有可用的平行語料庫，無監督方法非常適合用於原始碼翻譯。然而，大多數無監督機器翻譯方法依賴於反向翻譯——一種在自然語言翻譯情境下發展起來的方法，本質上需要在含噪輸入上訓練。不幸的是，原始碼對微小改變極度敏感：單一 token 就可能導致編譯失敗或程式出錯，而自然語言中的微小不準確通常不會改變語意。為解決此問題，我們提出利用自動單元測試系統篩除無效翻譯，從而構建完全經過測試的平行語料庫。研究發現，在此篩選資料集上微調無監督模型顯著降低了翻譯中的噪音，在所有研究語言對上均輕鬆超越當前最優水準。尤其是在 Java→Python 和 Python→C++ 任務上，分別超越先前最優方法 16% 和 24% 以上，錯誤率降低超過 35%。\n\n\n**[11× 本地 / 91 全球] 2207.03578 — Code Translation with Compiler Representations**\n\n> _(無 abstract 中譯)_\n\n\n**[10× 本地 / 0 全球] 2405.18574 — SpecTra: Enhancing the Code Translation Ability of Language Models by Gener**\n\n> 大型語言模型（LLMs）越來越多地被用於自動化程式碼翻譯任務，該任務具有重要的現實應用價值。然而，現有大多數方法僅以程式的原始碼作為 LLM 的輸入，未考慮可從程式中提取的各類規格。本文提出 SpecTra，一種多階段方法，使用新型自一致性篩選器，首先從給定程式中生成高品質靜態規格、測試案例和自然語言描述，然後將這些內容連同原始碼一起用於提升 LLM 生成翻譯的品質。我們在三個程式碼翻譯任務（C to Rust、C to Go、JavaScript to TypeScript）上評估 SpecTra，顯示它能將六種熱門 LLMs 在這些任務上的效能提升最高達相對改進 46%。我們還針對將此方法擴展至完整 C 專案翻譯為 Rust 進行了案例研究。我們的研究表明，生成高品質規格是提升 LLMs 在程式碼翻譯上效能的有前景且高效的方式。\n\n\n**[10× 本地 / 23 全球] 2407.19619 — Enhancing Code Translation in Language Models with Few-Shot Learning via Re**\n\n> _(無 abstract 中譯)_\n\n\n**[9× 本地 / 32 全球] 2410.09812 — Unraveling the Potential of Large Language Models in Code Translation: How **\n\n> _(無 abstract 中譯)_\n\n\n**[7× 本地 / 23 全球] 2411.01063 — INTERTRANS: Leveraging Transitive Intermediate Translations to Enhance LLM-**\n\n> 程式碼翻譯旨在將程式從一種程式語言（PL）轉換為另一種。這項長期存在的軟體工程任務對於現代化遺留系統、確保跨平台兼容性、提升性能等方面至關重要。然而，由於不同 PLs 之間存在許多語法和語意差異，自動化這一過程仍然充滿挑戰。近期研究表明，即使是先進技術（如大型語言模型（LLMs）），尤其是開源 LLMs，在這項任務上仍然力有未逮。目前，程式碼 LLMs 使用來自多種程式語言的原始碼進行訓練，因此具備多語言能力。在本文中，我們研究是否可以利用這些能力來增強程式碼翻譯。為實現這一目標，我們介紹 INTERTRANS，一種基於 LLM 的自動化程式碼翻譯方法，與現有方法不同，它利用中間翻譯來彌合源語言和目標 PL 之間的語法和語意差距。INTERTRANS 包含兩個階段：首先利用新穎的程式碼翻譯樹（ToCT）演算法規劃給定源語言和目標 PL 之間的遞移中間翻譯序列，然後對其進行驗證。\n\n\n**[7× 本地 / 36 全球] 2306.06755 — CoTran: An LLM-Based Code Translator Using Reinforcement Learning with Comp**\n\n> 本文提出一種基於 LLM 的程式碼翻譯方法及相關工具 CoTran，能將完整程式從一種高階程式語言翻譯為另一種。現有的基於 LLM 的程式碼翻譯方法缺乏相應訓練，無法確保翻譯後的程式碼可靠地通過編譯，或與輸入程式碼具有實質性的功能等價性。在我們的研究中，我們使用強化學習對 LLM 進行微調，整合編譯器反饋和基於符號執行（symexec）的測試反饋，以評估輸入和輸出程式之間的功能 load 與 CUDA 之間的雙向翻譯來驗證 LASSI。在四個 LLMs 上對不同應用程式碼評估 LASSI 的結果展示了 LASSI 在生成可執行平行程式碼方面的有效性，80% 的 OpenMP 到 CUDA 翻譯和 85% 的 CUDA 到 OpenMP 翻譯能產生預期輸出。我們還觀察到約 78% 的 OpenMP 到 CUDA 翻譯和 62% 的 CUDA 到 OpenMP 翻譯……\n\n\n**[3× 本地 / 16 全球] 2310.11476 — Program Translation via Code Distillation**\n\n> 軟體版本遷移和程式翻譯是大型程式碼庫生命週期中的重要且高成本環節。傳統機器翻譯依賴平行語料庫進行監督翻譯，但由於對齊資料稀缺，這對程式翻譯不可行。近期的無監督神經機器翻譯技術通過反向翻譯和低層編譯器中間表示（IR）等方法克服了資料限制，但因程式碼片段對齊中的噪音和 IR 多樣性分別面臨重大挑戰。本文提出了一種名為程式碼蒸餾（Code Distillation，CoDist）的新型模型，通過在語言無關的中間表示中捕捉程式碼的語義和結構等效性。蒸餾後的程式碼作為任意程式語言的翻譯樞軸，通過直接應用蒸餾編譯器對所有可用原始碼進行構建，從而生成可擴展的平行語料庫。我們的方法在 CodeXGLUE 和 TransCoder GeeksForGeeks 翻譯基準上達到最優水準，在 TransCoder 任務上平均絕對提升 12.7%。\n\n\n**[3× 本地 / 2 全球] 2504.14852 — ApiRAT: Integrating Multi-source API Knowledge for Enhanced Code Translatio**\n\n> 程式碼翻譯在軟體遷移、多語言開發和系統重構中是一項重要任務。大型語言模型（LLMs）的近期進展在此任務上展現了顯著潛力。然而，先前研究已指出 LLMs 在處理領域特定程式碼時往往表現欠佳，尤其是在解析跨語言 API 映射方面。為應對這一挑戰，我們提出 ApiRAT，一種整合多來源 API 知識的新型程式碼翻譯方法。ApiRAT 採用三種 API 知識增強技術——API 序列檢索、API 序列反向翻譯和 API 映射——引導 LLMs 進行程式碼翻譯，確保 API 序列的正確結構和個別 API 的準確使用。在 CodeNet 和 AVATAR 兩個公開資料集上的廣泛實驗表明，ApiRAT 顯著超越現有基於 LLM 的方法，在計算準確率上提升 4% 至 15.1%。此外，我們在不同 LLMs 上的評估展現了 ApiRAT 的泛化能力。消融研究進一步確認了每個 API 知識組件的獨立貢獻，驗證了我們方法的有效性。\n\n\n## F/F5 — Fault localization（5 篇）\n\n\n**[6× 本地 / 99 全球] 2304.02195 — Explainable automated debugging via large language model-driven scientific **\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 75 全球] 2308.15276 — Large Language Models in Fault Localisation**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 26 全球] 2404.00287 — Evaluating Large Language Models for Line-Level Vulnerability Localization**\n\n> 近期，自動化漏洞定位（AVL）受到越來越多的關注，旨在透過精確定位負責漏洞的特定程式碼行來輔助診斷。大型語言模型（LLMs）在多個領域展現了潛力，但其在行級漏洞定位方面的有效性仍未被充分探索。本研究呈現了首個針對 AVL 的 LLMs 全面實證評估。我們研究了 19 個適合程式碼分析的主流 LLMs，包括 ChatGPT 和多個開源模型，涵蓋 encoder-only、encoder-decoder 和 decoder-only 架構，模型規模從 60M 到 70B 參數不等。我們在 C/C++ 的 BigVul 衍生資料集和智慧合約漏洞資料集上，評估了三種範式：少樣本 prompting、判別式微調以及有無 Low-Rank Adaptation（LoRA）的生成式微調。結果表明，在有足夠訓練資料時，判別式微調相較現有基於學習的 AVL 方法取得顯著性能提升；在低資料情境下，對 ChatGPT 等先進 LLMs 進行 prompting 更為有效。\n\n\n**[3× 本地 / 13 全球] 2408.12070 — Better Debugging: Combining Static Analysis and LLMs for Explainable Crashi**\n\n> 如今，許多應用程式不是獨立存在的，而是依賴各種框架或庫。框架 APIs 的頻繁演進和複雜實現導致了許多意外的發布後崩潰。從崩潰堆疊追蹤出發，現有方法要麼執行直接呼叫圖（CG）追蹤，要麼構建包含類似崩潰修復記錄的資料集來定位錯誤方法。然而，這些方法受限於 CG 的完整性或依賴歷史修復記錄。此外，它們未能通過揭示錯誤候選與崩潰點之間的關係來解釋這些候選。為填補這一空白，我們提出了一種結合靜態分析和 LLM 技術的可解釋崩潰故障定位方法。我們的主要見解是，理解框架程式碼中異常拋出語句的語意有助於找到和理解應用程式碼中的錯誤方法。基於這一思路，首先，我們設計了描述每個框架特定異常相關關鍵元素的異常拋出摘要（ETS），並通過靜態分析提取 ETSs。然後，我們對其關鍵元素進行資料追蹤以識別和排序錯誤候選。\n\n\n**[3× 本地 / 11 全球] 2409.13642 — A Multi-Agent Approach to Fault Localization via Graph-Based Retrieval and **\n\n> 識別和解決軟體故障仍然是一個具有挑戰性且資源密集的過程。傳統的故障定位技術（如基於頻譜的故障定位 SBFL）利用測試覆蓋率的統計分析，但通常準確性有限。雖然基於學習的方法改善了故障定位，但它們需要大量訓練資料集和高計算資源。大型語言模型（LLM）的最新進展透過增強程式碼理解和推理提供了新的機遇。然而，現有的基於 LLM 的故障定位技術面臨重大挑戰，包括 token 限制、長輸入效能下降，以及複雜軟體系統中的可擴展性問題。為克服這些障礙，我們提出 LLM4FL，一個利用三個專門 LLM 智能體的多智能體故障定位框架。首先，Context Extraction Agent 應用順序敏感的分割策略，將大型覆蓋率資料劃分到 LLM 的 token 限制範圍內，分析失敗上下文並對與失敗相關的方法進行優先排序。Debugger Agent 然後處理提取的資料，採用基於圖的檢索增強程式碼導航。\n\n\n## F/F6 — Refactoring（8 篇）\n\n\n**[7× 本地 / 32 全球] 2411.02320 — An Empirical Study on the Code Refactoring Capability of Large Language Mod**\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 16 全球] 2401.15298 — Together We Go Further: LLMs and IDE Static Analysis for Extract Method Ref**\n\n> 封裝多個職責於單一方法中的長方法難以維護。選擇哪些語句提取到新方法中一直是許多研究工具的目標。儘管有了穩定的改進，這些工具通常無法生成符合開發人員偏好和接受標準的重構。鑑於大型語言模型（LLMs）在大型程式碼語料庫上進行了訓練，如果我們利用其對開發人員如何構成函數的熟悉程度，我們就可以建議開發人員可能接受的重構。在本文中，我們通過將 LLMs 的見解與 IDEs 的能力協同結合來推進提取方法（EM）的科學與實踐。我們對 1752 個 EM 場景的形成性研究揭示，LLMs 在提供專家建議方面非常有效，但也不可靠：多達 76.3% 的建議是幻覺。我們設計了一種新方法，從 LLMs 建議的候選方案中移除幻覺，然後基於程式切片的靜態分析技術進一步增強和排序建議，最後利用 IDE 正確執行重構。\n\n\n**[5× 本地 / 54 全球] 2404.18496 — AI-powered Code Review with LLMs: Early Results**\n\n> 本文提出一種透過基於大型語言模型（LLM）設計的模型來提升軟體品質和效率的新方法，該模型旨在審查程式碼並識別潛在問題。我們提出的基於 LLM 的 AI 智能體模型在大型程式碼儲存庫上進行訓練，訓練內容包括程式碼審查、錯誤報告和最佳實踐文件。其目標在於偵測程式碼異味、識別潛在錯誤、提供改進建議並最佳化程式碼。與傳統的靜態程式碼分析工具不同，我們基於 LLM 的 AI 智能體能夠預測程式碼中未來的潛在風險。這支持了提升程式碼品質和促進開發者教育的雙重目標，鼓勵開發者更深入理解最佳實踐和高效編碼技術。此外，我們探討了模型在提出改進建議方面的有效性，這些建議 和合成環境的互動提升其能力。Kimi K2 在開源非思維型模型中達到了最先進的性能，在 agentic 能力方面表現尤為突出。值得注意的是，K2 在 Tau2-Bench 上取得 66.1 分，ACEBench（En）上取得 76.5 分，SWE-Bench Verified 上取得 65.8 分，SWE-Bench Multilingual 上取得 47.3 分——在非思維設置中超越了大多數開源和閉源基準。它在編碼、數學和推理任務上也展現了強大能力，在 LiveCodeBench v6 上取得 53.7 分，AIME 2025 上取得 49.5 分，GPQA-Diamond 上取得 75.1 分，OJBench 上取得 27.1 分。\n\n\n**[7× 本地 / 2,936 全球] 2507.06261 — Gemini 2.5: Pushing the Frontier with Advanced Reasoning, Multimodality, Lo**\n\n> 本報告介紹 Gemini 2.X 模型家族：Gemini 2.5 Pro 和 Gemini 2.5 Flash，以及我們早期的 Gemini 2.0 Flash 和 Flash-Lite 模型。Gemini 2.5 Pro 是我們迄今最強大的模型，在前沿編碼和推理基準測試上達到最先進（SoTA）效能。除了卓越的編碼和推理能力外，Gemini 2.5 Pro 是一個擅長多模態理解的思考模型，現已能夠處理最多 3 小時的視頻內容。其長上下文、多模態和推理能力的獨特組合，可用於解鎖全新的智能體工作流程。Gemini 2.5 Flash 以更少的計算量和延遲提供卓越的推理能力，而 Gemini 2.0 Flash 和 Flash-Lite 則以低延遲和低成本提供高效能。總體而言，Gemini 2.X 模型系列涵蓋了模型能力與成本的完整 Pareto 前沿，使使用者能夠探索複雜智能體問題解決的可能邊界。\n\n\n**[5× 本地 / 2,917 全球] 2211.05100 — BLOOM: A 176B-Parameter Open-Access Multilingual Language Model**\n\n> 大型語言模型（LLMs）已被證明能夠根據少量示範或自然語言指令執行新任務。雖然這些能力已帶動廣泛採用，但大多數 LLMs 由資源豐富的組織開發，且常常不對外公開。作為推動這一強大技術民主化的步驟，我們推出 BLOOM，一個擁有 176B 參數的開放獲取語言模型，由數百名研究人員合作設計構建。BLOOM 是一個僅解碼器的 Transformer 語言模型，在 ROOTS 語料庫上訓練，該資料集包含 46 種自然語言和 13 種程式語言（共 59 種）的數百個來源。我們發現，BLOOM 在廣泛的基準測試中達到有競爭力的性能，經過多任務提示微調後結果更為出色。為促進使用 LLMs 的未來研究和應用，我們在 Responsible AI License 下公開發布我們的模型和程式碼。\n\n\n**[5× 本地 / 1,875 全球] 2401.04088 — Mixtral of Experts**\n\n> 我們介紹 Mixtral 8x7B，一個稀疏混合專家（SMoE）語言模型。Mixtral 與 Mistral 7B 的架構相同，不同之處在於每一層由 8 個前饋塊（即專家）組成。對於每個 token，在每一層，路由器網路選擇兩個專家來處理當前狀態並合併其輸出。儘管每個 token 只與兩個專家互動，但所選專家在每個時間步可能不同。因此，每個 token 可以訪問 47B 個參數，但在推理時只使用 13B 個激活參數。Mixtral 以 32k token 的上下文大小進行訓練，在所有評估基準上優於或匹配 Llama 2 70B 和 GPT-3.5。特別是，Mixtral 在數學、程式碼生成和多語言基準上大幅優於 Llama 2 70B。我們還提供了一個微調後遵循指令的模型 Mixtral 8x7B - Instruct，在人工基準上超越了 GPT-3.5 Turbo、Claude-2.1、Gemini Pro 和 Llama 2 70B - chat 模型。基礎模型和指令模型均在 Apache 2.0 許可證下發布。\n\n\n**[5× 本地 / 1,980 全球] 2408.00118 — Gemma 2: Improving Open Language Models at a Practical Size**\n\n> 本研究介紹 Gemma 2，Gemma 輕量級最先進開源模型家族的新成員，規模從 20 億到 270 億參數不等。在此新版本 ub Copilot。在 HumanEval（我們發布的新評估集，用於衡量從 docstring 合成程式的功能正確性）上，我們的模型解決了 28.8% 的問題，而 GPT-3 解決了 0%，GPT-J 解決了 11.4%。此外，我們發現從模型中重複採樣是一種出乎意料地有效的策略，可用來為困難提示生成可行解答。使用此方法，每個問題採樣 100 次，我們解決了 70.2% 的問題。對模型的深入研究揭示了其侷限性，包括難以處理描述長串操作的 docstring，以及難以將操作綁定到變數。最後，我們討論部署強大程式碼生成技術的潛在更廣泛影響，涵蓋安全性、保安性和經濟學。\n\n\n**[96× 本地 / 3,163 全球] 2308.12950 — Code Llama: Open Foundation Models for Code**\n\n> 我們發布 Code Llama，這是一個基於 Llama 2 的大型語言模型家族，專為程式碼設計，在開放模型中達到最先進的效能，具備填充（infilling）能力、支援大型輸入上下文，以及針對程式設計任務的零樣本指令跟隨能力。我們提供多種版本以涵蓋廣泛應用場景：基礎模型（Code Llama）、Python 專門化版本（Code Llama - Python），以及指令跟隨模型（Code Llama - Instruct），各自提供 7B、13B、34B 與 70B 參數版本。所有模型均以 16k token 的序列進行訓練，並在最多 100k token 的輸入上展現改善效果。7B、13B 與 70B 的 Code Llama 及 Code Llama - Instruct 變體均支援基於周圍內容的填充功能。Code Llama 在多個程式碼基準測試中達到開放模型的最先進效能，在 HumanEval 和 MBPP 上的得分分別最高達 67% 和 65%。值得注意的是，Code Llama - Python 7B 在 HumanEval 和 MBPP 上優於 Llama 2 70B，且我們所有模型在 MultiPL-E 上均優於其他公開可用模型。我們以寬鬆授權條款發布 Code Llama，允許研究與商業用途。\n\n\n**[57× 本地 / 1,624 全球] 2401.14196 — DeepSeek-Coder: When the Large Language Model Meets Programming - The Rise **\n\n> 大型語言模型的快速發展徹底改變了軟體開發中的程式碼智能。然而，閉源模型的主導地位限制了廣泛的研究與開發。為此，我們推出 DeepSeek-Coder 系列，這是一系列開源程式碼模型，參數規模從 1.3B 到 33B，從頭開始以 2 兆個 token 訓練。這些模型在高品質專案級程式碼語料庫上進行預訓練，並採用具有 16K 視窗的填空任務來增強程式碼生成與填充能力。我們的廣泛評估表明，DeepSeek-Coder 不僅在多個基準測試中達到開源程式碼模型的最優水準，還超越了 Codex 和 GPT-3.5 等現有閉源模型。此外，DeepSeek-Coder 模型採用寬鬆授權，允許研究和不受限制的商業使用。\n\n\n**[55× 本地 / 1,181 全球] 2305.06161 — StarCoder: may the source be with you!**\n\n> BigCode 社群是一個致力於負責任開發程式碼大型語言模型（Code LLMs）的開放科學協作組織，在此介紹 StarCoder 與 StarCoderBase：兩款擁有 15.5B 參數、8K 上下文長度的模型，支援填充（infilling）功能，並透過多查詢注意力（multi-query attention）實現快速大批次推論。StarCoderBase 以 The Stack 中逾 1 兆個 token 訓練而成，The Stack 是一個包含可寬鬆授權 GitHub 儲存庫並附有檢查工具與退出機制的大型集合。我們在 35B Python token 上對 StarCoderBase 進行微調，創建了 StarCoder。我們對 Code LLMs 進行了迄今最全面的評估，結果顯示 StarCoderBase 優於所有支援多種程式語言的開放式 Code LLM，並與 OpenAI code-cushman-001 模型不相上下甚至超越之。此外，StarCoder 超越所有在 Python 上微調的模型，在 HumanEval 上可透過提示達到 40% pass@1，且仍保有其他程式語言的效能。我們在安全開放存取模型發布上採取了多項重要措施，包括改良的個人識別資訊（ 模型，嚴重限制了技術的可及性及在多樣化軟體工程任務中客製化的潛力；其二，現有模型主要在靜態程式碼資料上訓練，缺乏對軟體開發過程中動態交互、迭代問題解決及演進特性的深入理解。針對上述挑戰，我們從軟體工程視角出發，認識到真實世界的軟體維護與演進流程不僅包含靜態程式碼，還涉及開發者的思維過程、外部工具的使用以及不同職能人員之間的互動。為此，我們推出 Lingma SWE-GPT 系列，包含 Lingma SWE-GPT 7B 與 72B。通過學習並模擬真實世界的程式碼提交活動，Lingma SWE-GPT 系統性地融合了動態交互機制。\n\n\n**[5× 本地 / 24 全球] 2404.12636 — MORepair: Teaching LLMs to Repair Code via Multi-Objective Fine-Tuning**\n\n> 在軟體工程領域，程式碼相關的專業任務（如程式修復）帶來了獨特的挑戰，需要對大型語言模型（LLMs）進行微調以達到最先進的效能。文獻中針對程式修復任務提出的 LLMs 微調方法，普遍忽略了對程式碼變更背後邏輯進行推理的需求，僅停留於資料中的語法模式。高效能的微調實驗通常也需要極高的計算成本。我們提出 MORepair，從全新視角審視 LLM 微調在程式修復中的學習重點：我們不僅使 LLM 參數適應程式碼轉換任務的語法細微差別（目標 ➊），還特別針對訓練資料中程式碼變更背後的邏輯原因進行微調（目標 ➋）。這種多目標微調將指導 LLMs 生成高品質補丁。我們將 MORepair 應用於四個不同規模與架構的開源 LLMs 進行微調。在函式層級和儲存庫層級修復基準上的實驗結果表明，所實現的微調有效提升了 LLM 修復效能……\n\n\n**[3× 本地 / 49 全球] 2312.14187 — WaveCoder: Widespread And Versatile Enhancement For Code Large Language Mod**\n\n> 近期研究表明，經指令微調後，程式碼大型語言模型（Code LLMs）能夠獲得令人印象深刻的能力，以應對廣泛的程式碼相關任務。然而，當前的 Code LLMs 指令微調方法主要集中在傳統的程式碼生成任務，導致在複雜的多任務場景中效能欠佳。本文專注於多種程式碼相關任務，介紹 WaveCoder，一系列以廣泛多元增強指令資料訓練的 Code LLMs。為使模型能夠處理複雜的程式碼相關任務，我們提出一種在多任務場景中從開源程式碼資料集穩定生成多樣、高品質指令資料的方法，並獲得 CodeSeaXDataset，一個包含跨 4 個程式碼相關任務的 19,915 個指令實例的資料集，旨在提升 Code LLM 的泛化能力。我們的實驗表明，WaveCoder 模型在不同程式碼相關任務的泛化能力上顯著優於其他開源模型。此外，WaveCoder-Ultra-6.7B 在廣泛的程式碼相關任務上展現了最先進的泛化能力。\n\n\n**[3× 本地 / 12 全球] 2503.18455 — SEAlign: Alignment Training for Software Engineering Agent**\n\n> 程式碼生成模型的最新進展在自動化軟體開發任務方面展現出令人印象深刻的能力，但這些模型在真實世界軟體工程場景中仍面臨挑戰。雖然當前的訓練方法（尤其是後訓練）在解決競賽程式設計問題方面表現出色，但它們未能充分為模型應對實際軟體開發的複雜性做好準備。這種不一致性引出了一個關鍵問題：現有的對齊訓練方法是否適合真實世界的軟體工程任務？本研究識別了這一問題，並提出 SEAlign，一個旨在縮小程式碼生成模型與真實世界軟體開發任務之間差距的新型對齊框架。SEAlign 利用軟體工程過程的獨特特性（包括高品質的工作流程步驟）來增強模型能力。我們的框架進一步採用蒙地卡羅樹搜索（Monte Carlo Tree Search）進行多步驟決策過程中的細粒度對齊，然後對關鍵動作進行偏好最佳化，以確保模型滿足真實世界需求。我們在三個真實世界軟體工程的標準智能體基準測試上對 SEAlign 進行了評估。\n\n\n**[3× 本地 / 19 全球] 2506.19290 — Skywork-SWE: Unveiling Data Scaling Laws for Software Engineering in LLMs**\n\n> 軟體工程（SWE）近期已成為新一代 LLM Agent 的關鍵測試場，要求在兩個關鍵維度具備固有能力：持續迭代的問題求解（如 >50 輪互動）和長上下文依賴解析（如 >32k tokens）。然而，SWE 中的資料策劃過程仍極其耗時，因為它在很大程度上依賴人工標注進行程式碼檔案篩選，並需要搭建專用執行環境來執行和驗證單元測試。因此，大多數現有資料集僅限於數千個來自 GitHub 的實例。為此，我們提出一種增量式自動化資料策劃流水線，系統性地擴展 SWE 資料集的規模和多樣性。我們的資料集包含來自 2,531 個不同 GitHub 儲存庫的 10,169 個真實世界 Python 任務實例，每個實例附有自然語言指定的任務和用於自動單元測試驗證的專用執行環境映像。我們從所提出的 SWE 資料集中精心策劃了超過 8,000 條成功驗證的訓練軌跡。當在這些軌跡上微調 Skywork-SWE 模型時，我們揭示了一個引人注目的……規律。\n\n\n## A/A4 — Code Encoder（9 篇）\n\n\n**[38× 本地 / 2,247 全球] 2109.00859 — CodeT5: Identifier-aware Unified Pre-trained Encoder-Decoder Models for Cod**\n\n> 針對自然語言（NL）的預訓練模型（如 BERT 和 GPT）最近已被證明能很好地遷移到程式語言（PL），並大幅提升廣泛的程式碼相關任務。儘管取得了成功，目前大多數方法要麼依賴僅編碼器（或僅解碼器）的預訓練（對生成（或理解）任務而言並非最優），要麼以與 NL 相同的方式處理程式碼片段，忽略了 PL 的特殊特性（如標記類型）。我們提出 CodeT5，一個統一的預訓練編碼器-解碼器 Transformer 模型，更好地利用了開發人員賦予識別符所傳達的程式碼語意。我們的模型採用統一框架，無縫支援程式碼理解和生成任務，並允許多任務學習。此外，我們提出了一種新穎的識別符感知預訓練任務，使模型能夠區分哪些程式碼標記是識別符，並在被遮蔽時恢復它們。我們還提出利用使用者撰寫的程式碼注釋，通過雙模態雙重生成任務實現更好的 NL-PL 對齊。全面的實驗表明，CodeT5 在理解任務上顯著優於以往方法。\n\n\n**[34× 本地 / 3,833 全球] 2002.08155 — CodeBERT: A Pre-Trained Model for Programming and Natural Languages**\n\n> 我們提出 CodeBERT，一種針對程式語言（PL）與自然語言（NL）的雙模態預訓練模型。CodeBERT 學習通用表示，支援下游的 NL-PL 應用，例如自然語言程式碼搜尋、程式碼文件生成等。我們以基於 Transformer 的神經網路架構開發 CodeBERT，並以混合目標函式訓練，其中包含「替換 token 偵測」的預訓練任務，即從生成器抽樣可信替代方案並偵測之。這使我們得以同時利用 NL-PL 配對的雙模態資料與單模態資料，前者提供模型訓練的輸入 token，後者有助於學習更好的生成器。我們在兩個 NL-PL 應用上透過微調模型參數來評估 CodeBERT，結果顯示 CodeBERT 在自然語言程式碼搜尋與程式碼文件生成任務上均達到最先進的效能。此外，為了研究 CodeBERT 所學習的知識類型，我們構建了一個 NL-PL 探測資料集，並在零樣本設定下（預訓練模型參數固定）進行評估，結果顯示 CodeBERT 表現優於先前的預訓練模型。\n\n\n**[20× 本地 / 1,663 全球] 2009.08366 — GraphCodeBERT: Pre-training Code Representations with Data Flow**\n\n> 針對程式語言的預訓練模型已在程式碼搜尋、程式碼補全、程式碼摘要等多種程式碼相關任務上取得顯著的實證改進。然而，現有預訓練模型將程式碼片段視為 token 序列，忽略了程式碼本身固有的結構——而此結構提供了關鍵的程式語義，能強化程式碼理解過程。本文提出 GraphCodeBERT，一種考慮程式碼固有結構的程式語言預訓練模型。我們在預訓練階段不採用抽象語法樹（AST）等語法層級結構，而是使用資料流——一種編碼變數間「值來源關係」的語義層級結構。此語義層級結構簡潔清晰，不會帶來 AST 不必要的深層層次結構，使模型更加高效。我們基於 Transformer 開發 GraphCodeBERT，除使用遮罩語言模型任務外，還引入兩個結構感知的預訓練任務：一是預測程式碼結構邊，二是對齊原始碼與程式碼結構之間的表示。\n\n\n**[13× 本地 / 699 全球] 2305.07922 — CodeT5+: Open Code Large Language Models for Code Understanding and Generat**\n\n> 在大量原始碼上預訓練的大型語言模型（LLM）在程式碼智慧方面取得了顯著進展。然而，現有的程式碼 LLM 在架構與預訓練任務方面存在兩大主要限制。首先，它們通常採用特定架構（僅編碼器或僅解碼器），或針對不同下游任務依賴統一的編碼器-解碼器網路。前者在應用上缺乏靈活性，而後者則將模型視為所有任務的單一系統，導致部分任務的效能欠佳。其次，它們通常採用有限的預訓練目標集，這些目標對某些下游任務可能不夠相關，從而造成大幅效能下降。為解決這些限制，我們提出「CodeT5+」，一個用於程式碼的編碼器-解碼器 LLM 家族，其中的組件模組可靈活組合以適應廣泛的下游程式碼任務。這種靈活性由我們提出的混合預訓練目標所實現，以緩解預訓練與微調之間的落差。這些目標涵蓋跨度去噪、對比學習、文本-程式碼匹配，以及在單模態和雙模態上的因果 LM 預訓練任務。\n\n\n**[11× 本地 / 942 全球] 2203.03850 — UniXcoder: Unified Cross-Modal Pre-training for Code Representation**\n\n> 程式語言的預訓練模型近來在程式碼智能領域展現出巨大成功。為了同時支援程式碼相關的理解與生成任務，近期研究嘗試預訓練統一的編碼器-解碼器模型。然而，此類編碼器-解碼器框架在自迴歸任務上並非最優，尤其是程式碼補全需要僅解碼器的方式以實現高效推斷。本文我們提出 UniXcoder，一個用於程式語言的統一跨模態預訓練模型。該模型利用帶前綴適配器的遮罩注意力矩陣來控制模型行為，並利用 AST 和程式碼注釋等跨模態內容來增強程式碼表示。為平行編碼以樹狀結構表示的 AST，我們提出一種一對一映射方法，將 AST 轉換為保留樹結構所有資訊的序列結構。此外，我們提出利用多模態內容，透過對比學習來學習程式碼片段的表示，再以跨模態生成任務對齊不同程式語言間的表示。我們在九個資料集的五個程式碼相關任務上評估了 UniXcoder。\n\n\n**[11× 本地 / 907 全球] 2103.06333 — Unified Pre-training for Program Understanding and Generation**\n\n> 程式碼摘要與生成實現了程式語言（PL）與自然語言（NL）之間的相互轉換，而程式碼翻譯則助力將舊有程式碼從一種 PL 遷移至另一種。本文介紹 PLBART，一種能夠執行廣泛程式及語言理解與生成任務的序列到序列模型。PLBART 透過去噪自動編碼，在大量 Java 與 Python 函式及相關 NL 文本上進行預訓練。在英語程式碼摘要、程式碼生成及七種程式語言的程式碼翻譯實驗中，PLBART 優於或媲美最先進的模型。此外，在程式修復、克隆偵測、漏洞程式碼偵測等判別式任務的實驗中，亦驗證了 PLBART 在程式理解上的有效性。進一步分析顯示，PLBART 學習了對程式語義至關重要的程式語法、風格（如識別符命名慣例）和邏輯流程（如 else 區塊內的 if 區塊等同於 else if 區塊），因此即便在標注有限的情況下也表現優異。\n\n\n**[6× 本地 / 799 全球] 1808.01400 — code2seq: Generating Sequences from Structured Representations of Code**\n\n> 從程式碼片段生成自然語言序列的能力具有多種應用，如程式碼摘要、文件記錄和檢索。從神經機器翻譯（NMT）借鑑而來的序列到序列（seq2seq）模型，通過將原始碼視為 token 序列，在這些任務上取得了最先進的效能。我們提出 CODE2SEQ：一種利用程式語言語法結構更好地編碼原始碼的替代方法。我們的模型將程式碼片段表示為其抽象語法樹（AST）中的組合路徑集合，並在解碼時使用注意力機制選擇相關路徑。我們在兩個任務、兩種程式語言以及多達 16M 個範例的四個資料集上驗證了我們方法的有效性。我們的模型顯著優於之前專為程式語言設計的模型以及最先進的 NMT 模型。\n\n\n**[4× 本地 / 250 全球] 1810.02720 — TRANX: A Transition-based Neural Abstract Syntax Parser for Semantic Parsin**\n\n> 我們介紹 TRANX，一種將自然語言（NL）語句映射至形式意義表示（MRs）的基於轉移的神經語義解析器。TRANX 使用基於目標 MR 抽象語法描述語言的轉移系統，賦予其兩大主要優勢：(1) 高精度，利用目標 MR 語法資訊約束輸出空間並建模資訊流；(2) 高度通用性，只需為 MR 的可允許結構編寫新的抽象語法描述即可輕鬆應用於新類型的 MR。在四個不同語義解析
