修復需橫跨多檔案、需理解專案上下文與介面規格的真實世界漏洞，而非函式級的孤立修補。其前提是必須具備漏洞的 PoC（Proof-of-Concept）作為動態回饋訊號，作者引用 SoK 研究指出 PoC 正是區分 AVR 與一般程式自動修復（APR）的關鍵輸入（Liu et al. 2026, §7.1, p.10）。\n\n**定位**：論文要解決的問題是——現有 LLM-based AVR 系統多半把修復視為「在當前可見上下文上的單次生成步驟」，缺乏重用過往修補經驗、或從失敗驗證中學習的持久化機制，導致在複雜多檔案修復任務上效果受限（Abstract, p.1）。作者觀察到既有方法存在兩種失敗模式：靜態知識增強（如 VulMaster 注入 CWE 關係）忽略了倉庫內錯綜的軟體上下文與介面規格，使生成的通用修補與專案剛性約束衝突而不可用；而回饋驅動框架雖能由測試回饋判斷修補失敗，卻缺乏「如何修正」的經驗記憶，把回饋僅當作拒絕訊號，導致代理在無效解之間震盪而非收斂到正確修復——作者稱此為「認知缺陷（Cognitive Deficiency）」（Liu et al. 2026, §1, p.1-2）。論文的自我定位是模仿資安專家的認知層級：專家修復漏洞時並非孤立分析程式碼，而是調用多層累積經驗（專案特定知識、泛化資安知識、過往失敗到成功的除錯經驗），據此 MemRepair 提出一個由結構化「三層記憶階層」與「回饋驅動精修迴圈」支撐的協作式多代理框架，並自稱為首個整合三層記憶階層的倉庫級 AVR 框架（Liu et al. 2026, §1, p.2；§2, p.2）。\n\n\n**做法**：\n- **任務形式化**：給定目標倉庫 $\\mathcal{P}$ 與漏洞描述 $D_{desc}$，系統獲得一個驗證預言機（verification oracle）$\\langle\\mathcal{T},\\tau_{vuln}\\rangle$，其中 $\\mathcal{T}$ 為迴歸測試套件、$\\tau_{vuln}$ 為漏洞 PoC。目標是合成補丁 $\\delta$，使修補後版本 $\\mathcal{P}'=\\mathcal{P}\\oplus\\delta$ 同時滿足兩個語意約束：(1) 功能保持——所有原本通過的測試 $t\\in\\mathcal{T}$ 修補後仍須通過（Eq. 1）；(2) 漏洞緩解——原本 FAIL 的 PoC $\\tau_{vuln}$ 修補後須 PASS（Eq. 2）（Liu et al. 2026, §3.1, p.3）。\n- **框架總覽**：MemRepair 由「階層式記憶系統」與「回饋驅動精修迴圈」兩大支柱組成，整體編排成一個動態修復生命週期；先以 PoC $\\tau_{vuln}$ 取得執行期失敗證據（如堆疊追蹤、sanitizer 報告），再用結構感知定位工具 `Iter_grep` 產出定位物件 $\\mathcal{L}_{loc}$，由 Patcher 在記憶檢索引導下生成候選補丁 $\\delta$，最後由 Verifier 驗證並決定接受或觸發 Regenerate / Relocate（Liu et al. 2026, §3.2, p.3）。\n- **三層記憶——L1 History-Fix Memory（歷史修補記憶）**：源自 CVEfixes 資料集，含 14,063 筆已驗證的漏洞修補條目，蒐集至 2024 年，挖掘自 NIST 的國家漏洞資料庫（NVD）。條目形式為五元組 $e_{L1}=\\langle P_{proj}, K_{cwe}, L_{lang}, I_{id}, D_{desc}, P_{fix}\\rangle$，其中 $P_{proj}$/$K_{cwe}$/$L_{lang}$ 為檢索鍵（專案識別、漏洞類型、目標語言），$I_{id}$ 為實例 ID（如 `njs.cve-2022-32414`，用於去重並排除目標實例本身、也作為時間鍵），$D_{desc}$ 為漏洞情境描述，$P_{fix}$ 為解決漏洞的具體程式碼修改（Liu et al. 2026, §3.3.1, p.3-4）。\n- **三層記憶——L2 Security-Pattern Memory（資安模式記憶）**：每筆 L2 條目代表一次成功修復實例，在 L1 共享鍵 $(P_{proj},K_{cwe},L_{lang},I_{id},D_{desc})$ 之上擴充 $R_{rationale}$（Insight）欄位——一段簡潔的自然語言描述，說明該補丁「為何有效」。L2 在修復過程中即時蒐集（Liu et al. 2026, §3.3.2, p.4）。\n- **三層記憶——L3 Refinement-Trajectory Memory（精修軌跡記憶）**：捕捉單次修復會話內的「失敗到成功」軌跡，條目形式為 $e_{L3}=\\langle\\ldots,P_{fail},\\Delta_{diff},I_{insight}\\rangle$，其中 $P_{fail}$ 為驗證失敗的補丁、$\\Delta_{diff}$ 為將失敗狀態轉為成功的修正差異、$I_{insight}$ 為該轉移所學到的規則（Transition Rule）（Liu et al. 2026, §3.3.3, p.4）。\n- **記憶可擴展性管理**：為控制長期部署下記憶體成長，採兩項輕量策略——(1) 去重：描述與補丁的餘弦相似度高於 0.95 的條目合併以消除冗餘；(2) 近因加權剪枝：在可設定的近期任務視窗內未被檢索過的條目定期移除，使記憶聚焦於當前實際有用的知識（Liu et al. 2026, §3.3.3, p.4）。\n- **雙層優先檢索策略（P1/P2）**：基於「整形手術假說」（plastic surgery hypothesis，修補材料多半已存在於同一專案內）設計。**P1 專案內經驗檢索**——條件為「同專案 + 同 CWE + 同語言」，優先以最大化風格與語意一致性，確保檢索到的補丁遵循專案命名慣例、錯誤處理慣用法與架構約束；**P2 跨專案泛化**——當 P1 候選少於 $k$（設定 $k=2$）時擴展檢索至「不同專案 + 同 CWE + 同語言」，對於修補需仰賴本地碼庫中不存在之外部防禦模式的漏洞類別尤其重要（Liu et al. 2026, §3.3.4, p.4-5）。\n- **檢索的語意相似度與防資料洩漏**：以 `text-embedding-3-small` 模型將描述編碼為稠密向量，依餘弦相似度排序候選；為防資料洩漏排除與查詢同一 $I_{id}$ 的候選（$I_{id}(e)=I_{id}(q)$），並對專案內檢索施加時間約束——要求 $Timestamp(e)<Timestamp(q)$，時間戳由 $I_{id}$ 的年份與序號導出（Liu et al. 2026, §3.3.4, p.5）。\n- **回饋驅動精修迴圈——Phase 1 錯誤驅動的結構感知定位**：Locator 代理攝入 $D_{desc}$ 與動態失敗證據 $R_{dyn}$（堆疊追蹤、sanitizer 報告、失敗測試），輔以 L1/L2 的專案特定先驗知識。為克服關鍵字式 grep 會回傳含註解與未用程式碼之未排序結果的限制，作者實作 `Iter_grep`：給定符號名稱，解析倉庫 AST 定位所有定義與使用點，再依「與錯誤位置的鄰近程度」排序，並把 $R_{dyn}$ 呼叫堆疊中出現之檔案內的匹配排得更高，依與崩潰點的邏輯距離排序堆疊框。輸出為結構化定位物件 $\\langle f,\\ell\\rangle$（排序後檔案路徑與關鍵行），最終彙整成封裝檔案路徑、關鍵行號與定位理由的 $\\mathcal{L}_{loc}$（Liu et al. 2026, §3.4, p.5）。\n- **回饋驅動精修迴圈——Phase 2 經驗增強的補丁合成**：Patcher 代理以 Phase 1 的 $\\mathcal{L}_{loc}$ 為條件，並由 L1/L2 的專案特定模式初始化以確保補丁遵循風格與資安慣例。值得注意的是 **L3 精修軌跡記憶只在一次驗證失敗之後才被激活**：給定失敗候選 $\\delta$，系統嵌入失敗補丁並依同樣優先策略檢索最相似的 $P_{fail}$ 條目，取出的「失敗到成功」差異提供修正指引，供 Patcher 在下一輪修訂 $\\delta$（Liu et al. 2026, §3.4, p.6）。\n- **回饋驅動精修迴圈——Phase 3 驗證迭代控制與三態轉移**：Verifier 把 Phase 2 的候選補丁 $\\delta$ 套用至倉庫，透過 `check_vul` 執行驗證預言機 $\\langle\\mathcal{T},\\tau_{vuln}\\rangle$ 同時驗證功能保持與漏洞緩解，依執行結果觸發三態轉移——**Success**：終止生命週期，Verifier 取出成功的修復會話更新 L2，並（若適用）捕捉「失敗到成功」轉移更新 L3；**Relocate**：若漏洞仍存在（根因診斷錯誤），回退至 Phase 1；**Regenerate**：若補丁修好漏洞卻引入功能迴歸，回到 Phase 2（Liu et al. 2026, §3.4, p.6）。\n- **日誌壓縮機制**：為使下一輪迭代聚焦並降低 token 消耗，以 `log_compress` 把原始工具日誌壓縮成固定模板，包含 (i) 涉及的檔案/行範圍、(ii) 已套用的 diff hunk、(iii) 驗證失敗日誌（含 sanitizer 追蹤或編譯錯誤），隨後回滾環境以進行下一輪精修（Liu et al. 2026, §3.4, p.6）。\n- **工具介面**：代理可用工具涵蓋——定位 `Iter_grep <symbol>`（回傳 top-k，預設 k=5）；檔案檢視 `view <path>`（顯示帶行號內容，列目錄項深度 ≤2）；搜尋 `search <pattern> <search_path>`（ripgrep 正則，預設匹配數 ≤5）；檔案編輯 `create <path> <text>`（路徑已存在則失敗）與 `str_replace <path> <old> <new>`（精確唯一匹配替換）；命令執行 `bash <command> [restart]`（持久 shell 會話）；驗證 `check_vul`（執行 $\\langle\\mathcal{T},\\tau_{vuln}\\rangle$ 回傳判定與錯誤日誌）；日誌壓縮 `log_compress`；任務提交 `submit`（提交最終結果與抽取的 git diff）（Liu et al. 2026, Table 1, p.3）。\n- **實驗設定——基準與指標**：在三個倉庫級漏洞修復基準上評估——(1) **SEC-Bench**（C/C++ 記憶體安全漏洞，利用 sanitizer 回饋）；(2) **PatchEval**（Python/Go/JavaScript 多語言真實世界漏洞，以嚴格的資安+迴歸測試驗證）；(3) **Multi-SWE-bench 的 C++ 子集**（大規模倉庫級議題）。指標為：成功率（% Resolved，補丁須同時通過 $\\tau_{vuln}$ 與 $\\mathcal{T}$）、定位準確率（檔案層級，依 Yang et al. 標準，補丁修改的位置須涵蓋 ground-truth 補丁的所有位置才算正確）、以及每任務平均成本（USD，依 token 用量計）（Liu et al. 2026, §4.3, p.6）。\n- **實驗設定——基線**：對比兩類 SOTA——通用自主軟體工程代理 OpenHands（以 DeepSeek-v3.2 與 Claude-3.7-Sonnet 雙骨幹評估）、SWE-agent（Claude-3.7-Sonnet 與 Gemini-2.5）、Aider；以及專用 AVR 工具 InfCode-C++（C++ 專用，意圖引導搜尋 + 決定性 AST 導航，GPT-5 骨幹）。為公平比較，作者重現 OpenHands（記為 OpenHands*），為其加裝相同的 `check_vul` 驗證工具並修改系統提示明確指示其在自認修復完成時調用該工具（Liu et al. 2026, §4.2, p.6；§5.1.1, p.7）。\n- **實驗設定——模型與超參數**：MemRepair 主要採 **DeepSeek-v3.2 與 DeepSeek-v3** 作為推理骨幹（取效能與計算成本之平衡）；依 DeepSeek 官方建議將溫度設為 **0.0** 以鼓勵決定性補丁生成；精修迴圈上限為 **3 次失敗修補嘗試**（小規模試點顯示多數成功案例在前幾輪即收斂，額外重試主要增加成本）；在 PatchEval 上為適配多語言，僅用通用文字搜尋工具（標準 grep/ripgrep）取代語言相關的 AST 分析器 `Iter_grep`（Liu et al. 2026, §4.4, p.6-7；§5.3, p.8）。\n\n\n\n**核心發現**：\n- **三基準 SOTA 成功率**：MemRepair 在 SEC-Bench、PatchEval、Multi-SWE-bench(C++) 上分別達 **58.0%、58.2%、30.58%** 的解決率，均為當前最佳（Abstract, p.1；§1, p.2；Table 2, p.7；Table 4, p.8）。\n- **SEC-Bench 大幅超越通用代理**：MemRepair 解決 58.0% 議題，較重現的 OpenHands*（38.5%）高出近 20 個百分點；關鍵在於兩系統使用完全相同的 DeepSeek-v3.2 骨幹與相同的 `check_vul` 驗證工具，確認效能提升歸因於記憶引導架構而非 LLM 能力或工具差異（Liu et al. 2026, §5.1.1, p.7；Table 2, p.7）。SEC-Bench 其他基線：OpenHands(DeepSeek-3.2) 38.50%、OpenHands(Claude-3.7) 34.00%、SWE-agent(Claude-3.7) 31.50%、Aider(Claude-3.7) 23.50%（Liu et al. 2026, Table 2, p.7）。\n- **Multi-SWE-bench(C++) 超越專用工具**：MemRepair 達 30.58%，即便使用較弱骨幹仍超越專用 AVR 工具 InfCode-C++（GPT-5，25.6%）約 5 個百分點、超越通用代理 MOpenHands(14.70%) 與 MSWE-agent(11.60%)；論文另處述及在此基準上超越 InfCode-C++ 約 19%（相對提升）（Liu et al. 2026, §1, p.2；§5.1.1, p.7；Table 2, p.7）。同骨幹對照下 MemRepair(DeepSeek-v3.2, 30.58%) 亦勝過 MemRepair(DeepSeek-v3, 15.08%) 與 InfCode-C++(13.20%)（Liu et al. 2026, Table 2, p.7）。\n- **成本效率**：MemRepair 在 SEC-Bench 維持高度競爭力的每任務平均成本 \\$0.26，與 OpenHands*（\\$0.18）相當、遠低於 SWE-agent（\\$1.29）；在 PatchEval 上 MemRepair 每任務 \\$0.25，相較 SWE-agent \\$2.39 與 OpenHands \\$4.64 降低逾 3 倍（Liu et al. 2026, §5.1.1, p.7；§5.3, p.8；Table 4, p.8）。\n- **定位到修復的落差（Localization-to-Repair Gap）**：高定位準確率不保證修復成功。SEC-Bench 上 SWE-agent 的定位率（67.5%，135/200）表面高於 MemRepair（60.0%），但其成功定位的漏洞中有 63%（135 中的 85 個）最終仍修復失敗；原因是定位指標只要求修改檔案「包含」ground-truth 位置，高分可能反映散彈式的多檔案編輯——這雖統計上提高覆蓋錯誤行的機率，卻大幅升高引入功能迴歸或不一致修補的風險（Liu et al. 2026, §5.1.2, p.7）。\n- **MemRepair 的高轉換率**：MemRepair 在 SEC-Bench 成功定位 120 個實例中正確修復 86 個，轉換率 71.6%；在大規模 Multi-SWE-bench(C++) 上 OpenHands 的定位到修復轉換率僅 27.5%，而 MemRepair 維持穩健的 45.5%——顯示記憶引導使代理走向精確、外科式修補而非廣泛無聚焦的編輯（Liu et al. 2026, §5.1.2, p.7-8）。\n- **解的獨佔性與重疊（Venn 分析）**：在 SEC-Bench 上，所有受評工具的聯集共解出 154 個不同漏洞，MemRepair 單獨涵蓋其中 116 個（約 75.3%），是組合成功池的主導貢獻者；更重要的是 MemRepair **獨佔解出 29 個**（佔其總成功的 25%）其他代理皆無法修復的漏洞，是次佳基線 SWE-agent 獨佔數（8 個）的 3 倍以上；相較之下 SWE-agent、OpenHands 分別僅獨佔 8、6 個——說明 MemRepair 不僅小幅改進，而是具備解決一類通用 LLM 無法觸及問題的獨特能力剖面（Liu et al. 2026, §5.1.3, p.8；Figure 4, p.8）。\n- **消融——L3 精修軌跡記憶為最關鍵單一貢獻者**：僅啟用 L3 即達 50.5% 成功率，顯著勝過 OpenHands* 基線（38.5%）；L3 主要提升的是補丁「品質」——在 $L_{\\checkmark}F_{\\times}$（定位正確但修復失敗）一欄，OpenHands* 即便正確定位仍有 66 個案例修不好，L3-only 把此失敗數降到 30，完整模型進一步壓到 26，證明「失敗到成功」軌跡有效引導代理修正本會導致無效補丁的語意錯誤，從而彌合定位到修復的落差（Liu et al. 2026, §5.2, p.8-9；Table 3, p.9）。\n- **消融——L2 資安模式記憶勝過 L1 歷史修補記憶**：L1、L2 皆能在基線之上帶來提升，但 L2-only（48.0%）超越 L1-only（42.0%）；作者解讀為：把歷史修補當作「可重用程式碼片段」（L1）對漏洞修復助益有限，而泛化的抽象資安模式（如「寫入前檢查邊界」，L2）更具可遷移性與效用（Liu et al. 2026, §5.2, p.9；Table 3, p.9）。\n- **消融——僅回饋迴圈不足**：Loop Only 變體停用全部記憶檢索（L1-L3），只保留 Verifier 的回饋控制邏輯（僅提供 Relocate/Regenerate 粗粒度訊號，不提供任何經驗線索或精修策略），成功率僅 36.0%——甚至低於 OpenHands*（38.5%），且遠差於任何啟用記憶的配置（42.0%-50.5%）；其 $L_{\\checkmark}F_{\\times}$ 高達 43，顯示無記憶引導時代理即便定位正確也難以修正語意錯誤，證明「粗粒度回饋訊號在缺乏記憶上下文下並不足夠」（Liu et al. 2026, §5.2, p.9；Table 3, p.9）。\n- **消融——階層協同效應與成本**：完整 MemRepair（L1+L2+L3）的 58.0% 高於任何單一元件配置，顯示協同效應——L1/L2 在初始生成時提供必要上下文與搜尋空間縮減，L3 在回饋迴圈中作為語意過濾器與精修引擎；完整模型相較基線（\\$0.18/任務）僅邊際增加成本至 \\$0.26/任務，證明結構化記憶階層是具成本效益的增強策略（Liu et al. 2026, §5.2, p.9；Table 3, p.9）。\n- **跨語言泛化（PatchEval）**：MemRepair 在 Python/JavaScript/Go 三語言整體達 58.2% 解決率、77.3% 定位率，且即使把 `Iter_grep` 換成標準文字搜尋仍維持 SOTA，顯示效果源自記憶引導機制而非語言特定的靜態分析；各語言表現有別——JavaScript 最高（74.7% 解決、88.0% 定位、74.7% 轉換）、Go 居中（53.0% 解決、72.9% 定位）、Python 最具挑戰（46.2% 解決、70.8% 定位、60.9% 轉換）；MemRepair 顯著勝過 PatchEval 報告的強基線 SWE-agent(Gemini-2.5, 37.80%) 與 OpenHands(Gemini-2.5, 35.60%)。註：該基準共 230 案例，5 個 docker 映像本地建置失敗故排除，實際 225 案例（Liu et al. 2026, §5.3, p.8；Table 4, p.8）。\n- **修復風格分析——複雜倉庫中的精簡修補**：在大規模 C++ 倉庫（Multi-SWE-bench）上人類補丁龐大（平均 70.16 行、跨 2.24 檔案），常涉及標頭重構或程式碼清理；MemRepair 生成高度精簡的「外科式」修補（平均 24.24 行、跨 1.16 檔案），顯示緊急應變情境下代理偏好最小修改以解決漏洞、降低附帶迴歸風險（Liu et al. 2026, §6.1, p.9；Table 5, p.10）。\n- **修復風格分析——記憶體安全議題中的冗長修補**：相反地，在記憶體安全領域（SEC-Bench），MemRepair 比人類更冗長（平均改動行數 17.03 vs. 人類 10.48），源於框架鼓勵注入明確的守衛子句（如冗餘的 null 檢查）以阻斷利用路徑；雖不如人類重構優雅，卻能有效強制資安不變量（Liu et al. 2026, §6.1, p.9-10；Table 5, p.10）。Table 5 完整數據：SEC-Bench（116 成功案例，GT 15.92 / Gen 26.53 總行數）、Multi-SWE(C++)（37 案例，GT 70.16 / Gen 24.24）、PatchEval（131 案例，GT 18.94 / Gen 16.71）（Liu et al. 2026, Table 5, p.10）。\n- **定位不匹配的質性分析——行為等價修補**：作者手動分析發現 $L_{\\checkmark}F_{\\checkmark}$ 之外大量出現 $L_{\\times}F_{\\checkmark}$（定位指標判失敗但實際成功修復）的現象，源於兩種模式——**位置分歧（Location Divergence）**：人類常修改低層工具函式（callee）以泛化處理邊界情況，MemRepair 則傾向在具體呼叫點（caller）或更高層處理器攔截無效輸入，雖空間上不同卻有效阻斷漏洞觸發路徑；**範圍分歧（Scope Divergence）**：人類提交常涵蓋標頭定義等非功能性檔案，而定位指標要求預測檔案集為 ground-truth 的超集，故這些案例得零分——MemRepair 受驗證預言機驅動如外科代理，只修改緩解崩潰所需的核心實作檔案（Liu et al. 2026, §6.2, p.10）。\n- **案例研究 1——功能等價（CVE-2022-32414）**：無效物件源自 Promise 處理器（`src/njs_promise.c`），但只在傳播至位元碼直譯器（`src/njs_vmcode.c`）後才崩潰。人類補丁在來源端淨化（在值進入 VM 前於 Promise 處理器以 `njs_is_valid` 檢查並對無效輸入賦 undefined）；MemRepair 受執行期堆疊追蹤引導，改在目的端（VM 直譯器）設防——切換為從穩定的 `vm->retval` 讀取、並加入防禦檢查（迭代器為 NULL 時 abort 並報 `invalid iterator`）。雖空間上不同，代理的補丁建立了一個行為等價的安全不變量，有效阻斷利用路徑（Liu et al. 2026, §6.2, p.10）。\n- **案例研究 2 與作者自陳限制——範圍分歧（CVE-2019-13309, ImageMagick）**：人類專家做了跨多檔案修復，處理主命令處理器（`operation.c`）與工具模組（`mogrify.c`）的記憶體洩漏；MemRepair 正確修好 `operation.c`（PoC 行使的洩漏）卻漏掉 `mogrify.c` 中對應的洩漏（其程式碼路徑未被測試預言機觸發）——這揭示測試驅動修復的固有限制：代理能解決活躍的利用路徑，卻可能遺漏未被執行到之程式碼中的潛在漏洞（Liu et al. 2026, §6.2, p.10）。\n- **作者自陳的效度威脅**：**內部效度**——資料洩漏隱憂有二，檢索洩漏與 LLM 預訓練洩漏；前者以嚴格約束緩解（排除共享同一 CVE 識別碼的歷史實例、用時間戳過濾目標漏洞揭露後提交的程式碼），後者雖無法消除（模型預訓練不參與），但 RQ1 採用一致的 DeepSeek-v3.2 骨幹確保效能提升歸因於記憶架構而非模型內知識。**外部效度**——對 C++ 專用 `Iter_grep` 工具的依賴是潛在限制，但 PatchEval（RQ3）證明即使換成標準文字搜尋，MemRepair 在 Python/JavaScript/Go 仍維持 SOTA，顯示效果來自記憶引導機制而非語言特定靜態分析（Liu et al. 2026, §6.3, p.10）；此外 §6.2 的案例 2 已點明測試驅動修復可能遺漏未執行碼中的潛在漏洞（Liu et al. 2026, §6.2, p.10）。\n\n---\n\n### 4. ReCodeAgent — 以多代理工作流對大型程式庫進行語言無關的整體翻譯與驗證\n*Ibrahimzada et al. 2026, arXiv:2604.07341（伊利諾大學厄巴納-香檳分校；Amazon）*\n\n\n**範圍提醒**：本論文的核心任務是「程式庫層級的跨程式語言（PL）翻譯與驗證」（將整個 repo 從一種語言搬到另一種語言），而非對既有大型程式庫的功能修改或缺陷維護。但其與本研究主題（運用 LLM 對大型程式庫進行修改與維護）高度相關：跨語言遷移本身是大型程式庫的一種重度維護活動（作者明確將 code translation 定位為「降低技術債」的手段），且其多代理工作流、以 LLM 為中心的靜態分析、MCP/LSP 工具串接、幻覺抑制與軌跡分析等設計，對任何「LLM 操作整個 repo」的維護場景都有直接的方法論借鏡價值。故視為主題的遷移子場景納入。\n\n**定位**：論文指出，既有的程式庫層級翻譯與驗證技術（規則式 transpiler、neuro-symbolic 方法）幾乎都只在單一「來源-目標」PL 配對上評測，且需要龐大的工程投入才能新增 PL 配對——例如規則式工具 C2Rust 超過 100K LoC，neuro-symbolic 工具 AlphaTrans/Oxidizer/Skel 也各需 4K–19K LoC 才能支援單一配對，使得要覆蓋平方數量級的 PL 配對在實務上不可行（Ibrahimzada et al. 2026, §1, p.1）。ReCodeAgent 自我定位為「第一個」全自主、語言無關（PL-agnostic）的多代理程式庫層級翻譯與驗證流程：使用者只需提供來源專案與目標 PL，系統即自動翻譯並驗證整個 repo，且不需任何 PL 專屬的工程投入或外部依賴（Ibrahimzada et al. 2026, Abstract, p.1；§1 Technique, p.2）。論文明確點出四項它要克服的挑戰：(1) 真正的 PL 無關性、(2) 程式庫層級翻譯與驗證中的幻覺、(3) 測試翻譯的二分困境（先翻譯程式碼再驗證對大型 repo 無效，因長呼叫鏈與測試耦合）、(4) 既有工作缺乏對設計空間與成本的透明分析（Ibrahimzada et al. 2026, §1, p.1–2）。\n\n\n**做法**：\n- **問題形式化**：來源專案表示為 P_s = (F_s, T_s, D_s)，含來源函式集 F_s = {f_s^1,…,f_s^n}、測試 T_s、依賴 D_s，以語言 L_s 寫成；給定目標語言 L_t，repo 層級翻譯問題即產生 P_t = (F_t, T_t, D_t) 使得：(1) P_t 可無誤編譯、(2) 對所有對應函式，∀x⃗_s,∀x⃗_t : x⃗_s ↦ x⃗_t ⟹ ⟦f_s^i⟧(x⃗_s) ≃ ⟦f_t^i⟧(x⃗_t)（語意等價，⟦·⟧ 為語意詮釋、≃ 為觀察等價）、(3) 所有翻譯後測試 T_t 通過；因現有測試與驗證技術的實務限制，實際上僅考量每個 f_s^i/f_t^i 的子集（Ibrahimzada et al. 2026, §2, p.3）。\n- **整體架構**：ReCodeAgent 接收 P_s 與 L_t，由四個專職代理組成——Analyzer、Planning、Translator、Validator；前兩者分析 P_s 並產出「依賴感知」的實作計畫，後兩者執行一個「翻譯—驗證—修復」的迭代迴圈以產生 P_t（Ibrahimzada et al. 2026, §2, p.3；Figure 1, p.2）。\n- **以 LLM 為中心的靜態分析（對應挑戰 1）**：刻意以「輕量、支援多語言」的工具（如 Tree-sitter）取代既有 neuro-symbolic 技術所用的 PL 依賴程式分析元件（如以 CodeQL 建構依賴圖），改採 LLM 輔助的靜態分析，使流程不綁定特定 PL（Ibrahimzada et al. 2026, §1, p.2；§3.3, p.4）。\n- **MCP 工具層**：所有靜態分析能力透過 Model Context Protocol（MCP，開源協定）封裝並暴露給四個代理，讓 LLM 能無縫存取工具、取得專案資訊、修改程式碼（Ibrahimzada et al. 2026, §3.1, p.3）。\n- **LSP 工具（共 6 種）**：以 Language Server Protocol（JSON-RPC、PL 無關）串接六種 PL 的 language server，使代理能在語意層操作程式碼；要擴充新 PL 只需安裝對應 language server。實作的功能包含 `definition`（取得符號完整實作與檔案/行號）、`diagnostics`（回報來源與翻譯後專案的錯誤與警告）、`edit_file`（對檔案原子化套用多筆編輯，支援增量建構）、`hover`（取得符號文件字串與棄用資訊）、`references`（定位符號所有使用處，含精確行號，支援大規模重構）、`rename_symbol`（在某位置重新命名符號並更新全 repo 所有引用）（Ibrahimzada et al. 2026, §3.1.1, p.3）。\n- **專案分析（PA）工具**：另提供 `get_directory_tree`（回傳結構化目錄樹，標示 main/test/config 等檔案層級）與 `get_file_structure`（產出單一檔案的結構化表示，標出 classes/functions/structs/globals），目的是降低代理「探索程式庫」所耗的 token（Ibrahimzada et al. 2026, §3.1.2, p.4；Figure 4, p.4）。\n- **Analyzer Agent — 三階段產出高階翻譯設計**：(a) Source Project Research：用 Read 與 `get_directory_tree` 摸清架構與目錄結構，再用 `get_file_structure` 與 LSP 工具細看各檔案內容，產出含依賴、錯誤處理機制、目錄層級的研究文件；(b) Third-Party Library Analysis：找出所有第三方與標準函式庫，對每個依賴用 `WebFetch` 與 `hover` 查官方文件、評估目標 PL 中合適的慣用對應與其取捨；(c) Target Project Design：綜合前述產出目標專案設計文件，強制來源與目標專案一對一的結構映射（目錄、檔案、識別字命名），並明確指出哪些檔案需翻譯、來源建構如何映射到目標等價物（如 Java Interfaces→Rust Traits、Go Structs→Python Classes）、錯誤處理與函式庫整合策略，作為後續三個代理的權威參考（Ibrahimzada et al. 2026, §3.2, p.4；Figure 5, p.5）。\n- **Planning Agent — 把高階設計拆成可執行步驟（對應挑戰 1）**：讀取 Analyzer 產出的研究與設計文件，產出四項——(a) Fragment Extraction：用 `get_file_structure` 從來源與測試程式抽出所有翻譯單元（functions/methods/classes），並以「驗證在迴圈中（validation-in-the-loop）」方式產生可執行腳本驗證每個抽出片段確實存在於來源碼且無檔案遺漏，藉此抑制「代理誤判任務已完成」的幻覺；(b) Name Mapping：建立來源片段到目標對應物的命名映射，保留命名慣例（camelCase、snake_case），防止 LLM 任意改名而破壞追蹤；(c) Skeleton Generation：建構目標專案目錄結構並填入只有類別宣告與方法簽章、無實作的 skeleton 檔案，提供可編譯的增量翻譯框架；(d) Implementation Plan：把翻譯任務切成 Part A（來源程式碼翻譯）與 Part B（測試程式碼翻譯與驗證），採由下而上排序確保被依賴模組先翻譯，每步驟附明確檢查清單（Ibrahimzada et al. 2026, §3.3, p.4–5；Figure 6, p.5）。\n- **Translator Agent — 執行實作計畫（對應挑戰 2/3）**：依計畫同時執行 Part A 與 Part B（Algorithm 1, lines 1–13）；流程含 (a) Context Integration（載入實作計畫、目標設計、命名映射，確保識別字不被任意改名）、(b) Incremental Implementation（依依賴順序把目標 skeleton 的 stub 換成完整實作，先 Part A 再翻 Part B 開發者測試）、(c) Language-Specific Adaptation（語言特性發散時採行為保留的適配策略，如以預設參數或 dispatch 模擬多載）、(d) Repair Mode（收到非空驗證報告時診斷失敗、更新來源/測試翻譯並迭代，直到驗證通過或耗盡迭代預算）（Ibrahimzada et al. 2026, §3.4, p.5）。\n- **Validator Agent — 獨立驗證功能正確性（對應挑戰 3）**：與 Translator 分離以避免「同一代理為了讓測試通過而刪改 assertion」的問題（Algorithm 1, lines 14–21）；流程含 (a) Validation and Failure Reporting（在目標環境執行翻譯後測試套件，失敗時把編譯錯誤、stack trace、失敗測試彙整成結構化驗證報告回饋給 Translator）、(b) Coverage-Guided Test Generation（做覆蓋率缺口分析，比對已執行測試與規劃階段識別的完整函式清單；若有未覆蓋函式，於來源與目標兩 PL 各生成額外測試以驗證未測程式碼，再重跑驗證並更新報告）；迭代直到所有測試通過或達迭代上限（Ibrahimzada et al. 2026, §3.5, p.5–6）。\n- **演算法層級控制**：主迴圈最多執行 `maxiter` 次（實驗設為 5），每次依序跑 Translator 與 Validator，`validationReport.isAllSuccess()` 為真即提前 break；Translator 在收到非空驗證報告時改走 `repair`；各代理呼叫均有 timeout 保護（Ibrahimzada et al. 2026, §3, Algorithm 1, p.4）。\n- **實驗設定 — 受測模型與環境**：所有實驗的主 LLM 採 Anthropic Claude 4.5 Sonnet（因 SWE 排行榜顯示 Claude Sonnet 表現與 GPT-5、Gemini Pro 等頂尖專有模型相當甚至更優）；驗證環境為 Rust 1.92.0、Python 3.12.9、Java 21.0.7、Node 22.16.0、GCC 12.2.0、Go 1.24.4，agentic 工作流用 Claude Code 2.1.19；每個代理預算上限為 5,000 秒（依最大專案執行時間經驗設定），且記錄輸入、中間互動、工具結果與輸出以支援重放（Ibrahimzada et al. 2026, §4.1.2 / §4.1.4, p.6）。\n- **實驗設定 — 基準與規模**：基準取自四個近期 repo 層級翻譯研究的開源主題翻譯專案，共 118 個真實世界專案、跨 6 種 PL（C、Go、Java、JavaScript、Python、Rust）、超過 230K LoC、4,583 個翻譯單元；涵蓋 4 個 PL 配對：C-Rust、Go-Rust、Java-Python、Python-JavaScript；平均每個專案 1,975 LoC、43 個翻譯單元（Ibrahimzada et al. 2026, Abstract, p.1；§4.1.1, p.6）。資料清理上：排除 Syzygy（artifact 不可得）、排除 RepoTransBench（測試由 LLM 生成且未經人工驗證）、AlphaTrans 僅選作者已驗證測試套件的子集、Crust 基準為 100 個獨立 C 專案翻成 Rust（Ibrahimzada et al. 2026, §4.1.1, p.6）。\n- **對照技術與消融設計**：比較對象為 Skel、Oxidizer、AlphaTrans 三個 neuro-symbolic 技術與 SWE-agent 一個 agentic 技術；消融組態為 NoA（移除 Analyzer）、NoP（移除 Planning）、NoV（移除 Validator）、BA-α（單一精簡提示的 Base Agent / Prompt Condensation）、BA-β（把所有提示串接的 Base Agent / Prompt Concatenation）；移除 Analyzer+Planner 的消融組態被作者視為 ACToR 架構的代理（因 ACToR 綁定 CLI 程式無法直接比較，此點經 ACToR 作者確認）（Ibrahimzada et al. 2026, §4.1.3, p.6；§4.4.1–4.4.2, p.9）。\n\n\n\n**核心發現**：\n- **整體有效性（RQ1）**：在 118 個專案上，ReCodeAgent 翻譯結果達 99.4% 編譯成功（Compilation Success）與 86.5% 測試通過率（test pass rate），分別比四個既有方法平均高 2.5% 與 60.8%（Ibrahimzada et al. 2026, Abstract, p.1；§4.1 開頭, p.6）。\n- **語法正確性（編譯）**：整體 CS 99.4%，勝過既有技術平均的 96.9%；在 Oxidizer、AlphaTrans、Skel 三基準上 ReCodeAgent 與既有技術皆達 100% 可編譯；最大進步在 Crust——ReCodeAgent 讓 89/100 個專案可編譯，比 SWE-agent 多出 48 個專案，作者強調此進步在 C→Rust 的記憶體管理與所有權語意挑戰下尤其顯著（Ibrahimzada et al. 2026, §4.2.1, p.6）。論文舉例：`printf` 的 `writechar` 函式被 SWE-agent 翻譯時呼叫端對第一個引數時而用 `int` 時而用 `char`（在 C 中 char 以 int 表示故可接受，但在 Rust 中型別不同會編譯失敗），ReCodeAgent 則一致以正確的 `char` 型別呼叫（Ibrahimzada et al. 2026, §4.2.1, p.6）。\n- **測試通過率（驗證後開發者測試）**：以各方法皆能編譯的子集評測，ReCodeAgent 通過 1,822/2,107 個測試（86.5% TPR），相對既有技術僅 542/2,107（25.7%），提升 60.8%；對 Oxidizer 與 Skel 基準達 100% TPR（既有技術分別 67.2%、93.2%）；在 Crust 基準上限定於 ReCodeAgent 與 SWE-agent 皆能編譯的 40 個專案，ReCodeAgent 在 166 個測試中通過 146（88.0% TPR），SWE-agent 為 78.3%；最大增益在 AlphaTrans——ReCodeAgent 通過 1,078 個測試，AlphaTrans 的組合式方法僅 188 個，提升 75.4%；AlphaTrans 表現受限主要因測試收集錯誤（如 cli 專案 381 個測試僅 66 個被執行），論文舉 `CommandLine` 受保護建構子被誤翻為 Python 執行期 `TypeError` 檢查、使類別不可實例化而改變原設計意圖為例（Ibrahimzada et al. 2026, §4.2.2, p.6–7；Table 1, p.7）。\n- **翻譯後開發者測試（Translated Developer Tests）**：跨各基準（不含不需測試翻譯的 Crust）共 1,484 個翻譯測試，ReCodeAgent 執行並通過 1,456 個（98.1%），僅 28 個失敗；除 AlphaTrans 外均能正確翻譯並產生與來源 PL 等價的測試，Oxidizer 與 Skel 表現好部分因其測試邏輯較簡單（Ibrahimzada et al. 2026, §4.2.2, p.7；Table 1, p.7）。\n- **覆蓋率導向生成測試（ReCodeAgent Generated Tests）**：因來源開發者測試覆蓋率低（論文舉 AlphaTrans 的 fileupload 專案行覆蓋率僅 38.7%，使 61.3% 的翻譯行未被驗證），ReCodeAgent 為每個專案額外生成測試；跨所有基準共生成並執行 3,642 個測試，通過 3,629 個（99.6% TPR，13 個失敗），顯示其測試生成元件能產出正確驗證翻譯碼的有效測試；生成測試使測試覆蓋率平均從 70.8% 提升到 85.4%（提升 14.6%），對覆蓋率參差的 AlphaTrans 基準尤其有價值（Ibrahimzada et al. 2026, §4.2.2, p.7；Table 1, p.7）。\n- **測試翻譯品質（RQ2）**：跨三個需測試翻譯的 PL 配對基準（不含 Crust），ReCodeAgent 對全部 1,484 個來源測試達 100% 翻譯率（無一未翻譯，測試邏輯不留空）（Ibrahimzada et al. 2026, §4.3, p.8；Table 2, p.8）。\n- **斷言數量保留**：1,473/1,484 個翻譯測試（99.3%）的斷言數量與來源測試相符，僅 11 個不符且全部出現在 AlphaTrans 專案——這些案例的來源測試含異常大量斷言（50+ 個）導致幻覺（Ibrahimzada et al. 2026, §4.3, p.8；Table 2, p.8）。\n- **斷言預期值與型別保留**：對 1,891 個 assertEqual 風格斷言，ReCodeAgent 達 100% 預期輸出相符（型別涵蓋 string/int/float/bool），即翻譯後測試在目標 PL 產生等價預期值；斷言型別相符率（assertion type match）整體 98.54%，Oxidizer 95.93%、Skel 100%、AlphaTrans 因 JUnit 斷言庫豐富而較低（assertEqual 99.53%、assertTrue 95.20%、assertFalse 90.54%、含 assertNull/assertThrows 等其他 95.36%）；assertFalse 較低係因如 Java `assertFalse(list.isEmpty())` 被翻成語意等價但語法不同的 Python `assert len(list) > 0`（Ibrahimzada et al. 2026, §4.3, p.8；Table 2, p.8）。\n- **結構相似度與餘弦相似度**：用 Qwen3-Embedding-0.6B 對程式碼嵌入計算來源與翻譯測試的餘弦相似度，跨所有基準平均 0.91，顯示高語意保留；結構特徵上，來源測試平均 21.63 LoC、翻譯測試平均 21.58 LoC（差異 <1%），方法呼叫數來源平均 16.40、翻譯後 15.24（減少約 7%，歸因於測試框架的慣用差異），顯示翻譯不致程式碼膨脹或過度簡化（Ibrahimzada et al. 2026, §4.3, p.8；Table 2, p.8）。\n- **函式層級驗證**：因「測試翻譯耦合效應」使單一方法的翻譯問題會波及對其他方法翻譯的驗證，作者另對每個翻譯函式以相同輸入獨立驗證其輸出；在可做函式層級驗證的基準上，1,397 個函式中 ReCodeAgent 成功驗證 1,366 個（97.8%），對照技術為 935（66.9%），提升 30.9%；論文舉 Oxidizer 的 nameparts 專案 `Parse` 函式為例：測試驗證僅檢查函式對非法輸入 \"I am a Popsicle\" 不 panic，函式驗證則進一步斷言解析後屬性（如 `FullName`），結果測試驗證判 `Parse` 正確而函式驗證因 `FullName` 不正確而失敗，凸顯函式驗證更嚴格（Ibrahimzada et al. 2026, §4.2.3, p.8；Table 1 Function Validation 欄, p.7）。\n- **消融研究 — 個別代理影響（RQ3）**：移除任一專職代理皆使測試通過率與軌跡效率同時惡化——移除 Analyzer（NoA）使測試驗證下降 22.7%（缺少對來源結構與第三方依賴的基礎分析，Translator/Validator 須反覆探索程式庫、耗盡上下文視窗、產生低效互動）；移除 Planning（NoP）下降 25.3%（Translator 缺乏結構化的翻譯排序指引，常重複嘗試）；移除 Validator（NoV）下降 30.3%（無專責測試執行與診斷回饋，翻譯錯誤累積，為最大降幅）（Ibrahimzada et al. 2026, §4.4.1, p.9；Figure 7, p.9）。\n- **消融研究 — 與 Base Agent 對照**：BA-α（單一精簡提示）與 BA-β（所有提示串接）皆顯著遜於 ReCodeAgent，測試通過率最多分別下降 61.2% 與 62.4%；顯示「把所有資訊塞給單一 LLM」無效，必須做分析—規劃—翻譯—驗證的結構化拆解（Ibrahimzada et al. 2026, Abstract, p.1；§4.4.2, p.9）。\n- **軌跡（過程中心）分析**：以 Graphtory 做過程中心分析，ReCodeAgent 的軌跡最精簡（最低的平均節點數與時間邊數，同時達最高測試驗證）；消融組態隨元件移除軌跡漸趨低效，節點數（NC）與時間邊數（TEC）最多增加 29% 與 27%，證實多代理架構提供結構化指引、避免不必要探索與重複工作（Ibrahimzada et al. 2026, §4.4.3, p.9；Figure 7, p.9）。\n- **成本與耗時（RQ4）**：ReCodeAgent 平均每個專案花費 15.3 美元、57 分鐘即完成翻譯與驗證；成本與 token 用量隨專案複雜度線性增長——AlphaTrans 約 2.5M 輸入 / 1.4M 輸出 token、76 美元、平均 258 分鐘；Oxidizer 約 1.1M 輸入 / 0.4M 輸出、25 美元、92 分鐘；Skel 約 0.6M 輸入 / 0.3M 輸出、20 美元、78 分鐘；Crust 約 0.3M 輸入 / 0.2M 輸出、11 美元、45 分鐘（Crust 因個別專案較小）（Ibrahimzada et al. 2026, Abstract, p.1；§4.5.1, p.10；Figure 8, p.10）。\n- **工具使用分布**：核心工具 Read、Bash、Edit 各平均被呼叫約 15,000 次（檢視程式碼、執行指令、修改檔案），Write 與 Grep 支援檔案建立與搜尋；LSP 工具呈現針對性使用——`file_structure` 約 1,000 次、`hover` 約 150 次、語意工具如 `definition` 約 40 次，顯示代理多在做檔案探索與編輯而較少需深層語意查詢（Ibrahimzada et al. 2026, §4.5.2, p.10；Figure 8, p.10）。\n- **效率與工程成本對比**：作者總結 ReCodeAgent 在經濟上可行且成本隨專案複雜度線性、可預測地擴展，並把它定位為相對於需要 3,843–19,052 LoC PL 專屬實作的重工程 neuro-symbolic 方法的實務替代方案（Ibrahimzada et al. 2026, §4.5, p.10）。\n- **作者自陳的限制與效度威脅**：(1) 內部效度——每個實驗僅執行一次，LLM 非決定性使重跑可能改變個別結果，但作者認為 118 個專案的彙總指標不致大幅變動；(2) 外部效度——主要威脅為泛化性（已用 PL 無關設計、6 PL/4 配對緩解），次要威脅為資料污染（基準程式很可能已在 Claude 預訓練資料中，可能高估表現）；(3) 建構效度——透過建立在 Tree-sitter 與 Claude Code 等成熟廣用工具上來緩解（Ibrahimzada et al. 2026, §6, p.10）。\n\n---\n\n### 5. SmellBench — 首個評估 LLM agent 修復「架構級程式碼異味」的基準與任務編排框架\n*Dinu et al. 2026, arXiv:2605.07001（克拉約瓦大學 / NVIDIA / 布加勒斯特理工大學，羅馬尼亞）*\n\n\n**範圍提醒**：SmellBench 的主體是一個「基準資料集＋任務編排框架」，而非某個新模型或新 agent。其核心貢獻在於提供可重複使用的評估基礎設施與計分方法論，受測對象則是市面現成的編碼 agent CLI。須留意三項侷限：(1) 整個基準只建立於**單一 Python 專案 scikit-learn**（v1.7.2，約 20 萬行、100+ 模組）之上 (Dinu et al. 2026, §3, p.3)；(2) 異味偵測僅依賴**單一工具 PyExamine**，作者自承結果未必能推廣到其他語言、框架或偵測器 (Dinu et al. 2026, §7, p.10)；(3) scikit-learn 是 GitHub 上極熱門、且被收入多個 LLM 訓練語料的專案，存在「靠記憶而非靠通用架構推理」取得成績的可能性，作者僅以間接論據反駁，未能完全排除 (Dinu et al. 2026, §7, p.10)。因此本文結論宜定位為「特定專案＋特定偵測器條件下，現成 agent 在架構級重構上的能力快照」。\n\n**定位**：論文要解決的問題是——LLM agent 在「定位型 bug 修復」（如 SWE-bench Verified 上已逾 70% 解決率）與「方法／類別層級重構」上表現亮眼，但對**架構級程式碼異味**（套件／模組層級、跨數十個模組、需推理設計意圖與依賴鏈的結構性缺陷）的修復能力從未被系統性評估 (Abstract, p.1；§1, p.1)。作者指出此空白源於兩個原因：既有基準（如 SWE-bench）以測試通過與否作為二元判準，但架構異味**沒有 pass/fail 訊號、沒有可驗證 oracle**；且既有 agent 多在單一可定位的程式碼區域操作，而架構異味橫跨多模組 (§1, p.1；§2.1, p.2)。論文自我定位為「首個對架構級異味修復進行的實證評估」，並強調這是首次有研究透過專家驗證量化架構異味偵測器的誤報率 (§2.3, p.2；§8, p.10)。研究圍繞四個研究問題：RQ1 修復真實異味的有效性、RQ2 辨識誤報的準確度、RQ3 處理模糊（部分有效）異味的能力、RQ4 對整體程式碼庫品質的淨影響 (§1, p.1–2)。\n\n\n**做法**：\n- **三項核心貢獻**：(1) 提出 **SmellBench**——一個建構於 Model Context Protocol (MCP) 上的任務編排框架，將每一種架構異味型別與一套「最佳化過的執行劇本（playbook）」配對，並支援透過結構化任務生命週期進行迭代式多步驟修復；(2) 建構一個經**專家驗證**的基準，含 65 個「hard 難度」架構異味，取自 scikit-learn；(3) 進行首次**跨模型家族的多 agent 實證評估**，涵蓋 4 個模型家族、11 種 agent 設定 (§1, p.2)。\n- **目標專案選擇理由**：選 scikit-learn（v1.7.2，約 20 萬行、排除測試後 100+ 模組）有二：其一，既有架構異味偵測與重構研究幾乎全部聚焦 Java，Python（機器學習與資料科學的主流語言）在架構層級完全未被研究；其二，scikit-learn 擁有完整測試套件與持續整合基礎設施，可作為驗證「agent 重構是否保持功能正確性」的天然 oracle (§3, p.3)。\n- **異味偵測**：以 PyExamine（一個針對 Python 的綜合架構異味偵測工具，透過依賴分析與軟體度量運作，可偵測 7 種架構異味型別：Hub-like Dependency、Scattered Functionality、Cyclic Dependency、God Object、Unstable Dependency、Improper API Usage、Redundant Abstractions）掃描 scikit-learn，偵測到數百個異味實例 (§3.1, p.3)。\n- **兩階段過濾以聚焦最具挑戰性的案例**：第一階段，只保留在 scikit-learn 中有足夠實例數的 5 種異味型別——Scattered Functionality、Potential Redundant Abstractions、Unstable Dependency、Potential Improper API Usage、God Object；Hub-like Dependency 與 Cyclic Dependency 因實例不足被剔除。第二階段，依一個確定性的、基於規則的方案，把每個實例分類到 easy／medium／hard 三個難度層，最終只取 **hard 層** 65 個候選異味（Scattered Functionality 20、Potential Redundant Abstractions 25、Unstable Dependency 14、Potential Improper API Usage 4、God Object 2）(§3.1, p.3)。\n- **難度分層度量與閾值（Table 1）**：每種異味型別對應單一數值度量與 hard 閾值——Scattered Functionality 以「模組數」計（hard ≥8）；Redundant Abstractions 以「相似度 %」計（hard ≥90%）；Unstable Dependency 以「對外依賴數」計（hard ≥20）；Improper API Usage 以「總重複次數」計（hard ≥130）；God Object 以「公開函式數」計（hard ≥60）(§3.1, Table 1, p.3)。選 hard 層的理由：這些實例影響核心模組、跨多個套件邊界，需要最複雜的推理。\n- **專家驗證（兩階段）**：第一階段，由一位具架構審查經驗的資深軟體工程師（作者之一）逐一審查 65 個異味的描述、被標記的原始碼與 scikit-learn 的設計慣例，建立 ground truth，把每個異味歸入三類之一：**False Positive（誤報，41 個，63.1%）**——偵測到的模式其實是刻意或可接受的設計選擇（如 Template Method 模式、框架強制的介面實作、刻意聚合公開 API 的 facade 模組）；**True Positive（真陽性，11 個，16.9%）**——是值得修復的真實架構問題（如可整併的重複實作、模組間不必要的耦合）；**Partially Valid（部分有效，13 個，20.0%）**——偵測有其道理但嚴重度被高估，部分改善有益但完全消除會與既有設計約束衝突 (§3.2, p.3–4)。第二階段，專家再審查全部 11 個 agent 在 65 個任務上實際產生的程式碼變更（715 個 agent-任務結果），以確認回報的修復對應到真實的架構重構，而非僅僅滿足偵測工具的表面變換 (§3.2, p.4)。\n- **專家裁決的信度檢驗**：另兩位資深開發者以相同三類方案獨立分類全部 65 個異味；因類別為序數（FP < Partial < TP），採二次加權 Cohen's κ，平均成對 κ = 0.67（substantial agreement），三對皆 >0.62；分歧集中在 FP／Partially Valid 邊界。若把三類塌縮成二元（genuine vs not genuine，FP 與 Partial 合併），標註者在 81.5% 案例一致（Fleiss' κ = 0.45，moderate，因分布高度不平衡）。全程採用主標註者的裁決 (§3.2, p.4)。\n- **基準設計理念**：三類結構直接對應評估三種不同的 agent 能力——對 11 個 true positive 評估修復有效性、對 41 個 false positive 評估誤報辨識、對 13 個模糊案例評估部分異味處理（測試 agent 能否做出有針對性的改善而不過度修正）。此三分結構反映真實情境：任何真實程式碼庫中，多數被工具標記的異味其實是誤報 (§3.3, p.4)。值得注意的是，25 個 Redundant Abstractions 實例全部是誤報（0 個 true positive），但作者仍保留它們，因為套用到其他任務的重構可能透過串聯副作用「順帶」解決這些異味，可用於衡量非預期的跨任務影響 (§3, p.4)。\n- **任務編排（MCP）**：SmellBench 透過一個 MCP server 編排 agent 與任務的互動，採「拉取式（pull-based）」任務排程迴圈，暴露三個工具端點——`next_task`（掃描任務庫，原子化地把下一個可用任務租借給請求的 agent）、`get_task_packet`（組裝任務封包）、`mark_task`（記錄 agent 結果、驗證封包、保留跨重試的完整歷史）(§4.1, p.4)。\n- **任務封包（task packet）內容**：這是基準與 agent 之間的核心介面，是一個由多個來源組裝而成的檢索增強情境，基礎內容包含異味型別、異味名稱、PyExamine 產生的偵測報告（描述異味實例、受影響實體、嚴重度度量）、受影響原始檔清單（去重並正規化為相對路徑）、涉及的模組；再以 GEPA pipeline 產出的「異味專屬執行劇本」與三個 few-shot 示範增強。若任務先前被標為 Need More Work，封包還會附上 agent 的前次狀態、摘要與已變更檔案清單，使 agent 能增量續做而非從零重啟 (§4.1, p.4)。\n- **任務生命週期狀態機（Figure 2）**：任務起始於 *Not Handled*，agent 透過 `next_task` 取得後轉為 *Leased*；之後 agent 走兩階段決策流程，最終轉入四個終端狀態之一——**Done**（修復完成）、**Accepted**（判定為誤報而接受現狀）、**Need More Work**（部分進度、需再次觸發）、**Blocked**（外部限制阻擋）(§4.2, p.4–5)。\n- **兩階段決策流程**：第一階段，agent 必先嘗試解題：分析任務封包、擬定計畫，選擇 single-iteration completion（計畫一次可完成）或 multi-iteration completion（計畫過大須拆成具體 mini-task，本輪至少完成一個）。在選定終端狀態前，agent 須對所有被修改的檔案執行一道**驗證閘**——完整編譯檢查＋import 冒煙測試（驗證所有受影響模組都能無錯載入），任一失敗則須先修正。第二階段，agent 依嘗試結果選終端狀態：選 **Done** 須回報 baseline 與最終度量值及停止理由；選 **Accepted** 須提供具體證據（如 baseline 量測證明異味無法被縮減），且須**還原**嘗試期間所做的任何程式碼變更以保留原始碼庫，只要還有任何合理重構路徑就必須改選 Need More Work；選 **Need More Work** 須在本輪完成至少一個 mini-task 並列出剩餘步驟，迭代次數無上限，agent 自我終止；選 **Blocked** 須記錄具體阻擋原因與已嘗試的解法 (§4.2, p.5)。\n- **GEPA prompt 最佳化（§4.3, Figure 3）**：作者不用單一手寫 prompt，而是讓每種異味型別各自取得最佳化的執行劇本與 few-shot 示範。採用 GEPA（一個反思式 prompt 演化最佳化器），把人寫的 baseline 模板自動轉成高品質的異味專屬任務封包。對每種異味型別，以四項輸入設定 GEPA：人寫 baseline 模板（暖啟動）、編碼任務生命週期決策規則的狀態策略、嚴格定義劇本與示範所需結構的輸出 schema、以及從 easy／medium 難度層採樣的訓練範例（70/30 train-validation 切分）。雖然訓練用的異味同樣來自 scikit-learn，但**不含任何 hard 層實例**，確保評估集在最佳化期間未被看過。輸出為一份定案執行劇本與三個 few-shot 示範（各對應一個終端狀態）(§4.3, p.5)。\n- **GEPA 計分函式（複合代理度量）**：因為對每個候選 prompt 跑全基準（單一 agent 跑完 65 個任務需數小時）在運算上不可行，作者設計了一個結合兩個互補訊號的複合代理度量。**靜態驗證器（佔 30% 權重）**對產出的 prompt 與示範做確定性結構檢查，包括是否要求明確的證據（baseline 與最終度量回報）、狀態標籤是否有閘控規則、Need More Work 是否有反迴圈規則、續做任務是否有續做邏輯、是否無過度寬泛的測試指令或模糊謹慎用語、示範是否恰好為 3 個且各有明確證據鏈，此檢查在毫秒級完成、可過濾結構無效的候選；**評審模型（佔 70% 權重）**用一個五維 rubric（目標對齊、執行品質、狀態紀律、示範品質、輸出紀律）評估每個候選，回傳一個正規化分數與自由文字回饋，後者是關鍵設計——GEPA 用它診斷具體弱點並提出有針對性的改進，使收斂所需候選數更少 (§4.3, p.5)。\n- **GEPA 的模型選擇與設定**：採成本效率導向的非對稱架構——用較快較小的 **GPT-5.1-mini** 做候選生成（因每輪採樣大量候選，吞吐量重要），用較強的 **GPT-5.2** 做評審與反思（推理品質重要）；GEPA 設為 light preset，優先快速收斂而非窮盡搜尋 (§4.3, p.5–6)。作者特別指出 prompt 最佳化的必要性：開發期間嘗試用手寫 prompt（無結構化劇本與 few-shot 示範）一再失敗——agent 陷入無限的 Need More Work 迴圈、把任務留在未處理狀態、或產出不符狀態協定的輸出；GEPA 最佳化的 prompt 透過編碼明確的反迴圈規則、狀態閘控紀律與證據要求解決了這些失敗模式 (§4.3, p.6)。\n- **受測 agent 架構**：評估 4 個模型家族的現成編碼 agent CLI——OpenAI Codex、Claude Code、Gemini CLI、Mistral Vibe。所有 agent 收到**相同的 agent skill**（一套手寫指令集，編碼 SmellBench 協定：MCP 呼叫序列、含證據要求的狀態分類法、多迭代任務的完成策略、含反迴圈防護的狀態選擇規則、各終端狀態的證據要求、強制性工具用量約束）。每次 agent 呼叫是**無狀態**的——agent 不跨輪攜帶記憶，所有任務持久化由 MCP server 處理，任務封包是每次執行的唯一情境來源，agent 完全自主、無人工介入 (§4.4, p.6)。\n- **11 種 agent 設定**：GPT 5.4、GPT 5.3 Codex、GPT 5.3 Codex Spark、GPT 5.1 Codex Max（皆經 OpenAI Codex）；Claude Opus 4.6、Claude Sonnet 4.6、Claude Haiku 4.5（經 Claude Code）；Gemini 3.1 Pro Preview、Gemini 3.1 Flash Lite Preview（經 Gemini CLI）；Devstral v2（經 Mistral Vibe）。所有 agent 用各自 CLI 預設的推理設定、不啟用延伸推理模式。另設一個 **baseline**：以 Claude Code 跑 Claude Haiku 4.5，但只給一個最小 prompt（僅列出偵測到的異味與受影響檔案），無 agent skill、無生命週期、無 GEPA 最佳化封包 (§5.1, p.6)。\n- **評估方法與計分函式**：對每個修復後的程式碼庫重跑 scikit-learn 完整測試套件以驗證功能正確性（結果：所有 agent 設定皆無測試偏差，重構皆保持功能正確）。修復成效本身則透過對每個修復後程式碼庫**重跑 PyExamine**客觀量測，不採 agent 自陳 (§3.2, p.4；§5.1, p.6)。每個任務的計分函式 s ∈ [−1, 1]（Table 3）依 agent 動作與客觀結果而定：「嘗試修復」→完全修復得 1.0、部分改善得 (0,1]（與嚴重度變化成比例，s = −Δsev/sev_old，截斷於 [−1,1]）、未變動得 0.0、惡化得 [−1,0)；「標記為誤報」→專家裁定 FP 得 1.0、Partially Valid 得 0.0、True Positive 得 −1.0 (§5.1, Table 3, p.6)。\n- **加權有效性綜合分數**：每個任務分數依專家三類別分別平均，得三個分量——True Positive Component（11 個真實異味的平均 s）、False Positive Component（41 個誤報）、Partial Component（13 個模糊案例）；綜合為單一加權有效性 E = 0.60 × TP + 0.20 × FP + 0.20 × Partial，TP 佔 60%（最主要、最具挑戰的能力），FP 與 Partial 各佔 20% (§5.1, Eq. 1, p.6)。\n\n\n\n**核心發現**：\n- **整體修復率與「27.7% 樓地板」現象**：最佳 agent（GPT 5.3 Codex Spark）解決 65 個異味中的 31 個（47.7%）；但 4 個非 baseline agent（全部三個 Claude 模型與 GPT 5.1 Codex Max）恰好都收斂在 18 個（27.7%），形成明顯的「樓地板」，暗示存在一個直觀可解的共同基底，差異化發生在這個樓地板之上——GPT 5.3 Codex Spark 解 31、GPT 5.4 解 21、GPT 5.3 Codex 解 20、Gemini 3.1 Pro 解 19（§5.3, Finding 1, p.7；Table 5, p.7）。\n- **誤報率高達 63.1%**：專家驗證顯示 65 個被偵測異味中 41 個（63.1%）是誤報，與既有靜態分析文獻一致，且此比率因刻意選 hard 層而可能被放大（hard 案例影響核心模組，而 Template Method、Facade Aggregation 等刻意設計模式在核心模組更常見）(§3.2, p.4；Table 2, p.4；§6, p.10)。誤報率在不同異味型別間差異極大：25 個 Potential Redundant Abstractions **全部**是誤報、20 個 Scattered Functionality 中 13 個是誤報、14 個 Unstable Dependency 則多為真實問題（6 TP／6 Partial／2 FP）(§3, Table 2, p.4)。\n- **加權有效性排名與三個層級（Table 4）**：11 個 agent 依 E 分為三層。**頂層（排名 1–4）**：GPT 5.3 Codex Spark（E=0.478）、GPT 5.3 Codex（0.444）、Gemini 3.1 Pro（0.435）、GPT 5.4（0.428）。**中層（排名 5–8）**：三個 Claude agent 與 GPT 5.1 Codex Max，E 介於 0.347–0.379（FP 分量高但 TP 分量低）。**底層**：baseline（E=0.152）、Devstral v2（0.067）、Gemini 3.1 Flash Lite（−0.177）；後兩者因把真實異味誤標為誤報而拿到負的 TP 分量 (§5.2, p.6–7；Table 4, p.7)。沒有單一 agent 在所有維度稱霸：GPT 5.3 Codex Spark 在 E 與 Partial 領先、GPT 5.3 Codex 在 TP 領先（0.402）、Gemini 3.1 Pro 在 FP 領先（0.952）(§5.2, p.7)。\n- **排名的統計穩健性**：Bootstrap 信賴區間（10,000 次重抽樣）確認層級差異穩健——頂層綜合 CI 不與 baseline 重疊（如 GPT 5.3 Codex Spark E：[0.24,0.70] vs baseline [0.07,0.27]）；但 TP 與 Partial 分量因樣本小（n=11、n=13）有大量不確定性，CI 寬度超過 0.50，前八名 TP 的 CI 大幅重疊；FP 分量估計較精確（n=41，CI 寬度 0.12–0.24）。同層內的分量級排名須謹慎解讀 (§5.2, p.7)。Kendall's W = 0.939（χ²=65.71, df=10, p<0.001）顯示在七種不同權重設定下排名高度一致，三個層級穩健；頂層內任兩 agent 的成對差異不具統計顯著性，實務差異來自淨程式碼庫影響（RQ4）與誤報精確度（RQ2）(§5.7, Finding 5, p.8–9)。\n- **RQ1 修復有效性——並非所有「解決」都來自直接修復**：部分異味是被套用於其他任務的重構「串聯（cascading）」消除的，而非 agent 在對應任務上的直接成果 (§5.3, p.7)。部分嚴重度縮減（即使未完全解決）很常見：部分改善率（PIR，定義為「嘗試但未解決的異味中嚴重度度量下降的百分比」）前八名介於 60.0%（Claude Haiku 4.5）至 82.4%（GPT 5.3 Codex Spark），但 baseline 僅 21.3%——顯示 agent skill 大幅提升修復品質，遠超裸 prompt 所能達到，即使兩者總解決率相同 (§5.3, p.7；Table 5, p.7)。\n- **各異味型別難度差異懸殊**：**Improper API Usage 抵抗了所有 agent（0/4 解決）**——這是真實能力缺口：這些任務需理解 API 合約、把分散在薄包裝層的重複呼叫模式換成集中式抽象，是一種跨函式推理，沒有任何 agent 能勝任 (§5.3, p.7；§6, p.10)。**Unstable Dependency 是最尖銳的區分點（0–7 解決）**：GPT 5.3 Codex Spark 透過依賴重構解出 7 個，而所有 Claude agent 與 GPT 5.1 Codex Max 解出 0 個 (§5.3, p.7；Table 5, p.7)。Scattered Functionality 20 個中 13 個為誤報，agent 解出 1–4 個（14–57%）；25 個 Redundant Abstractions 雖全為誤報，agent 仍「解掉」15–21 個（因套用到別處的重構降低了觸發偵測的相似度分數）(§5.3, p.7)。\n- **RQ2 誤報辨識——agent 與專家高度一致（Table 6）**：在 52 個無歧義任務（41 FP＋11 TP）上以 Cohen's κ 評估。Gemini 3.1 Pro 與 Claude Haiku 4.5 達最強一致（κ=0.94）；Claude Opus 4.6 與 Claude Sonnet 4.6 達**完美精確度（1.00）**但召回較低；七個 agent 產生零個錯誤誤報宣稱（不把真陽性誤標為誤報），GPT 5.3 Codex 與 GPT 5.4 在維持此特性下分別標出 38、36 個誤報 (§5.4, p.7–8)。Gemini 3.1 Flash Lite 把 65 個任務中的 61 個標為誤報（93.8%），κ 僅 0.37，錯誤駁回 8 個真實異味與 12 個部分有效異味。baseline 完全無誤報能力（κ=0.00，從不標誤報）(§5.4, Finding 2, p.8；Table 6, p.7)。\n- **誤報判定的三種行為模式**：檢視 409 個誤報宣稱發現——絕大多數（371 個，90.7%）是「純標記（pure flag）」：agent 不做任何程式碼變更就斷定為誤報；較少一批（30 個，7.3%）是「部分修復標記」：agent 先做了程式碼變更才最終判定為刻意設計；剩餘 8 個（2.0%）經由 Need More Work 迭代後才下誤報結論。純標記的主導地位顯示多數 agent 在初始分析階段即下誤報判斷，而非透過試錯 (§5.4, p.8)。作者結論：協定本身是必要的（baseline κ=0.00），但 Flash Lite 的近乎全面標記（κ=0.37）顯示協定不足以彌補模型能力不足 (§5.4, Finding 2, p.8)。\n- **RQ3 模糊異味處理——最具區分力的維度**：Partial Component 分數範圍 0.353（GPT 5.3 Codex Spark）至 0.000（Gemini 3.1 Flash Lite），是區分力最強的維度。策略分歧明顯：Claude Opus 4.6 與 Claude Sonnet 4.6 嘗試全部 13 個修復，Gemini 3.1 Flash Lite 把 13 個中的 12 個標為誤報、剩 1 個無改善。GPT 5.3 Codex Spark 完全解出 3 個部分有效異味、GPT 5.4 解出 1 個；多數 agent 只得邊際改善（嚴重度縮減分數介於 0.0–0.1）。在模糊異味上標誤報得 0 分（不獎不罰），而嘗試修復可透過部分改善得正分——只有 GPT 5.3 Codex Spark 一貫展現「有足夠能力縮減異味度量的修復意願」這個組合 (§5.5, Finding 3, p.8)。\n- **RQ4 淨程式碼庫影響——修復積極度與淨品質成反比（Table 7）**：對每個修復後程式碼庫重跑 PyExamine，計算淨異味變化 Δ＝消失的異味數 − 新偵測到的異味數。Gemini 3.1 Pro 取得最佳淨值（解決 19、引入 3、淨 +16），Claude Opus 4.6（解 18、引入 3、淨 +15）、baseline（解 18、引入 4、淨 +14）次之。反之，**最積極的 GPT 5.3 Codex Spark 雖解出最多（31 個），卻因模組整併造成新的依賴違規而引入 140 個新異味，淨值 −109**；GPT 5.1 Codex Max 淨 −24、GPT 5.4 淨 −19、GPT 5.3 Codex 淨 −18 (§5.6, p.8；Table 7, p.8)。Claude agent 在所有任務上產生零個負的單任務分數；Devstral v2 與 Gemini 3.1 Flash Lite 各惡化 8 個任務 (§5.6, p.8)。\n- **作者明確結論——保守 vs 積極的兩種部署輪廓**：「修復積極度與淨程式碼庫品質成反比。最佳淨值（+15、+16）由引入 ≤3 個新異味的保守 agent 取得；最積極的 agent 引入 140 個」(§5.6, Finding 4, p.8)。作者把此現象連結到自動程式修復文獻中已充分記載的「patch overfitting（補丁過擬合）」——積極工具產出滿足 oracle 卻降低整體品質的修復；並據此提出兩種部署輪廓：保守 agent 適合自主 CI pipeline，積極 agent 適合可由人審查引入異味的人類監督式重構 (§6, p.10)。\n- **agent skill 的作用**：baseline（裸 Claude Haiku 4.5）與帶 skill 的 Claude Haiku 4.5 雖總解決率相同（皆 18），但 PIR 從 21.3% 提升到 60.0%，且 baseline 完全無誤報辨識能力（κ=0.00 vs 0.94）——顯示結構化協定（agent skill＋GEPA 最佳化封包）大幅改善修復品質與判斷能力，而非僅靠模型本身 (§5.3, p.7；§5.4, p.8)。作者另指出，即便是有能力的模型（Claude Haiku 4.5），在無完整任務協定下表現也顯著較差，印證 prompt 最佳化的必要性 (§4.3, p.6)。\n- **串聯（cascading）修復機制**：相當比例的「解決」其實是套用於某任務的重構順帶消除了別處的異味（以 Redundant Abstractions 為主）。發生情境是 agent 整併共享模組中的重複邏輯，降低了引用相同程式碼的其他模組對的相似度分數。串聯修復是真實的程式碼庫改善，但並非有針對性的 agent 推理結果，其計數對任務執行順序敏感 (§6, p.9)。\n- **代表性失敗模式**：對 Improper API Usage（0/4），agent 一貫能辨識重複呼叫模式，卻在規劃階段失敗——只對個別呼叫點提出孤立修改，未設計集中式抽象，導致度量無法下降的部分修改。對 Unstable Dependency（0/7，指 Claude 與 GPT 5.1 Codex Max），成功者透過把共用工具搬到穩定基底模組來重構 import，失敗者能辨識依賴鏈卻停在分析階段、不執行完成重構所需的檔案搬移與 import 重寫，預設成一個永不收斂的 Need More Work 狀態。作者結論：瓶頸不在架構理解本身，而在「執行跨模組邊界的協調式多檔案變換」的能力 (§6, p.9)。\n- **跨 agent 一致性與校準**：10 個非 baseline agent 的 Fleiss' κ = 0.531（moderate），成對一致性依模型家族聚集（Claude κ=0.58–0.78；GPT κ=0.49–0.78），但也有強烈的跨家族收斂（如 Gemini 3.1 Pro 與 Claude Opus 4.6 達 κ=0.77）。自我評估校準差異極大：Claude Haiku 4.5 的自評分數與實際分數相關最高（r=0.68），而 Gemini 3.1 Pro 無論結果如何都給出相同信心（r=0.00）。作者指出，校準良好的 agent 能把不確定的修復交付人工審查，但多數現有模型缺乏此後設認知能力 (§6, p.10)。\n- **架構推理缺口（與 SWE-bench 對比）**：最佳 agent 47.7% 的解決率與 SWE-bench Verified 上 70%+ 形成對比。雖然此比較不精確（SWE-bench 用測試 pass/fail 量定位型 bug，SmellBench 用工具量測的跨模組異味嚴重度縮減），但型別層級分解（RQ1）顯示最難案例（Improper API Usage、Unstable Dependency）需要理解 API 合約與遞移耦合，確認架構異味修復是與定位型 bug 修復**質性不同**的任務 (§6, p.9)。\n- **作者自陳的限制**：(1) **外部效度**——評估只針對單一 Python 專案（scikit-learn）與單一偵測工具（PyExamine），可能不推廣到其他語言、框架或偵測器；5 種異味型別未涵蓋所有架構異味；scikit-learn 是熱門 GitHub 專案、在多個 LLM 訓練語料中，存在「靠記憶」而非「靠通用推理」取得成績的可能（作者以 63.1% 誤報率與 Improper API Usage 0/4 兩點間接論證記憶無法單獨解釋觀察結果）。(2) **內部效度**——專家裁決由單一主標註者指定，可能引入主觀偏差（已以兩位額外標註者驗證，κ_w=0.67）；LLM 非確定性可能影響可重現性，因運算成本每個 agent 未跑多次試驗（但 agent 行為與層級排名跨所有執行一致）；agent 重構可能引入功能回歸（已以完整測試套件驗證、無偏差）。(3) **建構效度**——計分函式對同類別內所有異味等權，但 TP（n=11）與 Partial（n=13）樣本小、分量級排名須謹慎；以 PyExamine 工具量測異味解決，可能無法捕捉「表面變換 vs 真實架構改善」的差別；GEPA 用 easy/medium 層異味訓練，prompt 可能編碼了不可遷移的 scikit-learn 專屬模式 (§7, p.10)。作者把「持久貢獻」定位為 SmellBench 基礎設施與評估方法論本身（可在未來的 agent 上重跑以追蹤進展），而非報告中的特定模型排名（會隨供應商釋出新版而變動）(§6, p.10；§8, p.10)。\n\n---\n\n### 6. Refactoring Runaway — 首個系統性研究「編碼代理在議題解決時夾帶非意圖糾纏式重構」的實證與緩解\n*Tian et al. 2026, arXiv:2605.22526（天津大學軟體學院 + 日本九州大學）*\n\n\n**定位**：論文聚焦於一個過往被忽略的非功能性問題：LLM 編碼代理（coding agents）在解決真實 GitHub 議題時，會夾帶既非議題明確要求、也非隱含必要的「非意圖重構」（unintentional refactoring），使重構與 bug 修補／新功能糾纏在同一 commit，形成「糾纏式重構」（tangled refactoring）(Abstract, p.1；§1, p.2)。既有對代理補丁的評估幾乎只看功能正確性（是否通過測試），少有人檢視代理在最小修補之外如何改動代碼庫；少數研究（Horikawa et al.、Ottenhof et al.）也只看「被明確指派的意圖性重構」，本文則首次研究「與議題補丁糾纏的隱含重構」及其對功能正確性的影響，並提出緩解方法(§2.2, p.5–6；§1, p.4)。論文以兩個真實案例破題：CASE1（balatro-rs#624）議題僅要求移除 3 行死代碼，代理卻觸發「重構失控」（Refactoring Runaway），跨 89 個檔案產生 16,881 行結構性改動，開發者將其衝擊比擬為「緩衝區溢位」這類重大漏洞；CASE2（celestia-core#2201）議題只要求調高一個 timeout 值以修復 flaky 測試，代理卻大量改動，迫使開發者明確下達「測試代碼不需要防禦性編碼，請把改動限制到絕對最小」的指令(§1, p.2–3, Fig.1)。論文自我定位為「理解代理式議題解決中糾纏式重構實務的第一步」，並公開了複製套件(§1, p.4；ref [44])。\n\n\n**做法**：\n- **基準與語言選擇**：採用 Multi-SWE-bench（SWE-bench 的多語言擴展），只取其中 Java 子集，因為 Java 共有 128 個議題實例，且最先進的重構偵測工具 RefactoringMiner 目前僅支援 Java；相較 SWE-bench Multilingual 只有 43 個 Java 議題，Multi-SWE-bench 提供更大且更多樣的樣本(§3.1, p.6)。\n- **資料來源**：Multi-SWE-bench Java 子集含 128 個人類撰寫的黃金補丁（golden patches，作為正確解的 ground truth），以及 4,608 個代理生成補丁；後者由 3 個代理框架 × 12 個基礎 LLM × 128 個議題產生。3 個框架為 SWE-agent、OpenHands、Agentless（多語言版改名為 MagentLess，但論文沿用原名）；12 個 LLM 包含 Claude-3.7-Sonnet、Claude-3.5-Sonnet、DeepSeek-R1、DeepSeek-V3、Doubao-1.5-pro、Doubao-1.5-thinking、GPT-4o、OpenAI-o1、OpenAI-o3-mini-high、Llama-4-Maverick、Qwen2.5-72B-Instruct、Gemini-2.5-Pro(§3.1, p.6)。\n- **議題層級過濾（Issue-Based Filtering）**：人工檢視全部 128 個議題的標題與描述，確認其性質屬 bug fix、new feature 或 feature optimization，本身並非以重構為目的；藉此保證任何在補丁中偵測到的重構都「很可能是非意圖的糾纏式改動」，而非議題本身所要求(§3.2.1, p.7)。\n- **補丁層級過濾（Patch-Based Filtering）**：將每個補丁套用到對應 repo 的 base commit，採與 Multi-SWE-bench 評估框架一致的兩階段套用程序——先以 `git apply --whitespace=nowarn`，失敗則退回 Unix `patch --batch -fuzz=5 -p1`（容許最多 5 行上下文偏差）。在 4,608 個代理補丁中，3,693 個（80.1%）成功套用、441 個（9.6%）為空補丁、474 個（10.3%）套用失敗（成因含參照不存在的檔案路徑、行號偏移超出容差、diff 語法錯誤）(§3.2.2, p.7)。\n- **重構偵測工具**：採用 RefactoringMiner 3.0，理由是其覆蓋度與準確度高於替代工具 RefDiff——RefactoringMiner 基於 AST 語句比對演算法、可偵測逾 100 種重構類型（從 Move Method、Move Class 等高階結構改動到 Extract Method、Rename Variable 等細粒度操作），而 RefDiff 僅支援 11 種、約 96% 精確度與 80% 召回率(§3.3, p.7)。\n- **異常補丁排除**：偵測過程發現 OpenHands 搭配 Gemini-2.5-Pro 在 jackson-databind repo 產生兩個異常補丁，做了專案級版本回退（從 2.17.0-SNAPSHOT 降級到 2.15.3、2.16.0-SNAPSHOT 降到 2.15.2），改動 476 與 111 個檔案、含大量測試代碼，被誤判為 1,122 個重構操作（如 653 個因框架降級而移除的 JUnit 5 `@Test` 標註）；為避免扭曲分析，將這兩個補丁剔除，最終以 3,691 個代理補丁進入分析(§3.3, p.7–8)。\n- **糾纏式重構偵測產出**：對 3,691 個代理補丁與 128 個人類黃金補丁同跑 RefactoringMiner。代理補丁偵測到 2,429 個糾纏式重構實例、涵蓋 73 種獨特類型；人類補丁偵測到 224 個實例、涵蓋 46 種類型。並把補丁依「代理補丁／黃金補丁是否各含至少一個糾纏式重構」分為四類：Both Refactors、Agent Refactors、Golden Refactors、Neither Refactors(§3.3, p.8, Table 1)。\n- **RQ1 對比分析指標**：系統性比較代理與人類在議題解決補丁中的糾纏式重構，使用三個指標——(1) Tangled Refactoring Ratio（含至少一個糾纏式重構的補丁占比）、(2) Tangled Refactoring Density（每個補丁平均重構操作數）、(3) Tangled Refactoring Types（補丁中出現的重構類型總數，衡量多樣性）；結果再依 3 個框架與 12 個 LLM 分組彙整，並用 Fig.3／Fig.4 熱圖呈現 top-10 重構類型分布(§4.1.1, p.8；§4.1.2, p.9–12)。\n- **RQ2 邏輯迴歸設計（自變數）**：以邏輯迴歸（logistic regression）估計重構相關因素對代理效能的邊際效應。主自變數為 `has_refactoring`（補丁是否含任一糾纏式重構，二元）。並沿用既有重構研究的兩個正交維度進一步拆解：(i) Refactoring Action——`has_add`、`has_remove`、`has_adjust`（代碼元素被新增／移除／調整）；(ii) Refactoring Scope——`has_method`、`has_class`、`has_local_variable`（重構發生的結構層級）；皆編碼為二元虛擬變數(§4.2.1, p.12–13, Table 3)。\n- **RQ2 控制變數**：為隔離重構效應，控制三組混淆因子——任務特性（task difficulty 之 Easy/Medium/Hard、issue type 之 bug_fix/new_feature/feature_optimization、issue length 議題描述 token 數）、代理特性（base model、agent framework）、補丁特性（modified lines、modified files、File Coverage、Line Coverage）。File Coverage 定義為代理補丁與黃金補丁所改檔案集合的交集占黃金補丁檔案集合的比例；Line Coverage 則對黃金補丁每個檔案計算改動行號集合的交集占比後加權平均(§4.2.1, p.13–14)。\n- **RQ2 統計前處理與診斷**：分析基於 3,691 個有效實例。對右偏的數值變數（modified_lines 偏度約 8.24、modified_files 約 8.41、issue_length 約 6.5）做 log1p 對數轉換；類別變數做 one-hot 編碼並採 drop-first 參考類別避免虛擬變數陷阱；以 VIF 檢驗多重共線性，最大 VIF 低於 3（如 task_difficulty_Medium 約 2.96、modified_lines_log_scaled 約 2.23），遠低於門檻 5，故保留所有控制變數(§4.2.1, p.14)。\n- **RQ2 模型擬合**：對兩個依變數（Compatibility 是否成功編譯、Correctness 是否通過全部黃金測試而解決議題）× 兩組自變數（Refactoring Presence、Refactoring Action & Scope）建立 4 個邏輯迴歸模型；以 Odds Ratio（OR>1 正相關、OR<1 負相關）量化關聯方向與強度，以 p 值判定顯著性，並報告 Adjusted McFadden's pseudo-R²(§4.2.1, p.14)。\n- **RQ3 緩解方法 RefUntangle——整體架構**：提出 RefUntangle，一個輕量、可外掛於現有代理的「重構感知精煉模組」（post-processing module），分兩階段：(1) Refactoring Assessment Component 評估每個被偵測到的糾纏式重構之品質；(2) Patch Refinement Component 依評估結果選擇性地修改或移除低品質重構，以提升補丁的可編譯性與正確性(§4.3.1, p.16)。\n- **RQ3 第一階段——重構評估**：對每個代理補丁，提供 RefUntangle 議題描述、生成補丁，以及 RefactoringMiner 產出的結構化重構清單（類型、位置、描述）。RefUntangle 以一個基礎 LLM（RQ3 採用 DeepSeek-V3.2 或 Gemini-2.5-Pro）沿兩個正交維度評估每個重構——(1) Necessity：該重構是否與解決議題的邏輯語意上交織、抑或屬獨立且非必要的結構改動；(2) Safety：該重構與議題解決邏輯結合時是否保持行為與結構一致性、抑或引入型別錯誤／呼叫點失聯／依賴違反等問題。再依決策規則貼三種標籤：「必要且安全」→ KEEP；「必要但不安全」→ FIX（附自然語言修正建議）；「不必要」→ 不論安全與否一律 REMOVE(§4.3.1, p.16)。\n- **RQ3 第二階段——補丁精煉**：依評估結果，若所有重構皆為 KEEP 則補丁保持不變；否則 RefUntangle 以 LLM 結合原始補丁與結構化評估結果生成精煉補丁，目標為：移除 REMOVE 標籤的重構、對 FIX 標籤套用修正、保留 KEEP 標籤、並維持議題解決所需的可編譯性與正確性。提示採三層設計——全域系統提示（跨兩元件共享的「正確性優先、最小改動、重構紀律、向後相容、保留測試介面」原則）、元件專屬系統提示（評估元件強制沿 necessity／safety 兩維輸出；精煉元件要求輸出統一 diff 格式）、案例專屬使用者提示。RefUntangle 設定 temperature=0 以強制決定性解碼，並以 Multi-SWE-bench 評估工具量測精煉後補丁的可編譯性與正確性；完整提示模板見附錄 A(§4.3.1, p.16–17；附錄 A, p.29–34)。\n\n\n\n**核心發現**：\n- **糾纏式重構的普遍度**：在 3,691 個代理補丁中，1,733 個（46.95%）至少含一個糾纏式重構，顯示此現象在代理式議題解決中相當普遍；補丁四分類為 Both Refactors 398 個（10.78%）、Agent Refactors 393 個（10.65%）、Golden Refactors 942 個（25.52%）、Neither Refactors 1,958 個（53.05%）。其中 Agent Refactors 一類代表「代理重構了但人類黃金補丁沒有」，顯示代理會在最小修補已足夠時仍重組周邊代碼(§3.3, p.8, Table 1)。\n- **RQ1／頻率：人類比代理更常做糾纏式重構**：以 Tangled Refactoring Ratio 衡量，36.72% 的人類補丁（128 個中有 47 個）含至少一個糾纏式重構，代理補丁僅 21.43%（3,691 個中有 791 個）。顯示人類開發者在解決具體議題時更傾向順手改善代碼結構(§4.1.2, p.9, Table 2)。\n- **RQ1／密度：人類比代理更密集地重構**：Tangled Refactoring Density 上，人類補丁平均每個 1.75 個重構操作，代理補丁僅 0.66；作者指出並非所有代理補丁都成功解決議題，暗示代理相較人類可能「重構不足」，這也成為 RQ2 探討的動機(§4.1.2, p.10, Table 2)。\n- **RQ1／多樣性：代理重構類型更廣但由框架主導**：代理補丁覆蓋 73 種獨特重構類型，遠多於人類的 46 種；但此多樣性主要由代理框架而非基礎 LLM 決定——SWE-agent 一家就覆蓋全部 73 種，Agentless 僅 35 種、OpenHands 僅 36 種（皆低於人類 46 種）。作者解釋：自主性高、約束少的開放式框架（SWE-agent、OpenHands 採多輪互動沙箱）會探索更廣的重構操作，而工作流程式、預定義子任務管線的框架（Agentless）則把改動限縮得更局部、更聚焦(§4.1.2, p.10–12, Table 2, Fig.3)。\n- **RQ1／框架與 LLM 的橫向差異**：框架層面，OpenHands 糾纏式重構占比最低（14.68%），SWE-agent 與 Agentless 分別為 25.85%、22.04%；密度上 SWE-agent 最高（1.19）、Agentless 0.38、OpenHands 最低（0.26）。LLM 層面，Gemini-2.5-Pro（28.78%）與 Claude-3.5-Sonnet（28.48%）糾纏式重構占比最高，但即便最先進的 LLM 仍低於人類的 36.72%；Doubao-1.5-pro 占比最低（11.46%）且僅 12 種類型，其推理版 Doubao-1.5-thinking 卻高達 24.92% 且密度最高（1.12），顯示同供應商不同模型行為差異甚大；只有 Claude-3.5-Sonnet（50 種）與 Doubao-1.5-thinking（49 種）的類型多樣性超過人類的 46 種(§4.1.2, p.9–12, Table 2, Fig.4)。\n- **RQ1／操作層級的代理 vs 人類質性差異**：代理重構由輕量、表達式層級的轉換主導，最常見為 Extract Variable（廣泛用於簡化複雜表達式、提升可讀性），其次為 Add Parameter（為既有方法增加輸入以支援功能改動）；SWE-agent 另較常用 Move Class 改善模組化。人類則呈現不同模式，最常用的糾纏式重構是方法層級的 Extract Method（18 個補丁），超過 Extract Variable（11 個補丁），顯示人類更重視方法層級的分解、可讀性與可維護性(§4.1.2, p.11–12, Fig.3, Fig.4, RQ1 Summary)。\n- **RQ2／模型擬合度**：4 個邏輯迴歸模型的 Adjusted McFadden pseudo-R² 分別為 0.310（Refactoring Presence→Correctness）、0.181（Presence→Compilability）、0.323（Action & Scope→Correctness）、0.193（Action & Scope→Compilability）；Compilability 的擬合度較低屬預期，因可編譯性更受建置系統、依賴、環境配置等未納入預測子的因素影響，但 0.18~0.19 在實證軟工研究中仍屬可接受(§4.2.2, p.14)。\n- **RQ2／重構存在 vs 可編譯性：顯著負相關**：糾纏式重構的存在與成功編譯顯著負相關，OR=0.42、p=1.76e-18，即在控制任務／代理／補丁層級因素後，成功編譯的勝算約下降 58%(§4.2.2, p.14–15, Table 4)。\n- **RQ2／重構存在 vs 議題解決：無顯著關聯**：重構存在對 Correctness 無統計顯著效應（OR=1.09、p=0.543），即夾帶糾纏式重構與「成功解決議題」之間無顯著關聯——重構並未帶來功能正確性上的好處(§4.2.2, p.15, Table 4, RQ2 Summary)。\n- **RQ2／重構動作維度的異質效應**：移除型重構（`has_remove`，含 Remove Parameter、Remove Method Annotation 等）與 Correctness（OR=4.56、p=0.002）及 Compilability（OR=2.50、p=0.006）皆顯著正相關，顯示消除不必要或有問題的代碼能提升代理效能；調整型重構（`has_adjust`，如 Rename Variable、Extract Method）與 Compilability 呈負向（OR=0.55、p=0.069），惟未達 0.05 顯著水準；新增型重構（`has_add`）對兩依變數皆不顯著(§4.2.2, p.15, Table 4)。\n- **RQ2／重構範疇維度——方法層級重構危害最大**：方法層級重構（`has_method`）與 Correctness（OR=0.22、p=0.003）及 Compilability（OR=0.23、p=4.59e-06）皆顯著負相關，是降低代理效能的一致來源；類別層級（`has_class`）與區域變數層級（`has_local_variable`）則無統計顯著效應（p>0.05）。整體結論：方法層級糾纏式重構一致地與效能下降相關，移除型重構則傾向提升效能(§4.2.2, p.15, Table 4, RQ2 Summary)。\n- **RQ2／方法層級危害的案例佐證**：以 jackson-databind#3814（fasterxml__jackson-databind-3860）為案例——34 個有效代理補丁中 24 個編譯成功、22 個通過全部測試；正確補丁高度一致地新增 `convert(JsonNode, DeserializationContext, T)` 與覆寫 `deserialize` 方法、且不含 RefactoringMiner 可偵測的重構操作。失敗補丁（如 Agentless+Qwen2.5-72B）則引入兩個方法層級重構：Add Parameter（為既有 `deserialize` 加 `intoValue` 參數）與 Extract Method（把轉換邏輯抽到新 `convert` 方法），改動了繼承所需的方法簽名而非新增有效的覆寫，違反 Java 型別系統的 `@Override` 契約，觸發「沒有覆寫抽象方法」的編譯錯誤——具體解釋了為何 `has_method` 與編譯成功強烈負相關(§5.1, p.19–21)。\n- **RQ3／重構評估揭示不必要或不安全重構的普遍度**：對含至少一個糾纏式重構的 791 個代理補丁做評估。DeepSeek-V3.2 處理 787 個補丁（4 個因超出上下文窗口排除）、評估 1,812 個重構：必要且安全 583 個（32.17%，KEEP）、必要但不安全 396 個（21.85%，FIX）、不必要但安全 209 個（11.53%，REMOVE）、不必要且不安全 624 個（34.44%，REMOVE）。Gemini-2.5-Pro 評估 2,366 個重構：35.29% KEEP、6.51% FIX、17.24% 不必要但安全 REMOVE、40.96% 不必要且不安全 REMOVE。最大類別皆為「不必要且不安全」（34.44%／40.96%），顯示大量重構既與議題無關又被錯誤實作，對代理效能不利(§4.3.2, p.17–18, Table 5)。\n- **RQ3／需精煉補丁的比例**：補丁層級上，DeepSeek-V3.2 評估的 787 個補丁中 561 個（71.28%）至少含一個不必要或不安全重構而需精煉，僅 226 個（28.72%）全由必要且安全重構構成；Gemini-2.5-Pro 較保守，399 個（50.44%）需精煉、392 個（49.56%）可原樣保留。即 50.44~71.28% 的代理補丁含不必要或潛在有害的糾纏式重構，與 RQ2 的負相關發現一致(§4.3.2, p.18；RQ3 Summary, p.19)。\n- **RQ3／RefUntangle 提升可編譯性的成效**：以 DeepSeek-V3.2 為精煉模型，476 個被精煉補丁的編譯成功率從 19.75%（94/476）升到 29.62%（141/476），相對提升約 50%；以 Gemini-2.5-Pro 精煉的 370 個補丁，編譯成功率從 18.92%（70/370）升到 47.03%（174/370），相對提升 149%。F2S（失敗轉成功）分別有 53 個（11.13%）與 110 個（29.73%），S2F（成功轉失敗的回退）僅 6 個（1.26%）與 6 個（1.62%），改善在三個代理框架上一致出現；更強的基礎模型帶來更大增益，顯示 RefUntangle 成效隨底層模型能力增強而提升(§4.3.2, p.18–19, Table 6)。\n- **RQ3／RefUntangle 對功能正確性的成效**：DeepSeek-V3.2 精煉使 6 個（1.26%）先前未解決的補丁得以通過全部測試，Gemini-2.5-Pro 精煉使 16 個（4.32%）先前未解決補丁通過——平均約 2.79% 先前未解決補丁因精煉而通過全部測試；雖增益較可編譯性的改善溫和，仍顯示修正有問題的糾纏式重構在某些情況可直接促成議題解決(§4.3.2, p.18–19；§1, p.4；RQ3 Summary, p.19)。\n- **RQ3／端到端案例佐證**：以 google/gson#1553（google__gson-1555）為案例——SWE-agent+GPT-4o 的補丁正確引入 `nullSafe` 參數與條件式 null 處理，但也夾帶兩個重構：Add Parameter（直接把 `TreeTypeAdapter` 建構子由 5 參數擴成 6 參數，而非如黃金補丁新增向後相容的建構子重載）與一個錯誤的 Move Class（用無關測試類別 `NullSafeTest` 的內容取代了檔案開頭的版權標頭與 package 宣告，造成命名衝突與結構損毀、編譯失敗）。RefUntangle 評估時把 Move Class 判為「不必要且不安全」→ REMOVE、把 Add Parameter 判為「必要但不安全」→ FIX；精煉階段移除被測試代碼污染的檔案標頭、還原版權與 package 宣告，並判定 Add Parameter 本身功能上正確而予以保留，精煉後補丁成功編譯並通過 Gson 全部測試。此例展示「功能上正確的修補因夾帶不必要重構而失效」的常見失敗模式(§5.2, p.21–23)。\n- **三類實務啟示**：(1) 對代理框架設計者——自主性高的框架（SWE-agent）引入較多糾纏式重構，管線式框架（Agentless）能把補丁限縮得更聚焦，故框架架構應被視為影響補丁正確性與結構品質的關鍵因素；可考慮的機制包括「除非議題明確要求否則限制大規模重構」「對照繼承階層與介面契約驗證方法簽名改動」「把重構轉換與 bug 修補分成可獨立驗證的階段」(§5.3, p.23–24)。(2) 對 LLM 供應商——代理常隱含複製訓練資料中的重構模式，卻缺乏判斷該重構在特定情境是否必要、安全的脈絡推理；這些失敗模式類似真實 commit 中重構常與 bug 修補糾纏的現象，暗示 LLM 可能習得了不良維護模式，建議供應商研究「把重構改動從 bug 修補 commit 解纏」等訓練資料策展策略(§5.3, p.24)。(3) 對採用代理的實務工作者——生成補丁常含不必要或不安全重構，使用者應仔細檢查結構性改動（尤其方法層級與簽名變更）是否真為解決議題所需；建議把 bug 修補邏輯與重構活動明確分離、在功能修補正確性確認後才引入重構；程式碼審查上，審查者應明確核驗是否存在方法層級／簽名變更重構、以及這些改動是否確實必要(§5.3, p.24)。\n- **作者自陳的限制（Threats to Validity）**：建構效度——遵循 Multi-SWE-bench 官方評估，但 Java 子集 128 個人類黃金補丁中有 17 個未通過基準自身的測試套件，顯示基準測試可能不完整或不一致，使 Correctness 變數帶噪、降低迴歸可靠度（作者已人工檢視並向官方回報）；且 RefactoringMiner 雖屬最準確的 Java 重構工具，仍可能有偽陽性或漏檢，影響重構變數精確度。內部效度——迴歸模型 pseudo-R² 介於 0.19（可編譯性）至 0.32（議題解決），專案特定編碼慣例、測試套件嚴謹度、修補複雜度等未觀測混淆因子仍可能影響關係；RQ3 的重構評估倚賴 LLM 判斷必要性與安全性，此判斷本質上主觀且情境依賴，作者未以大規模人工標註獨立驗證 LLM 評估，僅以結構化提示與多 LLM 分析緩解。外部效度——研究僅限 Java 專案（因 RefactoringMiner 只完整支援 Java），結論未必能推廣到動態型別等其他語言；且僅基於單一基準（Multi-SWE-bench）、3 個代理框架、12 個基礎模型，未必能推廣到其他基準、代理架構或真實部署環境(§6, p.24–25)。\n\n---\n\n### 7. AOCI：符號-語意索引協定 — 為 LLM 提供穩定、可增量維護的儲存庫級「檔案意圖層」表徵\n*Liu et al. 2026, arXiv:2605.02421（星雲智學（北京）科技有限公司；北京大學新媒體學院 AI 應用與創新實驗室）*\n\n![b1-scope](images/b1-scope.jpg)\n\n\n**範圍提醒**：AOCI（AI-Oriented Code Indexing）是一套**儲存庫索引／上下文表徵協定**，而非自行修改程式碼的 agent。它生成的是一份「在任何任務之前先讀一次、隨程式碼演進增量更新」的結構化系統藍圖，定位為 agent 流水線「底下」的全域上下文層；論文明確主張 AOCI 「不是更好的檢索演算法、也不是更聰明的 agent，而是這個層本身」(Liu et al. 2026, §6, p.9)。因此就「LLM 對大型代碼庫進行修改與維護」這一主題而言，AOCI 的關聯在於：它是 agent 進行修改前的上下文供給機制，工業基準中亦以「end-to-end 開發任務」直接驗證其對修改成效的影響；其侷限在於索引粒度止於檔案級（單檔內含多種行為的方法不被細分），且本身不執行程式碼變更，仍需 agent／開發者完成實作。\n\n**定位**：\n- 論文針對的問題是：當儲存庫超過數十萬行程式碼時，現有方法（檢索、摘要、agent 探索）都「在查詢時臨時組裝上下文」，每次執行得到的視角都不同，所留下的系統理解是臨時且非系統化的（ad-hoc）(Liu et al. 2026, Abstract, p.1；§1, p.2)。\n- 作者觀察到「即使把 fits-the-next-prompt 的問題（壓縮什麼進 prompt）解決了，真正的問題是 LLM 如何在多次執行之間保持對系統完整且準確的理解」(Liu et al. 2026, §1, p.2)。\n- 相對既有工作的新意：AOCI 提供一個**同時具備跨執行穩定、全域完整、可增量維護**三項性質的表徵——作者以 Table 1 主張先前在檢索、迭代式 RAG、儲存庫結構組合、圖式表徵上的工作各推進了某些維度，但「§2.2 所指出的檔案級意圖層仍空缺」(Liu et al. 2026, §2.3, p.4)。\n- 論文自我定位為三項貢獻：(1) Protocol — 一套 LLM 可無歧義解析的符號-語意索引協定；(2) Platform — 維持索引與程式碼同步的 AOCI Platform，已用於作者的生產系統；(3) Evidence — 2,160 次學術評估、19 個工業 end-to-end 任務、隔離各編碼成分的消融、以及對公開儲存庫預訓練污染的明確緩解 (Liu et al. 2026, §2.2, p.3)。\n\n\n![b1-method](images/b1-method.jpg)\n\n**做法**：\n- **問題動機（為何更大上下文窗口無法解決）**：作者引用 Context Rot 現象——輸入長度增加時模型表現「退化而非改善」，並引 SWE-bench 觀察將上下文預算從 13K 拉到 50K token 反而使 Claude 2 的解決率從 1.96% 降到 1.22%；同時指出真實儲存庫多為低熵內容（import、樣板、格式、型別註記），高熵的架構資訊（哪個模組負責什麼、模組如何互相依賴、什麼設計決策約束實作）散落於檔案間且從未明寫，導致位置衰減與程式碼幻覺 (Liu et al. 2026, §2.1, p.2)。\n- **核心缺口「檔案級意圖層」**：現有軟體文件只有兩級——函式級（註解、API 描述）與專案級（設計文件、架構概覽）；中間缺少一個結構化表徵，刻畫每個檔案的業務意圖、關鍵依賴、重要性與在架構中的位置。作者主張此層被人類開發者用「在腦中累積數月的心智模型 + IDE 導航 + 隨需除錯」填補，過去「被理性地略過」，但 AI 時代受眾從人轉為 LLM（無跨會話記憶），維護者亦轉為 LLM 本身，故此層必須被顯式化 (Liu et al. 2026, §2.2, p.3）。\n- **協定三項約束**：檔案級意圖層須滿足 (a) 固定編碼協定（LLM 可無歧義解析）、(b) 高密度語意元素（傳達業務邏輯而不注入原始程式碼）、(c) 條目級獨立（每檔表徵可被新增／更新／取代而不影響其他條目）(Liu et al. 2026, §2.2, p.3；§3, p.4)。\n- **AOCI 索引整體結構**：一份 AOCI 索引由一個 **header section**（宣告專案級架構概覽、技術棧、所有後續條目共用的標籤分類法；因各專案有自己的業務詞彙，header 為每專案自訂）加上一序列 **per-file entries** 組成；整份索引僅數百行即可描述整個儲存庫，條目彼此獨立 (Liu et al. 2026, §2.2, p.3；§3.1, p.4)。\n- **雙層編碼設計（離散標籤層 + 連續語意層）**：每個 per-file 條目統一為單行純文字格式 `filename[ABCDE-tag]: F:function | R:relations | A:API | S:synopsis`——方括號內是離散標籤層、冒號後是連續語意層（四元素以豎線分隔）。此單行格式讓 Transformer 在逐 token 處理時，先經由檔名與標籤錨點建立結構座標，再經語意元素取得業務內容 (Liu et al. 2026, §3.1, p.4-5)。\n- **離散標籤層的五個正交維度**：\n  - 維度 A — 標記縱向架構層（如 handler、service、DAO、model、middleware、router），給出分層系統視角；\n  - 維度 B — 標記業務模組，在領域空間做橫向切分；\n  - 維度 C — 以六級非均勻量表（9, 8, 7, 5, 3, 1）編碼檔案重要性，刻意在核心檔案間保留更細的區分、對邊緣檔案壓縮；\n  - 維度 D — 選擇性記錄技術特徵（如 JWT、RBAC、交易、加密）；\n  - 維度 E — 以四級量表標記程式碼規模。\n  五維串接成緊湊標籤字串，例如 `WA9JM` 表示驗證模組中、帶 JWT 相關特徵的中型核心 middleware 檔 (Liu et al. 2026, §3.1, p.4)。\n- **連續語意層的四個元素**：F（summary，總結檔案業務角色，補上傳統文件缺的檔案級意圖）；R（relations，列出主要相關檔案以捕捉依賴）；A（API，記錄對外暴露的 API／介面）；S（synopsis，把高熵實作細節壓縮成密集關鍵詞，保留如限流、fallback 邏輯、加密方案等設計決策）。核心檔案 F/R/A/S 合計通常 <200 token、邊緣檔案壓縮到 <50 token (Liu et al. 2026, §3.1, p.5)。\n- **header 字典的長度預算範例**：以 AOCI Platform 後端為例，A 維度字典含 Handler/Service/Repository/Model/Middleware/Router，B 維度字典用 30+ 個業務模組碼（Core/Auth/Org/Role/Credits 等）；header 進一步規定按重要性縮放的長度預算——C=9 檔分配 80–150 token，C≤3 檔壓縮到 20–40 token (Liu et al. 2026, §3.1, p.4)。\n- **資料庫 schema 索引（四維標籤）**：AOCI 將編碼方案延伸到資料層，為每張表生成 `table_name[domain-table_type-scale_estimate-features]: field-level description`——domain 標記功能領域（user、points、indexing、auditing）、table_type 區分主表／關聯表／日誌表／設定表、scale_estimate 按預期資料量分級給模型規模先驗、features 記錄 JSONB 欄位／唯一約束／軟刪除／外鍵／GUID 識別等結構屬性；範例 `users[U-M-M-GUID]` 以 dash 分隔逐維解碼 (Liu et al. 2026, §3.2, p.5)。\n- **檔案級獨立與 O(1) 增量維護**：每個 AOCI 條目只依賴自身原始碼、不引用其他條目；檔案間依賴以 R 元素內的「檔名引用」捕捉，而非把其他條目內容嵌進來。因此 k 個檔案被改動時只需重生對應的 k 個條目，與儲存庫總規模無關（O(1) per changed file），未變更檔案的條目仍有效；全域依賴在執行期由 Transformer 自注意力依 R 線索重建，免去預算的靜態圖（但需精確 call-chain 追蹤的任務仍須回原始碼）(Liu et al. 2026, §3.3, p.5)。\n- **AOCI Platform 與 index-first 工作流**：Platform 架在協定之上，負責索引生成、一致性檢查、版本管理，使穩定層在真實系統的生命週期內可維護；一個關鍵性質是「LLM 可自行生成索引」，無需人工從零撰寫。索引流水線分四階段（Figure 1）：Stage 1 程式碼取得（GitHub sync + filter rules）、Stage 2 LLM 驅動逐檔生成（單檔獨立、O(1)，同時產出 ABCDE 離散標籤、FRAS 語意元素、三維資料庫 schema 標籤）、Stage 3 一致性檢查（格式 + 標籤 + 引用 + 覆蓋率）、Stage 4 快照封存（header 規格 + 索引條目 + 純文字快照，輸入 LLM 上下文窗口）(Liu et al. 2026, §2.2, p.3；§3, p.4；Figure 1, p.3)。\n- **index-first 開發工作流（Figure 2）**：流程為——開發者以自然語言陳述需求 → LLM 學習 AOCI 協定與既有索引範例 → LLM 生成完整系統索引（藍圖，規劃模組、檔案職責、依賴）→ 開發者在「索引層」審查架構（審查數百行索引而非數千行程式碼，零程式設計即可判斷模組是否劃分得當；不滿意則回到生成步驟）→ 核可後 LLM 逐檔生成程式碼、每檔受對應索引條目約束 → 功能驗證與部署 → 生產運行 → 程式碼變更時只重生改動檔的索引條目（O(1) 維護）。索引始終是系統的「single source of truth」(Liu et al. 2026, §3, p.4；Figure 2, p.4)。\n- **學術基準的建構與設定**：定義六個上下文條件（Table 3）——A=AOCI 索引（純文字注入）、B=RepoMap（tree-sitter 語法骨架）、C=Hierarchical Summary（分層彙整檔案級 NL 摘要）、D=Raw Code（按檔案大小排序注入至多 200K token 的長上下文基準，200K 設定取 25–40% 原始碼覆蓋且仍低於表現退化閾值）、E1=BM25 稀疏檢索 Top-K（隨需取得）、E2=Oracle Upper Bound（直接取用與標準答案相關的檔案，理論上界）。四個測試專案採雙選策略：P1 ai-xingyuncl、P2 edu-pkuailab 為內部生產系統並經 SonarQube 標準化工程驗證，P3 dory、P4 koalaqa 為外部 GitHub 專案以涵蓋技術棧多樣性並篩查預訓練污染。每專案配 30 道架構理解題（依 SWE-QA 框架，合併 Why 入 How，分 Where／What／How 三類），3 個 LLM × 4 專案 × 30 題 = 2,160 次模型呼叫 (Liu et al. 2026, §4.1–4.2, p.5-6；Table 2, p.6；Table 3, p.7)。\n- **題目設計與評分**：Where 用實作檔路徑、What 用依賴枚舉、How 用跨多檔機制觸發的完整流程；標準答案皆源自實際原始碼、以 server-side grep 驗證且不依賴任何索引表徵；What/How 至少涉及兩個來源檔，Where 須超越檔名推斷的跨檔推理。評分依類別：Where 用 exact path matching、What 用 F1（precision/recall 調和平均）、How 用 LLM-as-Judge（Claude Opus 4.6 給 1–5 分），且 judge 與被評模型盡量分屬不同家族以降低自我偏好 (Liu et al. 2026, §4.1, p.6)。\n- **消融研究設計（Table 4）**：在 P1 上以同一組 30 題、同一評分協定，逐次改動一個編碼成分而固定其他，3 個模型 → 540 次比較評估。七個變體：Original AOCI（基準）、wo-ABCDE（移除整個離散標籤層，保留 FRAS）、wo-ABCD（只留 E 維度，測「規模」單獨能否承載信號；對原本就無 E 維度的 8 個條目視為零值處理）、NL-rewrite（把整份索引重寫成連貫自然語言段落以隔離結構化 vs 自由文字的影響）、wo-R（移除依賴關係元素）、wo-S（移除高熵設計決策元素）、wo-FRAS（移除整個連續語意層、只留標籤）(Liu et al. 2026, §4.2, p.6；Table 4, p.7)。\n- **工業基準的建構與設定**：五個工業系統（Table 5）——S1=AI Practice Platform（Node.js+React, 148K LoC）、S2=AI Education Platform（Go+Gin+Vue 3, 82K）、S3=TE-DNA 2.0（Go+React, 56K）、S4=LegalMind（Go+React 19+TS, 42K）、S5=AI Hedge Fund Pro（Go+React+TS, 39K），S1/S2 同一 operator、S2 經歷自身技術棧遷移（Node.js→Go+Gin+Vue 3，3–4 天，以 AOCI 索引作為跨語言邊界的架構錨）。共 19 個 end-to-end 開發任務（各 operator 負載 6、7、3、3）。AOCI 與三個主流 agent 工具（Claude Code、Cursor、OpenCode）對照，全部以 Claude Sonnet 4.6 為底層模型，唯一變因是上下文取得策略：AOCI 用預先算好的結構化索引，三個 agent 工具在預設工具設定下以執行期動態探索取得上下文；每個任務由同一 operator 在四種設定下各做一次 (Liu et al. 2026, §4.3, p.6；Table 5, p.8)。\n- **公正性與污染緩解措施**：為避免評估偏差，工業基準的缺陷判定交由獨立的裁決流水線——以 Claude Opus 4.6 預載完整系統索引、在不參與任務執行的獨立會話中檢視各設定的最終狀態程式碼；主實驗用 temperature=0.1 的單樣本評估。針對公開儲存庫的預訓練污染，P3/P4 經篩查、§7 另作預篩與事後檢查（但作者承認更徹底的排除需非公開閉源測試集）(Liu et al. 2026, §4.1, p.6；§4.3, p.6；§7, p.9)。\n\n\n![b1-findings](images/b1-findings.jpg)\n\n\n**核心發現**：\n- **RQ1 — 檔案定位接近 Oracle 上界**：在 Where（檔案定位）任務上，AOCI 跨專案平均 97.67%，僅低於 Oracle 上界 E2（98.33%）0.66 個百分點，且高出所有可部署基準 31 個百分點以上；作者據此論證 AOCI 的結構化表徵已含足夠資訊讓 LLM 找對檔案，「檔案級意圖層的問題已被解決」(Liu et al. 2026, §5.1, p.7)。\n- **RQ1 — What 任務優勢收窄、P3 出現反轉**：在依賴枚舉（What）任務上 AOCI 跨專案平均 F1 = 45.65%，僅比條件 D（Raw 200K）高 7.24 個百分點，比 Where 上的差距明顯縮小；在 P3 dory（AI 驅動的 SQL 工作區，What 題常需逐字列舉 SQL 欄位等識別字）上條件 D 反而領先 AOCI 10.52 個百分點。原因是 AOCI 的語意壓縮會「聚合而非逐字保留」識別字，這標記出此取捨的所在：跨檔依賴被良好捕捉，但逐識別字枚舉是有損的 (Liu et al. 2026, §5.1, p.7)。\n- **RQ1 — 整體分數與 token 取捨**：AOCI 整體（Overall）65.00%，使用 1.48M token，在全部六條件中整體準確度排第二、僅次於 Oracle，且一致勝過每一個可部署基準。相對 Raw 程式碼注入條件 D，AOCI 在 12 個任務上引入缺陷，而 AOCI 以 20.25% 的 token 預算達到 1.71× 的分數；剩餘對 Oracle 的差距集中在 What 與 How。此準確度具決定性——同一索引每次執行給出相同結果 (Liu et al. 2026, §5.1, p.7；Table 6, p.8)。\n- **RQ1 — 跨模型平均分數明細（Table 6，A 欄為 AOCI）**：P1 ai-xingyuncl 71.07、P2 edu-pkuailab 70.11、P3 dory 53.53、P4 koalaqa 65.26，四專案平均 65.00；對照各基準四專案平均：D（Raw 200K）37.95、E1（BM25）34.42、B（RepoMap）34.90、C（NL Summary）35.63、E2（Oracle）90.06。AOCI 全面領先所有可部署基準近一倍，但與 Oracle 仍有約 25 個百分點差距 (Liu et al. 2026, Table 6, p.8)。\n- **RQ2 — 工業基準零最終缺陷 vs agent 工具 39 個缺陷**：19 個 end-to-end 任務上 AOCI 引入零最終狀態缺陷；三個 agent 工具在 12 個任務中引入缺陷、合計 39 個（Claude Code 8、Cursor 9、OpenCode 19，其中 OpenCode 另含 6 功能省略與 5 程式碼殘留）。Fisher exact test 對任務級缺陷出現率 p < 0.001 (Liu et al. 2026, §5.2, p.8；Table 7, p.8)。\n- **RQ2 — 39 個缺陷的四類聚類（隨技術棧重現）**：作者強調這些缺陷非隨機，而是隨技術棧聚成四類——(1) 多路徑查詢省略：S1（Node.js）三個 agent 都只找到 4 個 SQL 查詢中的 2 個、S2（Go）兩個 agent 漏掉 4 個 SELECT 共用的同一新欄位（同一錯誤型態跨兩語言獨立重現）；(2) 跨模組刷新省略：S1 中 agent 改了資料來源卻未傳播到依賴視圖，使用者看到過時計數；(3) 介面契約臆測：S3 中兩個 agent 各自把後端預期物件陣列的 API 參數定為 `string[]`，權限變更靜默失敗；(4) Schema 不相容：S3 中一 agent 產生引用不存在欄位的 INSERT（部署崩潰）、另一 agent 建了平行表（資料分裂）。作者主張這些是「在沒有全域地圖時於執行期探索儲存庫的後果」，而 AOCI 因地圖在任務開始前已存在故得以避免 (Liu et al. 2026, §5.2, p.8)。\n- **RQ2 — token 成本優勢隨任務複雜度放大**：跨 19 任務 AOCI 共用 4.29M token，Claude Code 41.49M、Cursor 50.77M、OpenCode 47.38M；per-task token 比值從 4× 到 130×。隨複雜度四級遞增：簡單單檔變更 9.4×、中型任務 11.1×、跨模組任務 30.7×、schema-sensitive 操作 64×；S3 七個任務最高達 130×，S4 在一個需同時理解兩個前置任務輸出的任務上達 129×。原因是 agent 探索成本隨任務觸及的檔案與依賴數成長，而 AOCI 索引成本固定 (Liu et al. 2026, §5.2, p.8；Table 7, p.8)。\n- **RQ2 — 全域上下文也防止架構債與跨任務回歸**：agent 工具除功能缺陷外另引入兩類「全域視角本可預防」的問題——架構債：S2 中一 agent 因誤判既有欄位的設計意圖而新增語意冗餘的資料庫欄位，造成永久 schema 不一致；跨任務回歸：S4 中兩個 agent 改了前一任務剛改過的中央路由檔、靜默丟棄前次的全部參數變更、回退了七個 handler 建構子簽名。AOCI 因索引記錄檔案級 schema、設計意圖與前置任務結果而避免 (Liu et al. 2026, §5.2, p.8)。\n- **RQ2 — 總時間與輪數對照**：S1–S2 上 AOCI 總耗時 15 分 50 秒、總輪數 13；Claude Code 21 分 46 秒／162 輪、Cursor 25 分 50 秒／205 輪、OpenCode 27 分 40 秒／199 輪。成本（依 Sonnet 4.6 公開定價換算）AOCI 約 9 美元以下、Claude Code 約 133、Cursor 約 164、OpenCode 約 152 美元 (Liu et al. 2026, Table 7, p.8)。\n- **RQ3 消融 — S 元素承載最關鍵資訊**：移除 S（wo-S）使 Overall 從 73.52% 掉到 53.45%（Δ = −20.07，Wilcoxon p < 0.001），其中 How 分數從 74.67% 崩到 41.33%，為單成分最大降幅；S 正是限流策略、fallback 機制、加密方案、交易程序這些高熵設計決策的所在，而語法萃取與 NL 摘要都不保留這些 (Liu et al. 2026, §5.3, p.9；Table 8, p.9)。進一步把 F、R、A 也移除（wo-FRAS）使 Overall 降到 35.66%，接近 P1 上的 Raw 條件 D（26.98%）(Liu et al. 2026, §5.3, p.9)。\n- **RQ3 消融 — 結構化編碼比等量自然語言更省 token**：NL-rewrite 變體把整份 AOCI 索引轉成 100% 識別字保留的連貫段落，Overall 掉到 67.96%（Δ = −5.56，Wilcoxon p = 0.026，未通過 Bonferroni 校正閾值 α = 0.00833），但 per-question token 增加 31.2%；重寫文字長 49.8%，故 token 開銷是一個 confound——自然語言形式在更高 token 成本下三個維度分數皆較低 (Liu et al. 2026, §5.3, p.9；Table 8, p.9)。\n- **RQ3 消融 — R 元素對依賴枚舉有強烈、維度特定的效果**：移除 R（wo-R）使 Overall 從 73.52% 降到 65.78%（Wilcoxon p = 0.002，通過 Bonferroni 閾值），效果集中在 What——What 從 45.88% 掉到 25.35%，而 Where 維持 100.00%、How 僅微降 (Liu et al. 2026, §5.3, p.9；Table 8, p.9)。\n- **RQ3 消融 — 離散標籤層不帶來一致的整體增益、且具模型異質性**：移除 ABCDE 標籤層（wo-ABCDE）使 Overall 幾乎不變（73.52%→73.78%，Wilcoxon p = 0.500），但此聚合值掩蓋了跨模型方向性差異——分模型檢定顯示對 Sonnet 為正效果、對 GPT 為負效果、對 Gemini 無顯著效果（p = 0.016、0.010、0.965）。作者解釋 QA 基準用 Where/What/How 衡量架構理解，而標籤層是為架構層導航、重要性排序、增量維護路由這些「在 QA 量測範圍外」的功能設計，這些功能在 §5.2 的 end-to-end 開發中才被真正運用（含標籤的完整 AOCI 索引在 19 任務中產生零缺陷）(Liu et al. 2026, §5.3, p.9；Table 8, p.9)。\n- **三條部署經驗教訓**：作者自陳八個月部署得出——(1) 穩定的儲存庫視圖比更大上下文窗口更重要，跨執行重用的同一索引消除了 agent 工具呈現的 run-to-run 變異；(2) AOCI 與 agent 工具運作在不同層、不應正面對打，自然的下一步是把 AOCI 用作 agent 流水線底下的全域上下文層；(3) 增量維護的平台支援不是可選項——沒有自動生成、一致性檢查與版本管理，索引與程式碼分歧會侵蝕整個方法的穩定性 (Liu et al. 2026, §6, p.9)。\n- **作者自陳的限制（§7 Threats to Validity 與 §8）**：(1) LLM-as-Judge 用 Claude Opus 4.6 評 How、與被評的 Claude Sonnet 4.6 同家族，可能有自我偏好偏差——緩解上以人工評分對齊（P1 條件 A 十題 How，8/10 完全一致、10/10 在一分內，Spearman ρ = 0.90, p < 0.001）；(2) 工業基準非盲執行，執行四設定對照的 operator 即作者團隊成員，故缺陷判定外包給獨立 Opus 4.6 裁決流水線；(3) 公開儲存庫預訓練污染僅以預篩與事後檢查降低、未徹底排除，更徹底須非公開閉源測試集；作者另把 AOCI 套用到大型開源 TypeScript 專案 OpenClaw、以 AOCI 引導的開發向上游提交並通過 CI 與維護者審查作為部分外推佐證；(4) token 計數方法不對等——AOCI 由對話結構估算、agent 工具用精確 API 呼叫日誌，但 4×–130× 的大比值足以使比較結論穩健；(5) 評估專案集中於 Web 技術棧（Node.js、Go、TypeScript）與前後端場景，非 Web 技術棧的外推留待未來；(6) **檔案級索引粒度可能不足**——當單一檔案含行為分歧的多個方法時，作者建議方法級或更細粒度索引作為未來延伸；(7) 單專案消融——RQ3 消融僅在 P1 上做 (Liu et al. 2026, §7, p.9；§8, p.10)。\n- **可重現性與利益揭露**：完整 artifact 套件於 Zenodo（doi.org/10.5281/zenodo.19677251），含實驗資料與評分腳本、五個工業系統的完整 AOCI 索引快照（約 1,276 個條目壓縮逾 370K LOC）、各系統 ABCDE/FRAS 標籤字典；部分原始工業原始碼因保密無法釋出。S1、S2、S3 在生產中，S2 服務逾 100,000 註冊使用者，S1/S2 經八個月持續開發維持 SonarQube Quad-A（0 bug、0 漏洞、累計 1,134 自動化測試通過）。作者已就 AOCI 協定向中國國家知識產權局提出專利申請，AOCI Platform 由星雲智學（北京）科技開發維護 (Liu et al. 2026, §5.2, p.8；§8 Data Availability / Competing Interests, p.10)。\n\n---\n\n### 8. 脈絡壓縮於儲存庫級任務 — 首個針對代碼 LLM 的脈絡壓縮系統性實證研究\n*Feng et al. 2026, arXiv:2604.13725（哈爾濱工業大學（深圳）、香港中文大學、武漢大學）*\n\n\n**範圍提醒**：本文研究的是「脈絡壓縮（context compression）」——把跨檔案、長篇的儲存庫脈絡濃縮成緊湊代理表徵後再餵給下游 LLM。其直接目標是推論效率（降低延遲、記憶體、API 成本）與避免脈絡截斷／「迷失於中段」雜訊。它與「修改、維護大型代碼庫」屬**間接相關**：論文評測的任務是代碼補全（code completion）與代碼生成（code generation），而非 bug 修復、重構或 PR 級變更；但其結論構成代碼庫維護自動化的**前置條件**——亦即當儲存庫脈絡超出脈絡窗時，如何在不損及（甚至提升）任務表現的前提下壓縮脈絡。論文本身亦坦言這些範式「主要在 NLP 基準上以方法特定設定被研究」，遷移到代碼任務仍是開放問題；故其對代碼庫維護的價值在於「擴展性與部署成本」面向，而非直接示範維護案例 (Feng et al. 2026, §1, p.1–2；§2.2, p.3)。\n\n**定位**：論文指出儲存庫級代碼智能任務（跨檔案補全、專案感知生成、代碼庫問答）需處理橫跨 API 定義、相依檔案與歷史實作的長篇、多檔、異質脈絡，因而出現三大實務瓶頸——自注意力的二次方複雜度使推論成本與延遲隨脈絡長度急速上升、關鍵證據常被周邊雜訊掩蓋（「迷失於中段」）、以及有限脈絡窗導致截斷 (Feng et al. 2026, §1, p.1)。脈絡壓縮在 NLP 已受相當關注，但「對代碼任務的適用性大致仍未被探索」；且代碼相較自然語言具有更密集的語義相依、更嚴格的語法結構、更低的訊息對雜訊比，使激進過濾的風險更高 (Feng et al. 2026, §1, p.1；§2.2, p.3)。論文自我定位為**據作者所知第一個**針對儲存庫級代碼智能的脈絡壓縮系統性實證研究，貢獻有三：(1) 建立涵蓋三範式、八個代表性方法、跨多個模型規模的統一評估；(2) 揭示潛向量壓縮可**超越**全脈絡表現，證明壓縮未必是有損過程；(3) 提供面向部署的效率分析與範式選擇指引 (Feng et al. 2026, §1, p.2)。\n\n\n**做法**：\n- **統一問題形式化**：把任意壓縮方法抽象為一個受預算 \\(B\\) 約束的壓縮算子 \\(C_B:\\mathcal{V}^n\\to\\mathcal{Z}\\)，將 token 序列 \\(\\mathcal{X}=[t_1,...,t_n]\\) 映射到緊湊代理表徵空間 \\(\\mathcal{Z}\\)，使 \\(\\text{Cost}(\\mathcal{Z})\\le B\\)（\\(B\\) 約束 token 數、記憶體或延遲）；下游預測為 \\(f(q,\\mathcal{Z})\\)，查詢 \\(q\\) 於推論時施加。壓縮目標為最小化相對全脈絡推論的輸出散度 \\(\\mathbb{E}[d(f(q,C_B(\\mathcal{X})),f(q,\\mathcal{X}))]+\\lambda\\mathcal{R}(C_B(\\mathcal{X}))\\)，其中 \\(\\mathcal{R}\\) 為速率懲罰；檢索感知 T2T 屬查詢條件化特例 \\(C_B(\\mathcal{X};q)\\) (Feng et al. 2026, §3.1, p.3)。\n- **三範式分類（依輸出表徵空間）**：把八個代表性方法組織為 Text-to-Text（T2T，離散 token 序列）、Text-to-Vector（T2V，連續潛向量）、Text-to-Image（T2I，視覺 token）三類，並以同一管線實作以隔離壓縮算子的影響 (Feng et al. 2026, §1, p.1；§3, p.3；§4, p.5)。\n- **T2I 範式機制**：把代碼脈絡渲染成視覺序列交由視覺語言模型（VLM）消費，利用視覺模態「每 token 訊息密度較高」的特性以做更激進壓縮。流程為三步：先以版面感知函數 \\(\\mathcal{I}=\\text{Render}(\\mathcal{X};\\theta_{\\text{layout}})\\) 將代碼渲染成高解析點陣圖（\\(\\theta_{\\text{layout}}\\) 控制文字密度、字型大小、空間排列）；再等向縮放至目標解析度，使視覺 token 預算 \\(N_{\\text{vis}}\\) 滿足 \\(W\\times H=N_{\\text{vis}}\\times p^2\\)（\\(p\\) 為 patch 大小）；最後切成 \\(p\\times p\\) 規則網格並由視覺編碼器映射為 \\(N_{\\text{vis}}\\) 個視覺 token。關鍵是 token 數與原序列長度 \\(n\\) 解耦，壓縮比完全由目標解析度控制而非 token 過濾；風險為精細詞彙訊號（確切識別字、縮排）在激進降採樣下退化 (Feng et al. 2026, §3.2, p.3)。\n- **T2V 範式機制**：將離散代碼 token 投影到連續潛空間，產生固定大小的記憶 token 集合，下游模型以之取代原序列做條件化；**僅訓練輕量壓縮模組，下游 LLM 解碼器全程凍結**，基底模型生成能力不變。輸入先切成片段 \\(\\mathcal{X}=\\{S_1,...,S_m\\}\\)，每段透過兩組正交設計選擇映射為記憶塊 \\(G_i\\)：\n  - **記憶組織（memory organization）**：Segment-Local（SLMC）每段獨立編碼 \\(G_i=\\text{Compress}(\\mathcal{E}(S_i))\\)，可平行處理但無跨段建模；Context-Propagated（CPMC）把前一記憶塊前傳 \\(G_i=\\text{Compress}(\\text{Concat}(G_{i-1},\\mathcal{E}(S_i)))\\)，漸進累積跨段脈絡但每步記憶有上界。\n  - **記憶抽取（memory extraction）**：Self-Attentive Aggregation（SAMA）讓段表徵與記憶 token 經標準 transformer 注意力互動；Query-Driven Memory Extraction（QDME）引入可學查詢 \\(Q_{\\text{lat}}\\in\\mathbb{R}^{k\\times d}\\) 主動檢索段內訊息，\\(G_i=\\text{Softmax}((Q_{\\text{lat}}W_Q)(H_{S_i}W_K)^\\top/\\sqrt{d})(H_{S_i}W_V)\\)，\\(k\\) 直接控制壓縮比並把注意力複雜度從 \\(O(n^2)\\) 降到 \\(O(kn)\\)。\n  - 兩兩組合得四變體：SAMA-SLMC、SAMA-CPMC、QDME-SLMC、QDME-CPMC（論文簡記 SS/SC/QS/QC，皆納入實驗）(Feng et al. 2026, §3.3, p.3；§4.3, p.5)。\n- **T2T 範式機制**：完全在離散 token 空間做壓縮，保留模型無關性與人類可讀性，以「打分後選擇（score-and-select）」縮短序列：每 token／片段算重要性分數 \\(\\omega_i=\\text{Score}(u_i\\mid\\mathcal{X})\\) 並配二元選擇遮罩 \\(M_i\\in\\{0,1\\}\\)，在預算下解 \\(\\max_M\\sum_i M_i\\omega_i\\) s.t. \\(\\sum_i M_i\\le B\\)。針對代碼任務採**粗到細（coarse-to-fine）兩階段**：粗階段把脈絡切成結構單元（代碼行或函式）、以困惑度或檢索相關性算段級分數並丟棄低分段；細階段在保留段內算 token 級分數產生第二層遮罩。輸出仍為可讀代碼、無需改下游模型，但高壓縮比下激進剪枝可能切斷長程跨檔相依 (Feng et al. 2026, §3.4, p.4)。\n- **受測模型（兩規模、覆蓋代碼專用與多模態變體）**：Qwen2.5-Coder（QC，代碼專用，用 3B 與 7B 兩規模實例化 T2V 與 T2T）；Qwen2.5-VL（QV，視覺語言模型，用 3B 與 7B 實例化 T2I）。任務指令 \\(q\\) 跨所有設定保持一致，使差異僅來自壓縮算子 (Feng et al. 2026, §4.1, p.5；§4, p.5)。\n- **基準與任務**：採 ComplexCodeEval（一個反映真實儲存庫級編碼情境、含函式簽名／docstring／API 用法的基準），評測兩項生成導向任務——代碼生成（由自然語言規格合成完整函式體，測壓縮表徵是否保留足夠語義）與代碼補全（在環繞脈絡下預測部分觀察代碼片段的缺漏部分，測本地與跨檔脈絡保留）。從 Java 與 Python 子集各隨機抽 100 實例構成 200 實例的留出評估集；T2V 另用 ComplexCodeEval 訓練切分（1 萬+樣本）做下游適配，200 評估實例於所有訓練階段皆留出 (Feng et al. 2026, §4.2, p.5)。\n- **對比方法**：兩個非壓縮基線——Full Context（未壓縮儲存庫脈絡直接餵入，作表現上界）與 No Context（僅給任務指令，作下界）；T2I 為基於渲染、由 Qwen2.5-VL 消費的視覺管線；T2V 為四變體 SS/SC/QS/QC；T2T 取 LLMLingua 家族三方法——LLMLingua（小模型困惑度移除低訊息詞）、LongLLMLingua（加查詢感知打分與重排以緩解迷失於中段）、LLMLingua-2（以輕量雙向編碼器重構為 token 分類，降延遲並保跨域泛化）(Feng et al. 2026, §4.3, p.5；§2.2, p.3)。\n- **T2I 實作細節**：一視覺 token 對應 28×28 patch；原始碼以高對比黑白 RGB 點陣化，影像等向縮放對齊 28 的倍數並以 LANCZOS 重採樣保邊緣銳利；壓縮比由視覺 token 預算 \\(N=\\lfloor n/r\\rfloor\\) 控制，評測比例 \\(r\\in\\{2,4,8,16,32,64,128\\}\\) (Feng et al. 2026, §4.4.1, p.5)。\n- **T2V 實作細節（兩階段協定）**：採標準兩階段協定——預訓練用 StarCoderData（10 萬 Python + 10 萬 Java），編碼器把輸入壓成記憶 token、凍結 LLM 解碼、僅記憶抽取算子收梯度；3 epoch、BF16 混合精度、學習率 \\(1\\times10^{-4}\\)、餘弦衰減、800 warmup、有效批次 256、序列長 16384、梯度檢查點。下游微調由預訓練檢查點初始化、在 ComplexCodeEval 訓練切分跑 3 epoch（8 步梯度累積、相同學習率排程），**基底 Qwen2.5-Coder 全程不更新**。壓縮比由每段記憶 token 數 \\(k\\)（QDME 的查詢數／SAMA 的記憶槽數）控制，評測 \\(r\\in\\{4,8,16,32,64,128\\}\\)。論文說明兩階段必要性：純任務微調無法產出能最佳引導凍結解碼器的記憶 token，須先以重構目標預訓練 (Feng et al. 2026, §4.4.2, p.5)。\n- **T2T 實作細節**：LLMLingua／LongLLMLingua／LLMLingua-2 皆用預設組態、操作於離散 token 序列、不需任務特定訓練；目標壓縮比設 \\(\\{2,4,8,16,32\\}\\)，但因 T2T 以目標比為軟門檻、實際達成比依輸入 token 分布與打分函式而偏離目標 (Feng et al. 2026, §4.4.3, p.5)。\n- **推論與硬體**：所有方法用貪婪解碼（temperature=0、top-p=1）；標準推論跑 vLLM，RQ3 效率剖析改用原生 HuggingFace Transformers 以降框架引入的執行時變異；吞吐量定義為端到端延遲的倒數；實驗在 8×A100 80GB 伺服器、單一訓練／推論用單 GPU (Feng et al. 2026, §4.4.4, p.5)。\n- **評估指標**：依 ComplexCodeEval 官方協定——代碼生成報 BLEU 與 Edit Similarity（ES）；代碼補全另加 Exact Match（EM）。文本還原實驗（T2I/T2V 不可讀，故以重構原始碼來量訊息保留）報 BLEU 與 ES (Feng et al. 2026, §4.5, p.6；§6.1, p.10)。\n\n\n\n**核心發現**：\n- **RQ1／範式選擇是 ~4× 壓縮下任務表現的首要決定因素**：在約 4× 壓縮預算下，是否提升或退化下游表現取決於範式選擇而非壓縮這件事本身（Feng et al. 2026, §5.1, p.6, Table 1）。\n- **RQ1／T2V 可超越全脈絡（Finding 1）**：T2V 在代碼任務上超越全脈絡基線，Python 補全於 7B 規模最高 **+28.3% BLEU**；改善幅度具語言與規模相依性——7B 上所有變體在 Python 皆有一致增益，但 Java 於 3B 規模較弱或不存在。作者歸因於潛向量充當「習得過濾器」抑制儲存庫樣板雜訊、強化任務相關訊號，而非單純截斷脈絡 (Feng et al. 2026, §5.1, p.6, Finding 1；§5.1, p.6)。\n- **RQ1／T2V 確切數字**：QC-7B Python 補全四變體全部超越全脈絡——T2V-SS 達 41.34/67.51 BLEU/ES，相對 context 基線 32.21/56.64 為 +28.3% BLEU；生成上 T2V-QS 13.58/34.27 相對 context 10.49/28.25 為 +29.5% BLEU。QC-3B 上 QDME 變體於 Python 補全超越 context（T2V-QS 36.76 對 31.83），但 Java 未超越，顯示需足夠模型容量方能實現超脈絡效應 (Feng et al. 2026, §5.1, p.6, Table 1)。\n- **RQ1／語言相依的記憶組織偏好**：選擇何種記憶組織具語言敏感性——QC-7B Python 補全上 segment-local 編碼主導（SS>QS>SC>QC），Java 補全則偏好 context-propagated 組織（QC>QS>SC>SS），與 Python 的函式級模組化 vs. Java 的跨類別相依性質一致 (Feng et al. 2026, §5.1, p.6)。\n- **RQ1／T2I 在補全有競爭力但生成急遽退化（Finding 2）**：T2I 補全緊貼全脈絡（QV-7B Python 24.11/48.52 對 context 24.91/48.98；QV-3B Java 19.27/41.27 略高於 context 17.77/43.52），但生成急遽退化，Python 在 7B 規模相對全脈絡最多 **−50.8% BLEU**（QV-7B Python 生成 4.52/17.29 對 context 9.19/25.46；QV-3B Java 3.40/15.77 低於 no-context 4.98/16.00）。此任務不對稱跨模型規模與語言一致。成因為渲染把每 token 均勻映射到等面積影像、無機制凸顯任務相關區域，均勻降採樣退化函式簽名、API 鏈、跨檔 import；補全因本地語法線索能耐受中度解析度縮減，生成需完整跨檔結構而無法靠非選擇性保真維持 (Feng et al. 2026, §5.1, p.7, Finding 2)。\n- **RQ1／T2T 困惑度打分與代碼結構錯位（Finding 3）**：困惑度剪枝以語言不對稱方式退化代碼任務表現——QC-3B Python 補全上 T2T-LL（25.69 BLEU）與 T2T-LLL（25.78）**低於 no-context 基線**（27.59），但同方法在 Java 仍高於 plain（T2T-LL 27.89；T2T-LLL 29.00）。原因為 Python 縮排標記語法上「承載負荷」但本地可預測，成為早期剪枝目標，移除後破壞作用域邊界與控制流、使剪枝後脈絡主動誤導模型；Java 的顯式大括號分隔較耐 token 移除。生成上崩潰跨兩語言一致：import 宣告與函式簽名是規律模式被賦低困惑度，一旦切斷則跨檔相依無法復原（T2T-LL QC-7B Python 生成 6.89/23.08 對 plain 6.14/20.27）(Feng et al. 2026, §5.1, p.7, Finding 3)。\n- **RQ2／T2V 對壓縮比不敏感（Finding 4）**：T2V 表現於 4×–128× 全評估範圍穩定，超脈絡生成優勢在所有評測比例維持。四變體在 4×–128× 產生近乎平坦的 ES 曲線；QC-3B Python 補全 QDME-SLMC 介於 62.49–63.94%（context 60.19），生成 SAMA-SLMC 介於 32.40–33.27%（context 28.75），全部在每個比例都超越全脈絡。作者解釋固定記憶瓶頸不論輸入長度都抽取任務相關結構，增大比例只是重分配相同潛表徵而非丟棄額外訊息 (Feng et al. 2026, §5.2, p.7–8, Finding 4)。\n- **RQ2／T2V 在生成於全範圍維持優勢**：T2V 在生成上於每個比例、跨兩語言皆超越全脈絡——比補全更強的結果（補全時 Java 變體仍低於全脈絡）(Feng et al. 2026, §5.2, p.8)。\n- **RQ2／T2I 於 4× 達峰、隨後漸退（Finding 4）**：T2I 補全於 4× 達峰（Python 39.93%、Java 41.27%），8× 後退化，高比例部分回升（Python 從 32× 的 34.15 回到 128× 的 36.04，仍低於 36.66；Java 從 16× 的 34.03 到 128× 的 35.35）；生成的 ES 跨所有比例近乎平坦且遠低於 context（Python 19.20–20.35%、Java 15.77–18.40%）。本地語法線索足以撐補全的中度解析度縮減，故比例決定保留多少此訊號；生成所需跨檔關係結構在任何解析度都喪失，使生成落差與比例無關 (Feng et al. 2026, §5.2, p.8, Finding 4)。\n- **RQ2／T2T 於 7×–12× 崩潰至 no-context 水準（Finding 3、Finding 4）**：困惑度剪枝的有效效用以方法特定臨界比崩潰。補全上三方法在大半評估範圍漸退並維持高於 plain（LLMLingua-2 Python 12× 達 54.67 對 no-context 52.77）。生成退化更快：LLMLingua Python ES 在 12× 達 20.31，等同 no-context 基線 20.27；LLMLingua-2 在 8.1× 跌破 plain（19.76）；LongLLMLingua 在 7× 跨越臨界（Python 19.84 對 plain；Java 22.44 對 plain 21.35）。Python 比 Java 在更低比例就達臨界，與其更高的結構敏感性一致 (Feng et al. 2026, §5.2, p.8, Finding 3／Finding 4)。\n- **RQ3／三範式全部降低推論成本，解碼成本為主導驅動因素（Finding 5）**：三範式在所有評測比例都帶來相對全脈絡解碼的可量化效率增益，解碼成本下降是跨範式的主要驅動因素 (Feng et al. 2026, §5.3, p.8, Finding 5；§5.3, p.8)。\n- **RQ3／T2I 效率隨比例改善最顯著（Finding 5）**：T2I 壓縮與解碼延遲隨比例單調下降——壓縮延遲從 2× 的 0.42 s 降到 128× 的 0.29 s；解碼從 6.78 s 降到 4.19 s，趨向 plain 的 4.17 s；GPU 記憶體從 8.54 GB 降到 7.10 GB，幾乎追平 plain 的 7.09 GB。4×（補全最佳比例）端到端延遲已比全脈絡低 33%（6.02 s 對 8.95 s）；128× 時相對 plain 的額外延遲僅 0.31 s、額外記憶體 0.01 GB (Feng et al. 2026, §5.3, p.8, Finding 5；Table 2, p.9)。\n- **RQ3／T2V 壓縮成本穩定、解碼延遲漸降（Finding 5）**：T2V 壓縮開銷小且與比例無關（0.21–0.27 s）；解碼延遲隨比例下降（SAMA-SLMC 從 4× 的 6.29 s 到 128× 的 5.46 s；QDME-SLMC 6.21→5.82 s），GPU 記憶體小幅伴隨下降（SAMA-SLMC 6.57→6.45 GB）。所有變體在每個比例都遠低於全脈絡（plain 解碼 4.21 s／5.85 GB 對 context 9.13 s／10.92 GB），與 plain 的差距在高比例縮至約 1.5 s 與 0.6 GB。CPMC 變體因額外跨段計算，壓縮開銷略高於 SLMC（0.24–0.27 s 對 0.21–0.23 s）(Feng et al. 2026, §5.3, p.8, Finding 5；Table 3, p.9)。\n- **RQ3／T2T 壓縮成本方法相依但對比例穩定（Finding 5）**：T2T 在中度壓縮比把端到端延遲相對全脈絡降低逾 35%，解碼成本與 GPU 記憶體趨向「無儲存庫脈絡推論」的成本。壓縮開銷方法間差異大但各方法內隨比例穩定——LLMLingua-2 約 0.22 s（與 T2V 相當）、LLMLingua 0.63–0.66 s、LongLLMLingua 因重排達 1.24–1.38 s；最激進設定下三方法總延遲收斂到 4.58–5.54 s，逼近 plain 基線 (Feng et al. 2026, §5.3, p.8, Finding 5；Table 4, p.9)。\n- **壓縮保真度（T2T 質性檢視）**：以 LLMLingua 對一 Java 檔在 1.7× 與 3.4× 做質性檢視——1.7× 輸出與原檔幾乎相同（僅輕微空白與 import 合併），3.4× 時數個 import 語句與中間變數賦值被剪除而僅核心邏輯倖存。這直接揭示困惑度打分的結構弱點：import 與型別註解語言上可預測故得低重要性分數，卻正是生成任務所依賴的跨檔相依，與 RQ1/RQ2 高比例的表現崩潰相印證 (Feng et al. 2026, §6.1, p.10, Figure 4)。\n- **文本還原實驗——T2V 訊息保留遠勝 T2I（Table 5）**：T2I/T2V 表徵不可讀，故以重構原始碼測訊息保留（StarCoderData 抽 100 檔）。每個比例 T2V 都保留實質更多訊息——4× 時 BLEU 84.12／ES 91.57 對 T2I 22.80／46.38；128× 時 T2V 仍有 16.51／41.09 而 T2I 崩到 0.18／7.45。此對比反映核心差異：T2V 的習得瓶頸主動蒸餾任務相關 token 結構，T2I 的點陣化把所有內容均勻分散到像素並在激進降採樣下不可逆地喪失精細詞彙訊號 (Feng et al. 2026, §6.1, p.10, Table 5)。\n- **方法論貢獻**：論文確立壓縮「未必是有損過程」、可超越全脈絡，並揭示先前未被研究的「範式特定的表現—比例縮放行為」（T2V 平坦、T2I 4× 達峰後退、T2T 於臨界比崩潰）；亦提供面向部署的範式選擇指引——輸出表現優先（尤其生成）選 T2V；需免訓練部署則 VLM 上用 T2I（限補全與中度比例）、模型無關可移植則用 T2T（限溫和比例與較大模型）；吞吐／延遲優先選 T2I（最佳漸進縮放），需穩定可預測開銷則選 T2V (Feng et al. 2026, §1, p.2；§6.2, p.10–11)。\n- **作者自陳限制與開放問題**：(1) 效率指標（GPU 記憶體、推論延遲）對硬體與軟體環境敏感，絕對值未必遷移到其他配置——已用同伺服器、同軟體環境緩解；(2) 受測模型預訓練語料未公開，無法排除與評估實例重疊的資料洩漏，但所有方法在相同條件下評測，洩漏會均等影響各範式、不扭曲相對比較；(3) 困惑度打分與代碼結構錯位，建議代碼壓縮應納入程式特定訊號（AST 節點型別、控制流可達性、跨檔相依頻率）；(4) 視覺壓縮目前均勻分配像素、無機制優先結構重要 token，版面感知渲染（對函式簽名與 import 區塊分配較高解析度）是改善方向；(5) 三範式都觀察到語言特定表現不對稱，顯示程式語言結構應被視為壓縮設計的一等訊號而非假定跨語言均勻遷移；(6) T2V 超脈絡表現顯示儲存庫脈絡含標準全脈絡解碼無法解決的實質冗餘，建議研究任務自適應／查詢條件化的記憶分配 (Feng et al. 2026, §6.3, p.11；§6.2, p.11)。\n\n**追溯說明**：本文 PDF 共 12 頁，已全文讀畢（正文 §1–§7 至 p.11，參考文獻 p.11–12）。所有數值已對照 Table 1–5 與 Figure 2–4、五個 Finding 方框逐一核對；部分跨壓縮比曲線數值（Figure 2–3）以論文內文敘述為準引用。\n\n---\n\n### 9. RepoDoc — 以倉庫知識圖譜（RepoKG）為語意骨幹的全生命週期自動文件生成與增量更新框架\n\n*Xu et al. 2026, arXiv:2604.26523（中國中山大學）*\n\n\n**範圍提醒**：RepoDoc 維護的對象是**程式碼的文件（documentation），而非程式碼本身**。它不修改、重構或產生原始碼，因此與「LLM 對大型代碼庫進行修改與維護」屬**方法論層次的間接相關**。其關聯與借鏡價值在於兩點：(1) 它把「文件如何隨程式碼演化而保持同步」這個增量維護問題形式化，與「程式碼增量維護」共享同一困難——如何在 commit diff 後**精準界定影響範圍**並只重生受影響部分，而非全量重做；(2) 它提出的 **Semantic Impact Propagation（語意影響傳播）演算法**，把 commit diff 起點沿知識圖譜的下游（dependents）與上游（dependencies）雙向遍歷，用以判定哪些元件受到牽連——這套「在程式碼知識圖譜上做雙向影響傳播以縮小重做範圍」的機制，對 LLM 改碼代理人界定「一次修改會波及哪些檔案／類別／呼叫點」具有直接的方法論借鏡意義（Xu et al. 2026, §1, p.1; §3.4, p.5-6）。侷限在於：RepoDoc 從未驗證或執行程式碼，其增量更新的正確性指標（Update Recall）衡量的是「文件是否正確反映程式碼變更」，而非「程式碼修改是否正確」；且全文未涉及測試、編譯、執行回饋等改碼維護必備環節。\n\n**定位**：論文要解決的問題是——大型且長期演化的代碼庫，其文件難以維持最新、完整與良好結構；開發者花 58% 時間理解程式碼而非撰寫程式碼，而文件不足會加重此認知負擔，文件又會隨程式碼演化而過時、需大量人力同步（Xu et al. 2026, §1, p.1）。相對既有 LLM 文件工具（RepoAgent、CodeWiki），論文指出三項共同弱點：把程式碼當成**扁平文字片段**處理、缺乏語意模組化、靠大量程式碼檢索灌爆 LLM 上下文造成 token 膨脹（CodeWiki 平均每問 5.3K tokens、每倉庫生成約 3,673 秒）、且缺乏追蹤程式碼變更如何沿相依傳播的語意理解，使增量更新不準確或完全不支援（Xu et al. 2026, §1, p.1; §2, p.2-3）。RepoDoc 自我定位為**首個把知識圖譜應用於完整文件生命週期（生成＋維護兩端）的工作**：核心洞見是「**一次性建構 RepoKG，再把它當成語意骨幹**」來同時驅動上下文感知的文件生成與精準增量更新；作者明言先前無任何工作把知識圖譜應用於完整文件生命週期，RepoDoc 即填補此缺口（Xu et al. 2026, §1, p.2; §5, p.10）。\n\n\n**做法**：\n\n- **三階段流水線總覽**：RepoDoc 以一條三階段流水線運作——(1) **RepoKG Construction**（倉庫知識圖譜建構），抽取程式碼實體與其關係；(2) **Module Clustering**（模組分群），把程式碼依功能凝聚度組成階層式單元；(3) **Documentation Generation**（文件生成），以技能型 agent 查詢圖譜產出模組化、交叉引用、附自動生成 Mermaid 圖的文件。圖譜建構一次、其後當成整個生命週期的中央資料結構（Xu et al. 2026, Abstract, p.1; §3, p.4）。\n\n- **RepoKG schema——三類實體、七種關係**：知識圖譜定義 **3 種實體型別**與 **7 種關係型別**。實體型別為：**Code Entity**（程式碼構件——函式、類別、介面、模組，含原始碼、簽章、metadata 與對其他實體的相依）、**Concept Entity**（由 LLM 分析抽取的業務概念，捕捉程式碼結構中未明寫的領域知識）、**Doc Entity**（以 markdown 格式儲存已生成的文件內容，支援選擇性更新與文件間交叉引用導航）。7 種關係型別為：**calls**（函式呼叫）、**implements**（類別實作介面）、**extends**（繼承）、**imports**（模組相依）、**contains**（模組包含）、**semantic-impact**（程式碼到概念）、**describes**（文件到程式碼）（Xu et al. 2026, §3.1.1, p.4）。\n\n- **RepoKG 建構流程——三個循序步驟**：(1) **Code Entity Extraction**：以適當工具解析原始碼（Python 用原生 AST、其他語言用 tree-sitter）抽出函式、類別、介面、模組為 Code Entity 實例，每個實體含原始碼、簽章及如檔案路徑、可見性等 metadata；(2) **Structural Relationship Extraction**：四種結構關係直接由程式碼結構推導、無需語意分析——imports 由 import 敘述抽出、contains 由檔案系統階層與命名空間分析得到、extends/implements 由類別繼承宣告解析、calls 由程序內控制流分析取得，這四者共同構成 RepoKG 的結構骨架；(3) **Semantic Relationship Enrichment**：以 LLM 分析在結構骨架上補入語意關係——對每個 Code Entity 由 LLM 辨識相關業務概念、建立經 semantic-impact 關係連結的 Concept Entity 實例；文件生成階段則建立 describes 關係，把生成文件連回它所描述的 Code Entity（Xu et al. 2026, §3.1.2, p.4）。\n\n- **模組分群——遞迴 top-down 分群策略與參數**：第二階段把 Code Entity 分群為階層式模組結構，並以 Module Entity 實例持久化儲存在 RepoKG 中（每個 Module Entity 以 contains 關係參照其成員 Code Entity）。演算法採**遞迴 top-down** 策略：對一組 Code Entity，LLM 依功能凝聚度與語意相關度、並利用 RepoKG 的 calls 與 imports 結構關係，把它們切成 **K 個凝聚模組**；若某模組超過 token 上限，其子實體再遞迴分群直到全部滿足上限。實作參數為——**頂層分群 K = 5**，**遞迴子分群 K = 3，token 門檻 T = 4,096**；分群利用呼叫與 import 關係指導分組決策，相互連結密集者優先被分在一起（Xu et al. 2026, §3.2, p.4-5）。\n\n- **文件生成——技能型 agent 架構（三層）**：第三階段以 AI agent 產出含 README、模組文件與元件 API 文件的多層文件；agent 採**分層架構**，含 orchestrator、skill 層與 tool 層三層。**Agent Orchestrator** 由一個 LLM 與一個 task router 組成：LLM 作為「大腦」負責理解指令、推理與規劃，task router 把高階計畫分解成任務、分派給適當的 skill；此設計刻意取代會把 LLM 灌爆的單一代理人 monolithic prompting（Xu et al. 2026, §3.3, p.5）。\n\n- **文件生成——Skill 層的三種技能**：skill 層含三種專門技能——**DocWriterSkill**（生成含參數表、方法描述、使用範例與模組級 Mermaid 圖的 API 參考文件）、**CodeAnalysisSkill**（在生成期間抽取業務概念並分析相依、用以豐富 RepoKG）、**GraphStoreSkill / graph query skill**（在生成期間檢索相關元件與相依的上下文）（Xu et al. 2026, §3.3, p.5）。\n\n- **文件生成——Tool 層**：tool 層提供原子操作——**FileReader**（存取原始碼）、**FileWriter**（儲存生成文件）、**GraphStore**（管理 RepoKG 操作）、**LLM-Caller**（呼叫語言模型生成內容）（Xu et al. 2026, §3.3, p.5）。\n\n- **文件生成——bottom-up 生成策略**：生成過程採 **bottom-up（自底向上）**——先生成元件級文件，再生成參照元件文件的模組級文件，最後綜合出整個倉庫總覽。元件以 thread pool 並行處理但遵守相依關係；模組文件生成尊重階層，先處理 leaf 模組再逐步往上建到頂層摘要。關鍵設計在於**靠精準圖查詢只檢索相關程式碼片段、而非整個檔案**，藉此避免上下文灌爆並加速生成（Xu et al. 2026, §3.3, p.5; §1, p.2）。\n\n- **增量更新——四階段循序流程**：當程式碼演化時，增量更新機制以「既有 RepoKG ＋既有文件＋一份 commit diff（代表兩個 commit 間的程式碼變更）」為輸入，產出僅最小重生的更新文件。四個循序階段為：(1) **Change Detection**（變更偵測）；(2) **Semantic Impact Propagation**（語意影響傳播）；(3) **Selective Regeneration**（選擇性重生）；(4) **Validation**（驗證）。其設計動機是——全量重生在計算上昂貴且會丟失先前生成的上下文，但只重生而漏掉受影響元件又會產生不一致或錯誤文件，故須精準界定影響範圍（Xu et al. 2026, §3.4, p.5）。\n\n- **增量更新階段 1——Change Detection（變更偵測與變更分類）**：第一階段以 Git diff 分析偵測 commit 間被修改、新增、刪除的檔案；對每個變更檔案解析 AST 以判定哪些 Code Entity 受影響，並對變更型別分類以決定更新策略。變更依範圍分類——**新增與簽章修改**需生成新文件、**刪除**觸發文件清理、**函式體變更**則可能依可見性層級向相依元件傳播。本階段輸出「受影響 Code Entity 清單＋其變更分類」（Xu et al. 2026, §3.4.1, p.5）。\n\n- **增量更新階段 2——Semantic Impact Propagation 演算法（雙向遍歷）**：第二階段判定哪些元件受偵測到的變更影響。程式碼變更常經語意關係影響相依元件，故沿 RepoKG **雙向遍歷**——**downstream**（依賴被改程式碼的元件）與 **upstream**（被改程式碼所依賴的元件）。Algorithm 1 的形式描述為：輸入「變更元件集 C、RepoKG G」，輸出「受影響元件集 A」；初始化 A ← C、Queue ← C，迴圈中取出元件 v、檢視其所有相連元件 s，若 relationship(v, s) 屬「propagation-worthy（值得傳播）」則把 s 加入 A 與 Queue，直到所有可達元件皆被造訪、自然依距原始變更的距離由近而遠發現受影響元件（Xu et al. 2026, §3.4.2, Algorithm 1, p.5-6）。\n\n- **增量更新階段 2——不同關係型別的差異化傳播決策**：傳播並非無差別擴散，不同關係型別帶不同含意——直接 **call 關係**沿呼叫鏈廣泛傳播變更；**介面 implements 關係**為跨多型相依確保一致性；**semantic-impact 關係**追蹤共享資料結構或契約違反等不明顯的耦合。系統依階段 1 偵測到的變更型別決定適當的傳播範圍（Xu et al. 2026, §3.4.2, p.6）。\n\n- **增量更新階段 2——拓樸排序確保更新一致性**：為確保文件一致性，系統以 **Kahn 演算法**對受影響元件集 A 依相依關係做拓樸排序：先辨識 root 節點（無入邊的元件）再逐步處理其相依者並維持次序，得到「每個元件都在所有依賴它的元件之前被處理」的處理序列，確保低層元件先於高層元件更新。傳播階段通常只產出整個代碼庫一小部分的受影響集，對局部變更尤其如此（Xu et al. 2026, §3.4.2, p.6）。\n\n- **增量更新階段 3——Selective Regeneration（選擇性重生）**：第三階段僅更新受影響元件的文件。利用階段 1 的變更分類與階段 2 的受影響元件集，系統精準判定需重生什麼；對每個受影響元件，先前生成的文件被保留、只重生必要部分。此外，參照受影響元件的模組級總覽會被更新、相關圖表會被重建。此策略相對全量重生顯著降低計算成本與 token 用量，同時維持文件品質與一致性（Xu et al. 2026, §3.4.3, p.6）。\n\n- **增量更新階段 4——Validation（驗證）**：最後階段驗證交叉引用在整個文件階層仍保持一致，採規則式驗證與 LLM 式驗證兩者並用，確保——(1) 內部連結指向有效章節、(2) 圖表參照正確且格式良好、(3) 模組級文件準確反映其組成元件的狀態；此驗證使增量更新後的文件維持與全量重生相同的品質與連貫性（Xu et al. 2026, §3.4.4, p.6）。\n\n- **RepoDocBench——基準的建構與五項評估指標**：為公平且全面評估，作者建構 **RepoDocBench** 基準，含五項評估指標與一個倉庫集合，並引入一套嚴格的「三文件比較機制」評估增量更新內容的品質與正確性。五項指標為：**Coverage（Cov.）**——有對應文件的 public API 比例，由 AST 解析從原始碼抽出全部 API、檢查每個 API 是否在生成文件中被提及，coverage = covered_apis / total_apis × 100%；**Doc Information（Doc Info.）**——以 words、files、cross-references、code blocks、diagrams 五個維度評估文件豐富度（結構元素、視覺化與內容密度）；**Completeness@K（Compl@K）**——以 Sentence-BERT 嵌入（all-MiniLM-L6-v2）為每個問題取最相關的 top-K 文件片段、再以 LLM judge 判定片段是否含足夠資訊回答問題，最終為「能被充分回答的問題比例」= answerable_questions / total_questions × 100%；**TQS**——以 LLM judge 在 0–10 尺度同時對兩工具文件做五維評分（Clarity、Readability、Conciseness、Richness、Structure），並以交換文件順序、平均分數來抵消位置偏誤；**Update Recall（Upd Recall）**——更新文件正確反映程式碼變更的比例 = correctly_updated_components / total_components_requiring_update × 100%（Xu et al. 2026, §4.1.1, p.6-7）。\n\n- **RepoDocBench——倉庫集合（24 個倉庫、8 種語言、3 種規模）**：作者整理 **24 個開源倉庫**、橫跨 **8 種程式語言**（Python、JavaScript、TypeScript、Java、C#、C/C++、PHP），並依規模分為 small（<10K LOC）、middle（10K–100K LOC）、large（>100K LOC）三級。Table 1 列出各語言倉庫：Python（requests、flask、pytest、fastapi，規模 S/M/L）、JS/TS（axios、express、vue、react，M/L）、Java（mybatis、guava、spring-boot、elasticsearch，M/L）、C#（aspnetcore、entityframeworkcore、xunit、moq，M/L）、C/C++（libevent、libuv、nghttp2、protobuf，M/L）、PHP（guzzle、monolog、laravel、symfony，M/L）。由於 RepoAgent 僅支援 Python，涉及 RepoAgent 的三工具比較與 RQ4 增量更新評估只用 Python 倉庫（Xu et al. 2026, §4.1.1, Table 1, p.6-7）。\n\n- **實驗設定——backbone、基線與評估超參數**：生成 backbone 對基線與 RepoDoc 皆用 **DeepSeek V3.2**，temperature = 0.7、max tokens = 4,096 以求一致生成品質；評估用 **GPT-5.2 與 Claude-Sonnet-4.6** 作為 LLM judge。兩個 state-of-the-art 基線為——**RepoAgent**（LLM 驅動、支援檔案級增量更新的倉庫文件框架，作為初始生成與增量更新兩方面的比較基準）、**CodeWiki**（檢索增強生成、做整體文件但不支援增量更新，每次變更須全量重生，故僅作初始生成品質比較）。token 成本以 DeepSeek V3 API 定價（每百萬 token 0.5 美元）換算為美元。作者另在資料子集上做 pilot 研究，發現 LLM 指派分數與專家人工標註強相關（Pearson r > 0.85），以佐證自動評估指標的可靠性（Xu et al. 2026, §4.1.2, §4.1.3, p.7; §4.1.1, p.7）。\n\n- **四個研究問題**：RQ1——RepoDoc 文件相對基線多完整（用 Coverage、Doc Info、Compl@K）；RQ2——文件多可讀、多豐富（用 TQS）；RQ3——時間與 token 消耗效率（用 Time、Token）；RQ4——增量更新表現（用 Update Recall）（Xu et al. 2026, §4, p.6）。\n\n\n\n**核心發現**：\n\n- **Coverage（API 覆蓋率）——多語言平均提升 32.5%**：多語言評估上 RepoDoc 平均達 **53.13%** API 覆蓋率，較 CodeWiki 的 40.09% 高 **32.5%**。值得注意的是 RepoAgent 在 Python 上覆蓋率較高（**91.28%**），但作者做了**根因分析**：這源自 RepoAgent 的設計目標——它要生成「列出每個被參照函式」的窮舉式 API 文件，而 RepoDoc 的目標是產出高品質、高層次的架構與核心模組文件，附模組化結構與交叉引用；兩者代表不同文件哲學，作者並論證「高覆蓋率本身不等於更好的文件品質或對理解系統架構的完整性」（Xu et al. 2026, §4.2.2, p.7-8）。\n\n- **Doc Information（文件豐富度）——多維度大幅領先 CodeWiki**：相對 CodeWiki 平均，RepoDoc 生成 **5.3 倍 words（396K vs 74K）、3.8 倍 documented files（214 vs 56）、4.2 倍 cross-references（112K vs 26K）、6.3 倍 code blocks（58K vs 9K）**，diagrams 則相當（128 vs 157）（Xu et al. 2026, §4.2.2, p.8）。\n\n- **Doc Information——Python 上對 RepoAgent 的結構優勢**：在 Python 上 RepoDoc 在文件結構面顯著勝過 RepoAgent——生成 **1.4 倍 documented files（151.8 vs 110.7）、30 倍 code blocks（37K vs 1.2K）、實際生成 72.5 個 diagrams 對 RepoAgent 的 0 個**；唯一例外是 RepoAgent 因窮舉式函式列表而 word count 較高（Xu et al. 2026, §4.2.2, p.8）。\n\n- **Completeness@K（資訊完整度）——多語言提升 10.4%、Python 提升 2.4%**：多語言評估上 RepoDoc 達 **74.12% Compl@10**，較 CodeWiki 的 67.16% 高 **10.4%**；Python 上 RepoDoc 的 **78.92%** 也勝過 RepoAgent 的 76.53%（高 **2.4%**）。RepoDoc 在 Java（+10.5% vs CodeWiki）與 C/C++（+6.4% vs CodeWiki）優勢特別明顯。此結果顯示——即使 RepoAgent 覆蓋率高，RepoDoc 的文件仍能提供更完整、足以回答使用者查詢的資訊（Xu et al. 2026, §4.2.2, p.8）。\n\n- **Finding 1（RQ1 總結）**：RepoDoc 取得較高 Coverage（vs CodeWiki +32.5%）與較高 Completeness@K（vs CodeWiki +10.4%、vs RepoAgent +2.4%），並具顯著更豐富的文件內容與結構（Xu et al. 2026, §4.2.2, Finding 1, p.8）。\n\n- **TQS（可讀性與豐富度）——五維度全面勝過 CodeWiki**：RQ2 以 TQS 在五個維度上全面勝過 CodeWiki，優勢由大到小為——**Clarity（8.25 vs 7.00，+1.25）、Conciseness（7.40 vs 6.10，+1.30）、Structure（8.05 vs 7.20，+0.85）、Readability（8.20 vs 7.55，+0.65）、Richness（7.90 vs 7.85，+0.05，差距最小）**。作者把 Clarity、Conciseness、Structure 的優勢歸因於知識圖譜設計：靠只抽相關程式碼片段避免了 CodeWiki 的上下文膨脹，使解釋更聚焦清晰；Mermaid 圖則提供系統架構的視覺呈現、貢獻 Structure 優勢。CodeWiki 在 Conciseness 上變異較高，顯示缺乏結構化檢索機制時其文件在「詳略平衡」上較不一致。此評估排除 RepoAgent，因 RQ1 已證 CodeWiki 顯著勝過 RepoAgent（81 vs 0 diagrams），重複比較冗餘（Xu et al. 2026, §4.3.2, p.8-9）。\n\n- **TQS——對 RepoDoc 優越性的人工根因分析**：作者人工檢視各對比較，歸納 RepoDoc 勝出的三個主因——(1) 知識圖譜式上下文檢索產出冗餘較少、較聚焦的解釋；(2) 階層式模組結構與清楚的交叉引用改善導航；(3) 自動生成的 Mermaid 圖提供視覺化架構總覽。CodeWiki 的主要弱點是解釋相對複雜冗餘、且引用與連結較少（Xu et al. 2026, §4.3.2, p.9）。\n\n- **Finding 2（RQ2 總結）**：RepoDoc 在 Clarity（+1.25）與 Conciseness（+1.30）顯著勝過 CodeWiki，在 Structure（+0.85）與 Readability（+0.65）也有中度優勢，展現整體更佳的文件品質（Xu et al. 2026, §4.3.2, Finding 2, p.9）。\n\n- **效率（RQ3）——時間**：Python 倉庫平均，RepoDoc 僅需 **1,2
