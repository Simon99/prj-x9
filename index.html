ving**\n\n> 問題解決任務旨在修改程式碼庫以生成解決特定問題的 patch。然而，現有基準（如 SWE-bench）幾乎完全聚焦於 Python，不足以評估 LLMs 在多樣化軟體生態系統中的表現。為此，我們推出了多語言問題解決基準 Multi-SWE-bench，涵蓋 Java、TypeScript、JavaScript、Go、Rust、C 和 C++，共計 1,632 個高品質實例。這些實例由 68 位專業標注者從 2,456 個候選中精心篩選，確保基準能提供準確可靠的評估。基於 Multi-SWE-bench，我們使用三種代表性方法（Agentless、SWE-agent 和 OpenHands）評估了一系列前沿模型，並給出了帶有重要實證洞察的全面分析。此外，我們還發起了 Multi-SWE-RL 開源社群，旨在為問題解決任務建構大規模強化學習（RL）訓練資料集。作為初始貢獻，我們發布了橫跨七種程式語言的 4,723 個結構完善的實例，為 RL 研究奠定了堅實基礎。\n\n\n**[13× 本地 / 140 全球] 2504.21798 — SWE-smith: Scaling Data for Software Engineering Agents**\n\n> _(無 abstract 中譯)_\n\n\n**[12× 本地 / 156 全球] 2410.03859 — SWE-bench Multimodal: Do AI Systems Generalize to Visual Software Domains?**\n\n> _(無 abstract 中譯)_\n\n\n**[11× 本地 / 30 全球] 2503.15223 — Are \"Solved Issues\" in SWE-bench Really Solved Correctly? An Empirical Stud**\n\n> 自動化問題求解旨在解決軟體儲存庫中的真實問題。最流行的自動化問題求解基準是 SWE-bench 及其人工篩選子集 SWE-bench Verified，這些基準利用測試來驗證生成的修補方案。然而，由於測試很少全面，修補方案可能通過測試，但仍未符合開發者的預期。目前尚不清楚 SWE-bench 評估在多大程度上受到此類「可信但不正確」修補方案的影響。本文對三種最先進問題求解工具在 SWE-bench Verified 上生成的可信修補方案的正確性進行深入的實證研究。我們對生成的修補方案進行了廣泛測試與檢查，並將其與人工撰寫的基準修補方案進行比較。我們方法論的核心是一種名為 PatchDiff 的差異化修補測試新技術，可自動揭示兩個修補方案之間的行為差異。研究結果揭示了 SWE-bench 修補方案驗證機制的關鍵弱點，導致 7.8% 的修補方案被計為正確，但實際上無法通過開發者撰寫的測試套件。\n\n\n**[10× 本地 / 36 全球] 2505.23419 — SWE-bench Goes Live!**\n\n> _(無 abstract 中譯)_\n\n\n**[8× 本地 / 78 全球] 2410.06992 — SWE-Bench+: Enhanced Coding Benchmark for LLMs**\n\n> 軟體工程（SE）中的大型語言模型（LLMs）可為程式設計提供輔助。為便於在實際程式設計情境中嚴格評估 LLMs，Carlos 等人推出了 SWE-bench 資料集，收錄了來自 12 個廣泛使用的 Python 儲存庫的 2,294 個真實 GitHub 問題及其對應的 pull request。近期已有多個基於 LLM 的工具套件在此資料集上開發並評估。然而，對 SWE-bench 品質的系統性評估仍付之闕如。本文透過對 SWE-bench 資料集進行實證分析填補此空白——將 SWE-Agent + GPT-4 成功解決的問題與實際 pull request 進行人工篩查比對（研究期間 SWE-Agent+GPT-4 位居 SWE-bench 排行榜首位）。分析揭示了 SWE-bench 資料集的若干關鍵問題：1) 32.67% 的成功 patch 涉及作弊，即解決方案直接由問題報告或留言提供，我們稱之為「解題洩漏問題」；2) 31.08% 的通過 patch 因測試用例薄弱而存在疑點。\n\n\n**[8× 本地 / 42 全球] 2408.14354 — SWE-bench-java: A GitHub Issue Resolving Benchmark for Java**\n\n> _(無 abstract 中譯)_\n\n\n**[8× 本地 / 78 全球] 241 碼並根據行動結果調適行為。現有資料集要麼局限於一次性程式碼生成，要麼由小型人工整理的互動任務集合組成，缺乏規模和多樣性。其次，缺乏新鮮互動 SWE 任務影響了快速改進模型的評估，因為靜態基準因污染問題很快過時。為解決這些限制，我們介紹一種新型的、自動化的、可擴展的流程，從多樣化的 GitHub 儲存庫中持續提取真實世界的互動 SWE 任務。使用此流程，我們構建了 SWE-rebench，一個包含超過 21,000 個基於 Python 的互動 SWE 任務的公共資料集，適用於大規模 SWE agent 的強化學習。此外，我們利用持續收集的新鮮任務構建評估基準。\n\n\n**[4× 本地 / 92 全球] 2509.16941 — SWE-Bench Pro: Can AI Agents Solve Long-Horizon Software Engineering Tasks?**\n\n> 我們推出 SWE-Bench Pro，一個更具挑戰性的基準，以 SWE-BENCH 的最佳實踐為基礎，但明確設計用於捕捉超出 SWE-BENCH 範疇的真實複雜企業級問題。SWE-BENCH PRO 包含來自 41 個活躍維護儲存庫的 1,865 個問題，涵蓋業務應用、B2B 服務和開發者工具。基準分為公開集（11 個儲存庫的問題公開可訪問）、保留集（12 個儲存庫）和商業集（18 個專有儲存庫，我們與早期初創公司有正式合作協議）。保留集和商業集的問題不對外公開，但我們發布了商業集上的結果。我們的基準包含長程任務，可能需要專業軟體工程師數小時乃至數天才能完成，通常涉及跨多個文件的 patch 和大量程式碼修改。所有任務均經過人工驗證並附有充足上下文以確保可解決性。為更好地理解這些限制，我們對所收集的 agent 軌跡中觀察到的失敗模式進行了聚類分析。\n\n\n**[3× 本地 / 121 全球] 2406.12952 — SWT-Bench: Testing and Validating Real-World Bug-Fixes with Code Agents**\n\n> 嚴格的軟體測試對於開發和維護高品質程式碼至關重要，自動化測試生成因此成為改善軟體品質和提升程式碼生成方法效果的有前景途徑。然而，儘管基於大型語言模型（LLMs）的程式碼生成是異常活躍的研究領域，測試生成相對尚未得到充分探索。我們致力於填補這一空白，探究基於 LLM 的 Code Agents 將用戶問題形式化為測試用例的能力。為此，我們提出了一個基於流行 GitHub 儲存庫、包含真實世界問題、基礎真相 bug 修復和黃金測試的新基準。我們發現 LLMs 在生成相關測試用例方面總體表現出乎意料地好，設計用於程式碼修復的 Code Agents 甚至超越了專門為測試生成設計的系統。此外，由於測試生成是比程式碼生成更結構化的相似任務，通過問題復現率和覆蓋率變化的雙指標能夠進行更細粒度的分析。最後，生成的測試對提出的修復 patch 是有效的過濾器。\n\n\n## B/B3 — Repo-level 補全/QA（12 篇）\n\n\n**[20× 本地 / 368 全球] 2105.12655 — CodeNet: A Large-Scale AI for Code Dataset for Learning a Diversity of Codi**\n\n> 在過去幾十年中，軟體已滲透到我們社會的方方面面。隨著軟體開發需求激增以及企業應用程式的程式碼基礎設施日趨老化，提升軟體開發生產力和現代化遺留應用程式比以往任何時候都更加迫切。深度學習和機器學習演算法的進步催生了眾多突破，激勵研究人員利用 AI 技術提升軟體開發效率，因此，AI for Code 這一快速興起的研究領域獲得了新的關注與發展動力。本文介紹大型資料集 CodeNet，包含超過 1400 萬個程式碼樣本和約 5 億行以 55 種不同程式語言撰寫的程式碼，旨在教導 AI 進行編碼。除了大規模之外，CodeNet 還擁有豐富的高品質標註，可作為基準測試並幫助加速 AI 技術在各種關鍵編碼任務中的研究，包括程式碼相似性與分類、多種程式語言之間的程式碼翻譯，以及程式碼效能（執行時間和記憶體）改善技術。此外，CodeNet 還提供了更多豐富的標註與功能以支持研究。\n\n\n**[17× 本地 / 348 全球] 2306.03091 — RepoBench: Benchmarking Repository-Level Code Auto-Completion Systems**\n\n> 大型語言模型（LLMs）大幅推進了程式碼自動補全系統，有望為開發人員帶來顯著的生產力提升。然而，目前的基準測試主要關注單檔 vo 進行分類，以更全面地分析模型在生成具有不同依賴級別的函數時的效能。第三，我們在 HumanEvo 上對七個具有代表性的多樣化 LLM 進行廣泛實驗以驗證相關結論。\n\n\n**[4× 本地 / 166 全球] 1808.09588 — Mapping Language to Code in Programmatic Context**\n\n> 原始碼很少孤立地編寫，它在很大程度上依賴於程式上下文，例如程式碼所在的類別。為研究這一現象，我們引入了根據英文文件及類別其他部分提供的程式上下文生成類別成員函式的任務。這一任務具有挑戰性，因為所需程式碼可能因類別提供的功能不同而大相逕庭（例如，當被要求「返回特定成員變數清單中最小的元素」時，sort 函式可能可用也可能不可用）。我們引入 CONCODE，一個包含超過 100,000 個樣本的新大型資料集，由來自線上程式碼儲存庫的 Java 類別組成，並開發了一種新的編碼器-解碼器架構，對方法文件與類別環境之間的互動進行建模。我們還提出了詳細的錯誤分析，表明在此任務上仍有顯著的未來研究空間。\n\n\n**[3× 本地 / 97 全球] 2405.19856 — DevEval: A Manually-Annotated Code Generation Benchmark Aligned with Real-W**\n\n> 如何評估大型語言模型（LLMs）的程式碼能力仍是一個開放問題。我們發現現有基準與真實世界程式碼儲存庫的對齊程度較差，不足以評估 LLMs 的程式碼能力。為填補這一知識空缺，我們提出名為 DevEval 的新基準，具有三項進步：（1）DevEval 在多個維度上與真實世界儲存庫對齊，如程式碼分佈和依賴分佈；（2）DevEval 由 13 名開發者標注，包含全面的標注（如需求、原始儲存庫、參考程式碼和參考依賴項）；（3）DevEval 包含來自 117 個儲存庫的 1,874 個測試樣本，涵蓋 10 個流行領域（如網路、資料庫）。基於 DevEval，我們提出儲存庫層級程式碼生成，並在 DevEval 上評估 8 個流行的 LLMs（如 gpt-4、gpt-3.5、StarCoder 2、DeepSeek Coder、CodeLLaMa）。我們的實驗揭示了這些 LLMs 在真實世界程式碼儲存庫中的程式碼能力，例如實驗中 gpt-4-turbo 的最高 Pass@1 僅為 53.04%。我們還分析了 LLMs 的失敗案例並總結其不足。\n\n\n**[3× 本地 / 14 全球] 2409.15204 — RAMBO: Enhancing RAG-based Repository-Level Method Body Completion**\n\n> 程式碼補全在軟體開發中至關重要，透過基於上下文預測程式碼片段來幫助開發者。在補全任務中，方法體補全（MBC）尤其具有挑戰性，因為它涉及基於方法簽名和上下文生成完整的方法體。在大型儲存庫中，這項任務變得更加困難，方法體必須整合儲存庫特定的元素，如自定義 API、模組間依賴和專案特定規範。本文介紹 RAMBO，一個新型基於 RAG 的儲存庫級 MBC 方法。RAMBO 不是檢索相似的方法體，而是識別重要的儲存庫特定元素（如類別、方法和變數/欄位）及其相關用法。透過將這些元素及其相關用法整合到程式碼生成過程中，RAMBO 確保生成更準確且更具上下文相關性的方法體。我們在 40 個 Java 專案上使用主流程式碼 LLM 進行的實驗結果表明，RAMBO 顯著優於最先進的儲存庫級 MBC 方法，BLEU 提升高達 46%，CodeBLEU 提升 57%，編譯率提升 36%，精確匹配率提升高達 3 倍。\n\n\n**[3× 本地 / 12 全球] 2406.03283 — CATCODER: Repository-Level Code Generation with Relevant Code and Type Cont**\n\n> 大型語言模型（LLM）在程式碼生成任務中展現出卓越的能力。然而，儲存庫級程式碼生成面臨獨特挑戰，特別是由於需要利用儲存庫中多個文件中分散的資訊。具體而言，成功生成依賴於對通用的、與上下文無關的知識和特定的、與上下文相關的知識的紮實掌握。雖然 LLM 廣泛用於與上下文無關的方面，但現有的基於檢索的方法有時因無法獲取更廣泛和更深層的儲存庫上下文而表現不佳。本文介紹 CatCoder，一個為靜態型別程式語言設計的新型程式碼生成框架。CatCoder 透過整合相關程式碼和型別上下文來增強儲存庫級程式碼生成。具體而言，它利用靜態分析器提取型別依賴，並將此資訊與檢索到的程式碼合併，以創建全面的 LLM 提示。為評估 CatCoder 的有效性，我們調整並構建了包含 199 個 Java 任務和 90 個 Rust 任務的基準測試。結果表明，CatCoder 在 RepoCoder 基線上的效能提升高達 14.44%。\n\n\n**[3× 本地 / 0 全球] 2410.21647 — Can Language Models Replace Programmers for Coding? REPOCOD Says 'Not Yet'**\n\n> 近期出現了多個儲存庫級程式碼生成基準——如 CoderEval、DevEval、RepoEval、RepoBench 和 LongCodeArena——用於評估大型語言模型（LLMs）超越 HumanEval 和 MBPP 等獨立基準的能力。由此自然引發了一個問題：LLMs 在真實世界程式設計任務中的表現是否與這些基準相近？不幸的是，這一問題無法得到回答，因為這些基準由短補全、合成樣本構成或聚焦於規模有限的儲存庫，無法代表真實世界的程式設計任務。為應對這些挑戰，我們建立了 REPOCOD，一個包含真實世界大型項目中具有複雜依賴關係的任務及適當評估指標的 Python 程式碼生成基準。它包含來自 11 個流行項目的 980 個完整函數生成任務，其中 50.8% 需要儲存庫級上下文。REPOCOD 包含每個實例平均 314 個開發者編寫的測試用例以實現更好的評估。我們在 REPOCOD 上評估了十個 LLMs，發現沒有一個在 REPOCOD 上達到超過 30% 的 pass@1，表明有必要構建更強大的 LLMs 以幫助開發者。\n\n\n## B/B4 — 跨語言翻譯（10 篇）\n\n\n**[16× 本地 / 71 全球] 2405.11514 — Towards Translating Real-World Code with LLMs: A Study of Translating to Ru**\n\n> 大型語言模型（LLM）在程式碼翻譯任務方面展現出潛力——即將以一種程式語言撰寫的程式碼翻譯為另一種語言——這得益於其能夠以大多數程式語言撰寫程式碼的能力。然而，LLM 在翻譯真實世界程式碼方面的有效性在很大程度上仍未被充分研究。本研究首次對基於 LLM 的 Rust 翻譯進行大規模研究，評估五個最先進 LLM 的能力，分別為 GPT4、Claude 3、Claude 2.1、Gemini Pro 和 Mixtral。我們的研究基於從真實世界開源專案中提取的程式碼進行。為支持本研究，我們開發了 FLOURINE，一個端到端的程式碼翻譯工具，使用差異模糊測試來檢查 Rust 翻譯是否與原始源程式具有 I/O 等價性，無需預先存在的測試案例。在研究中，我們評估了 LLM 生成初始成功翻譯的能力，以及修復先前生成的有缺陷翻譯的能力。若原始程式與翻譯程式不具 I/O 等價性，我們會採用一組自動化反饋策略，包括向 LLM 提供反例反饋。\n\n\n**[14× 本地 / 101 全球] 2206.08474 — XLCoST: A Benchmark Dataset for Cross-lingual Code Intelligence**\n\n> 機器學習的近期進展顯著改善了對原始碼資料的理解，並在多項下游任務中取得良好性能。GitHub 等開源儲存庫以豐富的未標注程式碼資料推動了這一進程。然而，高品質標注資料的缺乏在很大程度上阻礙了程式翻譯、摘要、合成和程式碼搜尋等程式碼相關任務的進展。本文介紹 XLCoST（Cross-Lingual Code SnippeT dataset），一個用於跨語言程式碼智能的新基準資料集。我們的資料集包含來自 8 種語言（7 種常用程式語言和英文）的細粒度平行資料，支援 10 項跨語言程式碼任務。據我們所知，這是規模和語言數量兩方面均最大的原始碼平行資料集。我們還為每項任務提供了多個最先進基線模型的性能表現。我們相信這一新資料集可成為研究社群的寶貴資產，促進跨語言程式碼智能新方法的開發與驗證。\n\n\n**[14× 本地 / 99 全球] 2310.04951 — CodeTransOcean: A Comprehensive Multilingual Benchmark for Code Translation**\n\n> 近期的程式碼翻譯技術利用神經機器翻譯模型將原始碼從一種程式語言翻譯到另一種，以滿足生產兼容性或提高程式碼庫維護效率。現有的大多數程式碼翻譯資料集只關注單一對流行程式語言。為推進程式碼翻譯研究並滿足現實應用的多樣需求，我們構建了 CodeTransOcean，一個支援最廣泛程式語言種類的大規模綜合基準。CodeTransOcean 包含三個新穎的多語言資料集，即支援多種流行程式語言之間翻譯的 MultilingualTrans、用於在小眾程式語言和流行語言之間翻譯的 NicheTrans，以及用於評估大型語言模型（LLMs）翻譯程式碼可執行性的 LLMTrans。CodeTransOcean 還包含一個新穎的跨框架資料集 DLTrans，用於在不同框架之間翻譯深度學習程式碼。我們開發了用於程式碼翻譯的多語言建模方法，並展示了其在提高低資源語言翻譯品質方面的巨大潛力。\n\n\n**[12× 本地 / 129 全球] 2108.11590 — AVATAR: A Parallel Corpus for Java-Python Program Translation**\n\n> 程式翻譯是指將原始碼從一種程式語言遷移到另一種語言，在軟體開發中具有巨大的實用價值，因為跨語言移植軟體既耗時又成本高昂。由於平行語料庫的缺乏，研究者近期探索了無監督的程式翻譯方法。然而，程式語言預訓練模型的出現使得利用少量標注樣本進行監督微調成為可能。為此，我們發布 AVATAR，一個收錄了 9,515 個程式設計問題及其 Java 和 Python 雙語解答的資料集。AVATAR 從競程網站、線上平台及開源儲存庫收集而來，並包含 250 個範例的單元測試以支援功能正確性評估。我們在 AVATAR 上對多個預訓練語言模型進行基準測試，實驗結果顯示這些模型在生成功能正確程式碼方面仍有不足。\n\n\n**[6× 本地 / 60 全球] 2311.08588 — CodeScope: An Execution-based Multilingual Multitask Multidimensional Bench**\n\n> 大型語言模型（LLMs）在協助人類程式設計和推動程式設計自動化方面展現出卓越效能。然而，現有用於評估 LLMs 程式碼理解和生成能力的基準存在嚴重局限。首先，大多數基準涵蓋的程式語言範圍狹窄、任務類型單一，而真實世界的軟體開發場景迫切需要多語言、多任務的程式設計環境。其次，大多數基準未考慮生成程式碼的實際可執行性和執行結果一致性。為填補現有基準與實際應用預期之間的差距，我們引入 CodeScope，一個基於執行、多語言、多任務、多維度的評估基準，全面衡量 LLMs 在程式碼任務上的能力。CodeScope 涵蓋 43 種程式語言和 8 個程式碼任務，從長度、難度和效率三個維度評估 LLMs 的程式碼效能。為促進基於執行的評估……\n\n\n**[4× 本地 / 152 全球] 2208.08227 — MultiPL-E: A Scalable and Extensible Approach to Benchmarking Neural Code G**\n\n> 大型語言模型已展示出生成自然語言與程式語言文本的能力，這為多語言程式碼生成開闢了可能性：程式碼生成模型能否將知識從一種語言泛化至另一種？儘管當代程式碼生成模型能生成語義正確的 Python 程式碼，但其在其他語言方面的能力所知甚少。我們提出 MultiPL-E，一個將單元測試驅動的程式碼生成基準翻譯至新語言的系統。我們使用 MultiPL-E 將兩個熱門的 Python 程式碼生成基準翻譯至另外 18 種程式語言，創建了首個大規模多語言程式碼生成基準。這 18 種語言涵蓋了多種程式設計範式與不同的流行程度。利用這些新的平行基準，我們評估了三個最先進的程式碼生成模型（Codex、CodeGen 和 InCoder）的多語言效能，發現 Codex 在若干其他語言上的效能與 Python 相當甚至更優。\n\n\n**[3× 本地 / 232 全球] 2210.14868 — Multi-lingual Evaluation of Code Generation Models**\n\n> 我們提出了評估程式碼生成模型的新基準測試：MBXP、Multilingual HumanEval 和 MathQA-X。這些資料集涵蓋 10 多種程式語言，使用一個可擴展的轉換框架生成，該框架將原始 Python 資料集中的提示和測試案例轉譯為目標語言的對應資料。使用這些基準測試，我們能夠以多語言方式評估程式碼生成模型的效能，並發現了語言模型在域外語言上的泛化能力、多語言模型相對於單語言模型的優勢、少樣本提示教導模型學習新語言的能力，以及即使在單語言設定下也具備的零樣本翻譯能力。此外，我們使用程式碼生成模型進行大規模引導，以獲取多種語言的合成標準解答，這些解答可用於其他程式碼相關評估，如程式碼插入、魯棒性或摘要任務。總體而言，我們的基準測試代表著深入理解語言模型程式碼生成能力的重要一步。我們在 https://github.com/amazon-research/ 公開發布了程式碼和資料集。\n\n\n**[3× 本地 / 34 全球] 2406.07436 — McEval: Massively Multilingual Code Evaluation**\n\n> 程式碼大型語言模型（LLM）在程式碼理解、補全和生成任務方面展現出顯著進步。由一系列程式碼挑戰和對應測試案例組成的程式設計基準測試，作為評估不同 LLM 在此類任務中能力的標準。然而，大多數現有基準測試主要聚焦於 Python，且仍限於有限的語言數量，其他語言通常是從 Python 樣本翻譯而來（如 MultiPL-E），降低了資料多樣性。為進一步促進程式碼 LLM 的研究，我們提出了一個涵蓋 40 種程式語言（McEval）的大規模多語言程式碼基準測試，包含 16K 個測試樣本，大幅突破了程式碼 LLM 在多語言場景中的限制。該基準測試包含具有挑戰性的程式碼補全、理解和生成評估任務，並配有精心策劃的大規模多語言指令語料庫 McEval-Instruct。此外，我們介紹了一個有效的多語言編碼器 mCoder，在 McEval-Instruct 上訓練，以支持多語言程式語言生成。McEval 上的大量實驗結果表明，開源模型與最先進水準之間仍存在很大的差距。\n\n\n**[3× 本地 / 76 全球] 2303.03004 — XCodeEval: An Execution-based Large Scale Multilingual Multitask Benchmark **\n\n> 能夠將問題解決方案以程式碼形式生成或協助開發者編寫程式碼的 AI 系統可以提升生產力，使程式設計更易於普及。近期，大型預訓練語言模型在從自然語言描述生成程式碼、修復有缺陷的程式碼、跨語言翻譯程式碼以及檢索相關程式碼片段方面展現出令人印象深刻的能力。然而，這些模型的評估通常以分散的方式進行，僅針對一兩個特定任務、少數幾種語言、部分粒度（如函式）層級，且在許多情況下缺乏適當的訓練資料。更令人擔憂的是，在大多數情況下，生成程式碼的評估僅依賴與參考程式碼的詞彙重疊，而非實際執行。我們引入 xCodeEval，這是迄今為止最大的可執行多語言多任務基準，包含來自約 7,500 個唯一問題的 2,500 萬個文件層級程式碼範例（165 億 tokens），涵蓋多達 11 種程式語言，具有執行層級的平行性。它涵蓋七個涉及程式碼理解、生成、翻譯和檢索的任務，並採用基於執行的……\n\n\n**[3× 本地 / 18 全球] 2411.02310 — MdEval: Massively Multilingual Code Debugging**\n\n> 程式碼大型語言模型（LLM）透過直接基於有錯誤的程式碼片段生成正確程式碼，在程式碼除錯方面取得了顯著進展。由有錯誤程式碼片段及其對應測試案例組成的程式設計基準測試，用於評估 LLM 的除錯能力。然而，許多現有基準測試主要聚焦於 Python，且在語言多樣性方面通常受限（如 DebugBench 和 DebugEval）。為推動基於 LLM 的多語言除錯領域發展，我們提出首個大規模多語言除錯基準測試，包含 18 種程式語言的 3,600 個測試樣本，涵蓋自動化程式修復（APR）任務、程式碼審查（CR）任務和錯誤識別（BI）任務。此外，我們透過向正確的多語言查詢和解答中注入錯誤（xDebugGen）來引入除錯指令語料庫 MDEVAL-INSTRUCT。我們還訓練了在 MDEVAL-INSTRUCT 上的多語言除錯器 xDebugCoder 作為強大基線，專門處理多種程式語言中的錯誤（例如 Rust 中的「Missing Mut」和 C 中的「Misused Macro Definition」）。我們在 MDEVAL 上的廣泛實驗揭示了相關結論。\n\n\n## B/B5 — Agent 基準（9 篇）\n\n\n**[7× 本地 / 808 全球] 2308.03688 — AgentBench: Evaluating LLMs as Agents**\n\n> _(無 abstract 中譯)_\n\n\n**[6× 本地 / 549 全球] 2406.12045 — τ-bench: A Benchmark for Tool-Agent-User Interaction in Real-World Domains**\n\n> 現有基準測試未對語言智能體與人類使用者的互動能力，以及其遵循特定領域規則的能力進行測試，而這兩者對於在真實世界應用中部署智能體至關重要。我們提出 τ-bench，一個模擬使用者（由語言模型模擬）與具備特定領域 API 工具和政策指引的語 luator? A Preliminary Study**\n\n> 近期，ChatGPT 的出現引起了計算語言學界的廣泛關注。多項前期研究顯示，ChatGPT 在各種 NLP 任務的自動評估指標上取得了出色的效能。然而，ChatGPT 作為評估指標的能力仍未被充分探索。考慮到評估自然語言生成（NLG）模型的品質是一項艱巨的任務，且 NLG 指標與人類判斷的相關性普遍較低，我們探討 ChatGPT 是否是一個好的 NLG 評估指標。本報告提供了一項關於 ChatGPT 的初步元評估，以展示其作為 NLG 指標的可靠性。具體而言，我們將 ChatGPT 視為人類評估者，給予任務特定（如摘要）和方面特定（如相關性）的指令，提示 ChatGPT 評估 NLG 模型的生成結果。我們在五個 NLG 元評估資料集（包括摘要、故事生成和資料到文本任務）上進行了實驗。實驗結果表明，與先前的自動指標相比，ChatGPT 在大多數情況下與人類判斷達到最先進或具競爭力的相關性。\n\n\n**[5× 本地 / 40 全球] 2502.06215 — LessLeak-Bench: A First Investigation of Data Leakage in LLMs Across 83 Sof**\n\n> 大型語言模型（LLMs）被廣泛用於程式碼生成和自動化程式修復等軟體工程（SE）任務。然而，其依賴龐大且通常未公開的預訓練資料集，引發了對資料洩漏的重大擔憂——即評估基準資料在模型構建階段被 LLMs 無意間「見過」。資料洩漏問題可能大幅削弱基於 LLM 的研究與評估的有效性。儘管 LLMs 在 SE 社群中的使用日益增加，但尚無全面研究評估 SE 基準中 LLMs 資料洩漏的程度。為填補這一空白，本文首次針對 83 個 SE 基準就 LLMs 的資料洩漏進行大規模分析。結果顯示，SE 基準中的資料洩漏整體而言微乎其微，Python、Java 和 C/C++ 基準的平均洩漏比例分別僅為 4.8%、2.8% 和 0.7%。然而，部分基準的洩漏比例相對較高，引發對其評估偏差的擔憂。例如，QuixBugs 和 BigCloneBench 的洩漏比例分別達 100.0% 和 55.7%。\n\n\n**[4× 本地 / 119 全球] 2402.01383 — LLM-based NLG Evaluation: Current Status and Challenges**\n\n> 評估自然語言生成（NLG）是自然語言處理中一個至關重要但充滿挑戰的問題。主要捕捉系統輸出與參考文本之間內容（如 n-gram）重疊的傳統評估指標遠未令人滿意，近年來 ChatGPT 等大型語言模型（LLMs）在 NLG 評估中展示了巨大潛力。各種基於 LLMs 的自動評估方法相繼被提出，包括從 LLMs 衍生的指標、提示 LLMs、微調 LLMs 以及人機協作評估。在本綜述中，我們首先對基於 LLM 的 NLG 評估方法進行分類，並分別討論其優缺點。最後，我們討論了該領域的若干開放問題，並指出未來研究方向。\n\n\n**[4× 本地 / 1,232 全球] 2403.04132 — Chatbot Arena: An Open Platform for Evaluating LLMs by Human Preference**\n\n> 大型語言模型（LLM）解鎖了新的能力和應用，然而評估其與人類偏好的一致性仍面臨重大挑戰。為解決這一問題，我們介紹 Chatbot Arena，一個基於人類偏好評估 LLM 的開放平台。我們的方法採用成對比較方式，透過眾包利用多樣化使用者群體的輸入。該平台已運行數月，累積超過 240K 票。本文描述了該平台，分析了迄今收集的資料，並解釋了我們用於高效準確評估和排名模型的經典統計方法。我們確認眾包問題具有足夠的多樣性和區分度，且眾包的人類投票與專家評分者的評分高度一致。這些分析共同為 Chatbot Arena 的可信度奠定了堅實基礎。憑藉其獨特價值和開放性，Chatbot Arena 已成為引用最廣泛的 LLM 排行榜之一，被領先的 LLM 開發商和公司廣泛引用。我們的演示可在 https://chat.lmsys.org 公開訪問。\n\n\n**[4× 本地 / 2,338 全球] 2303.16634 — G-Eval: NLG Evaluation using GPT-4 with Better Human Alignment**\n\n> 自然語言生成（NLG）系統所生成文本的品質難以自動衡量。傳統的基於參考的指標（如 BLEU 和 ROUGE）已被證明與人類判斷的相關性相對較低，尤其是在需要創意和多樣性的任務上。近期研究建議使用大型語言模型（LLMs）作為 NLG 評估的無參考指標，其優點是可應用於缺乏人工參考的新任務。然而，這些基於 LLM 的評估器與中等規模神經評估器相比，人類一致性仍然較低。本研究提出 G-Eval，一個利用大型語言模型結合思維鏈（CoT）和表單填寫範式來評估 NLG 輸出品質的框架。我們在文本摘要和對話生成兩個生成任務上進行實驗，結果顯示以 GPT-4 作為骨幹模型的 G-Eval 在摘要任務上與人類的 Spearman 相關性達到 0.514，大幅超越所有先前方法。我們還對基於 LLM 的評估器行為進行了初步分析，並指出了基於 LLM 的評估器存在偏向的潛在問題。\n\n\n**[4× 本地 / 8,068 全球] 2009.03300 — Measuring Massive Multitask Language Understanding**\n\n> 我們提出了一個新的測試，用於衡量文字模型的多任務準確性。該測試涵蓋 57 個任務，包括基礎數學、美國歷史、計算機科學、法律等。要在此測試中達到高準確性，模型必須擁有廣泛的世界知識和問題解決能力。我們發現，雖然大多數近期模型的準確性接近隨機猜測，但最大的 GPT-3 模型平均比隨機猜測改善了近 20 個百分點。然而，在 57 個任務的每一個上，最佳模型在達到專家級準確性之前仍需要重大改進。模型的性能也參差不齊，且常常不知道自己何時答錯。更糟糕的是，在一些社會重要主題（如道德和法律）上，它們的準確性仍接近隨機水準。通過全面評估模型學術和專業理解的廣度和深度，我們的測試可用於分析跨多任務的模型並識別重要的不足之處。\n\n\n**[3× 本地 / 234 全球] 2311.01964 — Don't Make Your LLM an Evaluation Benchmark Cheater**\n\n> 大型語言模型（LLMs）極大地推進了人工智慧的前沿，在模型能力上取得了顯著提升。為評估模型效能，一種典型方法是構建評估基準，以衡量 LLMs 在不同方面的能力水準。儘管已發布了多個高品質基準，對這些基準的適當使用以及不同模型間公平比較的關切也日益增長。考慮到這些關切，本文討論不當使用評估基準和誤導性解讀評估結果的潛在風險與影響。特別地，我們聚焦於一個可能導致不適當評估的特殊問題——基準洩漏，即與評估集相關的資料偶爾被用於模型訓練。由於預訓練資料通常在模型測試之前就已準備好，這一現象如今愈發普遍。我們進行了大量實驗研究基準洩漏的影響，發現它能大幅提升評估結果，最終導致對模型效能不可靠的評估。\n\n\n**[3× 本地 / 3,462 全球] 1804.08771 — A Call for Clarity in Reporting BLEU Scores**\n\n> 機器翻譯領域面臨一個未被充分認識的問題，即其主導指標分數報告不一致。雖然人們將其稱為「BLEU 分數」，但 BLEU 實際上是一個參數化指標，其值會隨這些參數的變化而大幅波動。這些參數通常不被報告或難以找到，因此，論文之間的 BLEU 分數無法直接比較。我本人對這種變化進行了量化，發現常用配置之間差異高達 1.8。主要原因是對參考文字應用了不同的分詞和正規化方案。指向解析社群的成功，我建議機器翻譯研究者採用年度機器翻譯會議（WMT）使用的 BLEU 方案，該方案不允許用戶提供的參考文字處理，並提供了一個新工具 SACREBLEU 以促進這一點。\n\n\n**[3× 本地 / 859 全球] 2311.07911 — Instruction-Following Evaluation for Large Language Models**\n\n> 大型語言模型（LLM）的一個核心能力是遵循自然語言指令。然而，這種能力的評估尚未標準化：人工評估昂貴、緩慢且無法客觀重現，而基於 LLM 的自動評估可能存在偏差或受評估 LLM 能力的限制。為克服這些問題，我們引入用於大型語言模型的指令跟隨評估（Instruction-Following Eval，IFEval）。IFEval 是一個簡單且易於重現的評估基準測試。它聚焦於一組「可驗證指令」，例如「以超過 400 個詞撰寫」和「至少 3 次提及關鍵詞 AI」。我們識別了 25 種此類可驗證指令，並構建了約 500 個提示，每個提示包含一個或多個可驗證指令。我們展示了市場上兩種廣泛可用的 LLM 的評估結果。我們的程式碼和資料可在 https://github.com/google-research/google-research/tree/master/instruction_following_eval 找到。\n\n\n**[3× 本地 / 183 全球] 2302.05527 — CodeBERTScore: Evaluating Code Generation with Pretrained Models of Code**\n\n> 自從能夠生成長表達式和語句而非單個下一個 token 的神經自然語言到程式碼模型（NL->Code）興起以來，可靠評估其生成輸出一直是主要問題之一。本文我們提出 CodeBERTScore：一個基於 BERTScore（Zhang et al., 2020）構建的程式碼生成評估指標。與 BERTScore 僅編碼生成的 tokens 不同，CodeBERTScore 還編碼生成程式碼前面的自然語言輸入，從而同時建模生成程式碼與其給定自然語言上下文之間的一致性。我們對四種程式語言的 CodeBERTScore 進行了廣泛評估。我們發現 CodeBERTScore 與人類偏好和功能正確性的相關性均高於所有現有指標。即，獲得更高 CodeBERTScore 分數的生成程式碼更可能被人類偏好，且在執行時功能正確的可能性也更高。我們發布了五個語言特定的預訓練模型供使用，並公開了程式碼。我們的語言特定模型已從 Huggingface Hub 下載超過 100 萬次。\n\n\n**[3× 本地 / 105 全球] 2502.06193 — Can LLMs Replace Human Evaluators? An Empirical Study of LLM-as-a-Judge in **\n\n> 近來，大型語言模型（LLMs）被部署來處理各類軟體工程（SE）任務，如程式碼生成，顯著推進了 SE 任務的自動化。然而，評估這些 LLM 生成的程式碼和文本的品質仍具挑戰性。常用的 Pass@k 指標需要大量單元測試和配置好的環境，需付出高昂的人力成本，且不適用於評估 LLM 生成的文本。僅衡量詞彙相似性而非語義相似性的傳統指標（如 BLEU）也受到質疑。對此，一個新趨勢出現，即使用 LLMs 進行自動化評估，稱為 LLM-as-a-judge。這些 LLM-as-a-judge 方法聲稱比傳統指標更能模擬人類評估，且不依賴高品質的參考答案。然而，它們在 SE 任務中與人類判斷的確切一致性仍未被探索。本文我們對 SE 任務的 LLM-as-a-judge 方法進行實證探索，重點關注其與人類判斷的一致性。我們選取了七種使用通用型 LLMs 的 LLM-as-a-judge 方法，以及兩個專為評估而微調的 LLMs。\n\n\n**[3× 本地 / 20 全球] 2411.13323 — Are Large Language Models Memorizing Bug Benchmarks?**\n\n> 大型語言模型（LLMs）已成為各類軟體工程任務的重要組成部分，包括程式碼生成、bug 偵測和修復。為評估模型在這些領域的性能，研究者開發了大量包含真實世界軟體項目 bug 的 bug 基準。然而，軟體工程社群日益擔憂這些基準可能因資料洩漏風險而無法可靠反映 LLMs 的真實性能。儘管如此，量化潛在洩漏影響的研究仍然有限。本文系統性地評估了主流 LLMs，以評估其對廣泛使用的 bug 基準資料洩漏的敏感性。為識別潛在洩漏，我們使用了多種指標，包括基準成員資格在常用訓練資料集中的研究，以及負對數似然和 5-gram 準確率分析。研究發現，某些模型（特別是 codegen-multi）在 Defects4J 等廣泛使用的基準中表現出顯著的記憶化跡象，而 LLaMa 3.1 等在更大資料集上訓練的新模型則表現出有限的洩漏跡象，凸顯了謹慎選擇基準的必要性。\n\n\n**[3× 本地 / 25 全球] 2503.04149 — Dynamic Benchmarking of Reasoning Capabilities in Code Large Language Model**\n\n> 程式碼大型語言模型的快速演進凸顯了對其推理能力進行有效且透明基準測試的需求。然而，當前基準測試方法嚴重依賴公開可用的人工創建資料集，這種廣泛使用的固定基準資料集使基準測試過程靜態化，因此特別容易受到資料污染的影響——而資料污染是訓練 Code LLMs 所用大規模資料收集過程中不可避免的後果。現有解決資料污染的方法往往受人工投入限制和問題複雜度不均衡等問題困擾。為應對這些挑戰，我們提出了一個新型基準測試套件，用於在潛在資料污染下評估 Code LLMs 的推理能力。給定一個種子程式設計問題，我們的工具讓多個 agent 在不改變核心邏輯的情況下提取和修改上下文，生成語義等效的變體。我們引入了動態資料生成方法，並在 21 個 Code LLMs 上針對兩個種子資料集進行了實證研究。結果表明，我們的工具能在污染風險下有效評估推理能力，同時生成多樣化的問題集。\n\n\n## B/B8 — Repo corpus（4 篇）\n\n\n**[7× 本地 / 60 全球] 2306.10998 — RepoFusion: Training Code Models to Understand Your Repository**\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 457 全球] 2211.15533 — The Stack: 3 TB of permissively licensed source code**\n\n> 大型語言模型（LLMs）在人工智慧領域的作用日益重要——不僅限於自然語言處理，也包括程式碼理解與生成。為推動對 Code LLMs 的開放且負責任的研究，我們推出 The Stack，一個包含 30 種程式語言下許可授權原始碼的 3.1 TB 資料集。我們描述了完整資料集的收集方式、許可授權子集的構建、資料治理計畫，並討論了限制，同時展示了在不同 Python 子集上訓練 350M 參數解碼器的 text2code 基準測試中的有前景結果。我們發現：(1) 對資料進行近似去重能顯著提升所有實驗的性能；(2) 僅使用許可授權資料即可匹配此前報告的 HumanEval 和 MBPP 性能。資料集已在 https://hf.co/BigCode 提供，我們還提供了名為「Am I in The Stack」的工具供開發者搜尋其程式碼，並提供了按 https://www.bigcode-project.org/docs/about/the-stack 說明從資料集中刪除程式碼的流程。\n\n\n**[3× 本地 / 121 全球] 2406.12952 — SWT-Bench: Testing and Validating Real-World Bug-Fixes with Code Agents**\n\n> 嚴格的軟體測試對於開發和維護高品質程式碼至關重要，自動化測試生成因此成為改善軟體品質和提升程式碼生成方法效果的有前景途徑。然而，儘管基於大型語言模型（LLMs）的程式碼生成是異常活躍的研究領域，測試生成相對尚未得到充分探索。我們致力於填補這一空白，探究基於 LLM 的 Code Agents 將用戶問題形式化為測試用例的能力。為此，我們提出了一個基於流行 GitHub 儲存庫、包含真實世界問題、基礎真相 bug 修復和黃金測試的新基準。我們發現 LLMs 在生成相關測試用例方面總體表現出乎意料地好，設計用於程式碼修復的 Code Agents 甚至超越了專門為測試生成設計的系統。此外，由於測試生成是比程式碼生成更結構化的相似任務，通過問題復現率和覆蓋率變化的雙指標能夠進行更細粒度的分析。最後，生成的測試對提出的修復 patch 是有效的過濾器。\n\n\n**[3× 本地 / 178 全球] 1707.02275 — A Parallel Corpus of Python Functions and Documentation Strings for Automat**\n\n> 程式原始碼的自動化文件生成和從自然語言自動生成程式碼，是具有重要實用與科學價值的挑戰性任務。由於程式碼與自然語言描述的平行語料庫可用性較低且通常規模小且局限於特定領域，這些領域的進展受到限制。本研究透過爬取 GitHub 上的開源儲存庫，建立了一個大規模且多樣化的平行語料庫，包含十萬個帶有文件字串（docstrings）的 Python 函數。我們描述了通過神經機器翻譯取得的程式碼文件生成與程式碼生成任務的基準結果，並實驗了資料增強技術以進一步增加訓練資料量，最後發布了資料集和處理腳本以促進相關領域的研究。\n\n\n# [G] survey/position（81 篇）\n\n\n## G/G1 — LLM4SE survey（9 篇）\n\n\n**[21× 本地 / 961 全球] 2308.10620 — Large Language Models for Software Engineering: A Systematic Literature Rev**\n\n> 大型語言模型（LLMs）對許多領域產生了重大影響，包括軟體工程（SE）。許多近期研究探索了 LLMs 在各種 SE 任務中的應用。然而，對 LLMs 在 SE 中的應用、效果和可能侷限性的全面理解仍處於早期階段。為填補這一空白，我們對 LLM4SE 進行了系統文獻綜述（SLR），特別關注如何利用 LLMs 優化流程和結果。我們從 2017 年 1 月至 2024 年 1 月選取並分析了 395 篇研究論文，以回答四個關鍵研究問題（RQs）。在 RQ1 中，我們對 SE 任務中使用的不同 LLMs 進行分類，描述其特點和用途。在 RQ2 中，我們分析資料收集、預處理和應用中使用的方法，強調了精心策劃的資料集對成功實施 LLM for SE 的重要性。RQ3 研究了優化和評估 LLMs 在 SE 中性能的策略。最後，RQ4 考察了 LLMs 迄今已取得成功的具體 SE 任務，說明其對該領域的實際貢獻。\n\n\n**[13× 本地 / 440 全球] 2310.03533 — Large Language Models for Software Engineering: Survey and Open Problems**\n\n> 本文對大型語言模型（LLMs）在軟體工程（SE）領域的新興應用進行了綜述，並提出了將 LLMs 應用於軟體工程師所面臨技術問題的開放性研究挑戰。LLMs 的湧現特性為整個軟體工程活動帶來了創新性，涵蓋程式設計、設計、需求、修復、重構、效能改進、文件記錄與分析等。然而，這些湧現特性也帶來了重大技術挑戰，我們需要能夠可靠剔除不正確解決方案（如幻覺）的技術。我們的綜述揭示了混合技術（傳統 SE 加 LLMs）在開發和部署可靠、高效、有效的基於 LLM 的 SE 中的關鍵作用。\n\n\n**[8× 本地 / 118 全球] 2312.15223 — A Survey on Large Language Models for Software Engineering**\n\n> 軟體工程（SE）是對支撐我們現代世界數位基礎設施的軟體應用進行系統設計、開發、維護和管理。近期，SE 社群看到越來越多利用大型語言模型（LLMs）自動化廣泛 SE 任務的技術。然而，關於 LLMs 在 SE 中的應用、效果和可能侷限性的現有信息仍未得到充分研究。在本文中，我們提供了一份系統性調查，以總結基於 LLM 的 SE 社群中的最新研究現狀。我們總結了三種模型架構中的 62 個代表性程式碼 LLMs、四大類中的 15 個預訓練目標，以及五大類中的 16 個下游任務。然後，我們對 LLMs 常用的近期 SE 研究進行了詳細總結，包括 SE 工作流程中五個關鍵階段的 112 個特定程式碼相關任務的 926 篇研究。我們還討論了將 LLMs 整合到 SE 中的幾個關鍵方面，如實證評估、基準測試、安全性與可靠性、領域微調、壓縮和知識蒸餾。\n\n\n**[6× 本地 / 83 全球] 2310.08879 — A Critical Review of Large Language Model on Software Engineering: An Examp**\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 35 全球] 2410.06107 — Towards AI-Native Software Engineering (SE 3.0): A Vision and a Challenge R**\n\n> 以基礎模型（FMs）和 FM 驅動的程式碼助手為核心的 AI 輔助軟體工程（SE 2.0）的興起，在提升開發者生產力方面展現了潛力，但也暴露了其固有局限，如開發者認知負擔加重和效率低下等問題。我們提出向軟體工程 3.0（SE 3.0）轉型，這是一種以意圖為中心、以人類開發者與 AI 隊友之間對話式開發為特徵的 AI 原生方法。SE 3.0 設想 AI 系統超越任務驅動的副駕駛，演化為能夠深度理解並推理軟體工程原則和意圖的智慧協作者。我們概述了 SE 3.0 技術棧的關鍵組件，包括支援自適應個性化 AI 夥伴關係的 Teammate.next、支援意圖中心對話式開發的 IDE.next、支援多目標程式碼合成的 Compiler.next，以及支援具備邊緣計算的 SLA 感知執行的 Runtime.next。我們的願景透過促進人類開發者與 AI 之間的共生關係，發揮雙方互補優勢，解決 SE 2.0 的效率低下和認知壓力問題。\n\n\n**[4× 本地 / 164 全球] 2308.11396 — Towards an understanding of large language models in software engineering t**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 944 全球] 2402.06196 — Large Language Models: A Survey**\n\n> 自 2022 年 11 月 ChatGPT 發布以來，大型語言模型（LLMs）因其在廣泛自然語言任務上的強大性能而備受關注。LLMs 通用語言理解與生成能力通過在海量文本資料上訓練數十億模型參數獲得，這一過程由 scaling laws 所預測。LLMs 的研究領域雖然非常新近，卻正在多個維度上快速演進。本文回顧了一些最具代表性的 LLMs，包括三個流行的 LLM 系列（GPT、LLaMA、PaLM），並討論其特點、貢獻與局限性。我們還概述了構建和增強 LLMs 的各種技術，調查了用於 LLM 訓練、微調和評估的流行資料集，回顧了廣泛使用的 LLM 評估指標，並比較了多個流行 LLMs 在一組代表性基準測試上的性能。最後，我們通過討論開放挑戰和未來研究方向作為本文的總結。\n\n\n**[3× 本地 / 594 全球] 2307.07221 — Software Testing With Large Language Models: Survey, Landscape, and Vision**\n\n> 預訓練大型語言模型（LLMs）最近作為一種突破性技術在自然語言處理和人工智慧領域興起，具有處理大規模資料集和在廣泛任務中展現出色性能的能力。與此同時，軟體測試是確保軟體產品質量和可靠性的基石性工作。隨著軟體系統的範圍和複雜性持續增長，對更有效軟體測試技術的需求變得日益迫切，使其成為適合採用 LLMs 等創新方法的領域。本文對 LLMs 在軟體測試中的應用進行了全面綜述。它從軟體測試和 LLMs 兩個視角分析了 102 篇利用 LLMs 進行軟體測試的相關研究。論文對 LLMs 常用的軟體測試任務進行了詳細討論，其中測試案例準備和程式修復是最具代表性的。它還分析了常用的 LLMs、採用的提示工程類型，以及與這些 LLMs 配套的技術。\n\n\n**[3× 本地 / 1,618 全球] 2307.06435 — A Comprehensive Overview of Large Language Models**\n\n> 大型語言模型（LLMs）近來在自然語言處理任務及其他領域展示了卓越的能力，這一成功引發了大量研究貢獻。這些研究涵蓋多樣化主題，包括架構創新、更好的訓練策略、上下文長度改進、微調、多模態 LLMs、機器人技術、資料集、基準評估、效率等。隨著技術的快速發展和 LLM 研究的頻繁突破，全面掌握這一方向的進展已相當具有挑戰性。考慮到 LLMs 相關文獻的快速增長，研究社群需要對該領域近期發展有一個簡明而全面的概述。本文對廣泛的 LLM 相關概念進行了文獻綜述，自成體系地綜述了 LLMs，涵蓋相關背景概念並介紹了 LLM 研究前沿的進階主題。本綜述文章旨在提供系統性調查，同時也是一份快速、全面的概覽。\n\n\n## G/G2 — LLM4APR survey（7 篇）\n\n\n**[12× 本地 / 62 全球] 2405.01466 — A Systematic Literature Review on Large Language Models for Automated Progr**\n\n> 自動化程式修復（APR）旨在修補軟體錯誤並減少人工除錯工作。近年來，隨著大型語言模型（LLMs）的進步，大量基於 LLM 的 APR 技術被相繼提出，顯著促進了軟體開發與維護，並展現出卓越效能。然而，由於 LLM 基礎 APR 領域持續探索，研究人員難以掌握當前成果、挑戰與潛在機遇。本研究提供了首篇系統性文獻綜述，總結了 2020 年至 2025 年間 LLMs 在 APR 中的應用。我們從 LLMs、APR 及其整合三個視角分析了 189 篇相關論文。首先，我們對應用於支援 APR 的現有熱門 LLMs 進行分類，並概述四種部署利用策略。此外，我們詳述了受益於 LLMs 的特定修復場景（如語義錯誤與安全漏洞）。進一步，我們討論了將 LLMs 整合至 APR 研究的幾個關鍵面向（如輸入形式與開放科學）。最後，我們指出了一系列仍待探索的挑戰與潛在研究方向。\n\n\n**[5× 本地 / 1 全球] 2506.23749 — A Survey of LLM-based Automated Program Repair: Taxonomies, Design Paradigm**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 226 全球] 2302.05020 — Impact of Code Language Models on Automated Program Repair**\n\n> 自動化程式修復（APR）旨在透過生成修補方案幫助開發者提升軟體可靠性。儘管許多程式碼語言模型（CLM）已被開發並在程式碼補全等多種軟體任務中表現有效，但對 CLMs 修復能力的全面深入評估，以及針對 APR 任務微調 CLMs 的研究仍相對匱乏。首先，本研究首次在四個 APR 基準上評估了十個 CLMs，結果令人驚訝：直接使用最佳 CLM 修復的錯誤比最先進的深度學習（DL）APR 技術多 72%。其次，四個基準中有一個是我們在本文中創建的，以避免資料洩漏，確保公平評估。第三，本研究首次以 APR 訓練資料微調 CLMs，顯示微調帶來了 31%-1,267% 的改進，使 CLMs 能夠比現有 DL-based APR 技術多修復 46%-164% 的錯誤。第四，本研究研究了缺陷行的影響，顯示 CLMs 無法充分利用缺陷行修復錯誤，而微調後的 CLMs 可能過度依賴缺陷行。\n\n\n**[4× 本地 / 35 全球] 2411.10213 — An Empirical Study on LLM-based Agents for Automated Bug Fixing**\n\n> 大型語言模型（LLMs）和基於 LLM 的 Agent 已被應用於自動修復錯誤，展示了通過與開發環境互動、迭代驗證和程式碼修改來解決軟體缺陷的能力。然而，對這些 Agent 系統的系統性分析仍然有限，尤其是在頂尖系統之間的效能差異方面。本文在 SWE-bench Verified 基準上檢視了六個用於自動錯誤修復的修復系統。我們首先評估每個系統的整體效能，注意所有或無任何系統均能解決的實例，並探索不同系統的能力。我們還在檔案和程式碼符號層級比較故障定位準確性，並評估錯誤重現能力。透過分析，我們得出結論，需要在 LLM 自身能力和 Agentic 流程設計兩方面進一步優化，以提升 Agent 在錯誤修復中的有效性。\n\n\n**[3× 本地 / 368 全球] 2301.08653 — An Analysis of the Automatic Bug Fixing Performance of ChatGPT**\n\n> 為協助軟體開發者發現並修復軟體錯誤，多種自動化程式修復技術已被引入。給定一個測試套件，標準方法通常或者合成修復，或者在軟體編輯搜索空間中導航以尋找通過測試套件的變體。近期程式修復方法基於深度學習方法。ChatGPT 是其中一種並非主要為自動化程式修復設計但仍適用的新型方法。然而，ChatGPT 的錯誤修復效能至今尚不明確。因此，本文在標準錯誤修復基準集 QuixBugs 上評估 ChatGPT，並與文獻中其他方法的結果進行比較。我們發現 ChatGPT 的錯誤修復效能與常見深度學習方法 CoCoNut 和 Codex 相當，且顯著優於標準程式修復方法的報告結果。與先前方法不同，ChatGPT 提供了對話系統，可輸入進一步資訊（如特定輸入的預期輸出或觀察到的錯誤訊息）。通過向 ChatGPT 提供此類提示，其效能可進一步提升。\n\n\n**[3× 本地 / 10 全球] 2410.07516 — Exploring and Lifting the Robustness of LLM-powered Automated Program Repai**\n\n> 近年來，基於大型語言模型的自動程式修復（LAPR）技術達到了最優水準的 bug 修復性能，並在工業界和學術界被廣泛應用和研究。然而，LLMs 已被證明對輸入 prompt 高度敏感，語義等效程式表達上的細微差異就可能導致修復失敗。因此，在實際部署前對 LAPR 技術進行魯棒性測試至關重要，但相關研究仍然稀少。為此，我們提出 MT-LAPR，一個專門針對 LAPR 技術的蛻變測試（Metamorphic Testing）框架，總結了開發者在 token、語句和 block 三個擾動層次上廣泛認可的 9 種蛻變關係（MRs）。隨後，我們的 MRs 被應用於缺陷程式碼以生成語義等效但不影響 LAPR 推理的測試用例。實驗在兩個廣泛研究的 bug 修復資料集（Defect4J 和 QuixBugs）以及四個最近發布的具備 bug 修復能力的 LLMs 上進行，結果顯示平均 34.4%~48.5% 的測試用例暴露了 LAPR 技術的不穩定性。\n\n\n**[3× 本地 / 341 全球] 2210.14179 — Automated Program Repair in the Era of Large Pre-trained Language Models**\n\n> 自動化程式修復（APR）旨在幫助開發人員自動修補軟體錯誤。然而，目前最先進的傳統和基於學習的 APR 技術面臨補丁多樣性有限的問題，無法修復複雜的錯誤。這主要是由於依賴錯誤修復資料集來製作修復模板（傳統）或直接預測潛在補丁（基於學習）。在數十億文字/程式碼 token 上訓練的大型預訓練語言模型（LLMs）有可能幫助避免這個問題。近期，研究人員直接利用 LLMs 進行 APR，而不依賴任何錯誤修復資料集。然而，此類現有工作要麼未能包含最先進的 LLMs，要麼未在現實資料集上進行評估。因此，現代 LLMs 在重要的 APR 問題上的真正能力尚待揭示。在本研究中，我們首次對直接應用 LLMs 進行 APR 進行了廣泛研究。我們選取了 9 個近期最先進的 LLMs，包括生成型和填充型模型，規模從 125M 到 20B 不等。我們設計了 3 種不同的修復設置來評估使用 LLMs 生成補丁的不同方式：1) 生成整個補丁函數；2) 填充補丁；3) 其他設置。\n\n\n## G/G3 — LLM-Agent survey（14 篇）\n\n\n**[19× 本地 / 181 全球] 2409.02977 — Large Language Model-Based Agents for Software Engineering: A Survey**\n\n> 大型語言模型（LLM）的最新進展催生了一種新的 AI 智能體範式，即基於 LLM 的智能體。與獨立 LLM 相比，基於 LLM 的智能體透過增強 LLM 感知和利用外部資源及工具的能力，大幅擴展了 LLM 的多功能性和專業性。迄今為止，基於 LLM 的智能體已被應用於軟體工程（SE）並展現出顯著的有效性。多智能體協同與人機互動的結合在解決複雜的現實 SE 問題方面帶來了更多前景。本研究對用於 SE 的基於 LLM 的智能體進行全面系統的綜述。我們收集了 124 篇論文，從 SE 和智能體兩個視角對其進行分類。此外，我們討論了這一關鍵領域的開放挑戰和未來方向。本綜述的儲存庫位於 https://github.com/FudanSELab/Agent4SE-Paper-List。\n\n\n**[10× 本地 / 110 全球] 2408.02479 — From LLMs to LLM-based Agents for Software Engineering: A Survey of Current**\n\n> 隨著大型語言模型（LLMs）的興起，研究人員正越來越多地探索其在軟體工程等各垂直領域的應用。LLMs 在程式碼生成與漏洞偵測等領域取得了顯著成功，但也存在諸多局限與不足。基於 LLM 的 agent 是一種具備通用人工智慧（AGI）潛力的新型技術，以 LLMs 為決策與行動核心，解決了 LLMs 固有的部分局限（如缺乏自主性與自我改進能力）。儘管已有大量研究與綜述探索 LLMs 在軟體工程中的應用可能性，但 LLMs 與基於 LLM 的 agent 之間仍缺乏清晰的界定，在特定領域中認定 LLM 解決方案為基於 LLM 的 agent 的統一標準與基準也尚在初步階段。本綜述廣泛調研了 LLMs 與基於 LLM 的 agent 在軟體工程中的當前實踐與解決方案，特別總結了六個關鍵主題：需求工程、程式碼生成、自主決策、軟體設計、測試生成與軟體維護。\n\n\n**[9× 本地 / 76 全球] 2407.07959 — Source Code Summarization in the Era of Large Language Models**\n\n> 為支援軟體開發人員理解和維護程式，已提出了各種自動（原始碼）摘要技術，為給定的程式碼片段生成簡潔的自然語言摘要（即注釋）。最近，大型語言模型（LLMs）的出現大幅提升了程式碼相關任務的性能。在本文中，我們對 LLMs 時代的程式碼摘要進行了系統且全面的研究，涵蓋基於 LLM 的程式碼摘要工作流程中的多個方面。具體而言，我們首先審視了評估 LLMs 生成摘要品質的自動化評估方法，發現 GPT-4 評估方法的結果與人工評估最為接近。然後，我們探索了五種提示技術（零樣本、少樣本、思維鏈、批評和專家）在使 LLMs 適應程式碼摘要任務中的有效性。與預期相反，高級提示技術的性能不一定優於簡單的零樣本提示。接下來，我們研究了 LLMs 的模型設置（包括 top_p 和 temperature 參數）對生成摘要品質的影響。\n\n\n**[9× 本地 / 1,719 全球] 2309.07864 — The Rise and Potential of Large Language Model Based Agents: A Survey**\n\n> _(無 abstract 中譯)_\n\n\n**[9× 本地 / 899 全球] 2402.01680 — Large Language Model based Multi-Agents: A Survey of Progress and Challenge**\n\n> 大型語言模型（LLMs）在廣泛的任務中取得了顯著成功。憑藉其在規劃和推理方面的突出能力，LLMs 已被用作自主 agent 以自動執行各類任務。近來，基於 LLM 的 agent 系統已從單 agent 規劃或決策快速演進為多 agent 系統，增強了其在複雜問題解決和世界模擬中的能力。為了概覽這一充滿活力的領域，本調查研究對基於 LLM 的多 agent（LLM-MA）系統的關鍵方面和挑戰進行深入討論。我們的目標是讓讀者深入理解以下關鍵要點：LLM-MA 系統運行或模擬的領域和設定；這些 agent 的角色設定和通訊方式；以及這些 agent 發展其能力的手段。對於有意深入這一領域的研究者，我們還總結了常用的資料集或基準測試。為使研究人員了解最新研究，我們維護了一個開源 GitHub 儲存庫（github.com/taichengguo/LLM_MultiAgents_Survey_Papers），專注於概述相關研究。\n\n\n**[6× 本地 / 101 全球] 2508.00083 — A Survey on Code Generation with LLM-based Agents**\n\n> _(無 abstract 中譯)_\n\n\n**[6× 本地 / 17 全球] 2502.13767 — Agentic AI Software Engineers: Programming with Trust**\n\n> LLM agent 如何呈現 AI 軟體工程的未來工作流程，以及程式設計的重點是否會從規模轉向信任。\n\n\n**[5× 本地 / 206 全球] 2404.04834 — LLM-Based Multi-Agent Systems for Software Engineering: Literature Review, **\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 343 全球] 2503.13657 — Why Do Multi-Agent LLM Systems Fail?**\n\n> 儘管人們對多智慧體 LLM 系統（MAS）充滿熱情，但它們在流行基準上的性能提升往往微乎其微。這一差距凸顯了對 MAS 失敗原因進行有原則理解的迫切需求。解決這個問題需要系統地識別和分析失敗模式。我們介紹 MAST-Data，一個在 7 個流行 MAS 框架中收集的超過 1600 個標注軌跡的全面資料集。MAST-Data 是第一個概述 MAS 故障動態的多 agent 系統資料集，用於指導未來更好系統的開發。為了實現對 MAST-Data 失敗的系統分類，我們構建了第一個多 agent 系統失敗分類法（MAST）。我們通過嚴格分析 150 個軌跡（在專家人工標注員的密切指導下）開發了 MAST，並通過高標注者間一致性（kappa = 0.88）進行了驗證。這一過程識別了 14 種獨特模式，聚類為 3 個類別：(i) 系統設計問題、(ii) 智慧體間不一致性和 (iii) 任務驗證。為了實現可擴展的標注，我們開發了一個與人工標注高度一致的 LLM-as-a-Judge 流水線。我們利用 MAST 和 MAST-Data 分析了跨模型（GPT4、Claude 等）的失敗模式。\n\n\n**[4× 本地 / 430 全球] 2402.02716 — Understanding the planning of LLM agents: A survey**\n\n> 隨著大型語言模型（LLMs）展現出顯著的智能，利用 LLMs 作為自主 Agent 規劃模組的研究進展吸引了越來越多的關注。本調查首次提供了基於 LLM 的 Agent 規劃的系統性視角，涵蓋近期旨在提升規劃能力的研究。我們提供了 LLM-Agent 規劃現有研究的分類體系，可分為任務分解、計劃選擇、外部模組、反思和記憶五大類。對每個方向進行了全面分析，並進一步討論了該研究領域面臨的挑戰。\n\n\n**[4× 本地 / 350 全球] 2505.10468 — AI Agents vs. Agentic AI: A Conceptual Taxonomy, Applications and Challenge**\n\n> 本綜述對 AI Agents（人工智慧代理）與 Agentic AI（代理式人工智慧）進行了深入辨析，提供了結構化的概念分類體系、應用映射以及機遇與挑戰分析，以釐清兩者不同的設計哲學與能力。我們首先概述了搜索策略和基礎定義，將 AI Agents 定性為由 LLMs 和 LIMs 驅動的模組化系統，用於任務特定的自動化。生成式 AI 被定位為提供基礎的先驅，AI agents 則通過工具整合、prompt engineering 和推理增強而進一步發展。接著，我們描述了 Agentic AI 系統的特徵——與 AI Agents 相比，它代表了一種以多 agent 協作、動態任務分解、持久記憶和協調自主性為標誌的範式轉變。通過對架構演進、運行機制、互動風格和自主級別的時序評估，我們對兩類範式進行了比較分析。AI Agents 支援的應用領域（如客戶支援、日程安排和資料摘要）與 Agentic AI 在研究自動化、機器人協同等場景的部署形成對比。\n\n\n**[3× 本地 / 2,887 全球] 2308.11432 — A survey on large language model based autonomous agents**\n\n> 自主 Agent 長期以來一直是學術界和業界的研究焦點。先前的研究通常聚焦於在孤立環境中用有限知識訓練 Agent，這與人類學習過程存在顯著差異，使 Agent 難以做出類似人類的決策。近期，通過獲取大量網路知識，大型語言模型（LLMs）展現出人類水準的智能潛力，推動了基於 LLM 的自主 Agent 研究的浪潮。本文從整體視角對這些研究進行全面調查，系統性地回顧了基於 LLM 的自主 Agent。我們首先討論基於 LLM 的自主 Agent 的構建，提出一個涵蓋大量先前研究的統一框架。然後，我們概述基於 LLM 的自主 Agent 在社會科學、自然科學和工程領域的多樣化應用。最後，我們深入探討基於 LLM 的自主 Agent 常用的評估策略。基於先前的研究，我們還指出了該領域的若干挑戰和未來方向。\n\n\n**[3× 本地 / 136 全球] 2402.03578 — LLM Multi-Agent Systems: Challenges and Open Problems**\n\n> 本文探討多智能體系統，並識別尚未得到充分解決的挑戰。透過利用各個智能體的多樣化能力和角色，多智能體系統可以透過智能體協作來處理複雜任務。我們討論了最佳化任務分配、透過迭代辯論促進穩健推理、管理複雜和分層的上下文資訊，以及增強記憶體管理以支持多智能體系統內複雜互動的問題。我們還探討了多智能體系統在區塊鏈系統中的潛在應用，以揭示其在真實世界分散式系統中的未來發展和應用前景。\n\n\n**[3× 本地 / 3 全球] 2512.22256 — Agentic Software Issue Resolution with Large Language Models: A Survey**\n\n> 軟體問題解決旨在根據使用者提供的自然語言描述解決軟體儲存庫中的真實問題（如錯誤修復和效率最佳化），代表了軟體維護的關鍵面向。隨著大型語言模型（LLMs）推理與生成能力的快速發展，基於 LLM 的方法在自動化軟體問題解決上取得了顯著進展。然而，真實的軟體問題解決固有地複雜，需要長程推理、迭代探索和反饋驅動的決策，這些都要求超越傳統單步方法的 agent 能力。近期，基於 LLM 的 agent 系統已成為軟體問題解決的主流。agent 軟體問題解決的進展不僅大幅提升了軟體維護的效率和品質，也為驗證 agent 系統的推理、規劃和執行能力提供了現實環境，架起了人工智慧與軟體工程之間的橋樑。本研究對處於 LLM 基礎 agent 軟體問題解決研究前沿的 126 項近期研究進行了系統性綜述。\n\n\n## G/G4 — Code Gen survey（12 篇）\n\n\n**[28× 本地 / 896 全球] 2406.00515 — A Survey on Large Language Models for Code Generation**\n\n> 大型語言模型（LLMs）在各類程式碼相關任務（即 Code LLMs）中取得了顯著進展，尤其是程式碼生成——根據自然語言描述使用 LLM 生成原始碼。這一蓬勃發展的領域因其在軟體開發中的實際意義（例如 GitHub Copilot）而引發了學術研究人員和業界人士的廣泛關注。儘管從自然語言處理（NLP）和軟體工程（SE）的不同視角對 LLMs 在各類程式碼任務上的應用進行了積極探索，但專門針對 LLM 程式碼生成的全面且最新的文獻綜述仍明顯缺乏。在本調查研究中，我們旨在透過提供系統性文獻回顧來填補這一空白，為研究 LLMs 程式碼生成最新進展的研究人員提供有價值的參考。我們引入分類體系，對 LLMs 程式碼生成的近期發展進行分類和討論，涵蓋資料整理、最新進展、性能評估、倫理影響、環境影響和實際應用等方面。\n\n\n**[9× 本地 / 111 全球] 2311.07989 — Unifying the Perspectives of NLP and Software Engineering: A Survey on Lang**\n\n> 本研究系統性地回顧了語言模型在軟體工程中的近期進展，涵蓋 70+ 個模型、40+ 個評估任務、180+ 個資料集以及 900 篇相關研究。與先前研究不同，我們透過從雙方視角討論，將軟體工程（SE）與自然語言處理（NLP）加以整合：SE 將語言模型用於開發自動化，而 NLP 則採用 SE 任務來評估語言模型。我們將程式碼處理模型分為以 GPT 家族為代表的通用語言模型，以及專門針對程式碼預訓練（通常具有客製化目標）的專用模型。我們討論了這些模型之間的關聯與差異，並強調了程式碼建模從統計模型和 RNNs 到預訓練 Transformers 和 LLMs 的歷史演變——這與 NLP 所走過的道路完全相同。我們還超越程式設計範疇，回顧了 LLMs 在需求工程、測試、部署和運維等其他軟體工程活動中的應用，致力於提供 NLP 在 SE 中的全局視野，並指出該領域的關鍵挑戰與潛在未來方向。\n\n\n**[9× 本地 / 106 全球] 2311.10372 — A Survey of Large Language Models for Code: Evolution, Benchmarking, and Fu**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 862 全球] 2202.13169 — A systematic evaluation of large language models of code**\n\n> 程式碼大型語言模型（LMs）近期在程式碼補全和從自然語言描述合成程式碼方面展現出巨大潛力。然而，目前最先進的程式碼 LMs（如 Codex）尚未公開發布，留下了許多關於其模型和資料設計決策的疑問。我們旨在透過對現有最大模型——Codex、GPT-J、GPT-Neo、GPT-NeoX-20B 和 CodeParrot——在各種程式語言上進行系統性評估，填補部分空白。儘管 Codex 本身非開源，我們發現現有開源模型在某些程式語言上確實能達到接近的結果，儘管這些模型主要針對自然語言建模。我們進一步識別出一個重要的缺口：缺乏一個專門在多語言程式碼語料庫上訓練的大型開源模型。我們發布了 PolyCoder，一個基於 GPT-2 架構的 27 億參數模型，在一台機器上用 249GB 跨 12 種程式語言的程式碼進行訓練。在 C 程式語言上，PolyCoder 的表現超越包括 Codex 在內的所有模型。\n\n\n**[4× 本地 / 89 全球] 2407.06153 — What is wrong with your code generated by large language models? An extensi**\n\n> 大型語言模型（LLMs）在程式碼生成方面日益增多的發展引起了研究人員的廣泛關注。為增強基於 LLM 的程式碼生成能力，當前努力主要集中在收集高品質資料集和利用多樣化訓練技術。然而，缺乏對現有方法局限性和邊界的全面研究。為填補這一空白，我們進行了一項廣泛的實證研究，在三個常用基準上評估三個領先的閉源 LLMs 和六個流行的開源 LLMs 的性能。我們的調查評估了生成程式碼的長度、循環複雜度和 API 數量，揭示這些 LLMs 在為更複雜的問題生成成功程式碼方面面臨挑戰，且傾向於生成比標準解答更短但更複雜的程式碼。此外，我們開發了一個包含三個類別和十個子類別的錯誤分類體系，並分析了常見錯誤類型的根本原因。為更好地理解 LLMs 在真實世界項目中的性能，我們還手動創建了一個真實世界基準。\n\n\n**[3× 本地 / 1,719 全球] 2305.01210 — Is Your Code Generated by ChatGPT Really Correct? Rigorous Evaluation of La**\n\n> 程式合成長期以來受到廣泛研究，近期方法聚焦於直接利用大型語言模型（LLMs）的能力生成程式碼。程式設計基準採用精心整理的合成問題和測試案例，用以衡量各種 LLMs 在程式碼合成上的性能。然而，這些測試案例在數量和品質上可能都不足以全面評估生成程式碼的功能正確性。現有基準的這一局限引發了以下問題：在 LLMs 時代，生成的程式碼是否真的正確？為此，我們提出 EvalPlus——一個嚴格評估 LLM 合成程式碼功能正確性的程式碼合成評估框架。EvalPlus 透過由基於 LLM 和基於突變的策略驅動的自動測試輸入生成器，用大量新生成的測試案例來擴充給定的評估資料集。EvalPlus 具有通用性，我們將流行的 HumanEval 基準的測試案例擴充了 80 倍，構建了 HumanEval+。我們對 26 個流行 LLMs（如 GPT-4 和 Ch 究呈爆炸式增長。然而，LLM 的輸出可能具有高度不穩定性，對於相同的提示會非確定性地返回非常不同的程式碼。這種非確定性影響生成程式碼的正確性和一致性，削弱開發者對 LLM 的信任，並導致基於 LLM 的研究論文可重現性低。儘管如此，目前尚無研究調查這種非確定性威脅的嚴重程度。為填補這一空缺，本文對 ChatGPT 在程式碼生成中的非確定性進行實證研究。我們選擇研究 ChatGPT 是因為它已在程式碼生成研究文獻中非常普遍。我們報告了跨三個程式碼生成基準（即 CodeContests、APPS 和 HumanEval）的 829 個程式碼生成問題的研究結果，涵蓋三個程式碼相似性方面：語義相似性、句法相似性和結構相似性。我們的結果揭示，在預設設定下，ChatGPT 表現出高度的非確定性：在不同請求中測試輸出零相等率的編碼任務比例為 75.76%、51% 等。\n\n\n**[4× 本地 / 1,730 全球] 2302.04023 — A Multitask, Multilingual, Multimodal Evaluation of ChatGPT on Reasoning, H**\n\n> 本文提出了一個使用公開可用資料集對交互式 LLMs（如 ChatGPT）進行定量評估的框架。我們使用涵蓋 8 個不同常見 NLP 應用任務的 23 個資料集對 ChatGPT 進行了廣泛的技術評估。我們基於這些資料集和一個新設計的多模態資料集評估了 ChatGPT 的多任務、多語言和多模態方面。我們發現 ChatGPT 在大多數任務上以零樣本學習超越 LLMs，甚至在某些任務上超越了微調模型。我們發現它比生成非拉丁文字語言更擅長理解它們。它能夠通過中間程式碼生成步驟從文字提示生成多模態內容。此外，我們發現 ChatGPT 在邏輯推理、非文字推理和常識推理下的 10 個不同推理類別中平均準確率為 63.41%，因此它是一個不可靠的推理者。例如，它在演繹推理方面優於歸納推理。ChatGPT 與其他 LLMs 一樣存在幻覺問題，由於沒有訪問外部知識庫，它從其參數記憶中生成更多外生幻覺。\n\n\n**[3× 本地 / 27 全球] 2509.14745 — On the Use of Agentic Coding: An Empirical Study of Pull Requests on GitHub**\n\n> 大型語言模型（LLM）正日益整合到軟體開發流程中。透過自主 AI 智能體的使用，在極少人工干預下生成程式碼並提交 pull request 的能力，即將成為標準實踐。然而，關於這些 pull request 的實際效用以及其貢獻在真實世界專案中被接受的程度，目前所知甚少。本文對使用 Claude Code（一種智能體編碼工具）在 157 個多樣化開源專案中生成的 567 個 GitHub pull request（PR）進行實證研究。我們的分析揭示，開發者傾向於依賴智能體執行重構、文件撰寫和測試等任務。結果表明，83.8% 的這些智能體輔助 PR 最終被專案維護者接受並合併，其中 54.9% 的合併 PR 無需進一步修改即可整合。剩餘的 45.1% 需要額外更改並受益於人工修訂，尤其是在錯誤修復、文件撰寫和遵守特定專案規範方面。這些發現表明，雖然智能體輔助的 PR 在很大程度上是可接受的，但仍然受益於人工監督和改進。\n\n\n**[3× 本地 / 35 全球] 2406.09834 — LLMs Meet Library Evolution: Evaluating Deprecated API Usage in LLM-Based C**\n\n> 在大型程式碼語料庫上預訓練或微調的大型語言模型（LLMs）在生成程式碼補全方面表現出色。然而，在基於 LLM 的程式碼補全中，由於函式庫的快速持續演進，LLMs 可能難以使用正確且最新的應用程式設計介面（APIs）。雖然已有研究指出預測不正確 API 的問題，但基於 LLM 的程式碼補全中廢棄 API 使用的具體問題尚未得到深入研究。為填補這一空白，我們進行了首個針對基於 LLM 的程式碼補全中廢棄 API 使用的評估研究，涉及 7 個先進 LLMs、來自 8 個流行 Python 函式庫的 145 個 API 映射以及 28,125 個補全 prompt。研究結果揭示了基於 LLM 的程式碼補全中廢棄 API 與替代 API 使用的現狀（從模型、prompt 和函式庫的視角），並指出了背後的根本原因。基於這些發現，我們提出了兩種輕量修復方法 Replaceapi 和 InsertPrompt，可作為未來緩解廢棄 API 使用研究的基準方法。\n\n\n**[3× 本地 / 43 全球] 2305.12138 — LMs: Understanding Code Syntax and Semantics for Code Analysis**\n\n> 大型語言模型（LLM）在程式碼和文件生成等軟體工程（SE）任務中展現出卓越的效能，具有徹底變革軟體工程的重大潛力。然而，軟體工程中的高可靠性和風險控制要求引發了對 LLM 缺乏可解釋性的擔憂。為解決這一問題，我們進行了一項研究，評估 LLM 在 SE 中程式碼分析方面的能力及其局限性。我們將 AI 模型應對 SE 中程式碼分析相關任務所需的能力分解為三類：1）語法理解，2）靜態行為理解，和 3）動態行為理解。我們的研究重點是 LLM 理解程式碼語法和語義結構的能力，包括抽象語法樹（AST）、控制流圖（CFG）和調用圖（CG）。我們採用了四個最先進的基礎模型：GPT4、GPT3.5、StarCoder 和 CodeLlama-13b-instruct。我們評估了 LLM 在涉及 C、Java、Python 和 Solidity 的跨語言任務上的效能。我們的研究結果揭示，雖然 LLM 在理解程式碼語法方面表現出色，但在其他方面仍有不足。\n\n\n**[3× 本地 / 8 全球] 2312.15202 — Enhancing Code Intelligence Tasks with ChatGPT**\n\n> 預訓練程式碼模型已成為各類程式碼智能任務的關鍵工具。然而，其有效性取決於預訓練資料集的品質，特別是作為程式語言和自然語言橋梁的人工參考注釋的品質。一個重大挑戰是，隨著軟體演進，這些注釋可能與對應程式碼變得不一致。這種差異可能導致模型訓練效果欠佳，降低其性能。LLMs 在生成高品質程式碼注釋方面展現了卓越能力。有鑑於此，我們嘗試透過利用 LLMs 的力量來解決資料集的品質問題。具體而言，我們提出以下問題：我們能否透過用 LLM 生成的注釋替換原始注釋來重建預訓練資料集，以獲得更有效的預訓練程式碼模型？為回答這一問題，我們首先進行全面評估，比較 ChatGPT 生成的注釋與人工參考注釋。由於現有的基於參考的指標將參考注釋視為黃金標準，我們引入兩個輔助任務作為新穎的無參考指標來評估注釋品質。\n\n\n**[3× 本地 / 164 全球] 2409.18486 — Evaluation of OpenAI o1: Opportunities and Challenges of AGI**\n\n> 本全面研究評估了 OpenAI 的 o1-preview 大型語言模型在多個領域（包括計算機科學、數學、自然科學、醫學、語言學和社會科學）各種複雜推理任務上的效能。通過嚴格測試，o1-preview 展示了卓越的能力，在從程式設計挑戰到科學推理、從語言處理到創意問題解決等領域，通常達到人類水平或更優的效能。主要發現包括：在解決複雜競賽程式設計問題上的成功率為 83.3%，超越了許多人類專家；在生成連貫準確的放射學報告方面的卓越能力，優於其他評估模型；在高中數學推理任務上 100% 的精度，並提供詳細的逐步解答；跨一般領域和醫學等專業領域的進階自然語言推理能力；在晶片設計任務上令人印象深刻的效能，在 EDA 腳本生成和錯誤分析等領域超越了專業模型；以及在人類學和地質學上的卓越熟練度，展示了深刻的理解。\n\n\n**[3× 本地 / 3 全球] 2406.12146 — Should AI Optimize Your Code? A Comparative Study of Classical Optimizing C**\n\n> 傳統優化編譯器在適應現代軟體系統日益增長的複雜性方面發揮了重要作用。當前架構對高效平行程式設計的需求要求強大的優化技術。大型語言模型（LLMs）的出現引發了關於這些 AI 方法革新程式碼優化方法論之潛力的有趣問題。本研究旨在回答編譯器社群的一個核心問題：「AI 驅動的模型能否革新我們的程式碼優化方式？」為回答這一問題，我們呈現了三種傳統優化編譯器與兩種近期大型語言模型之間的比較分析，評估它們各自在最大化效率地優化程式碼方面的能力與局限。此外，我們引入了一個具有挑戰性優化模式的基準套件，以及一種自動評估 LLMs 生成程式碼的效能和正確性的機制。我們使用三種不同的提示策略評估 LLMs 的效能：簡單指令提示（IP）、詳細指令提示（DIP）和思維鏈（CoT）。一個關鍵發現是，雖然 LLMs 具有……\n\n\n**[3× 本地 / 7 全球] 2503.12374 — Beyond Final Code: A Process-Oriented Error Analysis of Software Developmen**\n\n> AI 驅動的軟體開發隨著利用大型語言模型（LLM）處理複雜儲存庫級軟體工程任務的軟體開發智能體的出現而迅速進步。這些智能體不僅進行最終程式碼的生成，還參與多步驟推理、利用各種工具進行程式碼修改和除錯，並與執行環境互動以診斷和迭代解決問題。然而，大多數現有評估主要聚焦於最終程式碼輸出的靜態分析，對智能體的動態問題解決過程洞察有限。為填補這一空缺，我們對在 SWE-Bench 基準測試的 500 個 GitHub 問題上評估的 8 個頂級智能體的 3,977 條求解階段軌跡和 3,931 條測試階段日誌進行了深入實證研究。我們的探索性分析表明，問題解決階段中的 Python 執行錯誤與較低的解決率和增加的推理開銷相關。我們識別出最常見的錯誤（如 ModuleNotFoundError 和 TypeError），並重點指出特別具有挑戰性的錯誤，如 OSError 和資料庫相關問題（如 IntegrityError）。\n\n\n**[3× 本地 / 245 全球] 2505.06120 — LLMs Get Lost In Multi-Turn Conversation**\n\n> 大型語言模型（LLMs）是對話式介面。因此，LLMs 有潛力不僅在用戶能完整指定任務時提供協助，也能通過多輪對話交流幫助他們定義、探索和細化所需內容。雖然對 LLM 對話記錄的分析確認了用戶指令中欠規格化現象頻繁發生，LLM 評估卻主要聚焦於單輪、完整指定指令的設置。本研究通過大規模模擬實驗比較了 LLMs 在單輪和多輪設置中的性能。實驗確認，所有測試的頂尖開源和閉源 LLMs 在多輪對話中的性能均顯著低於單輪，在六項生成任務上平均下降 39%。對 200,000+ 次模擬對話的分析將性能下降分解為兩個部分：能力的輕微喪失和可靠性的顯著下降。我們發現 LLMs 常在早期對話輪次中做出假設並過早嘗試生成最終答案，並對此過度依賴。簡而言之，我們發現 LLMs 在多輪對話中容易迷失方向。\n\n\n**[3× 本地 / 99 全球] 2507.09089 — Measuring the Impact of Early-2025 AI on Experienced Open-Source Developer **\n\n> 儘管 AI 工具已被廣泛採用，但其對軟體開發在真實環境中實際影響的研究仍然不足。我們進行了一項隨機對照試驗（RCT），以了解 2025 年 2 月至 6 月前沿的 AI 工具如何影響資深開源開發者的生產力。16 名具備一定 AI 使用經驗的開發者在成熟專案中完成了 246 個任務，每位開發者平均有 5 年的先前經驗。每個任務被隨機分配為允許或禁止使用 2025 年初的 AI 工具。當允許使用 AI 工具時，開發者主要使用 Cursor Pro（一款流行的程式碼編輯器）和 Claude 3.5/3.7 Sonnet。開始任務前，開發者預測允許 AI 會將完成時間縮短 24%。完成研究後，開發者估計允許 AI 將完成時間縮短了 20%。令人驚訝的是，我們發現允許 AI 實際上將完成時間增加了 19%——AI 工具拖慢了開發者的速度。這一結論也與來自經濟學（39% 更短）和機器學習（38% 更短）領域專家的預測相矛盾。為理解這一結果，我們收集並評估了我們設定中 20 個可能促成觀察到的減速效應的特性的證據。\n\n\n## G/G7 — Security survey（7 篇）\n\n\n**[6× 本地 / 342 全球] 2503.23278 — Model Context Protocol (MCP): Landscape, Security Threats, and Future Resea**\n\n> Model Context Protocol（MCP）是一個新興的開放標準，定義了 AI 模型與外部工具或資源之間統一的雙向通信與動態發現協議，旨在增強互操作性並減少不同系統間的碎片化。本文從架構與安全兩個視角對 MCP 進行了系統性研究。我們首先定義了 MCP server 的完整生命週期，包括四個階段（建立、部署、運行和維護），進一步分解為 16 項關鍵活動以捕捉其功能演進。在此生命週期分析基礎上，我們構建了全面的威脅分類體系，將安全與隱私風險按四大攻擊者類型（惡意開發者、外部攻擊者、惡意用戶和安全缺陷）進行分類，涵蓋 16 種不同威脅場景。為驗證這些風險，我們開發並分析了真實世界案例研究，展示了 MCP 實作中具體的攻擊面和漏洞表現形式。基於上述發現，本文針對每個生命週期階段和威脅類別提出了一套細粒度、可操作的安全保障措施。\n\n\n**[5× 本地 / 22 全球] 2503.17502 — Large Language Models (LLMs) for Source Code Analysis: applications, models**\n\n> _(無 abstract 中譯)_\n\n\n**[5× 本地 / 129 全球] 2404.02525 — Large Language Model for Vulnerability Detection and Repair: Literature Rev**\n\n> 大型語言模型（LLMs）的重大進展促使其被廣泛應用於軟體工程（SE）的各類任務，包括漏洞偵測與修復。已有大量研究探索利用 LLMs 提升漏洞偵測與修復任務的效果。儘管研究興趣日益增長，目前尚無系統性調查聚焦於 LLMs 在漏洞偵測與修復中的應用。本文通過對旨在利用 LLMs 改進漏洞偵測與修復方法的系統性文獻綜述來填補這一空白。綜述涵蓋了來自主要 SE、AI 和安全會議及期刊的研究，共包含跨 25 個不同場所發表的 43 篇論文及 15 篇高品質預印本，合計 58 篇論文。通過回答三個關鍵研究問題，我們旨在：(1) 匯總相關文獻中使用的 LLMs；(2) 分類漏洞偵測中各種 LLM 適應技術；(3) 分類漏洞修復中各種 LLM 適應技術。\n\n\n**[4× 本地 / 29 全球] 2504.07137 — Large Language Model (LLM) for Software Security: Code Analysis, Malware An**\n\n> _(無 abstract 中譯)_\n\n\n**[4× 本地 / 2,988 全球] 2307.15043 — Universal and Transferable Adversarial Attacks on Aligned Language Models**\n\n> 由於「開箱即用」的大型語言模型能夠生成大量令人反感的內容，近期的研究重點在於對這些模型進行對齊，以防止不受歡迎的生成。雖然已有一些成功規避這些措施的案例——即對 LLMs 的所謂「越獄」——但這些攻擊需要大量的人工創意，且在實踐中易於失效。在本文中，我們提出了一種簡單而有效的攻擊方法，使對齊的語言模型生成令人反感的行為。具體而言，我們的方法找到一個後綴，當附加到要求 LLM 生成令人反感內容的各種查詢上時，旨在最大化模型生成肯定回應（而非拒絕回答）的概率。然而，我們的方法不依賴手工設計，而是通過貪婪和梯度搜尋技術的組合自動生成這些對抗後綴，並在以往的自動提示生成方法上也有所改進。令人驚訝的是，我們發現由我們方法生成的對抗提示具有相當強的可遷移性，包括遷移到黑盒、公開發布的 LLMs。\n\n\n**[3× 本地 / 59 全球] 2505.02077 — Open Challenges in Multi-Agent Security: Towards Secure Systems of Interact**\n\n> AI agent 開始直接相互互動，並跨越網際網路平台和物理環境，產生了超出傳統網路安全和 AI 安全框架的安全挑戰。自由形式的協議對於 AI 的任務泛化至關重要，但也催生了秘密勾結和協調群體攻擊等新威脅。網路效應可以快速傳播隱私洩露、虛假資訊、越獄和資料投毒，而多 agent 的分散性和隱蔽最佳化使對手能夠逃避監督——在系統層面製造新型持久威脅。儘管這些安全挑戰至關重要，卻仍未被充分研究，相關研究分散在 AI 安全、多 agent 學習、複雜系統、網路安全、賽局理論、分佈式系統和技術 AI 治理等不同領域。我們介紹多 agent 安全這一新領域，專致於保護 AI agent 網路免受通過其互動（無論是直接還是通過共享環境間接）而湧現或放大的威脅，這些互動對象包括彼此、人類和機構，並刻畫了基本的安全-效用與安全-安全權衡關係。\n\n\n**[3× 本地 / 75 全球] 2503.00061 — Adaptive Attacks Break Defenses Against Indirect Prompt Injection Attacks o**\n\n> 大型語言模型（LLM）agent 通過使用外部工具與環境互動，在各種應用中表現出卓越的性能。然而，整合外部工具帶來了安全風險，如間接提示注入（IPI）攻擊。儘管已有針對 IPI 攻擊設計的防禦措施，但由於對自適應攻擊的測試不足，其穩健性仍然存疑。在本文中，我們評估了八種不同的防禦措施，並使用自適應攻擊繞過了所有這些防禦，始終達到超過 50% 的攻擊成功率。這揭示了當前防禦中的關鍵漏洞。我們的研究強調了在設計防禦時進行自適應攻擊評估的必要性，以確保穩健性和可靠性。程式碼已在 https://github.com/uiuc-kang-lab/AdaptiveAttackAgent 公開。\n"}, {"key": "cross", "name": "引用統計", "count": "1438+", "file": "cross-paper-analysis.md", "content": "# 跨 207 篇論文：共同引用與重複作者分析\n\n_資料來源：207 篇 PDF (26 batch-1 + 181 batch-2)，方法：pdftotext + regex; 2026-05-25_\n\n## A. 最常被引用的 arxiv references（top 30）\n\n| Rank | arxiv ID | 被引用次數 | 推測標題 |\n|---:|---|---:|---|\n| 1 | 2107.03374 | 54 | Codex / Evaluating LLMs on Code (Chen et al. 2021) |\n| 2 | 2308.12950 | 35 | Code Llama (Rozière et al. 2023) |\n| 3 | 2009.10297 | 24 | CodeBLEU (Ren et al. 2020) |\n| 4 | 2310.06770 | 23 | SWE-bench (Jimenez et al. 2023) |\n| 5 | 2303.08774 | 23 | GPT-4 Technical Report (OpenAI 2023) |\n| 6 | 2108.07732 | 21 | MBPP / Program Synthesis with LLMs (Austin et al. 2021) |\n| 7 | 2401.14196 | 21 | DeepSeek-Coder (Guo et al. 2024) |\n| 8 | 2407.01489 | 20 | **SWE-bench Multimodal（本研究 batch-1）** ◀ 我們的 |\n| 9 | 2305.06161 | 18 | StarCoder (Li et al. 2023) |\n| 10 | 2102.04664 | 18 | CodeXGLUE (Lu et al. 2021) |\n| 11 | 2109.00859 | 16 | A Survey on Pretrained Models / Code (Niu et al. 2022) |\n| 12 | 2402.19173 | 16 | OpenDevin / Repo-level Coding Agent |\n| 13 | 2407.16741 | 16 | Agentless (Xia et al. 2024) |\n| 14 | 2409.12186 | 16 | Qwen2.5-Coder Technical Report |\n| 15 | 2405.15793 | 15 | SWE-agent (Yang et al. 2024) |\n| 16 | 2203.13474 | 13 | CodeGen (Nijkamp et al. 2022) |\n| 17 | 2303.12570 | 13 | GPT-4 / Cody style Code Eval |\n| 18 | 2002.08155 | 13 | CodeBERT (Feng et al. 2020) |\n| 19 | 2412.19437 | 13 | DeepSeek-V3 Technical Report |\n| 20 | 2308.10620 | 12 | ChatRepair / LLM Repair (Xia & Zhang 2023) |\n| 21 | 1909.09436 | 12 | CodeSearchNet (Husain et al. 2019) |\n| 22 | 2409.00899 | 12 | **本研究 batch-1 之一** ◀ 我們的 |\n| 23 | 2307.09288 | 11 | Llama 2 (Touvron et al. 2023) |\n| 24 | 2403.17134 | 11 | RepoCoder / LongRepo Bench |\n| 25 | 2302.13971 | 10 | LLaMA (Touvron et al. 2023) |\n| 26 | 2404.05427 | 10 | (待查) |\n| 27 | 2210.03629 | 10 | (待查) |\n| 28 | 2306.03091 | 9 | (待查) |\n| 29 | 2409.02977 | 9 | (待查) |\n| 30 | 2406.00515 | 9 | (待查) |\n\n## B. First Author 連發 >=2 篇\n\n| 篇數 | First Author |\n|---:|---|\n| 4 | Jia Li |\n| 3 | Ali Reza Ibrahimzada |\n| 2 | Ruida Hu |\n| 2 | Manish Bhattarai |\n| 2 | Zhi Chen |\n| 2 | Bin Wang |\n\n## C. 任一作者位置出現多篇（regex 抽取，可能含 false positive）\n\n| 篇數 | Author | arxiv IDs |\n|---:|---|---|\n| 6 | Yanlin Wang | 2403.17927, 2411.13990, 2412.17744, 2503.20589, 2510.18863… |\n| 5 | Mingwei Liu | 2411.13990, 2503.20589, 2510.18863, 2603.22048, 2604.26523 |\n| 4 | Jia Li | 2404.00599, 2405.19856, 2501.00363, 2503.15301 |\n| 4 | Lingxiao Jiang | 2410.12468, 2412.13467, 2503.12374, 2605.18332 |\n| 3 | Cuiyun Gao | 2401.13169, 2508.09791, 2604.13725 |\n| 3 | Wei Ma | 2404.06201, 2503.12374, 2605.18332 |\n| 3 | Zhi Chen | 2410.12468, 2503.12374, 2605.18332 |\n| 3 | Zibin Zheng | 2503.20589, 2603.22048, 2604.26523 |\n| 2 | Ali Reza Ibrahimzada | 2401.12412, 2604.07341 |\n| 2 | Xinchen Wang | 2401.13169, 2412.14764 |\n| 2 | Ruida Hu | 2401.13169, 2412.14764 |\n| 2 | Hongyu Zhang | 2403.17927, 2412.01333 |\n| 2 | Lingming Zhang | 2407.01489, 2512.18552 |\n| 2 | Song Wang | 2410.06992, 2512.06902 |\n| 2 | Shanchao Liang | 2410.21647, 2509.24148 |\n| 2 | Nan Jiang | 2410.21647, 2509.24148 |\n| 2 | Akash Dhruv | 2410.24119, 2511.00087 |\n| 2 | Anshu Dubey | 2410.24119, 2511.00087 |\n| 2 | Yao Wan | 2412.01333, 2508.09791 |\n| 2 | Chao Peng | 2412.08063, 2412.14764 |\n| 2 | Bo Jiang | 2412.08063, 2412.14764 |\n| 2 | Graham Neubig | 2412.21139, 2512.12216 |\n| 2 | Xilin Liu | 2503.20589, 2510.18863 |\n| 2 | Yuchi Ma | 2503.20589, 2510.18863 |\n| 2 | Trae Agent | 2507.23370, 2511.16005 |\n| 2 | Python Projects | 2509.14856, 2603.01596 |\n| 2 | Mohayeminul Islam | 2510.08810, 2603.01596 |\n| 2 | May Mahmoud | 2510.08810, 2603.01596 |\n| 2 | Sarah Nadi | 2510.08810, 2603.01596 |\n| 2 | Hamed Jelodar | 2510.18936, 2512.00134 |\n\n## 觀察\n\n1. **Codex (2107.03374) 是絕對 anchor**：54/207 篇引用（26%）—— 任何 LLM 程式碼研究都繞不開。\n2. **Code Llama (2308.12950) 是第二常見基線 ni Pro 回 JPEG）\n- 我寫的 wrapper 用 `out_path = .png`，script 改存 `.jpg`，我檢查 `.png` exists → 全部誤判失敗\n- 實際 7 張都成功，NT$29.5 不冤\n- 修正：未來檢查存在性用 `slug.{jpg,png}` glob，或讀 script stdout 「saved: <path>」\n\n### 7. Subagent hallucinate 做不相關事（5/26 一次）\n- 446 篇分類 subagent 跑去「分析 Claude Code 權限、建議 settings.json」\n- 完全沒做指派任務\n- 修正：prompt 明文「禁止做的事」列表\n\n---\n\n## 本次成本與用量\n\n| 項目 | 數量 |\n|---|---:|\n| 全文閱讀 PDFs | 653 篇 |\n| arxiv-cache 總 PDF | 798 unique |\n| 圖片產出 | 21 張（Gemini Nano Banana Pro 2K，~NT$90）|\n| Subagent 總呼叫 | ~120+ 次 |\n| 撞 session limit | 3 次（皆 Opus 並行） |\n| 撞 server rate limit | 1 次（Sonnet 22 並行） |\n| 走錯位事件 | 3 次（4.6%） |\n| Silent death | 1 次 |\n| Hallucinate 做別的事 | 1 次 |\n\n### Sonnet 4.6 任務數字（給下次參考）\n- 任務：讀 ~20 頁 PDF 全文 + 寫 fragment + 寫 metadata\n- 每篇 ~5K input + 2.5K output tokens\n- 每 subagent 處理時間：3-5 分鐘/篇 × 7 篇 ≈ 20-30 分鐘/chunk\n- 並行天花板 ~12-15，營運上限 10\n\n---\n\n## 本次 G5 off-topic 名單（12 篇，已 excluded）\n\n全部來自 chunks JSON regex bug → arxiv ID ↔ title 對應錯造成的 false match：\n\n| arxiv ID | 想要的 slug | 實際 PDF |\n|---|---|---|\n| 2407.04180 | web2code | Slice-100K 3D Printing |\n| 2407.14565 | crab-cross-environment | Mobile App Metamorphosis |\n| 2408.12622 | diversity-empowers-intelligence | AI Risk Repository Meta-Review |\n| 2409.11667 | impact-large-language | DeclarUI UI generation |\n| 2410.07962 | transagent | Adversarial Robustness Ontology |\n| 2410.18032 | beyond-browsing | GraphTeam Graph Reasoning |\n| 2411.11916 | empirical-study-llm | Text-to-Diagram |\n| 2508.17856 | agentic-ai-software | MalLoc Android Malware |\n| 2509.25199 | crosstl | CircInspect Quantum Debugger |\n| 2512.08379 | bridging-code-graphs | DeepFeature Biosignals |\n| 2512.17838 | swe-bench-framework | ReX-MLE Medical Imaging |\n| 2512.24840 | vsa-ui-to-code | PyLASP Astrophysics |\n\n註：原本想找的「TransAgent」、「Diversity Empowers Intelligence」、「Web2Code」等其實**真實 arxiv ID 不同**，已在 batch-3 rescan 補回對應論文。\n\n---\n\n## 本次特殊決策\n\n### 分類體系 v2\n新增 sub-category：**Cx Industry case study / enterprise deployment**\n- 13 篇企業案例（Google TF→JAX、JP Morgan、IBM WCA4Z、Ericsson、Flash-X HPC、COBOL-Coder 等）\n- 後續主題若有同類論文，可沿用 Cx 標籤\n\n### arxiv-cache 拆 10 個年份 repo（5/25）\n- 從單一 `arxiv-cache` 拆成 `arxiv-cache-{2017..2026}`\n- 每年 ~5-138 篇，最大 296 MB（2024 年）\n- 私有；舊 `arxiv-cache` 已棄用待刪\n\n### 主題 repo 命名\n`Simon99/sapphire-2026-05-22-llm-codebase`（private）\n\n---\n\n## 後續可做（未動）\n\n| # | 任務 |\n|---|---|\n| 17 | #7 retro A4/B1/C1/D1 補做法/發現獨立圖 |\n| 18 | #6 forward 圖批 A5-A8 / C2-C4 / D2-D5 |\n| 19 | 更新 GitHub Pages HTML（含新分類 + 653 篇）|\n| - | 刪舊 `Simon99/arxiv-cache`（需 `delete_repo` scope）|\n| - | 解決 batch-3 6 篇 PDF 損壞無 metadata |\n"}, {"key": "A", "name": "A 業界案例", "count": "9 篇", "content": "# 總覽報告：LLM 對大型代碼庫的修改與維護 — A 類（業界／真實世界案例）\n\n- **研究主題**：運用大型語言模型（LLM）對大型代碼庫進行修改與維護的案例\n- **本報告範圍**：A 類「業界／真實世界案例」8 篇論文的總覽\n- **建立日期**：2026-05-22\n- **引用格式**：(第一作者 et al. 年份, §章節, p.頁碼)；全部論文皆為 2026 年 arXiv 預印本\n- **狀態**：總覽（preliminary overview）。逐子議題的細部核對論述待後續討論時另出。\n- **追溯精度**：8 篇均經全文逐頁重讀，逐篇摘要的每一事實與數字標註至章節（§）與頁碼（p.）。\n\n---\n\n## 一、逐篇摘要\n\n8 篇依與主題的貼近程度排序：1–5 為直接的「修改／遷移既有大型代碼庫」案例，6 為「代理式變更在真實 OSS 的接受度」實證，7–8 為間接相關（邊界基準與安全研究）。\n\n### 1. TF→JAX 多智能體遷移系統 — Google 以多智能體 LLM 系統自動化深度學習模型框架遷移的工業案例\n*Nikolov et al. 2026, arXiv:2603.27296（Google，慕尼黑與美國加州）*\n\n![a1-scope](images/a1-scope.jpg)\n\n\n**定位**：Google 內部建有數千個機器學習模型，多數建構於 TensorFlow 之上，但公司正轉向以 JAX 作為 ML 模型開發的標準框架（JAX 更適合 TPU 推論與訓練，且支撐 Google AI 技術棧的絕大部分），長期以來模型維護與遷移工作主要靠人類專家手動完成（Abstract, p.1；§1, p.1）。若以人工將所有模型遷移，因兩個框架在架構與範式上並不對等，將耗費「數百個專家工程師年」（hundreds of expert engineering years），這些精力更應投入於實際改善模型架構（§1, p.1）。論文主張：通用型 AI 編碼工具（Gemini CLI、Codex CLI、Claude Code 等）雖已簡化軟體工程流程，但對於牽涉眾多元件、需要大量特定情境的「非常複雜的程式碼遷移」仍難以可靠產出高品質結果；因此需要一個聚焦於「某一類問題」的客製系統（bespoke system）才能顯著簡化並縮短開發時程（§1, p.1）。論文自我定位為一份「詳細的案例研究」（detailed case-study），說明所建系統、評估指標與所達成的結果，並提出三項主要貢獻：(1) 以混合靜態分析與 AI 指令的 AI planner 為非常複雜的程式碼元件產生可被 orchestrator 與 coder agents 可靠遵循的遷移步驟，並使用 AI 生成的範例式 playbook；(2) 定義品質度量與 AI 評審（AI-based judges），以在程式碼無測試、且須嚴格遵守風格與相依規範時加速開發；(3) 在商用真實案例的 hyperscaler 環境中驗證系統加速效果（§1, p.1；Abstract, p.1）。論文另強調一個「以 AI 改善 AI 開發」的良性循環觀點（virtuous cycle）（§1, p.1–2）。\n\n**背景與問題本質**：\n- TensorFlow 與 JAX 雖同為 ML 框架，但動機與年代不同：TensorFlow 誕生於前 Transformer 時代，圍繞當時主流方法（如在標準 GPU 上運作的 CNN）設計，依賴有狀態層（stateful layers）與靜態執行圖，常使用特化 custom ops 取得效能；JAX 則代表轉向動態執行，建立在函數式、無狀態的範式上，為現代 TPU 基礎設施與 XLA 編譯最佳化（§2, p.2）。\n- 架構分歧造成遷移困難：TensorFlow 物件導向、有狀態的層初始化（常透過 Keras API 抽象）與 JAX 的函數式取徑形成強烈對比；JAX 中狀態須被明確管理與分離，須從根本上重新思考層之間如何互動（§2, p.2）。\n- 生產級 TensorFlow 模型常依賴特化的「custom ops」，這些近乎硬體層級的程式碼在 JAX 中鮮有直接對應，往往須以 JAX 的可組合原語從頭重新實作（§2, p.2）。\n- 遷移範圍不止核心模型程式碼：尚須處理執行腳本、資料載入管線、訓練迴圈等與框架深度耦合的周邊生態；且須遵守嚴格的內部編碼標準並重用既有函式庫。論文指出，對通用編碼 agent 天真套用會產出不令人滿意的結果，無法捕捉複雜度量或遵守特定風格指南（§2, p.2）。\n- 論文以 Listing 1（標準 TF/Keras 實作，含 BatchNorm 經由 `training` flag 自動更新狀態、L2 正則化經由 `model.losses` 的隱式 side-channel 追蹤）與 Listing 2（遷移後的 Flax 實作，需明確處理 BatchNorm 狀態、以 `mutable=['batch_stats']` 傳遞並取回變異後狀態、手動對 `params` PyTree 做轉換以計算 L2 正則化）對照展示框架差異的具體樣貌（Listing 1, p.2；Listing 2, p.4）。\n\n\n![a1-method](images/a1-method.jpg)\n\n**做法**：\n- **整體架構**：系統為多智能體架構，由 Planner、Orchestrator、與多個 Coder agents 組成，並輔以離線生成的 playbook 階層與一個基於檔案的 Memory Bank；Google 已就 AI 程式碼遷移系統投資數年（引用先前報告 Nikolov et al. 2025），本系統在其基礎上擴充以支援 TF→JAX 遷移（§3, p.3；Figure 1, p.5）。\n- **Prompt Engineering 與 Playbook 階層**：為把預期程式碼的結構與風格知識灌注給 agent，團隊建立了 markdown 格式的 playbook 階層。初期開發以開源 TF 模型測試 AI 遷移能力，揭露三大挑戰：API 幻覺（API hallucinations）、風格不一致（style inconsistency）、無法持續產出可建構的程式碼（inability to produce consistently buildable code）；為解決這些問題，團隊從基本 prompt 指令演進為 playbook 系統，提供針對性指引（§3.1, §3.1.1, p.2）。playbook 以串接方式作為 system prompt 的一部分提供給 agent（通常是 coder agent），但內部依 Table 1 的階層拆分（§3.1.1, p.2）。\n- **四類 Playbook**（Table 1, p.3）：\n  - *General Instruction Playbook*：涵蓋目錄結構、建構工具等 repository 細節，提供 agent 讀／寫／搜尋並與 Google monorepo 互動所需的基礎工具知識；幾乎每個 agent 都使用；僅在新增工具時更新。\n  - *Style Playbook*：在有多個合法選項處（如使用 `nn.compact` 而非 `setup()`、一致的 import 方式）強制一致性；專供編碼任務使用；極少且須手動更新（偵測到風格違規時）。\n  - *Task-Specific Playbook*：由 Gemini 依官方文件生成，用以凸顯 TF 與 JAX 之間細微的 API 差異（例如預設參數不同），提供一般適用的編碼指令。\n  - *Client-Specific Playbook*（如 YouTube）：包含使用案例特定的需求與偏好函式庫，是規劃與編碼任務最主要的任務相關資訊來源；每次完整執行後反覆迭代更新（如精修 import）。\n- **Client-Specific Playbook 的離線生成策略**：當已有完成的遷移案例時，將其當作「黃金範例」（golden examples）離線生成 client-specific playbook。為了可擴展並避免對少數初始遷移模型過擬合，採用：(1) 提示 AI agent 將已遷移程式碼拆解為語意單元（如 base imports、base methods、loss computation、metrics output）；(2) 由 LLM 依這些程式碼區塊摘要出一般性遷移規則。生成由 Gemini 完成但由人類工程師監督，工程師主要負責審查源自 TF/JAX 框架差異的問題；LLM 將兩套程式碼拆成語意領域（機器學習）的功能等價程式碼區塊，且拆分趨向細粒度以利提煉出兼具通用與客戶特定知識的 playbook（§3.1.2, p.3）。實驗中能僅用 2 個範例（一個中等複雜度、一個含數千行程式碼與數十層的高複雜度模型）就生成「足夠好」的 playbook（§3.1.2, p.3）。當無已遷移模型與範例時，則僅依賴通用指令，並預期人類須進一步改善遷移品質；隨著更多複雜模型被遷移，可重複此流程改善 playbook，形成良性循環（§3.1.2, p.3）。\n- **多智能體拆分動機**：單智能體在長時程任務中難以維持上下文、在複雜模型上常幻覺出「已完成」；多智能體拆分用以強制驗證、管理 context window，處理須遵守嚴格開發規則、處理深層相依、確保跨多檔案模型遷移完整的任務（§3.2.1, p.3）。\n- **Planner Agent**：為單一 TF 模型的遷移建立計畫；一個「step」定義為對 coder agent 的離散指令，coder 須產出處於有效狀態（可建構、若適用則可測試）的程式碼。Planner 建立含「不相交步驟」的端對端計畫，一個編碼任務可拆成多步，傾向細粒度步驟（每步新增不超過數百行 LOC），並為每步加上「必須滿足的驗證條件」（validation condition）（§3.2.3, §3.2, p.3–4）。拆分目的：控制每個 coder 任務範圍、引導模型跨多個相關檔案、保持 coder 任務複雜度小、提升變更可重現性、允許人工檢查以驗證涵蓋所有待遷移元素（§3.2.3, p.4）。\n- **相依探索與計畫產生（混合 static-agentic 取徑）**：Planner 不用 agent 做相依探索，而採用 Kythe（Google 開源、基於編譯器的靜態分析與交叉參照工具）做相依解析；Kythe 依 codebase 近期索引解析相依、再以 build 資訊增強，使相依探索具決定性、可驗證、快速且計算成本低（§3.2.3, p.4）。規劃以遞迴方式進行：從主模型檔案及其直接相依出發，提示 LLM 產出遷移計畫、找出計畫缺口、列出仍需相依的檔案，反覆此程序並把所有被請求相依的內容加入 prompt；已可直接使用的通用 JAX 函式庫經由 playbook 注入 planner prompt，避免為其建立遷移步驟（§3.2.3, p.4）。實際遷移須從「葉節點」（無未遷移相依的層或函式）向上進行，目標是計畫的每一步都可建構、理想上可測試（§3.2.3, p.4）。\n- **Plan Schema（計畫格式）**：每個遷移步驟含 index、原始與目標檔案路徑、指令、以及相依步驟的 index；計畫以 JSON 格式提供（Listing 3）以利 LLM 遵循同時方便人類閱讀。Planner 把完整計畫以 JSON 寫入 Memory Bank，並另產出 dot 版本計畫供視覺化與人工檢視（§3.2.3, p.4；Listing 3, p.5）。\n- **Orchestrator Agent**：作為高層計畫與 Coder 執行之間的橋樑，本身不寫程式碼，但管理遷移流程而不修改文件。其機制：*dynamic task scoping*（將計畫步驟依複雜度分組為可管理的 chunk，保持 Coder 上下文聚焦）、*dynamic knowledge injection*（每個任務只挑選相關 playbook 以減少 context pollution）、*strategic failure handling*（依 Coder 結果決定重試、跳過或中止）、*fault tolerance*（把進度持久化到 Memory Bank，使長時程遷移可在中斷後恢復）。Orchestrator 將生成計畫中一個或多個邏輯相連步驟組合成粗粒度的「sub-steps」，一次委派一個 sub-step 給 coder，並等待回覆才提供下一個（§3.2.4, §3.2, p.4）。\n- **Coder Agent**：是一個 ReAct agent，可使用基本工具：列檔、讀檔、程式碼搜尋（類似 grep、針對 Google3 repository）、寫檔、搜尋與取代、自動修復相依、執行 build、執行單元測試。其 system prompt 含在 Google repository 中工作的通用 playbook，並規定一個包含「對每次變更進行建構與測試」的工作流程，另含使用案例特定指令（如 YouTube 模型）。Coder 是遷移的「workhorse」（主力），每次被叫用時負責產出可建構並可測試的程式碼，並被指示修復 build 與測試中的失敗、持續此程序直到完成被指派的任務（一個計畫步驟）；最終產物是實作該指派的檔案變更（§3.2.5, §3.2, p.5）。\n- **Validation（自我審查）**：為防止「提前宣告完成」（多智能體系統與長上下文生成的常見失敗模式），在 coder 宣告任務完成後，人為插入一個額外 prompt，要求其對照任務需求驗證任務確已成功完成；此簡單的「self-review」有效消除遺漏步驟，且無須另設獨立 reviewer agent 的成本（§3.2.5, p.5）。\n- **Memory Bank（資訊共享）**：為在不需 agent 對 agent 直接交接的情況下達成溝通與狀態持久化，實作了基於檔案的 memory bank，作為系統的「結締組織」（connective tissue），讓 agent 各自獨立存取共享上下文，防止漂移與重複工作；儲存遷移狀態、除錯產物（debugging artifacts）、各步驟所用 playbook 的版本化快照（§3.2.2, p.3）。Coder 在每一步執行後建立並儲存變更摘要（Listing 4 的 Markdown 摘要，含「Changes Made」與「Key Fixes & Learnings」段落），作為 orchestrator 理解變更狀態的「短期記憶」；叫用 Coder 時總會把所有已建立摘要的完整歷史隨初始 prompt 傳遞，使 Coder 取得遷移的全域視角、知道新 JAX 元件位置、避免無意間撤銷先前工作或重複實作既有邏輯（§3.2.5, p.5–6；Listing 4, p.6）。\n- **評估設定（兩個評估集）**：\n  - *開源模型集*：32 個開源模型，用於精修系統並排除早期工具與模型定義問題；但隨 Gemini 3 Pro 引入，此資料集上的表現飽和，其角色轉為主要做回歸測試（§4.1, p.6）。\n  - *Google 內部 YouTube 模型*：包含 *playbook-generation set*（2 個真實 YouTube Google 模型，皆有仍在使用的 legacy TF 版本與人類遷移的 JAX 版本，用於測試系統在須嚴守內部風格指南與重用內部元件的真實模型上的表現；其中一個為中等複雜度、另一個極複雜含數千行 JAX 程式碼與數十項內部度量，後者促成詳細 planner 與半靜態計畫建構的實作）與 *test set*（6 個中至高複雜度的真實 YouTube 模型，見 Table 2，且排除前述用於 prompt engineering 的 2 個模型）（§4.2.1, §4.2.2, p.6）。\n- **品質度量：Checklist-based LLM Judge**：標準程式碼度量（edit distance、AST 比較）無法捕捉複雜 ML 邏輯（如 gradient scaling、loss masking）的功能正確性。系統主要度量為一個細粒度、框架無關（framework-agnostic）的 checklist：對評估集每個模型，人工策劃一份「Golden Checklist」，捕捉遷移後模型須具備的關鍵元素，刻意以通用層名稱或描述性需求表述（如「每個預測 head 各一個 tower」「user embeddings 須 L2 normalized」，見 Listing 5），使 checklist 對底層實作變更保持穩定，但仍為使用案例特定（framework-agnostic but not use-case-agnostic）（§4.3, §4.3.1, p.6）。評審由專屬的「Judge」LLM-based agent（同樣由 Gemini 3 Pro 驅動）執行，採盲審（blind audit）模式：(1) Input：提供 checklist 與遷移後 JAX 模型檔案位置；(2) Inspection：允許從主模型檔案向外探索程式碼庫以驗證實作；(3) Scoring：Judge 不取得原始 TF 源碼，僅依提供的 JAX 程式碼驗證 checklist 項目，避免其單純做語法比對而改為驗證 checklist 描述的功能邏輯；(4) Results：每項個別評分，最終品質分數為已滿足項目佔總項目數的百分比（§4.3.1, p.6）。此度量嚴格僅用於遷移後評分、不回饋給 agent 做自動修復，以維持評估完整性、保持其作為跨架構與模型版本比較工具的效力（§4.3.1, p.7）。\n- **被考慮但放棄的替代度量：數值等價測試（Numerical Equivalence Tests）**：對 OSS 評估集曾以相同權重在相同輸入上跑兩模型取得高保真遷移成功分數，但對真實世界模型不適合作為主要度量，原因有三：*Interface Discrepancies*（預生成測試高度依賴遷移模型的公開介面，完整指定該介面困難且耗時，OSS 模型實際上並未完成此程序）、*Engineering Complexity*（設定這些測試須在框架間管理權重轉移與複雜狀態初始化，常與遷移本身一樣困難）、*Expected Divergence*（JAX 與 TF 處理運算的細微差異，如 XLA kernel fusion 或 sigmoid 等特定 activation，會造成輕微數值偏移，未必代表遷移失敗）（§4.3.2, p.7）。因此將等價測試降為「編碼任務的一個元素」，指示 coder agents 自行生成並執行等價測試作為遷移步驟的一部分，即使因上述原因未完全通過，也常有助於修復其他問題（如型別或形狀不符）（§4.3.2, p.7）。\n- **實驗配置（消融研究，Table 3）**：比較四種配置：*single_agent_baseline*（單一自主 ReAct coding agent，無 TF→JAX 特定調整、無 planner、無 orchestrator）；*single_agent_yt_specific*（同上，但含所有 TF→JAX playbook：style、task-specific、client-specific；無 planner、無 orchestrator，是最精緻的單智能體）；*multi_agent*（具規劃與協調的多智能體系統，含 task-specific playbook 但不含 client-specific playbook）；*multi_agent_yt_specific*（同 multi_agent 但含 client-specific playbook，為功能最完整配置）。所有 agent 皆獲 General Instructions Playbook，皆使用 Gemini 3 Pro，溫度設為 0.2 以引入輕微變異（§5.1, p.7；Table 3, p.7）。每個配置在全部 6 個 YouTube 測試模型上多次執行（每個 N>10），各產出一個遷移後 JAX 模型，再以 Gemini judge 依對應 checklist 評分；每模型每配置取平均 checklist 分數，總分為六模型平均分（§5.2, p.8）。\n\n\n![a1-findings](images/a1-findings.jpg)\n\n\n![a1-findings_b](images/a1-findings_b.jpg)\n\n**核心發現**：\n- **整體加速（6.4–8×）**：相較人工遷移，論文估計時間節省為 6.4–8×（見 Table 5），代表規模化時的劇烈改進（§5.4, p.8）。Table 5 列出兩個內部生產模型的人在迴路（human-in-the-loop）數據：model_1（行數 0.6k/3k、15 層、50 項度量）純人工遷移約 16 小時、AI 加審查修復約 2 小時，加速 8×；model_2（行數 4k/20k、250 層、300 項度量）純人工約 32 小時、AI 加審查修復約 5 小時，加速 6.4×（Table 5, p.9）。論文特別指出：Table 5 的模型人類專家並未撰寫單元測試，而其多智能體系統有寫；此外審查與修復遷移模型所需的專業度，論文認為比從頭遷移模型所需的專業度為低（§5.4, p.8）。\n- **遷移品質（Table 4，checklist 分數，越高越好）**：六個模型在四種配置下的 checklist 完成比（粗體為各列最佳）：large_1 — multi_agent 0.31、**multi_agent_yt_specific 0.65**、single_agent_baseline 0.09、single_agent_yt_specific 0.14；large_2 — 0.42 / **0.59** / 0.22 / 0.33；medium_1 — 0.73 / **0.90** / 0.43 / 0.43；medium_2 — 0.53 / **0.75** / 0.38 / 0.44；small_1 — 0.70 / **0.95** / 0.66 / 0.48；small_2 — **0.87** / 0.82 / 0.59 / 0.36（Table 4, p.9）。可見除 small_2 外，multi_agent_yt_specific 在所有模型上均為最佳配置。\n- **配置間統計顯著性**：總分顯示 multi_agent_yt_specific 是最強配置（顯著，配對 t 檢定 p<0.02），其次為另一多智能體配置 multi_agent；再來與單智能體 single_agent_yt_specific 及 single_agent_baseline 之間存在顯著差距（p<0.02），而此二單智能體之間無統計顯著差異（p=0.62）（§5.2, p.8）。\n- **單智能體的失敗模式**：比較 single_agent_baseline 與 multi_agent_yt_specific 的 checklist 後發現，single_agent_baseline agent 通常能正確取得模型架構，但常遺漏 loss functions、評估度量、以及如 label weighting 等關鍵邏輯（§5.2, p.8）。\n- **計算成本**：多智能體配置的執行時間約為單智能體配置的 3–5 倍（§5.2, p.8）。\n- **對模型複雜度的相依性**：在兩個最簡單模型 small_1、small_2 上，single_agent_baseline 與 multi_agent_yt_specific 之間的顯著差異消失（配對 t 檢定 p=0.07）；一般而言 TF 模型越複雜，baseline 與主智能體的差距越大（§5.3, p.8）。此與較早發現一致：四種配置（皆用 Gemini 3 Pro）在主要由小型 TF 模型構成的開源評估集上表現大致相當（§5.3, p.8）。論文據此強調多智能體協調對「中到大型生產模型、規模化 TF→JAX 遷移」的價值，當總模型複雜度達到某一程度後遷移品質才會因多智能體系統而提升，且即使無法建立 client-specific playbook（因缺乏人工遷移範例）此結論仍成立（§5.3, §6, p.8）。\n- **小型開源模型的時間節省較有限（1.7×）**：對小型開源模型，人類專家估計手動與用 AI 的遷移時間後，遷移速度提升因子為 1.7×，主要受限於相對少量的人工工作與「閱讀 AI 生成程式碼」的固定成本；但隨模型複雜度與行數增長，加速顯著增加（§5.4, p.8）。\n- **Client-Specific Playbook 提供關鍵增益**：multi_agent 與 multi_agent_yt_specific 的對比顯示，client-specific playbook 即使僅從兩個人工完成的範例衍生，仍提供關鍵的提升（crucial lift），對大規模遷移有顯著實務價值——一小組「黃金範例」即可 bootstrap 品質（§6, p.8）。\n- **領域知識增益僅在多智能體下顯現**：上述領域知識增益僅在與 planner 及 orchestrator 結合時（即 multi_agent_yt_specific）才產生改善；對單智能體而言，額外的上下文（約 3k 行）反而常「壓垮」agent，導致遷移不完整——agent 雖宣告成功卻只實作了所需邏輯的骨架（§6, p.8）。\n- **中型模型加速最大**：遷移速度提升在中型模型最大，因人類專家在此複雜度下遷移困難，而 agent 輸出品質仍高；隨模型更複雜，agent 輸出仍須更多人類專家工作才能達到人類專家遷移水準（§5.4, p.8）。\n- **作者自陳的限制（Threats to Validity）**：評估雖基於一組具代表性的 YouTube 模型，但只是所有須遷移模型的一小部分；專家手動檢查過遷移後模型並認定度量是可靠的，但因多數模型尚未部署，未能涵蓋系統在遷移模型中引入的潛在細微錯誤；對影響與時間節省更精確的衡量須待大量遷移模型部署到生產後;研究只聚焦於 YouTube 模型，其結論假設可推廣到其他模型族但尚未在 Google Search 少數模型之外驗證；論文指出將把方法延伸到遷移中「僅編碼」部分以外的步驟（§7, p.8）。\n- **「debugging tax」與 infra-overfitting**：論文於結論指出遷移流程延伸超出程式碼轉換本身——轉向無狀態範式對開發者課以一種「除錯稅」（debugging tax），常源自模型依賴 legacy 框架特性的「基礎設施過擬合」（infra-overfitting）；未來工作將聚焦於「閉合迴路」，開發能自主辨識並修復訓練不穩定或推論延遲回歸的專門除錯 agent（§9, p.9–10）。\n- **與相關工作的定位差異**：論文將自身置於三種模式的交集——透過協調與專業化的任務拆解、領域知識蒸餾、以及朝向專案規模評估的轉變（§8, p.8–9）。在協調與專業化上，相較 RefAgent 等為測試與編譯設專屬 agent，本系統把建構與測試「整合進 coder 內部的 ReAct 工作流程」，利用 Gemini 的大上下文窗在 test-and-fix 迴圈中維持完整實作上下文（§8.1, p.9）。在狀態管理上，相較 ChatDev 的去幻覺技術、AgentAsk 的強化學習法、DynamicCheatSheet 在連續生成間策劃上下文，本系統令 agent 產出足夠詳細的工作摘要再以決定性方式傳遞給未來叫用，論文認為這對其使用案例是可靠取徑（§8.1, p.9）。在知識蒸餾上，其 client-specific playbook 生成策略是 ACE 的 Generator-Reflector-Curator 模式與先前 Google AI 程式碼遷移經驗報告（playbook 中手動規則）的混合，但聚焦於半自動、人類監督的「黃金範例」策劃（§8.2, p.9）。在專案規模評估上，論文認為單元測試在遷移中維持完整性時「脆弱、不足且成本過高」（fragile, insufficient, and prohibitively expensive），故改用 checklist-based LLM judge 這種啟發式取徑來捕捉標準單元測試評估無法擴展處的架構保真度與完整性（§8.3, p.9）。\n- **適用範圍與一般化主張**：論文主張其技術與取徑可一般化到其他框架遷移與一般程式碼轉換任務，並期望「AI 支援自身開發」的良性循環會在程式碼遷移領域及業界其他地方持續存在，進一步加速 AI 的進展與採用（Abstract, p.1；§1, p.1–2；§9, p.10）。\n\n---\n\n### 2. LegacyTranslate — 以多代理 LLM 框架翻譯企業遺留代碼並對齊內部 API\n\n*Moti et al. 2026, arXiv:2603.14054（Radboud University 與 ING，荷蘭）*\n\n![a2-scope](images/a2-scope.jpg)\n\n\n**定位**：本文針對企業界遺留系統現代化的真實痛點：將大型遺留代碼庫遷移到現代平台時，必須在保留領域特定業務邏輯的同時，符合企業內部的架構框架與共享 API（Abstract, p.1）。作者指出，直接套用 LLM 進行代碼翻譯雖能產生語法上有效的輸出，卻常常無法在既有生產框架中編譯或整合，限制了實務採用（Abstract, p.1）。研究脈絡是一家歐洲金融機構正在進行的現代化專案，將約 250 萬行 PL/SQL 遷移到以 Java 為基礎、依賴共享函式庫與內部 API 的新架構（§1, p.1；§3, p.2）。相對既有工作，本文自我定位為少數針對「函式級以上、需對齊內部 API 與共享函式庫的企業級框架感知翻譯」設計的多代理方法；既有評估多聚焦於 Python、C++ 等資料豐富的熱門語言對，且通常只在函式層級評估，無法涵蓋與內部函式庫互動的模組遷移（§1, p.1；§2, p.2）。本文延伸自 Solovyeva et al. 2025 的可行性研究，後者僅限 10 個代碼對、未考慮 API 與框架層級約束、且驗證用單元測試受限（§1, p.1–2；§2 末段, p.2）。\n\n\n![a2-method](images/a2-method.jpg)\n\n**做法**：\n- **整體框架**：LegacyTranslate 是一個 LLM 多代理框架，將翻譯任務拆解為三個協調的階段，每個代理處理翻譯挑戰的不同面向，並建立在前一代理的輸出與回饋之上、漸進式改善翻譯品質與合規性（Abstract, p.1；§3, p.2；Figure 1, p.1）。雖然本文聚焦 PL/SQL→Java，作者宣稱方法可推廣到其他語言遷移情境（§2 末段, p.2）。\n- **代理一：Initial Translation Agent（初始翻譯代理）**：負責從遺留語言到目標語言的第一階段翻譯，產生可能仍需精煉與 API 感知處理的草稿版本（§2 末段, p.2；§3.1, p.3）。其以「in-context examples retrieval」（檢索式增強提示）實作：利用一組對齊的 PL/SQL↔Java 配對作為範例集 D = {(sₙ, jₙ)}，給定測試 PL/SQL 查詢 sₜ，以檢索模型 R 取得 top-k 語義相似的翻譯配對 Dₖ = R(D, sₜ)，再由 LLM π_θ 依 Dₖ 與 sₜ 產生 Java 翻譯 jₜ = π_θ(Dₖ, sₜ)（§3.1, p.3）。提示包含三個關鍵元件：目標 Java 架構（含共享介面）的描述、檢索到的 PL/SQL→Java 翻譯範例配對、以及待翻譯的 PL/SQL 代碼片段；提示設計沿用 Solovyeva et al. 2025（§4 Prompts, p.4；§3 末段, p.2）。\n- **代理二：API Grounding Agent（API 接地代理）**：處理初始翻譯無法編譯的情況，藉由提供相關 API 來改善代碼（§3.2, p.3）。其建構一個「API knowledge base（API 知識庫）」：對專案的架構化 Java 函式庫——特別是定義新元件應如何在現代化框架中實作的共享 API 與介面——進行靜態分析，遍歷 Java 原始檔並抽取每個 API 的關鍵屬性（所屬類別、簽章（名稱、參數、回傳型別）、主體、檔案位置），再用 LLM 為這些條目生成簡短描述（§3.2, p.3）。給定 API 知識庫 A、Java 翻譯 jₜ 與編譯錯誤訊息 Eₜ，LLM 被提示產生相關 API 的候選清單 Aₜ ← π_θ(A, Eₜ, jₜ)，清單長度由 LLM 依 jₜ 內容自行決定（§3.2, p.3）。\n- **代理三：Refinement Agent（精煉代理）**：基於「編譯器錯誤是改善代碼翻譯的有效訊號」此一前提，執行迭代式代碼精煉（§3.3, p.3，引用 [1]）。每次迭代編譯當前生成代碼 jₜᵐ、收集錯誤訊息 Eₜᵐ，再以 jₜᵐ、候選 API Aₜ 與錯誤回饋 Eₜᵐ 提示 LLM 產生改善的翻譯 jₜᵐ⁺¹ ← π_θ(Aₜ, Eₜᵐ, jₜᵐ)，m = 0,…,Mₜ；其中 jₜ⁰ 為 Initial Translation Agent 的輸出、Eₜ⁰ 為其錯誤（§3.3, p.3）。精煉迴圈持續到代碼成功編譯、通過所有相關測試案例、或精煉一步後無新增測試通過為止；因此迭代次數 Mₜ 並非預先設定，而是隨每個測試樣本變動（§3.3, p.3）。\n- **流程控制邏輯**：依 Figure 1，初始翻譯後先以單元測試評估；若失敗才進入 API Grounding 與 Refinement（圖說明：實線=標準流程，虛線=僅在失敗時執行）（Figure 1, p.1；§3 末段, p.2–3）。\n- **受測 LLM 與檢索模型設定**：骨幹 LLM 為 Qwen2.5-Coder-14B（針對代碼任務優化的指令微調模型）；檢索使用 SFR-Mistral 稠密檢索器，嵌入向量維度 4096；檢索範例數設為 k = 3（在相關性與提示長度間取最佳折衷）；API Grounding Agent 為 API 知識庫條目生成描述時使用 Claude 3.7 Sonnet（§4 Models, p.3）。\n- **運算環境**：全部實驗在單顆 NVIDIA A100（40 GB 記憶體）上進行，總計約 5 GPU 小時（§4 Models, p.3）。\n- **資料集建構**：在一個內部策劃的資料集上評估，含 68 個對齊的 PL/SQL↔Java 配對，代表遺留代碼庫中各類模組型態；每段 PL/SQL 由工程師手動遷移、提供 ground-truth Java 參考（§4 Dataset, p.4）。PL/SQL 片段長度介於 65 至 292 行（平均 101.7 行）（§4 Dataset, p.4）。每個樣本含工程師撰寫、於實際生產框架中執行的多個單元測試，可在多層次驗證生成代碼：結構有效性、框架內成功編譯、API 合規性、功能正確性（§4 Dataset, p.4）。另維護一組獨立的 68 個對齊配對供範例檢索器使用，以及一個含 80 條目、由目標架構共享 Java 函式庫抽取而成的 API 知識庫（§4 Dataset, p.4）。作者明言目前無公開基準支援真實的 PL/SQL→Java、API 相依的遷移評估，故評估全依賴真實生產代碼（§4 Dataset, p.4）。\n- **評估指標**：以三個標準指標評估生成的 Java 代碼——Structural Validity（SV，輸出是否形成有效抽象語法樹）、Compilation Rate（CR，於單元測試環境執行時是否編譯）、Test Pass Rate（TPR，功能正確性，以每個可編譯輸出通過測試的比例衡量）（§4 Evaluation Metrics, p.4）。範例檢索品質以 NDCG@3、MRR@3、Recall@3 三項評估（分別衡量整體排序品質、第一個相關範例出現的早晚、top-3 內是否檢索到相關範例）（§4 Evaluation Metrics, p.4）。\n- **基線設定**：與兩個基線比較——LLM-only（直接翻譯測試樣本，不含範例配對或 API 資訊）；LLM+Random Examples（隨機選取三個 PL/SQL↔Java 配對加入提示，配對數與 LegacyTranslate 一致）（§4 Baselines, p.4）。作者未將 Solovyeva et al. 2025 的提示策略列為基線，因其提示未公開（§4 Baselines, p.4）。\n\n\n![a2-findings](images/a2-findings.jpg)\n\n\n**核心發現**：\n- **RQ1 整體效能（API 感知 PL/SQL→Java 翻譯）**：完整 LegacyTranslate 管線達成 52.9% 編譯率與 33.8% 測試通過率（Abstract, p.1；§5 RQ1, p.4；Table 1, p.3）。\n- **LLM-only 基線完全失敗於框架整合**：直接提示 LLM 翻譯，結構有效性僅 42.6%，編譯率與測試通過率皆為 0.0%——沒有任何樣本能編譯或通過測試（Table 1, p.3；§5 RQ1, p.4）。原因是目標框架要求代碼擴充特定基礎類別並使用內部 API；缺乏範例或架構指引，LLM 只能生成語法上有效但無法在生產框架中編譯的通用 Java（§5 RQ1, p.4）。\n- **隨機範例只改善結構、無助於編譯**：LLM+Random Examples 將 SV 由 42.6% 大幅提升到 98.5%，顯示即使是不相關的範例也能幫助 LLM 產生結構更一致的輸出；但 CR 僅微幅由 0.0% 升到 1.5%、TPR 仍為 0.0%，說明隨機範例無法讓模型學到框架模式（Table 1, p.3；§5 RQ1, p.4）。\n- **多代理框架的整體增益**：相對基線，LegacyTranslate 將 SV 推到 100%，更重要的是 CR 與 TPR 分別躍升至 52.9% 與 33.8%，顯著超越基線並印證多代理系統的有效性（Table 1, p.3；§5 RQ1, p.4）。\n- **各代理的逐項貢獻（消融）**：「w/o API & Refine」列（僅用 Initial Translation Agent）達 SV 98.5%、CR 45.6%、TPR 30.9%；加入 API Grounding Agent 與 Refinement Agent 後，CR 額外提升約 8%（45.6%→52.9%）、TPR 提升約 3%（30.9%→33.8%）（Abstract, p.1；Table 1, p.3；§5 RQ1, p.4）。作者據此論證每個代理都對翻譯品質有一致的貢獻（§1 contributions, p.2；§5 RQ1, p.4）。\n- **第二輪精煉的邊際效益**：第二輪精煉再帶來額外 3% 改善，暗示更進一步的增益可能需要更強的模型或更深的架構知識（§5 RQ1, p.4）。\n- **核心觀察——無 API 接地幾乎無法編譯**：論文的中心發現是，若無明確的 API 接地，幾乎沒有任何生成代碼能在目標框架內編譯——凸顯了語法上有效的 LLM 輸出與「可投入生產」代碼之間的落差（Abstract, p.1；§2 末段, p.2）。\n- **檢索品質直接影響功能正確性、模型容量決定框架約束處理**：作者強調檢索品質直接影響功能正確性，而模型容量在處理框架層級約束上扮演決定性角色（Abstract, p.1）。\n- **RQ2 檢索器選擇的影響**：Figure 2 比較不同檢索器的範例檢索效能（GIST-large 1024、BGE-large 1024、Codesage-small 768、SFR-Mistral 4096）；其中 SFR-Mistral 嵌入維度最大（4096），在 NDCG@3、MRR@3、Recall@3 三項皆達最高檢索效能，明顯優於其他候選（Figure 2, p.4；§5 RQ2, p.4）。此結果與既有研究一致：高維稠密檢索器能為代碼相關任務提供語義上更對齊的範例（§5 RQ2, p.4，引用 [12]）。\n- **RQ2 LLM 選擇的影響（Table 2）**：固定 SFR-Mistral 為檢索器後評估多個 LLM 於 Initial Translation Agent 的表現——Qwen2.5-14B：SV 98.6%、CR 45.58%、TPR 30.88%、生成時間 32.26 秒/樣本；CodeLlama-13B：SV 8.83%、CR/TPR 皆 0.0%、40.26 秒；Qwen2.5-7B：SV 7.36%、CR/TPR 皆 0.0%、19.27 秒；CodeGemma-7B：SV/CR/TPR 皆 0.0%、生成時間最短 6.50 秒（Table 2, p.4；§5 RQ2, p.4）。\n- **模型容量是關鍵瓶頸**：Qwen2.5-14B 提供最佳表現，能持續產生可編譯、可通過測試的代碼，延遲適中（每樣本約 32 秒）；較小模型（Qwen2.5-7B、CodeLlama-13B、CodeGemma-7B）則常無法生成有效或可編譯輸出，因其缺乏處理此任務所需的長且脈絡密集提示的能力（§5 RQ2, p.4）。\n- **品質與模型容量正相關、但有代價**：翻譯品質隨模型容量明顯提升——更大、代碼專精的 LLM 帶來更高正確性與更好的框架對齊，但代價是更長的生成時間（§5 RQ2, p.4；Table 2, p.4）。\n- **翻譯品質對 LLM 與檢索器容量皆高度敏感**：作者觀察到翻譯品質會隨 LLM 與檢索器容量大幅變動，因此模型選擇對達成高翻譯效能至關重要（§1 contributions 第 3 點, p.2；Abstract, p.1）。\n- **作者自陳的限制與未來工作**：API 感知遺留翻譯仍受限於缺乏公開資料集與微調模型，作者鼓勵未來工作處理此問題；多代理框架可擴展到其他語言並加入更多代理（§6 Conclusions, p.4；§2 末段, p.2）。\n- **效度威脅（資料規模與真實性）**：評估僅基於 68 個樣本的內部資料集、單一機構的 PL/SQL→Java 情境，且無公開基準可供比較，外部效度有限；不過資料皆來自真實現代化專案的生產代碼，提供了實務可行性的證據（§4 Dataset, p.4；§5 RQ1, p.4）。\n\n---\n\n### 3. 從翻譯到超集 — 以公開 agent 基準作為目標函數，把生產級 AI agent 從 Rust 持續翻譯演進為 Python 超集\n*Wang et al. 2026, arXiv:2604.11518（摩根大通 JP Morgan Chase「LLM Suite Team」）*\n\n![a3-scope](images/a3-scope.jpg)\n\n\n**定位**：本文針對大型軟體系統「跨語言遷移」這一長期工程難題，提出一套 **LLM 輔助持續程式碼翻譯（LLM-assisted continuous code translation）** 方法論，並以摩根大通內部生產級 AI coding agent「Codex CLI」為實證對象——將其原始的 Rust 程式庫（648K LOC、65 個 crate）翻譯成 Python（41K LOC、28 個模組）(Abstract, p.1；§I, p.1)。相對於既有「一次性遷移」與「函式層級轉譯」工作，本文兩項自我定位的新意為：(1) 主張**公開 agent 基準（Terminal-Bench、SWE-bench Verified）可作為翻譯品質的「目標函數／損失函數」**，由基準分數驅動迭代式除錯，而非只把基準當成下游驗證；(2) 提出「持續上游同步」架構，使遷移成為一座連接源碼庫與目標碼庫的「活橋（living bridge）」，能持續吸收上游 Rust 更新，而非翻譯完即兩邊永久分岔(§I, p.1–2；§VII, p.13)。論文進一步主張，遷移不必止於功能對等——Python port 已演化為原版的「能力超集（capability superset）」(§I, p.2)。\n\n\n![a3-method](images/a3-method.jpg)\n\n**做法**：\n- **研究對象與遷移情境**：受測系統 Codex CLI 是一個跑在終端機的生產級 AI coding agent，連接 OpenAI Responses API，支援多種 LLM 後端（GPT-4、o3、o4-mini、以及經 Ollama/LM Studio 的本地模型），提供互動式 chat 與非互動式 batch 兩種執行模式，並透過 MCP 強制執行可設定的安全策略(§II-A, p.2)。原始 Rust 版以 Tokio async runtime 實作、65 個 crate、約 648K LOC；遷移到 Python 的三大動機為：迭代速度（快速原型與部署 agent 能力）、生態整合（Python 在 ML/AI 生態的主導地位）、貢獻者可及性（降低外部貢獻者與外掛開發者門檻）(§II-C、§II-D, p.2)。\n- **三層架構對應關係**：論文以三欄架構圖呈現遷移成果——左為 Rust 原版 6 個 crate（core / exec / tui / cli / mcp / login）；中為 Python port（`codex.*`），採「一個 Rust crate 對應一個 Python 模組」並宣稱與 Rust 達成「1:1 wire-level parity」；右為 Python 獨有的 `codex.enhancements` 超集（35 個 flag-gated 能力，圖中標示 30 個為主要 flag）(Fig.1, p.3)。Python 系統依六大架構層組織：Agent 層、Security 層、Protocol 層、Integration 層、Presentation 層、Infrastructure 層(§II-B, p.2)。\n- **單體 runner 的模組化拆解**：原本 Rust 的單體 runner 在 Python port 中被拆解為單一職責模組——具狀態的 `QueryEngine`（持有 agent loop 生命週期）、`auth` 引擎（憑證解析與 JWT 刷新）、`config_loader`（分層 TOML 設定）、`sandbox` 模組（平台專屬命令隔離）、`permissions` 模組（統一三層審批管線）、`StreamingToolExecutor`（以 semaphore 控制併發工具派發）、`tool_result_budget`（超大輸出管理）；另有一個輕薄的 `runner.py` orchestrator 委派給這些模組並維持向後相容的 re-export(§III-A, p.3)。\n- **agent runner 核心執行迴圈**：執行迴圈為 (1) 送出當前對話上下文給 LLM API、(2) 接收可能含工具呼叫的回應、(3) 經 orchestrator 執行每個工具呼叫、(4) 把結果追加回對話、(5) 重複直到模型產出最終回應或達上限轉數（預設 50 turns）(§III-A, p.2–3)。\n- **agent runner 關鍵設計決策**：採事件驅動架構，runner 發出具型別的事件（`TurnStarted`/`ToolCall`/`ToolResult`/`TurnCompleted`）供 presentation 層消費，達成 agent 邏輯與 UI 渲染的鬆耦合；採「轉內審批快取（turn-scoped approval caching）」——使用者批准某工具呼叫後在當前轉內快取，避免同一邏輯步驟內對等價操作重複提示；多階段上下文管理分三相——microcompaction（就地剝除過時工具輸出）、snip compaction（移除低價值訊息）、full compaction（LLM 摘要並在壓縮後還原最多 5 個檔案、token 預算 50K，並保留 ghost snapshot）；工具結果預算化——超過 100K 字元的輸出存到磁碟並換成含 head/tail 預覽的指標訊息以防上下文耗盡；分層權限中介層——單一 `can_use_tool()` 進入點依序評估 config 樣式比對、guardian LLM 風險評估、互動使用者提示三層，結果按轉快取(§III-A, p.3)。\n- **工具編排（Tool Orchestration）**：orchestrator 維護一個 `ToolHandler` registry，包含 `shell`（在安全 sandbox 內執行 shell 命令）、`apply_patch`（套用 unified diff 並偵測衝突）、`list_dir`（可設深度的目錄列舉）、`mcp_handler`（委派給 MCP server 工具）、`request_permissions`（處理執行期權限提升）；每次工具呼叫都經三階段管線——policy check（執行策略引擎）、approval check（guardian 或使用者提示）、sandboxed execution（含結果擷取）(§III-B, p.3–4)。\n- **安全 sandbox 與執行策略引擎**：sandbox 對工具執行強制檔案系統與網路隔離，三套平台實作——macOS（Seatbelt 動態 profile）、Linux（Bubblewrap 掛載命名空間 + Landlock 檔案存取控制 + seccomp syscall 過濾）、Windows（受限 process token + job object）；策略以三種遞增寬鬆模式組織——`read-only`（預設）、`workspace-write`、`full-access`（需明確 opt-in）。執行策略引擎在 sandbox 強制前先以宣告式規則集（Python DSL，支援命令字串前綴比對、依 host/port 的網路存取控制、host 可執行檔白名單）評估工具呼叫；策略與機制分離使 user/org 可在執行期合併各自的策略層(§III-C、§III-D, p.4)。\n- **多 agent 編排、MCP 與狀態管理**：多 agent 子系統支援階層式任務委派——父 agent 可生成子 agent，繼承對話上下文（經 history forking）、指派子任務；安全界限為遞迴最大深度 5、每父最多 10 個子 agent、每 session 最多 100 個 agent，每個子 agent 在自己的 sandbox 範圍與審批上下文運作。MCP 整合提供雙向協定支援（作為 client 連外部 MCP server，作為 server 對外曝露自身能力），client 支援 stdio 與 Streamable HTTP（含 SSE）兩種傳輸並具 OAuth 認證與自動 token 刷新。Session 狀態持久化到 SQLite（WAL 模式），schema 版本化（state 用 v5、logs 用 v1）以支援前向相容遷移(§III-E、§III-F、§III-G, p.4)。\n- **Python 獨有超集 `codex.enhancements`**：在 wire-level parity 之上，Python port 演化出含 30 個 feature-flag 能力的擴充模組，全屬「加性（additive）」——延遲載入、絕不修改核心資料結構、排除於 parity 測試之外；採四層 flag 解析系統（build-time compiled flags → 環境變數 → runtime `--enable`/`--disable` override → defaults），讓營運者可跑「strict parity mode」（全部 enhancement flag 關閉，供蘋果對蘋果基準比較）或「extended mode」(§III-H, p.4–5)。enhancement 子套件按類別實作：`agents/`（階層多 agent）、`memory/`（型別與語意記憶提取）、`compaction/`（multi-strategy 與 forked 壓縮）、`resilience/`（source-aware retry 邏輯）、`startup/`（prefetch 最佳化）、`state/`（app 層狀態與 runner 橋接）、`tools/`（工具註冊與命令 registry 擴充），另含 intent-preservation 增強（`PERSISTENT_PLANS`/`SYSTEM_REMINDERS`/`DENIAL_REPLAY`）此一 Rust 無對應的功能類別(§III-H, p.4–5)。完整 30 個 flag 與預設值列於附錄 Table XIII，例如 `MULTI_AGENT`(預設 On)、`GUARDIAN`(On)、`SEMANTIC_MEMORY`(Off)、`IDE_BRIDGE`(Off)、`NOTEBOOK_EDIT`(Off)、`WORKTREE_TOOLS`(Off)、`COST_TRACKING`(On) 等；全部設為 off 即得到行為與 Rust 原版相同的 strict-parity build(Table XIII, p.15)。\n- **LLM 輔助翻譯流程**：不同於語法層的轉譯工具，本方法以 LLM 為翻譯引擎，在「模組層」運作——對每個 Rust crate，提供 LLM 原始碼、其測試套件、以及目標 Python 模組的既有上下文（imports、相依模組），由 LLM 產出保留行為語意、符合 Python 慣例的「慣用（idiomatic）」Python（而非機械式 transliteration）；翻譯按相依順序進行——先 foundation 模組（protocol types、config、utils），再 infrastructure（state management、authentication），再 core logic（agent runner、tool handlers），最後 presentation（CLI、TUI），確保每個被翻譯模組可 import 已翻好的相依(§IV-A, p.5)。\n- **Rust→Python idiom 映射**：論文系統性整理翻譯樣式（Table III）——`Result<T,E>`→例外（raise/try）、`Option<T>`→`Optional[T]`、algebraic enum→`@dataclass`+`Union[...]`、simple enum→`enum.Enum`、`struct`→`@dataclass(frozen=True)`、`impl Trait`→Protocol/ABC、`async/await`(Tokio)→`async/await`(asyncio)、`Arc<Mutex<T>>`→純物件（GIL）、`serde`→Pydantic `BaseModel`、`reqwest`→`httpx`、`ratatui`→Textual、`clap`→Click、`sqlx`→`sqlite3`、Cargo workspace→單一 `pyproject.toml`(Table III, p.5)。關鍵設計決策：protocol 層（4,016 LOC 型別定義、審批工作流、設定 schema）用 Pydantic `BaseModel` 以早期捕捉協定違規，內部 hot-path 型別則用 `@dataclass` 避開 Pydantic 驗證開銷；TUI 用 Textual（取代 Rust 的 ratatui 自訂事件迴圈）；併發用 asyncio + anyio 抽象層（因工作負載壓倒性是 I/O-bound——LLM API 呼叫與檔案操作——故 GIL 取捨有利）(§IV-C, p.5–6)。\n- **持續上游同步架構（四階段管線）**：因上游 Rust 每日更新，Python port 須持續吸收。管線為——Track（上游 Rust repo 以 git submodule 追蹤，定期 `git pull`）、Diff（轉換腳本 `scripts/convert-diff.py` 抽取變更的 Rust 模組並以模組對應表映射到 Python 對應，例 `codex-rs/exec`→`codex.exec`）、Translate（LLM 只翻譯 diff 而非整個 crate，以既有 Python 模組為上下文）、Validate（三層測試：unit tests、`mypy --strict` 型別檢查、`tb run` 基準回歸）。此架構把基準分數當「loss function」——當翻譯造成回歸，LLM 以失敗的測試／基準為額外上下文重新檢視翻譯，直到 parity 恢復(§IV-D, p.6；Fig.2, p.6)。\n- **四層驗證策略**：(1) Unit tests（2,621 個測試函式，鏡射 Rust 測試套件）；(2) Integration tests（端到端驗證 28 模組正確互動）；(3) Parity tests（明確驗證渲染輸出與協定序列化與 Rust 一致）；(4) Benchmark regression（head-to-head Terminal-Bench 評估，確保 Python port 任務解決準確率在 Rust 基線 5% 以內）(§IV-E, p.6)。\n- **基準作為目標函數的四種作用**：論文指出 unit tests 雖必要但不足以驗證翻譯正確性，許多細微 bug（API 協定不符、工具註冊錯誤、輸出格式差異）只在完整 agent 管線對著真實任務跑時才浮現。公開 agent 基準的四項作用為——偵測整合失敗、暴露 API 協定 bug、揭露環境假設、量化 parity（每次基準跑產出一個直接量測功能對等的純量準確率，供迭代式細化）(§IV-A, p.5)。\n- **實驗設定**：所有實驗在 MacBook Pro（Apple M4 Pro Max、128GB RAM、macOS 15.4）以 Python 3.13 進行；head-to-head agent 評估（Terminal-Bench、SWE-bench Verified）用 GPT-5.4，經 OpenAI Responses API。評估橫跨四維度——code metrics、test parity、runtime performance、real task benchmarks(§V, p.6)。Terminal-Bench head-to-head 為 80 任務、GPT-5.4；兩 agent 都原生安裝於 Terminal-Bench Docker 容器內，以相同 flag（`--sandbox danger-full-access --model gpt-5.4`）跑 exec；原始 Rust CLI（v0.117.0）經 npm 安裝，Python port 從 pre-built wheel 裝入隔離 virtualenv，兩者用相同 OpenAI API key 與 GPT-5.4 模型(§V-I, p.11)。SWE-bench Verified 為 80 任務、GPT-5.4、4 workers、每任務 1800 秒 timeout，adapter 對每任務 clone repo、checkout base commit、以 issue 描述為 prompt 執行 `cdx exec`、以 `git diff` 擷取 patch，80 任務約 2 小時跑完(§V-J, p.12)。\n\n\n![a3-findings](images/a3-findings.jpg)\n\n\n**核心發現**：\n- **基準驅動除錯逐步收斂 parity gap（Terminal-Bench 五次迭代）**：v0 baseline（原始 Rust CLI）準確率 47.5%；v1（naive tmux adapter）暴跌至 0.0%；v2（完整 agent runner 配 Chat Completions）回到 31.3%；v3（Responses API function tool 修正）35.0%；v4（對話歷史修正）35.0%；v5（venv 隔離 + ripgrep 安裝）達 45.0%(Table II, p.5)。最終經 6 次迭代達 42.5%（含 API 400 修正後完整 rerun），對比 Rust 原版 47.5%(§I, p.1；§V-I, p.11)。\n- **Terminal-Bench head-to-head 結果**：Python port（codex-python）解 34/80 任務（42.5%），Rust 原版解 38/80（47.5%）；80 任務中 25 個兩者皆解、9 個僅 Python 解、13 個僅 Rust 解；Python unique passes 9、Rust unique passes 11(Table XI, p.11)。3.8 個百分點的差距，作者歸因於 LLM 的非決定性與細微環境因素，而非任一實作的架構限制(§V-I-c, p.11–12)。\n- **Terminal-Bench unique passes 的型態分析**：僅 Python 解出的 9 個任務含 `fibonacci-server`、`jupyter-notebook-server`、`pytorch-model-cli`（2 變體）——皆涉及 Python 生態工具，Python port 對其環境的熟悉度提供優勢；僅 Rust 解出的 13 個任務含 `chess-best-move`（需延伸多轉推理）、`path-tracing`、`sqlite-db-truncate`(§V-I-c, p.11–12)。\n- **SWE-bench Verified head-to-head 結果（Python 領先）**：Python port 解 59/80 任務（73.8%），其中 astropy 子集 22 任務 patch 22 解 12（54.5%）、django 子集 58 任務 patch 58 解 47（81.0%）；原始 Rust CLI 解 56/80（70.0%）(Table XII, p.12)。Python 在 django 表現特別強（81.0%）；3.8 個百分點的領先在 LLM 非決定性的誤差範圍內(§V-J, p.12)。\n- **程式碼行數縮減（12.3× 整體，最大模組 71×）**：Python 實作 52,685 LOC（328 檔），對比 Rust 648,789 LOC（1,555 檔），整體 12.3× 縮減（摘要中另稱 15.9× code reduction，對應 41K vs 648K 的計法）(§V-A, Table IV, p.6–7；Abstract, p.1)。按模組差異甚大：`core` 模組 71.0×（Py 2,561 vs Rs 181,903，註：agent 與 core 在 Table IV 中 Rs LOC 同列 181,903）、`tui` 17.1×（Py 5,532 vs Rs 94,675，因 Textual 高階抽象 vs ratatui 低階渲染）、`agent` 14.2×、`cloud` 11.0×、`telemetry` 10.0×；縮減比最小的是 `features` 1.4×、`plugin` 1.3×、`sdk` 1.3× 等基礎建設模組(Table IV, p.7)。Python 模組平均密度 145 LOC/檔，Rust 平均 417 LOC/檔(§V-A-c, p.6)。\n- **環圈複雜度（cyclomatic complexity）**：以 radon 量測全部 4,692 個 Python 函式，平均複雜度 2.70（rank A），89% 函式達最低複雜度 rank A；僅 23 個函式（0.5%）超過 rank C，集中於 agent runner（處理複雜狀態轉換）與 sandbox manager（平台專屬分支邏輯）；runner 模組近期的拆解改善了每函式複雜度(§V-A-b, p.6；Fig.4, p.8)。\n- **測試 parity**：Python 套件 2,902 個測試函式，對比 Rust 8,490 個（約 3× 差距）；作者把差距歸因於三因素——Python 高階抽象消除整類測試（記憶體安全、ownership、lifetime edge case）、Rust co-locate unit test 的慣例膨脹 source 檔含瑣碎 accessor/trait 測試、Python 套件寫的是行為契約（「agent 是否產生正確的工具呼叫」）而非內部不變量。Python 套件 62 tests/KLOC（正規化後的厚度指標）；e2e 模組 45 個測試在 Rust 完全沒有對應(§V-B, Table V, p.7)。Table V 顯示 Python 在 unit-test 數最高的模組仍遠少於 Rust，例 `core` Py 202 vs Rs 2519、`agent` Py 661 vs Rs 2519、`tui` Py 263 vs Rs 1401。\n- **執行期效能（啟動／記憶體／import）**：Python CLI 啟動平均 53.9ms（σ=2.1ms、n=20），約比編譯後 Rust binary 慢 3–5×，但相對於數分鐘至數小時的 agent session 可忽略（佔總 session 時間 <1%）；peak resident memory 30.3MB（σ=0.1MB、n=5），高於 Rust binary 典型的 10–15MB，但對跑在 8–64GB RAM 系統的桌面應用而言不大；import time 57.0µs；可 import 模組 328 個(§V-C, Table VI, p.7–8)。\n- **本地計算開銷可忽略（相對 LLM API latency）**：工具編排開銷約 30µs；shell 執行支配本地 latency——spawn subprocess 並擷取輸出耗 3–7ms（本地計算成本主來源），但仍比典型 LLM API 呼叫快 3 個數量級；patch parsing 與 policy matching 為 sub-microsecond；完整 pipeline（orchestrator→approval→shell→result capture）3.5ms。在每次 LLM round-trip 耗 1–10 秒的典型 agent session 中，本地 Python 計算佔總 latency <0.1%(§V-C, p.8；§V-D, p.8)。\n- **真實子系統與 LLM pipeline 微基準**：Table VII 顯示 orchestrator（skip approval）0.030ms、shell handler `ls | head` 6.672ms、token estimation（2K words）<0.001ms、`should_compact` decision 0.500ms、SQLite state（session+20 msgs）0.074ms；Guardian fast-path 對 10 個安全命令比對 0.035ms、對 5 個危險命令 0.005ms，使常見操作無須 LLM 即可 sub-millisecond 審批決策；完整 guardian review（含 mock LLM）0.36ms；解析 50 個 SSE event 0.030ms；30-turn 對話含工具呼叫序列化為 JSON 0.093ms(§V-D、§V-H, Table VII, p.8、10–11)。\n- **端到端 agent 評估（8 任務 100% 成功）**：8 個代表性任務（建立 Python 檔、shell echo、多步檔案建立、目錄列舉、git status、複雜 pipeline、檔案 patch 更新、token 估算準確性）每任務跑 5 次共 40/40 全成功（100%）；任務 latency 從 0.07ms（純 patch 操作）到 24.7ms（含 patch 套用與 shell 執行的複雜多工具 pipeline），支配成本為 shell 命令的 subprocess spawn（每命令約 3–7ms），多工具任務隨 shell 呼叫數線性 scale，確認編排層無系統性開銷(§V-G, Table X, p.10)。\n- **程式碼品質分析（API surface、型別、相依）**：Python 定義 1,385 個 class、2,363 個 function/method，Rust 曝露 2,675 個 struct/enum、20,525 個 function/method（Table VIII 另列 Classes/Structs+Enums Python 1,590 vs Rust 2,675、Methods 1,828 vs 11,202、Top-level functions 781 vs 9,323），Python 達成更高 API 密度——以更少定義服務等價功能；395 個 Python method 明確為 async，直接映射 Rust 的 async trait 實作。`mypy --strict` 在 282 檔中 69 檔出現 248 個 type error，strict type-clean rate 75.5%，多數錯誤來自第三方 library type stub（Textual、httpx）而非應用邏輯；程式庫中 0 個 TODO/FIXME/HACK comment（Rust 有 126 個），顯示乾淨的生產就緒狀態。相依結構呈清楚分層：foundation 模組（core/config/utils）被廣泛依賴，peripheral 模組（cli/tui）消費多相依但不被他者 import，`agent` 模組為主要整合點、高 fan-in 與 fan-out(§V-E, Table VIII, Fig.9, p.8–9)。\n- **遷移工作量量化（git history）**：repo 共 4,947 commits（Table IX 列 4957），密集遷移期（2026 年 3 月 25–27 日）有 116 commits（Table IX 列 146）；遷移期新增 109,427 行、刪除 906,656 行，淨減 797,229 行（Table IX 淨變動列 -775,179）；測試套件漸進演化，commit message 在 1,881、2,343、最終 2,621 passing tests 標記里程碑，顯示 test-driven 的逐模組增量驗證；遷移期 45 個 test-related commit（Table IX 列 55）凸顯對正確性驗證的重視；平均 commit 大小 1,314 行(§V-F, Table IX, p.9–10)。\n- **基準揭露的四個 bug（unit tests 看不見）**：(1) **WebSocket 傳輸穩健性問題**（`ws_transport.py`）——API quota 耗盡時 WebSocket 連線靜默回傳空回應，agent 誤判為成功的 no-op 並把任務標記完成卻沒做事；修正除了補靜默失敗，HTTP SSE fallback 路徑還加上 Rust transport 沒有的穩健性改進——逐請求 429 偵測配 `Retry-After` header 解析、指數退避、quota 耗盡時自動 fallback-API-key 輪替；此結構性弱點兩實作皆有，但只有 Python run 受影響（Rust 基線用了 fresh API key）。(2) **記憶體提取 model error**（`phase1.py`）——post-rollout 記憶體提取的 model identifier 未解析到有效 endpoint，造成每次完成 rollout 後 404 Not Found；修正為把 model name 改為 `gpt-5.4-nano`。(3) **`_cost_tracker` NameError**（`runner.py`）——成本追蹤變數在 Docker-run 程式路徑被引用卻未賦值，使部分任務 crash；修正為在外層 scope 頂部初始化。(4) **全面 API 400 error recovery**（`runner.py`）——某些 prompt 下模型產生含不支援 content-item type 的回應，Responses API 回 HTTP 400（`invalid_value` on `inp
