42 秒**生成文件，CodeWiki 需 3,672.61 秒（較 RepoDoc 慢 196%）、RepoAgent 需 18,628.87 秒（較 RepoDoc 慢 1,400%）（Xu et al. 2026, §4.4.2, Table 4, p.9）。\n\n- **效率（RQ3）——token 與成本**：RepoDoc 平均消耗 **780.42K tokens**、每倉庫成本僅 **0.39 美元**；CodeWiki 為 5,311.04K tokens（+580%）、成本 2.66 美元（+582%）；RepoAgent 為 4,704.05K tokens（+503%）、成本 2.35 美元（+503%）。成本由 token 量乘 DeepSeek V3 定價換算。作者把節省歸因於知識圖譜式檢索只抽相關程式碼片段、避免了基線把整個檔案灌入 prompt 的上下文膨脹（Xu et al. 2026, §4.4.2, Table 4, p.9）。\n\n- **Finding 3（RQ3 總結）**：RepoDoc 相對兩基線顯著降低生成時間與成本——CodeWiki 較 RepoDoc 多 196%（時間）、580%（tokens）、582%（成本）；RepoAgent 較 RepoDoc 多 1,400%（時間）、503%（tokens）、503%（成本）；節省來自只抽相關程式碼片段的知識圖譜式檢索（Xu et al. 2026, §4.4.2, Finding 3, p.9）。\n\n- **增量更新（RQ4）——評估設計**：在 Python 倉庫上以三種文件生成情境比較——**Base**（選定 commit 之前的程式碼狀態做的初始全量文件）、**Full**（在新 commit 從零全量重生）、**Update**（只修改受影響元件的增量更新）。每個倉庫先辨識 20 個真實 commit、涵蓋多樣變更模式（API 新增／修改、功能實作、bug 修復、重構，各 5 個）；以 commit 前狀態生成 Base 文件、套用變更後同時評估 Full 重生與 Update 增量。為公平評估增量能力，作者量測 **recall improvement rate**——Update 與 Base 召回率之差，而非絕對數值，因這更能捕捉系統在程式碼演化中辨識受影響元件的能力。比較基線為 RepoAgent（CodeWiki 不支援增量故排除）（Xu et al. 2026, §4.5.1, p.9-10）。\n\n- **增量更新（RQ4）——時間與 token 大幅下降**：RepoDoc 的增量更新藉知識圖譜的 Semantic Impact Propagation，相對全量重生**降低更新時間 73%、降低 token 用量 77%**。Table 5 的具體數字（DeepSeek V3.2、每倉庫 20 情境）顯示——RepoDoc 在「僅用 commit」的增量情境下時間從 1,242 秒降至 **342 秒（↓73%）**、token 從 780K 降至 **181K（↓77%）**（Xu et al. 2026, §4.5.2, Table 5, p.9-10; Abstract, p.1）。\n\n- **增量更新（RQ4）——Update Recall 較全量重生高 10.2%**：更重要的是，RepoDoc 的增量更新達 **97.0% Update Recall**，較全量重生（Full regeneration）的 88.0% 高出 **10.2%（recall improvement rate）**，顯示增量更新能比全量重生更正確地辨識並納入程式碼變更。作者把此改善歸因於知識圖譜式 Semantic Impact Propagation 能透過相依遍歷精準辨識所有受影響元件（Xu et al. 2026, §4.5.2, Table 5, p.9-10）。\n\n- **增量更新（RQ4）——對 RepoAgent 的根因對比**：RepoAgent 在「僅用 commit」情境下達 **86.0% Update Recall**，較其全量重生（80.0%）改善 **7.5%**；RepoDoc 的 10.2% 改善超越 RepoAgent 的 7.5%。作者解讀為：RepoAgent 只偵測檔案級變更而無語意理解、無法追蹤介面修改如何經間接關係波及實作類別或呼叫函式，而 RepoDoc 的知識圖譜語意遍歷能跨模組邊界精準辨識受影響元件。Table 5 另顯示 RepoAgent 在「僅用 commit」情境下時間 6,520 秒（↓65%）、token 1,645K（↓65%）（Xu et al. 2026, §2, p.3; §4.5.2, Table 5, p.9-10）。\n\n- **Finding 4（RQ4 總結）**：RepoDoc 的知識圖譜式 Semantic Impact Propagation 帶來有效的增量文件更新——透過選擇性重生降低更新時間 73%、token 用量 77%；增量更新達 10.2% 的 Update Recall 改善，勝過 RepoAgent 的 7.5%，證明知識圖譜的語意遍歷能在程式碼變更時精準辨識受影響元件（Xu et al. 2026, §4.5.2, Finding 4, p.10）。\n\n- **作者自陳限制——建構效度（Construct Validity）**：五個評估維度雖力求準確衡量文件品質（Coverage 量 API 文件存在性、Completeness@K 量是否能回答查詢、TQS 量五維品質、Update Recall 量增量更新有效性、Doc Information 量結構元素），但作者承認以 LLM judge 評估仍有偏誤風險，故採多模型 LLM judge 與固定 prompt 來降低偏誤、並釋出評估協定以利重現（Xu et al. 2026, §6, p.10）。\n\n- **作者自陳限制——內部效度（Internal Validity）**：為避免倉庫選擇偏好造成偏誤，作者以 24 個倉庫橫跨 8 種語言、3 種規模評估；RQ2 只在兩工具皆能生成文件的倉庫上做成對比較；RQ3 只在所有工具皆能執行的 Python 上量測；RQ4 每倉庫評估 20 個真實 commit；基線比較使用預設設定與相同硬體（Xu et al. 2026, §6, p.10）。\n\n- **作者自陳限制——外部效度（External Validity）**：雖已在多樣倉庫評估，但在私有代碼庫或特定領域應用上效能可能不同；作者以釋出 RepoDocBench、實作程式碼與資料集，讓後續研究者能在相同指標下評估泛化性並做獨立驗證（Xu et al. 2026, §6, p.10-11）。\n\n- **與本研究主題的方法論借鏡**：RepoDoc 把「commit diff → 知識圖譜雙向影響傳播 → 拓樸排序 → 選擇性重生 → 驗證」這條增量維護管線清楚形式化（含 Algorithm 1 的可實作偽碼），並以 Update Recall 量化「增量是否漏掉受影響元件」。雖然其維護對象是文件而非程式碼，但「以程式碼知識圖譜的語意關係精準界定一次變更的影響半徑、避免全量重做」這一核心思想，對 LLM 改碼代理人在大型代碼庫中判定修改的波及範圍具直接借鏡價值；其侷限是全程不涉及程式碼的編譯、測試或執行回饋，故無法直接驗證「程式碼修改的正確性」（Xu et al. 2026, §3.4, p.5-6; §4.5.2, p.10）。\n\n---\n\n## 二、跨論文綜合觀察\n\n1. **issue 解決已逼近高分，靠的是「執行層可觀察性」與「演化式約束」這兩個觀念升級**。DAIRA 把動態 trace 嵌入決策迴圈，在 SWE-bench Verified 達 79.40% (Liu et al. 2026, §4.2, p.6–7)；Agent-CoEvo 把「測試」從固定 oracle 改為與程式碼協同演化的約束 (Li et al. 2026, Abstract, p.1)。兩者都明言：瓶頸不在 LLM 的語言能力，而在「修復迴圈缺乏可靠的回饋與約束結構」。這與 D 類 Ma et al.「框架主導行為」、A 類 SaaSBench「靠高品質 reason-act-observe 迴圈而非更大互動預算」是同一主軸。\n\n2. **「定位準」不等於「修得好」——這是 repo 維護被反覆證實的落差**。MemRepair 明確量化：SWE-agent 在 SEC-Bench 的定位率（67.5%）反高於 MemRepair（60.0%），但其成功定位的漏洞 63% 仍未修好；MemRepair 的「定位到修復」轉換率為 71.6% (Liu et al. 2026, §5.1.2, p.6)。DAIRA 的案例研究亦顯示「定位到根因」與「做出系統性修正」是兩件事 (Liu et al. 2026, §4.2, p.7–8)。引用任何維護工具的「定位準確率」時，必須追問其「修復轉換率」。\n\n3. **agent 會對代碼庫造成「附帶損害」，且這是結構性而非偶發**。Refactoring Runaway 用 3,691 個 patch 證明糾纏式重構顯著傷害可編譯性（OR=0.42, p<0.001）、方法層級重構最有害 (Tian et al. 2026, §4.2.2, p.14–15)；AOCI 觀察到 agent 工具的 39 個缺陷叢聚成「架構債」與「跨任務回歸」(Liu et al. 2026, §5.2, p.7–9)；SmellBench 發現最積極的 agent 雖修最多異味卻引入 140 個新異味、淨增 109 (Dinu et al. 2026, §5.4, p.6–7)。三篇從不同角度指向同一結論：**衡量維護成效不能只看「解了幾個」，必須看「淨代碼庫品質」**——這與 A 類 SaaSBench「Quality 維度最低」、D 類 SWE-CI「贏 Pylint、輸 MI」完全一致。\n\n4. **「框架／流程設計」是比「模型本身」更強的結果變因，且在 B 類得到最直接的量化**。ReCodeAgent 消融顯示移除任一 agent 角色使測試通過率掉 22.7–30.3%、單一 agent 基線落後 61–62% (Ibrahimzada et al. 2026, §4.4, p.9)；Refactoring Runaway 顯示 SWE-agent 單框架就涵蓋全部 73 種重構類型、Agentless 僅 35 種——重構行為由框架自主度決定，而非基座 LLM (Tian et al. 2026, §4.1.2, p.9–12)；SmellBench 顯示同一模型加上 agent skill 後有效性 E 從 0.152 跳到 0.60–0.82 (Dinu et al. 2026, §5.4, p.7)。**分析任何案例都必須把框架／流程設計與模型選擇分開記述。**\n\n5. **要把 LLM 擴展到「大型」代碼庫，需要一個持久、結構化的儲存庫表徵層，而非更大的上下文視窗**。AOCI 明言「穩定的儲存庫視圖比更大的上下文窗口更重要」並以 O(1) 增量維護的索引實現 (Liu et al. 2026, §3.3 & §6, p.4、p.10)；MemRepair 用三層記憶讓修復「經驗驅動」、其中 L3 失敗→成功軌跡是最關鍵單一元件 (Liu et al. 2026, §5.2, p.7)；RepoDoc 以知識圖譜 RepoKG 為語意骨幹；Context Compression 證明連續隱向量壓縮能在 4×–128× 全程超越 full-context (Feng et al. 2026, §5.2, p.7)。四篇共同指向：**「記憶／索引／壓縮」這層基礎設施，是 repo 規模維護能否成立的前提**，本身值得作為一個子議題深入。\n\n6. **「變更的波及範圍（blast radius）」是 repo 維護的共同核心難題**。RepoDoc 的「語意影響傳播」演算法專門界定一個變更如何沿相依擴散 (Xu et al. 2026, §3.4.2, p.5–6)；AOCI 的 agent 缺陷有兩類正是「多路徑查詢遺漏」「跨模組刷新遺漏」(Liu et al. 2026, §5.2, p.7–8)；DAIRA 的價值在追到上游根因而非只補當下崩潰點 (Liu et al. 2026, §4.2, p.7–8)；MemRepair 處理的就是多檔案、跨依賴修改。**「LLM 如何正確判斷一次修改要動到哪些地方」可獨立成一個細部需求。**\n\n7. **架構級／結構性任務仍是能力天花板**。SmellBench 的最佳修復率 47.7%，明顯低於 SWE-bench Verified 的 70%+，且最難的 Improper API Usage 全 agent 0/4 (Dinu et al. 2026, §5.3 & §6, p.6、p.8)。這與 D 類 RealBench「效能隨 repo 變大急遽下滑」、A 類 SaaSBench「逾 95% 失敗在觸及商業邏輯前」一致——**任務的結構複雜度（跨模組、跨檔、架構層）愈高，LLM 的落差愈大**。\n\n---\n\n## 三、與研究目的的關聯與落差\n\n- **直接命中**：DAIRA、Agent-CoEvo、MemRepair 是「LLM 對既有 repo 做修改／維護」最核心的方法論——分別代表 issue 解決（bug 修復）、issue 解決（協同演化觀點）、漏洞修復三條主線；Refactoring Runaway 與 SmellBench 則提供「agent 維護行為的實證刻畫」與「架構級修復的能力上限」，是評估維護品質的方法論護欄。\n- **遷移子場景**：ReCodeAgent 屬「跨語言儲存庫翻譯」，與 A 類遷移案例、C 類遷移基準相互呼應，可一併納入「遷移／現代化」這一子議題。\n- **間接相關（基礎設施層）**：AOCI（索引）、Context Compression（脈絡壓縮）、RepoDoc（文件維護）並非「修改程式碼」本身，但它們是 repo 規模維護的賦能層；建議在最終論述中獨立成「使 LLM 能處理大型代碼庫的前置基礎設施」一節，不與修改案例混談。\n- **方法 vs 案例的落差**：B 類全部 9 篇都是「方法／框架／基準」，評測多在 SWE-bench、Multi-SWE-bench、scikit-learn 等學術基準或單一專案上；**真正的業界落地敘事仍以 A 類為主**。B 類的價值是「機制與方法」，A 類的價值是「現場與成效」，兩者在最終論述中應互補引用。\n- **尚缺**：(a) 多數 B 類方法仍以 Python／Java 單語言基準評估，跨語言、超大型單庫（百萬行級）的方法成效仍薄；(b) 「附帶損害」雖被 Refactoring Runaway／SmellBench／AOCI 各自觀察到，但尚無統一的「維護安全性」度量——這是一個值得開的子議題。\n\n---\n\n## 四、追溯與待辦\n\n- **2026-05-23 深化版**：本報告「一、逐篇摘要」由多 agent（每篇一個）全文逐頁重讀後重寫，做法與核心發現大幅擴充，每一事實與數字均標註章節（§）與頁碼（p.）。\n- 本報告所有引用對應到 `papers/` 內的 9 份 B 類 PDF；引用位置依各論文 PDF 實際章節／頁面標註。\n- **9 篇均已全文讀畢**（含 Refactoring Runaway 34 頁、Agent-CoEvo 21 頁全文），記於 `metadata/papers-analyzed.json`（含各篇 `key_facts` 與 `scope_note`）。\n- 本批以「一篇一個 agent」平行作業，每篇由獨立 agent 全文逐頁核對並產出帶 `(作者 et al. 2026, §章節, p.頁碼)` 的逐篇分析；主控彙整時保留各 agent 的引用粒度，未稀釋追溯精度。\n- 一則資料品質註記：`file` 工具對 Refactoring Runaway、Beyond Fixed Tests 的頁數元資料誤報（11 頁），已分別以 `pdfinfo` 核實為 34、21 頁並全文讀畢；Context Compression 取得的 PDF 為 9 頁版本，正文止於 §6.1 中段（已於該篇追溯說明標註）。\n- 下一步建議：(a) 進入 C 類（版本升級／遷移／現代化），或 (b) 針對某一綜合觀察（如「定位準≠修得好」「附帶損害與維護安全性度量」「變更波及範圍」）開子議題、逐篇細部核對形成論述。\n"}, {"key": "C", "name": "C 版本升級", "count": "4 篇", "content": "# 總覽報告：LLM 對大型代碼庫的修改與維護 — C 類（版本升級／遷移／現代化）\n\n- **研究主題**：運用大型語言模型（LLM）對大型代碼庫進行修改與維護的案例\n- **本報告範圍**：C 類「版本升級／遷移／現代化」4 篇論文的總覽\n- **建立日期**：2026-05-22\n- **引用格式**：(第一作者 et al. 年份, §章節, p.頁碼)；全部論文皆為 2026 年 arXiv 預印本\n- **狀態**：總覽（preliminary overview）。逐子議題的細部核對論述待後續討論時另出。\n- **產製方式**：本批 4 篇以多 agent 平行作業，每篇由一個 agent 全文逐頁讀畢並產出帶引用的逐篇分析，再由主控彙整為本報告與跨論文綜述。4 篇均為全文確認。\n\n---\n\n## 一、逐篇摘要\n\n4 篇依與主題的貼近程度排序：1 為直接的版本升級評測核心素材，2–3 為遷移的「守門／工具」面（API 遷移事實核查、函式庫遷移 IDE 工具），4 為研究計畫式論文（僅作方向參考）。\n\n### 1. SWE-Chain — 鏈式發布級套件升級的程式代理基準\n*Lam et al. 2026, arXiv:2605.14415（香港中文大學、達姆施塔特工業大學、約翰霍普金斯大學、Monash 大學、ELLIS）*\n\n![c1-scope](images/c1-scope.jpg)\n\n\n**範圍提醒**：SWE-Chain 是一個「基準（benchmark）建構與評估」論文，而非單一機構在自家代碼庫上的維護案例研究。其貢獻在於提出一個可重現的評估資料集與評估協定，因此「核心發現」是對多個前沿模型／代理在此基準上的橫向比較結果，而非某一次真實維護工程的結論 (Abstract, p.1；Lam et al. 2026, §1, p.2)。\n\n**定位**：論文針對「程式代理（coding agent）能否在連續多次套件發布之間持續維護一個真實代碼庫、把自己先前的修改帶到後續版本、且不破壞既有功能」這一問題提出基準 SWE-Chain (Lam et al. 2026, §1, p.1–2)。相對既有工作的新意有二：其一，既有發布級基準 SWE-EVO（Thai et al. 2026）雖首度把「發布版本」當作評估單位，但其規格直接串接 GitHub issue／PR 的原始內容，迫使代理處理終端機輸出、重現片段、圖片參照等雜訊性產出（noisy artifacts），且每個任務是孤立的端到端版本轉換，無法評估代理能否在自己先前修改的代碼庫上持續維護；其二，SWE-CI（Chen et al. 2026，以 CI 軌跡定義任務）、SlopCodeBench（Orlanski et al. 2026，用合成檢查點）、EvoClaw（Deng et al. 2026，重建發布中milestone）等的切分邊界都不對應「上游維護者真正發布一個版本」的時刻 (Lam et al. 2026, §1, p.2；§2 起首、§5「Long-horizon maintenance benchmarks」, p.9)。SWE-Chain 把演進切分在維護者定義的發布節點，並用細粒度合成規格取代發布級升級「粗粒度」的問題，自我定位為「首個鏈式發布級維護基準」 (Lam et al. 2026, §5, p.9；§6, p.9)。\n\n\n![c1-method](images/c1-method.jpg)\n\n**做法**：\n- **基準規模與構成**：SWE-Chain 含 12 條升級鏈、涵蓋 9 個真實 Python 套件、共 155 個版本轉換（version transitions）與 1,660 個有依據（grounded）的升級需求 (Abstract, p.1；Lam et al. 2026, §1 貢獻 1, p.2)。9 個套件為 attrs、conan、Flask、Jinja2、poetry、PyJWT、pytest、urllib3、xarray；其中 conan、pytest、xarray 各有兩條鏈，故為 12 鏈。鏈例如 attrs 21.3.0→26.1.0（13 個升級、92+6 個任務）、conan 2.12.0→2.20.1（16 升級、243+18 任務）、pytest 8.0.0→8.3.5（12 升級、114+7 任務）、xarray 2025.6.0→2026.2.0（11 升級、141+19 任務）等 (Lam et al. 2026, 表 1, p.3)。\n- **資料蒐集**：從 PyPI 或 GitHub 取得已發布的套件版本與對應發布說明（release notes），並蒐集相關的 GitHub issue 與 PR；以套件特定的輕量擷取器（package-specific fetchers）與分解函式自動把發布說明解析為原始任務，再經人工品質審查（manual quality review）規範化格式並排除不適用的版本或鏈（表 1 中被刪除線標示的版本即為被跳過的 yanked 版本或可忽略升級，如 poetry 的 1.6.1、pytest 的 8.1.0／8.3.1） (Lam et al. 2026, §2.1, p.2–3；表 1 註, p.3)。\n- **以實際 diff 為依據（grounding）**：對每個版本升級，用 `git diff` 抽取連續兩版之間的 Python 程式碼 diff 與測試 diff，作為合成規格的依據，確保需求落在真實代碼變更上 (Lam et al. 2026, §2.1, p.2–3)。\n- **Docker 環境設計**：每條鏈手工撰寫一個 Dockerfile；該 Dockerfile 固定（pin）Python 直譯器與「跨版本相依套件」，同時讓其他套件解析到各發布版本特定的版本，使單一鏡像能跑全鏈所有版本的測試又保留各發布的相依環境（dependency landscape） (Lam et al. 2026, §2.1「Docker environment setup」, p.2–3)。\n- **跨版本驗證（Cross-version validation）**：對版本升級 V_i（v_{i-1}→v_i），在新舊兩個 gold 代碼庫上跑原始測試套件以辨識「升級相關測試」；遵循 SWE-Bench（Jimenez et al. 2024）同時納入 FAIL_TO_PASS 與 ERROR_TO_PASS 兩類，正式定義為升級相關測試集 U_i（在舊 codebase 上 fail 或 error、在新 codebase 上 pass 的測試）(Lam et al. 2026, §2.1, 式 (1), p.3)。升級前的健全性檢查（sanity check）要求每個版本都能無 setup 錯誤地執行、且其測試套件失敗測試比例低於 0.25% (Lam et al. 2026, §2.1, p.3)。\n- **DecompSynth 規格合成流水線（divide-and-conquer）**：對每對連續版本，從兩個來源合成規格 — (i) 發布說明 R（含對應的 GitHub issue 或 PR，表示成任務清單 [T^(1),…,T^(n)]）；(ii) Diff context D（原始碼 diff 為主要依據、測試 diff 用於校準行為意圖，組織成 file-level diff 清單，每個 file-level diff 含一序列 hunk） (Lam et al. 2026, §2.2, p.3)。\n- **DecompSynth — divide（切分）階段**：用代理 π_θ^map 做「批次層級的多標籤 hunk 配對」。π_θ^map 接收任務化的發布說明 R 與一批 file-level diff B_j，把每個 hunk 指派到一或多個標籤；標籤空間 L = {1,…,n} ∪ {doc, others}，其中 1…n 對應發布說明任務、doc 表示純文件／註解／型別改動且無 runtime 影響、others 表示無法對齊任何任務的殘餘改動；處理完所有批次後合併為全域指派 Φ，並為每個任務 T^(k) 重建配對 hunk 集合 M^(k) (Lam et al. 2026, §2.2「Divide the diffs」, 式 (2)(3), p.4)。divide 階段把 file-level diff 切成「每批至多 20 檔、150 hunk、3,000 diff 行」的批次（Algorithm 1：先 SortByLineCount 降序、再 GreedyPack；每批有重試預算 q，預設 q=3，每次重試用 CheckCoverage 找漏配（missing）或臆造（spurious）的 hunk 並 AppendFeedback）(Lam et al. 2026, §2.2「Synthesis scale」, p.4；附錄 E Algorithm 1, p.18)。\n- **DecompSynth — conquer（合成規格）階段**：給定配對 hunk 集合 M^(k)，合成代理 π_θ^syn 為任務 T^(k) 產生規格 S^(k) = π_θ^syn(T^(k), M^(k))；對被標為 others 的 hunk，π_θ^syn 判斷它們是否合起來隱含一個發布說明未明示的額外升級任務 (Lam et al. 2026, §2.2「Synthesize the specifications」, 式 (4), p.4；附錄 E Algorithm 2, p.19)。合成採用受 Zhuo et al. (2025) 啟發的「oracle 風格」程序，每份規格含四部分：(1) 問題陳述（problem statement）、(2) 有依據／概念性的期望與限制（grounded/conceptual expectations and constraints）、(3) 行為（behaviors）、(4) 驗收標準（acceptance criteria）；conquer 階段亦有重試預算 q=3 並做 schema 驗證 (Lam et al. 2026, §2.2, p.4；附錄 F.1 Prompt 2/3, p.21–22；附錄 E Algorithm 2, p.19)。合成規格刻意要求「不得包含測試案例修改、測試檔變更或測試指示」、「不得含程式碼片段、修補（patch）、逐步實作指示、檔案路徑」，以避免把實作或定位線索洩漏給受測代理 (Lam et al. 2026, 附錄 F.1 Prompt 2, p.21)。\n- **合成規格的執行配置**：合成階段以 GPT-5.4（Codex）作為配對與合成代理，使用 xhigh 推理強度；用附錄 F.1 的 Prompt 1–4 處理 12 條鏈的 155 個版本轉換、共合成 1,660 個有依據的升級任務 (Lam et al. 2026, §2.2「Synthesis scale」, p.4)。\n- **版本升級協定（Version-Upgrade Protocol）**：每條鏈 C 是有序的升級步驟清單 [V_1,…,V_N]；從初始 codebase c_{v0} 出發（ĉ_{v0}=c_{v0}），代理 π_θ 依序執行每個升級步，第 i 步以合成規格 S_i 為條件，並以「代理上一步產出的 codebase ĉ_{v_{i-1}}」為起點 — 即 ĉ_{v_i}=π_θ(S_i, ĉ_{v_{i-1}})，這正是「鏈式」之意：代理必須把自己先前的修改帶向後續版本 (Lam et al. 2026, §2.3, 式 (5), p.4；附錄 E Algorithm 3, p.19)。\n- **Build+Fix 正規化（regularization）**：為避免不公平懲罰「非行為性的執行不相容」（如 import、collection 或其他 setup 相關失敗），設計一個額外的正規化步：受 Aider 多次嘗試設定（Pass Rate 2）啟發，當出現執行層級錯誤時，允許代理「修一次」使代碼庫與執行環境相容 (Lam et al. 2026, §2.3「Build+Fix regularization」, p.4)。Algorithm 3 細節：每步先做 Build 階段產生 ĉ_{v_i}，若 BuildFailed 則整條鏈終止；否則跑隱藏測試（RunHiddenTests）；若 HasExecutionErrors 則寫一份唯一的錯誤報告（含執行錯誤區塊），代理據此做一次受控修復（Fix 階段），再重跑隱藏測試 (Lam et al. 2026, 附錄 E Algorithm 3, p.19；附錄 F.2 Prompt 5/6, p.24)。\n- **環境與工作區設定**：每條鏈從起始版本環境建一個容器，工作區置於 /app，代理 CLI 安裝於容器內以非 root 使用者執行並貫穿整條鏈（而非每步重建環境）；每步完成後把該步代碼庫與規格歸檔到 root 擁有的目錄，保持作用中工作區乾淨、避免被先前產出干擾 (Lam et al. 2026, §3.1「Container environment and workspace」, p.4)。\n- **反作弊控制（anti-cheating）**：代理層級明確指示不得存取或複製已發布的原始碼，並對所有代理施加共用的工具使用限制（停用網頁搜尋與套件安裝指令）；沙盒層級把部分代碼托管與套件登錄域名列入黑名單，如 githubusercontent.com、pypi.org (Lam et al. 2026, §3.1「Anti-cheating controls」, p.5)。附錄 D 的「Forbidden Tools List」列出禁用項：WebFetch／WebSearch／curl／wget；git fetch／pull／clone／push／ls-remote／remote／submodule／archive --remote；ssh／scp／sftp／rsync／nc／telnet／openssl s_client；以及 pip／python -m pip／uv pip／poetry add／poetry install／npm／yarn／pnpm／apt／conda 等所有安裝與下載指令 (Lam et al. 2026, 附錄 D Artifact 1, p.17)。\n- **受測模型與代理 CLI**：評估 4 家供應商的 8 個前沿模型 — OpenAI（GPT-5.3-Codex、GPT-5.4、GPT-5.5）、Anthropic（Claude-Sonnet-4.6、Claude-Opus-4.6、Claude-Opus-4.7）、MiniMax（MiniMax-M2.7-HS，高速版）、Z.AI（GLM-5.1）；搭配 3 種代理 CLI — Codex、Claude Code、OpenCode，共形成 9 個代理-模型配置 (Lam et al. 2026, §3.2, p.5；表 3, p.6)。最強的兩個模型（Claude-Opus-4.7、GPT-5.5）用 xhigh 推理強度，其餘在可用時用 high；所有實驗於 2026-04-17 至 2026-05-05 進行；CLI 版本為 Claude Code 2.1.113–2.1.126、Codex CLI 0.121.0–0.128.0、OpenCode 1.14.18–1.14.32 (Lam et al. 2026, §3.2, p.5)。代理一律以 headless 模式經統一 harness 呼叫（仿 Terminal-Bench），每步開新 session 避免歷史壓縮造成的干擾、並更貼近「開發者離開一段時間後返回專案」的真實長程維護；提示只給文件與原始碼樹的路徑，要求代理自行讀取，而非把資訊嵌入提示 (Lam et al. 2026, §3.2「Agent invocation」, p.5；附錄 F.2 Prompt 5/6, p.24)。\n- **評估配置**：跨版本驗證、隱藏檢查（hidden check）與事後評估都用同一協定，差別只在代碼庫是從代理容器抽取還是用從起始版本重放程式變更重建；兩者都在從目標套件版本建的隔離容器內進行，避免代理工作區污染或洩漏；為提高對「升級中代碼局部破損」的穩健性，設計 pytest 的 collection 與 import 外掛確保測試覆蓋（不可用的 API 以 stub 取代並記錄、phase-level 報告持續寫入磁碟），並覆寫目標版本的 pytest 設定以移除不相容選項 (Lam et al. 2026, §3.3「Evaluation configuration and protocol」, p.5)。\n- **三項度量定義**：對每個升級步 V_i，用 U_i（式 (1)）對代理在前後兩個代碼庫 ĉ_{v_{i-1}}、ĉ_{v_i} 上的測試結果分類（表 2：升級相關且新版 pass = TP；升級相關但 fail = FN；非升級相關且新舊皆 pass = TN；非升級相關且由 pass 轉 fail = FP/regressed；非升級相關 fail→pass = recovered；非升級相關 fail→fail = unrecovered）；先對各步做測試結果的 micro-average，再算鏈層級度量：**Resolving** = ΣTP_i / Σ(TP_i+FN_i)（量度實作所需升級行為的能力）、**Precision** = ΣTP_i / Σ(TP_i+FP_i)（以對先前通過測試的回歸來懲罰，量度維護安全性）、**F1** = 2ΣTP_i / Σ(2TP_i+FP_i+FN_i)（平衡升級解決與行為保留）(Lam et al. 2026, §3.3「Evaluation metrics」, p.5；表 2, p.6)。另報 Final Passing 作為整鏈最終代碼庫健康度的輔助度量 (Lam et al. 2026, §4.1, p.6；表 3, p.6)。\n- **規格粒度（granularity）變體**：在 pytest 8.0 鏈上構造 5 種規格粒度變體 — L1（含 GitHub issue／PR 的原始發布說明，模擬 SWE-EVO 設定）、L2（僅問題陳述）、L3（問題陳述 + 概念性期望與限制，§4 主實驗的預設設定）、L4（問題陳述 + 有依據的具體 API／行為期望與限制）、L5（問題陳述 + 有依據期望與限制 + 行為 + 驗收標準）(Lam et al. 2026, §4.3, p.8；附錄 J.2 Examples 5–9, p.33–36)。\n\n\n![c1-findings](images/c1-findings.jpg)\n\n\n**核心發現**：\n- **整體表現**：在 9 個代理-模型配置、12 條鏈上，Build+Fix regime 下平均 Resolving 僅 44.8%、Precision 65.4%、F1 50.2% (Abstract, p.1；Lam et al. 2026, §4.1, p.6；表 3, p.6)。Precision 明顯高於 Resolving，表示成功的改動相對精準而非回歸性，但 Resolving 不到一半意味著代理把超過一半的升級相關測試行為留作未解決，凸顯持續版本升級維護對當前代理的難度 (Lam et al. 2026, §4.1, p.6)。\n- **最佳配置**：Claude-Opus-4.7（Claude Code）表現最佳，Build+Fix 下 Resolving 60.8%、Precision 80.6%、F1 68.5%、Final Passing 91.9%；其次為 GPT-5.5（Codex）：Build+Fix Resolving 57.5%、Precision 80.1%、F1 64.8%、Final Passing 92.2%（後者 Final Passing 為全場最高）(Lam et al. 2026, §4.1, p.6；表 3, p.6)。表現墊底為 MiniMax-M2.7-HS：Build+Fix Resolving 僅 20.2%、Precision 34.2%、F1 21.2%、Final Passing 70.3% (Lam et al. 2026, 表 3, p.6)。\n- **三個明確型態**：(1) 各家族中前沿閉源模型優於同家族其他模型，閉源模型普遍優於 GLM-5.1 與 MiniMax-M2.7-HS；(2) 在 Codex CLI 下 GPT-5.3-Codex 略勝 GPT-5.4（Build+Fix Resolving 51.8% vs OpenCode 下 GPT-5.4 的 43.4%），顯示 Codex 原生的 agentic 變體在持續維護上仍能與較新的通用模型競爭；(3) GPT-5.4 在 Codex 下（43.4%）優於在 OpenCode 下，顯示原生代理 CLI 與其底層模型對齊較好 — 三者共同說明 SWE-Chain 能區分模型能力、程式專精度與代理 CLI 的差異 (Lam et al. 2026, §4.1, p.6；表 3, p.6)。\n- **Build+Fix 的作用**：跨代理，Build+Fix 把平均 Precision 從 54.0% 提到 65.4%，但平均 Resolving 只從 39.7% 微升到 44.8%，顯示這一次額外修復主要處理脆弱失敗與回歸（brittle failures and regressions），而非直接解決升級需求本身 (Lam et al. 2026, §4.1, p.6；表 3, p.6)。它緩解了「合理實作仍可能因 setup 不相容（import／相依問題）觸發大範圍失敗」造成的過度懲罰，但並未使基準變簡單 — 平均 Resolving 仍只有 44.8%，弱模型 MiniMax-M2.7-HS 仍遠低於前沿模型的初始 Build 表現 (Lam et al. 2026, §4.1, p.6)。值得注意：GPT-5.5 與 GPT-5.3-Codex 已有高 Build 精度且 Build+Fix 後保持穩定（Build 精度分別 72.0%、70.5%），顯示它們傾向產生較安全的首發修補；而 Claude-Opus-4.7 的 Build 階段 Resolving（58.3%）就已高於所有其他代理的 Build+Fix Resolving，顯示其首發升級覆蓋更強 (Lam et al. 2026, §4.1, p.6–7；表 3, p.6)。Figure 3 在 resolving-precision 平面顯示多數代理從 Build 到 Build+Fix 是「向上位移大於向右位移」，即 Build+Fix 改善 Precision 多於 Resolving；且開放權重模型在 Build+Fix 後仍位於閉源模型下方，修復步並未抹去底層能力差距 (Lam et al. 2026, 附錄 G Figure 3, p.25)。\n- **鏈特異性難度（chain-specific difficulty）**：表現隨鏈劇烈變化 — 即使在較易的鏈（如 PyJWT、Jinja2），代理平均也只解決不到 70% 的升級特定行為；較難的鏈（如 conan、xarray）可低於 30%；鏈層級平均 Resolving 範圍為 23.3%–68.5% (Lam et al. 2026, §4.2, p.7；Figure 2, p.7；Key Finding「Difficulty Is Chain-Specific」, p.7)。代碼庫規模只能部分解釋難度：poetry 比 pytest 小但代理在 poetry 上 Resolving 較低，因其升級的平均代碼 diff 規模較大；Flask 與 Jinja2 之間也有同樣型態 — 鏈難度由套件大小、升級規模與密度共同決定 (Lam et al. 2026, §4.2, p.7)。沒有單一代理在所有鏈上稱霸：Claude-Opus-4.7 在 xarray（2022.11.0）與 pytest 等鏈較強，GPT 系代理在 Flask、Jinja2、conan 領先，顯示模型對不同套件結構各有專長；開放權重模型在易鏈上仍具競爭力但在難鏈急遽退化，支持 SWE-Chain 在不同維護情境下具鑑別力 (Lam et al. 2026, §4.2, p.7)。\n- **難度排名（附錄 B）**：以「不含測試的 Python 起始代碼庫大小」與「每步平均代碼變更負擔（LOCD/#Upgrades）」兩個 min-max 正規化因子的平均定義 Difficulty；最難前四為 xarray 2025.6.0→2026.2.0（Difficulty 0.989，起始 104k Python LOC）、xarray 2022.11.0→2023.7.0（0.866）、conan 2.12.0→2.20.1（0.544）、conan 2.23.0→2.28.1（0.484）；最易為 PyJWT 2.0.0→2.12.1（0.000，僅 1.6k 起始 LOC）(Lam et al. 2026, 附錄 B 表 8, p.15)。\n- **跨鏈 Precision 與 F1（附錄 H）**：Build+Fix Precision 在多數鏈上實質高於 Resolving，使 F1 被拉高，顯示代理實作升級特定行為時相對精準；但 urllib3 與 conan 2.23.0 等鏈的 Precision 也較低，進一步壓低其 F1 — F1 熱圖給出兼顧鏈難度與維護能力的平衡視角，Resolving 熱圖則更直接反映需求實作能力 (Lam et al. 2026, 附錄 H Figure 4/5, p.26)。\n- **逐步解決軌跡（附錄 I）**：代理在 patch-level 升級上通常平順推進（升級特定測試數少、變更範圍小）；代理之間的差距常出現在 minor 或 major 升級附近，因升級範圍變大、漏掉的需求更明顯地累積 (Lam et al. 2026, 附錄 I Figure 6, p.26–27)。\n- **規格粒度 L1–L5 實驗**：在 pytest 8.0 鏈、Build+Fix regime 下，Claude-Opus-4.7 的 Resolving 由 L1 的 44.5% 升至 L5 的 73.9%（F1 由 14.8% 升至 82.5%）；GPT-5.5 的 Resolving 由 L1 的 47.4% 升至 L5 的 67.8%（F1 由 16.3% 升至 77.3%）(Lam et al. 2026, §4.3, p.8；表 4, p.8)。最大躍升出現在 L2→L3：加入「期望與限制」後，Precision 提升幅度大於 Resolving（如 Claude-Opus-4.7 Precision 由 L2 的 7.8% 跳到 L3 的 88.1%、L4 89.2%、L5 93.5%；GPT-5.5 由 9.5% 跳到 92.1%／93.3%／89.7%），因為期望與限制澄清了預期行為、實作邊界與保留限制，使規格更具資訊性且可行 (Lam et al. 2026, §4.3, p.8；表 4, p.8)。L1 用原始 changelog 加 issue／PR，雖含 issue 驅動的需求且有用，但雜訊多、結構不一、可能洩漏實作細節；L4／L5 更有依據、表現更好但更接近 oracle 風格指導，更適合評估「實作能力」而非真實升級流程；論文據此把預設定為 L3，認為它在指導與洩漏控制之間取得平衡，不依賴 L4／L5 那種更 oracle 化的資訊（Key Finding「Granularity Control」：原始 issue/PR 是糟糕的發布級升級規格，期望與限制對避免回歸至關重要）(Lam et al. 2026, §4.3, p.8；Key Finding, p.8)。\n- **資源用量與表現的關係**：附錄 4.4 與表 5 顯示，最強配置（用 xhigh 推理的 Claude-Opus-4.7 與 GPT-5.5）也是最貴的，每條鏈平均成本分別 150.39 美元與 131.34 美元，token 用量分別 350.7M（全場最高）與 184.7M (Lam et al. 2026, §4.4, p.8；表 5, p.9)。但更高資源用量不必然帶來更好表現：Claude-Sonnet-4.6 的 runtime 最長（Build+Fix 4.84 小時）、token 用量高（203.9M），MiniMax-M2.7-HS 用的 token 與工具呼叫多於 OpenCode 上的 GPT-5.4，但兩者表現都遠遜頂級模型；工具呼叫成功率跨模型一致偏高（93.8%–98.6%），表現差距不太可能由工具失敗驅動 — 結論是 SWE-Chain 量度的是「維護能力」而非互動量或執行可靠度 (Lam et al. 2026, §4.4, p.8；表 5, p.9)。\n- **divide 階段穩定性（附錄 C）**：divide 階段是合成流水線中最易受隨機變異影響的步驟；論文在最大版本轉換 pytest 8.2.2→8.3.0（13k diff 行、102 檔、986 hunk）上把配對代理 π_θ^map 跑 10 次，對全部 C(10,2)=45 對 run 計算三種 hunk 層級相似度，得到 93.66% 完全相符（exact match）、94.54% Jaccard 相似度、95.38% core agreement（標籤集合重疊或同為空即視為一致），顯示即使在最具挑戰的轉換下 divide 階段仍穩定 (Lam et al. 2026, §2.2「Stability check」, p.4；附錄 C, p.16)。\n- **基準的鑑別力與整體結論**：前沿代理表現實質強於弱模型，說明 SWE-Chain「可行（feasible）且具鑑別力（discriminative）」；但結果同時揭示，當前代理仍難以在鏈式套件發布間「把自己的修改帶向前而不破壞既有功能」，凸顯需要能維護「連貫、可靠、可演進」代碼庫的代理 (Abstract, p.1；Lam et al. 2026, §4.1 Key Finding, p.7；§6, p.9)。\n- **侷限（附錄 K）**：未對合成規格做人工品質評估（在 155 個版本轉換、1,660 個任務的規模下成本過高），改以可控、可稽核、穩定且有發布說明／diff 對齊與 schema 限制的流水線取代；目前只含 12 條 Python 套件鏈，對其他語言、建置系統與生態的覆蓋有限；只評估 8 個模型、3 種代理 CLI、僅 2 個開放權重模型；因長程評估昂貴（強模型單鏈成本上看約 150 美元），未做基於抽樣的重複多次執行 (Lam et al. 2026, 附錄 K, p.37)。\n\n---\n\n### 2. Hallucination Inspector — 以確定性 API Oracle 偵測 LLM API 遷移中「鷹架幻覺」的事實查核裁判\n*Tileria et al. 2026, arXiv:2604.20202（英國 Surrey 大學、日本科學技術院、英國倫敦大學學院 UCL）*\n\n![c2-scope](images/c2-scope.jpg)\n\n\n**範圍提醒**：本文不是「用 LLM 修改／維護大型代碼庫」的方法論文，而是針對 LLM 在 API 遷移任務所產生程式碼的**偵測／驗證工具**，且作者明確自評為 *preliminary evaluation*（初步評估）(Tileria et al. 2026, Abstract, p.1; §4, p.3)。其與本研究主題的關聯在於：API 遷移與依賴更新正是 LLM 介入大型代碼庫維護的核心場景之一，而本文揭示了該場景的關鍵風險——LLM 產出「表面上看似正確、卻無法編譯」的遷移補丁，並提供一套可確定性地把關此風險的工具。侷限有四：(1) 評估資料集僅 51 對 Android API 遷移，規模小；(2) LLM-judge 基線僅用單一模型 gpt-5-mini；(3) 限於 Android Java 生態系與單一語言；(4) 工具本身對 callback（回呼）類遷移 recall 偏低 (Tileria et al. 2026, §5, p.5)。因此其數據應視為趨勢性證據而非定論。\n\n**定位**：論文處理的是自動化 API 遷移中的「API 保真度問題」（API fidelity problem）——LLM 雖能正確辨識遷移的目標 API，卻常無法產生正確的「膠水程式碼」（glue code）來建構物件、呼叫建構子、設定欄位與串接方法 (Tileria et al. 2026, §1, p.1; §2, p.1)。作者把這種特定失效模式命名並嚴格定義為 **Scaffolding Hallucination（鷹架幻覺）**：模型在「搭建呼叫目標 API 所需的脈絡（context）」時產生幻覺，發明出 API 文件中不存在的 token——包含 import、API 名稱、方法、建構子或常數——作者統稱這些被發明的 token 為 **Phantom Symbol（幽靈符號）** (Tileria et al. 2026, §1, p.1)。論文的自我定位是一個**輕量、文件導向、語言無關的靜態分析事實查核框架**，刻意不採用動態執行或 LLM 機率式裁判，而是把判斷錨定在一個由官方文件直接導出的 **API Oracle**，藉此消除 LLM 裁判固有的 sycophancy（諂媚）與 optimism／over-correction bias（樂觀／過度糾正偏誤）(Tileria et al. 2026, Abstract, p.1; §3, p.2)。\n\n\n![c2-method](images/c2-method.jpg)\n\n**做法**：\n- **幻覺的嚴格定義**：作者刻意收窄「幻覺」一詞的用法。先前研究常把任何生成錯誤泛稱為幻覺；本文則限定為「LLM 生成的內容**牴觸某個參考知識庫中可驗證的事實**」。在 API 遷移這個特定領域，該知識庫即為 API 文件所描述的 API 規格，因此「幻覺」具體指「LLM 生成一個 API 文件中不存在的符號」(Tileria et al. 2026, §2, p.1)。\n- **遷移術語界定**：論文把舊 API 稱為遷移的 *source*、新 API 稱為 *target*。LLM 的遷移生成分兩步——第一步辨識要使用的 target API，第二步生成建構物件並呼叫該 API（含欄位賦值、建構子呼叫、方法串接）所需的膠水程式碼；幻覺主要發生在第二步 (Tileria et al. 2026, §1, p.1)。\n- **可驗證幻覺的兩層分類法（Taxonomy of Verifiable Hallucinations）**：作者認為先前的高階分類（如 API Conflicts、API Mismatches）對自動偵測而言「太粗、不可操作」，故依「偵測所需的結構複雜度」重新切成兩個可操作的層級，此分類直接驅動 Inspector 的雙階段架構 (Tileria et al. 2026, §2.1, p.2)。\n  - **Tier 1：Atomic Hallucinations（原子幻覺）**——指原子符號（類別、常數、靜態方法）的憑空發明，這些被發明的符號稱為 *Phantom Symbols*。範例：Listing 1 中的 `CONTENT_TYPE_STREAM` 是一個幽靈常數（正確應為 `CONTENT_TYPE_MUSIC`）。此層只需對知識庫做「直接存在性檢查」即可偵測 (Tileria et al. 2026, §2.1, p.2)。\n  - **Tier 2：Scope-bound Hallucinations（範疇相關幻覺）**——牽涉「完全限定符號」（fully-qualified symbols），LLM 生成的程式碼看似合理但把方法用錯了物件。偵測時必須遍歷方法串鏈、解析變數型別以判定該物件實際應為何型別（如範例中物件實為 Builder 而非 AudioManager）。此層再細分為兩種：(1) **Misplaced Members**（錯置成員）——有效方法被用在錯誤物件上；(2) **Invented Members**（發明成員）——串鏈中呼叫了完全不存在的方法，作者稱之為 *Phantom Members* (Tileria et al. 2026, §2.1, p.2)。\n- **激勵範例（Listing 1）**：以 Android 將 `setAudioStreamType` 遷移到 `setAudioAttributes` 為例，新 API 需用 Builder pattern 建構 `AudioAttributes` 物件。LLM 產生的補丁含兩個失效：第 6 行在錯誤的 Builder 物件上呼叫 `setStreamType`（`setStreamType` 是舊 `AudioManager` 類別的方法，不屬於新的 `AudioAttributes.Builder`）；第 7 行使用了不存在的 `CONTENT_TYPE_STREAM`。兩者都會造成編譯失敗，但標準評估度量會輕易忽略 (Tileria et al. 2026, §2, p.1–2)。\n- **整體三模組管線**：Hallucination Inspector 由三個循序模組組成——(1) **Parser**：用 tree-sitter 把生成程式碼的 token 轉為 AST；(2) **Symbol Extractor**：從 AST 隔離出可測試單元，即原子符號與方法串鏈；(3) **Verification Engine（驗證引擎）**：把抽取出的符號對照 API Oracle 交叉比對 (Tileria et al. 2026, §3, p.2–3; Figure 1, p.3)。架構刻意採「靜態檢查」而非需可建置環境與測試套件的「動態檢查」，以在不編譯整個專案的前提下快速回饋；作者引用業界發現主張：在大規模代碼庫維護中，「解析工具搭配靜態檢查」優於「複雜、高延遲的 LLM agent 迴圈」(Tileria et al. 2026, §3, p.2–3)。\n- **確定性 API Oracle 的建構**：Oracle 是一張「真值符號表」（ground-truth Symbol Table），直接由 SDK 隨附的官方 Android API 規格（XML 格式）導出，而非由原始碼或另一個機率模型導出；它代表函式庫維護者與開發者之間的嚴格公開契約 (Tileria et al. 2026, §3.1, p.3)。建構流程：先用 JVM descriptor 抽取類別、常數與方法，並**遞迴攤平繼承階層**寫入雜湊表；對每個類別，索引儲存一組去重後的方法簽章（既含宣告成員也含從父類別繼承的成員），例如 `setUsage(int)`。此預先計算使「驗證一次方法呼叫」化簡為高效的「集合成員檢查」，免去執行期遍歷繼承樹 (Tileria et al. 2026, §3.1, p.3)。\n- **雙階段靜態驗證引擎**：核心靜態分析引擎把 LLM 片段解析成具體語法樹，抽出三類單元——(1) Atomic Symbols（靜態常數與簡單欄位存取）；(2) Singular calls（單一方法呼叫）；(3) Method chains（單一呼叫組成的方法串鏈，代表流暢式 API 用法）。驗證分兩相 (Tileria et al. 2026, §3.2, p.3)：\n  - **Phase 1：Direct Lookup（直接查找）**——針對 Tier 1 原子幻覺，對 Oracle 做直接存在性檢查（如查驗幽靈常數）(Tileria et al. 2026, §3.2, p.3)。\n  - **Phase 2：Type Propagation（型別傳播）**——針對 Tier 2 範疇相關幻覺（方法串鏈中的幽靈成員），透過「區域範疇解析」追蹤型別傳播；此過程把區域變數映射回其底層 API 型別，確保 Oracle 只驗證有效成員 (Tileria et al. 2026, §3.2, p.3)。\n- **型別傳播演算法（Algorithm 1：Sequential Symbol Validation Algorithm）**：輸入為一條呼叫序列 `C = {root, m1, m2, …, mn}` 與區域範疇 `S`、Oracle `O`，輸出為幻覺集合 `H` (Tileria et al. 2026, §3.2, p.3, Algorithm 1)。\n  - 先依 `root` 的種類決定「根型別」`T_curr`：若 `root` 是 StaticClass 則 `T_curr ← root`；若是 Variable 則由範疇查得 `T_curr ← S[root]`；若是 Constructor 則 `T_curr ← root.type`。\n  - 接著對序列從左到右逐一處理每個成員 `mi`：若 `mi` 不存在於 `O[T_curr]`，把 `PhantomMember(mi, T_curr)` 加入 `H` 並中止（偵測到發明成員／錯置成員）；否則取 `mi` 的回傳型別 `R_type ← O[T_curr][mi].returnType`。\n  - 若 `R_type == void` 而其後仍接有呼叫（`i < n`），則把 `BrokenChain(mi)` 加入 `H` 並中止（偵測到「在回傳 void 的呼叫後繼續串接」的斷裂串鏈）。\n  - 否則把 `T_curr` 更新為 `R_type`，繼續處理下一個成員。此雙相設計能在「實例化發生於生成補丁範圍內」的前提下，驗證 LLM 發明的、不存在於目標函式庫的 API 符號 (Tileria et al. 2026, §3.2, p.3)。\n- **工具實作**：以 Python 實作，解析使用 TreeSitter 函式庫，並為 Android API level 35 自建索引器；API 文件取自 Android SDK 提供的 XML 檔。原始碼與成品已隨補充材料／儲存庫釋出（Zenodo records/19633303）(Tileria et al. 2026, §1 footnote, p.2; §3.2, p.3)。\n- **評估資料集的建構（API Migration Dataset）**：作者建構了 51 對相異的 API 遷移配對；每對含一個使用已棄用 API 的程式片段與其對應的正確遷移（ground truth），片段附有檔案層級脈絡（imports 與周邊邏輯）。配對取樣自先前研究，選取準則刻意偏好「新 API 方法需要實例化新型別並調整參數」的遷移情境，而非單純改名 (Tileria et al. 2026, §4.1, p.4)。\n- **自動修復任務（Automated Repair Task）**：要求 LLM 在保持功能等價的前提下生成遷移片段；prompt 包含使用已棄用 API 的程式片段、以及 source 與 target API。因 target API 已明確給定，LLM 可專注於膠水程式碼。受測為兩個開放權重 SOTA 模型——**Qwen-2.5-32b-Instruct（Qwen2.5）** 與 **Codestral-v1-22b（Codestral-v1）**，可在作者硬體（配備兩張 NVIDIA RTX A5000 GPU 的伺服器）上運行 (Tileria et al. 2026, §4.1, p.4)。\n- **真值與失效分類（Ground-Truth & Taxonomy）**：由兩位作者人工標註建立真值，依「遷移正確、語法正確、語意正確」判定遷移是否有效及是否有幻覺。失效模式分兩類：(1) **API Misuse（API 誤用）**——使用了有效但對脈絡而言錯誤的 API 元素（如錯誤常數或錯誤方法）；(2) **Hallucination（幻覺）**——發明出不存在的原子或範疇相關符號。評估 Inspector 時把幻覺視為正類（positive class），以便把可驗證幻覺從一般邏輯錯誤中隔離出來；單一遷移可能含多個幻覺 (Tileria et al. 2026, §4.1, p.4)。\n- **LLM-judge 基線設定**：為建立自動化評估基線，作者以 **gpt-5-mini** LLM judge 與確定性 Inspector 對照（選 gpt-5-mini 因其效率與相對開放權重生成模型更優的效能）。judge 被要求辨識 Scaffolding Hallucination 並解釋理由；其 prompt 含 source 與 target API 簽章、原始遺留片段、候選遷移補丁。在嚴格評估準則下，一次偵測唯有「正類標籤」與「底層解釋」都與人工標註相符時才算有效 (Tileria et al. 2026, §4.2.2, p.5)。\n- **研究問題**：RQ1（度量的盲點）——標準度量是否無法辨識幻覺？以 CodeBLEU 量測生成片段與 ground truth 的相似度，假設它會把高分指派給不正確的遷移。RQ2（偵測效力）——Inspector 能否準確區分有效脈絡程式碼與幻覺？以 Precision／Recall 對照人工標註真值，並與 LLM-as-a-Judge 基線比較 (Tileria et al. 2026, §4, p.3–4)。\n\n\n![c2-findings](images/c2-findings.jpg)\n\n\n**核心發現**：\n- **標準相似度度量（CodeBLEU）對偵測鷹架幻覺根本失效（RQ1）**：CodeBLEU 量測生成程式碼與 ground truth 的文字與語法重疊；但因「一個被幻覺污染的補丁與正確解極為相似」，幻覺補丁照樣拿到高 CodeBLEU 分數。深入分析顯示「含幻覺」與「不含幻覺」片段的 CodeBLEU 分布**幾乎完全重疊**，這是依賴相似度度量做 API 遷移驗證的根本性限制 (Tileria et al. 2026, §4.2.1, p.4)。\n- **CodeBLEU 具體分數分布（Table 2）**：對 **Qwen2.5**，含幻覺片段平均 0.791／中位數 0.844／最小 0.353／最大 0.958；不含幻覺片段平均 0.807／中位數 0.827／最小 0.553／最大 0.991。對 **Codestral-v1**，含幻覺平均 0.624／中位數 0.705／最小 0.135／最大 0.902；不含幻覺平均 0.694／中位數 0.762／最小 0.261／最大 0.897。含幻覺片段的中位數與不含幻覺者相當，幻覺存在與否「並未顯著影響 CodeBLEU 分數」(Tileria et al. 2026, §4.2.1, p.4, Table 2; Figure 2, p.5)。\n- **高相似分數的不可編譯片段——閾值法不可行**：作者指出一個含鷹架幻覺的片段可達到近 0.96 的相似度分數，因此「無法設定一個能可靠濾掉幻覺、又不誤丟有效程式碼的相似度閾值」。亦即 LLM 能生成「與 ground truth 只差一個 Phantom Symbol、相似度極高、卻無法編譯」的近似複製品——這正當化了確定性 Inspector 的必要性 (Tileria et al. 2026, §4.2.1, p.4–5)。\n- **遷移失敗率高（Table 1）**：在 51 對 Android API 遷移上，**Qwen2.5 產生 32 個無效遷移**，其中 **26 個含幻覺**；**Codestral 有 36 個失敗**，其中 **21 個含幻覺**。即兩個 SOTA 開放權重模型在偏好「需實例化新型別」的遷移情境下，失敗率分別約 63%、71%，顯示 API 遷移對當前 LLM 仍極具挑戰 (Tileria et al. 2026, §4.2, p.4, Table 1)。\n- **幻覺的層級分布（Table 1）**：Qwen2.5 的 26 個幻覺案例可細分為 **15 個 Atomic Hallucinations**（含幽靈常數、import、靜態呼叫）與 **28 個 Scope-bound Hallucinations**（幽靈實例呼叫與方法串鏈）；Codestral 則為 **12 個 Atomic** 與 **25 個 Scope-bound**。因單一斷裂遷移常含多個 Phantom Symbol，幻覺總計數會超過失敗片段數 (Tileria et al. 2026, §4.2, p.4, Table 1)。\n- **模型更易犯範疇相關錯誤**：兩模型的 Scope-bound 幻覺數皆明顯高於 Atomic 幻覺數（Qwen2.5 為 28 vs 15、Codestral 為 25 vs 12）。作者據此推論：模型「更容易在『有效符號』與『不正確目標型別』之間幻覺出錯誤關係」，亦即把對的方法用錯物件、或在型別解析上出錯，比憑空捏造原子符號更常見 (Tileria et al. 2026, §4.2, p.4)。\n- **Hallucination Inspector 在兩個生成模型上皆達到完美 precision（RQ2，Table 3）**：對 Qwen2.5 生成的補丁，Inspector 的 Precision = 1.00、Recall = 0.73、F1 = 0.84；對 Codestral-v1，Precision = 1.00、Recall = 0.90、F1 = 0.95 (Tileria et al. 2026, §4.2.2, p.5, Table 3)。\n- **Inspector 完全消除誤報（false alarm）**：因把驗證錨定於 API Oracle 而非機率推論，Inspector「完全消除了 false positive」，這是它相對 LLM judge 的關鍵優勢——對「自動修復管線」尤其重要，因為誤報會導致正確補丁被錯誤丟棄 (Tileria et al. 2026, §4.2.2, p.5)。\n- **Inspector 的 false negative 來源**：漏報主要源於「引數型別」與「巧合匹配到有效 API 元素的符號」——例如一個不存在的方法名稱與某個既有方法同名但參數不同，Inspector 因只做名稱／回傳型別解析、缺乏完整簽章解析而漏掉 (Tileria et al. 2026, §4.2.2, p.5; §5, p.5)。\n- **LLM-judge（gpt-5-mini）效能顯著遜於 Inspector（Table 3）**：gpt-5-mini 對 Qwen2.5 的 Precision = 0.67、Recall = 0.67、F1 = 0.67；對 Codestral-v1 的 Precision = 0.50、Recall = 0.56、F1 = 0.53。在兩個資料集上 F1 都遠低於 Inspector 的 0.84 與 0.95，顯示 LLM judge「在兩個方向上都失敗」——既錯誤批准了斷裂程式碼，也錯誤否決了有效補丁 (Tileria et al. 2026, §4.2.2, p.5, Table 3)。\n- **LLM-judge 的雙向偏誤（過度糾正偏誤）**：judge 對 Qwen2.5 產生 8 個 false positive、對 Codestral 產生 10 個；尤其評估 Codestral 補丁時，**被 judge 標為幻覺的案例中有一半其實是有效 API 用法**。這種高比例誤報展現嚴重的 over-correction bias，會迫使自動修復管線丟棄正確實作 (Tileria et al. 2026, §4.2.2, p.5)。\n- **LLM-judge 的漏報偏誤（樂觀偏誤）**：機率式 judge 在兩個生成模型資料集上各漏掉 8 個真正的幻覺。作者解讀為模型「常假設一個表面上看似合理的 API 結構在事實上正確」，亦即 judge 落入與生成模型相同的「機率發散」陷阱——judge 與 generator 共享同一種偏誤，因此無法可靠地互相把關 (Tileria et al. 2026, §4.2.2, p.5)。\n- **整體實驗結論**：實驗數據凸顯「LLM 在 API 用法的正確使用與驗證上都有困難」；標準度量無法偵測、LLM judge 不可靠，唯有錨定文件規格的確定性方法能可靠標出這些隱藏錯誤 (Tileria et al. 2026, §4.2.1–4.2.2, p.5)。\n- **Inspector 對 callback（回呼）類遷移 recall 偏低——關鍵限制**：作者坦承工具在 callback 上表現不佳，因為 API 遷移必須以「型別正確」方式使用 callback，而現行 parser 未驗證 callee 端宣告是否符合 callback 文件；計畫擴充 parser 以驗證此點 (Tileria et al. 2026, §5, p.5)。\n- **型別解析的不完整性**：抽象型別傳播目前只涵蓋名稱與回傳型別解析，缺乏完整簽章解析（full signature resolution）；作者計畫據此擴充。另發現一個案例是「有效符號被錯當成靜態方法使用」，計畫增強文件處理器以標出此類修飾詞不符（modifier mismatch）(Tileria et al. 2026, §5, p.5)。\n- **LLM 生成程式碼常不完整**：作者指出 LLM 產出常不完整，導致 Inspector 不得不做「近似型別解析」（under-approximate type resolution）；把搜尋範疇更深入專案會改善此問題 (Tileria et al. 2026, §5, p.5)。\n- **作者對工具定位的論述——agentic gatekeeper 與 RL 獎勵訊號**：作者主張 Hallucination Inspector 可作為「迭代修復迴圈中的 agentic gatekeeper（代理式守門員）」，在最終輸出前提示模型修正幽靈符號；並可比照業界 ByteDance 的 ByteDance／ByteDance approach（以靜態 linting 結果作為強化學習獎勵訊號訓練程式碼修復模型）的思路，把 Inspector 用作 RL 管線的獎勵函數，潛在地訓練出對範疇相關錯誤敏感的程式碼生成模型 (Tileria et al. 2026, §5, p.5)。\n- **與相關工作的定位**：自動 API 遷移已從規則式工具演進到引入新可靠性風險的 LLM 方法。先前研究刻畫過失效模式——Zhang et al. 把幻覺分為任務需求衝突與事實知識衝突；Pan et al. 指出 API mismatch 是程式碼翻譯的主要失效；Twist et al. 以正規表示式偵測名稱與成員捏造。本文的貢獻是把鷹架幻覺「形式化為一個可操作的分類法」，並以「深層結構分析」而非「樣式比對」來查核 (Tileria et al. 2026, §6, p.5)。\n- **與 RAG／受約束解碼等去幻覺方法的對比**：RAG 以文件強化生成、受約束解碼把解碼限制在函式庫結構內，兩者雖降低錯誤頻率但仍是機率式；Hallucination Inspector 改採「生成後驗證」（post-generation verification），對照 API Oracle 做確定性驗證，藉錨定於文件導出的規格而消除 LLM 偵測器、self-critique、LLM-as-judge 等方法所具的樂觀／過度糾正偏誤，確保嚴格遵守 API 契約 (Tileria et al. 2026, §6, p.5)。\n\n---\n\n### 3. MigMate — 把 LLM 函式庫遷移工具包進 VS Code、以人在迴路 UI 提升開發者採用度\n*Kebede et al. 2026, arXiv:2603.01596（紐約大學阿布達比分校；阿爾伯塔大學，加拿大）*\n\n![c3-scope](images/c3-scope.jpg)\n\n\n**範圍提醒**：MigMate 是一篇約 6 頁的工具／工作坊論文（IDE '26，3rd International Workshop on Integrated Development Environments），不是大型代碼庫維護的實證研究。其對象限定為「Python 專案級的第三方函式庫遷移」（library migration，以一個函式庫替換另一個功能相近的函式庫），規模有限：論文示範與評估僅涉及單一專案、2 個函式庫對、跨 2 個檔案的少量 API 用例（Pair A 14 處、Pair B 22 處）（Kebede et al. 2026, §5.1.1, p.4）。對本研究主題（運用 LLM 對大型代碼庫進行修改與維護）的關聯在於**開發者工具與採用面**——它示範如何把既有的 LLM 遷移後端整合進 IDE、用人在迴路（human-in-the-loop）審查機制提升開發者信任與工作流順暢度；侷限在於它不處理大型代碼庫規模問題，遷移正確性由後端 MigrateLib 負責、且使用者研究刻意不量測遷移正確性（Kebede et al. 2026, §5.1.4, p.4）。\n\n**定位**：論文要解決的問題是——自動化函式庫遷移工具（如作者前作的命令列工具 MigrateLib）雖然功能強大，卻是獨立的 standalone 工具，迫使開發者離開既有工作流、增加摩擦並降低採用意願（Kebede et al. 2026, §1, p.1；§2, p.2）。MigMate 的定位是把 MigrateLib 的核心遷移功能原封不動當作後端，外加一層整合進 VS Code 開發環境的互動式 UI，讓開發者能在 IDE 內檢視、逐項核可或拒絕每一項建議變更，藉此提供「人在迴路」的自動化遷移、提升信任與掌控感（Kebede et al. 2026, Abstract, p.1；§1, p.1）。論文與前作的關係明確：作者群先做了一篇實證研究（Islam et al. 2025, [10]）確認 LLM 能正確完成大部分遷移，再據此開發端到端 CLI 工具 MigrateLib（[11]），本論文 MigMate 則是 MigrateLib 的 IDE 外掛包裝，貢獻在於把自動化遷移以「保留透明度與信任」的方式嵌入開發者工作流（Kebede et al. 2026, §1, p.1；§6, p.6）。MigMate 為開源，托管於 GitHub（github.com/sanadlab/MigMate），並附操作示範影片（Kebede et al. 2026, §1, p.1）。\n\n\n![c3-method](images/c3-method.jpg)\n\n**做法**：\n- **後端 MigrateLib 的多輪遷移流程**：MigMate 以 MigrateLib（[11]）為後端。MigrateLib 接收「來源函式庫」與「目標函式庫」名稱為主要參數，經過多個迭代回合：首先 *premig* 回合執行專案既有測試套件以建立基準；接著 *llmmig* 回合把相關程式碼送給 LLM、取回遷移後的內容並套用；後續回合則專注於精煉遷移與確保正確性（Kebede et al. 2026, §3「CLI Overview」, p.2）。\n- **後端的測試驅動正確性判定與後處理**：MigrateLib 用測試結果判定遷移狀態——比較遷移前後的測試結果，若相同即視為正確、不再進行；若不同則執行後處理修正回合，具體做法包括重新納入「LLM 宣稱其餘程式碼維持不變」的程式碼、以及為使用非同步函式庫的函式定義補上 `async` 關鍵字，並再次跑測試驗證；MigrateLib 保留每一回合的測試報告供使用者檢視（Kebede et al. 2026, §3「CLI Overview」, p.2）。\n- **MigMate 與 MigrateLib 的整合機制**：MigMate 作為 VS Code 與底層 MigrateLib CLI 工具之間的中介。啟動遷移時，MigMate 在背景 spawn 一個子行程執行 MigrateLib，把來源／目標函式庫與若干設定選項當作 MigrateLib 初始化參數傳入，再解析 MigrateLib 的遷移輸出，供「Migration Preview」與「Test Results」兩個檢視使用（Kebede et al. 2026, §3「Integration with MigrateLib」, p.2）。\n- **Context-Aware Activation（情境感知啟用）**：MigMate 利用 VS Code 的 Activation Events 做延遲載入（lazy loading），僅當工作區包含 Python 原始檔或可辨識的相依檔（如 `requirements.txt`、`pyproject.toml`）時才啟用，避免不必要的資源佔用（Kebede et al. 2026, §3, p.2）。\n- **兩種觸發機制（Seamless Migration Trigger）**：開發者可直接從相依檔觸發遷移，提供兩種主要方式——(1) 在相依檔內對函式庫名稱按右鍵叫出 context menu 的遷移指令；(2) 把游標移到相依檔中的函式庫名稱上、等待 hover menu 出現（Fig. 2 顯示 hover 出現「MigMate: Migrate requests」）。兩種觸發都把工作流保持在 IDE 內，減輕情境切換負擔；此外也可透過 Command Palette 用「MigMate: Migrate a Library」指令啟動（Kebede et al. 2026, §3, p.2；§4.1, p.3）。\n- **Guided Library Selection（引導式函式庫選擇）**：無論用哪種觸發方式，MigMate 都會彈出一個 Quick Pick 選單（Fig. 3）讓使用者選擇來源函式庫、再輸入目標函式庫名稱；用 hover 觸發時來源函式庫會自動帶入。作者刻意選用 Quick Pick，因為它適合短的多步驟輸入（Kebede et al. 2026, §3, p.2；§4.1, p.3）。\n- **七步使用者工作流程（Fig. 1）**：論文以 `requests` 遷移到 `httpx` 為範例，列出高階工作流——(1) Activate Plugin：開啟 Python 專案，MigMate 偵測原始檔後自動啟用；(2) Initiate a Migration：開啟相依檔（`requirements.txt`）、hover 在 `requests` 上、選「Migrate requests」；(3) Select Libraries：`requests` 成為來源，輸入 `httpx` 為目標；(4) Run Migration：MigMate 以選定函式庫與當前設定呼叫 MigrateLib，通知區顯示進度條；(5) View Test Results：MigMate 解析 MigrateLib 的測試報告檔、提供遷移前後測試結果摘要；(6) Review Proposed Changes：開啟 Migration Preview 視窗、使用者勾選欲套用的變更後關閉預覽；(7) Apply Changes：MigMate 把核可的變更套用到原始檔（Kebede et al. 2026, §4, p.3）。\n- **Migration Preview 之一：Refactor Preview 介面**：MigMate 透過比對「未修改的工作區檔案」與「MigrateLib 儲存的遷移後副本」產生預覽。第一種預覽沿用 VS Code 內建的 Refactor Preview 視窗，依檔案列出所有建議修改，開發者可用核取方塊細粒度地逐項啟用或停用變更；確認後 MigMate 把所有核可的修改在「單一一次 bulk edit」中套用，未勾選的變更直接安全丟棄、不影響程式碼（Kebede et al. 2026, §4.3, p.3）。\n- **Migration Preview 之二：自訂 Webview 介面**：第二種是自訂的 Webview 介面（Fig. 4），以可折疊的檔案清單呈現，支援「增量套用」（incremental application）編輯——開發者可逐項套用單一變更、套用單一檔案內的所有變更、或一次套用整個遷移；若整體被接受則 Webview 自動關閉，否則使用者手動以「Close Preview」結束。兩種預覽都支援細粒度選取，差異在於套用時機：Refactor Preview 把核可變更聚合成一次確認後更新，Webview 則隨開發者操作增量套用；兩者都確保每一項修改都被明確核可，防止 LLM 造成非預期改動、強化開發者信任（Kebede et al. 2026, §4.3, p.3-4）。\n- **Test Results View（測試結果檢視）**：MigMate 提供測試結果檢視器，以一個嵌入式瀏覽器面板（Webview）實作，由外掛控制；若遷移結束時有測試失敗，會以警告通知提示使用者開啟此檢視。檢視器讀取 MigrateLib 產生的測試報告檔、把資料渲染成格式化 HTML（Fig. 5），可看到遷移前 vs 遷移後測試結果摘要、各測試的具體錯誤訊息、以及遷移期間建立的日誌檔內容；每個測試旁的「Go」按鈕可導航到對應的測試檔（Kebede et al. 2026, §4.2, p.3）。\n- **設定選項（Configuration）**：遷移前可透過 VS Code Settings 介面或編輯專案層級 `settings.json` 調整設定（Fig. 6），分兩類——(1) *Migration Flags*：對應 MigrateLib 的命令列參數、控制遷移如何執行，包含 `Max File Count`（預設 20，超過則中止遷移）與 `--llm` 旗標讓使用者指定 LLM 模型；MigrateLib 目前支援 OpenAI 模型、預設模型為 GPT-4o mini、並會檢查 `OPENAI_API_KEY` 環境變數。(2) *Extension Options*：調整外掛專屬可用性功能，包含選擇 Webview 或 Refactor Preview 作為預設預覽方式、以及切換遷移後測試失敗時是否顯示預覽（Kebede et al. 2026, §4.4, p.4；Fig. 6, p.5）。\n- **使用者研究設計——任務與函式庫對**：作者在 NYU 阿布達比分校對大學部學生做小規模初步使用者研究。提供一個同時使用 `requests`、`tablib` 兩個函式庫的 Python 專案，分別替換為 `httpx`、`pandas`，定義兩個任務——Pair A（`requests → httpx`，14 處 `requests` 用例散布於 2 檔，多為一對一替換，不涉及 async）與 Pair B（`tablib → pandas`，22 處 `tablib` 用例散布於 2 檔，混合一對多與多對多變更）；每個任務上限 30 分鐘完成（Kebede et al. 2026, §5.1.1, p.4）。\n- **使用者研究設計——受試者內設計與實驗組平衡**：採 within-subjects 設計，每位受試者都做手動遷移與外掛輔助遷移各一次。手動遷移可查 API 文件與線上資源但不得用 LLM、作為基準；外掛輔助遷移可額外使用 MigMate。為抵銷學習效應，受試者被平衡分散到不同實驗區塊：半數先做手動、半數先做外掛輔助，再依先做 Pair A 或先做 Pair B 細分，共 4 組（Table 1：A1 手動A→輔助B、A2 輔助A→手動B、B1 手動B→輔助A、B2 輔助B→手動A）。研究開始前以口頭說明並出示 README 教學如何使用外掛，正式專案與任務說明亦公開於 GitHub（github.com/sanadlab/MigMate-Study-Repo）（Kebede et al. 2026, §5.1, p.4；Table 1, p.4；§5.1.3, p.4）。\n- **使用者研究設計——問卷與蒐集資料**：兩個任務完成後，受試者填寫含 Likert 題型的簡短問卷，以 System Usability Scale（SUS, [3]）量測感知可用性，並含選填的開放回饋題蒐集質性意見。蒐集資料包含每個任務的完成時間，以及辨識使用模式的遙測（telemetry）資料；作者明確聲明「不量測遷移正確性」，因研究焦點在理解受試者使用外掛的體驗（Kebede et al. 2026, §5.1.2, p.4；§5.1.4, p.4）。\n\n\n![c3-findings](images/c3-findings.jpg)\n\n\n**核心發現**：\n- **前作 MigrateLib 的遷移能力數字**：作者引用前作 MigrateLib（[11]）的評估結果——MigrateLib 能以「完全正確」（complete correctness）方式遷移 32% 的遷移案例；在其餘案例中，平均只有 14% 的遷移相關變更需要留給開發者修正。正是這「需要人為介入」的部分促成作者開發 IDE 外掛以追求更順暢的互動（Kebede et al. 2026, §2, p.2）。\n- **更早的實證研究數字（LLM 遷移能力背景）**：作者前一篇實證研究（Islam et al. 2025, [10]）在 PyMigBench（[12]）基準的真實 Python 函式庫遷移子集上，比較 Llama 3.1 (70B)、GPT-4o mini、GPT-4o——GPT-4o 準確度最高，94% 的遷移含至少一處正確的程式碼變更、57% 完全正確；GPT-4o mini 表現相近，93% 部分正確、49% 完全正確；Llama 3.1 落後，51% 部分正確、26% 完全正確。此結果顯示 LLM 已能處理複雜遷移、但仍有改進空間（Kebede et al. 2026, §2, p.2）。\n- **使用者研究完成時間——外掛大幅縮短**：Table 2 顯示平均完成時間，Pair A（`requests → httpx`）手動 25:23 分、外掛 10:42 分；Pair B（`tablib → pandas`）手動 27:51 分、外掛 10:48 分。兩個任務的手動遷移都比外掛輔助耗時更久，作者結論是外掛平均節省約 60% 完成任務所需時間（Kebede et al. 2026, §5.3, p.5；Table 2, p.4）。\n- **SUS 可用性分數——高分、A 級**：MigMate 的 SUS 平均分為 80.9（滿分 100），約落在第 90 百分位、依 [14] 的標準對應到 A 級評等。作者以此作為 MigMate 可用性良好的初步正面證據（Kebede et al. 2026, §5.3, p.5）。\n- **觸發方式偏好——Hover 觸發最常用**：根據遙測資料，Hover Trigger 是最常被用來啟動遷移的方式（62.5%），其次為 Context Menu（33.3%），Command Palette 僅被使用 1 次。作者認為這符合預期：hover 觸發省去「為當前遷移選擇來源函式庫」的步驟、減少摩擦，而 Command Palette 較少用顯示它對使用者可能較不直覺（Kebede et al. 2026, §5.3, p.5）。\n- **預覽粒度偏好——多數人用檔案級或遷移級**：4 位受試者使用「遷移級」（migration-level）變更、3 位使用「檔案級」（file-level）變更、1 位完全只逐項做「個別變更」（individual changes）。作者指出此結果不揭示選擇背後的確切原因，可能源於信心或單純個人偏好，需進一步研究才能釐清特定粒度是否具優勢（Kebede et al. 2026, §5.3, p.5）。\n- **使用者質性回饋**：9 位受試者中 6 位在選填回饋留下意見與建議。一個反覆出現的請求是希望在啟動遷移選擇目標函式庫時加入「函式庫推薦」功能；另一個常見意見是肯定預覽的清晰度，並有少數受試者建議預覽應同時標示每項建議變更的「信心程度」（confidence）（Kebede et al. 2026, §5.3, p.5-6）。\n- **受試者招募與樣本**：研究招募 9 人、1 人在完成前退出，最終 8 人。剩餘 8 人組成為 2 位一年級、1 位三年級、4 位四年級、1 位剛畢業校友。受試者以 5 點 Likert 自評 Python 技能與 VS Code 熟悉度，僅納入兩項皆至少 3 分者（Kebede et al. 2026, §5.2, p.5）。\n- **效度威脅——樣本過小**：作者自陳這是小規模初步評估，8 人樣本偏小（Kebede et al. 2026, §5.4, p.6）。\n- **效度威脅——實驗組人數不均**：4 個實驗區塊人數並不相等——Group B1 有 3 人、Group A2 僅 1 人，原因是隨機分派加上部分受試者取消其場次（Kebede et al. 2026, §5.4, p.6）。\n- **效度威脅——對外掛功能曝光有限**：因受試者只用外掛完成一個遷移任務，他們並未與「設定選項」互動，且多數受試者在外掛輔助遷移期間從未經歷測試失敗，因此外掛的設定與測試失敗處理功能實際上未被充分檢驗（Kebede et al. 2026, §5.4, p.6）。\n- **效度威脅——未量測遷移正確性**：作者明確指出研究焦點在使用者體驗、刻意不量測遷移的正確性；這是論文評估的根本侷限——MigMate 對使用者「省時且好用」獲得初步支持，但「自動產生的遷移到底有多正確」並未在本研究中驗證（Kebede et al. 2026, §5.1.4, p.4；§5.4, p.6）。\n- **未來工作**：作者建議未來更大規模的評估應納入「已知會導致測試失敗」的遷移任務、並讓受試者實際操作設定選項，以便檢驗目前未被充分測試的功能、判斷哪些功能值得加入 MigMate、以及如何改進既有功能（Kebede et al. 2026, §5.4, p.6）。\n- **作者自我定位的整體結論**：論文結論重申 MigMate 把自動化程式碼轉換與「對 LLM 產生的變更做互動式審查」結合，讓開發者在自己的工作區內選擇性套用建議變更；藉由把此流程嵌入 IDE，MigMate 在維持開發者對程式碼修改的掌控的同時簡化遷移流程。更廣義地，作者主張此工作示範了「自動化如何以保留透明度與信任的方式應用於 AI 輔助工具」（Kebede et al. 2026, §6, p.6）。\n\n---\n\n### 4. Helpful→Trustworthy（driver–navigator pair programming） — 以「driver–navigator 雙 agent」把 LLM 結對程式設計從「有用」推向「可信」的博士研究計畫\n*Ayon 2026, arXiv:2604.10300（Texas State University，美國德州州立大學）*\n\n![c4-scope](images/c4-scope.jpg)\n\n\n**範圍提醒**：本文是一篇博士研究計畫／研究議程式（research agenda）論文，刊於 FSE Companion '26，全文僅 2 頁，且為單一作者（指導教授為 Shibbir Ahmed）的計畫書，**非已完成的實證研究**(Ayon 2026, p.1 ACM Reference Format；p.1 footnote「Advisor: Shibbir Ahmed」)。論文明確以「doctoral research proposes a systematic study」「the plan includes three studies」自我定位，三項規劃研究中**只有「形式規格合成」一項已有初步結果，TDD（測試/實作精煉）與維護兩項仍在規劃階段**(Ayon 2026, Abstract, p.1；§3 Research progress and plan, p.2)。因此，與本主題「LLM 對大型代碼庫進行修改與維護」直接相關的維護研究（refactoring、API migration、文件更新）**成效尚未產生**，本文僅能提供研究設計、待答問題與方法論框架，不能作為維護成效的證據來源；引用時須將其定位為「規劃／議程」而非「案例結果」。\n\n**定位**：論文要解決的問題是：LLM 編碼 agent 雖能生成程式碼、測試與文件，但其輸出常「看似合理卻與開發者意圖不一致」（plausible yet misaligned with developer intent），且在演進中的專案裡只提供有限的可審查證據，限制了我們對「如何組織 LLM 結對程式設計工作流、使產出長期保持可靠、可審查、可維護」的理解(Ayon 2026, Abstract, p.1)。其核心構想是一個多 agent 系統（MAS）：一個 **driver agent 提出 artifact、一個 navigator agent 批評之並產出演進就緒（evolution-ready）的 artifact**，兩者透過角色專屬提示（role-specific prompts）與各自獨立的互動歷史（separate interaction histories）運作，同時共享一份持久的專案情境(Ayon 2026, §1 Introduction, p.1)。論文自我定位為「將多 agent LLM 結對程式設計從『有用的協助』(helpful assistance) 轉變為『可信的支援』(trustworthy support)」，最終目標是釐清「多 agent 工作流何時能提升信任」並提供建構可靠程式設計助理的實務指引(Ayon 2026, Abstract, p.1；§4 Conclusion, p.2)。\n\n\n![c4-method](images/c4-method.jpg)\n\n**做法**（皆為規劃中方法，非已執行；唯形式規格合成子題已落地）：\n- **整體 MAS 架構：driver–navigator 雙 agent 設計**。系統由兩個 agent 構成：driver 提出 artifact，navigator 對其提出批評並產出 evolution-ready artifact(Ayon 2026, §1, p.1)。兩個角色皆由 LLM agent 擔任，**實例化方式有二**：(a) 同一基礎模型套用不同提示，或 (b) 分別採用「擅長生成」與「擅長審查」的專門化模型(Ayon 2026, §1, p.1)。設計上兩 agent 使用 role-specific prompts 並維持 separate interaction histories，但共享 persistent project context(Ayon 2026, §1, p.1)。\n- **為何選 driver–navigator 而非單一 agent**。論文明確說明取捨理由：雙 agent 在「提案」與「批評」之間提供一個最小且可解釋的分離（minimal and interpretable separation），且先前研究顯示此種角色專門化能透過結構化、迭代式回饋提升程式碼品質(Ayon 2026, §1, p.1, 引用 ref [14] Huan Zhang et al. 2024 的 pair programming 框架)。\n- **針對「navigator 本身也是 LLM」的疑慮所提的關鍵約束構想**。論文指出一個自然顧慮：若 navigator 也是 LLM，開發者可能只是把「對某一模型的可審查性問題」換成「對另一模型的可審查性問題」(Ayon 2026, §1, p.1, 引用 ref [7]、[13])。**對策是限制（constraining）navigator：要求其產出「機器可檢查的契約」(machine-checkable contracts) 與形式規格，而非自由形式的判斷（free-form judgments）**；這些契約再交由**確定性驗證器（deterministic verifiers）驗證，回傳證明（proofs）或反例（counterexamples）**(Ayon 2026, §1, p.1, 引用 ref [3–5]、[8])。其論證是：信任因此從「一個模型對另一個模型的評估」轉移到「外部可驗證的證據」，使開發者只需承擔一項具體責任——確認規格是否真的捕捉了其意圖(Ayon 2026, §1, p.1)。\n- **規劃研究一：需求與形式規格合成**。把非正式的問題陳述（informal problem statements）翻譯成標準對齊的需求（standards-aligned requirements）與形式規格(Ayon 2026, Abstract, p.1)。論文將此定位於 ArchCode（ref [6]，從需求生成功能/非功能規格以引導生成）、SpecGen 與 AutoReSpec（ref [3]、[8]，以驗證器回饋生成並精煉可驗證規格）等前作之上，並指出這些前作的缺口：它們在「孤立」狀態下生成規格，未把需求引出（requirement elicitation）嵌入結對程式設計工作流；其待答開放問題是「driver–navigator 配對能否協同產出（co-produce）標準對齊的需求與形式規格」(Ayon 2026, §2 Background, p.1)。\n- **規劃研究二：以自動化回饋精煉測試與實作（TDD 研究）**。在迭代中精煉測試與實作，回饋訊號採用 solver-backed counterexamples（求解器支撐的反例）(Ayon 2026, Abstract, p.1；§3, p.2)。論文將此置於 AutoCodeRover、SpecRover（ref [10]、[15]，把迭代式程式碼搜尋與補丁生成、規格推斷耦合）與 Tian et al.（ref [11]，以對比嵌入改善等價突變偵測）之上，並批評這些前作只在單 agent／單階段設定中運作、未在 driver–navigator 迴圈內把求解器支撐的反例暴露為可審查 artifact；其規劃的 TDD 研究將檢驗「此種設定是否提升與需求的一致性、是否產出更值得信任的可重現回饋」(Ayon 2026, §2, p.1–2)。\n- **規劃研究三：支援維護任務（與本主題最相關）**。維護研究涵蓋 **refactoring（重構）、API migrations（API 遷移）、documentation updates（文件更新）**，目標是在執行這些任務的同時「保留已驗證的行為」(preserving validated behavior)(Ayon 2026, Abstract, p.1；§2, p.2；§3, p.2)。論文指出維護方向的前作缺口：Tufano et al.（ref [12]）把自然語言審查評論翻譯成程式碼轉換，Abreu et al.（ref [1]）預測有風險的 diff 以支援「保留穩定性的把關（stability-preserving gating）」，但**兩者都未利用既存的規格與測試套件作為行為約束來確認變更是否保留了已驗證行為**(Ayon 2026, §2 \"Maintenance and repository-scale evolution\", p.2)。**規劃的維護研究的具體設計**：調查「將重構、相依套件升級（dependency upgrades）、文件更新『錨定』(anchoring) 到（前兩項研究產生的）規格與測試約束上，是否能減少回歸（regressions）並使生成的 artifact 保持可信」(Ayon 2026, §2, p.2)。其方法論本質是把研究一、二產出的 standards-aligned requirements、SMT 反例、已驗證測試套件，作為維護階段的「行為約束」貫穿 refactoring/migration/演進，使 artifact 跨軟體演進（across software evolution / at scale）持續可信(Ayon 2026, §3 Future Plan, p.2；§4, p.2)。\n- **貫穿三研究的對照工作與評量框架**。整體精煉由自動化回饋訊號引導，其中 **SMT-based counterexamples** 引導需求精煉，**測試與規格約束**變更以保留已驗證行為，涵蓋 refactoring、文件、升級三類維護(Ayon 2026, §3 Future Plan, p.2)。論文規劃以一個「實證驅動的端到端工作流」(end-to-end, evidence-driven workflow) 作為交付物：將意圖翻譯成需求與形式規格、以自動化回饋（如 SMT 反例）精煉測試與程式碼、並跨軟體演進維持 artifact(Ayon 2026, §1, p.1)。對照基準為「相對於單 agent 基線」(relative to single-agent baselines)——研究將量化「多 agent 協作相對單 agent 何時提升可靠性與信任訊號」(Ayon 2026, §4 Conclusion, p.2)。\n\n\n![c4-findings](images/c4-findings.jpg)\n\n\n**核心發現**（僅「形式規格合成」子題有初步結果；其餘為待答研究問題）：\n- **AutoReSpec 的初步結果（已落地的唯一實證成果）**：在初始的形式規格生成研究中，作者提出 **AutoReSpec**——一個以驗證器引導（verifier-guided）的協作式 LLM 框架，用於 JML（Java Modeling Language）規格合成；它依結構複雜度（structural complexity）對程式分類、選擇一對「主要＋備援」LLM（primary and fallback LLM pair），並以驗證器回饋迭代精煉規格；當主要 LLM 失敗時，協作式備援模型會接收「最後一個失敗候選 + 驗證器錯誤」以進行聚焦修復（focused recovery）(Ayon 2026, §3 Research Progress, p.2, 引用 ref [3])。**量化結果：在一個 72-program 的基準上，AutoReSpec 驗證了 67 個程式，達成 58.2% 成功機率（success probability）與 69.2% 完整度（completeness），同時相對先前方法把平均評估時間（average evaluation time）降低了 26.89%**(Ayon 2026, §3, p.2, 引用 ref [3])。\n- **AutoJML 的初步結果（在 AutoReSpec 之上的延伸）**：在 AutoReSpec 基礎上，作者開發了 **AutoJML**，研究 **ReAct-based** LLM agent 對規格生成的影響；AutoJML 透過迭代式驗證與「突變驅動的完整度回饋」(mutation-driven completeness feedback) 自動化 JML 規格合成，並額外運用基於 web 的情境（web-based context）(Ayon 2026, §3, p.2, 引用 ref [2])。**量化結果：在一個 120-program 的基準上，AutoJML 驗證了 109 個程式，達成 79.3% 平均完整度（average completeness），相對最新基線（state-of-the-art baselines）在具挑戰性的控制流模式上有顯著改善——多路徑迴圈（multi-path loops）達 81.48%、巢狀迴圈（nested loops）達 85.71%**(Ayon 2026, §3, p.2, 引用 ref [2])。\n- **核心論點**：LLM 編碼 agent 的輸出可能「看似合理卻與意圖不一致」，要提升 LLM 輔助開發的信任，需要「讓意圖顯式化、能進行系統性驗證、並產出演進就緒 artifact」的工作流(Ayon 2026, §1, p.1)。其關鍵主張是——**信任應建立在「外部可驗證的證據」（求解器回傳的 proofs/counterexamples）之上，而非「一個 LLM 對另一 LLM 的評估」**；透過約束 navigator 只產出機器可檢查的契約，可避免「把可審查性問題從一個模型轉嫁到另一個模型」(Ayon 2026, §1, p.1)。初步結果（AutoReSpec/AutoJML）被作者用來支持此論點：「verifier-guided LLM-based 規格合成，透過迭代合成，提升正確性與完整度」(Ayon 2026, Abstract, p.1)。\n- **針對維護的待答研究問題（本文對本主題的核心貢獻所在，皆為 open question）**：論文在 §3 Future Plan 明列五個研究問題，其中與大型代碼庫修改與維護直接相關者為——(RQ) 「**多 agent 能在多大程度上執行維護任務同時保留既有行為？**」(How well can agents perform maintenance tasks while preserving existing behavior?)；(RQ)「**測試與規格約束在迭代式維護與遷移中防止回歸的效果如何？**」(How effective are test and specification constraints at preventing regressions during iterative maintenance and migration?)；(RQ)「**生成的文件 artifact 有多準確、有用，是否會做出誤導或偏頗的陳述？**」(How accurate and useful are the generated documentation artifacts, and do they introduce misleading or biased statements?)(Ayon 2026, §3 Future Plan, p.2)。另兩個 RQ 為「driver/navigator 如何迭代精煉測試與實作以與需求/規格一致」「solver-backed counterexamples 與自動化回饋如何影響精煉行為、哪類程式受益最大」(Ayon 2026, §3, p.2)。\n- **與本主題的銜接點**：本文是少數明確把「LLM 結對程式設計」延伸到 repository-scale evolution／maintenance 並提出「以形式規格＋測試套件作為行為約束來防止回歸」此一具體機制構想的論文；其「anchoring refactoring/dependency upgrades/documentation to specification and test constraints」的想法，為「LLM 修改大型代碼庫如何不破壞既有行為」提供了一個可驗證導向的方法論藍圖(Ayon 2026, §2, p.2；§3, p.2)。\n- **方法論缺口（引用時須標註）**：(1) 維護研究尚無任何實證數據——重構/遷移/文件更新的成效、回歸減少幅度全為待答，本文不能作為維護成效的證據；(2) 已有的初步結果（AutoReSpec、AutoJML）皆屬「單一程式層級的 JML 規格合成」，基準規模僅 72 與 120 個程式，並非「大型代碼庫」尺度，與本主題「大型代碼庫」存在規模落差；(3) driver–navigator 雙 agent 設計本身在維護情境下尚未實作或評估，「機器可檢查契約 + 確定性驗證器」如何擴展到 repository-scale 的 refactoring/migration 仍未說明；(4) 評量僅規劃「相對單 agent 基線」的對照，尚無真實專案演進的縱貫性證據(Ayon 2026, §3, p.2；§4, p.2)。\n\n---\n\n## 二、跨論文綜合觀察\n\n1. **版本升級的本質是「連續維護」而非一次性轉換——而當前 agent 在這點上明顯不足**。SWE-Chain 把評估單位定為「鏈式升級」，每一步建在 agent 自己上一步的產物上，結果平均僅 44.8% resolving、最佳配置 60.8% (Lam et al. 2026, §4.1, p.6)。「能否把自己的修改跨多次釋出往前帶、又不破壞既有功能」是升級／遷移場景的真正考題，這與 D 類 SWE-CI「以 233 天 / 71 commit 的長期演化為評測單位」是同一觀念。\n\n2. **遷移有其特有的失敗模式——「幻覺」，且標準度量看不見它**。Hallucination Inspector 證明 LLM 在 API 遷移時會發明不存在的符號（Scaffolding Hallucination），而 CodeBLEU 對含幻覺與不含幻覺的片段幾乎無法區分（相似度可達 0.96）(Tileria et al. 2026, §4.2.1, p.4–5)。**評估遷移成效不能只看相似度或表層通過率，必須有「對照 API／規格事實核查」的確定性檢查**——這與 B 類「附帶損害需用淨代碼庫品質衡量」、A 類「結果標籤會誤導」是同一警示。\n\n3. **「人在迴路」與「可驗證的守門機制」是遷移工具的共同設計主軸**。MigMate 強制開發者逐項核可每一變更 (Kebede et al. 2026, §4.3, p.3–4)；Hallucination Inspector 定位為 agentic 修復迴圈中的「守門員」(Tileria et al. 2026, §5, p.5)；From Helpful to Trustworthy 要求 navigator 產出可被決定式驗證器檢查的契約 (Ayon 2026, §1, p.1)。三篇都不主張「全自動遷移」，而是「自動化 + 可驗證的人／工具監督」——遷移的不可逆性使這成為必要設計。\n\n4. **「規格品質」直接決定遷移成效**。SWE-Chain 的 L1–L5 規格粒度實驗顯示，加入「概念性期望與限制」（L2→L3）帶來最大改善，且原始 issue/PR changelog（L1）是不良規格 (Lam et al. 2026, §4.3, p.8)；From Helpful to Trustworthy 把「以既有規格／測試作為行為約束」列為核心缺口 (Ayon 2026, §2, p.2)。**「給 agent 什麼樣的升級／遷移規格」本身是一個值得獨立探討的子議題**——這與 A 類 SaaSBench 的長脈絡 PRD、CLAUDE.md 對追溯規範的要求一脈相承。\n\n5. **遷移成效須區分「正確性」與「採用面」兩種證據**。MigMate 明確只量測使用體驗（省時 60%、SUS 80.9），遷移正確性沿用前作、未重新量測 (Kebede et al. 2026, §5.4, p.6)；SWE-Chain 量的是 resolving/precision 的正確性，而非互動量 (Lam et al. 2026, §4.4, p.8)。引用任何遷移工具的「成效」時，必須先辨明它報的是「改得對不對」還是「用起來順不順」。\n\n---\n\n## 三、與研究目的的關聯與落差\n\n- **直接命中**：SWE-Chain 是 C 類最核心的素材——它把「版本升級」這個使用者明確點名的任務型態，做成可量化、反作弊、且以「連續維護」為評估單位的基準，並給出當前 agent 的能力水位（44.8% 平均、60.8% 最佳）。\n- **遷移的守門／工具面**：Hallucination Inspector 提供「遷移特有失敗模式（幻覺）的確定性偵測」，MigMate 提供「遷移工具的人在迴路設計與採用面證據」——兩者補上 SWE-Chain 沒涵蓋的「如何把關」與「開發者怎麼用」。\n- **方向參考**：From Helpful to Trustworthy 是研究計畫、非已完成研究，只宜作為「以規格／測試作為行為約束」這一方法論方向的引子，其數字不可當維護成效引用。\n- **與 A 類遷移案例的互補**：A 類已有 5 篇真實業界遷移案例（TF→JAX、Rust→Python、PL/SQL→Java、COBOL 等），C 類則提供「遷移成效如何量測、特有失敗模式為何、工具如何設計」的方法論層——兩類合併即能回答「版本升級／遷移」這個子題的「現場 + 量尺」。\n- **尚缺**：(a) C 類僅 4 篇，且 3 篇有範圍提醒（基準／工具／計畫），**真正的大規模遷移落地敘事仍需倚賴 A 類**；(b) 連鎖升級之外，「主要版本破壞性升級（major breaking upgrade）」「跨框架遷移」的專門研究在本批中較薄。\n\n---\n\n## 四、追溯與待辦\n\n- **2026-05-23 深化版**：本報告「一、逐篇摘要」由多 agent（每篇一個）全文逐頁重讀後重寫，做法與核心發現大幅擴充，每一事實與數字均標註章節（§）與頁碼（p.）。\n- 本報告所有引用對應到 `papers/` 內的 4 份 C 類 PDF；引用位置依各論文 PDF 實際章節／頁面標註。\n- **4 篇均已全文讀畢**，記於 `metadata/papers-analyzed.json`（含各篇 `key_facts` 與 `scope_note`）。\n- 本批以「一篇一個 agent」平行作業，每篇由獨立 agent 全文逐頁核對並產出帶 `(作者 et al. 2026, §章節, p.頁碼)` 的逐篇分析。\n- 資料品質註記：SWE-Chain 取得的 v1 PDF 為 19 頁，正文（§1–6）與附錄 A–E 完整，但目次列出的附錄 F–M 未含於此 PDF；From Helpful to Trustworthy 為 2 頁短論文（PDF 容器 6 頁）。已分別於該篇追溯說明標註。\n- 至此 A／B／C／D 四類 26 篇候選論文已全部全文分析完畢。下一步建議：(a) 進入跨四類的「細部需求」階段，針對特定子議題逐篇細部核對形成論述；或 (b) 先產出一份整合 A–D 的總體報告。\n"}, {"key": "D", "name": "D 實證研究", "count": "5 篇", "content": "# 總覽報告：LLM 對大型代碼庫的修改與維護 — D 類（實證研究與評測）\n\n- **研究主題**：運用大型語言模型（LLM）對大型代碼庫進行修改與維護的案例\n- **本報告範圍**：D 類「大規模實證研究與評測」5 篇論文的總覽\n- **建立日期**：2026-05-22\n- **引用格式**：(第一作者 et al. 年份, §章節, p.頁碼)；全部論文皆為 2026 年 arXiv 預印本\n- **狀態**：總覽（preliminary overview）。逐子議題的細部核對論述待後續討論時另出。\n\n---\n\n## 一、逐篇摘要\n\n### 1. SWE-CI — 以持續整合迴圈評測 agent 長期維護代碼庫能力的首個倉庫級基準\n\n*Chen et al. 2026, arXiv:2603.03823（中山大學（Sun Yat-sen University，中國廣州）、阿里巴巴集團（Alibaba Group）、Skylenage）*\n\n![d1-scope](images/d1-scope.jpg)\n\n\n**定位**：LLM 驅動的 agent 已在「靜態錯誤修復」等軟體工程任務展現強大能力，但真實世界的成熟軟體開發建立在複雜的需求變更與長期功能迭代之上——這正是靜態、一次性（one-shot）修復範式無法捕捉的（Abstract, p.1）。論文指出既有所有基準（HumanEval、LiveCodeBench、SWE-bench、Terminal-Bench）普遍採用「快照式（snapshot-style）」協定：agent 收到單一完整需求並產出一次性解答；在此範式下，一個寫死脆弱修復的 agent 與一個寫出乾淨、可擴充程式碼的 agent 可能同時通過相同測試套件——兩者在「可維護性」上的差異是不可見的，只有當代碼庫演進（新需求到來、介面變更、模組需擴充）時才會顯現（Chen et al. 2026, §1, p.2）。論文據此提出關鍵洞見：**agent 維護程式碼的能力只能透過長期演化來揭示，因為過往決策的後果會在連續變更中累積**（Chen et al. 2026, §1, p.2）。其自我定位是首個建立在持續整合（CI）迴圈之上的倉庫級基準 SWE-CI（SoftWare Engineering – Continuous Integration），把程式碼生成的評估範式從靜態、短期的「功能正確性（functional correctness）」轉移到動態、長期的「可維護性（maintainability）」（Abstract, p.1；Chen et al. 2026, §1, p.2）。\n\n\n![d1-method](images/d1-method.jpg)\n\n**做法**：\n\n- **任務形式化**：論文先建立 agentic 編碼任務的統一形式化。令 $t$ 為單一單元測試、$\\mathcal{T}$ 為關注的測試集合，$\\mathcal{C}$ 為代碼庫空間、$\\mathcal{R}$ 為需求空間。定義兩個函數：`require`$_\\mathcal{T}: \\mathcal{C}\\times\\mathcal{C}\\to\\mathcal{R}$（辨識兩個代碼庫相對於 $\\mathcal{T}$ 的功能落差並產生需求文件）與 `code`$_\\mathcal{T}: \\mathcal{R}\\times\\mathcal{C}\\to\\mathcal{C}$（依需求修改代碼庫並回傳更新版本）（Chen et al. 2026, §2.1, p.2）。\n\n- **快照式 vs 演化式範式對比**：在快照式範式中，需求僅取決於 base 代碼庫 $c_0$ 與「黃金（golden）」代碼庫 $c_*$，即 $r\\equiv$ `require`$_\\mathcal{T}(c_0,c_*)$；SWE-CI 改採演化式（evolution-based）範式——需求動態地從「當前」代碼庫推得 $r_i=$ `require`$_\\mathcal{T}(c_i,c_*)$，代碼庫隨之更新 $c_{i+1}=$ `code`$_\\mathcal{T}(c_i,r_i)$。此迭代迴圈確保早期修改的後果會傳播到後續迭代，使 agent 的長期決策品質變得可觀察（Chen et al. 2026, §2.1, p.2；Fig. 1, p.3）。\n\n- **指標一：歸一化變更（Normalized Change）**：因多數基準把「通過所有測試」當作功能正確性的黃金標準，但軟體工程中部分功能需長期規劃與漸進開發；且演化中常出現「回歸（regression）」——原本通過的測試被無意中破壞。論文因此需要一個反映代碼庫當前狀態的細粒度指標，而非二元 pass/fail。令 $n(c)=\\sum_{t\\in\\mathcal{T}}\\mathbb{I}(t,c)$ 為代碼庫 $c$ 通過的測試數；歸一化變更定義為：當 $n(c)\\geq n(c_0)$（改善）時 $a(c)=\\frac{n(c)-n(c_0)}{n(c_*)-n(c_0)}$，當 $n(c)<n(c_0)$（回歸）時 $a(c)=\\frac{n(c)-n(c_0)}{n(c_0)}$（Chen et al. 2026, §2.2, p.3，式 1–2）。\n\n- **歸一化變更的不對稱設計**：改善時分子以總落差 $n(c_*)-n(c_0)$ 歸一化，故 $a(c)=1$ 當且僅當 agent 完全閉合落差；回歸時分子改以 $n(c_0)$ 歸一化，故 $a(c)=-1$ 對應破壞所有原本通過的測試。此不對稱歸一化是刻意設計：不論 $n(c_0)$ 與 $n(c_*)$ 大小如何，改善與回歸都被表達在統一、可比較的尺度上，即 $a(c)\\in[-1,1]$（Chen et al. 2026, §2.2, p.3）。\n\n- **指標二：EvoScore（演化分數）**：論文引述 ISO/IEC 25010 標準對可維護性的定義——軟體能被有效修改而不引入缺陷或降低既有品質的程度；即「更可維護的程式碼較不易破壞未來功能」。據此，給定 $N$ 次迭代所得的代碼庫序列 $(c_1,\\dots,c_N)$，以「未來加權平均（future-weighted mean）」聚合為單一純量 EvoScore：$e=\\frac{\\sum_{i=1}^N\\gamma^i a(c_i)}{\\sum_{i=1}^N\\gamma^i}$（Chen et al. 2026, §2.3, p.3，式 3）。\n\n- **EvoScore 的 $\\gamma$ 參數語意**：設 $\\gamma\\geq 1$ 使後期迭代獲得更大權重，直接呼應 ISO 對可維護性的定義——真正可維護的代碼庫是隨演化推進仍保持易於修改者。為求短期速度而堆積技術債、進而拖垮後續演化的 agent 會被懲罰；犧牲短期速度換取更乾淨、可擴充設計的 agent 則隨演化得到回報。當 $\\gamma=1$ 時 EvoScore 退化為「平均歸一化變更」；$\\gamma$ 越大則越偏好長期穩定性而非即時收益（Chen et al. 2026, §2.3, p.3）。\n\n- **資料策展 Step 1：倉庫蒐集**：不同於 SWE-bench 等僅取少數知名開源專案的基準，SWE-CI 在 GitHub 上廣泛搜尋所有 Python 倉庫並施加四項過濾條件——(1) 倉庫至少持續維護三年、(2) 累積超過 500 顆星、(3) 含設定與依賴檔（如 `pyproject.toml` 與 lockfile）以及一套單元測試、(4) 採 MIT 或 Apache-2.0 等寬鬆授權。過濾後剩 4,923 個倉庫（Chen et al. 2026, §3.1 Step 1, p.4；Fig. 2, p.4）。\n\n- **資料策展 Step 2：提交跨度擷取（Commit Span Extraction）**：對每個倉庫僅保留主分支（main branch），將歷史化約為線性提交序列；比對連續提交的依賴，辨識出「依賴維持不變」的所有最大子序列——每個子序列的兩個端點即構成一組候選 base/oracle 配對。再丟棄「修改程式碼總行數低於 1,000」的配對（演化距離不足），最終產出 8,311 組候選配對（Chen et al. 2026, §3.1 Step 2, p.4）。\n\n- **資料策展 Step 3：環境建構（Environment Construction）**：對每組候選配對，依 oracle 代碼庫的設定與依賴自動生成 Dockerfile 並快照其執行環境；在環境內執行 oracle 代碼庫的單元測試套件以驗證正確性。為提高資料留存率，引入自我修復機制——若測試套件因缺漏依賴而無法啟動，偵測該失敗並動態把所需依賴注入 Dockerfile 重建環境；因其他原因失敗者則丟棄。此步驟後剩 1,458 組候選配對及其執行環境快照（Chen et al. 2026, §3.1 Step 3, p.4）。\n\n- **資料策展 Step 4：案例過濾（Case Filtering）**：施加三輪過濾以確保最終資料集品質。第一輪：在 Step 3 建好的環境內，以 oracle 代碼庫的測試套件對 base 代碼庫執行，丟棄測試無法啟動者。第二輪：比較 base 與 oracle 代碼庫在同一測試套件上的測試報告，移除「通過測試數差異少於 5」的候選；經這兩道自動過濾後剩 137 組候選。第三輪（最後一輪）：依「時間跨度」與「中間提交數」對存活候選排名，挑選前 100 組構成最終 SWE-CI 基準（Chen et al. 2026, §3.1 Step 4, p.4-5）。\n\n- **最終基準統計**：SWE-CI 最終含 100 個樣本，取自 68 個不同倉庫；平均每組 base/oracle 配對相隔 233 天與 71 個連續提交的真實開發歷史；每組配對從 base 到 oracle 的轉變涉及至少 500 行修改的源碼（不計測試檔變更）。每個樣本附完整源碼與預建 Docker 環境以確保可重現性。這些統計確認 SWE-CI 捕捉的是實質、長期的演化情節而非瑣碎的漸進變更（Chen et al. 2026, §3.1, p.5；Abstract, p.1）。\n\n- **雙 agent 評估協定總覽**：為支援演化式評估，SWE-CI 引入「架構師–程式設計師（Architect–Programmer）」雙 agent 協定。架構師辨識功能落差與議題、程式設計師加以實作，兩者協作重現真實開發中的 CI 迴圈，使「agent 維護程式碼的好壞」可被細粒度觀察（Chen et al. 2026, §3.2, p.5；Fig. 3, p.5）。\n\n- **架構師 agent（Architect）三步驟**：依「當前程式碼」與「oracle 程式碼」的測試落差，架構師須產出一份自然語言的高階需求文件，其行為標準化為三步——❶ Summarize（摘要）：審視所有失敗測試、辨識根因、指出需進一步檢查的源碼檔；❷ Locate（定位）：檢視源碼並把失敗歸因到當前實作中具體的缺陷；❸ Design（設計）：依這些缺陷擬定改進計畫並產出最終需求文件。需求文件須遵守兩項書寫約定——① Incremental（漸進）：至多只含五項最緊迫需求，避免一次過度設計；② High-level（高階）：以自然語言描述程式碼的預期行為，把具體實作選擇留給程式設計師（Chen et al. 2026, §3.2 Architect agent, p.5）。\n\n- **程式設計師 agent（Programmer）三步驟**：程式設計師負責依需求文件維護程式碼，行為亦標準化為三步——❶ Comprehend（理解）：把高階自然語言需求翻譯為明確的程式碼規格；❷ Plan（規劃）：規劃實作這些規格所需的程式設計工作；❸ Code（編碼）：把計畫付諸實作以達成需求。此協定中程式設計師由需求文件驅動而非直接由測試落差驅動——這是刻意的設計選擇，呼應持續整合的快速迭代哲學；架構師須從完整失敗集合中萃取最迫切的需求，讓程式設計師能聚焦於快速、針對性的開發而不被全部變更範圍淹沒（Chen et al. 2026, §3.2 Programmer, p.5-6）。\n\n- **實驗設定**：測試框架採 `pytest` 與 `pytest-json-report`，每次測試執行逾時設為 3,600 秒；預設 harness 採用 iFlow CLI；雙 agent 評估協定的最大迭代回合數設為 20。除非另行指定，架構師 agent 與程式設計師 agent 共用同一底層 base model（Chen et al. 2026, §4.1, p.6）。\n\n- **受測模型與消耗規模**：論文評估來自 8 個供應商的 20 個模型，涵蓋 Kimi、Qwen、GLM、MiniMax、Claude、DeepSeek、GPT、Doubao 等系列；具體模型包括 Claude-Opus-4.6/4.5、GLM-5/4.7/4.6、Kimi-K2.5/K2-Thinking/K2-Instruct-0905、Qwen3.5-plus/Qwen3-Max（多版本）/Qwen3-coder-plus、MiniMax-M2.5/M2.1、DeepSeek-v3.2/v3.1、GPT-5.4/GPT-5.2、Doubao-seed-1.6/2.0-pro 等（Chen et al. 2026, §4.2 Obs.1, p.6；Fig. 4, p.6）。實驗總計消耗逾 100 億（10 billion）tokens（Abstract, p.1；Chen et al. 2026, §1, p.2）。\n\n- **附錄 C 的系統提示詞設計**：論文於附錄 C 完整公開兩個 agent 的 XML 系統提示。架構師提示把身分設為「精通 Python 與 TDD 的資深軟體架構師」，工作流嚴格規定五步（summary→trace→attribute→filter→document），輸出為單一 XML 需求文件 `/app/requirement.xml`，每項需求須含 location、description、contract、acceptance 四欄；並設多項約束：禁止修改／刪除／建立 `requirement.xml` 以外的任何檔案、禁止引導程式設計師更動測試資料夾、需求須聚焦行為契約而非具體實作、嚴禁主動執行 `pytest`／`unittest` 等測試指令（Chen et al. 2026, Appendix C, p.14-15）。程式設計師提示把身分設為「精通 Python 與 TDD 的資深程式設計師」，工作流三步（read_requirements→inspect_code→implement），約束包含：嚴禁主動執行測試（驗證由外部系統完成）、僅可修改 `/app/code/` 下且排除 `tests` 子資料夾、須遵循「必要變更原則」不可自行擴張範圍或過度開發（Chen et al. 2026, Appendix C, p.16）。\n\n\n![d1-findings](images/d1-findings.jpg)\n\n\n![d1-findings_b](images/d1-findings_b.jpg)\n\n**核心發現**：\n\n- **代碼維護能力正加速演進（觀察 1，Fig. 4）**：對 8 個供應商 20 個模型的廣泛評估揭示一致模式——同一供應商內，較新模型總是取得較高分數，且 2026 年後發布的模型相較其前代展現「明顯更大」的增幅。這顯示當前 LLM 的編碼能力正快速從靜態錯誤修復演進到持續、長期的代碼維護。在所有受測模型中，Claude Opus 系列在整個觀測期間展現「壓倒性領先」，GLM-5 亦為強勁表現者（Chen et al. 2026, §4.2 Obs.1, p.6；Fig. 4, p.6）。\n\n- **不同供應商對可維護性的重視程度不一（觀察 2，Fig. 5）**：論文變動 $\\gamma$ 值以檢視模型排名如何隨之變化。當 $\\gamma<1$ 時 EvoScore 給早期迭代更高權重，偏好優先取得即時收益的模型；$\\gamma>1$ 時則獎勵優先長期改善（即重視可維護性）的模型。發現供應商間偏好差異甚大、而同供應商內各模型則呈一致傾向：MiniMax、GPT、DeepSeek 偏好短期收益，其排名隨 $\\gamma$ 增大而「明顯下滑」；Kimi、GLM、Qwen 偏向長期可維護性，排名隨 $\\gamma$ 增大而上升；Doubao 與 Claude 則在不同 $\\gamma$ 設定下相對穩定，因其整體優勢（或劣勢）足夠顯著、足以吸收重新加權的影響。論文推測這些分歧反映各供應商訓練策略的差異，而同供應商內的相對一致性顯示其內部訓練流水線大致穩定（Chen et al. 2026, §4.2 Obs.2, p.6-7；Fig. 5, p.7）。\n\n- **當前 LLM 仍難以控制長期維護中的回歸（觀察 3，Fig. 6）**：回歸指一次程式碼變更導致原本通過的測試轉為失敗；長期維護中回歸特別有害，因其效應會跨連續迭代複合累積。論文以「零回歸率（zero-regression rate）」——整個維護過程中完全未發生回歸的樣本比例——作為模型穩定性的指標。實驗結果顯示**多數模型的零回歸率低於 0.25，僅兩個 Claude-opus 模型超過 0.5**。Fig. 6 的長條圖顯示最低者僅 7%（qwen3-max-2025-09-23），其上依序為 8%、9%、9%、10%、11%、12%、14%、14%、15%、15%、20%、20%、20%、23%、23%、36%、37%，最高的兩個 claude-opus 模型分別為 51% 與 76%。這說明當前 LLM 儘管在快照式任務表現強勁，仍難以在長期、多回合的代碼維護中可靠地避免回歸（Chen et al. 2026, §4.3 Obs.3, p.7；Fig. 6, p.7）。\n\n- **隨迭代推進，多數模型回歸「率」上升而回歸「幅度」下降（觀察 4，Fig. 7）**：論文計算「迭代回合數」與兩項回歸指標（回歸率、回歸幅度）的 Pearson 相關，分析回歸行為如何隨迭代演變。結果顯示兩項指標在多數模型上呈相反趨勢——就回歸率（Fig. 7 左）而言，20 個模型中有 12 個與回合數呈正相關，表示維護推進時回歸越來越頻繁；就回歸幅度（Fig. 7 右）而言，20 個模型中有 11 個呈負相關，表示每次回歸所影響的測試比例隨時間縮小。論文推測此分歧反映長期維護任務的自然結構：簡單需求在早期迭代被解決，模型在後期迭代越來越訴諸對更難問題的試誤（trial-and-error），導致修改更頻繁但更局部化——回歸率升高而回歸幅度降低（Chen et al. 2026, §4.3 Obs.4, p.7-8；Fig. 7, p.8）。\n\n- **LLM 擅長表層代碼風格、卻在真正的可維護性上不足（觀察 5，Fig. 8）**：論文在「成功解決的問題」上，比較 LLM 生成的代碼與人類 oracle 解答，以兩項靜態代碼指標衡量勝負率——Pylint 分數（反映行長、命名規則等表層編碼慣例的遵循）與 MI 分數（Maintainability Index，透過圈複雜度（cyclomatic complexity）等指標捕捉更深層的可維護性）。結果出現鮮明對比：20 個受測 LLM 中**多數（15/20）在 Pylint 分數上勝過人類 oracle 代碼，但全部 20 個 LLM 在 MI 分數上都不如人類**。論文據此論證 LLM 較擅長學習顯式、局部的編碼慣例，而非隱式、全域的代碼品質準則——這可能反映 LLM 建模代碼結構方式的內在限制；換言之，LLM 生成的代碼往往「表面乾淨但本質複雜」，而人類撰寫的 oracle 代碼雖格式較不嚴謹，卻透過更簡單、更優雅的邏輯取得更高可維護性（Chen et al. 2026, §4.4 Obs.5, p.8；Fig. 8, p.8）。\n\n- **LLM 產出比人類更精簡的補丁、但以可維護性為代價（觀察 6，Fig. 9）**：論文進一步檢視 LLM 生成解答與人類 oracle 解答在所有成功解決問題上的「變更行數」。Fig. 9 的散點圖顯示，所有 20 個受測 LLM 的資料點都一致地聚集在對角線「下方」，表示 LLM 普遍產出比人類更精簡的補丁。此觀察與觀察 5 相互強化：合併來看，LLM 以更少的變更行數取得更低的 MI 分數，而人類解答雖更冗長卻取得更高可維護性。論文推論人類多寫的那些行並非冗餘，而是透過抽象化、封裝、模組化等實踐對代碼品質的有意投資；LLM 則傾向只做滿足即時任務需求的最小變更，未對「使軟體可維護」的更廣代碼結構投資（Chen et al. 2026, §4.4 Obs.6, p.8-9；Fig. 9, p.9）。\n\n- **多數模型解決率低於一半，與 EvoScore 排名一致（觀察 7，附錄 B.1，Fig. 10）**：解決率（solved rate）衡量「所有需求最終都被成功滿足」的樣本比例，可詮釋為 $\\gamma\\to\\infty$ 時 EvoScore 的極限情形。模型的解決率排名大致與其 EvoScore 排名一致，顯示 EvoScore 能有效捕捉長期任務完成能力。Fig. 10 顯示最高者 Claude-opus-4.6 達 91%，其後依序為 67%（claude-opus-4.5）、64%（GLM-5）、62%、52%、48%、41%、40%、40%、35%、35%、32%、30%、30%、29%、28%、23%、23%、19%，最低者僅 8%。**多數模型解決率低於 50%**，進一步確認 SWE-CI 作為長期代碼維護基準的困難度（Chen et al. 2026, Appendix B.1 Obs.7, p.13；Fig. 10, p.13）。\n\n- **增加回合數無法補償模型能力不足（觀察 8，附錄 B.2，Fig. 11）**：論文報告所有 20 個模型每項任務平均消耗的回合數（上限 20 回合）。較弱模型傾向耗盡回合預算卻仍未解決剩餘需求，而較強模型則在高效完成任務後提早終止。Fig. 11 顯示平均回合數最低者 Claude-opus-4.6 僅 5.1 回合、其次 claude-opus-4.5 為 9.8，其餘多數模型介於 12–20 之間（如 12.2、13.4、14.1、14.5、15.9、16.4、16.5、16.6、16.9、16.9、17.0、17.0、17.1、17.4、17.6、18.0、18.5），最高者 deepseek-v3.1 達 19.6。這說明長期代碼維護的瓶頸在於「模型能力」而非「嘗試次數」（Chen et al. 2026, Appendix B.2 Obs.8, p.13；Fig. 11, p.13）。\n\n- **LLM 多數效能增益集中在早期迭代、後期回合報酬遞減（觀察 9，附錄 B.3，Fig. 12）**：論文繪製所有模型與供應商在每個分箱回合區間累積達到的「最大相對變更（maximum relative change）」。依定義曲線單調非遞減；但所有供應商呈現一致模式——最陡的增益發生在前 1–4 回合，之後改善「明顯放緩」。這反映維護任務的自然結構：較簡單的需求先被解決，較困難者累積於後期迭代（Chen et al. 2026, Appendix B.3 Obs.9, p.14；Fig. 12, p.14）。\n\n- **與既有基準的關係與定位（附錄 A）**：附錄 A 把相關工作分為四類——函式級代碼生成基準（HumanEval、MBPP、APPS、CodeContests、EvalPlus、CodeXGLUE、MultiPL-E、DS-1000、BigCodeBench、LiveCodeBench）、倉庫級軟體工程基準（RepoBench、SWE-bench 及其 Verified/Multimodal/Pro 變體、DevBench、AgentBench、Terminal-Bench、$\\tau$-bench、$\\tau^2$-bench）、長視野與演化感知基準（InterCode、Commit0、LongCLI-Bench、SWE-Bench-CL、SWE-EVO）、以及軟體可維護性與演化研究（Lehman 定律、Cunningham 技術債隱喻、軟體維護佔生命週期成本主體的實證）。論文明確指出：儘管 SWE-EVO 等近期工作已從真實發布歷史建構演化任務、要求 agent 在保留既有功能下做多檔修改，**但既有工作沒有任何一個明確建模「代碼品質在迭代開發週期中的累積性退化」——而這正是 SWE-CI 設計要解決的核心關切**（Chen et al. 2026, Appendix A, p.12）。\n\n- **作者結論與自我定位**：論文結語重申 SWE-CI 是把可維護性操作化為「對未來修改的功能正確性」的倉庫級基準，使快照式基準看不見的東西——agent 設計決策隨代碼庫演化的累積後果——變得可見。橫跨 8 個供應商 20 個模型的廣泛實驗揭示，當前 LLM 仍難以在長期演化中維持代碼品質，尤其在控制回歸方面；作者期望 SWE-CI 成為下一代編碼 agent 的催化劑——不僅寫出「能運作」的代碼，更寫出「能持久（lasts）」的代碼（Chen et al. 2026, §5, p.9）。\n\n- **論文自陳的範圍與限制**：須留意 SWE-CI 的若干設計邊界（部分為作者明示、部分隱含於方法）：基準僅涵蓋 Python 倉庫（Step 1 過濾即限定 Python；Chen et al. 2026, §3.1, p.4）；可維護性的量化主要依賴測試通過數的代理指標（EvoScore 建立在 normalized change 之上）與兩項靜態指標（Pylint、MI），而非真實開發者主觀評估；最大迭代回合數固定為 20、逾時 3,600 秒（Chen et al. 2026, §4.1, p.6）；案例過濾保留「通過測試數差異≥5」且「修改行數≥1,000」的配對，故基準聚焦於實質演化情節而排除瑣碎變更（Chen et al. 2026, §3.1, p.4-5）；架構師需求文件被強制限制為「至多五項」最緊迫需求，這雖呼應 CI 哲學但也意味單回合不必然涵蓋完整變更範圍（Chen et al. 2026, §3.2, p.5）。論文未設獨立的「限制（Limitations）」專節，上述邊界散見於方法與實驗設定各處（Chen et al. 2026, §3–4，p.4-9）。\n\n---\n\n### 2. 同訊號異語意 — 跨框架的軟體工程代理行為分析\n*Ma et al. 2026, arXiv:2605.18332（瑞典布萊金理工學院、新加坡管理大學、南京大學、南洋理工大學）*\n\n![d2-scope](images/d2-scope.jpg)\n\n\n**定位**：既有的 LLM 軟體工程代理行為研究幾乎都在「單一框架或少數結構相近框架」內提取操作法則（如「測試步驟接在程式碼修改之後關聯較高解決率」「執行錯誤連鎖較短」「整體軌跡較緊湊」），卻從未直接檢驗這些法則能否轉移到結構顯著不同的代理設計上（Ma et al. 2026, Abstract, p.1；§1, p.1）。本文指出代理堆疊存在「框架層」與「LLM 層」兩層常被混為一談：兩個組態行為有別時，可能是框架造成、也可能是 LLM 造成，不固定其中一層就無法區分「框架重要」與「特定模型—框架組合重要」這兩種結論（Ma et al. 2026, §1, p.1）。論文自我定位為「生態系規模的跨組態效度檢驗」：把每個 ⟨框架, LLM⟩ 組態當成統合分析中的一個「研究」，量化行為法則的可轉移性，並以雙層分解把剩餘變異歸因到框架或 LLM（Ma et al. 2026, §1, p.2；§2, p.2）。\n\n\n![d2-method](images/d2-method.jpg)\n\n**做法**：\n- **資料規模與來源**：分析來自 126 個 ⟨框架, LLM⟩ 組態、橫跨 43 個框架（SWE-Agent、OpenHands、Aider、Moatless、Devon、Agentless 等）的 64,380 條 SWE-bench 軌跡；軌跡取自兩個公開來源——SWE-bench Experiments repository（排行榜提交）與 Docent 平台（完整對話轉錄）（Ma et al. 2026, §1, p.2；§3.1, p.4；§4, p.7）。所有軌跡皆針對 SWE-bench Verified 在 100% oracle 設定（完整測試可見）下產生（Ma et al. 2026, §3.1, p.4）。\n- **兩個子資料集**：(1) `bash-only` 子集——16,522 條軌跡、33 個 LLM 全跑在同一框架 mini-swe-agent 上，固定框架以隔離 LLM 層變異，作為 RQ1 的受控基線與 RQ2 樣式門檻的定義來源；(2) `verified` 子集——47,858 條軌跡、42 個框架、93 個組態，提供 RQ2/RQ3 每組態統合分析所需的框架多樣性（Ma et al. 2026, §3.1, p.4；§4, p.7）。兩子集合計 64,380 條軌跡、126 組態、43 框架（Ma et al. 2026, §4, p.7）。\n- **雙層實驗設計（核心方法貢獻）**：因為跨 43 框架 × 全部 LLM 的完全因子設計成本過高且不必要，作者改採兩個「各固定一個因子」的切片。Slice A（固定 LLM）：選出 3 個「示蹤 LLM（tracer）」——Claude 4 Sonnet（版本 20250514，8 框架，3,985 軌跡）、Claude 3.5 Sonnet（版本 20241022，8 框架，5,414 軌跡）、GPT-4o（2024，6 框架，3,459 軌跡），每個 tracer 出現在 6–8 個不同框架，故 tracer 內的行為差異必源自框架（Ma et al. 2026, §3.5.2, p.8；表 5, p.8）。Slice B（固定框架）：33 個 LLM、15 個模型家族全跑在 mini-swe-agent 上，變異必源自 LLM（Ma et al. 2026, §3.1, p.4；圖 1, p.3）。\n- **四階段標準化前處理流水線**：(1) Parsing——用 45 個框架專屬解析器（歸為 15 個格式家族）把 JSON/YAML/純文字日誌轉成結構化 ⟨θ, a, o⟩（推理痕跡、執行動作、環境回應）三元組；(2) Action classification——以 97 個工具呼叫簽章與 87 個 bash 指令樣式（共 184 個動作樣式）把每個動作映射到 6 個語意類別（表 1）；(3) Error detection——用 regex 比對環境回應，把產生錯誤的回合分為 15 種錯誤型別，連續產生錯誤的回合構成「錯誤連鎖（error cascade）」；(4) Metadata validation——以 SWE-bench 排行榜結果交叉核對解決狀態（Ma et al. 2026, §3.1, p.4）。分類器在 5 框架 500 筆人工標註上達 Cohen's κ > 0.85（Ma et al. 2026, §3.1, p.4；§4, p.7）。\n- **動作分類綱要（表 1）**：6 類——Exploration（cat/grep/find/ls、檔案檢視、程式碼搜尋、故障定位 API）、Modification（sed/patch/heredoc、編輯器指令、結構化 diff）、Test（pytest/unittest）、Navigation（cd/pwd）、Utility（git/pip/plan selection/submit）、Unknown（無法分類）；Unknown 中位數僅 0.4%/組態，132 組態中 122 個 ≤ 5%，唯一一個 65% Unknown 的工具呼叫代理被排除於動作分布分析之外（Ma et al. 2026, §3.1, p.4；§3.2, p.5；表 1, p.6）。\n- **16 個模型層行為特徵（表 2）**：分四維度——動作組成（Exploration/Modification/Test/Navigation 比例）、時間結構（軌跡長度 log、轉移熵、Exploration 前載率、首次修改時機、相位轉換點、晚期熵）、錯誤動態（錯誤率、連鎖率、復原率、重複率、平均連鎖長度）、效率（生產性回合比）（Ma et al. 2026, §3.2, p.5；表 2, p.6）。\n- **軌跡型別分類（表 3）**：把 16 個特徵標準化、PCA 投影到 3 個主成分，再以 k-means（k=5）分群成 5 種軌跡型別——Type 1 長探索型（24 組態，中位 44 回合，轉移熵 1.25，前載 0.18）、Type 2 迭代中度型（21 組態，37 回合，熵 1.16，前載 0.42）、Type 3 廣泛多樣型（48 組態，40 回合，最高熵 1.48，前載 0.34）、Type 4 緊湊線性型（8 組態，10 回合，最低熵 0.29，前載 0.32）、Type 5 緊湊前載型（25 組態，14 回合，熵 0.50，前載 0.96）（Ma et al. 2026, §3.2.1, p.5；表 3, p.6）。型別是「軌跡（trace）」屬性而非「框架（design）」屬性：同一框架（如 mini-swe-agent）配弱模型產生 Type 4 式緊湊軌跡、配強模型產生長而審慎軌跡（Ma et al. 2026, §3.2.1, p.5；§3.2, p.4–5）。\n- **6 個控制流圖（CFG）特徵**：把每條軌跡建成有向圖 G=⟨V,E⟩，節點為「motif（連續兩狀態對 ⟨s_i,s_{i+1}⟩）」、邊為 3 回合滑動窗口；狀態 s_i=⟨α_i, ε_i, σ_i⟩ 含動作類別、錯誤情境（clean/post_error）與三等分時段桶，狀態字母表上限 |S|=6×2×3=36（Ma et al. 2026, §3.3, p.5；§3.3.1–3.3.2, p.5）。6 特徵：motif 熵、轉移熵（多樣性）、self-loop rate、revisit rate（持續重複/振盪）、backtrack rate（短程振盪）、post-error motif ratio（近錯誤情境下運作）（Ma et al. 2026, §3.3.3, p.5）。\n- **7 個取自文獻的候選行為樣式（P1–P7，表 4）**：每個樣式操作化為二元指標（每軌跡 present/absent），門檻由 bash-only 子集導出、再於 verified 子集驗證——P1 修改前先探索（呼應「先理解再改」除錯原則，源自 [28] Zeller）、P2 適度探索（exploration ratio ∈ [.30,.50]，源自 Bouzenia & Pradel [2]）、P3 短連鎖（最長錯誤連鎖 < 中位數，源自 Chen et al. [3]）、P4 快速連鎖復原（首次連鎖 ≤ 2 回合，源自 Bouzenia & Pradel 的 repetitive cycle 反樣式 [2]）、P5 短軌跡（長度 < 中位數，源自 Majgaonkar et al. [16]「失敗軌跡較長」）、P6 低晚期熵（晚期熵 < 中位數）、P7 修改後測試（測試接在 ≥1 個 Modification 之後，呼應 TDD 並對應 SHEPHERD [8] 的 False Termination 反樣式）（Ma et al. 2026, §3.4, p.6–7；表 4, p.7）。\n- **效應量估計（單位無關的秩基統計）**：因行為度量非常態（有界比例、重尾計數、跨三個數量級的長度），全程用秩基效應量——二元樣式 P1–P7 用 2×2 列聯表（樣式有無 × 解決/失敗）的帶號 Cramér's V；RQ3 的 13 個連續特徵用秩雙列相關 r = 1 − 2U/(n₁n₂)（U 為 Mann–Whitney 統計量）；V、r 皆有界於 −1 到 +1，正值代表行為與「解決」共現（Ma et al. 2026, §3.5, p.7）。RQ1 跨組態 Kruskal–Wallis 比較報告 η²（特徵秩變異中由分組解釋的比例），採 Cohen 門檻 η² ≥ 0.14 為大效應（Ma et al. 2026, §3.5, p.7）。\n- **每組態統合分析（per-configuration meta-analysis）**：採 DerSimonian–Laird 隨機效應統合分析（[1][10]），把 126 個組態各當成一個「研究」、各貢獻一個效應量；每組態以反變異權重 w_{im}=σ̂⁻²_{im} 加權（軌跡多者權重高），算出加權合併均值 V̄/r̄、Cochran's Q 與 Higgins–Thompson I²；每組態須有 ≥20 軌跡、其中 ≥5 解決且 ≥5 未解決才納入（Ma et al. 2026, §3.5.1, p.7–8）。連續特徵有效組態數 K_i=119（126 中剔除 7 個解決率極端者），二元樣式 K_i 介於 40（P1）到 110（P3）（Ma et al. 2026, §3.5.1, p.7）。\n- **I² 異質性與方向分裂**：I² = max(0, 1−(K_i−1)/Q_i)×100%，量化「採樣噪音無法解釋的跨組態變異佔比」；分類為 universal（I²<25%）、moderate（25–75%）、configuration-specific（I²≥75%）（Ma et al. 2026, §3.5.1, p.8）。另以方向分裂 ⟨n₊, n₋⟩（每組態效應嚴格為正 vs 嚴格為負的組態數）補捉「不只量大、連方向都相反」的情形，這是 I² 無法表達的（Ma et al. 2026, §1, p.2；§3.5.1, p.8）。\n- **以調節變數做 meta-regression**：擴充隨機效應模型加入組態層調節變數，框架身分（43 層）與 LLM 家族（6 層）各自單獨擬合一個 meta-regression（因 K_i≤119 無法在單一回歸中穩定估 43+6=49 個指標），用 Raudenbush 的 pseudo-R²：R²=1−τ²_residual/τ²_null ∈ [0,1]，得 R²_FW 與 R²_LLM；報告比值 R²_FW/R²_LLM 作為「框架 vs LLM 主導指標」（比值遠大於 1 = 框架主導）（Ma et al. 2026, §3.5.1, p.8）。\n- **穩健性診斷**：因 43 層虛擬迴歸會過度擬合噪音，加做三項——(i) 2,000 次重抽組態的 95% bootstrap 百分位區間；(ii) 2,000 次隨機打亂框架標籤的單側置換虛無檢定（打亂後 R² 均值 0.33、95 百分位 0.45，觀測 R²_FW 須超過此 95 百分位才算顯著）；(iii) 逐一留一框架重抽（leave-one-framework-out）（Ma et al. 2026, §3.5.1, p.8；§5.4, p.10–11）。\n\n\n![d2-findings](images/d2-findings.jpg)\n\n\n**核心發現**：\n- **RQ1（框架 vs LLM 何者驅動行為差異）——框架與 LLM 都顯著塑造行為，但框架在多數情境下主導，且效果是型別條件化的**：多 tracer 分析中全部 27 個「tracer × 動作特徵」檢定皆顯著（p<0.001），框架效應 Kruskal–Wallis η² 中位數 0.78（Claude 4 Sonnet）、0.33（Claude 3.5 Sonnet）、0.56（GPT-4o），整體 η² 範圍 0.17–0.90（Ma et al. 2026, §5.1, p.8；表 7, p.8）。配對 Wilcoxon 檢定（同任務同 LLM 換框架）中 84.5%–95.5% 比較在 p<0.001 顯著（Ma et al. 2026, §5.1, p.8；表 7, p.8）。\n- **RQ1 型別內受控比較（表 8）——框架變異在 63 個「型別×tracer×特徵」三元組中於 44 個（69.8%）勝過 LLM 變異**：Type 3 廣泛多樣型框架勝率 94%（中位 FW η²=0.48 vs LLM η²=0.11），Type 5 緊湊前載型勝率 83%（FW η²=0.36 vs 0.02），Type 2 迭代中度型勝率 67%（FW η²=0.22 vs 0.02）；唯一例外是 Type 1 長探索型——LLM 變異在 18 個比較中 12 個（67%）勝過框架（LLM η²=0.28 vs FW η²=0.08）；Type 4 因同型別 tracer 對不足而未涵蓋（Ma et al. 2026, §5.1, p.9；表 8, p.10）。其機制詮釋為：在「鬆散長探索」工作流中框架基礎設施已產生長而審慎的軌跡，增量瓶頸是推理品質，故更強模型加值較多（Ma et al. 2026, §6.3, p.12）。\n- **RQ2（行為法則的可轉移性）——七個二元行為樣式中沒有一個是普世（universal）的**：P5 短軌跡與 P7 修改後測試是組態特定（I²≥75%）；其餘五個 P1/P2/P3/P4/P6 為 moderate（I² 約 51–70%）；P4 快速連鎖復原、P6 低晚期熵、P7 修改後測試三個樣式在不同組態間方向相反（同一規則指向相反方向）（Ma et al. 2026, §5.2, p.9；表 9, p.10）。\n- **RQ2 細部數字（表 9）**：P5 短軌跡 I²=86.8%（K=103），加權效應 V̄=+0.153 為七者最大，103 組態中 93 個方向為正、僅 8 負（93/8），但個別值跨 V=−0.36 到 +0.40，異質性在量級而非方向——所以「該縮短」方向成立但「縮短多少」需逐框架校準（Ma et al. 2026, §5.2, p.9；表 9, p.10；表 11, p.13）。P7 修改後測試 I²=75.0%（K=86），加權效應 V̄=+0.017 微弱、方向本身在組態間分裂（n₊/n₋=53/33），落在 moderate/config-specific 邊界但「質性上不同」（Ma et al. 2026, §5.2, p.9；表 9, p.10）。\n- **RQ2 框架 R² 與置換檢定**：框架 R² 在七個樣式中有五個超過 LLM R²，比值 1.3×–2.8×；但在置換虛無檢定（α=0.05）下「只有 P6 低晚期熵」通過 chance baseline（R²_FW=0.49，置換 p=0.016）——因為二元樣式飽和成高度偏斜分布（n₊/n₋ 在七者中有五個嚴重一面倒），削弱了 meta-regression 的檢定力（Ma et al. 2026, §5.2, p.9；表 9, p.10；§5.4, p.10–11）。\n- **RQ3（行為特徵的預測價值是否依組態而變）——13 個連續特徵中 10 個是組態特定的（I²=75.7–91.7%）**，三個為 moderate（cascade rate I²=45.0%、error rate I²=69.4%、post-error motif I²=72.9%），沒有任何特徵接近普世；連最穩定的預測因子也呈現實質的跨組態效應量級差異（Ma et al. 2026, §5.3, p.9；表 10, p.10）。\n- **RQ3 方向分裂的具體計數（核心「同訊號異語意」證據，表 10 與表 11）**：六個特徵有「不可忽略比例」的組態方向與加權均值相反——error rate 47/48（n₊/n₋，幾乎完全對半，r̄=+0.006 近零）、post-error motif 37/63（r̄=−0.016，偏向「越高越成功」）、test ratio 29/55（r̄=−0.036，偏向高測試→成功）、exploration ratio 61/44（r̄=+0.018）、modification ratio 60/42（r̄=+0.026）、self-loop rate 95/18（r̄=+0.111）（Ma et al. 2026, §5.3, p.9；表 10, p.10；表 11, p.13）。error rate 是最平衡案例：47 個組態「錯誤率較低關聯解決」（乾淨定位→成功），48 個組態相反（容忍較高錯誤率的修改也能成功），意即同一可觀測訊號在約一半組態預測成功、另一半預測失敗（Ma et al. 2026, §5.3, p.9；§6.1, p.12）。\n- **RQ3 框架是軌跡形狀特徵的較強調節變數**：框架身分在 13 個特徵全部於數值上超過 LLM 家族，但僅對軌跡形狀子集達到統計顯著；mean turns（平均回合數）是最強案例 R²_FW=64.3% vs R²_LLM=10.0%（6.4 倍，95% CI [0.52,0.81]，置換 p<0.001，留一框架範圍 [0.53,0.80]）（Ma et al. 2026, §5.3, p.9；表 10, p.10；§5.4, p.11）。另六個軌跡形狀特徵（五個控制流拓撲特徵加 cascade rate）R²_FW=0.45–0.51、置換 p∈[0.003,0.034]，框架解釋量是 LLM 的 2–3 倍（Ma et al. 2026, §5.3, p.9；§5.4, p.11；表 10, p.10）。\n- **RQ3 動作組成與原始錯誤計數——兩個調節變數都無法與噪音分離**：13 個連續特徵中其餘六個 R²_FW=0.34–0.40，落在置換 chance baseline（均值 0.33、95 百分位 0.45）以內，跨組態異質性雖真實（I²=69–89%）但無法乾淨歸因到框架或 LLM 任一層（Ma et al. 2026, §5.3, p.9；§5.4, p.10–11；表 10, p.10）。對 P4、P7、test ratio、post-error motif 四個訊號，LLM 家族調節變數單獨超過 chance baseline 而框架調節變數沒有，指出 LLM 在這幾個訊號上才是較強解釋層（Ma et al. 2026, §5.4, p.11）。\n- **兩類行為指引（表 12，實務含意）**：方向穩定（direction-stable）訊號——較短軌跡（P5，93/8）、較少重訪（revisit 113/3）、較低 motif 熵（100/13）、較低轉移熵（106/9）、較低 backtrack rate（102/8）、較短 mean turns（111/4），≥88% 組態同意符號——可作為「質性原則」轉移，但數值目標（如回合數上限）須逐框架重新校準（框架解釋的量級變異是 LLM 的 2.1×–6.4×，R²_FW=32–64% vs R²_LLM=10–21%）（Ma et al. 2026, §6.2, p.12；表 12, p.13）。方向不穩定（direction-unstable）訊號——error rate、post-error motif、test ratio、exploration/modification ratio、self-loop rate、P4/P6/P7——不帶任何普世規則，匯出的方向規則會誤導大量採用者（Ma et al. 2026, §6.2, p.12；表 12, p.13）。\n- **型別層改善槓桿建議（表 13）**：當代理表現不佳時，實務者面對「升級更強 LLM vs 重新設計框架」二選一——Type 3、Type 5 框架主導（建議重新設計框架），Type 1 LLM 主導（建議升級模型），Type 2 框架偏向但已達最高解決率 57.6%（兩者皆可），Type 4 資料不足；做法是先用表 2 特徵判定代理屬何型別，再選型別指示的槓桿（Ma et al. 2026, §6.3, p.12；表 13, p.13）。\n- **理論詮釋「同訊號異語意」**：所有 SE 代理共享「定位→修改→驗證」工作流，但不同框架以不同程度的代理自主性、迭代預算與失敗容忍度執行三階段，這改變了每個行為訊號在情境中的意義——長探索工作流中低錯誤率代表乾淨定位、與成功正相關；緊湊修改—驗證迴圈中升高的錯誤率反映已投入的修改、與成功正相關；可觀測動作相同，是周邊工作流決定它代表「紀律」還是「崩潰」（Ma et al. 2026, §6.1, p.12）。\n- **作者自陳的限制（威脅效度）**：(1) 內部效度——全為觀察性研究，關聯不證因果，每組態解決的是 SWE-bench 不同子集，效應量混入任務難度差異（Ma et al. 2026, §7, p.14）。(2) 框架效應是「捆綁處理」——動作介面、工具設計、系統提示、組態選擇被設計共同變動、無法個別隔離，「框架」在多 tracer 設計中也是捆綁處理（架構＋系統提示內容＋工具描述＋指令格式＋脈絡長度）（Ma et al. 2026, §3.5.2, p.8；§7, p.14）。(3) 稀疏調節矩陣——⟨框架, LLM 家族⟩ 交叉僅 9.3% 覆蓋（792 格中 74 格），44 框架中 36 個只跨單一 LLM 家族（Ma et al. 2026, §7, p.14）。(4) 框架版本混淆——bash-only 子集中 mini-swe-agent 跨 v0.0.0 到 v1.17.2 演化，部分歸給 LLM 的差異可能反映框架版本更新（Ma et al. 2026, §7, p.14）。(5) 100% oracle 設定可能膨脹 test_ratio 與「修改後測試」啟發法的訊號（代理因已知測試通過狀態而策略性減少測試）（Ma et al. 2026, §7, p.14）。(6) 外部效度——全部軌跡為 SWE-bench Verified 的 500 個 Python repository issue，未必推廣到其他語言、任務型別（feature development、重構）或較新基準（SWE-bench Pro）（Ma et al. 2026, §7, p.14–15）。(7) 一個機制探針（14 對 SWE-bench 任務測試 post-error re-localization）解決率從 2/14 升到 3/14，方向一致但檢定力不足（Ma et al. 2026, §6.5, p.14）。\n- **總結與對研究者的方法學建議**：單框架行為研究有結構性盲點——無法偵測樣式的預測意義何時跨生態系翻轉；20 個受測行為訊號中 9 個呈實質的每組態符號分歧（13 連續特徵中 6 個、7 二元樣式中 3 個）；建議把框架身分當成主要自變數而非控制變數，每個行為發現都附報「框架＋來源＋每組態效應分布」，並以 I² 量化可轉移性、以 R² 分解判定哪一層驅動不可轉移性（Ma et al. 2026, §6.4, p.13；§8, p.15）。論文釋出可重跑整個統合分析流水線的工具包（github.com/Marvinmw/agent-design-artifact），接受 43 框架格式的軌跡輸入並產出 I²、方向分裂與 R² 診斷（Ma et al. 2026, §8, p.15）。\n\n---\n\n### 3. 開發者採用 LLM 重構建議的型態 — 從「commit 後的真實代碼」回推開發者實際採納了 ChatGPT 重構建議的哪些部分\n*Schön et al. 2026, arXiv:2605.04835（瑞典 Chalmers 理工大學與哥德堡大學；部分作者隸屬 RISE 瑞典研究院）*\n\n![d3-scope](images/d3-scope.jpg)\n\n\n**定位**：本研究探討開發者在實務上「如何使用」LLM（具體為 ChatGPT 的 GPT 系列模型）所產生的重構建議——亦即建議產出後、被寫入原始碼之前，開發者決定保留、修改或移除其中哪些部分（Schön et al. 2026, Abstract, p.1）。論文明確將自身與既有研究路線區隔：先前研究多聚焦於「評估 LLM 重構建議的品質」（如建議能否改善可讀性、可維護性等品質屬性），而本研究刻意「超越 LLM 的重構產出」，去研究「開發者在軟體開發或維護過程中採納建議的那一步」（Schön et al. 2026, §I, p.1；§III, p.2）。其立論起點在於：近期研究指出在驗證 LLM 重構時往往仍需要開發者額外修改（即建議常需調整才能用），因此理解這些修改與開發者行為，對改進 LLM 聊天機器人與 AI 輔助開發流程具有重要意義（Schön et al. 2026, §I, p.1）。論文的科學貢獻自陳為兩點：(i) 一項關於開發者實務上如何使用 LLM 重構建議的實證研究，超越僅評估建議本身的先前工作；(ii) 一套以相似度量度估計建議「採用程度」的方法；此外亦公開了整理後的資料集與重製套件（replication package）以支持後續研究（Schön et al. 2026, §I–§II, p.1–2）。\n\n\n![d3-method](images/d3-method.jpg)\n\n**做法**：\n- **資料來源（DevGPT 資料集）**：研究建構於開源的 DevGPT 資料集之上，該資料集用於研究開發者與 ChatGPT 的互動，內含 29,778 組 prompt 與回應、橫跨 19,106 個程式碼片段，且這些 ChatGPT 對話均連結到對應的軟體開發產物（原始碼、commit、change log、issue 等）；資料採集期間為 2023 年 7 月至 8 月，其間使用的是 GPT-3.5 與 GPT-4 模型（Schön et al. 2026, §II, p.2）。DevGPT 中可供評估的部分共含 3,245 個 commit 物件，記錄了開發者如何以書面指示或程式碼片段與 ChatGPT 互動（Schön et al. 2026, §II, p.2）。\n- **整體流程（四階段，對應 Fig. 1）**：流程分為「資料處理 → 資料蒐集／擴充 → 資料分析」，並回答兩個研究問題；高層次步驟為：先前處理 DevGPT（移除重複 commit、濾除與重構無關者），再以 GitHub API 取出 commit 中變更的檔案、抽出 commit message 所連結之 ChatGPT 對話中建議的程式碼區塊，最後把 commit 中每個檔案對映到 ChatGPT 建議的某段重構程式碼（Schön et al. 2026, §IV 起頭, p.2；Fig. 1, p.3）。\n- **重構關鍵字的建構（用於篩選 commit）**：作者先從文獻中蒐集描述重構活動與改善程式設計的關鍵字；同時注意到先前研究指出開發者常用「refactor」「optimize」等籠統詞彙，未必指明重構類型（Schön et al. 2026, §IV-A, p.2）。為求關鍵字清單完整，作者對 DevGPT 全部 commit message 進行斷詞（tokenize）、詞形還原（lemmatize）、去標點與去停用詞，並存入集合去除重複，得到 2,918 個出現於 commit message 的詞；兩位作者以五次協作會議共同檢視、依文獻挑出與重構相關者；最後合併兩份清單並加入同義詞與英式／美式拼寫變體，得到 25 個重構關鍵字（Table I，例如 Refactor、Rename、Simplify、Restructure、Reorganize、Clean、Optimise/Optimize 等），刻意保留即使未出現在 DevGPT 中、但其他重構 commit message 可能用到的詞，以利後續研究重用（Schön et al. 2026, §IV-A, p.3；Table I, p.3）。\n- **commit 篩選結果**：以重構關鍵字過濾 commit，再移除冗餘 commit 與連結到無效 GitHub URL 者；作者也坦承自動化過濾有產生偽陽性的風險（後於效度威脅討論）。此篩選過程最終得到一個 169 個 commit 的整理後資料集（Schön et al. 2026, §IV-A, p.3）。\n- **資料蒐集／資料集擴充**：對 169 個重構 commit，為每個 commit 物件新增兩個欄位——「重構建議物件清單」與「變更檔案物件清單」；從對話中的 GPT 回應抽出程式碼區塊並賦予唯一 ID；資料集亦含 meta-data，包括所用程式語言與生成答案所用的 GPT 模型（Schön et al. 2026, §IV-B, p.3）。\n- **以 GitHub API 取得 commit 變更（unified diff 的還原）**：透過 GitHub API 取回每個 commit 的變更檔案，回應為各檔案的「unified diff」；每行以換行分隔、行首為「-」「+」或「 」分別代表刪除、新增、未變更（Schön et al. 2026, §IV-B, p.3）。作者據此重建兩個版本的檔案：`before_changes`（未變更行 + 被刪除的紅色行）與 `after_changes`（未變更行 + 新增的綠色行），並另外單獨保存新增的行供後續分析使用（Schön et al. 2026, §IV-B, p.3；Listing 1, p.3）。\n- **檔案過濾（去除雜訊）**：排除可能引入雜訊的特定副檔名與目錄，包括常見的相依、建置與環境資料夾（如 `site-packages/`、`node_modules/`），以及通常非原始碼的副檔名（如 `.gitignore`、`.yaml`）；完整排除清單見重製套件（Schön et al. 2026, §IV-B, p.4）。\n- **檔案↔建議的對映**：以正規化 Levenshtein 相似度，將每個變更檔案對映到 ChatGPT 對話中最相似的程式碼建議區塊——對每個 `after_changes` 檔案計算其與對話中各程式碼建議的相似度，取相似度最高者；此對映步驟產生 440 個 datapoint，每個 datapoint 含唯一 refactoring_ID、重構前檔案、重構建議、重構後檔案，以及 commit message 與 ChatGPT 對話的附加資訊（Schön et al. 2026, §IV-B, p.4）。\n- **分析資料概況與資料不平衡**：分析資料的規模見 Table II（160 個 commit、440 個檔案、368 個 prompt，平均每 commit 13.1 檔案、58.9 prompt）；作者注意到其中一個專案（`tisztamo/Junior`，143 commit、407 檔案、238 prompt）規模遠大於其他專案，造成資料不平衡，但作者選擇優先涵蓋盡可能多的重構情境，而不論其所屬 repo 的大小（Schön et al. 2026, §IV-B, p.4；Table II, p.4）。\n- **量化分析——四個相似度量度**：以多種詞彙層級（lexical）相似度量度估計「採用程度」，作者發現詞彙層級量度較適合捕捉重構中常見的表面層級編輯（如變數改名、程式碼區塊重組）（Schön et al. 2026, §IV-C, p.4）。比較對象是 `after_changes` 檔案與對應的 ChatGPT 建議（而非僅限變更行），所用量度為：\n  - **Jaccard n-gram 相似度**：比較兩段程式碼的重疊 n-gram 集合，採用 3-gram，理由是許多程式語言關鍵字與常見識別字長度約三字元（如 `for`、`int`、`new`），使 3-gram 適合捕捉模式與重排序（Schön et al. 2026, §IV-C, p.4）。\n  - **正規化 Levenshtein 相似度**：基於兩字串間的編輯距離（插入、刪除、替換的最小單字元操作數），以字串長度正規化後得到 0–1 的分數，用以辨識每行的微小修改，例如變數改名或開發者的細微調整（Schön et al. 2026, §IV-C, p.4）。\n  - **Token Match Rate（作者新引入的量度）**：定義為「commit 後重構檔案中、同時出現於重構建議裡的 token 數」除以「commit 後檔案中的 token 總數」（`TokenMatchRate = NumberOfMatchedTokens / TotalTokensInCommittedFile`）。引入此量度的設計理由是：作者發現許多重構建議牽涉多檔案，模型常以單一大型程式碼區塊涵蓋所有受影響檔案，雖正確地把該建議對映到各相關檔案，但相似度被人為壓低（因為建議只有一部分對應到單一檔案）；token match rate 能處理這類複雜的多檔案建議，但其代價是無法捕捉刪除（刪除由 Jaccard 與 Levenshtein 補足）（Schön et al. 2026, §IV-C, p.4）。\n  - **CrystalBLEU（語意相似度）**：另以 CrystalBLEU 補充語意層級分析，以評估其是否對「建議套用前的修改」提供額外洞見；CrystalBLEU 會過濾掉常見且無資訊量的 n-gram（如 `for`、`if`），聚焦於有意義的程式碼變更，用以捕捉結構性重構、控制流變更等語意層級的修改（Schön et al. 2026, §IV-C, p.4）。作者強調三個（詞彙）量度互補：token match rate 能處理複雜的多檔案建議但不計刪除，刪除則由 Jaccard 與 Levenshtein 捕捉（Schön et al. 2026, §IV-C, p.4）。\n- **質性分析——人工檢視協定**：為理解開發者與 ChatGPT 重構建議互動的行為，作者人工檢視 190 個 datapoint，每個 datapoint 包含「重構前檔案、ChatGPT 建議、最終 commit 的程式碼」三者（Schön et al. 2026, §IV-C2, p.4）。子集的抽樣方式以 token match rate 為依據：納入所有相似度低於 1.0（即代表有修改）的 datapoint，共 96 個；再加入 94 個 token match rate 恰為 1.0 者，合計 190 個（Schön et al. 2026, §IV-C2 與 §V 起頭, p.4–5）。\n- **人工檢視的關注點與排除規則**：人工檢視聚焦於 (i) ChatGPT 建議的重構步驟、(ii) 開發者在實作前對建議所做的修改型態（Schön et al. 2026, §V 起頭, p.5）。分析中作者觀察到開發者有時在 commit 中用「refactoring」一詞指涉「會改變程式行為」的變更；具體有 16 個案例的 commit message 明示在做重構、但實際變更其實是實作邊界情況／錯誤處理或為前端新增元素（如導覽列），因這類活動會改變程式行為，故被排除於質性分析之外（Schön et al. 2026, §V 起頭, p.5）。檢視由兩位作者於兩次協作會議中同時進行，以限制個人偏誤並當場討論解決分歧（Schön et al. 2026, §V 起頭, p.5；§IV-C2, p.4）。\n- **研究問題**：RQ1——開發者在實務上「採用 ChatGPT 重構建議到何種程度」（以 DevGPT 為基礎建構資料集，用三種詞彙相似度量度——token match rate、Jaccard n-gram、正規化 Levenshtein——量測）；RQ2——開發者在 commit 前「通常對 ChatGPT 重構建議做哪些修改」（以人工質性分析子集達成）（Schön et al. 2026, §I, p.1）。\n\n\n![d3-findings](images/d3-findings.jpg)\n\n\n**核心發現**：\n- **採用位置——重構目標多在對話前段達成**：因資料集本質上是開發者在 commit message 中連結了 ChatGPT 對話，故資料中「永遠存在某種程度的採用」，研究結果並不涵蓋「開發者完全不採納建議」的情形（Schön et al. 2026, §V-A, p.5）。Fig. 2 顯示開發者通常在對話的前幾個 prompt（典型為第 1–4 個 prompt）內就達成其重構目標；雖有明顯「採用對話中最後一個 prompt」的型態，但並非所有對話皆如此——人工檢視發現例外源於涉及多檔案的對話，開發者在不同時點為程式碼不同部分請求建議（Schön et al. 2026, §V-A, p.5；Fig. 2, p.5）。\n- **相似度的雙峰分佈（Jaccard 與 Levenshtein）**：Fig. 3 以密度圖呈現四個量度的相似度分佈。Jaccard 3-gram 與正規化 Levenshtein 呈現相似的「雙峰分佈」：一個低相似度峰（0.1–0.3）、一個高相似度峰（高於 0.9），中間山谷較少。這代表開發者要不就對建議做大幅修改（第一峰），要不就幾乎原封不動地採納（第二峰），較少做中等程度的修改；這些修改可包含新增與刪除（Schön et al. 2026, §V-A, p.5–6；Fig. 3, p.6）。\n- **Token Match Rate 集中於高值——低相似度多源於「刪除」**：token match rate 的密度明顯集中在高值（0.9 以上），低值附近密度趨近於零（即第一個低相似度峰消失）。原因是 token match rate 檢查「committed 檔案中的 token 有多少出現在建議裡」，故若開發者刪掉建議的部分內容、只保留其餘，分數仍可為 1.0。此結果顯示：先前在 Jaccard 與 Levenshtein 觀察到的「高修改率／低相似度」主要是因為開發者刪除了建議的部分、只挑選特定段落採納；因此大多數重構檔案的內容其實是採自 ChatGPT 建議。同時，微小修改的比率一直偏低，意味這些微小修改很可能是開發者自己的新增或調整（Schön et al. 2026, §V-A, p.5–6；Fig. 3, p.6）。\n- **CrystalBLEU 與詞彙量度一致**：CrystalBLEU 呈現與 Jaccard、Levenshtein 大致一致的分佈，亦有低、高相似度兩個主峰。作者解釋：CrystalBLEU 雖設計來降低常見／樣板 token 的影響，但仍主要依賴建議碼與最終碼之間的 token 重疊，因此對刪除、重排序等詞彙變更同樣敏感，產生與詞彙相似度量度可比的型態（Schön et al. 2026, §V-A, p.6）。\n- **RQ1 關鍵發現（Key finding 框）**：開發者通常經由「短互動（1–4 個 prompt）」採納重構建議，採納時大多「不加修改」或「只挑選建議中相關的部分」（Schön et al. 2026, §V-A, p.6）。\n- **重構活動型態與目標分佈（Table III，190 datapoint）**：人工分析辨識出開發者最常向 LLM 求助的重構活動（每個 datapoint 可含多種活動），各活動次數為：Rename 44、Improve documentation 37、Restructure 36、Splitting logic 33、Clean 29、Simplify 25、Change data type 7，所對應改善的品質面向分別為可讀性、可讀性／可理解性、模組化／可維護性、關注點分離／模組化、可維護性／可讀性、降低複雜度、可維護性（Schön et al. 2026, §V-B, p.6–7；Table III, p.7）。\n- **求助重構的目標——可讀性占 38%**：最常見的改善準則是可讀性（占子集 38%），主要透過為函式、變數、檔名改名，並確保所有舊名稱實例都被正確更新；開發者也請 ChatGPT 加入或修改註解與文件，並常請其清理程式碼、移除未使用的 import、函式或註解等不必要元素（Schön et al. 2026, §V-B, p.6）。\n- **求助重構的目標——可維護性占 34%**：第二常見目標為可維護性（34%）；開發者請 ChatGPT 協助重整專案結構、建議應新增或移動哪些檔案；少數情況意在採用物件導向程式設計、請 ChatGPT 據此重構；伴隨結構重整，ChatGPT 常建議把複雜邏輯拆分為較小且可重用的元件；其他用例則聚焦於以減少總行數、改用更合適的物件型別、或以函式庫的內建函式取代部分自寫邏輯來簡化程式碼（Schön et al. 2026, §V-B, p.6–7）。\n- **採用型態之一——完整採納整段建議**：第一種型態是「開發者原封不動採納完整建議」，所有量度的相似度皆為 1.0；許多此類案例是自動化流程的結果——某專案有一支 shell script，使用 prompt 模板依用例（如重構）提示 ChatGPT，再抽出建議、更新檔案並 commit；另一些案例是開發者把整個檔案當作 prompt 的 context，因而收到可完全採納的建議；此型態觀察到的重構活動多為較不易出錯者（尤其在提供必要 context 時），如變數改名、檔案重組、改進文件（Schön et al. 2026, §V-B, p.7）。\n- **採用型態之二——略去出錯部分或新行為**：第二種型態是「開發者略去建議中出錯的部分或會新增行為的部分，但採納其餘」；此型態的相似度為中等，且差異多源於「刪除」而非「新增」；論文以 `GenerateButton` 例子說明開發者移除了 ChatGPT 建議的「複製回應、設定 prompt」等額外行為（Schön et al. 2026, §V-B, p.6–7；Listing of ChatGPT Suggestion vs Committed File, p.7）。作者亦指出對話可能因多次嘗試修正重構碼或移除非預期行為而變得冗長並造成開發者挫折，最終導致開發者自行修改建議；論文舉一個 16-prompt 對話為例，開發者欲重構多檔案以採用物件導向設計、持續回饋建議造成的邏輯不一致與錯誤，對話以開發者說「no, I'm not doing this because it's ridiculous」收場（Schön et al. 2026, §V-B, p.7）。\n- **採用型態之三——建議在孤立情境下正確、但與專案不相容**：第三種型態主因為 ChatGPT 對專案其餘部分的存取受限——「重構建議本身孤立來看是正確的，但與專案其餘部分不相容」；建議依賴某些假設（特定函式／變數名稱、檔案路徑或資料型別），有時甚至依賴一個不存在的 helper 函式，開發者需做修改才能整合；這類修改被視為 token／字元層級的微小修改，且只出現在涉及重構程式碼、採用新設計（如物件導向、函式式元件）、把邏輯拆分以提升模組化與關注點分離的 commit（Schön et al. 2026, §V-B, p.7）。\n- **採用型態之四——採納建議的簡化邏輯、但捨棄其結構**：第四種型態是「開發者採用建議的簡化邏輯，但捨
